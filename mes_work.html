@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:40px}
.hdr{padding:28px 20px 18px;background:linear-gradient(180deg,#181b26,#0f1117);border-bottom:1px solid #2a2e3d;text-align:center;position:relative}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f6d365,#e2b04a,#fda085,#e2b04a,#f6d365);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite;text-shadow:0 0 30px rgba(246,211,101,.15)}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr-sub{font-size:12px;color:#8b8fa3;margin-top:3px}
.user-info{position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:8px;font-size:11px;color:#8b8fa3}
.user-info .uid{color:#e2b04a;font-weight:600}
.logout-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600}
.cat-list{padding:12px 16px}
.cat{border-radius:14px;margin-bottom:8px;overflow:hidden;border:1px solid #2a2e3d;background:#1a1d27;transition:border-color .3s,background .4s,box-shadow .4s}
.cat.open{border-color:rgba(79,140,255,.3);background:#222838;box-shadow:0 0 20px rgba(79,140,255,.08)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--cb,#1e293b)}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:700}
.cat-desc{font-size:11px;color:#8b8fa3;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#5a5e72;transition:transform .25s;flex-shrink:0;font-size:18px}
.cat-badge{font-size:11px;font-weight:600;flex-shrink:0;color:#5a5e72}
.cat.open .cat-arrow{transform:rotate(90deg);color:var(--c,#4f8cff)}
.cat-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.cat-divider{height:1px;background:#2a2e3d;margin:0 16px}
.sub-list{padding:6px 8px 8px}
.sub-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#e8eaf0;transition:background .12s}
.sub-link:active{background:#222633}
.sub-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.05);flex-shrink:0}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:13px;font-weight:600}
.sub-desc{font-size:10px;color:#8b8fa3;margin-top:1px}
.sub-arrow{color:#5a5e72;font-size:14px;flex-shrink:0}
.sub-link.coming{opacity:.4;pointer-events:none}
.sub-link.coming .sub-name::after{content:' (준비중)';font-size:9px;color:#5a5e72;font-weight:400}
.cat-single{display:block;text-decoration:none;color:inherit}
.cat-single:active .cat{border-color:var(--c,#4f8cff)}

/* ===== 잠금화면 ===== */
.lock-overlay{position:fixed;inset:0;background:linear-gradient(180deg,#181b26,#0f1117);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.lock-mode{font-size:14px;font-weight:700;color:#e8eaf0;margin-bottom:6px;text-align:center}
.lock-hint{font-size:12px;color:#8b8fa3;margin-bottom:24px;text-align:center;min-height:18px}
.lock-hint.err{color:#ef4444}
.lock-hint.ok{color:#22c55e}

.pin-dots{display:flex;gap:12px;margin-bottom:32px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:#2a2e3d;border:2px solid #2a2e3d;transition:all .15s}
.pin-dot.filled{background:#e2b04a;border-color:#e2b04a;box-shadow:0 0 10px rgba(226,176,74,.4)}
.pin-dot.err{background:#ef4444;border-color:#ef4444;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.keypad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;justify-content:center}
.key{width:72px;height:72px;border-radius:50%;background:#1a1d27;border:1.5px solid #2a2e3d;color:#e8eaf0;font-size:26px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s;display:flex;align-items:center;justify-content:center}
.key:active{background:#2a2e3d;transform:scale(.92)}
.key.fn{background:transparent;border:none;font-size:14px;color:#8b8fa3;font-weight:500}
.key.fn:active{background:rgba(255,255,255,.05)}
.key.del{font-size:22px}

.lock-actions{margin-top:28px;display:flex;gap:16px;font-size:12px}
.lock-link{color:#8b8fa3;text-decoration:none;padding:8px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lock-link:active{color:#e2b04a}

.lockout{color:#ef4444;font-size:13px;font-weight:600;text-align:center;margin-bottom:16px}

body.locked{overflow:hidden}

.loading{width:24px;height:24px;border:3px solid #2a2e3d;border-top-color:#e2b04a;border-radius:50%;animation:spin 0.8s linear infinite;margin:8px auto}
@keyframes spin{to{transform:rotate(360deg)}}

function renderCats(){
  const c=document.getElementById('catList');c.innerHTML='';
  CATS.forEach(cat=>{
    if(cat.single){
      const a=document.createElement('a');a.className='cat-single';a.href=cat.href;
      a.innerHTML='<div class="cat" data-c="'+cat.id+'"><div class="cat-hdr"><div class="cat-icon">'+cat.icon+'</div><div class="cat-info"><div class="cat-name">'+cat.name+'</div><div class="cat-desc">'+cat.desc+'</div></div><div class="cat-badge">1</div><div class="cat-arrow">›</div></div></div>';
      c.appendChild(a);
    }else{
      const el=document.createElement('div');el.className='cat';el.setAttribute('data-c',cat.id);
      const sh=(cat.subs||[]).map(s=>{const cm=s.coming;return '<a class="sub-link'+(cm?' coming':'')+'" href="'+(cm?'#':s.href)+'"'+(cm?' onclick="event.preventDefault();showToast(\'준비중입니다\')"':'')+'><div class="sub-icon">'+s.icon+'</div><div class="sub-info"><div class="sub-name">'+s.name+'</div><div class="sub-desc">'+s.desc+'</div></div>'+(!cm?'<div class="sub-arrow">›</div>':'')+'</a>'}).join('');
      el.innerHTML='<div class="cat-hdr" onclick="toggleCat(this)"><div class="cat-icon">'+cat.icon+'</div><div class="cat-info"><div class="cat-name">'+cat.name+'</div><div class="cat-desc">'+cat.desc+'</div></div><div class="cat-badge">'+(cat.subs||[]).length+'</div><div class="cat-arrow">›</div></div><div class="cat-panel"><div class="cat-divider"></div><div class="sub-list">'+sh+'</div></div>';

const AUTH_DAYS = 7;

const LOCKOUT_SEC = 60;
const LK_AUTH = 'esg_pin_auth';
const LK_FAIL = 'esg_pin_fail';

let curPin = '';

async function sha256hex(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

function getAuth(){try{return JSON.parse(localStorage.getItem(LK_AUTH)||'null')}catch(e){return null}}
function setAuth(name){localStorage.setItem(LK_AUTH,JSON.stringify({name,exp:Date.now()+AUTH_DAYS*86400*1000}))}
function clearAuth(){localStorage.removeItem(LK_AUTH)}
function getFail(){try{return JSON.parse(localStorage.getItem(LK_FAIL)||'{"count":0,"until":0}')}catch(e){return {count:0,until:0}}}
function setFail(f){localStorage.setItem(LK_FAIL,JSON.stringify(f))}
function clearFail(){localStorage.removeItem(LK_FAIL)}

function initLock(){
  const a = getAuth();
  if(a && a.exp>Date.now() && a.name){unlock(a.name);return}
  renderKeypad();
  checkLockout();
}

function renderKeypad(){
  const kp = document.getElementById('keypad');
  kp.innerHTML = '';
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  keys.forEach(k=>{
    const b = document.createElement('button');
    if(k===''){b.className='key fn';b.style.visibility='hidden'}
    else if(k==='⌫'){b.className='key fn del';b.textContent=k;b.onclick=()=>pinDel()}
    else{b.className='key';b.textContent=k;b.onclick=()=>pinPress(k)}
    kp.appendChild(b);
  });
}

function updateDots(){
  document.querySelectorAll('#pinDots .pin-dot').forEach((d,i)=>{
    d.classList.remove('err');
    if(i<curPin.length) d.classList.add('filled');
    else d.classList.remove('filled');
  });
}

function clearPin(){curPin='';updateDots()}

function shakeDots(){
  document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.classList.add('err'));
  setTimeout(()=>{curPin='';updateDots()}, 400);
}

function setHint(msg, cls){
  const e = document.getElementById('pinHint');
  e.textContent = msg;
  e.className = 'lock-hint' + (cls?' '+cls:'');
}

function pinPress(n){
  if(busy) return;
  if(curPin.length>=4) return;
  const f = getFail();
  if(f.until>Date.now()) return;
  curPin += n;
  updateDots();
  if(curPin.length===4) setTimeout(handlePinComplete, 150);
}

function pinDel(){
  if(busy) return;
  if(!curPin) return;
  curPin = curPin.slice(0,-1);
  updateDots();
}

async function handlePinComplete(){
  busy = true;
  setHint('확인 중...');
  try{
    const pinHash = await sha256hex(curPin);
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/' + TBL + '?select=name&pin_hash=eq.' + pinHash,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if(!r.ok) throw new Error('서버 오류: ' + r.status);
    const data = await r.json();

    if(data && data.length > 0){
      const name = data[0].name;
      clearFail();
      setAuth(name);
      setHint('인증 완료: ' + name, 'ok');
      setTimeout(()=>unlock(name), 300);
    }else{
      const f = getFail();
      f.count = (f.count||0) + 1;
      if(f.count >= MAX_FAIL){
        f.until = Date.now() + LOCKOUT_SEC*1000;
        f.count = 0;
        setFail(f);
        setHint('PIN 5회 실패', 'err');
        checkLockout();
      }else{
        setFail(f);
        setHint('PIN 불일치 ('+f.count+'/'+MAX_FAIL+')', 'err');
      }
      shakeDots();
    }
  }catch(err){
    setHint('❌ 네트워크 오류', 'err');
    shakeDots();
  }finally{
    busy = false;
  }
}

function checkLockout(){
  const f = getFail();
  const msg = document.getElementById('lockoutMsg');
  const remain = f.until - Date.now();
  if(remain > 0){
    msg.style.display = 'block';
    const upd = ()=>{
      const r = Math.ceil((f.until-Date.now())/1000);
      if(r<=0){
        msg.style.display='none';
        clearFail();
        clearInterval(lockTimer);
        setHint('4자리 PIN을 입력하세요');
        return;
      }
      msg.textContent = '🔒 잠금: '+r+'초 후 재시도';
    };
    upd();
    clearInterval(lockTimer);
    lockTimer = setInterval(upd, 1000);
  }else{
    msg.style.display = 'none';
  }
}

function unlock(name){
  document.body.classList.remove('locked');
  document.getElementById('lockScr').style.display = 'none';
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('uidDisplay').textContent = name;
  sessionStorage.setItem('ESG_USER', name);
}

function logout(){
  if(!confirm('잠금하시겠습니까?')) return;
  clearAuth();
  sessionStorage.removeItem('ESG_USER');
  location.reload();
}

document.getElementById('logoutBtn').onclick = logout;
document.addEventListener('keydown', function(e){
  if(!document.body.classList.contains('locked')) return;
  if(e.key>='0' && e.key<='9') pinPress(e.key);
  else if(e.key==='Backspace') pinDel();
});

renderCats();
initLock();
</script>
