<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>작업표준 검색</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
:root{--bg:#0f1117;--card:#1a1d28;--card2:#222636;--border:#2d3148;--pri:#4f8cff;--t1:#f0f2f8;--t2:#a0a8c4;--t3:#636b8a;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#1a1d28,#2a2f45);padding:14px 16px;text-align:center;border-bottom:1px solid var(--border)}
.hdr h1{font-size:17px;font-weight:800;background:linear-gradient(135deg,#ffd54f,#ffb300);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:10px;color:var(--t3);margin-top:2px}
.hdr-back{position:absolute;left:12px;top:50%;transform:translateY(-50%);padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--t2);font-size:11px;font-weight:600;text-decoration:none}
.hdr{position:relative}
.wrap{max-width:600px;margin:0 auto;padding:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card-tit{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px}
.fg input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card2);color:var(--t1);outline:none}
.fg input:focus{border-color:var(--pri)}
.fg input::placeholder{color:var(--t3)}
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,#4f8cff,#6c63ff);color:#fff;width:100%}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}
/* Search */
.search-box{display:flex;gap:8px}
.search-box input{flex:1}
.search-box .btn{width:auto;flex-shrink:0}
/* File list */
.file-list{display:flex;flex-direction:column;gap:6px}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--card2);border:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--t1);transition:.12s}
.file-item:active{background:rgba(79,140,255,.1);border-color:rgba(79,140,255,.3)}
.file-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.file-icon.pdf{background:rgba(239,68,68,.15);color:#ef4444}
.file-icon.doc{background:rgba(59,130,246,.15);color:#3b82f6}
.file-icon.xls{background:rgba(34,197,94,.15);color:#22c55e}
.file-icon.img{background:rgba(168,85,247,.15);color:#a855f7}
.file-icon.ppt{background:rgba(249,115,22,.15);color:#f97316}
.file-icon.folder{background:rgba(255,213,64,.15);color:#ffd740}
.file-icon.other{background:rgba(100,116,139,.15);color:#64748b}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:10px;color:var(--t3);margin-top:1px}
.file-arrow{color:var(--t3);font-size:14px;flex-shrink:0}
/* Status */
.status{text-align:center;padding:16px;font-size:12px;color:var(--t3)}
.status.loading{color:var(--pri)}
/* Folder path */
.breadcrumb{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;font-size:11px}
.bc-item{padding:3px 8px;border-radius:5px;background:var(--card2);color:var(--t2);cursor:pointer;font-weight:600}
.bc-item:hover{background:rgba(79,140,255,.15);color:var(--pri)}
.bc-item.current{background:rgba(79,140,255,.2);color:var(--pri)}
/* Settings */
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.setting-row input{flex:1}
/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
/* Count badge */
.count-badge{font-size:10px;background:rgba(79,140,255,.15);color:var(--pri);padding:2px 8px;border-radius:10px;font-weight:600;margin-left:auto}
</style>
</head>
<body>
<div class="hdr">
  <a class="hdr-back" href="https://knagbyeongju-123.github.io/smtec_main2/index.html">← 메인</a>
  <h1>📋 작업표준 검색</h1>
  <p>구글드라이브 표준문서 검색 · 열람</p>
</div>
<div class="wrap">
  <!-- 검색 -->
  <div class="card">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="파일명 검색..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-pri" onclick="doSearch()">🔍</button>
    </div>
  </div>

  <!-- 경로 -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- 파일 목록 -->
  <div class="card">
    <div class="card-tit">
      <span>📁 파일 목록</span>
      <span class="count-badge" id="fileCount">0건</span>
    </div>
    <div id="fileList"><div class="status">GAS URL을 설정하고 파일을 불러오세요</div></div>
  </div>

  <!-- 설정 -->
  <div class="card">
    <div class="card-tit">⚙ 설정</div>
    <div class="fg">
      <label>GAS 웹앱 URL <span style="font-size:9px;color:var(--t3);font-weight:400">아래 GAS 코드 배포 후 URL 입력</span></label>
      <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" value="https://script.google.com/macros/s/AKfycbwxnHIde30E7Jaww7B-vDJroB4mSihuX5JmWGnbTRb0e9puUQy3u-QYoue3ebJZRCSO/exec">
    </div>
    <div class="fg">
      <label>Google Drive 폴더 ID</label>
      <input type="text" id="folderId" placeholder="폴더 ID (URL에서 추출)" value="1vh7JW_hZ2EMQSaK07Aa8RnHBpVU4Bxr8">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm btn-pri" onclick="saveSettings()">💾 저장</button>
      <button class="btn btn-sm btn-ghost" onclick="loadFiles()">📂 파일 불러오기</button>
      <button class="btn btn-sm btn-ghost" onclick="toggleGasGuide()">📋 GAS 코드</button>
    </div>
    <div id="gasGuide" style="display:none;margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;font-size:11px;line-height:1.8;color:var(--t2)">
      <b>설정 방법:</b><br>
      ① <a href="https://script.google.com" target="_blank" style="color:var(--pri)">script.google.com</a> → 새 프로젝트<br>
      ② 아래 코드 붙여넣기 → ③ 배포 → 웹앱 → 액세스: 누구나<br>
      ④ URL 복사하여 위에 입력
      <button class="btn btn-sm btn-ghost" onclick="copyGasCode()" style="margin-top:8px;width:100%">📋 GAS 코드 복사</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Settings =====
const LS_KEY='GDRIVE_STD_SETTINGS';
let settings=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
let currentFolderId='';
let folderStack=[]; // [{id,name}]
let allFiles=[];

function loadSettingsUI(){
  if(settings.gasUrl)document.getElementById('gasUrl').value=settings.gasUrl;
  if(settings.folderId)document.getElementById('folderId').value=settings.folderId;
}

function saveSettings(){
  settings.gasUrl=document.getElementById('gasUrl').value.trim();
  const rawFolder=document.getElementById('folderId').value.trim();
  settings.folderId=extractFolderId(rawFolder)||rawFolder;
  document.getElementById('folderId').value=settings.folderId;
  localStorage.setItem(LS_KEY,JSON.stringify(settings));
  showToast('💾 설정 저장');
}

function getGasUrl(){return settings.gasUrl||document.getElementById('gasUrl').value.trim()}
function extractFolderId(val){
  if(!val)return '';
  val=val.trim();
  // URL형태면 ID 추출: https://drive.google.com/drive/folders/XXXXX 또는 ?id=XXXXX
  const m1=val.match(/\/folders\/([a-zA-Z0-9_-]+)/);
  if(m1)return m1[1];
  const m2=val.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2)return m2[1];
  // 이미 ID만 입력된 경우
  return val;
}
function getRootFolderId(){
  const raw=settings.folderId||document.getElementById('folderId').value.trim();
  return extractFolderId(raw)||'1vh7JW_hZ2EMQSaK07Aa8RnHBpVU4Bxr8';
}

// ===== Load Files via GAS =====
async function loadFiles(folderId){
  const gasUrl=getGasUrl();
  if(!gasUrl){showToast('GAS URL을 먼저 설정하세요');return}
  
  const targetFolder=folderId||getRootFolderId();
  currentFolderId=targetFolder;
  
  const listEl=document.getElementById('fileList');
  listEl.innerHTML='<div class="status loading">📂 파일 목록 로딩 중...</div>';
  
  try{
    const url=gasUrl+'?action=listFiles&folderId='+encodeURIComponent(targetFolder);
    const res=await fetch(url);
    const data=await res.json();
    
    if(data.success){
      allFiles=data.files||[];
      renderFiles(allFiles);
      document.getElementById('fileCount').textContent=allFiles.length+'건';
      showToast('📂 '+allFiles.length+'개 파일 로드');
    }else{
      let msg=data.message||'알 수 없는 오류';
      if(msg.includes('action')||msg.includes('unknown'))msg+='<br><br>💡 <b>GAS 코드를 최신버전으로 교체 후 재배포</b>하세요<br>아래 [GAS 코드] 버튼 → 복사 → GAS 편집기에 붙여넣기 → 배포 → 새 배포';
      listEl.innerHTML='<div class="status" style="text-align:left;line-height:1.6">⚠ '+msg+'</div>';
    }
  }catch(e){
    listEl.innerHTML='<div class="status">⚠ 네트워크 오류: '+e.message+'</div>';
  }
}

function renderFiles(files){
  const listEl=document.getElementById('fileList');
  if(!files.length){listEl.innerHTML='<div class="status">파일이 없습니다</div>';return}
  
  // Sort: folders first, then by name
  files.sort((a,b)=>{
    if(a.type==='folder'&&b.type!=='folder')return -1;
    if(a.type!=='folder'&&b.type==='folder')return 1;
    return (a.name||'').localeCompare(b.name||'');
  });
  
  listEl.innerHTML='';
  const frag=document.createDocumentFragment();
  
  files.forEach(f=>{
    const a=document.createElement('a');
    a.className='file-item';
    
    if(f.type==='folder'){
      a.href='javascript:void(0)';
      a.onclick=()=>openFolder(f.id,f.name);
    }else{
      a.href=f.url||('#');
      a.target='_blank';
    }
    
    const iconClass=getIconClass(f);
    const iconEmoji=getIconEmoji(f);
    const size=f.size?formatSize(f.size):'';
    const date=f.modifiedDate?formatDate(f.modifiedDate):'';
    const meta=[f.path?'📁 '+f.path:'',size,date].filter(Boolean).join(' · ');
    
    a.innerHTML=`
      <div class="file-icon ${iconClass}">${iconEmoji}</div>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${meta}</div>
      </div>
      <div class="file-arrow">›</div>`;
    frag.appendChild(a);
  });
  
  listEl.appendChild(frag);
}

function getIconClass(f){
  if(f.type==='folder')return 'folder';
  const n=(f.name||'').toLowerCase();
  const m=f.mimeType||'';
  if(n.endsWith('.pdf')||m.includes('pdf'))return 'pdf';
  if(n.endsWith('.doc')||n.endsWith('.docx')||m.includes('document'))return 'doc';
  if(n.endsWith('.xls')||n.endsWith('.xlsx')||m.includes('spreadsheet'))return 'xls';
  if(n.endsWith('.ppt')||n.endsWith('.pptx')||m.includes('presentation'))return 'ppt';
  if(n.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/)||m.includes('image'))return 'img';
  return 'other';
}

function getIconEmoji(f){
  if(f.type==='folder')return '📁';
  const cls=getIconClass(f);
  return{pdf:'📄',doc:'📝',xls:'📊',ppt:'📑',img:'🖼️',other:'📎'}[cls]||'📎';
}

function formatSize(bytes){
  bytes=parseInt(bytes)||0;
  if(bytes<1024)return bytes+'B';
  if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';
  return(bytes/1048576).toFixed(1)+'MB';
}

function formatDate(d){
  try{return new Date(d).toLocaleDateString('ko-KR')}catch(e){return d}
}

// ===== Folder navigation =====
function openFolder(folderId,folderName){
  folderStack.push({id:folderId,name:folderName});
  renderBreadcrumb();
  loadFiles(folderId);
}

function goToFolder(idx){
  if(idx<0){
    folderStack=[];
    currentFolderId=getRootFolderId();
  }else{
    folderStack=folderStack.slice(0,idx+1);
    currentFolderId=folderStack[idx].id;
  }
  renderBreadcrumb();
  loadFiles(currentFolderId);
}

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  if(!folderStack.length){bc.innerHTML='';return}
  let html='<span class="bc-item" onclick="goToFolder(-1)">🏠 루트</span>';
  folderStack.forEach((f,i)=>{
    const isCurrent=i===folderStack.length-1;
    html+=`<span style="color:var(--t3)">›</span><span class="bc-item${isCurrent?' current':''}" onclick="goToFolder(${i})">${esc(f.name)}</span>`;
  });
  bc.innerHTML=html;
}

// ===== Search =====
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){renderFiles(allFiles);document.getElementById('fileCount').textContent=allFiles.length+'건';return}
  
  // 로컬 필터 (현재 폴더)
  const local=allFiles.filter(f=>(f.name||'').toLowerCase().includes(q.toLowerCase()));
  
  // GAS 서버 재귀 검색 (하위 폴더 포함)
  const gasUrl=getGasUrl();
  if(!gasUrl){renderFiles(local);document.getElementById('fileCount').textContent=local.length+'/'+allFiles.length+'건';return}
  
  const listEl=document.getElementById('fileList');
  listEl.innerHTML='<div class="status loading">🔍 하위 폴더 포함 검색 중...</div>';
  
  try{
    const rootId=getRootFolderId();
    const url=gasUrl+'?action=search&folderId='+encodeURIComponent(rootId)+'&query='+encodeURIComponent(q);
    const res=await fetch(url);
    const data=await res.json();
    
    if(data.success){
      const results=data.files||[];
      renderFiles(results);
      document.getElementById('fileCount').textContent=results.length+'건 (전체 검색)';
      if(!results.length) listEl.innerHTML='<div class="status">검색결과 없음: "'+q+'"</div>';
    }else{
      // GAS 검색 실패 시 로컬 필터 fallback
      renderFiles(local);
      document.getElementById('fileCount').textContent=local.length+'/'+allFiles.length+'건 (로컬)';
    }
  }catch(e){
    // 네트워크 오류 시 로컬 필터 fallback
    renderFiles(local);
    document.getElementById('fileCount').textContent=local.length+'/'+allFiles.length+'건 (로컬)';
  }
}

// ===== GAS Guide =====
function toggleGasGuide(){
  const el=document.getElementById('gasGuide');
  el.style.display=el.style.display==='none'?'block':'none';
}

const GAS_CODE=`// Google Apps Script - 작업표준 검색용
// 배포: 웹앱 → 누구나 접근 가능

function doGet(e) {
  const action = e.parameter.action;
  
  if (action === 'listFiles') {
    const folderId = e.parameter.folderId;
    if (!folderId) return jsonResp({success:false, message:'folderId 필요'});
    
    try {
      const folder = DriveApp.getFolderById(folderId);
      const files = [];
      
      // 하위 폴더
      const folders = folder.getFolders();
      while (folders.hasNext()) {
        const f = folders.next();
        files.push({
          id: f.getId(),
          name: f.getName(),
          type: 'folder',
          url: f.getUrl(),
          modifiedDate: f.getLastUpdated().toISOString()
        });
      }
      
      // 파일
      const fileIter = folder.getFiles();
      while (fileIter.hasNext()) {
        const f = fileIter.next();
        files.push({
          id: f.getId(),
          name: f.getName(),
          type: 'file',
          mimeType: f.getMimeType(),
          size: f.getSize(),
          url: f.getUrl(),
          modifiedDate: f.getLastUpdated().toISOString()
        });
      }
      
      return jsonResp({success:true, files:files, count:files.length});
    } catch(err) {
      return jsonResp({success:false, message:err.message});
    }
  }
  
  if (action === 'search') {
    const folderId = e.parameter.folderId;
    const query = e.parameter.query || '';
    if (!folderId || !query) return jsonResp({success:false, message:'folderId, query 필요'});
    
    try {
      const files = [];
      searchInFolder(DriveApp.getFolderById(folderId), query.toLowerCase(), files, 0);
      return jsonResp({success:true, files:files, count:files.length});
    } catch(err) {
      return jsonResp({success:false, message:err.message});
    }
  }
  
  return jsonResp({success:false, message:'unknown action'});
}

function searchInFolder(folder, query, results, depth) {
  if (depth > 5 || results.length > 100) return; // 깊이/개수 제한
  
  const fileIter = folder.getFiles();
  while (fileIter.hasNext()) {
    const f = fileIter.next();
    if (f.getName().toLowerCase().includes(query)) {
      results.push({
        id: f.getId(),
        name: f.getName(),
        type: 'file',
        mimeType: f.getMimeType(),
        size: f.getSize(),
        url: f.getUrl(),
        modifiedDate: f.getLastUpdated().toISOString(),
        path: folder.getName()
      });
    }
  }
  
  const folders = folder.getFolders();
  while (folders.hasNext()) {
    const sub = folders.next();
    if (sub.getName().toLowerCase().includes(query)) {
      results.push({
        id: sub.getId(),
        name: sub.getName(),
        type: 'folder',
        url: sub.getUrl(),
        modifiedDate: sub.getLastUpdated().toISOString()
      });
    }
    searchInFolder(sub, query, results, depth + 1);
  }
}

function jsonResp(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

function copyGasCode(){
  navigator.clipboard.writeText(GAS_CODE).then(()=>showToast('📋 GAS 코드 복사됨')).catch(()=>{
    const t=document.createElement('textarea');t.value=GAS_CODE;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('📋 복사됨');
  });
}

// ===== Utils =====
function esc(s){return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

// ===== Init =====
loadSettingsUI();
if(settings.gasUrl){loadFiles()}
</script>
</body>
</html>
