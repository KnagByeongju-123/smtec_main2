<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>프레스 작업일보</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;--radius:12px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px}
.hdr{padding:16px 20px;background:linear-gradient(180deg,#2d1b4e,var(--bg));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.hdr .back-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--txt);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.hdr .back-btn:active{background:rgba(255,255,255,.15)}
.hdr h1{font-size:17px;font-weight:800;color:var(--purple);flex:1}
.hdr .sub{font-size:11px;color:var(--sub);margin-top:2px}
.container{padding:14px;max-width:720px;margin:0 auto}

/* 설비 선택 */
.machine-sel{background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.ms-title{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:10px}
.ms-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ms-row label{font-size:11px;color:var(--sub);min-width:50px;align-self:center;font-weight:600}
.ms-row select,.ms-row input{flex:1;min-width:140px;padding:9px 12px;border-radius:7px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:13px;font-family:inherit}
.ms-btn{background:var(--accent);border:none;color:#0f172a;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

/* 섹션 */
.rpt-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.rpt-section-title{font-size:13px;font-weight:800;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.rpt-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;font-size:12px;padding:10px;background:rgba(0,0,0,.25);border-radius:6px}
.rpt-info-grid>div{display:flex;justify-content:space-between;gap:6px;min-width:0;align-items:center}
.rpt-info-grid>div.full{grid-column:span 2}
.rpt-info-grid .rig-lb{color:var(--sub);flex-shrink:0}
.rpt-info-grid .rig-vl{color:var(--txt);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;min-width:0}

/* 양품수량 */
.ship-box{background:rgba(34,197,94,.06);border:1.5px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 12px}
.ship-box input{width:100%;padding:12px;border:1.5px solid rgba(34,197,94,.4);background:#0f1117;color:#4ade80;font-size:18px;font-weight:800;font-family:ui-monospace,monospace;text-align:right;border-radius:7px;outline:none}
.ship-box input:focus{border-color:var(--green);background:#1a1d27}
.ship-diff{text-align:right;margin-top:6px;font-size:12px;font-weight:700;min-height:16px}

/* 불량유형 */
.rpt-defect-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rpt-def-item{display:flex;flex-direction:column;gap:4px;padding:8px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid rgba(239,68,68,.3);min-width:0;overflow:hidden}
.rpt-def-item .rdi-lb{font-size:11px;color:var(--txt);font-weight:600;line-height:1.3;white-space:normal;word-break:keep-all;min-height:28px;display:flex;align-items:center}
.rpt-def-item input{padding:7px 8px;border:1px solid var(--border);background:#0f1117;color:#fca5a5;font-size:15px;font-weight:700;font-family:ui-monospace,monospace;text-align:right;border-radius:5px;outline:none;width:100%;min-width:0;box-sizing:border-box}
.rpt-def-item input:focus{border-color:var(--red);background:#1a1d27}
.rpt-def-total{margin-top:8px;padding-top:8px;border-top:1px dashed rgba(239,68,68,.3);text-align:right;font-size:12px;color:var(--sub);font-weight:700}
.rpt-def-total b{color:#fca5a5;font-size:15px;font-weight:800;margin-left:6px}

/* 조건관리 */
.rpt-cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rpt-cond-item{display:flex;flex-direction:column;gap:4px;padding:8px;background:rgba(255,255,255,.03);border-radius:6px;min-width:0;overflow:hidden}
.rpt-cond-item .rci-lb{font-size:11px;color:var(--txt);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rpt-cond-item input{padding:8px;border:1px solid var(--border);background:#0f1117;color:var(--accent);font-size:15px;font-weight:700;font-family:ui-monospace,monospace;text-align:right;border-radius:5px;outline:none;width:100%;min-width:0;box-sizing:border-box}
.rpt-cond-item input:focus{border-color:var(--accent);background:#1a1d27}

/* 특기사항 */
.rpt-note{width:100%;min-height:80px;padding:10px 12px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:13px;border-radius:6px;font-family:inherit;resize:vertical;outline:none}
.rpt-note:focus{border-color:var(--accent);background:#1a1d27}

/* 액션 버튼 */
.actions{position:sticky;bottom:0;padding:12px;background:linear-gradient(180deg,transparent,var(--bg) 20%);display:flex;gap:8px;margin:0 -14px -20px}
.actions .btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-save{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn-excel{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.btn-cancel{background:#475569;color:#fff;flex:0 0 80px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}

.empty-state{text-align:center;padding:40px 20px;color:var(--sub)}
.empty-state .es-ic{font-size:48px;margin-bottom:10px}
.empty-state .es-tt{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.empty-state .es-sb{font-size:12px;color:var(--sub)}

/* 오늘 작업한 기종 리스트 */
.rpt-prod-list{display:flex;flex-direction:column;gap:6px}
.rpt-prod-item{display:grid;grid-template-columns:minmax(0,1fr) 65px 75px;gap:6px;align-items:center;padding:8px;background:rgba(0,0,0,.25);border-radius:6px;border-left:3px solid transparent;overflow:hidden}
.rpt-prod-item.cur{border-left-color:var(--green);background:rgba(34,197,94,.08)}
.rpt-prod-item .rpi-nm{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rpt-prod-item .rpi-sub{font-size:10px;color:var(--sub);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rpt-prod-item .rpi-mes{font-size:13px;font-weight:800;color:var(--green);text-align:right;font-variant-numeric:tabular-nums;min-width:0;overflow:hidden}
.rpt-prod-item .rpi-adj{position:relative;min-width:0}
.rpt-prod-item .rpi-adj input{width:100%;padding:6px 4px;border:1px solid rgba(56,189,248,.4);background:#0f1117;color:#fbbf24;font-size:13px;font-weight:800;font-family:ui-monospace,monospace;text-align:right;border-radius:4px;outline:none;box-sizing:border-box;min-width:0}
.rpt-prod-item .rpi-adj input::placeholder{color:#475569;font-weight:500;font-size:10px}
.rpt-prod-item .rpi-adj input.diff-pos{color:#4ade80;border-color:rgba(34,197,94,.5)}
.rpt-prod-item .rpi-adj input.diff-neg{color:#fca5a5;border-color:rgba(239,68,68,.5)}
.rpt-prod-head{display:grid;grid-template-columns:minmax(0,1fr) 65px 75px;gap:6px;padding:4px 8px;font-size:10px;color:var(--sub);font-weight:700;border-bottom:1px solid var(--border);margin-bottom:4px}
.rpt-prod-head .ph-r{text-align:right}
.rpt-prod-head .ph-c{text-align:center}
.rpt-prod-foot{margin-top:6px;padding:8px 10px;background:rgba(34,197,94,.08);border-radius:6px;display:flex;justify-content:space-between;font-size:12px;font-weight:700}

.loading{text-align:center;padding:40px;color:var(--accent);font-size:13px}

/* 숫자패드 모달 */
.numpad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:20000;align-items:center;justify-content:center;padding:12px}
.numpad-overlay.show{display:flex}
.numpad-box{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.numpad-hdr{padding:12px 16px;background:linear-gradient(135deg,#1e3a5f,#0f172a);border-bottom:1px solid var(--border)}
.numpad-label{font-size:12px;color:var(--sub);font-weight:600;margin-bottom:4px}
.numpad-display{background:#0f1117;border:2px solid var(--accent);border-radius:8px;padding:14px 16px;font-size:28px;font-weight:800;font-family:ui-monospace,monospace;text-align:right;color:var(--accent);min-height:58px;word-break:break-all}
.numpad-display.neg{color:var(--red);border-color:var(--red)}
.numpad-hint{font-size:11px;color:var(--sub);margin-top:6px;text-align:right;min-height:14px}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:12px}
.npd-key{padding:18px 0;border:none;border-radius:10px;background:#0f1117;color:var(--txt);font-size:22px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:background .1s,transform .05s}
.npd-key:active{background:var(--accent);color:#0f172a;transform:scale(.95)}
.npd-key.fn{background:#1e293b;font-size:18px}
.npd-key.fn:active{background:#ef4444;color:#fff}
.npd-key.ok{background:#16a34a;color:#fff;font-size:16px;font-weight:800}
.npd-key.ok:active{background:#22c55e}
.npd-key.neg{background:#7c2d12;color:#fed7aa;font-size:20px}
.npd-key.neg:active{background:#f97316;color:#fff}
.npd-key.clear{background:#1e293b;color:#fca5a5;font-size:14px}
.numpad-foot{padding:0 12px 12px;display:flex;gap:6px}
.numpad-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.numpad-cancel:active{background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class="hdr">
  <button class="back-btn" onclick="history.back()">◀ 뒤로</button>
  <div style="flex:1">
    <h1>📄 프레스 작업일보</h1>
    <div class="sub" id="subInfo">-</div>
  </div>
</div>

<div class="container">
  <!-- 본문 (설비 선택 후 표시) -->
  <div id="reportBody" style="display:none">

    <!-- MES 자동집계 -->
    <div class="rpt-section">
      <div class="rpt-section-title">📊 MES 자동집계 <span id="workDateLabel" style="font-size:11px;color:var(--sub);font-weight:500;margin-left:6px"></span></div>
      <div class="rpt-info-grid" id="mesInfoGrid"></div>
    </div>

    <!-- 오늘 작업한 기종 (WO 이력) -->
    <div class="rpt-section" id="productionBox" style="display:none">
      <div class="rpt-section-title">🏭 오늘 작업한 기종 <span id="prodCount" style="font-size:11px;color:var(--sub);font-weight:500;margin-left:6px"></span></div>
      <div id="productionList" class="rpt-prod-list"></div>
    </div>

    <!-- 양품수량 -->
    <div class="rpt-section">
      <div class="rpt-section-title">✅ 양품수량 (실제 검수)</div>
      <div class="ship-box">
        <input type="text" id="shipQty" placeholder="양품수량 입력" oninput="onShipChange()" readonly>
        <div class="ship-diff" id="shipDiff"></div>
      </div>
    </div>

    <!-- 불량유형 -->
    <div class="rpt-section">
      <div class="rpt-section-title">⚠️ 불량유형별 수량</div>
      <div class="rpt-defect-grid" id="defectGrid"></div>
      <div class="rpt-def-total">불량 합계 <b id="defTotal">0</b></div>
    </div>

    <!-- 조건관리 -->
    <div class="rpt-section">
      <div class="rpt-section-title">🔧 조건관리 (프레스)</div>
      <div class="rpt-cond-grid" id="condGrid"></div>
    </div>

    <!-- 특기사항 -->
    <div class="rpt-section">
      <div class="rpt-section-title">📝 특기사항</div>
      <textarea class="rpt-note" id="noteInput" placeholder="교대인계, 특이사항, 점검내역 등" oninput="onNoteChange()"></textarea>
    </div>

    <!-- 액션 -->
    <div class="actions">
      <button class="btn btn-cancel" onclick="resetForm()">🗑 초기화</button>
      <button class="btn btn-save" onclick="saveReport()">💾 저장·알림</button>
      <button class="btn btn-excel" onclick="exportExcel()">📥 엑셀</button>
    </div>

  </div>

  <!-- 초기 안내 -->
  <div id="emptyState" class="empty-state">
    <div class="es-ic">📄</div>
    <div class="es-tt">설비 정보가 없습니다</div>
    <div class="es-sb">MES 모니터링에서 설비를 클릭 후 "프레스 작업일보 작성" 버튼을 눌러주세요</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 숫자패드 모달 -->
<div class="numpad-overlay" id="numpadOverlay" onclick="if(event.target===this)numpadCancel()">
  <div class="numpad-box">
    <div class="numpad-hdr">
      <div class="numpad-label" id="numpadLabel">숫자 입력</div>
      <div class="numpad-display" id="numpadDisplay">0</div>
      <div class="numpad-hint" id="numpadHint"></div>
    </div>
    <div class="numpad-grid">
      <button class="npd-key" onclick="numpadPress('1')">1</button>
      <button class="npd-key" onclick="numpadPress('2')">2</button>
      <button class="npd-key" onclick="numpadPress('3')">3</button>
      <button class="npd-key" onclick="numpadPress('4')">4</button>
      <button class="npd-key" onclick="numpadPress('5')">5</button>
      <button class="npd-key" onclick="numpadPress('6')">6</button>
      <button class="npd-key" onclick="numpadPress('7')">7</button>
      <button class="npd-key" onclick="numpadPress('8')">8</button>
      <button class="npd-key" onclick="numpadPress('9')">9</button>
      <button class="npd-key fn" onclick="numpadPress('.')" id="npdDot">.</button>
      <button class="npd-key" onclick="numpadPress('0')">0</button>
      <button class="npd-key fn" onclick="numpadBackspace()">⌫</button>
      <button class="npd-key clear" onclick="numpadClear()">CLR</button>
      <button class="npd-key neg" onclick="numpadNegate()" id="npdNeg" style="display:none">±</button>
      <button class="npd-key ok" onclick="numpadOk()">확인</button>
    </div>
    <div class="numpad-foot">
      <button class="numpad-cancel" onclick="numpadCancel()">취소</button>
    </div>
  </div>
</div>

<script>
// ========== 설정 ==========
var SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
var WORK_DAY_START_HOUR=8;

// 현장 양식 불량유형
var DEFECT_TYPES=['시타발초물','초중종검사','원자재불량','기스','찍힘','휨·변형','형상불량','치수·각도','BURR','크랙·터짐','이물·발청','수리중불량','낙하품'];
// 조건관리 필드
var COND_FIELDS=[{id:'dieHeight',name:'다이하이트',unit:'mm'},{id:'feedPitch',name:'이송피치',unit:'mm'}];

// 정지코드 → A~K 매핑
var CODE_TO_GRID={
  'Z011':'A','Z002':'B','Z003':'C','Z004':'D','Z010':'E',
  'A001':'F','A004':'G','M008':'G','A002':'H','M001':'I','Z000':'J'
};

// ========== 상태 ==========
var state={
  machine:null,
  downtime:null,
  productionItems:[],
  report:{shipQty:'',defects:{},conditions:{},note:'',productionAdj:{}}
};

// ========== 숫자패드 ==========
var numpadState={
  value:'',
  targetInput:null,
  label:'',
  allowDecimal:false,
  hintBase:'',
  onConfirm:null
};

function openNumpad(inp,opts){
  opts=opts||{};
  numpadState.targetInput=inp;
  numpadState.value=inp.value||'';
  numpadState.label=opts.label||inp.placeholder||'숫자 입력';
  numpadState.allowDecimal=!!opts.allowDecimal;
  numpadState.hintBase=opts.hint||'';
  numpadState.onConfirm=opts.onConfirm||null;
  document.getElementById('numpadLabel').textContent=numpadState.label;
  document.getElementById('npdDot').style.display=numpadState.allowDecimal?'':'none';
  updateNumpadDisplay();
  document.getElementById('numpadOverlay').classList.add('show');
}

function updateNumpadDisplay(){
  var disp=document.getElementById('numpadDisplay');
  var v=numpadState.value;
  if(!v){disp.textContent='0';disp.classList.remove('neg')}
  else{
    // 천단위 구분 표시 (숫자 부분만)
    var neg=v.charAt(0)==='-';
    var s=neg?v.slice(1):v;
    var parts=s.split('.');
    var intPart=parts[0]||'0';
    var formatted=intPart.replace(/\B(?=(\d{3})+(?!\d))/g,',');
    if(parts.length>1)formatted+='.'+parts[1];
    disp.textContent=(neg?'-':'')+formatted;
    disp.classList.toggle('neg',neg);
  }
  // 힌트 업데이트 (MES 대비 차이 등)
  var hint=document.getElementById('numpadHint');
  if(numpadState.hintBase){
    var n=+v||0;
    var base=+numpadState.hintBase||0;
    if(v&&base>0){
      var diff=n-base;
      if(diff===0)hint.innerHTML='<span style="color:var(--green)">MES와 일치</span>';
      else hint.innerHTML='<span style="color:'+(diff>0?'#86efac':'#fca5a5')+'">MES '+base.toLocaleString()+' 대비 '+(diff>0?'+':'')+diff.toLocaleString()+'</span>';
    }else hint.textContent='MES 기준 '+base.toLocaleString();
  }else hint.textContent='';
}

function numpadPress(k){
  if(k==='.'){
    if(!numpadState.allowDecimal)return;
    if(numpadState.value.indexOf('.')>=0)return;
    if(!numpadState.value||numpadState.value==='-')numpadState.value+='0';
    numpadState.value+='.';
  }else{
    // 0 앞에 숫자 추가시 0 제거
    if(numpadState.value==='0'||numpadState.value==='-0')numpadState.value=numpadState.value.replace('0','');
    numpadState.value+=k;
  }
  updateNumpadDisplay();
}

function numpadBackspace(){
  numpadState.value=numpadState.value.slice(0,-1);
  updateNumpadDisplay();
}

function numpadClear(){
  numpadState.value='';
  updateNumpadDisplay();
}

function numpadNegate(){
  if(numpadState.value.charAt(0)==='-')numpadState.value=numpadState.value.slice(1);
  else if(numpadState.value)numpadState.value='-'+numpadState.value;
  updateNumpadDisplay();
}

function numpadOk(){
  var v=numpadState.value;
  // 끝이 점이면 제거
  if(v.slice(-1)==='.')v=v.slice(0,-1);
  if(v==='-')v='';
  if(numpadState.targetInput){
    numpadState.targetInput.value=v;
    // input 이벤트 발생시켜 onInput/onChange 핸들러 실행
    numpadState.targetInput.dispatchEvent(new Event('input',{bubbles:true}));
  }
  if(typeof numpadState.onConfirm==='function')numpadState.onConfirm(v);
  numpadCancel();
}

function numpadCancel(){
  document.getElementById('numpadOverlay').classList.remove('show');
  numpadState.targetInput=null;
  numpadState.value='';
}

// 숫자 input에 포커스시 numpad 열기 (readonly로 네이티브 키보드 방지)
function attachNumpadTo(inp,opts){
  if(!inp)return;
  inp.readOnly=true;
  inp.style.caretColor='transparent';
  inp.addEventListener('click',function(e){
    e.preventDefault();
    inp.blur();
    openNumpad(inp,opts||{});
  });
  inp.addEventListener('focus',function(e){inp.blur()});
}

var sbH={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(t,q){var r=await fetch(SB_URL+'/rest/v1/'+t+'?'+(q||''),{headers:sbH});return r.ok?r.json():null}
async function sbPost(t,d){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},sbH,{'Prefer':'return=minimal'}),body:JSON.stringify(d)})}

// ========== 유틸 ==========
var toastT;
function showToast(m,ms){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show')},ms||2500)}
function fmtMinutes(min){if(min==null||isNaN(min))return'-';min=Math.round(min);if(min<60)return min+'분';var h=Math.floor(min/60),m=min%60;return h+'h'+(m>0?String(m).padStart(2,'0')+'m':'')}
function getWorkDate(){var now=new Date();if(now.getHours()<WORK_DAY_START_HOUR){now.setDate(now.getDate()-1)}return now}
function fmtYmd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// ========== 설비 데이터 로드 ==========
async function loadMachine(mcParam){
  var mc=mcParam||'';
  if(!mc){showToast('설비코드가 없습니다');return}
  document.getElementById('emptyState').innerHTML='<div class="loading">⏳ MES 데이터 조회중...</div>';
  document.getElementById('emptyState').style.display='';
  document.getElementById('reportBody').style.display='none';
  try{
    // 1. machine_status 조회
    var msList=await sbGet('machine_status','select=*&machine_code=eq.'+mc+'&limit=1');
    if(!msList||!msList.length){showToast('설비 데이터 없음');document.getElementById('emptyState').innerHTML='<div class="es-ic">⚠️</div><div class="es-tt">설비 데이터 없음</div>';return}
    state.machine=msList[0];
    // 2. 업무일 비가동 요약 조회
    var workDate=getWorkDate();
    var ymd=fmtYmd(workDate);
    var dtList=await sbGet('daily_downtime','select=*&ymd=eq.'+ymd+'&machine_code=eq.'+mc+'&limit=1');
    state.downtime=(dtList&&dtList.length)?dtList[0]:null;
    // 2-1. 오늘 작업한 기종 조회 (Oracle API - 설비별 WO/금형/품번별 실적)
    state.productionItems=[];
    try{
      var prodRes=await fetch('/api/mes/production_today?machine_code='+encodeURIComponent(mc));
      if(prodRes.ok){
        var prodData=await prodRes.json();
        if(prodData&&prodData.items){state.productionItems=prodData.items}
      }
    }catch(e){console.log('생산실적 조회실패(무시):',e)}
    // fallback: 현재 설비 정보만이라도
    if(!state.productionItems.length&&state.machine.current_item_code){
      state.productionItems=[{
        item_code:state.machine.current_item_code,
        item_name:state.machine.item_name||'',
        mold:state.machine.current_mold||'',
        work_order:state.machine.work_order_no||'',
        actual_qty:+state.machine.actual_qty||0,
        target_qty:+state.machine.target_qty||0,
        run_min:null,
        is_current:true
      }];
    }
    // 3. 오늘 이미 저장된 작업일보 있는지 확인 (있으면 복원)
    var today=fmtYmd(new Date());
    var existList=await sbGet('mes_check_log','select=*&machine_code=eq.'+mc+'&category=eq.report&created_at=gte.'+today+'T00:00:00&order=created_at.desc&limit=1');
    initReport();
    if(existList&&existList.length&&existList[0].payload&&existList[0].payload.report_snapshot){
      var rs=existList[0].payload.report_snapshot;
      state.report.shipQty=rs.shipQty||'';
      if(rs.defects)Object.keys(rs.defects).forEach(function(k){state.report.defects[k]=rs.defects[k]||''});
      if(rs.conditions)Object.keys(rs.conditions).forEach(function(k){state.report.conditions[k]=rs.conditions[k]||''});
      state.report.note=rs.note||'';
      // 생산기종 보정값 복원
      if(rs.productionAdj)state.report.productionAdj=Object.assign({},rs.productionAdj);
      state.editId=existList[0].id;
      showToast('📋 오늘 작성된 일보 불러옴 (수정모드)',3000);
    }else{
      state.editId=null;
    }
    renderAll();
    document.getElementById('emptyState').style.display='none';
    document.getElementById('reportBody').style.display='';
    document.getElementById('subInfo').textContent=parsePressLabel(state.machine)+' · '+(state.machine.customer||'')+' · '+(state.machine.current_item_code||'-')+(state.machine.current_mold?' · 금형'+state.machine.current_mold:'');
  }catch(e){
    console.log(e);
    showToast('❌ 조회실패: '+e.message);
    document.getElementById('emptyState').innerHTML='<div class="es-ic">❌</div><div class="es-tt">조회실패</div>';
  }
}

// 설비 표시 파싱: machine_code='001', machine_name='36_300' → "36호기 · 국일 300톤"
function parsePressLabel(m){
  var makerMap={
    '36':'국일','37':'국일','38':'국일','39':'국일',
    '46':'국일','47':'국일','48':'국일','49':'국일',
    '06':'심팩','11':'심팩','12':'심팩','13':'심팩',
    '21':'현대','22':'현대','23':'현대'
  };
  var name=(m.machine_name||'').trim();
  var hoCode='',ton='';
  // '36_300' → ho=36, ton=300
  var mt=name.match(/^(\d{1,3})[_\-\s](\d{2,4})/);
  if(mt){hoCode=mt[1];ton=mt[2]}
  else{
    // '36호기' or '36' 단독
    var mh=name.match(/^(\d{1,3})/);
    if(mh)hoCode=mh[1];
  }
  var maker=makerMap[hoCode]||'';
  var parts=[];
  if(hoCode)parts.push(hoCode+'호기');
  if(maker)parts.push(maker);
  if(ton)parts.push(ton+'톤');
  if(!parts.length)return name||(m.machine_code||'-');
  return parts.join(' · ');
}

function renderAll(){
  var m=state.machine,ds=state.downtime;
  var workDate=getWorkDate();
  var wd=(workDate.getMonth()+1)+'/'+workDate.getDate()+' 08시~';
  document.getElementById('workDateLabel').textContent='('+wd+' 업무일)';
  // 오늘 작업한 기종 렌더 (먼저)
  renderProductionItems();
  // MES 정보
  var mesQty=+m.actual_qty||0,tgtQty=+m.target_qty||0;
  var pressLabel=parsePressLabel(m);
  // SPM/CT 표시 (실측값 우선, 없으면 목표값에 '목표' 표시)
  var actCt=+m.actual_ct||0, tgtCt=+m.target_ct||0;
  var ctVal=actCt>0?actCt:tgtCt;
  var isActual=actCt>0;
  var spmCtLabel='-';
  if(ctVal>0){
    var spm=(60/ctVal).toFixed(1);
    var ctStr=ctVal.toFixed(2)+'s';
    spmCtLabel='<span style="color:'+(isActual?'var(--green)':'#fbbf24')+'">'+spm+' SPM</span>'+
      ' <span style="color:var(--sub);font-size:11px;font-weight:500">('+ctStr+(isActual?'':' · 목표')+')</span>';
  }
  var grid='<div class="full"><span class="rig-lb">설비</span><span class="rig-vl">'+pressLabel+'</span></div>'+
    '<div class="full"><span class="rig-lb">품번</span><span class="rig-vl" title="'+(m.current_item_code||'')+'">'+(m.current_item_code||'-')+'</span></div>'+
    '<div><span class="rig-lb">금형</span><span class="rig-vl">'+(m.current_mold||'-')+'</span></div>'+
    '<div><span class="rig-lb">작업자</span><span class="rig-vl">'+(m.worker||'-')+'</span></div>'+
    '<div class="full"><span class="rig-lb">속도</span><span class="rig-vl">'+spmCtLabel+'</span></div>'+
    '<div><span class="rig-lb">목표</span><span class="rig-vl" style="color:var(--accent)">'+tgtQty.toLocaleString()+'</span></div>'+
    '<div><span class="rig-lb">MES실적</span><span class="rig-vl" style="color:var(--green)">'+mesQty.toLocaleString()+'</span></div>'+
    '<div class="full"><span class="rig-lb">원자재</span><span class="rig-vl">'+(m.raw_item_code||'-')+'</span></div>';
  if(ds){
    grid+='<div><span class="rig-lb">가동</span><span class="rig-vl" style="color:var(--green)">'+fmtMinutes(ds.run_min||0)+'</span></div>'+
      '<div><span class="rig-lb">비가동</span><span class="rig-vl" style="color:var(--red)">'+fmtMinutes(ds.stop_min||0)+'</span></div>'+
      '<div><span class="rig-lb">계획정지</span><span class="rig-vl" style="color:#c4b5fd">'+fmtMinutes(ds.planned_min||0)+'</span></div>'+
      '<div><span class="rig-lb">가동률</span><span class="rig-vl" style="color:var(--accent)">'+(+ds.rate||0).toFixed(1)+'%</span></div>';
  }
  document.getElementById('mesInfoGrid').innerHTML=grid;
  // 양품수량
  var shipInp=document.getElementById('shipQty');
  shipInp.value=state.report.shipQty||'';
  onShipChange();
  // 숫자패드 연결
  attachNumpadTo(shipInp,{
    label:'양품수량 입력',
    allowDecimal:false,
    hint:+state.machine.actual_qty||0
  });
  // 불량유형
  var defGrid='';
  DEFECT_TYPES.forEach(function(t){
    var v=state.report.defects[t]||'';
    defGrid+='<div class="rpt-def-item"><div class="rdi-lb" title="'+t+'">'+t+'</div>'+
      '<input type="text" readonly value="'+v+'" placeholder="0" data-def="'+t+'" onchange="onDefChange(this)" oninput="onDefChange(this)"></div>';
  });
  document.getElementById('defectGrid').innerHTML=defGrid;
  // 불량 input에 numpad 연결
  document.querySelectorAll('#defectGrid input').forEach(function(inp){
    var label=inp.dataset.def;
    attachNumpadTo(inp,{label:'불량수량 · '+label,allowDecimal:false});
  });
  updateDefTotal();
  // 조건관리
  var condGrid='';
  COND_FIELDS.forEach(function(f){

    condGrid+='<div class="rpt-cond-item"><div class="rci-lb">'+f.name+' ('+f.unit+')</div>'+

  });

// ========== 입력 이벤트 ==========
function onShipChange(){
  var v=document.getElementById('shipQty').value;
  state.report.shipQty=v;
  var adj=+v||0,mes=+state.machine.actual_qty||0,diff=adj-mes;
  var d=document.getElementById('shipDiff');
  if(!v)d.innerHTML='';
  else if(diff===0)d.innerHTML='<span style="color:var(--green)">✓ MES와 일치</span>';
  else d.innerHTML='<span style="color:'+(diff>0?'#86efac':'#fca5a5')+'">MES '+mes.toLocaleString()+' 대비 '+(diff>0?'+':'')+diff+' ('+(mes>0?(diff/mes*100).toFixed(1):'0')+'%)</span>';
}
function onDefChange(inp){
  state.report.defects[inp.dataset.def]=inp.value;
  updateDefTotal();
}
function onCondChange(inp){
  state.report.conditions[inp.dataset.cond]=inp.value;
}
function onNoteChange(){
  state.report.note=document.getElementById('noteInput').value;
}

// 오늘 작업한 기종별 MES수량 + 실제 보정수량 렌더
function renderProductionItems(){
  var box=document.getElementById('productionBox');
  var list=document.getElementById('productionList');
  var items=state.productionItems||[];
  if(!items.length){
    box.style.display='none';
    return;
  }
  box.style.display='';
  document.getElementById('prodCount').textContent='('+items.length+'건)';
  var html='<div class="rpt-prod-head"><div>품번 (금형/시간)</div><div class="ph-r">MES</div><div class="ph-c">실제</div></div>';
  var totMes=0;
  items.forEach(function(it,idx){
    var mold=it.mold||'';
    var itemCode=it.item_code||'-';
    var itemName=it.item_name||'';
    var runTxt=it.run_min!=null?fmtMinutes(it.run_min):'';
    var timeTxt=(it.start&&it.end)?(it.start+'~'+it.end):'';
    var subParts=[];
    if(mold)subParts.push('🎭'+mold);
    if(runTxt)subParts.push('⏱'+runTxt);
    if(timeTxt)subParts.push(timeTxt);
    var subTxt=subParts.join(' · ');
    var mesQty=+it.actual_qty||0;
    totMes+=mesQty;
    // productionAdj에 저장된 값 복원
    var key=(it.work_order||'')+'|'+(it.mold||'')+'|'+(it.item_code||'');
    var adjVal=state.report.productionAdj[key];
    if(adjVal==null)adjVal='';
    var cls='rpt-prod-item'+(it.is_current?' cur':'');
    html+='<div class="'+cls+'">'+
      '<div><div class="rpi-nm">'+itemCode+(itemName?' <span style="color:var(--sub);font-weight:400">'+itemName+'</span>':'')+'</div>'+
      (subTxt?'<div class="rpi-sub">'+subTxt+'</div>':'')+'</div>'+
      '<div class="rpi-mes">'+mesQty.toLocaleString()+'</div>'+
      '<div class="rpi-adj">'+
        '<input type="text" readonly value="'+adjVal+'" placeholder="입력" data-key="'+key+'" data-mes="'+mesQty+'" data-idx="'+idx+'" onchange="onProdAdjChange(this)" oninput="onProdAdjChange(this)">'+
      '</div>'+
      '</div>';
  });
  // 합계
  var totAdj=0;
  Object.keys(state.report.productionAdj).forEach(function(k){totAdj+=+state.report.productionAdj[k]||0});
  html+='<div class="rpt-prod-foot"><span style="color:var(--sub)">합계</span>'+
    '<span>MES <b style="color:var(--green)">'+totMes.toLocaleString()+'</b> · 실제 <b id="prodAdjTotal" style="color:#fbbf24">'+(totAdj||0).toLocaleString()+'</b></span></div>';
  list.innerHTML=html;
  // 숫자패드 연결
  document.querySelectorAll('#productionList input').forEach(function(inp){
    attachNumpadTo(inp,{
      label:'실제 수량 입력',
      allowDecimal:false,
      hintFn:function(e){return +e.dataset.mes||0}
    });
  });
}

function onProdAdjChange(inp){
  var key=inp.dataset.key;
  var mes=+inp.dataset.mes||0;
  var raw=inp.value.trim();
  state.report.productionAdj[key]=raw;
  // 테두리 색상
  var adj=+raw||0;
  var diff=adj-mes;
  inp.classList.remove('diff-pos','diff-neg');
  if(raw){
    if(diff>0)inp.classList.add('diff-pos');
    else if(diff<0)inp.classList.add('diff-neg');
  }
  // 합계 업데이트
  var tot=0;
  Object.keys(state.report.productionAdj).forEach(function(k){tot+=+state.report.productionAdj[k]||0});
  var el=document.getElementById('prodAdjTotal');
  if(el)el.textContent=tot.toLocaleString();
}

function updateDefTotal(){
  var sum=0;
  Object.keys(state.report.defects).forEach(function(k){sum+=+state.report.defects[k]||0});
  document.getElementById('defTotal').textContent=sum.toLocaleString();
}

// ========== 저장 ==========
async function saveReport(){
  if(!state.machine){showToast('설비 선택 필요');return}
  var rpt=state.report;
  var hasShip=!!rpt.shipQty;
  var hasDef=Object.keys(rpt.defects).some(function(k){return +rpt.defects[k]>0});
  var hasCond=Object.keys(rpt.conditions).some(function(k){return rpt.conditions[k]});
  var hasNote=!!(rpt.note||'').trim();
  var hasProd=Object.keys(rpt.productionAdj||{}).some(function(k){return rpt.productionAdj[k]!==''&&rpt.productionAdj[k]!=null});
  if(!hasShip&&!hasDef&&!hasCond&&!hasNote&&!hasProd){showToast('입력내용이 없습니다');return}
  var m=state.machine;
  var now=new Date();
  var record={
    machine_code:m.machine_code,
    machine_name:m.machine_name||'',
    customer:m.customer||'',
    item_code:m.current_item_code||'',
    item_name:m.item_name||'',
    mold:m.current_mold||'',
    worker:m.worker||'',
    category:'report',
    category_name:'작업일보',
    report_snapshot:{
      shipQty:+rpt.shipQty||0,
      defects:Object.assign({},rpt.defects),
      conditions:Object.assign({},rpt.conditions),
      note:rpt.note||'',
      productionAdj:Object.assign({},rpt.productionAdj||{}),
      productionItems:(state.productionItems||[]).map(function(it){
        var key=(it.work_order||'')+'|'+(it.mold||'')+'|'+(it.item_code||'');
        var adjV=rpt.productionAdj?rpt.productionAdj[key]:'';
        return{
          work_order:it.work_order||'',
          item_code:it.item_code||'',
          item_name:it.item_name||'',
          mold:it.mold||'',
          mes_qty:+it.actual_qty||0,
          adj_qty:adjV?(+adjV||0):null,
          run_min:it.run_min,
          is_current:!!it.is_current
        };
      })
    },
    downtime_snapshot:state.downtime?{
      runMin:state.downtime.run_min||0,
      stopMin:state.downtime.stop_min||0,
      plannedMin:state.downtime.planned_min||0,
      rate:state.downtime.rate||0
    }:null,
    created_at:now.toISOString()
  };
  try{
    if(state.editId){
      // 수정
      await fetch(SB_URL+'/rest/v1/mes_check_log?id=eq.'+state.editId,{
        method:'PATCH',
        headers:Object.assign({},sbH,{'Prefer':'return=minimal'}),
        body:JSON.stringify({payload:record})
      });
      showToast('✅ 작업일보 수정됨');
    }else{
      // 신규
      await sbPost('mes_check_log',{
        machine_code:record.machine_code,machine_name:record.machine_name,
        customer:record.customer,item_code:record.item_code,
        item_name:record.item_name,category:'report',
        payload:record,created_at:record.created_at
      });
      showToast('✅ 작업일보 저장됨');
    }
    // 알림 발송
    await sendReportAlert(record);
  }catch(e){
    console.log(e);
    showToast('❌ 저장실패');
  }
}

async function sendReportAlert(record){
  var msg='📄 [작업일보] '+record.machine_code+' '+record.machine_name+'\n';
  msg+='고객:'+record.customer+' │ 품번:'+record.item_code+'\n';
  var rs=record.report_snapshot;
  var mesQty=+state.machine.actual_qty||0;
  if(rs.shipQty){
    var diff=rs.shipQty-mesQty;
    var dt=diff===0?'':(' ('+(diff>0?'+':'')+diff+')');
    msg+='✅ 양품: '+rs.shipQty.toLocaleString()+' (MES '+mesQty.toLocaleString()+dt+')\n';
  }
  // 기종별 수량 (MES vs 실제)
  if(rs.productionItems&&rs.productionItems.length){
    var prodLines=[];
    rs.productionItems.forEach(function(it){
      if(it.adj_qty==null)return;
      var di=it.adj_qty-it.mes_qty;
      var dts=di===0?'':(' ('+(di>0?'+':'')+di+')');
      prodLines.push('  • '+(it.item_code||'-')+(it.mold?'['+it.mold+']':'')+': MES '+it.mes_qty.toLocaleString()+' → 실제 '+it.adj_qty.toLocaleString()+dts);
    });
    if(prodLines.length){msg+='🏭 기종별 실적:\n'+prodLines.join('\n')+'\n'}
  }
  var defSum=0,defList=[];
  Object.keys(rs.defects||{}).forEach(function(k){
    var v=+rs.defects[k]||0;
    if(v>0){defSum+=v;defList.push(k+' '+v)}
  });
  if(defSum>0){
    msg+='⚠️ 불량 '+defSum.toLocaleString()+': '+defList.slice(0,5).join(', ');
    if(defList.length>5)msg+=' 외';
    msg+='\n';
  }
  var cond=[];
  if(rs.conditions.dieHeight)cond.push('다이'+rs.conditions.dieHeight);
  if(rs.conditions.feedPitch)cond.push('피치'+rs.conditions.feedPitch);
  if(state.machine.actual_ct>0)cond.push('SPM'+(60/state.machine.actual_ct).toFixed(1));
  if(cond.length)msg+='🔧 '+cond.join(' / ')+'\n';
  if(rs.note)msg+='📝 '+rs.note+'\n';
  msg+='⏱ '+new Date().toLocaleString('ko-KR');

  // ntfy/텔레그램 규칙 조회 (Supabase common_code)
  try{
    // chk_report, chk_all 규칙 모두 대상
    var keys=['chk_report','chk_all'];
    // ntfy
    var nfRules=await sbGet('common_code','select=code_value&code_group=eq.mes_chk_ntfy&limit=1');
    if(nfRules&&nfRules.length&&nfRules[0].code_value){
      try{
        var arr=JSON.parse(nfRules[0].code_value);
        for(var i=0;i<arr.length;i++){
          if(keys.indexOf(String(arr[i].cond))<0)continue;
          await fetch('https://ntfy.sh/'+arr[i].room,{method:'POST',headers:{'Title':'작업일보','Tags':'clipboard'},body:msg});
        }
      }catch(e){}
    }
    // 텔레그램
    var tgRules=await sbGet('common_code','select=code_value&code_group=eq.mes_chk_tg&limit=1');
    if(tgRules&&tgRules.length&&tgRules[0].code_value){
      try{
        var arr=JSON.parse(tgRules[0].code_value);
        var BOT='8367539669:AAFzZeMULV8B4adNROtENsUc6wr0MvLpSi0';
        for(var i=0;i<arr.length;i++){
          if(keys.indexOf(String(arr[i].cond))<0)continue;
          await fetch('https://api.telegram.org/bot'+BOT+'/sendMessage',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({chat_id:arr[i].chatId,text:msg})
          });
        }
      }catch(e){}
    }
  }catch(e){console.log('알림실패:',e)}
}

async function exportExcel(){
  if(typeof ExcelJS==='undefined'||typeof saveAs==='undefined'){showToast('엑셀 라이브러리 로딩중');return}
  if(!state.machine){showToast('설비 선택 필요');return}
  var m=state.machine,rpt=state.report,ds=state.downtime||{};
  var now=new Date(),workDate=getWorkDate();
  showToast('⏳ 엑셀 생성중...');

  var wb=new ExcelJS.Workbook();
  wb.creator='ESG MES';wb.created=now;
  var ws=wb.addWorksheet('프레스작업일보',{pageSetup:{orientation:'landscape',paperSize:9,fitToPage:true,fitToWidth:1,fitToHeight:1}});
  ws.columns=[{width:5},{width:14},{width:28},{width:9},{width:10},{width:11},{width:12},{width:12},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6},{width:6}];

  // 제목
  ws.mergeCells('A1:K1');
  ws.getCell('A1').value='프레스 작업일보';
  ws.getCell('A1').font={size:22,bold:true};
  ws.getCell('A1').alignment={vertical:'middle',horizontal:'left'};
  ws.getRow(1).height=34;
  ws.mergeCells('L1:M1');
  ws.getCell('L1').value='작업일: '+(workDate.getFullYear()+'년 '+(workDate.getMonth()+1)+'월 '+workDate.getDate()+'일 '+['일','월','화','수','목','금','토'][workDate.getDay()]+'요일');
  ws.getCell('L1').font={size:10,bold:true};
  ws.mergeCells('N1:T1');
  ws.getCell('N1').value='작업자: '+(m.worker||'');
  ws.getCell('N1').font={size:10,bold:true};

  // 테이블 헤더
  var hr=3;
  ws.getRow(hr).values=['순','설비명(호기)','품명 / 품번','SPM','공정명','근무시간','일일목표수량','양품수량','계획정지시간(분)','','','','','','비가동시간(분)','','','','',''];
  ws.mergeCells('I3:N3');ws.mergeCells('O3:T3');
  ws.getRow(hr+1).values=['','','','','','480분 / 120분','','','A','B','C','D','E','','F','G','H','I','J','K'];
  ws.mergeCells('A3:A4');ws.mergeCells('B3:B4');ws.mergeCells('C3:C4');ws.mergeCells('D3:D4');ws.mergeCells('E3:E4');
  ws.mergeCells('G3:G4');ws.mergeCells('H3:H4');ws.mergeCells('N3:N4');ws.mergeCells('T3:T4');
  [hr,hr+1].forEach(function(r){
    var row=ws.getRow(r);row.height=22;
    row.eachCell({includeEmpty:true},function(cell){
      cell.font={bold:true,size:10};
      cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE7E7E7'}};
      cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
    });
  });

  // 데이터 행
  var dr=hr+2;
  var mesQty=+m.actual_qty||0,shipQty=+rpt.shipQty||0;
  var actCt=+m.actual_ct||0,tgtCt=+m.target_ct||0;
  var ctVal=actCt>0?actCt:tgtCt;
  var spmText='';
  if(ctVal>0){
    var spmV=(60/ctVal).toFixed(1);
    spmText=spmV+' SPM\n('+ctVal.toFixed(2)+'s'+(actCt>0?'':' 목표')+')';
  }
  ws.getRow(dr).values=[
    1,
    parsePressLabel(m),
    (m.item_name||'')+'\n'+(m.current_item_code||''),
    spmText,'P/R',
    '08:00~19:00\n'+(ds.run_min?fmtMinutes(ds.run_min)+' / '+fmtMinutes(ds.planned_min||0):''),
    (+m.target_qty||0).toLocaleString(),
    shipQty?shipQty.toLocaleString():'',
    '','','','','','',
    '','','','','',''
  ];
  ws.getRow(dr).height=46;
  ws.getRow(dr).eachCell({includeEmpty:true},function(cell){
    cell.font={size:10};
    cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};
    cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  });
  ws.getCell('H'+dr).font={size:11,bold:true,color:{argb:'FF16A34A'}};

  // 계획정지/비가동 매핑
  var plannedMap={A:0,B:0,C:0,D:0,E:0};
  var unplanMap={F:0,G:0,H:0,I:0,J:0,K:0};
  var allEvents=[].concat(ds.planned_events||[],ds.stop_events||[]);
  allEvents.forEach(function(ev){
    var code=(ev.code||'').split('-')[1]||'';
    var g=CODE_TO_GRID[code];
    if(g&&plannedMap.hasOwnProperty(g))plannedMap[g]+=(+ev.min||0);
    else if(g&&unplanMap.hasOwnProperty(g))unplanMap[g]+=(+ev.min||0);
    else if(ev.code)unplanMap.K+=(+ev.min||0);
  });
  ['A','B','C','D','E'].forEach(function(k,i){
    var col=String.fromCharCode(73+i);
    ws.getCell(col+dr).value=plannedMap[k]||'';
  });
  ['F','G','H','I','J','K'].forEach(function(k,i){
    var col=String.fromCharCode(79+i);
    ws.getCell(col+dr).value=unplanMap[k]||'';
  });

  // 특기사항
  var sr=dr+2;
  ws.mergeCells('A'+sr+':B'+sr);
  ws.getCell('A'+sr).value='■ 특기사항';
  ws.getCell('A'+sr).font={bold:true,size:11};
  ws.getCell('A'+sr).alignment={vertical:'middle',horizontal:'left'};
  ws.mergeCells('C'+sr+':T'+(sr+2));
  ws.getCell('C'+sr).value=rpt.note||'';
  ws.getCell('C'+sr).alignment={vertical:'top',horizontal:'left',wrapText:true};
  ws.getCell('C'+sr).font={size:10};
  for(var r=sr;r<=sr+2;r++){for(var col=1;col<=20;col++){ws.getCell(r,col).border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}}}}

  // 범례
  var lr=sr+4;
  ws.mergeCells('A'+lr+':T'+lr);
  ws.getCell('A'+lr).value='■ 계획정지시간 : A.조회및교육  B.3정5행활동  C.Try-Out(샘플)  D.측정대기  E.타공정지원';
  ws.getCell('A'+lr).font={bold:true,size:10,color:{argb:'FF1E40AF'}};
  ws.mergeCells('A'+(lr+1)+':T'+(lr+1));
  ws.getCell('A'+(lr+1)).value='■ 비가동 시간 : F.금형세팅및교환  G.금형수리및수정  H.설비이상(주변장치포함)  I.소재교환  J.불량발생및처리  K.기타(대기)';
  ws.getCell('A'+(lr+1)).font={bold:true,size:10,color:{argb:'FFDC2626'}};

  // 불량유형
  var dr2=lr+3;
  ws.mergeCells('A'+dr2+':B'+dr2);
  ws.getCell('A'+dr2).value='■ 불량현황';
  ws.getCell('A'+dr2).font={bold:true,size:11};
  var dhr=dr2+1;
  var defHdr=['순'].concat(DEFECT_TYPES).concat(['합계']);
  ws.getRow(dhr).values=defHdr;
  ws.getRow(dhr).height=36;
  ws.getRow(dhr).eachCell({includeEmpty:true},function(cell){
    cell.font={bold:true,size:9};
    cell.alignment={vertical:'middle',horizontal:'center',wrapText:true};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFEE2E2'}};
    cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  });
  var ddr=dhr+1;
  var defRow=[1],defSum=0;
  DEFECT_TYPES.forEach(function(t){var v=+rpt.defects[t]||0;defRow.push(v||'');defSum+=v});
  defRow.push(defSum||'');
  ws.getRow(ddr).values=defRow;
  ws.getRow(ddr).height=24;
  ws.getRow(ddr).eachCell({includeEmpty:true},function(cell){
    cell.font={size:10};
    cell.alignment={vertical:'middle',horizontal:'center'};
    cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  });
  ws.getCell(ddr,defHdr.length).font={bold:true,size:11,color:{argb:'FFDC2626'}};

  // 조건관리 + 원자재
  var cr=ddr+2;
  ws.mergeCells('A'+cr+':B'+cr);
  ws.getCell('A'+cr).value='■ 조건관리 (프레스)';
  ws.getCell('A'+cr).font={bold:true,size:11};
  ws.mergeCells('I'+cr+':K'+cr);
  ws.getCell('I'+cr).value='■ 원자재 규격 및 사용현황';
  ws.getCell('I'+cr).font={bold:true,size:11};
  var cr2=cr+1;
  ws.getRow(cr2).values=['순','다이하이트(mm)','이송피치(mm)','SPM','','','','','재질','두께(t)','폭(mm)'];
  ws.getRow(cr2).height=22;
  [1,2,3,4,9,10,11].forEach(function(i){
    var cell=ws.getCell(cr2,i);
    cell.font={bold:true,size:10};
    cell.alignment={vertical:'middle',horizontal:'center'};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE0F2FE'}};
    cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  });
  var cr3=cr2+1;
  ws.getRow(cr3).values=[1,rpt.conditions.dieHeight||'',rpt.conditions.feedPitch||'',ctVal>0?(60/ctVal).toFixed(1):'','','','','',(m.raw_item_code||''),'',''];
  ws.getRow(cr3).height=22;
  [1,2,3,4,9,10,11].forEach(function(i){
    var cell=ws.getCell(cr3,i);
    cell.font={size:10};
    cell.alignment={vertical:'middle',horizontal:'center'};
    cell.border={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  });

  // 저장
  try{
    var buf=await wb.xlsx.writeBuffer();
    var fname='프레스작업일보_'+(m.machine_code||'')+'_'+workDate.getFullYear()+String(workDate.getMonth()+1).padStart(2,'0')+String(workDate.getDate()).padStart(2,'0')+'.xlsx';
    saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fname);
    showToast('✅ 엑셀 다운로드');
  }catch(e){console.log(e);showToast('❌ 엑셀 생성실패')}
}
