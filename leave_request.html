<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>연차신청 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#181c25;--card:#1e2330;--card2:#252b3b;--border:#2d3548;--accent:#4a9eff;--accent2:#3d8be0;
--green:#34c759;--red:#ff453a;--orange:#ff9f0a;--yellow:#ffd60a;--purple:#bf5af2;
--text:#e8eaed;--text2:#9aa0b0;--text3:#636b80;font-family:'Noto Sans KR',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
/* 헤더 */
.hdr{background:linear-gradient(135deg,#1a2744,#243352);padding:14px 16px;text-align:center;
border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700;color:#fff}.hdr p{font-size:10px;color:var(--text2);margin-top:2px}
/* 탭 */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);
border-bottom:3px solid transparent;transition:.2s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:active{opacity:.7}
/* 패널 */
.pnl{display:none;padding:12px}.pnl.on{display:block}
/* 카드 */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--text)}
/* 폼 */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fg select,.fg input,.fg textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
font-size:14px;font-family:inherit;background:var(--card2);color:var(--text);outline:none;transition:.2s}
.fg select:focus,.fg input:focus{border-color:var(--accent)}
.fg select{appearance:auto}
.fg-row{display:flex;gap:8px}
.fg-row .fg{flex:1}
.fg-row .fg.sm{flex:0 0 80px}
.fg-row .fg.md{flex:0 0 140px}
/* 버튼 */
.btn{padding:10px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.btn:active{transform:scale(.96)}
.btn-accent{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-gray{background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.btn-row .btn{flex:1;justify-content:center;min-width:70px}
/* 상태뱃지 */
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-작성{background:#1c3a5e;color:#4a9eff}
.badge-검토{background:#1a3a2a;color:#34c759}
.badge-확인{background:#3a3520;color:#ffd60a}
.badge-승인{background:#1a3a2a;color:#34c759;border:1px solid #34c759}
.badge-반려{background:#3a1a1a;color:#ff453a}
/* 테이블 */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
th{background:var(--card2);color:var(--text2);font-weight:600;padding:8px 10px;text-align:center;
border-bottom:2px solid var(--border);position:sticky;top:0}
td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(74,158,255,.06)}
tr.selected td{background:rgba(74,158,255,.15)}
/* 설정 */
.setting-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.setting-row label{font-size:12px;font-weight:600;color:var(--text2);min-width:100px}
.setting-row input{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;
background:var(--card2);color:var(--text);font-size:12px;font-family:inherit}
/* 토스트 */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);
color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;
opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
/* 반응형 */
@media(min-width:768px){
  body{max-width:1200px;margin:0 auto}
  .fg-row .fg{flex:1}
  .btn-row .btn{flex:0 1 auto;min-width:100px}
}
@media(max-width:480px){
  .fg-row{flex-direction:column;gap:6px}
  .fg-row .fg.sm,.fg-row .fg.md{flex:1}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>🗓 연차신청 관리 시스템</h1>
  <p>Supabase 연동 · PC/모바일 반응형</p>
</div>

<div class="tabs">
  <div class="tab on" onclick="swTab(0)">🗓 연차신청</div>
  <div class="tab" onclick="swTab(1)">👤 사원관리</div>
  <div class="tab" onclick="swTab(2)">⚙ 설정</div>
</div>

<!-- ===== 연차신청 ===== -->
<div class="pnl on" id="pnl0">
  <div class="card">
    <div class="card-tit">📝 연차 신청</div>
    <div class="fg-row">
      <div class="fg md"><label>부서</label><select id="lvDept" onchange="lvLoadNames()"></select></div>
      <div class="fg md"><label>성명</label><select id="lvName" onchange="lvAutoPos()"></select></div>
      <div class="fg sm"><label>직위</label><input id="lvPos" readonly style="background:var(--border);color:var(--text3)"></div>
    </div>
    <div class="fg-row">
      <div class="fg md"><label>휴가유형</label>
        <select id="lvType"><option>연차</option><option>경조휴가</option><option>병가</option><option>공가</option><option>특별휴가</option></select>
      </div>
      <div class="fg"><label>시작일</label><input type="date" id="lvStart" onchange="lvCalcDays()"></div>
      <div class="fg"><label>종료일</label><input type="date" id="lvEnd" onchange="lvCalcDays()"></div>
      <div class="fg sm"><label>일수</label><input id="lvDays" readonly value="1" style="text-align:center;background:#1a3a2a;color:var(--green);font-weight:700;font-size:16px"></div>
    </div>
    <div class="fg"><label>사유</label><input id="lvReason" placeholder="휴가 사유를 입력하세요"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-accent" onclick="lvSave()">📥 신청저장</button>
    <button class="btn btn-gray" onclick="lvSearch()">🔍 조회</button>
    <button class="btn btn-green" onclick="lvStep('검토')">📋 검토</button>
    <button class="btn btn-orange" onclick="lvStep('확인')">✔ 확인</button>
    <button class="btn btn-green" onclick="lvStep('승인')" style="background:#1a8a3a">✅ 승인</button>
    <button class="btn btn-red" onclick="lvReject()">❌ 반려</button>
    <button class="btn btn-gray" onclick="lvDelete()">🗑 삭제</button>
  </div>

  <!-- 조회필터 -->
  <div class="card" style="padding:10px">
    <div class="fg-row" style="margin-bottom:0">
      <div class="fg"><label>시작</label><input type="date" id="fStart"></div>
      <div class="fg"><label>종료</label><input type="date" id="fEnd"></div>
      <div class="fg sm"><label>부서</label><select id="fDept"><option value="">전체</option></select></div>
      <div class="fg sm"><label>상태</label>
        <select id="fStatus"><option value="">전체</option><option>작성</option><option>검토</option><option>확인</option><option>승인</option><option>반려</option></select>
      </div>
    </div>
  </div>

  <!-- 이력테이블 -->
  <div class="card" style="padding:8px">
    <div class="tbl-wrap">
      <table id="lvTable">
        <thead><tr>
          <th>ID</th><th>신청일</th><th>부서</th><th>성명</th><th>직위</th><th>유형</th>
          <th>시작일</th><th>종료일</th><th>일수</th><th>사유</th>
          <th>작성자</th><th>작성일</th><th>검토자</th><th>검토일</th>
          <th>확인자</th><th>확인일</th><th>승인자</th><th>승인일</th><th>상태</th>
        </tr></thead>
        <tbody id="lvBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== 사원관리 ===== -->
<div class="pnl" id="pnl1">
  <div class="card">
    <div class="card-tit">👤 사원 등록/수정</div>
    <div class="fg-row">
      <div class="fg sm"><label>ID</label><input id="empId" placeholder="1001"></div>
      <div class="fg md"><label>부서</label><select id="empDept"></select></div>
      <div class="fg"><label>성명</label><input id="empName" placeholder="성명"></div>
      <div class="fg sm"><label>직위</label>
        <select id="empPos"><option>부장</option><option>차장</option><option>과장</option><option>대리</option><option>주임</option><option>사원</option></select>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-accent" onclick="empSave()">➕ 등록</button>
    <button class="btn btn-green" onclick="empUpdate()">✏ 수정</button>
    <button class="btn btn-red" onclick="empDelete()">🗑 삭제</button>
    <button class="btn btn-gray" onclick="empClear()">🔄 초기화</button>
  </div>
  <div class="card" style="padding:8px">
    <div class="tbl-wrap">
      <table id="empTable">
        <thead><tr><th>ID</th><th>부서</th><th>성명</th><th>직위</th></tr></thead>
        <tbody id="empBody"></tbody>
      </table>
    </div>
    <div id="empStats" style="font-size:11px;color:var(--text3);padding:8px 0"></div>
  </div>
</div>

<!-- ===== 설정 ===== -->
<div class="pnl" id="pnl2">
  <div class="card">
    <div class="card-tit">⚙ Supabase 연결 설정</div>
    <div class="setting-row"><label>Supabase URL</label><input id="cfgUrl" placeholder="https://xxxxx.supabase.co"></div>
    <div class="setting-row"><label>Anon Key</label><input id="cfgKey" placeholder="eyJhbG..."></div>
    <button class="btn btn-accent" onclick="saveCfg()" style="width:100%;margin-top:8px">💾 설정 저장 및 연결 테스트</button>
    <div id="cfgStatus" style="font-size:12px;color:var(--text3);margin-top:8px;text-align:center"></div>
  </div>
  <div class="card">
    <div class="card-tit">📋 Supabase 테이블 생성 SQL</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Supabase SQL Editor에서 아래 SQL을 실행하세요</div>
    <pre id="sqlPre" style="background:var(--card2);padding:12px;border-radius:8px;font-size:11px;color:var(--green);overflow-x:auto;white-space:pre-wrap;cursor:pointer" onclick="copySql()"></pre>
    <button class="btn btn-gray" onclick="copySql()" style="width:100%;margin-top:6px">📋 SQL 복사</button>
  </div>
  <div class="card">
    <div class="card-tit">📋 부서 목록 관리</div>
    <div class="fg"><label>부서명 (쉼표 구분)</label>
      <input id="cfgDepts" value="개발팀,생산팀,설계팀,품질관리팀,영업관리팀">
    </div>
    <button class="btn btn-gray" onclick="saveDepts()" style="width:100%">💾 부서 저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 설정 =====
const LS='LEAVE_CFG';
const SQL_CREATE=`-- 사원 테이블
CREATE TABLE IF NOT EXISTS employees (
  id TEXT PRIMARY KEY,
  dept TEXT NOT NULL,
  name TEXT NOT NULL,
  position TEXT,
  sort_order INTEGER DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT now()
);

-- 연차신청 테이블
CREATE TABLE IF NOT EXISTS leave_requests (
  id BIGSERIAL PRIMARY KEY,
  request_date DATE DEFAULT CURRENT_DATE,
  dept TEXT,
  name TEXT NOT NULL,
  position TEXT,
  leave_type TEXT DEFAULT '연차',
  start_date DATE NOT NULL,
  end_date DATE NOT NULL,
  days NUMERIC(4,1) DEFAULT 1,
  reason TEXT,
  writer TEXT,
  write_date DATE,
  reviewer TEXT,
  review_date DATE,
  confirmer TEXT,
  confirm_date DATE,
  approver TEXT,
  approve_date DATE,
  status TEXT DEFAULT '작성',
  created_at TIMESTAMPTZ DEFAULT now()
);

-- RLS 비활성화 (개발용)
ALTER TABLE employees ENABLE ROW LEVEL SECURITY;
ALTER TABLE leave_requests ENABLE ROW LEVEL SECURITY;
CREATE POLICY "employees_all" ON employees FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "leave_all" ON leave_requests FOR ALL USING (true) WITH CHECK (true);`;

function getCfg(){try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}}}
function getSbUrl(){return getCfg().url||''}
function getSbKey(){return getCfg().key||''}
function getDepts(){return(getCfg().depts||'개발팀,생산팀,설계팀,품질관리팀,영업관리팀').split(',').map(s=>s.trim()).filter(Boolean)}

async function sb(path,method='GET',body=null){
  const url=getSbUrl(),key=getSbKey();
  if(!url||!key){toast('⚠ 설정에서 Supabase 연결 먼저');return null}
  const opts={method,headers:{'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(url+'/rest/v1/'+path,opts);
  if(!res.ok){const t=await res.text();throw new Error(t)}
  const text=await res.text();
  return text?JSON.parse(text):null;
}

// ===== 탭 =====
function swTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.pnl').forEach((p,i)=>p.classList.toggle('on',i===n));
  if(n===0){initLeaveTab()}
  if(n===1){loadEmployees()}
  if(n===2){initSettings()}
}

// ===== 설정 탭 =====
function initSettings(){
  const c=getCfg();
  document.getElementById('cfgUrl').value=c.url||'';
  document.getElementById('cfgKey').value=c.key||'';
  document.getElementById('cfgDepts').value=c.depts||'개발팀,생산팀,설계팀,품질관리팀,영업관리팀';
  document.getElementById('sqlPre').textContent=SQL_CREATE;
}
async function saveCfg(){
  const url=document.getElementById('cfgUrl').value.trim().replace(/\/$/,'');
  const key=document.getElementById('cfgKey').value.trim();
  if(!url||!key){toast('URL과 Key를 입력하세요');return}
  const c=getCfg();c.url=url;c.key=key;
  localStorage.setItem(LS,JSON.stringify(c));
  const st=document.getElementById('cfgStatus');
  st.textContent='연결 테스트 중...';st.style.color='var(--accent)';
  try{
    await sb('employees?select=id&limit=1');
    st.textContent='✅ 연결 성공';st.style.color='var(--green)';toast('✅ Supabase 연결 성공');
  }catch(e){
    st.textContent='❌ 연결 실패: '+e.message;st.style.color='var(--red)';
  }
}
function saveDepts(){
  const c=getCfg();c.depts=document.getElementById('cfgDepts').value;
  localStorage.setItem(LS,JSON.stringify(c));
  populateDeptSelects();toast('부서 목록 저장 완료');
}
function copySql(){navigator.clipboard.writeText(SQL_CREATE).then(()=>toast('SQL 복사됨')).catch(()=>toast('복사 실패'))}

// ===== 공통: 부서 select 채우기 =====
function populateDeptSelects(){
  const depts=getDepts();
  ['lvDept','empDept'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const prev=sel.value;sel.innerHTML='';
    depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});
    if(prev)sel.value=prev;
  });
  const fDept=document.getElementById('fDept');
  if(fDept){const prev=fDept.value;fDept.innerHTML='<option value="">전체</option>';
    depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;fDept.appendChild(o)});
    if(prev)fDept.value=prev;
  }
}

// ===== 사원 캐시 =====
let empCache=[];
async function loadEmpCache(){
  try{empCache=await sb('employees?select=*&order=sort_order,id')||[]}catch(e){empCache=[]}
}

// ===== 연차신청 탭 =====
let lvData=[],lvSelId=null;

async function initLeaveTab(){
  populateDeptSelects();
  await loadEmpCache();
  lvLoadNames();
  // 기본 날짜
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('lvStart').value=today;
  document.getElementById('lvEnd').value=today;
  const d=new Date();d.setMonth(d.getMonth()-1);
  document.getElementById('fStart').value=d.toISOString().split('T')[0];
  d.setMonth(d.getMonth()+2);
  document.getElementById('fEnd').value=d.toISOString().split('T')[0];
  lvSearch();
}

function lvLoadNames(){
  const dept=document.getElementById('lvDept').value;
  const sel=document.getElementById('lvName');sel.innerHTML='<option value="">선택</option>';
  empCache.filter(e=>e.dept===dept).forEach(e=>{
    const o=document.createElement('option');o.value=e.name;o.textContent=e.name;sel.appendChild(o);
  });
  document.getElementById('lvPos').value='';
}
function lvAutoPos(){
  const dept=document.getElementById('lvDept').value,name=document.getElementById('lvName').value;
  const emp=empCache.find(e=>e.dept===dept&&e.name===name);
  document.getElementById('lvPos').value=emp?emp.position:'';
}
function lvCalcDays(){
  const s=document.getElementById('lvStart').value,e=document.getElementById('lvEnd').value;
  if(s&&e){const d=Math.round((new Date(e)-new Date(s))/(86400000))+1;
    document.getElementById('lvDays').value=Math.max(d,1);
  }
}

async function lvSave(){
  const dept=document.getElementById('lvDept').value;
  const name=document.getElementById('lvName').value;
  const pos=document.getElementById('lvPos').value;
  const type=document.getElementById('lvType').value;
  const start=document.getElementById('lvStart').value;
  const end=document.getElementById('lvEnd').value;
  const days=parseFloat(document.getElementById('lvDays').value)||1;
  const reason=document.getElementById('lvReason').value.trim();
  if(!name){toast('성명을 선택하세요');return}
  if(!reason){toast('사유를 입력하세요');return}
  const today=new Date().toISOString().split('T')[0];
  try{
    await sb('leave_requests','POST',{
      request_date:today,dept,name,position:pos,leave_type:type,
      start_date:start,end_date:end,days,reason,
      writer:name,write_date:today,status:'작성'
    });
    toast('✅ '+name+' 연차신청 저장');
    document.getElementById('lvReason').value='';
    lvSearch();
  }catch(e){toast('❌ 저장 실패: '+e.message)}
}

async function lvSearch(){
  const fStart=document.getElementById('fStart').value;
  const fEnd=document.getElementById('fEnd').value;
  let q='leave_requests?select=*&order=start_date.desc,id.desc';
  if(fStart)q+='&start_date=gte.'+fStart;
  if(fEnd)q+='&start_date=lte.'+fEnd;
  const dept=document.getElementById('fDept').value;
  if(dept)q+='&dept=eq.'+encodeURIComponent(dept);
  const status=document.getElementById('fStatus').value;
  if(status)q+='&status=eq.'+encodeURIComponent(status);
  try{
    lvData=await sb(q)||[];
    renderLvTable();
  }catch(e){toast('조회 실패: '+e.message)}
}

function renderLvTable(){
  const body=document.getElementById('lvBody');
  if(!lvData.length){body.innerHTML='<tr><td colspan="19" style="color:var(--text3);padding:20px">데이터 없음</td></tr>';return}
  body.innerHTML=lvData.map(r=>{
    const sel=r.id===lvSelId?'class="selected"':'';
    return`<tr ${sel} onclick="lvSelect(${r.id})" style="cursor:pointer">
      <td>${r.id}</td><td>${r.request_date||''}</td><td>${r.dept||''}</td><td>${r.name||''}</td>
      <td>${r.position||''}</td><td>${r.leave_type||''}</td><td>${r.start_date||''}</td><td>${r.end_date||''}</td>
      <td>${r.days||''}</td><td style="text-align:left;max-width:150px;overflow:hidden;text-overflow:ellipsis">${r.reason||''}</td>
      <td>${r.writer||''}</td><td>${fmtD(r.write_date)}</td>
      <td>${r.reviewer||''}</td><td>${fmtD(r.review_date)}</td>
      <td>${r.confirmer||''}</td><td>${fmtD(r.confirm_date)}</td>
      <td>${r.approver||''}</td><td>${fmtD(r.approve_date)}</td>
      <td><span class="badge badge-${r.status||''}">${r.status||''}</span></td>
    </tr>`}).join('');
}
function fmtD(v){return v?v.substring(0,10):''}

function lvSelect(id){
  lvSelId=lvSelId===id?null:id;
  renderLvTable();
  // 폼에 로드
  const r=lvData.find(x=>x.id===id);
  if(r){
    document.getElementById('lvDept').value=r.dept||'';lvLoadNames();
    document.getElementById('lvName').value=r.name||'';
    document.getElementById('lvPos').value=r.position||'';
    document.getElementById('lvType').value=r.leave_type||'연차';
    document.getElementById('lvStart').value=r.start_date||'';
    document.getElementById('lvEnd').value=r.end_date||'';
    document.getElementById('lvDays').value=r.days||1;
    document.getElementById('lvReason').value=r.reason||'';
  }
}

async function lvStep(step){
  if(!lvSelId){toast(step+' 처리할 항목을 선택하세요');return}
  const r=lvData.find(x=>x.id===lvSelId);
  if(!r){toast('항목 없음');return}
  const allowed={검토:['작성'],확인:['작성','검토'],승인:['작성','검토','확인']};
  if(!allowed[step].includes(r.status)){toast('현재 상태('+r.status+')에서 '+step+'할 수 없습니다');return}
  const who=prompt(step+'자 성명을 입력하세요:');
  if(!who)return;
  const today=new Date().toISOString().split('T')[0];
  const colMap={검토:{reviewer:who,review_date:today},확인:{confirmer:who,confirm_date:today},승인:{approver:who,approve_date:today}};
  try{
    await sb('leave_requests?id=eq.'+lvSelId,'PATCH',{...colMap[step],status:step});
    toast('✅ '+step+' 처리 완료');lvSelId=null;lvSearch();
  }catch(e){toast('❌ '+step+' 실패: '+e.message)}
}

async function lvReject(){
  if(!lvSelId){toast('반려할 항목을 선택하세요');return}
  const r=lvData.find(x=>x.id===lvSelId);
  if(!r||!['작성','검토','확인'].includes(r.status)){toast('반려 대상이 아닙니다');return}
  if(!confirm('반려 처리하시겠습니까?'))return;
  try{
    await sb('leave_requests?id=eq.'+lvSelId,'PATCH',{status:'반려'});
    toast('반려 처리 완료');lvSelId=null;lvSearch();
  }catch(e){toast('❌ 반려 실패: '+e.message)}
}

async function lvDelete(){
  if(!lvSelId){toast('삭제할 항목을 선택하세요');return}
  if(!confirm('삭제하시겠습니까? 되돌릴 수 없습니다.'))return;
  try{
    await sb('leave_requests?id=eq.'+lvSelId,'DELETE');
    toast('삭제 완료');lvSelId=null;lvSearch();
  }catch(e){toast('❌ 삭제 실패: '+e.message)}
}

// ===== 사원관리 탭 =====
let empData=[],empSelId=null;

async function loadEmployees(){
  populateDeptSelects();
  try{empData=await sb('employees?select=*&order=sort_order,id')||[];renderEmpTable()}
  catch(e){toast('사원 조회 실패: '+e.message)}
}

function renderEmpTable(){
  const body=document.getElementById('empBody');
  if(!empData.length){body.innerHTML='<tr><td colspan="4" style="color:var(--text3);padding:20px">사원 데이터 없음</td></tr>';return}
  body.innerHTML=empData.map(e=>{
    const sel=e.id===empSelId?'class="selected"':'';
    return`<tr ${sel} onclick="empSelect('${e.id}')" style="cursor:pointer">
      <td>${e.id}</td><td>${e.dept}</td><td>${e.name}</td><td>${e.position||''}</td></tr>`
  }).join('');
  // 통계
  const cnt={};empData.forEach(e=>{cnt[e.dept]=(cnt[e.dept]||0)+1});
  document.getElementById('empStats').textContent='총 '+empData.length+'명 — '+Object.entries(cnt).sort().map(([k,v])=>k+': '+v+'명').join(' | ');
}

function empSelect(id){
  empSelId=empSelId===id?null:id;
  renderEmpTable();
  const e=empData.find(x=>x.id===id);
  if(e){
    document.getElementById('empId').value=e.id;
    document.getElementById('empDept').value=e.dept;
    document.getElementById('empName').value=e.name;
    document.getElementById('empPos').value=e.position||'사원';
  }
}
function empClear(){
  empSelId=null;
  document.getElementById('empId').value='';
  document.getElementById('empName').value='';
  document.getElementById('empPos').value='사원';
  renderEmpTable();
}

async function empSave(){
  const id=document.getElementById('empId').value.trim();
  const dept=document.getElementById('empDept').value;
  const name=document.getElementById('empName').value.trim();
  const pos=document.getElementById('empPos').value;
  if(!id||!dept||!name){toast('ID, 부서, 성명을 입력하세요');return}
  try{
    await sb('employees','POST',{id,dept,name,position:pos,sort_order:empData.length});
    toast('✅ '+name+' 등록 완료');empClear();loadEmployees();await loadEmpCache();
  }catch(e){toast('❌ 등록 실패 (ID 중복?): '+e.message)}
}

async function empUpdate(){
  if(!empSelId){toast('수정할 사원을 선택하세요');return}
  const dept=document.getElementById('empDept').value;
  const name=document.getElementById('empName').value.trim();
  const pos=document.getElementById('empPos').value;
  if(!name){toast('성명을 입력하세요');return}
  try{
    await sb('employees?id=eq.'+encodeURIComponent(empSelId),'PATCH',{dept,name,position:pos});
    toast('✅ 수정 완료');empClear();loadEmployees();await loadEmpCache();
  }catch(e){toast('❌ 수정 실패: '+e.message)}
}

async function empDelete(){
  if(!empSelId){toast('삭제할 사원을 선택하세요');return}
  if(!confirm('삭제하시겠습니까?'))return;
  try{
    await sb('employees?id=eq.'+encodeURIComponent(empSelId),'DELETE');
    toast('삭제 완료');empClear();loadEmployees();await loadEmpCache();
  }catch(e){toast('❌ 삭제 실패: '+e.message)}
}

// ===== 유틸 =====
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

// ===== 초기화 =====
populateDeptSelects();
const today=new Date().toISOString().split('T')[0];
document.getElementById('lvStart').value=today;
document.getElementById('lvEnd').value=today;
const d0=new Date();d0.setMonth(d0.getMonth()-1);
document.getElementById('fStart').value=d0.toISOString().split('T')[0];
d0.setMonth(d0.getMonth()+2);
document.getElementById('fEnd').value=d0.toISOString().split('T')[0];

// Supabase 설정 있으면 자동 로드
if(getSbUrl()&&getSbKey()){initLeaveTab()}
</script>
