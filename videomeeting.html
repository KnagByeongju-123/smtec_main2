<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>화상회의</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Noto Sans KR',sans-serif;background:#0a0e1a;color:#e0e0e0;display:flex;flex-direction:column}

    /* 로비 헤더 */
    .hdr{
      background:linear-gradient(135deg,#0d1b3e,#162550);
      padding:10px 16px;display:flex;align-items:center;
      border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;position:relative;z-index:100;
    }
    .hdr.hide{display:none}
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(66,165,245,.4),transparent)}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr h1{font-size:16px;font-weight:700;color:#fff}
    .hdr-badge{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(66,165,245,.15);color:#64b5f6;font-weight:600;border:1px solid rgba(66,165,245,.2)}
    .hdr-back{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#90a4ae;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}

    /* 로비 */
    .lobby{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;overflow-y:auto;background:radial-gradient(ellipse at 50% 30%,rgba(21,101,192,.08),transparent 70%)}
    .lobby.hidden{display:none}
    .lobby-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#1565c0,#42a5f5);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;box-shadow:0 8px 32px rgba(21,101,192,.3);animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .lobby-title{font-size:20px;font-weight:900;color:#fff;text-align:center}
    .lobby-desc{font-size:12px;color:#78909c;text-align:center;line-height:1.6;max-width:320px}
    .lobby-form{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px}
    .fg{display:flex;flex-direction:column;gap:4px}
    .fg label{font-size:11px;font-weight:600;color:#78909c;letter-spacing:0.5px}
    .fg input,.fg select{padding:11px 14px;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.04);color:#fff;font-size:15px;font-family:inherit;outline:none}
    .fg input:focus,.fg select:focus{border-color:rgba(66,165,245,.5);background:rgba(66,165,245,.06)}
    .fg input::placeholder{color:#546e7a}
    .fg select{appearance:auto;cursor:pointer}
    .fg select option{background:#1a2340;color:#fff}
    .btn-join{padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(21,101,192,.3);margin-top:4px}
    .btn-join:active{transform:scale(.98)}

    .guide{width:100%;max-width:380px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-top:2px}
    .guide-title{font-size:12px;font-weight:700;color:#64b5f6;margin-bottom:8px}
    .guide-item{font-size:11px;color:#90a4ae;line-height:1.9;display:flex;gap:8px}
    .guide-item span{color:#42a5f5;font-weight:700;flex-shrink:0}

    .recent-rooms{width:100%;max-width:380px}
    .recent-title{font-size:11px;font-weight:600;color:#546e7a;margin-bottom:8px}
    .recent-list{display:flex;flex-direction:column;gap:6px}
    .recent-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);cursor:pointer}
    .ri-name{font-size:13px;font-weight:600;color:#b0bec5;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ri-time{font-size:10px;color:#546e7a;flex-shrink:0}
    .ri-del{width:20px;height:20px;border:none;border-radius:4px;background:rgba(244,67,54,.1);color:#ef5350;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* ===== 회의 화면 ===== */
    .meeting{position:fixed;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;z-index:200;background:#000}
    .meeting.active{display:flex}

    /* 상단 컨트롤바 */
    .ctrl-bar{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 10px;background:rgba(10,14,26,.95);
      border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;z-index:10;
      gap:6px;
    }
    .ctrl-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
    .ctrl-room{font-size:11px;font-weight:600;color:#64b5f6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ctrl-timer{font-size:10px;color:#546e7a;font-variant-numeric:tabular-nums;flex-shrink:0}
    .ctrl-btns{display:flex;gap:4px;flex-shrink:0}
    .cb{
      width:38px;height:34px;border:none;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;cursor:pointer;transition:all .15s;
      background:rgba(255,255,255,.08);color:#e0e0e0;
    }
    .cb:active{transform:scale(.9)}
    .cb.active{background:rgba(66,165,245,.25);color:#64b5f6}
    .cb.off{background:rgba(244,67,54,.2);color:#ef5350}
    .cb-share{background:rgba(76,175,80,.2);color:#66bb6a;font-size:14px;width:auto;padding:0 10px;font-weight:700;font-family:inherit;gap:4px}
    .cb-share.sharing{background:rgba(244,67,54,.2);color:#ef5350}
    .cb-leave{background:rgba(244,67,54,.25);color:#ef5350;font-size:13px;width:auto;padding:0 10px;font-weight:700;font-family:inherit}

    /* Jitsi 영역 */
    #jitsiContainer{flex:1;min-height:0}
    #jitsiContainer iframe{width:100%!important;height:100%!important;border:none!important}

    .toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid rgba(255,255,255,.1)}
    .toast.show{opacity:1}
  </style>
</head>
<body>

<!-- 로비 헤더 -->
<div class="hdr" id="hdr">
  <div class="hdr-left">
    <a class="hdr-back" href="https://knagbyeongju-123.github.io/smtec_main2/index.html">← 메인</a>
    <h1>📹 화상회의</h1>
    <span class="hdr-badge">Jitsi</span>
  </div>
</div>

<!-- 로비 -->
<div class="lobby" id="lobby">
  <div class="lobby-icon">📹</div>
  <div class="lobby-title">화상회의 시작</div>
  <div class="lobby-desc">회의방 이름을 입력하고 참여하세요.<br>같은 방 이름을 사용하면 자동으로 연결됩니다.</div>
  <div class="lobby-form">
    <div class="fg"><label>회의방 이름</label><input type="text" id="roomName" placeholder="예: 생산팀-회의" autocomplete="off" spellcheck="false"></div>
    <div class="fg"><label>참가자 이름</label><input type="text" id="userName" placeholder="예: 홍길동" autocomplete="off"></div>
    <div class="fg"><label>Jitsi 서버</label>
      <select id="serverSelect">
        <option value="meet.jit.si">meet.jit.si (기본, 무료)</option>
        <option value="8x8.vc">8x8.vc</option>
      </select>
    </div>
    <button class="btn-join" onclick="joinMeeting()">🎥 회의 참여</button>
  </div>
  <div class="guide">
    <div class="guide-title">📌 회의 중 상단 컨트롤바</div>
    <div class="guide-item"><span>🖥️</span>화면공유 — 내 화면을 참가자에게 실시간 공유</div>
    <div class="guide-item"><span>🎤</span>마이크 ON/OFF</div>
    <div class="guide-item"><span>📷</span>카메라 ON/OFF</div>
    <div class="guide-item"><span>💬</span>채팅 — 텍스트·링크 전송</div>
    <div class="guide-item"><span>👥</span>타일뷰 — 참가자 전체 동시 표시</div>
  </div>
  <div class="recent-rooms" id="recentSection" style="display:none">
    <div class="recent-title">최근 회의방</div>
    <div class="recent-list" id="recentList"></div>
  </div>
</div>

<!-- 회의 화면 -->
<div class="meeting" id="meeting">
  <!-- 상단 컨트롤바 -->
  <div class="ctrl-bar">
    <div class="ctrl-left">
      <span class="ctrl-room" id="ctrlRoom">-</span>
      <span class="ctrl-timer" id="ctrlTimer">00:00</span>
    </div>
    <div class="ctrl-btns">
      <button class="cb cb-share" id="btnShare" onclick="toggleShare()" title="화면공유">🖥️ 공유</button>
      <button class="cb" id="btnMic" onclick="toggleMic()" title="마이크">🎤</button>
      <button class="cb" id="btnCam" onclick="toggleCam()" title="카메라">📷</button>
      <button class="cb" id="btnChat" onclick="toggleChat()" title="채팅">💬</button>
      <button class="cb" id="btnTile" onclick="toggleTile()" title="타일뷰">👥</button>
      <button class="cb cb-leave" onclick="leaveMeeting()" title="나가기">✕</button>
    </div>
  </div>
  <div id="jitsiContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
let api=null,timerInterval=null,startTime=null;
let micOn=true,camOn=true,isSharing=false,tileOn=false;
let recentRooms=JSON.parse(localStorage.getItem('MEET_RECENT')||'[]');

(function init(){
  const saved=localStorage.getItem('MEET_USER_NAME');
  if(saved)document.getElementById('userName').value=saved;
  renderRecent();
  document.getElementById('roomName').addEventListener('keydown',e=>{if(e.key==='Enter')joinMeeting()});
  document.getElementById('userName').addEventListener('keydown',e=>{if(e.key==='Enter')joinMeeting()});
  setTimeout(()=>document.getElementById('roomName').focus(),300);
})();

function joinMeeting(roomOverride){
  const roomInput=document.getElementById('roomName');
  const room=(roomOverride||roomInput.value).trim();
  const user=document.getElementById('userName').value.trim()||'참가자';
  if(!room){showToast('회의방 이름을 입력하세요');roomInput.focus();return}

  localStorage.setItem('MEET_USER_NAME',user);
  addRecent(room);

  const jitsiRoom='smtech-'+room.replace(/[^a-zA-Z0-9가-힣\-_]/g,'-').replace(/-+/g,'-');
  const server=document.getElementById('serverSelect').value;

  // UI 전환
  document.getElementById('hdr').classList.add('hide');
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('meeting').classList.add('active');
  document.getElementById('ctrlRoom').textContent='🔴 '+room;

  // 버튼 초기상태
  micOn=true;camOn=true;isSharing=false;tileOn=false;
  updateBtnStates();

  const container=document.getElementById('jitsiContainer');
  container.innerHTML='';

  try{
    api=new JitsiMeetExternalAPI(server,{
      roomName:jitsiRoom,
      width:'100%',
      height:'100%',
      parentNode:container,
      userInfo:{displayName:user},
      configOverwrite:{
        startWithAudioMuted:false,
        startWithVideoMuted:false,
        prejoinConfig:{enabled:false},
        prejoinPageEnabled:false,
        disableDeepLinking:true,
        defaultLanguage:'ko',
        // Jitsi 자체 툴바 최소화 (우리 상단바 사용)
        toolbarButtons:[],
        disableThirdPartyRequests:true,
        enableClosePage:false,
        enableWelcomePage:false,
        hideConferenceSubject:true,
        hideConferenceTimer:true,
        disableProfile:true,
      },
      interfaceConfigOverwrite:{
        SHOW_JITSI_WATERMARK:false,
        SHOW_WATERMARK_FOR_GUESTS:false,
        SHOW_BRAND_WATERMARK:false,
        SHOW_POWERED_BY:false,
        DEFAULT_BACKGROUND:'#000',
        TOOLBAR_ALWAYS_VISIBLE:false,
        TOOLBAR_BUTTONS:[],
        MOBILE_APP_PROMO:false,
        HIDE_INVITE_MORE_HEADER:true,
        DISABLE_JOIN_LEAVE_NOTIFICATIONS:false,
        filmStripOnly:false,
      }
    });

    api.addListener('videoConferenceJoined',()=>{showToast('✅ 회의 참여 완료');startTimer()});
    api.addListener('videoConferenceLeft',()=>{leaveMeeting()});
    api.addListener('participantJoined',p=>{showToast('👋 '+(p.displayName||'참가자')+' 입장')});
    api.addListener('participantLeft',()=>{showToast('🚪 참가자 퇴장')});

    // 상태 동기화 리스너
    api.addListener('audioMuteStatusChanged',e=>{micOn=!e.muted;updateBtnStates()});
    api.addListener('videoMuteStatusChanged',e=>{camOn=!e.muted;updateBtnStates()});
    api.addListener('screenSharingStatusChanged',e=>{isSharing=e.on;updateBtnStates()});
    api.addListener('tileViewChanged',e=>{tileOn=e.enabled;updateBtnStates()});

  }catch(e){
    showToast('⚠ 연결 실패: '+e.message);
    leaveMeeting();
  }
}

// ===== 상단 컨트롤 버튼 =====
function toggleShare(){
  if(!api)return;
  api.executeCommand('toggleShareScreen');
}
function toggleMic(){
  if(!api)return;
  api.executeCommand('toggleAudio');
}
function toggleCam(){
  if(!api)return;
  api.executeCommand('toggleVideo');
}
function toggleChat(){
  if(!api)return;
  api.executeCommand('toggleChat');
}
function toggleTile(){
  if(!api)return;
  api.executeCommand('toggleTileView');
}

function updateBtnStates(){
  const mic=document.getElementById('btnMic');
  const cam=document.getElementById('btnCam');
  const share=document.getElementById('btnShare');
  const tile=document.getElementById('btnTile');

  mic.classList.toggle('off',!micOn);
  mic.innerHTML=micOn?'🎤':'🔇';

  cam.classList.toggle('off',!camOn);
  cam.innerHTML=camOn?'📷':'🚫';

  share.classList.toggle('sharing',isSharing);
  share.innerHTML=isSharing?'🔴 중지':'🖥️ 공유';

  tile.classList.toggle('active',tileOn);
}

function leaveMeeting(){
  if(api){try{api.dispose()}catch(e){} api=null}
  stopTimer();
  document.getElementById('meeting').classList.remove('active');
  document.getElementById('lobby').classList.remove('hidden');
  document.getElementById('hdr').classList.remove('hide');
  document.getElementById('jitsiContainer').innerHTML='';
  showToast('회의를 종료했습니다');
}

function startTimer(){
  startTime=Date.now();stopTimer();
  timerInterval=setInterval(()=>{
    const el=Math.floor((Date.now()-startTime)/1000);
    const m=String(Math.floor(el/60)).padStart(2,'0');
    const s=String(el%60).padStart(2,'0');
    const h=Math.floor(el/3600);
    document.getElementById('ctrlTimer').textContent=h>0?h+':'+m+':'+s:m+':'+s;
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}document.getElementById('ctrlTimer').textContent='00:00'}

function addRecent(room){
  recentRooms=recentRooms.filter(r=>r.name!==room);
  recentRooms.unshift({name:room,time:new Date().toLocaleString('ko-KR')});
  if(recentRooms.length>8)recentRooms.length=8;
  localStorage.setItem('MEET_RECENT',JSON.stringify(recentRooms));renderRecent();
}
function renderRecent(){
  const sec=document.getElementById('recentSection'),list=document.getElementById('recentList');
  if(!recentRooms.length){sec.style.display='none';return}
  sec.style.display='block';list.innerHTML='';
  recentRooms.forEach((r,i)=>{
    const d=document.createElement('div');d.className='recent-item';
    d.innerHTML=`<span class="ri-name">${esc(r.name)}</span><span class="ri-time">${r.time}</span><button class="ri-del" onclick="event.stopPropagation();delRecent(${i})">✕</button>`;
    d.addEventListener('click',()=>{document.getElementById('roomName').value=r.name;joinMeeting(r.name)});
    list.appendChild(d);
  });
}
function delRecent(i){recentRooms.splice(i,1);localStorage.setItem('MEET_RECENT',JSON.stringify(recentRooms));renderRecent()}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let tt;
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

window.addEventListener('beforeunload',e=>{if(api){e.preventDefault();e.returnValue='회의 중입니다. 나가시겠습니까?'}});
</script>
</body>
</html>
