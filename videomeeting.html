<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>화상회의</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#0a0e1a;color:#e0e0e0;height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* 헤더 */
    .hdr{
      background:linear-gradient(135deg,#0d1b3e,#162550);
      padding:10px 16px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(255,255,255,.06);
      flex-shrink:0;
      position:relative;
      z-index:100;
    }
    .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(66,165,245,.4),transparent)}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.3px}
    .hdr-badge{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(66,165,245,.15);color:#64b5f6;font-weight:600;border:1px solid rgba(66,165,245,.2)}
    .hdr-back{
      display:inline-flex;align-items:center;gap:4px;
      padding:6px 12px;border-radius:8px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
      color:#90a4ae;font-size:12px;font-weight:600;
      cursor:pointer;text-decoration:none;
      transition:all .2s;
    }
    .hdr-back:hover{background:rgba(255,255,255,.1);color:#fff}

    /* 메인 컨텐츠 */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}

    /* 로비 화면 */
    .lobby{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;gap:20px;
      background:radial-gradient(ellipse at 50% 30%,rgba(21,101,192,.08),transparent 70%);
    }
    .lobby.hidden{display:none}

    .lobby-icon{
      width:80px;height:80px;border-radius:24px;
      background:linear-gradient(135deg,#1565c0,#42a5f5);
      display:flex;align-items:center;justify-content:center;
      font-size:36px;
      box-shadow:0 8px 32px rgba(21,101,192,.3);
      animation:float 3s ease-in-out infinite;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    .lobby-title{font-size:22px;font-weight:900;color:#fff;text-align:center;letter-spacing:-0.5px}
    .lobby-desc{font-size:13px;color:#78909c;text-align:center;line-height:1.6;max-width:320px}

    .lobby-form{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}

    .fg{display:flex;flex-direction:column;gap:5px}
    .fg label{font-size:11px;font-weight:600;color:#78909c;text-transform:uppercase;letter-spacing:0.5px}
    .fg input,.fg select{
      padding:12px 14px;
      border:1.5px solid rgba(255,255,255,.08);
      border-radius:10px;
      background:rgba(255,255,255,.04);
      color:#fff;font-size:15px;font-family:inherit;
      transition:all .2s;
      outline:none;
    }
    .fg input:focus,.fg select:focus{border-color:rgba(66,165,245,.5);background:rgba(66,165,245,.06)}
    .fg input::placeholder{color:#546e7a}
    .fg select{appearance:auto;cursor:pointer}
    .fg select option{background:#1a2340;color:#fff}

    .btn-join{
      padding:14px;border:none;border-radius:12px;
      background:linear-gradient(135deg,#1565c0,#42a5f5);
      color:#fff;font-size:15px;font-weight:700;
      cursor:pointer;font-family:inherit;
      transition:all .2s;
      box-shadow:0 4px 20px rgba(21,101,192,.3);
      margin-top:4px;
    }
    .btn-join:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(21,101,192,.4)}
    .btn-join:active{transform:scale(.98)}
    .btn-join:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .recent-rooms{width:100%;max-width:380px}
    .recent-title{font-size:11px;font-weight:600;color:#546e7a;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
    .recent-list{display:flex;flex-direction:column;gap:6px}
    .recent-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 12px;border-radius:8px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
      cursor:pointer;transition:all .2s;
    }
    .recent-item:hover{background:rgba(66,165,245,.08);border-color:rgba(66,165,245,.15)}
    .ri-name{font-size:13px;font-weight:600;color:#b0bec5}
    .ri-time{font-size:10px;color:#546e7a}
    .ri-del{
      width:20px;height:20px;border:none;border-radius:4px;
      background:rgba(244,67,54,.1);color:#ef5350;
      font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;
    }
    .recent-item:hover .ri-del{opacity:1}

    /* 회의 화면 */
    .meeting{flex:1;display:none;flex-direction:column;position:relative}
    .meeting.active{display:flex}

    #jitsiContainer{flex:1;background:#000}
    #jitsiContainer iframe{width:100%!important;height:100%!important;border:none!important}

    /* 하단 정보바 */
    .info-bar{
      padding:8px 16px;
      background:rgba(13,27,62,.95);
      border-top:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
    .ib-room{font-size:12px;font-weight:600;color:#64b5f6}
    .ib-timer{font-size:11px;color:#78909c;font-variant-numeric:tabular-nums}
    .btn-leave{
      padding:6px 14px;border:none;border-radius:6px;
      background:rgba(244,67,54,.15);color:#ef5350;
      font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
      transition:all .2s;border:1px solid rgba(244,67,54,.2);
    }
    .btn-leave:hover{background:rgba(244,67,54,.25)}

    /* 토스트 */
    .toast{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.9);color:#fff;
      padding:8px 18px;border-radius:20px;
      font-size:12px;font-weight:600;z-index:9999;
      opacity:0;transition:opacity .3s;pointer-events:none;
      border:1px solid rgba(255,255,255,.1);
    }
    .toast.show{opacity:1}

    /* 모바일 대응 */
    @media(max-width:480px){
      .lobby{padding:16px;gap:16px}
      .lobby-icon{width:64px;height:64px;font-size:28px;border-radius:18px}
      .lobby-title{font-size:19px}
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <a class="hdr-back" href="https://knagbyeongju-123.github.io/smtec_main2/index.html">← 메인</a>
    <h1>📹 화상회의</h1>
    <span class="hdr-badge">Jitsi</span>
  </div>
</div>

<div class="main">
  <!-- 로비 -->
  <div class="lobby" id="lobby">
    <div class="lobby-icon">📹</div>
    <div class="lobby-title">화상회의 시작</div>
    <div class="lobby-desc">회의방 이름을 입력하고 참여하세요.<br>같은 방 이름을 사용하면 자동으로 연결됩니다.</div>

    <div class="lobby-form">
      <div class="fg">
        <label>회의방 이름</label>
        <input type="text" id="roomName" placeholder="예: 생산팀-회의" autocomplete="off" spellcheck="false">
      </div>
      <div class="fg">
        <label>참가자 이름</label>
        <input type="text" id="userName" placeholder="예: 홍길동" autocomplete="off">
      </div>
      <div class="fg">
        <label>Jitsi 서버</label>
        <select id="serverSelect">
          <option value="meet.jit.si">meet.jit.si (기본, 무료)</option>
          <option value="8x8.vc">8x8.vc</option>
          <option value="jitsi.riot.im">jitsi.riot.im</option>
        </select>
      </div>
      <button class="btn-join" id="btnJoin" onclick="joinMeeting()">🎥 회의 참여</button>
    </div>

    <div class="recent-rooms" id="recentSection" style="display:none">
      <div class="recent-title">최근 회의방</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <!-- 회의 화면 -->
  <div class="meeting" id="meeting">
    <div id="jitsiContainer"></div>
    <div class="info-bar">
      <span class="ib-room" id="ibRoom">-</span>
      <span class="ib-timer" id="ibTimer">00:00:00</span>
      <button class="btn-leave" onclick="leaveMeeting()">회의 나가기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
// ===== 상태 =====
let api = null;
let timerInterval = null;
let startTime = null;
let recentRooms = JSON.parse(localStorage.getItem('MEET_RECENT') || '[]');

// ===== 초기화 =====
(function init() {
  // 저장된 이름 복원
  const savedName = localStorage.getItem('MEET_USER_NAME');
  if (savedName) document.getElementById('userName').value = savedName;
  renderRecent();

  // Enter키로 참여
  document.getElementById('roomName').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinMeeting();
  });
  document.getElementById('userName').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinMeeting();
  });

  // 포커스
  setTimeout(() => document.getElementById('roomName').focus(), 300);
})();

// ===== 회의 참여 =====
function joinMeeting(roomOverride) {
  const roomInput = document.getElementById('roomName');
  const userInput = document.getElementById('userName');
  const room = (roomOverride || roomInput.value).trim();
  const user = userInput.value.trim() || '참가자';

  if (!room) {
    showToast('회의방 이름을 입력하세요');
    roomInput.focus();
    return;
  }

  // 이름 저장
  localStorage.setItem('MEET_USER_NAME', user);

  // 최근 목록에 추가
  addRecent(room);

  // 방 이름 → Jitsi용 (공백→하이픈, 특수문자 제거)
  const jitsiRoom = 'mfg-' + room.replace(/[^a-zA-Z0-9가-힣\-_]/g, '-').replace(/-+/g, '-');
  const server = document.getElementById('serverSelect').value;

  // UI 전환
  document.getElementById('lobby').classList.add('hidden');
  const meetingEl = document.getElementById('meeting');
  meetingEl.classList.add('active');
  document.getElementById('ibRoom').textContent = '🔴 ' + room;

  // Jitsi 생성
  const container = document.getElementById('jitsiContainer');
  container.innerHTML = '';

  try {
    const domain = server;
    const options = {
      roomName: jitsiRoom,
      width: '100%',
      height: '100%',
      parentNode: container,
      userInfo: {
        displayName: user
      },
      configOverwrite: {
        startWithAudioMuted: false,
        startWithVideoMuted: false,
        prejoinPageEnabled: false,
        disableDeepLinking: true,
        defaultLanguage: 'ko',
        toolbarButtons: [
          'microphone', 'camera', 'desktop', 'chat',
          'raisehand', 'participants-pane', 'tileview',
          'select-background', 'fullscreen', 'settings'
        ],
        notifications: [],
        disableThirdPartyRequests: true,
        enableClosePage: false,
      },
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_BRAND_WATERMARK: false,
        SHOW_POWERED_BY: false,
        DEFAULT_BACKGROUND: '#0a0e1a',
        TOOLBAR_ALWAYS_VISIBLE: true,
        MOBILE_APP_PROMO: false,
        HIDE_INVITE_MORE_HEADER: true,
        DISABLE_JOIN_LEAVE_NOTIFICATIONS: true,
      }
    };

    api = new JitsiMeetExternalAPI(domain, options);

    api.addListener('videoConferenceJoined', () => {
      showToast('✅ 회의에 참여했습니다');
      startTimer();
    });

    api.addListener('videoConferenceLeft', () => {
      leaveMeeting();
    });

    api.addListener('participantJoined', (p) => {
      showToast('👋 ' + (p.displayName || '참가자') + ' 입장');
    });

    api.addListener('participantLeft', (p) => {
      showToast('🚪 참가자 퇴장');
    });

  } catch (e) {
    showToast('⚠ Jitsi 연결 실패: ' + e.message);
    console.error('Jitsi error:', e);
    leaveMeeting();
  }
}

// ===== 회의 나가기 =====
function leaveMeeting() {
  if (api) {
    try { api.dispose(); } catch (e) {}
    api = null;
  }
  stopTimer();

  document.getElementById('meeting').classList.remove('active');
  document.getElementById('lobby').classList.remove('hidden');
  document.getElementById('jitsiContainer').innerHTML = '';
  showToast('회의를 종료했습니다');
}

// ===== 타이머 =====
function startTimer() {
  startTime = Date.now();
  stopTimer();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('ibTimer').textContent = h + ':' + m + ':' + s;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('ibTimer').textContent = '00:00:00';
}

// ===== 최근 회의방 =====
function addRecent(room) {
  recentRooms = recentRooms.filter(r => r.name !== room);
  recentRooms.unshift({ name: room, time: new Date().toLocaleString('ko-KR') });
  if (recentRooms.length > 8) recentRooms.length = 8;
  localStorage.setItem('MEET_RECENT', JSON.stringify(recentRooms));
  renderRecent();
}

function renderRecent() {
  const sec = document.getElementById('recentSection');
  const list = document.getElementById('recentList');
  if (!recentRooms.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = '';
  recentRooms.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'recent-item';
    div.innerHTML = `
      <span class="ri-name">${esc(r.name)}</span>
      <span class="ri-time">${r.time}</span>
      <button class="ri-del" onclick="event.stopPropagation();delRecent(${i})" title="삭제">✕</button>
    `;
    div.addEventListener('click', () => {
      document.getElementById('roomName').value = r.name;
      joinMeeting(r.name);
    });
    list.appendChild(div);
  });
}

function delRecent(i) {
  recentRooms.splice(i, 1);
  localStorage.setItem('MEET_RECENT', JSON.stringify(recentRooms));
  renderRecent();
}

function esc(s) { return s.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ===== 토스트 =====
let tt;
function showToast(m) {
  const el = document.getElementById('toast');
  el.textContent = m;
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== 뒤로가기 처리 =====
window.addEventListener('beforeunload', (e) => {
  if (api) {
    e.preventDefault();
    e.returnValue = '회의 중입니다. 나가시겠습니까?';
  }
});
</script>
</body>
</html>
