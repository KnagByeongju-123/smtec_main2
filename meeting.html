<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회의록 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
/* 헤더 */
.hdr{background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-0.5px}
.hdr p{font-size:10px;opacity:.65;margin-top:2px}
/* 탭 */
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:48px;z-index:90}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#999;transition:.2s}
.tab.on{color:#0f3460;border-bottom-color:#0f3460}
/* 패널 */
.pnl{display:none;padding:12px;max-width:800px;margin:0 auto}.pnl.on{display:block}
/* 카드 */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#0f3460}
/* 입력 */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fg label .req{color:#e63946;margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#0f3460;background:#fff;box-shadow:0 0 0 3px rgba(15,52,96,.08)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6}
.fg select{appearance:auto}
/* 버튼 */
.btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff;box-shadow:0 2px 8px rgba(15,52,96,.2)}
.btn-green{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;box-shadow:0 2px 8px rgba(0,184,148,.2)}
.btn-red{background:#fff;color:#e63946;border:1.5px solid #e63946}
.btn-gray{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-row{display:flex;gap:8px;margin-bottom:12px}
.btn-row .btn{flex:1}
/* 리스트 아이템 */
.m-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:.15s;border-left:4px solid #0f3460}
.m-item:active{transform:scale(.99)}
.m-item .m-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.m-item .m-meta{font-size:11px;color:#888;display:flex;flex-wrap:wrap;gap:6px}
.m-item .m-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-정기{background:#dfe6e9;color:#2d3436}
.badge-긴급{background:#ffeaa7;color:#d63031}
.badge-프로젝트{background:#dfe6fd;color:#0f3460}
.badge-기타{background:#f0f0f0;color:#636e72}
.badge-site{background:#e8f8f5;color:#00b894}
/* 후속조치 */
.action-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.action-item:last-child{border:none}
.action-chk{width:20px;height:20px;border-radius:4px;border:2px solid #ddd;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:.2s}
.action-chk.done{background:#00b894;border-color:#00b894}
.action-body{flex:1;min-width:0}
.action-body .a-text{font-size:13px;font-weight:500;color:#333}
.action-body .a-meta{font-size:11px;color:#888;margin-top:2px}
.action-body.done-text .a-text{text-decoration:line-through;color:#aaa}
/* 사진 그리드 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #eee}
.photo-grid img:active{opacity:.8}
/* 이미지 모달 */
.img-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
.img-modal.show{display:flex}
.img-modal img{max-width:95%;max-height:80vh;border-radius:8px}
.img-modal .close-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer}
/* 검색/필터 */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;flex:1;min-width:0}
/* 로딩 */
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #ddd;border-top-color:#0f3460;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 빈 상태 */
.empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}
/* 토스트 */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* 설정 칩 */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f0f0f0;border-radius:16px;font-size:12px;margin:3px}
.chip .chip-del{border:none;background:none;color:#e63946;font-weight:700;cursor:pointer;font-size:14px;padding:0 2px}
/* 후속조치 인라인 입력 */
.act-add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.act-add-row input,.act-add-row select{padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
/* 상태바 */
.status-bar{padding:6px 12px;font-size:11px;text-align:center;background:#e8f8f5;color:#00b894;font-weight:600;border-radius:8px;margin-bottom:8px}
.status-bar.err{background:#ffeaea;color:#e63946}
</style>
</head>
<body>

<div class="hdr">
  <h1>📋 회의록 관리 시스템</h1>
  <p>사업장 간 회의록 공유 · NocoDB 연동</p>
</div>

<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📋 목록</div>
  <div class="tab" onclick="swTab(1)">✏️ 작성</div>
  <div class="tab" onclick="swTab(2)">📊 현황</div>
  <div class="tab" onclick="swTab(3)">⚙️ 설정</div>
</div>

<!-- 목록 -->
<div class="pnl on" id="pnl0">
  <div class="filter-bar">
    <select id="fSite" onchange="loadList()"><option value="">전체 사업장</option></select>
    <select id="fType" onchange="loadList()">
      <option value="">전체 유형</option>
      <option>정기회의</option><option>긴급회의</option><option>프로젝트회의</option><option>기타</option>
    </select>
    <input type="month" id="fMonth" onchange="loadList()" style="flex:.8">
  </div>
  <div id="listArea"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
</div>

<!-- 작성/수정 -->
<div class="pnl" id="pnl1">
  <div class="card">
    <div class="card-tit">✏️ <span id="formTitle">새 회의록 작성</span></div>
    <input type="hidden" id="editId" value="">
    <div class="fg">
      <label>회의제목 <span class="req">*</span></label>
      <input type="text" id="iTitle" placeholder="회의 제목을 입력하세요">
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1">
        <label>회의일시 <span class="req">*</span></label>
        <input type="datetime-local" id="iDate">
      </div>
      <div class="fg" style="flex:1">
        <label>사업장 <span class="req">*</span></label>
        <select id="iSite"><option value="">선택</option></select>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1">
        <label>회의유형</label>
        <select id="iType">
          <option value="">선택</option>
          <option>정기회의</option><option>긴급회의</option><option>프로젝트회의</option><option>기타</option>
        </select>
      </div>
      <div class="fg" style="flex:1">
        <label>회의장소</label>
        <input type="text" id="iPlace" placeholder="장소">
      </div>
    </div>
    <div class="fg">
      <label>참석자</label>
      <input type="text" id="iAttendees" placeholder="참석자 (쉼표로 구분)">
    </div>
    <div class="fg">
      <label>안건</label>
      <textarea id="iAgenda" placeholder="회의 안건을 입력하세요" rows="2"></textarea>
    </div>
    <div class="fg">
      <label>회의내용 <span class="req">*</span></label>
      <textarea id="iContent" placeholder="회의 내용을 상세히 입력하세요" rows="5"></textarea>
    </div>
    <div class="fg">
      <label>결정사항</label>
      <textarea id="iDecision" placeholder="결정된 사항을 입력하세요" rows="3"></textarea>
    </div>
    <div class="fg">
      <label>작성자</label>
      <input type="text" id="iAuthor" placeholder="작성자명">
    </div>
    <div class="fg">
      <label>비고</label>
      <textarea id="iNote" placeholder="기타 비고사항" rows="2"></textarea>
    </div>
  </div>

  <!-- 첨부사진 -->
  <div class="card">
    <div class="card-tit">📷 첨부사진</div>
    <div class="btn-row">
      <button class="btn btn-sm btn-gray" onclick="document.getElementById('photoInput').click()">📷 사진 추가</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
    <div class="photo-grid" id="photoPreview"></div>
    <div id="photoStatus" style="font-size:11px;color:#888;margin-top:4px"></div>
  </div>

  <!-- 후속조치 -->
  <div class="card">
    <div class="card-tit">📌 후속조치</div>
    <div id="actionList"></div>
    <div class="act-add-row">
      <input type="text" id="actText" placeholder="조치내용" style="flex:2">
      <input type="text" id="actPerson" placeholder="담당자" style="flex:1">
      <input type="date" id="actDue" style="flex:1">
      <button class="btn btn-sm btn-primary" onclick="addAction()" style="flex:0;white-space:nowrap">+ 추가</button>
    </div>
  </div>

  <div class="btn-row" style="margin-top:4px">
    <button class="btn btn-primary" onclick="saveMeeting()" id="btnSave">💾 저장</button>
    <button class="btn btn-gray" onclick="resetForm();swTab(0)">취소</button>
  </div>
</div>

<!-- 현황 -->
<div class="pnl" id="pnl2">
  <div class="card">
    <div class="card-tit">📊 후속조치 현황</div>
    <div id="statsArea"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="card">
    <div class="card-tit">📌 미완료 후속조치</div>
    <div id="pendingActions"><div class="empty">조회 중...</div></div>
  </div>
</div>

<!-- 설정 -->
<div class="pnl" id="pnl3">
  <div class="card">
    <div class="card-tit">🏢 사업장 관리</div>
    <div id="siteChips"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <input type="text" id="newSite" placeholder="사업장명 입력" style="flex:1;padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit">
      <button class="btn btn-sm btn-primary" onclick="addSetting('사업장')">추가</button>
    </div>
  </div>
  <div class="card">
    <div class="card-tit">🔧 DB 초기화</div>
    <div id="dbStatus" class="status-bar">확인 중...</div>
    <button class="btn btn-sm btn-primary" onclick="initTables()" style="margin-top:8px">테이블 자동 생성</button>
    <p style="font-size:11px;color:#888;margin-top:6px">처음 사용 시 한번만 실행하세요. 회의록·후속조치·설정 테이블이 생성됩니다.</p>
  </div>
</div>

<!-- 상세보기 모달 (전체화면) -->
<div id="detailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f0f2f5;z-index:200;overflow-y:auto">
  <div style="position:sticky;top:0;background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:10">
    <button onclick="closeDetail()" style="border:none;background:rgba(255,255,255,.15);color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer">←</button>
    <span style="font-size:15px;font-weight:700;flex:1" id="detailTitle">회의록 상세</span>
    <button class="btn btn-sm" onclick="editFromDetail()" style="background:rgba(255,255,255,.15);color:#fff;font-size:11px">수정</button>
    <button class="btn btn-sm" onclick="deleteFromDetail()" style="background:rgba(230,57,70,.8);color:#fff;font-size:11px">삭제</button>
  </div>
  <div style="padding:12px;max-width:800px;margin:0 auto" id="detailBody"></div>
</div>

<!-- 이미지 확대 모달 -->
<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')">
  <button class="close-btn" onclick="event.stopPropagation();document.getElementById('imgModal').classList.remove('show')">✕</button>
  <img id="imgModalSrc" src="">
</div>

<div class="toast" id="toast"></div>

<script>
// ===== NocoDB 설정 =====
const API = 'https://app.nocodb.com/api/v2';
const TOKEN = 'mi9vXBv5w9h10RcshLNFexjEqzXhU0EUtYlNXAmw';
const BASE_ID = 'p7ex9mwekhxgjsi';

// 테이블 ID (초기화 시 설정됨)
let TBL = { 회의록: '', 후속조치: '', 설정: '' };
// 필드명 매핑 캐시
let FIELDS = {};

const H = { 'xc-token': TOKEN, 'Content-Type': 'application/json' };

async function api(method, path, body) {
  const opts = { method, headers: H };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) { const t = await res.text(); throw new Error(res.status + ': ' + t.substring(0, 200)); }
  const text = await res.text();
  try { return JSON.parse(text); } catch { return text; }
}

// 필드 값 가져오기 (title 기반, fallback)
function fv(row, ...names) {
  for (const n of names) { if (row[n] !== undefined && row[n] !== null) return row[n]; }
  return '';
}

// ===== 초기화: 테이블 탐색 =====
async function detectTables() {
  try {
    const res = await api('GET', '/meta/bases/' + BASE_ID + '/tables');
    const tables = res.list || [];
    tables.forEach(t => {
      if (TBL.hasOwnProperty(t.title)) {
        TBL[t.title] = t.id;
      }
    });
    // 필드 캐시
    for (const [name, id] of Object.entries(TBL)) {
      if (id) {
        const tbl = tables.find(t => t.id === id);
        if (tbl && tbl.columns) {
          FIELDS[name] = {};
          tbl.columns.forEach(c => { FIELDS[name][c.title] = c; });
        }
      }
    }
    console.log('Tables:', TBL);
    updateDbStatus();
    return true;
  } catch (e) {
    console.error('detectTables error:', e);
    document.getElementById('dbStatus').textContent = 'DB 연결 실패: ' + e.message;
    document.getElementById('dbStatus').className = 'status-bar err';
    return false;
  }
}

function updateDbStatus() {
  const el = document.getElementById('dbStatus');
  const missing = Object.entries(TBL).filter(([k, v]) => !v).map(([k]) => k);
  if (missing.length === 0) {
    el.textContent = '✅ 모든 테이블 정상 연결';
    el.className = 'status-bar';
  } else {
    el.textContent = '⚠ 누락 테이블: ' + missing.join(', ');
    el.className = 'status-bar err';
  }
}

// ===== 테이블 생성 =====
async function initTables() {
  if (!confirm('회의록·후속조치·설정 테이블을 생성합니다.\n기존 테이블이 있으면 건너뜁니다.')) return;
  const st = document.getElementById('dbStatus');
  st.textContent = '테이블 생성 중...'; st.className = 'status-bar';

  try {
    // 현재 테이블 목록 갱신
    await detectTables();

    if (!TBL['회의록']) {
      const r = await api('POST', '/meta/bases/' + BASE_ID + '/tables', {
        title: '회의록',
        columns: [
          { title: '회의제목', uidt: 'SingleLineText' },
          { title: '회의일시', uidt: 'DateTime' },
          { title: '회의장소', uidt: 'SingleLineText' },
          { title: '회의유형', uidt: 'SingleSelect', dtxp: "'정기회의','긴급회의','프로젝트회의','기타'" },
          { title: '사업장', uidt: 'SingleSelect', dtxp: "'본사','법인1','법인2','법인3','법인4','법인5'" },
          { title: '참석자', uidt: 'LongText' },
          { title: '안건', uidt: 'LongText' },
          { title: '회의내용', uidt: 'LongText' },
          { title: '결정사항', uidt: 'LongText' },
          { title: '첨부사진', uidt: 'Attachment' },
          { title: '작성자', uidt: 'SingleLineText' },
          { title: '작성일', uidt: 'Date' },
          { title: '비고', uidt: 'LongText' }
        ]
      });
      TBL['회의록'] = r.id;
      console.log('회의록 table created:', r.id);
    }

    if (!TBL['후속조치']) {
      const r = await api('POST', '/meta/bases/' + BASE_ID + '/tables', {
        title: '후속조치',
        columns: [
          { title: '회의록ID', uidt: 'SingleLineText' },
          { title: '회의제목', uidt: 'SingleLineText' },
          { title: '조치내용', uidt: 'SingleLineText' },
          { title: '담당자', uidt: 'SingleLineText' },
          { title: '기한', uidt: 'Date' },
          { title: '완료여부', uidt: 'Checkbox' },
          { title: '완료일', uidt: 'Date' },
          { title: '진행상태', uidt: 'SingleSelect', dtxp: "'대기','진행중','완료','지연'" },
          { title: '비고', uidt: 'LongText' }
        ]
      });
      TBL['후속조치'] = r.id;
      console.log('후속조치 table created:', r.id);
    }

    if (!TBL['설정']) {
      const r = await api('POST', '/meta/bases/' + BASE_ID + '/tables', {
        title: '설정',
        columns: [
          { title: '구분', uidt: 'SingleSelect', dtxp: "'사업장','회의유형'" },
          { title: '코드값', uidt: 'SingleLineText' },
          { title: '표시명', uidt: 'SingleLineText' },
          { title: '정렬순서', uidt: 'Number' },
          { title: '사용여부', uidt: 'Checkbox' }
        ]
      });
      TBL['설정'] = r.id;
      console.log('설정 table created:', r.id);

      // 기본 사업장 데이터 삽입
      await api('POST', '/tables/' + TBL['설정'] + '/records', [
        { '구분': '사업장', '코드값': '본사', '표시명': '본사', '정렬순서': 1, '사용여부': true },
        { '구분': '사업장', '코드값': '법인1', '표시명': '법인1', '정렬순서': 2, '사용여부': true },
        { '구분': '사업장', '코드값': '법인2', '표시명': '법인2', '정렬순서': 3, '사용여부': true },
        { '구분': '사업장', '코드값': '법인3', '표시명': '법인3', '정렬순서': 4, '사용여부': true },
        { '구분': '사업장', '코드값': '법인4', '표시명': '법인4', '정렬순서': 5, '사용여부': true },
        { '구분': '사업장', '코드값': '법인5', '표시명': '법인5', '정렬순서': 6, '사용여부': true },
      ]);
    }

    await detectTables();
    updateDbStatus();
    showToast('✅ 테이블 생성 완료');
    loadSettings();
  } catch (e) {
    st.textContent = '❌ 생성 실패: ' + e.message; st.className = 'status-bar err';
    console.error(e);
  }
}

// ===== 설정 로드 =====
let sites = [];
async function loadSettings() {
  if (!TBL['설정']) return;
  try {
    const res = await api('GET', '/tables/' + TBL['설정'] + '/records?limit=200&where=(구분,eq,사업장)&sort=-정렬순서');
    const rows = res.list || [];
    sites = rows.map(r => fv(r, '표시명', '코드값')).filter(Boolean);
    if (sites.length === 0) sites = ['본사', '법인1', '법인2', '법인3', '법인4', '법인5'];
  } catch (e) {
    console.log('설정 로드 실패, 기본값 사용:', e);
    sites = ['본사', '법인1', '법인2', '법인3', '법인4', '법인5'];
  }
  renderSiteOptions();
  renderSiteChips();
}

function renderSiteOptions() {
  ['fSite', 'iSite'].forEach(id => {
    const el = document.getElementById(id);
    const cur = el.value;
    const isFilter = id === 'fSite';
    el.innerHTML = isFilter ? '<option value="">전체 사업장</option>' : '<option value="">선택</option>';
    sites.forEach(s => { el.innerHTML += '<option value="' + s + '"' + (s === cur ? ' selected' : '') + '>' + s + '</option>'; });
  });
}

function renderSiteChips() {
  const c = document.getElementById('siteChips');
  c.innerHTML = sites.map(s => '<span class="chip">' + s + '<button class="chip-del" onclick="removeSite(\'' + s + '\')">✕</button></span>').join('');
}

async function addSetting(type) {
  const inp = document.getElementById('newSite');
  const val = inp.value.trim();
  if (!val) return;
  if (sites.includes(val)) { showToast('이미 존재합니다'); return; }

  if (TBL['설정']) {
    try {
      await api('POST', '/tables/' + TBL['설정'] + '/records', {
        '구분': type, '코드값': val, '표시명': val, '정렬순서': sites.length + 1, '사용여부': true
      });
    } catch (e) { console.log('설정 저장 실패:', e); }
  }
  sites.push(val);
  inp.value = '';
  renderSiteOptions();
  renderSiteChips();

  // 회의록 테이블의 사업장 SingleSelect에 옵션 추가
  await updateSiteSelectOptions();
  showToast('✅ ' + val + ' 추가');
}

async function removeSite(val) {
  if (!confirm(val + ' 사업장을 삭제하시겠습니까?')) return;
  sites = sites.filter(s => s !== val);
  // NocoDB에서도 삭제
  if (TBL['설정']) {
    try {
      const res = await api('GET', '/tables/' + TBL['설정'] + '/records?where=(코드값,eq,' + encodeURIComponent(val) + ')~and(구분,eq,사업장)');
      const rows = res.list || [];
      for (const r of rows) {
        await api('DELETE', '/tables/' + TBL['설정'] + '/records', { Id: r.Id });
      }
    } catch (e) { console.log('설정 삭제 실패:', e); }
  }
  renderSiteOptions();
  renderSiteChips();
  showToast(val + ' 삭제됨');
}

async function updateSiteSelectOptions() {
  if (!TBL['회의록']) return;
  // 회의록 테이블의 사업장 컬럼 찾기
  try {
    const res = await api('GET', '/meta/bases/' + BASE_ID + '/tables');
    const tbl = (res.list || []).find(t => t.id === TBL['회의록']);
    if (!tbl) return;
    const col = tbl.columns.find(c => c.title === '사업장');
    if (!col) return;
    const dtxp = sites.map(s => "'" + s + "'").join(',');
    await api('PATCH', '/meta/columns/' + col.id, { dtxp });
  } catch (e) { console.log('사업장 옵션 업데이트 실패:', e); }
}

// ===== 탭 전환 =====
function swTab(n) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === n));
  document.querySelectorAll('.pnl').forEach((p, i) => p.classList.toggle('on', i === n));
  if (n === 0) loadList();
  if (n === 1 && !document.getElementById('editId').value) resetForm();
  if (n === 2) loadStats();
  if (n === 3) loadSettings();
}

// ===== 회의록 목록 =====
async function loadList() {
  const area = document.getElementById('listArea');
  if (!TBL['회의록']) { area.innerHTML = '<div class="empty">⚙️ 설정 탭에서 먼저 테이블을 생성하세요</div>'; return; }
  area.innerHTML = '<div class="loading"><div class="spinner"></div><br>불러오는 중...</div>';

  try {
    let where = [];
    const fSite = document.getElementById('fSite').value;
    const fType = document.getElementById('fType').value;
    const fMonth = document.getElementById('fMonth').value;
    if (fSite) where.push('(사업장,eq,' + fSite + ')');
    if (fType) where.push('(회의유형,eq,' + fType + ')');
    if (fMonth) {
      const [y, m] = fMonth.split('-');
      const start = y + '-' + m + '-01';
      const end = y + '-' + m + '-31';
      where.push('(회의일시,gte,' + start + ')');
      where.push('(회의일시,lte,' + end + ' 23:59:59)');
    }

    let url = '/tables/' + TBL['회의록'] + '/records?limit=100&sort=-회의일시';
    if (where.length) url += '&where=' + where.join('~and');

    const res = await api('GET', url);
    const rows = res.list || [];

    if (!rows.length) { area.innerHTML = '<div class="empty">등록된 회의록이 없습니다</div>'; return; }

    area.innerHTML = '';
    rows.forEach(r => {
      const title = fv(r, '회의제목') || '(제목없음)';
      const dt = fv(r, '회의일시');
      const site = fv(r, '사업장');
      const type = fv(r, '회의유형');
      const author = fv(r, '작성자');
      const place = fv(r, '회의장소');

      let dateStr = '';
      if (dt) {
        try { dateStr = new Date(dt).toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch { dateStr = dt; }
      }

      const typeCls = type === '긴급회의' ? 'badge-긴급' : type === '프로젝트회의' ? 'badge-프로젝트' : type === '정기회의' ? 'badge-정기' : 'badge-기타';

      const div = document.createElement('div');
      div.className = 'm-item';
      div.onclick = () => showDetail(r.Id);
      div.innerHTML = '<div class="m-title">' + esc(title) + '</div>'
        + '<div class="m-meta">'
        + (type ? '<span class="m-badge ' + typeCls + '">' + type + '</span>' : '')
        + (site ? '<span class="m-badge badge-site">' + site + '</span>' : '')
        + (dateStr ? '<span>' + dateStr + '</span>' : '')
        + (place ? '<span>📍' + esc(place) + '</span>' : '')
        + (author ? '<span>✍️' + esc(author) + '</span>' : '')
        + '</div>';
      area.appendChild(div);
    });
  } catch (e) {
    area.innerHTML = '<div class="empty" style="color:#e63946">목록 조회 실패: ' + e.message + '</div>';
    console.error(e);
  }
}

// ===== 상세보기 =====
let currentDetailId = null;
async function showDetail(id) {
  currentDetailId = id;
  const modal = document.getElementById('detailModal');
  const body = document.getElementById('detailBody');
  modal.style.display = 'block';
  body.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const r = await api('GET', '/tables/' + TBL['회의록'] + '/records/' + id);
    const title = fv(r, '회의제목') || '(제목없음)';
    document.getElementById('detailTitle').textContent = title;

    const dt = fv(r, '회의일시');
    let dateStr = '';
    if (dt) try { dateStr = new Date(dt).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', hour: '2-digit', minute: '2-digit' }); } catch { dateStr = dt; }

    let html = '<div class="card">';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
    const type = fv(r, '회의유형');
    const site = fv(r, '사업장');
    if (type) { const cls = type === '긴급회의' ? 'badge-긴급' : type === '프로젝트회의' ? 'badge-프로젝트' : type === '정기회의' ? 'badge-정기' : 'badge-기타'; html += '<span class="m-badge ' + cls + '">' + type + '</span>'; }
    if (site) html += '<span class="m-badge badge-site">' + site + '</span>';
    html += '</div>';

    const fields = [
      ['📅 일시', dateStr],
      ['📍 장소', fv(r, '회의장소')],
      ['👥 참석자', fv(r, '참석자')],
      ['✍️ 작성자', fv(r, '작성자')]
    ];
    fields.forEach(([label, val]) => {
      if (val) html += '<div style="margin-bottom:8px"><span style="font-size:11px;color:#888">' + label + '</span><div style="font-size:13px;font-weight:500;margin-top:2px">' + esc(String(val)) + '</div></div>';
    });
    html += '</div>';

    const sections = [
      ['📋 안건', fv(r, '안건')],
      ['📝 회의내용', fv(r, '회의내용')],
      ['✅ 결정사항', fv(r, '결정사항')],
      ['📎 비고', fv(r, '비고')]
    ];
    sections.forEach(([label, val]) => {
      if (val) html += '<div class="card"><div class="card-tit">' + label + '</div><div style="font-size:13px;line-height:1.8;white-space:pre-wrap;color:#333">' + esc(String(val)) + '</div></div>';
    });

    // 첨부사진
    const photos = fv(r, '첨부사진');
    if (photos && Array.isArray(photos) && photos.length) {
      html += '<div class="card"><div class="card-tit">📷 첨부사진 (' + photos.length + '장)</div><div class="photo-grid">';
      photos.forEach(p => {
        const url = p.signedUrl || p.url || p.path || '';
        if (url) html += '<img src="' + url + '" onclick="showImgModal(\'' + url + '\')" loading="lazy">';
      });
      html += '</div></div>';
    }

    // 후속조치
    if (TBL['후속조치']) {
      try {
        const actRes = await api('GET', '/tables/' + TBL['후속조치'] + '/records?where=(회의록ID,eq,' + id + ')&sort=기한');
        const actions = actRes.list || [];
        if (actions.length) {
          html += '<div class="card"><div class="card-tit">📌 후속조치 (' + actions.length + '건)</div>';
          actions.forEach(a => {
            const done = fv(a, '완료여부');
            const text = fv(a, '조치내용');
            const person = fv(a, '담당자');
            const due = fv(a, '기한');
            const status = fv(a, '진행상태') || (done ? '완료' : '대기');
            const dueStr = due ? new Date(due).toLocaleDateString('ko-KR') : '';
            const isOverdue = due && !done && new Date(due) < new Date();

            html += '<div class="action-item">';
            html += '<div class="action-chk ' + (done ? 'done' : '') + '" onclick="toggleAction(' + a.Id + ',' + (!done) + ')">' + (done ? '✓' : '') + '</div>';
            html += '<div class="action-body ' + (done ? 'done-text' : '') + '">';
            html += '<div class="a-text">' + esc(text) + '</div>';
            html += '<div class="a-meta">' + (person ? '👤' + esc(person) : '') + (dueStr ? ' 📅' + dueStr : '') + ' <span style="color:' + (status === '완료' ? '#00b894' : isOverdue ? '#e63946' : '#f39c12') + ';font-weight:600">' + status + '</span></div>';
            html += '</div></div>';
          });
          html += '</div>';
        }
      } catch (e) { console.log('후속조치 로드 실패:', e); }
    }

    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = '<div class="empty" style="color:#e63946">조회 실패: ' + e.message + '</div>';
  }
}

function closeDetail() {

}

async function editFromDetail() {

    document.getElementById('iType').value = fv(r, '회의유형');
    document.getElementById('iSite').value = fv(r, '사업장');
    document.getElementById('iAttendees').value = fv(r, '참석자');
    document.getElementById('iAgenda').value = fv(r, '안건');
    document.getElementById('iContent').value = fv(r, '회의내용');
    document.getElementById('iDecision').value = fv(r, '결정사항');
    document.getElementById('iAuthor').value = fv(r, '작성자');
    document.getElementById('iNote').value = fv(r, '비고');

    // 후속조치 로드
    pendingActions = [];
    if (TBL['후속조치']) {
      const actRes = await api('GET', '/tables/' + TBL['후속조치'] + '/records?where=(회의록ID,eq,' + currentDetailId + ')&sort=기한');
      pendingActions = (actRes.list || []).map(a => ({
        id: a.Id,
        text: fv(a, '조치내용'),
        person: fv(a, '담당자'),
        due: fv(a, '기한') ? fv(a, '기한').split('T')[0] : '',
        done: !!fv(a, '완료여부'),
        status: fv(a, '진행상태') || '대기'
      }));
    }
    renderActions();

    // 사진은 수정 시 기존 것 표시
    photoFiles = [];
    existingPhotos = [];

    if (photos && Array.isArray(photos)) existingPhotos = photos;
    renderPhotoPreview();

    closeDetail();
    swTab(1);
  } catch (e) { showToast('수정 불러오기 실패: ' + e.message); }

async function deleteFromDetail() {
  if (!currentDetailId) return;
  if (!confirm('이 회의록을 삭제하시겠습니까?')) return;
  try {
    // 후속조치도 삭제
    if (TBL['후속조치']) {
      const actRes = await api('GET', '/tables/' + TBL['후속조치'] + '/records?where=(회의록ID,eq,' + currentDetailId + ')');
      const acts = actRes.list || [];
      for (const a of acts) {
        await api('DELETE', '/tables/' + TBL['후속조치'] + '/records', { Id: a.Id });
      }
    }
    await api('DELETE', '/tables/' + TBL['회의록'] + '/records', { Id: currentDetailId });
    closeDetail();
    showToast('✅ 삭제 완료');
    loadList();
  } catch (e) { showToast('삭제 실패: ' + e.message); }
}

// ===== 후속조치 토글 =====
async function toggleAction(id, val) {
  if (!TBL['후속조치']) return;
  try {
    const update = { Id: id, '완료여부': val, '진행상태': val ? '완료' : '대기' };
    if (val) update['완료일'] = new Date().toISOString().split('T')[0];
    await api('PATCH', '/tables/' + TBL['후속조치'] + '/records', update);
    showToast(val ? '✅ 완료 처리' : '↩ 미완료 처리');
    if (currentDetailId) showDetail(currentDetailId);
  } catch (e) { showToast('상태 변경 실패: ' + e.message); }
}

// ===== 회의록 작성/수정 =====
let pendingActions = [];
let photoFiles = [];
let existingPhotos = [];

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = '새 회의록 작성';
  ['iTitle', 'iPlace', 'iAttendees', 'iAgenda', 'iContent', 'iDecision', 'iNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('iType').value = '';
  document.getElementById('iSite').value = '';
  document.getElementById('iAuthor').value = localStorage.getItem('MEETING_AUTHOR') || '';
  // 기본 날짜/시간
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('iDate').value = now.toISOString().slice(0, 16);
  pendingActions = [];
  photoFiles = [];
  existingPhotos = [];
  renderActions();
  renderPhotoPreview();
}

function addAction() {
  const text = document.getElementById('actText').value.trim();
  const person = document.getElementById('actPerson').value.trim();
  const due = document.getElementById('actDue').value;
  if (!text) { showToast('조치내용을 입력하세요'); return; }
  pendingActions.push({ text, person, due, done: false, status: '대기' });
  document.getElementById('actText').value = '';
  document.getElementById('actPerson').value = '';
  document.getElementById('actDue').value = '';
  renderActions();
}

function removeAction(idx) {
  pendingActions.splice(idx, 1);
  renderActions();
}

function renderActions() {
  const c = document.getElementById('actionList');
  if (!pendingActions.length) { c.innerHTML = '<div style="font-size:12px;color:#bbb;padding:8px 0">후속조치 항목이 없습니다</div>'; return; }
  c.innerHTML = '';
  pendingActions.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'action-item';
    div.innerHTML = '<div class="action-body"><div class="a-text">' + esc(a.text) + '</div>'
      + '<div class="a-meta">' + (a.person ? '👤' + esc(a.person) : '') + (a.due ? ' 📅' + a.due : '') + '</div></div>'
      + '<button class="btn btn-sm btn-red" onclick="removeAction(' + i + ')" style="flex:0;padding:4px 8px;font-size:11px">✕</button>';
    c.appendChild(div);
  });
}

// ===== 사진 처리 =====
function handlePhotos(input) {
  const files = Array.from(input.files);
  files.forEach(f => photoFiles.push(f));
  input.value = '';
  renderPhotoPreview();
}

function renderPhotoPreview() {
  const grid = document.getElementById('photoPreview');
  const status = document.getElementById('photoStatus');
  grid.innerHTML = '';

  // 기존 사진
  existingPhotos.forEach((p, i) => {
    const url = p.signedUrl || p.url || p.path || '';
    if (url) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative';
      wrap.innerHTML = '<img src="' + url + '" onclick="showImgModal(\'' + url + '\')" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid #eee">'
        + '<button onclick="existingPhotos.splice(' + i + ',1);renderPhotoPreview()" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#e63946;color:#fff;border:none;font-size:12px;cursor:pointer">✕</button>';
      grid.appendChild(wrap);
    }
  });

  // 새 사진
  photoFiles.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative';
    const img = document.createElement('img');
    img.style.cssText = 'width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:2px solid #00b894';
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.readAsDataURL(f);
    wrap.appendChild(img);
    const btn = document.createElement('button');
    btn.style.cssText = 'position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#e63946;color:#fff;border:none;font-size:12px;cursor:pointer';
    btn.textContent = '✕';
    btn.onclick = () => { photoFiles.splice(i, 1); renderPhotoPreview(); };
    wrap.appendChild(btn);
    grid.appendChild(wrap);
  });

  const total = existingPhotos.length + photoFiles.length;
  status.textContent = total ? total + '장 첨부' : '';
}

async function uploadPhotos(tableId, recordId) {
  if (!photoFiles.length) return null;
  const formData = new FormData();
  photoFiles.forEach(f => formData.append('file', f));

  const uploadRes = await fetch(API + '/storage/upload', {
    method: 'POST',
    headers: { 'xc-token': TOKEN },
    body: formData
  });
  const uploaded = await uploadRes.json();
  return uploaded;
}

// ===== 저장 =====
async function saveMeeting() {
  const title = document.getElementById('iTitle').value.trim();
  const date = document.getElementById('iDate').value;
  const content = document.getElementById('iContent').value.trim();
  const site = document.getElementById('iSite').value;

  if (!title) { showToast('회의제목을 입력하세요'); return; }
  if (!date) { showToast('회의일시를 선택하세요'); return; }
  if (!content) { showToast('회의내용을 입력하세요'); return; }
  if (!site) { showToast('사업장을 선택하세요'); return; }
  if (!TBL['회의록']) { showToast('설정 탭에서 테이블을 먼저 생성하세요'); return; }

  const editId = document.getElementById('editId').value;
  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').textContent = '저장 중...';

  try {
    const author = document.getElementById('iAuthor').value.trim();
    if (author) localStorage.setItem('MEETING_AUTHOR', author);

    // 사진 업로드
    let photoData = existingPhotos.length ? [...existingPhotos] : [];
    if (photoFiles.length) {
      const uploaded = await uploadPhotos(TBL['회의록']);
      if (uploaded && Array.isArray(uploaded)) {
        photoData = [...photoData, ...uploaded];
      }
    }

    const record = {
      '회의제목': title,
      '회의일시': date,
      '회의장소': document.getElementById('iPlace').value.trim(),
      '회의유형': document.getElementById('iType').value,
      '사업장': site,
      '참석자': document.getElementById('iAttendees').value.trim(),
      '안건': document.getElementById('iAgenda').value.trim(),
      '회의내용': content,
      '결정사항': document.getElementById('iDecision').value.trim(),
      '작성자': author,
      '작성일': new Date().toISOString().split('T')[0],
      '비고': document.getElementById('iNote').value.trim()
    };
    if (photoData.length) record['첨부사진'] = photoData;

    let savedId;
    if (editId) {
      record.Id = parseInt(editId);
      await api('PATCH', '/tables/' + TBL['회의록'] + '/records', record);
      savedId = editId;

      // 기존 후속조치 삭제 후 재등록
      if (TBL['후속조치']) {
        const oldActs = await api('GET', '/tables/' + TBL['후속조치'] + '/records?where=(회의록ID,eq,' + editId + ')');
        for (const a of (oldActs.list || [])) {
          await api('DELETE', '/tables/' + TBL['후속조치'] + '/records', { Id: a.Id });
        }
      }
    } else {
      const res = await api('POST', '/tables/' + TBL['회의록'] + '/records', record);
      savedId = res.Id || res.id;
    }

    // 후속조치 저장
    if (TBL['후속조치'] && pendingActions.length && savedId) {
      const actRecords = pendingActions.map(a => ({
        '회의록ID': String(savedId),
        '회의제목': title,
        '조치내용': a.text,
        '담당자': a.person,
        '기한': a.due || null,
        '완료여부': a.done,
        '진행상태': a.status || '대기'
      }));
      await api('POST', '/tables/' + TBL['후속조치'] + '/records', actRecords);
    }

    showToast('✅ ' + (editId ? '수정' : '등록') + ' 완료');
    resetForm();
    swTab(0);
  } catch (e) {
    showToast('저장 실패: ' + e.message);
    console.error(e);
  } finally {
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').textContent = '💾 저장';
  }
}

// ===== 현황 =====
async function loadStats() {
  if (!TBL['후속조치']) { document.getElementById('statsArea').innerHTML = '<div class="empty">테이블을 먼저 생성하세요</div>'; return; }
  try {
    const res = await api('GET', '/tables/' + TBL['후속조치'] + '/records?limit=500');
    const acts = res.list || [];
    const total = acts.length;
    const done = acts.filter(a => fv(a, '완료여부')).length;
    const pending = total - done;
    const overdue = acts.filter(a => {
      const due = fv(a, '기한');
      return !fv(a, '완료여부') && due && new Date(due) < new Date();
    }).length;

    document.getElementById('statsArea').innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">'
      + '<div style="padding:12px;background:#e8f8f5;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#00b894">' + done + '</div><div style="font-size:11px;color:#888">완료</div></div>'
      + '<div style="padding:12px;background:#fff3cd;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#f39c12">' + pending + '</div><div style="font-size:11px;color:#888">진행중</div></div>'
      + '<div style="padding:12px;background:#ffeaea;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#e63946">' + overdue + '</div><div style="font-size:11px;color:#888">지연</div></div>'
      + '</div>'
      + '<div style="margin-top:8px;font-size:12px;color:#888;text-align:center">전체 ' + total + '건</div>';

    // 미완료 목록
    const pendingArea = document.getElementById('pendingActions');
    const pendingActs = acts.filter(a => !fv(a, '완료여부')).sort((a, b) => {
      const da = fv(a, '기한'), db = fv(b, '기한');
      if (!da) return 1; if (!db) return -1;
      return new Date(da) - new Date(db);
    });

    if (!pendingActs.length) { pendingArea.innerHTML = '<div class="empty">🎉 모든 조치가 완료되었습니다</div>'; return; }

    pendingArea.innerHTML = '';
    pendingActs.forEach(a => {
      const text = fv(a, '조치내용');
      const person = fv(a, '담당자');
      const due = fv(a, '기한');
      const mtTitle = fv(a, '회의제목');
      const dueStr = due ? new Date(due).toLocaleDateString('ko-KR') : '';
      const isOverdue = due && new Date(due) < new Date();

      const div = document.createElement('div');
      div.className = 'action-item';
      div.innerHTML = '<div class="action-chk" onclick="toggleAction(' + a.Id + ',true)"></div>'
        + '<div class="action-body"><div class="a-text">' + esc(text) + '</div>'
        + '<div class="a-meta">' + (mtTitle ? '📋' + esc(mtTitle) + ' · ' : '') + (person ? '👤' + esc(person) : '') + (dueStr ? ' 📅<span style="color:' + (isOverdue ? '#e63946' : '#333') + '">' + dueStr + '</span>' : '') + '</div></div>';
      pendingArea.appendChild(div);
    });
  } catch (e) {
    document.getElementById('statsArea').innerHTML = '<div class="empty" style="color:#e63946">조회 실패: ' + e.message + '</div>';
  }
}

// ===== 유틸 =====
function esc(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function showImgModal(url) { document.getElementById('imgModalSrc').src = url; document.getElementById('imgModal').classList.add('show'); }

let tt;
function showToast(m) { const el = document.getElementById('toast'); el.textContent = m; el.classList.add('show'); clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2500); }

// ===== 앱 시작 =====
(async function init() {
  await detectTables();
  await loadSettings();
  // 작성자 기억
  const savedAuthor = localStorage.getItem('MEETING_AUTHOR');
  if (savedAuthor) document.getElementById('iAuthor').value = savedAuthor;
  // 기본 날짜
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('iDate').value = now.toISOString().slice(0, 16);
  // 목록 로드
  loadList();
})();
</script>
