<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회의록 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-0.5px}
.hdr p{font-size:10px;opacity:.65;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:48px;z-index:90}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#999;transition:.2s}
.tab.on{color:#0f3460;border-bottom-color:#0f3460}
.pnl{display:none;padding:12px;max-width:800px;margin:0 auto}.pnl.on{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#0f3460}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fg label .req{color:#e63946;margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#0f3460;background:#fff;box-shadow:0 0 0 3px rgba(15,52,96,.08)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6}
.fg select{appearance:auto}
.btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff;box-shadow:0 2px 8px rgba(15,52,96,.2)}
.btn-green{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.btn-red{background:#fff;color:#e63946;border:1.5px solid #e63946}
.btn-gray{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-row{display:flex;gap:8px;margin-bottom:12px}
.btn-row .btn{flex:1}
/* 목록 카드 */
.m-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:.15s;border-left:4px solid #0f3460}
.m-item.done{border-left-color:#00b894;opacity:.75}
.m-item:active{transform:scale(.99)}
.m-item .m-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.m-item.done .m-title{text-decoration:line-through;color:#888}
.m-item .m-meta{font-size:11px;color:#888;display:flex;flex-wrap:wrap;gap:6px}
.m-item .m-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-정기{background:#dfe6e9;color:#2d3436}
.badge-긴급{background:#ffeaa7;color:#d63031}
.badge-프로젝트{background:#dfe6fd;color:#0f3460}
.badge-기타{background:#f0f0f0;color:#636e72}
.badge-site{background:#e8f8f5;color:#00b894}
.badge-mid{background:#fef3e2;color:#e67e22}
.badge-sub{background:#f0e6ff;color:#8e44ad}
.badge-done{background:#00b894;color:#fff}
.badge-open{background:#fdcb6e;color:#2d3436}
/* 사진 */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #eee}
.img-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center}
.img-modal.show{display:flex}
.img-modal img{max-width:95%;max-height:80vh;border-radius:8px}
.img-modal .close-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer}
/* 필터 */
.filter-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;flex:1;min-width:0}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #ddd;border-top-color:#0f3460;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f0f0f0;border-radius:16px;font-size:12px;margin:3px}
.chip .chip-del{border:none;background:none;color:#e63946;font-weight:700;cursor:pointer;font-size:14px;padding:0 2px}
.status-bar{padding:6px 12px;font-size:11px;text-align:center;background:#e8f8f5;color:#00b894;font-weight:600;border-radius:8px;margin-bottom:8px}
.status-bar.err{background:#ffeaea;color:#e63946}
/* 설정 트리 */
.set-section{border:1.5px solid #e0e0e0;border-radius:10px;margin-bottom:8px;overflow:hidden}
.set-hdr{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f8f9fa;font-size:13px;font-weight:700;color:#0f3460;cursor:pointer;user-select:none}
.set-hdr .arrow{transition:.2s;font-size:10px}
.set-hdr.collapsed .arrow{transform:rotate(-90deg)}
.set-body{padding:8px 12px}.set-body.hide{display:none}
.set-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.set-item:last-child{border:none}
.set-del{width:24px;height:24px;border:none;border-radius:6px;background:#ffebee;color:#e63946;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-add{display:flex;gap:6px;margin-top:6px}
.set-add input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.set-add button{padding:7px 14px;border:none;border-radius:6px;background:#0f3460;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.set-mid{margin-left:16px;border-color:#f0e0c0}.set-mid>.set-hdr{background:#fef9f0;color:#e67e22}
.set-sub{margin-left:16px;border-color:#e0d0f0}.set-sub>.set-hdr{background:#f8f0ff;color:#8e44ad}
/* 현황 카운트 */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;text-align:center}
.stat-box{padding:16px 12px;border-radius:10px}
</style>
</head>
<body>

<div class="hdr">
  <h1>📋 회의록 관리 시스템</h1>
  <p>사업장 간 회의록 공유 · Supabase 연동</p>
</div>
<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📋 목록</div>
  <div class="tab" onclick="swTab(1)">✏️ 작성</div>
  <div class="tab" onclick="swTab(2)">📊 현황</div>
  <div class="tab" onclick="swTab(3)">⚙️ 설정</div>
</div>

<!-- 목록 -->
<div class="pnl on" id="pnl0">
  <div class="filter-bar">
    <select id="fSite" onchange="loadList()"><option value="">전체 사업장</option></select>
    <select id="fType" onchange="onFTypeChg()"><option value="">전체 유형</option></select>
    <select id="fStatus" onchange="loadList()"><option value="">전체 상태</option><option value="미결">미결</option><option value="완료">완료</option></select>
  </div>
  <div class="filter-bar">
    <select id="fMid" onchange="onFMidChg()"><option value="">전체 중분류</option></select>
    <select id="fSub" onchange="loadList()"><option value="">전체 소분류</option></select>
    <input type="month" id="fMonth" onchange="loadList()" style="flex:.8">
  </div>
  <div id="listArea"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
</div>

<!-- 작성/수정 -->
<div class="pnl" id="pnl1">
  <div class="card">
    <div class="card-tit">✏️ <span id="formTitle">새 회의록 작성</span></div>
    <input type="hidden" id="editId" value="">
    <div class="fg"><label>회의제목 <span class="req">*</span></label><input type="text" id="iTitle" placeholder="회의 제목을 입력하세요"></div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><label>회의일시 <span class="req">*</span></label><input type="datetime-local" id="iDate"></div>
      <div class="fg" style="flex:1"><label>사업장 <span class="req">*</span></label><select id="iSite"><option value="">선택</option></select></div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><label>회의유형</label><select id="iType" onchange="onITypeChg()"><option value="">선택</option></select></div>
      <div class="fg" style="flex:1">
        <label>상태</label>
        <select id="iStatus"><option value="미결">🟡 미결</option><option value="완료">✅ 완료</option></select>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><label>중분류</label><select id="iMid" onchange="onIMidChg()"><option value="">선택</option></select></div>
      <div class="fg" style="flex:1"><label>소분류</label><select id="iSub"><option value="">선택</option></select></div>
    </div>
    <div class="fg"><label>회의장소</label><input type="text" id="iPlace" placeholder="장소"></div>
    <div class="fg"><label>참석자</label><input type="text" id="iAttendees" placeholder="참석자 (쉼표로 구분)"></div>
    <div class="fg"><label>안건</label><textarea id="iAgenda" placeholder="회의 안건" rows="2"></textarea></div>
    <div class="fg"><label>회의내용 <span class="req">*</span></label><textarea id="iContent" placeholder="회의 내용을 상세히 입력" rows="5"></textarea></div>
    <div class="fg"><label>결정사항</label><textarea id="iDecision" placeholder="결정된 사항" rows="3"></textarea></div>
    <div class="fg"><label>작성자</label><input type="text" id="iAuthor" placeholder="작성자명"></div>
    <div class="fg"><label>비고</label><textarea id="iNote" placeholder="기타 비고" rows="2"></textarea></div>
  </div>
  <div class="card">
    <div class="card-tit">📷 첨부사진</div>
    <button class="btn btn-sm btn-gray" onclick="document.getElementById('photoInput').click()" style="margin-bottom:8px">📷 사진 추가</button>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
    <div class="photo-grid" id="photoPreview"></div>
    <div id="photoStatus" style="font-size:11px;color:#888;margin-top:4px"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveMeeting()" id="btnSave">💾 저장</button>
    <button class="btn btn-gray" onclick="resetForm();swTab(0)">취소</button>
  </div>
</div>

<!-- 현황 -->
<div class="pnl" id="pnl2">
  <div class="card">
    <div class="card-tit">📊 회의록 현황</div>
    <div id="statsArea"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="card">
    <div class="card-tit">🟡 미결 회의록</div>
    <div id="openList"><div class="empty">조회 중...</div></div>
  </div>
</div>

<!-- 설정 -->
<div class="pnl" id="pnl3">
  <div class="card">
    <div class="card-tit">🏢 사업장 관리</div>
    <div id="siteChips"></div>
    <div class="set-add"><input type="text" id="newSite" placeholder="사업장명"><button onclick="addSiteItem()">추가</button></div>
  </div>
  <div class="card">
    <div class="card-tit">📂 회의유형 · 중분류 · 소분류</div>
    <div id="catTree"></div>
    <div class="set-add" style="margin-top:10px"><input type="text" id="newType" placeholder="새 회의유형"><button onclick="addType()">유형 추가</button></div>
  </div>
  <div class="card">
    <div class="card-tit">🔧 Supabase 연결</div>
    <div id="dbStatus" class="status-bar">확인 중...</div>
    <div class="fg" style="margin-top:8px"><label>API Token</label><input type="password" id="cfgToken" placeholder="Supabase 자동연결" disabled></div>
    <div class="fg"><label>Base ID</label><input type="text" id="cfgBaseId" placeholder="p..."></div>
    <div class="fg"><label>회의록 테이블 ID <span style="font-size:10px;color:#888">(자동감지)</span></label><input type="text" id="cfgTblMeeting" placeholder="자동감지 또는 직접입력"></div>
    <div class="fg"><label>설정 테이블 ID <span style="font-size:10px;color:#888">(자동감지)</span></label><input type="text" id="cfgTblSetting" placeholder="자동감지 또는 직접입력"></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-primary" onclick="saveMeetingCfg()">💾 저장</button>
      <button class="btn btn-sm btn-green" onclick="testMeetingConn()">🔌 테스트</button>
      <button class="btn btn-sm" onclick="initTables()" style="background:#fff3e0;color:#e65100;border:1px solid #ffcc80">🚀 테이블 생성</button>
    </div>
    <p style="font-size:10px;color:#888;margin-top:6px">처음 사용 시 Token/Base ID 입력 후 저장 → 테이블 생성 클릭</p>
  </div>
</div>

<!-- 상세 모달 -->
<div id="detailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f0f2f5;z-index:200;overflow-y:auto">
  <div style="position:sticky;top:0;background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:10">
    <button onclick="closeDetail()" style="border:none;background:rgba(255,255,255,.15);color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer">←</button>
    <span style="font-size:15px;font-weight:700;flex:1" id="detailTitle"></span>
    <button class="btn btn-sm" onclick="toggleStatus()" id="btnToggle" style="background:#fdcb6e;color:#2d3436;font-size:11px">완료처리</button>
    <button class="btn btn-sm" onclick="editFromDetail()" style="background:rgba(255,255,255,.15);color:#fff;font-size:11px">수정</button>
    <button class="btn btn-sm" onclick="deleteFromDetail()" style="background:rgba(230,57,70,.8);color:#fff;font-size:11px">삭제</button>
  </div>
  <div style="padding:12px;max-width:800px;margin:0 auto" id="detailBody"></div>
</div>

<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')">
  <button class="close-btn" onclick="event.stopPropagation();document.getElementById('imgModal').classList.remove('show')">✕</button>
  <img id="imgModalSrc" src="">
</div>
<div class="toast" id="toast"></div>

<script src="supabase_config.js"></script>
<script>
// ===== 설정 관리 =====
// Supabase API (supabase_config.js에서 로드)
function getMtCfg(){return {}}
function saveMtCfg(c){}
function getMtToken(){return ''}
function getMtBaseId(){return ''}
function loadMtCfgToUI(){}
function saveMeetingCfg(){showToast('✅ Supabase 자동 연결')}
async function testMeetingConn(){
  const st=document.getElementById('dbStatus');st.textContent='테스트 중...';
  try{const r=await sbTestConnection();st.textContent=r.success?'✅ Supabase 연결 성공':'❌ 실패';st.className='status-bar'+(r.success?'':' err')}
  catch(e){st.textContent='❌ '+e.message;st.className='status-bar err'}
}
function fv(r,...n){for(const k of n){if(r[k]!==undefined&&r[k]!==null)return r[k]}return ''}
function extractId(o){if(!o||typeof o!=='object')return null;for(const k of['Id','id','ID','nc_id']){if(o[k]!=null)return o[k]};for(const k of Object.keys(o)){if(typeof o[k]==='number'&&!k.includes('순서'))return o[k]};return null}

// ===== 테이블 =====
async function detectTables(){return true}
function updateDbStatus(){const el=document.getElementById('dbStatus'),ms=Object.entries(TBL).filter(([,v])=>!v).map(([k])=>k);if(!ms.length){el.textContent='✅ 모든 테이블 정상';el.className='status-bar'}else{el.textContent='⚠ 누락: '+ms.join(', ');el.className='status-bar err'}}

async function initTables(){
  if(!confirm('회의록·설정 테이블을 생성합니다.'))return;
  const st=document.getElementById('dbStatus');st.textContent='생성 중...';st.className='status-bar';
  try{
    await detectTables();
    if(false){const r=await api('POST','/meta/bases/'+getMtBaseId()+'/tables',{title:'회의록',columns:[
      {title:'회의제목',uidt:'SingleLineText'},{title:'회의일시',uidt:'DateTime'},{title:'회의장소',uidt:'SingleLineText'},
      {title:'회의유형',uidt:'SingleLineText'},{title:'중분류',uidt:'SingleLineText'},{title:'소분류',uidt:'SingleLineText'},
      {title:'사업장',uidt:'SingleLineText'},{title:'상태',uidt:'SingleLineText'},
      {title:'참석자',uidt:'LongText'},{title:'안건',uidt:'LongText'},
      {title:'회의내용',uidt:'LongText'},{title:'결정사항',uidt:'LongText'},
      {title:'첨부사진',uidt:'Attachment'},{title:'작성자',uidt:'SingleLineText'},
      {title:'작성일',uidt:'Date'},{title:'비고',uidt:'LongText'}
    ]});TBL['회의록']=r.id}
    if(!TBL['설정']){const r=await api('POST','/meta/bases/'+getMtBaseId()+'/tables',{title:'설정',columns:[
      {title:'구분',uidt:'SingleLineText'},{title:'상위값',uidt:'SingleLineText'},{title:'코드값',uidt:'SingleLineText'},
      {title:'표시명',uidt:'SingleLineText'},{title:'정렬순서',uidt:'Number'},{title:'사용여부',uidt:'Checkbox'}
    ]});TBL['설정']=r.id;
      await api('POST','/tables/'+TBL['설정']+'/records',[
        {구분:'사업장',상위값:'',코드값:'본사',표시명:'본사',정렬순서:1,사용여부:true},
        {구분:'사업장',상위값:'',코드값:'법인1',표시명:'법인1',정렬순서:2,사용여부:true},
        {구분:'사업장',상위값:'',코드값:'법인2',표시명:'법인2',정렬순서:3,사용여부:true},
        {구분:'회의유형',상위값:'',코드값:'정기회의',표시명:'정기회의',정렬순서:1,사용여부:true},
        {구분:'회의유형',상위값:'',코드값:'긴급회의',표시명:'긴급회의',정렬순서:2,사용여부:true},
        {구분:'회의유형',상위값:'',코드값:'프로젝트회의',표시명:'프로젝트회의',정렬순서:3,사용여부:true},
        {구분:'회의유형',상위값:'',코드값:'기타',표시명:'기타',정렬순서:4,사용여부:true},

let sites=[],settingsRaw=[],typeTree={};
async function loadSettings(){
    try{settingsRaw=await sbSelect('meeting_setting',{},'id.asc',500)}catch(e){settingsRaw=[]}
  sites=settingsRaw.filter(r=>fv(r,'구분')==='사업장').map(r=>fv(r,'표시명','코드값')).filter(Boolean);
  if(!sites.length)sites=['본사'];
  typeTree={};
  settingsRaw.filter(r=>fv(r,'구분')==='회의유형').forEach(t=>{const n=fv(t,'표시명','코드값');if(n)typeTree[n]={mids:{}}});
  settingsRaw.filter(r=>fv(r,'구분')==='중분류').forEach(m=>{const p=fv(m,'상위값'),n=fv(m,'표시명','코드값');if(p&&typeTree[p]&&n)typeTree[p].mids[n]={subs:[]}});
  settingsRaw.filter(r=>fv(r,'구분')==='소분류').forEach(s=>{const p=fv(s,'상위값'),n=fv(s,'표시명','코드값');if(p&&n)for(const[,to]of Object.entries(typeTree))if(to.mids[p]){to.mids[p].subs.push(n);break}});
  if(!Object.keys(typeTree).length)typeTree={정기회의:{mids:{}},긴급회의:{mids:{}},프로젝트회의:{mids:{}},기타:{mids:{}}};
  renderSiteOpts();renderSiteChips();renderTypeOpts();renderCatTree();
}
function renderSiteOpts(){['fSite','iSite'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fSite';el.innerHTML=f?'<option value="">전체 사업장</option>':'<option value="">선택</option>';sites.forEach(s=>{el.innerHTML+='<option'+(s===c?' selected':'')+'>'+s+'</option>'})})}
function renderSiteChips(){document.getElementById('siteChips').innerHTML=sites.map(s=>'<span class="chip">'+esc(s)+'<button class="chip-del" onclick="removeSite(\''+ea(s)+'\')">✕</button></span>').join('')}
function renderTypeOpts(){['fType','iType'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fType';el.innerHTML=f?'<option value="">전체 유형</option>':'<option value="">선택</option>';Object.keys(typeTree).forEach(t=>{el.innerHTML+='<option'+(t===c?' selected':'')+'>'+t+'</option>'})})}
function getMids(t){return typeTree[t]?Object.keys(typeTree[t].mids):[]}
function getSubs(t,m){return typeTree[t]&&typeTree[t].mids[m]?typeTree[t].mids[m].subs:[]}
function fillMid(id,t,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 중분류</option>':'<option value="">선택</option>';getMids(t).forEach(m=>{el.innerHTML+='<option'+(m===kv?' selected':'')+'>'+m+'</option>'})}
function fillSub(id,t,m,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 소분류</option>':'<option value="">선택</option>';getSubs(t,m).forEach(s=>{el.innerHTML+='<option'+(s===kv?' selected':'')+'>'+s+'</option>'})}
function onFTypeChg(){fillMid('fMid',document.getElementById('fType').value);document.getElementById('fSub').innerHTML='<option value="">전체 소분류</option>';loadList()}
function onFMidChg(){fillSub('fSub',document.getElementById('fType').value,document.getElementById('fMid').value);loadList()}

// 설정 트리 렌더링
function renderCatTree(){
  const c=document.getElementById('catTree');if(!Object.keys(typeTree).length){c.innerHTML='<div class="empty">없음</div>';return}
  let h='';
  Object.entries(typeTree).forEach(([tn,to])=>{
    h+='<div class="set-section"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📂 '+esc(tn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeType(\''+ea(tn)+'\')">✕</button></span></div><div class="set-body">';

      h+='<div class="set-section set-mid"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📁 '+esc(mn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeMid(\''+ea(tn)+'\',\''+ea(mn)+'\')">✕</button></span></div><div class="set-body">';
      mo.subs.forEach(sn=>{h+='<div class="set-item"><span style="flex:1">📄 '+esc(sn)+'</span><button class="set-del" onclick="removeSub(\''+ea(tn)+'\',\''+ea(mn)+'\',\''+ea(sn)+'\')">✕</button></div>'});
      h+='<div class="set-add"><input placeholder="소분류 추가" id="aS_'+ea(tn)+'_'+ea(mn)+'"><button onclick="addSub(\''+ea(tn)+'\',\''+ea(mn)+'\')">추가</button></div></div></div>';
    });

  if(!title){showToast('제목 입력');return}if(!date){showToast('일시 선택');return}if(!content){showToast('내용 입력');return}if(!site){showToast('사업장 선택');return}if(false){showToast('테이블 먼저 생성');return}
  const eid=document.getElementById('editId').value;document.getElementById('btnSave').disabled=true;document.getElementById('btnSave').textContent='저장 중...';
  try{const author=document.getElementById('iAuthor').value.trim();if(author)localStorage.setItem('MT_AU',author);
    let pd=existPhotos.length?[...existPhotos]:[];
    // TODO: Supabase Storage로 사진 업로드 구현
    const rec={회의title:title,회의meeting_date:date,회의장소:document.getElementById('iPlace').value.trim(),
      회의유형:document.getElementById('iType').value,중분류:document.getElementById('iMid').value,소분류:document.getElementById('iSub').value,
      site:site,상태:document.getElementById('iStatus').value||'미결',
      참석자:document.getElementById('iAttendees').value.trim(),안건:document.getElementById('iAgenda').value.trim(),
      회의content:content,결정사항:document.getElementById('iDecision').value.trim(),author:author,작성일:new Date().toISOString().split('T')[0],비고:document.getElementById('iNote').value.trim()};
    if(pd.length)rec['첨부사진']=pd;
    if(eid){await sbUpdate('meeting',{id:'eq.'+parseInt(eid)},rec)}
    else{await sbInsert('meeting',rec)}
    showToast('✅ '+(eid?'수정':'등록')+' 완료');resetForm();swTab(0);
  }catch(e){showToast('저장 실패: '+e.message)}finally{document.getElementById('btnSave').disabled=false;document.getElementById('btnSave').textContent='💾 저장'}
}

// ===== 현황 =====
async function loadStats(){
  const sa=document.getElementById('statsArea'),ol=document.getElementById('openList');
  if(false){sa.innerHTML='<div class="empty">테이블 생성 필요</div>';ol.innerHTML='';return}
  sa.innerHTML='<div class="loading"><div class="spinner"></div></div>';ol.innerHTML='';
  try{
    const res_rows=await sbSelect('meeting',{},'',500);
    const all=res_rows;
    const total=all.length,done=all.filter(r=>fv(r,'상태')==='완료').length,open=total-done;
    // 사업장별 카운트
    const bySite={};all.forEach(r=>{const s=fv(r,'사업장')||'미지정';if(!bySite[s])bySite[s]={total:0,open:0};bySite[s].total++;if(fv(r,'상태')!=='완료')bySite[s].open++});
    sa.innerHTML='<div class="stat-grid">'
      +'<div class="stat-box" style="background:#fef9e7"><div style="font-size:28px;font-weight:700;color:#f39c12">'+open+'</div><div style="font-size:11px;color:#888">🟡 미결</div></div>'
      +'<div class="stat-box" style="background:#e8f8f5"><div style="font-size:28px;font-weight:700;color:#00b894">'+done+'</div><div style="font-size:11px;color:#888">✅ 완료</div></div>'
      +'</div><div style="margin-top:10px;font-size:12px;color:#888;text-align:center">전체 '+total+'건</div>';
    // 사업장별
    if(Object.keys(bySite).length>1){
      sa.innerHTML+='<div style="margin-top:12px;font-size:12px">';
      Object.entries(bySite).forEach(([s,v])=>{sa.innerHTML+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0"><span>'+esc(s)+'</span><span><span style="color:#f39c12;font-weight:600">미결 '+v.open+'</span> / 전체 '+v.total+'</span></div>'});
      sa.innerHTML+='</div>';
    }
    // 미결 목록
    const openItems=all.filter(r=>fv(r,'상태')!=='완료').sort((a,b)=>{const da=fv(a,'회의일시'),db=fv(b,'회의일시');if(!da)return 1;if(!db)return -1;return new Date(db)-new Date(da)});
    if(!openItems.length){ol.innerHTML='<div class="empty">🎉 모든 회의록이 완료되었습니다</div>';return}
    ol.innerHTML='';
    openItems.forEach(r=>{
      const title=fv(r,'회의제목'),site=fv(r,'사업장'),dt=fv(r,'회의일시');
      let ds='';if(dt)try{ds=new Date(dt).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})}catch{}
      const d=document.createElement('div');d.className='m-item';d.style.borderLeftColor='#f39c12';d.onclick=()=>showDetail(r.id);
      d.innerHTML='<div class="m-title">🟡 '+esc(title)+'</div><div class="m-meta">'+(site?'<span class="m-badge badge-site">'+site+'</span>':'')+(ds?'<span>'+ds+'</span>':'')+'</div>';
      ol.appendChild(d);
    });
  }catch(e){sa.innerHTML='<div class="empty" style="color:#e63946">'+e.message+'</div>'}
}

// ===== 유틸 =====
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ea(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function showImg(u){document.getElementById('imgModalSrc').src=u;document.getElementById('imgModal').classList.add('show')}
let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

// ===== 시작 =====
(async function(){await loadSettings();const a=localStorage.getItem('MT_AU');if(a)document.getElementById('iAuthor').value=a;const n=new Date();n.setMinutes(n.getMinutes()-n.getTimezoneOffset());document.getElementById('iDate').value=n.toISOString().slice(0,16);loadList()})();
</script>
