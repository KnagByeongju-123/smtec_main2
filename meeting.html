<script>
// ===== Supabase 설정 (내장) =====
const SUPABASE_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ===== Supabase 헬퍼 =====
async function sbSelect(table,filters={},order='',limit=200){
  let q=sb.from(table).select('*');
  Object.entries(filters).forEach(([col,cond])=>{
    if(typeof cond==='string'&&cond.startsWith('eq.'))q=q.eq(col,cond.slice(3));
    else if(typeof cond==='string'&&cond.startsWith('gte.'))q=q.gte(col,cond.slice(4));
    else if(typeof cond==='string'&&cond.startsWith('lte.'))q=q.lte(col,cond.slice(4));
    else q=q.eq(col,cond);
  });
  if(order){
    const desc=order.endsWith('.desc');
    const col=order.replace(/\.(asc|desc)$/,'');
    q=q.order(col,{ascending:!desc});
  }
  q=q.limit(limit);
  const{data,error}=await q;
  if(error)throw error;
  return data||[];
}
async function sbInsert(table,rec){
  const{data,error}=await sb.from(table).insert(rec).select();
  if(error)throw error;
  return data;
}
async function sbUpdate(table,filters,rec){
  let q=sb.from(table).update(rec);
  Object.entries(filters).forEach(([col,cond])=>{
    if(typeof cond==='string'&&cond.startsWith('eq.'))q=q.eq(col,cond.slice(3));
    else q=q.eq(col,cond);
  });
  const{data,error}=await q.select();
  if(error)throw error;
  return data;
}
async function sbDelete(table,filters){
  let q=sb.from(table).delete();
  Object.entries(filters).forEach(([col,cond])=>{
    if(typeof cond==='string'&&cond.startsWith('eq.'))q=q.eq(col,cond.slice(3));
    else q=q.eq(col,cond);
  });
  const{error}=await q;
  if(error)throw error;
}

// ===== 설정 관리 =====
let sites=[],settingsRaw=[],typeTree={};

async function loadSettings(){
  try{
    const{data,error}=await sb.from('meeting_setting').select('*').order('id',{ascending:true});
    if(error)throw error;
    settingsRaw=data||[];
  }catch(e){console.error('설정 로드 실패:',e);settingsRaw=[]}
  // setting_key 파싱: "구분|값" 또는 "구분|상위|값"
  sites=[];typeTree={};
  settingsRaw.forEach(r=>{
    const key=r.setting_key||'';
    const val=r.setting_value||'';
    const parts=key.split('|');
    if(parts[0]==='사업장'&&val)sites.push(val);
    else if(parts[0]==='회의유형'&&val){if(!typeTree[val])typeTree[val]={mids:{}}}
    else if(parts[0]==='중분류'&&parts[1]&&val){
      const parent=parts[1];
      if(!typeTree[parent])typeTree[parent]={mids:{}};
      if(!typeTree[parent].mids[val])typeTree[parent].mids[val]={subs:[]}
    }
    else if(parts[0]==='소분류'&&parts[1]&&val){
      const parent=parts[1]; // 중분류명
      for(const[,to] of Object.entries(typeTree)){
        if(to.mids[parent]&&!to.mids[parent].subs.includes(val)){to.mids[parent].subs.push(val);break}
      }
    }
  });
  if(!sites.length)sites=['본사'];
  if(!Object.keys(typeTree).length)typeTree={정기회의:{mids:{}},긴급회의:{mids:{}},프로젝트회의:{mids:{}},기타:{mids:{}}};
  renderSiteOpts();renderSiteChips();renderTypeOpts();renderCatTree();
}

function renderSiteOpts(){['fSite','iSite'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fSite';el.innerHTML=f?'<option value="">전체 사업장</option>':'<option value="">선택</option>';sites.forEach(s=>{el.innerHTML+='<option'+(s===c?' selected':'')+'>'+s+'</option>'})})}
function renderSiteChips(){document.getElementById('siteChips').innerHTML=sites.map(s=>'<span class="chip">'+esc(s)+'<button class="chip-del" onclick="removeSite(\''+ea(s)+'\')">✕</button></span>').join('')}
function renderTypeOpts(){['fType','iType'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fType';el.innerHTML=f?'<option value="">전체 유형</option>':'<option value="">선택</option>';Object.keys(typeTree).forEach(t=>{el.innerHTML+='<option'+(t===c?' selected':'')+'>'+t+'</option>'})})}
function getMids(t){return typeTree[t]?Object.keys(typeTree[t].mids):[]}
function getSubs(t,m){return typeTree[t]&&typeTree[t].mids[m]?typeTree[t].mids[m].subs:[]}
function fillMid(id,t,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 중분류</option>':'<option value="">선택</option>';getMids(t).forEach(m=>{el.innerHTML+='<option'+(m===kv?' selected':'')+'>'+m+'</option>'})}
function fillSub(id,t,m,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 소분류</option>':'<option value="">선택</option>';getSubs(t,m).forEach(s=>{el.innerHTML+='<option'+(s===kv?' selected':'')+'>'+s+'</option>'})}
function onFTypeChg(){fillMid('fMid',document.getElementById('fType').value);document.getElementById('fSub').innerHTML='<option value="">전체 소분류</option>';loadList()}
function onFMidChg(){fillSub('fSub',document.getElementById('fType').value,document.getElementById('fMid').value);loadList()}
function onITypeChg(){fillMid('iMid',document.getElementById('iType').value);document.getElementById('iSub').innerHTML='<option value="">선택</option>'}
function onIMidChg(){fillSub('iSub',document.getElementById('iType').value,document.getElementById('iMid').value)}

function renderCatTree(){
  const c=document.getElementById('catTree');if(!Object.keys(typeTree).length){c.innerHTML='<div class="empty">없음</div>';return}
  let h='';
  Object.entries(typeTree).forEach(([tn,to])=>{
    h+='<div class="set-section"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📂 '+esc(tn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeType(\''+ea(tn)+'\')">✕</button></span></div><div class="set-body">';
    Object.entries(to.mids).forEach(([mn,mo])=>{
      h+='<div class="set-section set-mid"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📁 '+esc(mn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeMid(\''+ea(tn)+'\',\''+ea(mn)+'\')">✕</button></span></div><div class="set-body">';
      mo.subs.forEach(sn=>{h+='<div class="set-item"><span style="flex:1">📄 '+esc(sn)+'</span><button class="set-del" onclick="removeSub(\''+ea(tn)+'\',\''+ea(mn)+'\',\''+ea(sn)+'\')">✕</button></div>'});
      h+='<div class="set-add"><input placeholder="소분류 추가" id="aS_'+ea(tn)+'_'+ea(mn)+'"><button onclick="addSub(\''+ea(tn)+'\',\''+ea(mn)+'\')">추가</button></div></div></div>';
    });
    h+='<div class="set-add" style="margin-top:6px"><input placeholder="중분류 추가" id="aM_'+ea(tn)+'"><button onclick="addMid(\''+ea(tn)+'\')">추가</button></div></div></div>';
  });c.innerHTML=h;
}

async function addSiteItem(){
  const inp=document.getElementById('newSite'),v=inp.value.trim();if(!v)return;
  if(sites.includes(v)){showToast('이미 존재');return}
  try{await sbInsert('meeting_setting',{setting_key:'사업장|'+v,setting_value:v})}catch(e){showToast('실패: '+e.message);return}
  inp.value='';await loadSettings();showToast('✅ '+v)
}
async function removeSite(v){
  if(!confirm(v+' 삭제?'))return;
  await sbDelete('meeting_setting',{setting_key:'eq.사업장|'+v});
  await loadSettings();showToast('삭제')
}
async function addType(){
  const inp=document.getElementById('newType'),v=inp.value.trim();if(!v||typeTree[v])return;
  try{await sbInsert('meeting_setting',{setting_key:'회의유형|'+v,setting_value:v})}catch(e){return}
  inp.value='';await loadSettings();showToast('✅ '+v)
}
async function removeType(tn){
  if(!confirm(tn+' 삭제? (하위 중분류/소분류도 삭제됩니다)'))return;
  // 삭제: 소분류 → 중분류 → 회의유형
  for(const mn of getMids(tn)){
    for(const sn of getSubs(tn,mn))await sbDelete('meeting_setting',{setting_key:'eq.소분류|'+mn+'|'+sn});
    await sbDelete('meeting_setting',{setting_key:'eq.중분류|'+tn+'|'+mn});
  }
  await sbDelete('meeting_setting',{setting_key:'eq.회의유형|'+tn});
  await loadSettings();showToast('삭제')
}
async function addMid(tn){
  const inp=document.getElementById('aM_'+tn);if(!inp)return;const v=inp.value.trim();if(!v)return;
  try{await sbInsert('meeting_setting',{setting_key:'중분류|'+tn+'|'+v,setting_value:v})}catch(e){return}
  await loadSettings();showToast('✅ '+v)
}
async function removeMid(tn,mn){
  if(!confirm(mn+' 삭제?'))return;
  for(const sn of getSubs(tn,mn))await sbDelete('meeting_setting',{setting_key:'eq.소분류|'+mn+'|'+sn});
  await sbDelete('meeting_setting',{setting_key:'eq.중분류|'+tn+'|'+mn});
  await loadSettings();showToast('삭제')
}
async function addSub(tn,mn){
  const inp=document.getElementById('aS_'+tn+'_'+mn);if(!inp)return;const v=inp.value.trim();if(!v)return;
  try{await sbInsert('meeting_setting',{setting_key:'소분류|'+mn+'|'+v,setting_value:v})}catch(e){return}
  await loadSettings();showToast('✅ '+v)
}
async function removeSub(tn,mn,sn){
  if(!confirm(sn+' 삭제?'))return;
  await sbDelete('meeting_setting',{setting_key:'eq.소분류|'+mn+'|'+sn});
  await loadSettings();showToast('삭제')
}

// ===== 목록 =====
async function loadList(){
  const area=document.getElementById('listArea');
  area.innerHTML='<div class="loading"><div class="spinner"></div><br>불러오는 중...</div>';
  try{
    let q=sb.from('meeting').select('*').order('meeting_date',{ascending:false}).limit(100);
    const fs=document.getElementById('fSite').value;if(fs)q=q.eq('site',fs);
    const ft=document.getElementById('fType').value;if(ft)q=q.eq('meeting_type',ft);
    const fst=document.getElementById('fStatus').value;if(fst)q=q.eq('status',fst);
    const fm=document.getElementById('fMonth').value;
    if(fm){const[y,m]=fm.split('-');q=q.gte('meeting_date',y+'-'+m+'-01T00:00:00').lte('meeting_date',y+'-'+m+'-31T23:59:59')}
    const{data:rows,error}=await q;
    if(error)throw error;
    // 클라이언트 측 중분류/소분류 필터 (meeting 테이블에 없는 경우 대비)
    let filtered=rows||[];
    // meeting 테이블 컬럼에 중분류/소분류 없으므로 제외
    if(!filtered.length){area.innerHTML='<div class="empty">등록된 회의록이 없습니다</div>';return}
    area.innerHTML='';
    filtered.forEach(r=>{
      const title=r.title||'(제목없음)',dt=r.meeting_date,site=r.site||'',type=r.meeting_type||'',author=r.author||'',loc=r.location||'',status=r.status||'미결';
      let ds='';if(dt)try{ds=new Date(dt).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}catch{ds=dt}
      const tc=type==='긴급회의'?'badge-긴급':type==='프로젝트회의'?'badge-프로젝트':type==='정기회의'?'badge-정기':'badge-기타';
      const isDone=status==='완료';
      const d=document.createElement('div');d.className='m-item'+(isDone?' done':'');d.onclick=()=>showDetail(r.id);
      d.innerHTML='<div class="m-title">'+(isDone?'✅ ':'🟡 ')+esc(title)+'</div><div class="m-meta">'
        +'<span class="m-badge '+(isDone?'badge-done':'badge-open')+'">'+status+'</span>'
        +(type?'<span class="m-badge '+tc+'">'+type+'</span>':'')
        +(site?'<span class="m-badge badge-site">'+site+'</span>':'')
        +(ds?'<span>'+ds+'</span>':'')
        +(author?'<span>✍️'+esc(author)+'</span>':'')+'</div>';
      area.appendChild(d);
    });
  }catch(e){area.innerHTML='<div class="empty" style="color:#e63946">조회 실패: '+e.message+'</div>'}
}

let curId=null,curStatus='';
async function showDetail(id){
  curId=id;document.getElementById('detailModal').style.display='block';
  const body=document.getElementById('detailBody');body.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const{data,error}=await sb.from('meeting').select('*').eq('id',id).single();
    if(error)throw error;
    const r=data;
    const title=r.title||'(제목없음)';document.getElementById('detailTitle').textContent=title;
    const status=r.status||'미결';curStatus=status;
    const isDone=status==='완료';
    const btn=document.getElementById('btnToggle');
    btn.textContent=isDone?'🟡 미결로':'✅ 완료';
    btn.style.background=isDone?'#fdcb6e':'#00b894';btn.style.color=isDone?'#2d3436':'#fff';

    const dt=r.meeting_date;let ds='';if(dt)try{ds=new Date(dt).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'})}catch{ds=dt}
    let h='<div class="card">';
    h+='<div style="text-align:center;padding:10px;margin-bottom:12px;border-radius:8px;font-size:16px;font-weight:700;'+(isDone?'background:#e8f8f5;color:#00b894':'background:#fef9e7;color:#f39c12')+'">'+(isDone?'✅ 완료':'🟡 미결')+'</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
    const type=r.meeting_type||'',site=r.site||'';
    if(type){const c=type==='긴급회의'?'badge-긴급':type==='프로젝트회의'?'badge-프로젝트':type==='정기회의'?'badge-정기':'badge-기타';h+='<span class="m-badge '+c+'">'+type+'</span>'}
    if(site)h+='<span class="m-badge badge-site">'+site+'</span>';
    h+='</div>';
    [['📅 일시',ds],['📍 장소',r.location],['👥 참석자',r.attendees],['✍️ 작성자',r.author]].forEach(([l,v])=>{if(v)h+='<div style="margin-bottom:8px"><span style="font-size:11px;color:#888">'+l+'</span><div style="font-size:13px;font-weight:500;margin-top:2px">'+esc(String(v))+'</div></div>'});
    h+='</div>';
    [['📋 안건',r.agenda],['📝 회의내용',r.content],['✅ 결정사항',r.decision],['🔄 후속조치',r.follow_up]].forEach(([l,v])=>{if(v)h+='<div class="card"><div class="card-tit">'+l+'</div><div style="font-size:13px;line-height:1.8;white-space:pre-wrap;color:#333">'+esc(String(v))+'</div></div>'});
    body.innerHTML=h;
  }catch(e){body.innerHTML='<div class="empty" style="color:#e63946">'+e.message+'</div>'}
}
function closeDetail(){document.getElementById('detailModal').style.display='none';curId=null}

// ===== 정석 회의록 엑셀 출력 (ExcelJS) =====
async function exportMeetingExcel(){
  if(!curId){showToast('회의록을 먼저 열어주세요');return}
  showToast('엑셀 생성 중...');
  try{
    const{data:r,error}=await sb.from('meeting').select('*').eq('id',curId).single();
    if(error)throw error;

    const wb=new ExcelJS.Workbook();
    wb.creator='회의록 관리 시스템';
    const ws=wb.addWorksheet('회의록',{properties:{defaultColWidth:15}});

    // 컬럼 너비
    ws.columns=[{width:14},{width:22},{width:20},{width:14},{width:22}];

    // 스타일 정의
    const borderThin={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
    const borderMed={top:{style:'medium'},bottom:{style:'medium'},left:{style:'medium'},right:{style:'medium'}};
    const fillLabel={type:'pattern',pattern:'solid',fgColor:{argb:'FFE3F2FD'}};
    const fillSection={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F3460'}};
    const fillContent={type:'pattern',pattern:'solid',fgColor:{argb:'FFFAFAFA'}};
    const fontTitle={name:'맑은 고딕',size:18,bold:true};
    const fontLabel={name:'맑은 고딕',size:10,bold:true,color:{argb:'FF0F3460'}};
    const fontVal={name:'맑은 고딕',size:10};
    const fontSection={name:'맑은 고딕',size:11,bold:true,color:{argb:'FFFFFFFF'}};
    const alignC={vertical:'middle',horizontal:'center'};
    const alignL={vertical:'middle',horizontal:'left',wrapText:true};
    const alignLT={vertical:'top',horizontal:'left',wrapText:true};

    let row=1;

    // ===== 1. 제목 =====
    ws.mergeCells(row,1,row,5);
    const titleCell=ws.getCell(row,1);
    titleCell.value='회  의  록';
    titleCell.font={name:'맑은 고딕',size:20,bold:true,color:{argb:'FF0F3460'}};
    titleCell.alignment=alignC;
    titleCell.border={bottom:{style:'medium',color:{argb:'FF0F3460'}}};
    ws.getRow(row).height=38;

    row+=2; // row=3

    // ===== 2. 기본정보 테이블 =====
    let dateStr='';
    if(r.meeting_date)try{dateStr=new Date(r.meeting_date).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'})}catch{dateStr=r.meeting_date}

    const infoRows=[
      ['회의제목',r.title||'','','',''],
      ['회의일시',dateStr,'','회의장소',r.location||''],
      ['사 업 장',r.site||'','','회의유형',r.meeting_type||''],
      ['작 성 자',r.author||'','','상    태',r.status||'미결'],
      ['참 석 자',r.attendees||'','','','']
    ];
    const infoMerges=[
      [[row,2,row,5]],          // 회의제목 값
      [[row+1,2,row+1,3]],     // 회의일시 값
      [[row+2,2,row+2,3]],     // 사업장 값
      [[row+3,2,row+3,3]],     // 작성자 값
      [[row+4,2,row+4,5]]      // 참석자 값
    ];

    infoRows.forEach((ir,i)=>{
      const cr=row+i;
      ws.getRow(cr).height=26;
      ir.forEach((v,j)=>{
        const c=ws.getCell(cr,j+1);
        c.value=v;
        c.border=borderThin;
        c.alignment=alignL;
        if(j===0||j===3){c.font=fontLabel;c.fill=fillLabel;c.alignment={vertical:'middle',horizontal:'center'}}
        else{c.font=fontVal}
      });
      infoMerges[i].forEach(m=>ws.mergeCells(m[0],m[1],m[2],m[3]));
    });

    row+=infoRows.length; // 다음 행

    // ===== 3. 섹션별 내용 =====
    const sections=[
      ['📋 안    건',r.agenda||'',50],
      ['📝 회의내용',r.content||'',120],
      ['✅ 결정사항',r.decision||'(없음)',60],
      ['🔄 후속조치',r.follow_up||'(없음)',60]
    ];

    sections.forEach(([label,content,ht])=>{
      row++;
      // 섹션 헤더
      ws.mergeCells(row,1,row,5);
      const hc=ws.getCell(row,1);
      hc.value=label;
      hc.font=fontSection;
      hc.fill=fillSection;
      hc.alignment=alignC;
      hc.border=borderThin;
      ws.getRow(row).height=24;

      // 섹션 내용
      row++;
      ws.mergeCells(row,1,row,5);
      const cc=ws.getCell(row,1);
      cc.value=content;
      cc.font=fontVal;
      cc.fill=fillContent;
      cc.alignment=alignLT;
      cc.border=borderThin;
      ws.getRow(row).height=ht;
    });

    // ===== 4. 첨부사진 =====
    const photos=r.photos||r.photo_urls||[];
    const photoArr=Array.isArray(photos)?photos:(typeof photos==='string'?JSON.parse(photos||'[]'):[]);

    if(photoArr.length>0){
      row+=2;
      ws.mergeCells(row,1,row,5);
      const phc=ws.getCell(row,1);
      phc.value='📷 첨부사진 ('+photoArr.length+'장)';
      phc.font=fontSection;
      phc.fill=fillSection;
      phc.alignment=alignC;
      phc.border=borderThin;
      ws.getRow(row).height=24;
      row++;

      let col=1;
      for(let i=0;i<photoArr.length;i++){
        try{
          const url=photoArr[i];
          const resp=await fetch(url);
          if(!resp.ok)continue;
          const blob=await resp.blob();
          const buf=await blob.arrayBuffer();
          const ext=blob.type.includes('png')?'png':'jpeg';
          const imgId=wb.addImage({buffer:buf,extension:ext});

          // 사진 2장씩 한 줄에
          const imgCol=col;
          ws.addImage(imgId,{
            tl:{col:imgCol-1+0.1,row:row-1+0.1},
            br:{col:imgCol+1-0.1,row:row-1+8},
            editAs:'oneCell'
          });
          col+=2;
          if(col>4){col=1;row+=8}
        }catch(pe){console.warn('사진 로드 실패:',pe)}
      }
      if(col>1)row+=8; // 마지막 사진 줄 여백
    }

    // ===== 5. 서명란 =====
    row+=2;
    ws.mergeCells(row,1,row,2);
    ws.getCell(row,1).value='작성일: '+new Date().toLocaleDateString('ko-KR');
    ws.getCell(row,1).font=fontVal;
    ws.getCell(row,1).alignment=alignL;

    ws.mergeCells(row,4,row,5);
    ws.getCell(row,4).value='작성자: '+(r.author||'');
    ws.getCell(row,4).font=fontVal;
    ws.getCell(row,4).alignment={vertical:'middle',horizontal:'right'};

    row++;
    ws.mergeCells(row,4,row,5);
    ws.getCell(row,4).value='(서명)';
    ws.getCell(row,4).font={name:'맑은 고딕',size:9,color:{argb:'FF999999'}};
    ws.getCell(row,4).alignment={vertical:'middle',horizontal:'right'};
    ws.getCell(row,4).border={top:{style:'thin'}};

    // ===== 파일 생성 및 다운로드 =====
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const safeTitle=(r.title||'회의록').replace(/[^가-힣a-zA-Z0-9]/g,'_').substring(0,20);
    const dateTag=r.meeting_date?r.meeting_date.split('T')[0].replace(/-/g,''):new Date().toISOString().split('T')[0].replace(/-/g,'');
    a.href=url;a.download='회의록_'+safeTitle+'_'+dateTag+'.xlsx';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📥 회의록 엑셀 다운로드 완료');
  }catch(e){showToast('다운로드 실패: '+e.message);console.error(e)}

// ===== 이미지 압축 (50KB 이하) =====
function compressPhoto(file,maxSize=50000){
  return new Promise((resolve)=>{
    if(!file.type.startsWith('image/')){resolve(file);return}
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const cv=document.createElement('canvas');
      const ctx=cv.getContext('2d');

      // 단계적 축소: 해상도를 줄여가며 50KB 이하 달성
      let w=img.width,h=img.height;
      const steps=[640,480,320,240];
      let targetW=w,targetH=h;

      // 첫 축소: 긴 변 기준
      for(const maxDim of steps){
        if(Math.max(w,h)>maxDim){
          if(w>h){targetW=maxDim;targetH=Math.round(h*(maxDim/w))}
          else{targetH=maxDim;targetW=Math.round(w*(maxDim/h))}
          break;
        }
      }
      if(targetW===w&&targetH===h&&Math.max(w,h)>640){
        targetW=640;targetH=Math.round(h*(640/w));
      }

      cv.width=targetW;cv.height=targetH;
      ctx.drawImage(img,0,0,targetW,targetH);

      // 품질을 낮춰가며 50KB 이하 달성
      let quality=0.5;
      let blob=null;
      const tryCompress=()=>{
        cv.toBlob((b)=>{
          if(b&&b.size>maxSize&&quality>0.1){
            quality-=0.1;
            // 해상도도 추가 축소
            if(quality<=0.2&&cv.width>240){
              const scale=0.7;
              const nw=Math.round(cv.width*scale),nh=Math.round(cv.height*scale);
              const tmpCv=document.createElement('canvas');
              tmpCv.width=nw;tmpCv.height=nh;
              tmpCv.getContext('2d').drawImage(cv,0,0,nw,nh);
              cv.width=nw;cv.height=nh;
              ctx.drawImage(tmpCv,0,0);
              quality=0.4;
            }
            tryCompress();
          }else{
            const compressed=new File([b||blob],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'});
            console.log('사진 압축: '+Math.round(file.size/1024)+'KB → '+Math.round(compressed.size/1024)+'KB ('+cv.width+'x'+cv.height+')');
            resolve(compressed);
          }
        },'image/jpeg',quality);
      };
      tryCompress();
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(file)};
    img.src=url;
  });
}

async function handlePhotos(inp){
  const files=Array.from(inp.files);
  inp.value='';
  if(!files.length)return;
  document.getElementById('photoStatus').textContent='사진 압축 중... ('+files.length+'장)';
  for(const f of files){
    const compressed=await compressPhoto(f,50000);
    photoFiles.push(compressed);
  }
  renderPhotos();
}
function renderPhotos(){
  const g=document.getElementById('photoPreview');g.innerHTML='';
  photoFiles.forEach((f,i)=>{
    const w=document.createElement('div');w.style.position='relative';
    const img=document.createElement('img');img.style.cssText='width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:2px solid #00b894';
    const rd=new FileReader();rd.onload=e=>{img.src=e.target.result};rd.readAsDataURL(f);
    w.appendChild(img);
    const b=document.createElement('button');b.style.cssText='position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#e63946;color:#fff;border:none;font-size:12px;cursor:pointer';
    b.textContent='✕';b.onclick=()=>{photoFiles.splice(i,1);renderPhotos()};w.appendChild(b);g.appendChild(w);
  });
  document.getElementById('photoStatus').textContent=photoFiles.length?photoFiles.length+'장 선택':'';
}

async function saveMeeting(){
  const title=document.getElementById('iTitle').value.trim();
  const date=document.getElementById('iDate').value;
  const content=document.getElementById('iContent').value.trim();
  const site=document.getElementById('iSite').value;
  if(!title){showToast('제목 입력');return}
  if(!date){showToast('일시 선택');return}
  if(!content){showToast('내용 입력');return}
  if(!site){showToast('사업장 선택');return}

  const eid=document.getElementById('editId').value;
  document.getElementById('btnSave').disabled=true;
  document.getElementById('btnSave').textContent='저장 중...';
  try{
    const author=document.getElementById('iAuthor').value.trim();
    if(author)localStorage.setItem('MT_AU',author);

    const rec={
      title:title,
      meeting_date:date,
      meeting_type:document.getElementById('iType').value||null,
      site:site,
      location:document.getElementById('iPlace').value.trim()||null,
      attendees:document.getElementById('iAttendees').value.trim()||null,
      agenda:document.getElementById('iAgenda').value.trim()||null,
      content:content,
      decision:document.getElementById('iDecision').value.trim()||null,
      follow_up:document.getElementById('iFollowUp').value.trim()||null,
      author:author||null,
      status:document.getElementById('iStatus').value||'미결'
    };

    if(eid){
      const{error}=await sb.from('meeting').update(rec).eq('id',parseInt(eid));
      if(error)throw error;
    }else{
      const{error}=await sb.from('meeting').insert(rec);
      if(error)throw error;
    }
    showToast('✅ '+(eid?'수정':'등록')+' 완료');
    resetForm();swTab(0);
  }catch(e){
    showToast('저장 실패: '+e.message);
  }finally{
    document.getElementById('btnSave').disabled=false;
    document.getElementById('btnSave').textContent='💾 저장';
  }
}

async function loadStats(){
  const sa=document.getElementById('statsArea'),ol=document.getElementById('openList');
  sa.innerHTML='<div class="loading"><div class="spinner"></div></div>';ol.innerHTML='';
  try{
    const{data:all,error}=await sb.from('meeting').select('*').order('meeting_date',{ascending:false}).limit(500);
    if(error)throw error;
    const total=all.length,done=all.filter(r=>r.status==='완료').length,open=total-done;
    const bySite={};all.forEach(r=>{const s=r.site||'미지정';if(!bySite[s])bySite[s]={total:0,open:0};bySite[s].total++;if(r.status!=='완료')bySite[s].open++});

    sa.innerHTML='<div class="stat-grid">'
      +'<div class="stat-box" style="background:#fef9e7"><div style="font-size:28px;font-weight:700;color:#f39c12">'+open+'</div><div style="font-size:11px;color:#888">🟡 미결</div></div>'
      +'<div class="stat-box" style="background:#e8f8f5"><div style="font-size:28px;font-weight:700;color:#00b894">'+done+'</div><div style="font-size:11px;color:#888">✅ 완료</div></div>'
      +'</div><div style="margin-top:10px;font-size:12px;color:#888;text-align:center">전체 '+total+'건</div>';
    if(Object.keys(bySite).length>1){
      let sh='<div style="margin-top:12px;font-size:12px">';
      Object.entries(bySite).forEach(([s,v])=>{sh+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0"><span>'+esc(s)+'</span><span><span style="color:#f39c12;font-weight:600">미결 '+v.open+'</span> / 전체 '+v.total+'</span></div>'});
      sh+='</div>';sa.innerHTML+=sh;
    }
    const openItems=all.filter(r=>r.status!=='완료');
    if(!openItems.length){ol.innerHTML='<div class="empty">🎉 모든 회의록이 완료되었습니다</div>';return}
    ol.innerHTML='';
    openItems.forEach(r=>{
      const title=r.title||'',site=r.site||'',dt=r.meeting_date;
      let ds='';if(dt)try{ds=new Date(dt).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})}catch{}
      const d=document.createElement('div');d.className='m-item';d.style.borderLeftColor='#f39c12';d.onclick=()=>showDetail(r.id);
      d.innerHTML='<div class="m-title">🟡 '+esc(title)+'</div><div class="m-meta">'+(site?'<span class="m-badge badge-site">'+site+'</span>':'')+(ds?'<span>'+ds+'</span>':'')+'</div>';
      ol.appendChild(d);
    });
  }catch(e){sa.innerHTML='<div class="empty" style="color:#e63946">'+e.message+'</div>'}
}
