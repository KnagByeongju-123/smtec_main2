<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>회의록 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-0.5px}
.hdr p{font-size:10px;opacity:.65;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:48px;z-index:90}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#999;transition:.2s}
.tab.on{color:#0f3460;border-bottom-color:#0f3460}
.pnl{display:none;padding:12px;max-width:800px;margin:0 auto}.pnl.on{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#0f3460}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fg label .req{color:#e63946;margin-left:2px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#0f3460;background:#fff;box-shadow:0 0 0 3px rgba(15,52,96,.08)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6}
.fg select{appearance:auto}
.btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff;box-shadow:0 2px 8px rgba(15,52,96,.2)}
.btn-green{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;box-shadow:0 2px 8px rgba(0,184,148,.2)}
.btn-red{background:#fff;color:#e63946;border:1.5px solid #e63946}
.btn-gray{background:#f5f5f5;color:#555;border:1.5px solid #ddd}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-row{display:flex;gap:8px;margin-bottom:12px}
.btn-row .btn{flex:1}
.m-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;transition:.15s;border-left:4px solid #0f3460}
.m-item:active{transform:scale(.99)}
.m-item .m-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.m-item .m-meta{font-size:11px;color:#888;display:flex;flex-wrap:wrap;gap:6px}
.m-item .m-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-정기{background:#dfe6e9;color:#2d3436}
.badge-긴급{background:#ffeaa7;color:#d63031}
.badge-프로젝트{background:#dfe6fd;color:#0f3460}
.badge-기타{background:#f0f0f0;color:#636e72}
.badge-site{background:#e8f8f5;color:#00b894}
.badge-mid{background:#fef3e2;color:#e67e22}
.badge-sub{background:#f0e6ff;color:#8e44ad}
.action-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.action-item:last-child{border:none}
.action-chk{width:20px;height:20px;border-radius:4px;border:2px solid #ddd;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:.2s}
.action-chk.done{background:#00b894;border-color:#00b894}
.action-body{flex:1;min-width:0}
.action-body .a-text{font-size:13px;font-weight:500;color:#333}
.action-body .a-meta{font-size:11px;color:#888;margin-top:2px}
.action-body.done-text .a-text{text-decoration:line-through;color:#aaa}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:8px}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #eee}
.photo-grid img:active{opacity:.8}
.img-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
.img-modal.show{display:flex}
.img-modal img{max-width:95%;max-height:80vh;border-radius:8px}
.img-modal .close-btn{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;cursor:pointer}
.filter-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;flex:1;min-width:0}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #ddd;border-top-color:#0f3460;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f0f0f0;border-radius:16px;font-size:12px;margin:3px}
.chip .chip-del{border:none;background:none;color:#e63946;font-weight:700;cursor:pointer;font-size:14px;padding:0 2px}
.act-add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.act-add-row input,.act-add-row select{padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.status-bar{padding:6px 12px;font-size:11px;text-align:center;background:#e8f8f5;color:#00b894;font-weight:600;border-radius:8px;margin-bottom:8px}
.status-bar.err{background:#ffeaea;color:#e63946}
/* 설정 트리 */
.set-section{border:1.5px solid #e0e0e0;border-radius:10px;margin-bottom:8px;overflow:hidden}
.set-hdr{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#f8f9fa;font-size:13px;font-weight:700;color:#0f3460;cursor:pointer;user-select:none}
.set-hdr .arrow{transition:.2s;font-size:10px}
.set-hdr.collapsed .arrow{transform:rotate(-90deg)}
.set-body{padding:8px 12px}
.set-body.hide{display:none}
.set-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.set-item:last-child{border:none}
.set-item .set-name{flex:1;min-width:0}
.set-del{width:24px;height:24px;border:none;border-radius:6px;background:#ffebee;color:#e63946;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-add{display:flex;gap:6px;margin-top:6px}
.set-add input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.set-add button{padding:7px 14px;border:none;border-radius:6px;background:#0f3460;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.set-mid{margin-left:16px;border-color:#f0e0c0}
.set-mid>.set-hdr{background:#fef9f0;color:#e67e22}
.set-sub{margin-left:16px;border-color:#e0d0f0}
.set-sub>.set-hdr{background:#f8f0ff;color:#8e44ad}
</style>
</head>
<body>

<div class="hdr">
  <h1>📋 회의록 관리 시스템</h1>
  <p>사업장 간 회의록 공유 · NocoDB 연동</p>
</div>

<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📋 목록</div>
  <div class="tab" onclick="swTab(1)">✏️ 작성</div>
  <div class="tab" onclick="swTab(2)">📊 현황</div>
  <div class="tab" onclick="swTab(3)">⚙️ 설정</div>
</div>

<!-- 목록 -->
<div class="pnl on" id="pnl0">
  <div class="filter-bar">
    <select id="fSite" onchange="loadList()"><option value="">전체 사업장</option></select>
    <select id="fType" onchange="onFTypeChg()"><option value="">전체 유형</option></select>
  </div>
  <div class="filter-bar">
    <select id="fMid" onchange="onFMidChg()"><option value="">전체 중분류</option></select>
    <select id="fSub" onchange="loadList()"><option value="">전체 소분류</option></select>
    <input type="month" id="fMonth" onchange="loadList()" style="flex:.8">
  </div>
  <div id="listArea"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
</div>

<!-- 작성/수정 -->
<div class="pnl" id="pnl1">
  <div class="card">
    <div class="card-tit">✏️ <span id="formTitle">새 회의록 작성</span></div>
    <input type="hidden" id="editId" value="">
    <div class="fg"><label>회의제목 <span class="req">*</span></label><input type="text" id="iTitle" placeholder="회의 제목을 입력하세요"></div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><label>회의일시 <span class="req">*</span></label><input type="datetime-local" id="iDate"></div>
      <div class="fg" style="flex:1"><label>사업장 <span class="req">*</span></label><select id="iSite"><option value="">선택</option></select></div>
    </div>
    <div class="fg"><label>회의유형</label><select id="iType" onchange="onITypeChg()"><option value="">선택</option></select></div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><label>중분류</label><select id="iMid" onchange="onIMidChg()"><option value="">선택</option></select></div>
      <div class="fg" style="flex:1"><label>소분류</label><select id="iSub"><option value="">선택</option></select></div>
    </div>
    <div class="fg"><label>회의장소</label><input type="text" id="iPlace" placeholder="장소"></div>
    <div class="fg"><label>참석자</label><input type="text" id="iAttendees" placeholder="참석자 (쉼표로 구분)"></div>
    <div class="fg"><label>안건</label><textarea id="iAgenda" placeholder="회의 안건을 입력하세요" rows="2"></textarea></div>
    <div class="fg"><label>회의내용 <span class="req">*</span></label><textarea id="iContent" placeholder="회의 내용을 상세히 입력하세요" rows="5"></textarea></div>
    <div class="fg"><label>결정사항</label><textarea id="iDecision" placeholder="결정된 사항을 입력하세요" rows="3"></textarea></div>
    <div class="fg"><label>작성자</label><input type="text" id="iAuthor" placeholder="작성자명"></div>
    <div class="fg"><label>비고</label><textarea id="iNote" placeholder="기타 비고사항" rows="2"></textarea></div>
  </div>
  <div class="card">
    <div class="card-tit">📷 첨부사진</div>
    <div class="btn-row"><button class="btn btn-sm btn-gray" onclick="document.getElementById('photoInput').click()">📷 사진 추가</button></div>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
    <div class="photo-grid" id="photoPreview"></div>
    <div id="photoStatus" style="font-size:11px;color:#888;margin-top:4px"></div>
  </div>
  <div class="card">
    <div class="card-tit">📌 후속조치</div>
    <div id="actionList"></div>
    <div class="act-add-row">
      <input type="text" id="actText" placeholder="조치내용" style="flex:2">
      <input type="text" id="actPerson" placeholder="담당자" style="flex:1">
      <input type="date" id="actDue" style="flex:1">
      <button class="btn btn-sm btn-primary" onclick="addAction()" style="flex:0;white-space:nowrap">+ 추가</button>
    </div>
  </div>
  <div class="btn-row" style="margin-top:4px">
    <button class="btn btn-primary" onclick="saveMeeting()" id="btnSave">💾 저장</button>
    <button class="btn btn-gray" onclick="resetForm();swTab(0)">취소</button>
  </div>
</div>

<!-- 현황 -->
<div class="pnl" id="pnl2">
  <div class="card"><div class="card-tit">📊 후속조치 현황</div><div id="statsArea"><div class="loading"><div class="spinner"></div></div></div></div>
  <div class="card"><div class="card-tit">📌 미완료 후속조치</div><div id="pendingActions"><div class="empty">조회 중...</div></div></div>
</div>

<!-- 설정 -->
<div class="pnl" id="pnl3">
  <div class="card">
    <div class="card-tit">🏢 사업장 관리</div>
    <div id="siteChips"></div>
    <div class="set-add"><input type="text" id="newSite" placeholder="사업장명 입력"><button onclick="addSiteItem()">추가</button></div>
  </div>
  <div class="card">
    <div class="card-tit">📂 회의유형 · 중분류 · 소분류</div>
    <div id="catTree"></div>
    <div class="set-add" style="margin-top:10px"><input type="text" id="newType" placeholder="새 회의유형 추가"><button onclick="addType()">유형 추가</button></div>
  </div>
  <div class="card">
    <div class="card-tit">🔧 DB 초기화</div>
    <div id="dbStatus" class="status-bar">확인 중...</div>
    <button class="btn btn-sm btn-primary" onclick="initTables()" style="margin-top:8px">테이블 자동 생성</button>
    <p style="font-size:11px;color:#888;margin-top:6px">처음 사용 시 한번만 실행하세요.</p>
  </div>
</div>

<!-- 상세 모달 -->
<div id="detailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f0f2f5;z-index:200;overflow-y:auto">
  <div style="position:sticky;top:0;background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:10">
    <button onclick="closeDetail()" style="border:none;background:rgba(255,255,255,.15);color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer">←</button>
    <span style="font-size:15px;font-weight:700;flex:1" id="detailTitle"></span>
    <button class="btn btn-sm" onclick="editFromDetail()" style="background:rgba(255,255,255,.15);color:#fff;font-size:11px">수정</button>
    <button class="btn btn-sm" onclick="deleteFromDetail()" style="background:rgba(230,57,70,.8);color:#fff;font-size:11px">삭제</button>
  </div>
  <div style="padding:12px;max-width:800px;margin:0 auto" id="detailBody"></div>
</div>

<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')">
  <button class="close-btn" onclick="event.stopPropagation();document.getElementById('imgModal').classList.remove('show')">✕</button>
  <img id="imgModalSrc" src="">
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://app.nocodb.com/api/v2',TOKEN='mi9vXBv5w9h10RcshLNFexjEqzXhU0EUtYlNXAmw',BASE_ID='p7ex9mwekhxgjsi';
let TBL={회의록:'',후속조치:'',설정:''};
const H={'xc-token':TOKEN,'Content-Type':'application/json'};

async function api(m,p,b){
  const o={method:m,headers:H};if(b)o.body=JSON.stringify(b);
  // GET 요청 시 where/sort 파라미터 한글 인코딩
  let url=API+p;
  if(m==='GET'&&p.includes('?')){
    const [base,qs]=p.split('?',2);
    const params=new URLSearchParams();
    qs.split('&').forEach(kv=>{const idx=kv.indexOf('=');if(idx>0){params.append(kv.substring(0,idx),kv.substring(idx+1))}else{params.append(kv,'')}});
    url=API+base+'?'+params.toString();
  }
  const r=await fetch(url,o);
  if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t.substring(0,200))}
  const t=await r.text();try{return JSON.parse(t)}catch{return t}
}
function fv(r,...n){for(const k of n){if(r[k]!==undefined&&r[k]!==null)return r[k]}return ''}

// ===== 테이블 탐색/생성 =====
async function detectTables(){
  try{const r=await api('GET','/meta/bases/'+BASE_ID+'/tables');(r.list||[]).forEach(t=>{if(TBL.hasOwnProperty(t.title))TBL[t.title]=t.id});updateDbStatus();return true}
  catch(e){console.error('detectTables:',e);document.getElementById('dbStatus').textContent='DB 연결 실패: '+e.message;document.getElementById('dbStatus').className='status-bar err';return false}
}
function updateDbStatus(){const el=document.getElementById('dbStatus'),ms=Object.entries(TBL).filter(([,v])=>!v).map(([k])=>k);if(!ms.length){el.textContent='✅ 모든 테이블 정상';el.className='status-bar'}else{el.textContent='⚠ 누락: '+ms.join(', ');el.className='status-bar err'}}

async function initTables(){
  if(!confirm('회의록·후속조치·설정 테이블을 생성합니다.'))return;
  const st=document.getElementById('dbStatus');st.textContent='생성 중...';st.className='status-bar';
  try{
    await detectTables();
    if(!TBL['회의록']){const r=await api('POST','/meta/bases/'+BASE_ID+'/tables',{title:'회의록',columns:[
      {title:'회의제목',uidt:'SingleLineText'},{title:'회의일시',uidt:'DateTime'},{title:'회의장소',uidt:'SingleLineText'},
      {title:'회의유형',uidt:'SingleLineText'},{title:'중분류',uidt:'SingleLineText'},{title:'소분류',uidt:'SingleLineText'},
      {title:'사업장',uidt:'SingleLineText'},{title:'참석자',uidt:'LongText'},{title:'안건',uidt:'LongText'},
      {title:'회의내용',uidt:'LongText'},{title:'결정사항',uidt:'LongText'},{title:'첨부사진',uidt:'Attachment'},
      {title:'작성자',uidt:'SingleLineText'},{title:'작성일',uidt:'Date'},{title:'비고',uidt:'LongText'}
    ]});TBL['회의록']=r.id}
    if(!TBL['후속조치']){const r=await api('POST','/meta/bases/'+BASE_ID+'/tables',{title:'후속조치',columns:[
      {title:'회의록ID',uidt:'SingleLineText'},{title:'회의제목',uidt:'SingleLineText'},{title:'조치내용',uidt:'SingleLineText'},
      {title:'담당자',uidt:'SingleLineText'},{title:'기한',uidt:'Date'},{title:'완료여부',uidt:'Checkbox'},
      {title:'완료일',uidt:'Date'},{title:'진행상태',uidt:'SingleSelect',dtxp:"'대기','진행중','완료','지연'"},{title:'비고',uidt:'LongText'}
    ]});TBL['후속조치']=r.id}
    if(!TBL['설정']){const r=await api('POST','/meta/bases/'+BASE_ID+'/tables',{title:'설정',columns:[
      {title:'구분',uidt:'SingleLineText'},{title:'상위값',uidt:'SingleLineText'},{title:'코드값',uidt:'SingleLineText'},
      {title:'표시명',uidt:'SingleLineText'},{title:'정렬순서',uidt:'Number'},{title:'사용여부',uidt:'Checkbox'}
    ]});TBL['설정']=r.id;
      await api('POST','/tables/'+TBL['설정']+'/records',[
        {구분:'사업장',상위값:'',코드값:'본사',표시명:'본사',정렬순서:1,사용여부:true},
        {구분:'사업장',상위값:'',코드값:'법인1',표시명:'법인1',정렬순서:2,사용여부:true},
        {구분:'사업장',상위값:'',코드값:'법인2',표시명:'법인2',정렬순서:3,사용여부:true},
        {구분:'회의유형',상위값:'',코드값:'정기회의',표시명:'정기회의',정렬순서:1,사용여부:true},

// ===== 설정 데이터 =====
let sites=[],settingsRaw=[],typeTree={};

async function loadSettings(){
  if(!TBL['설정'])return;
  try{const r=await api('GET','/tables/'+TBL['설정']+'/records?limit=500&sort=정렬순서');settingsRaw=r.list||[]}
  catch(e){settingsRaw=[];console.log('설정 로드 실패:',e)}
  sites=settingsRaw.filter(r=>fv(r,'구분')==='사업장').map(r=>fv(r,'표시명','코드값')).filter(Boolean);
  if(!sites.length)sites=['본사'];
  typeTree={};
  settingsRaw.filter(r=>fv(r,'구분')==='회의유형').forEach(t=>{const n=fv(t,'표시명','코드값');if(n)typeTree[n]={mids:{}}});
  settingsRaw.filter(r=>fv(r,'구분')==='중분류').forEach(m=>{const p=fv(m,'상위값'),n=fv(m,'표시명','코드값');if(p&&typeTree[p]&&n)typeTree[p].mids[n]={subs:[]}});
  settingsRaw.filter(r=>fv(r,'구분')==='소분류').forEach(s=>{const p=fv(s,'상위값'),n=fv(s,'표시명','코드값');if(p&&n)for(const[,to]of Object.entries(typeTree))if(to.mids[p]){to.mids[p].subs.push(n);break}});
  if(!Object.keys(typeTree).length)typeTree={정기회의:{mids:{}},긴급회의:{mids:{}},프로젝트회의:{mids:{}},기타:{mids:{}}};
  renderSiteOpts();renderSiteChips();renderTypeOpts();renderCatTree();
}

function renderSiteOpts(){['fSite','iSite'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fSite';el.innerHTML=f?'<option value="">전체 사업장</option>':'<option value="">선택</option>';sites.forEach(s=>{el.innerHTML+='<option'+(s===c?' selected':'')+'>'+s+'</option>'})})}
function renderSiteChips(){document.getElementById('siteChips').innerHTML=sites.map(s=>'<span class="chip">'+esc(s)+'<button class="chip-del" onclick="removeSite(\''+ea(s)+'\')">✕</button></span>').join('')}
function renderTypeOpts(){['fType','iType'].forEach(id=>{const el=document.getElementById(id),c=el.value,f=id==='fType';el.innerHTML=f?'<option value="">전체 유형</option>':'<option value="">선택</option>';Object.keys(typeTree).forEach(t=>{el.innerHTML+='<option'+(t===c?' selected':'')+'>'+t+'</option>'})})}

function getMids(t){return typeTree[t]?Object.keys(typeTree[t].mids):[]}
function getSubs(t,m){return typeTree[t]&&typeTree[t].mids[m]?typeTree[t].mids[m].subs:[]}

function fillMid(id,t,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 중분류</option>':'<option value="">선택</option>';getMids(t).forEach(m=>{el.innerHTML+='<option'+(m===kv?' selected':'')+'>'+m+'</option>'})}
function fillSub(id,t,m,kv){const el=document.getElementById(id),f=id.startsWith('f');el.innerHTML=f?'<option value="">전체 소분류</option>':'<option value="">선택</option>';getSubs(t,m).forEach(s=>{el.innerHTML+='<option'+(s===kv?' selected':'')+'>'+s+'</option>'})}

function onFTypeChg(){fillMid('fMid',document.getElementById('fType').value);document.getElementById('fSub').innerHTML='<option value="">전체 소분류</option>';loadList()}
function onFMidChg(){fillSub('fSub',document.getElementById('fType').value,document.getElementById('fMid').value);loadList()}
function onITypeChg(){fillMid('iMid',document.getElementById('iType').value);document.getElementById('iSub').innerHTML='<option value="">선택</option>'}
function onIMidChg(){fillSub('iSub',document.getElementById('iType').value,document.getElementById('iMid').value)}

// ===== 설정 트리 렌더링 =====
function renderCatTree(){
  const c=document.getElementById('catTree');
  if(!Object.keys(typeTree).length){c.innerHTML='<div class="empty">회의유형이 없습니다</div>';return}
  let h='';
  Object.entries(typeTree).forEach(([tn,to])=>{
    h+='<div class="set-section"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📂 '+esc(tn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeType(\''+ea(tn)+'\')" title="삭제">✕</button></span></div><div class="set-body">';
    Object.entries(to.mids).forEach(([mn,mo])=>{
      h+='<div class="set-section set-mid"><div class="set-hdr" onclick="togBody(this)"><span class="arrow">▼</span> 📁 '+esc(mn)+'<span style="margin-left:auto"><button class="set-del" onclick="event.stopPropagation();removeMid(\''+ea(tn)+'\',\''+ea(mn)+'\')" title="삭제">✕</button></span></div><div class="set-body">';
      mo.subs.forEach(sn=>{h+='<div class="set-item"><span class="set-name">📄 '+esc(sn)+'</span><button class="set-del" onclick="removeSub(\''+ea(tn)+'\',\''+ea(mn)+'\',\''+ea(sn)+'\')">✕</button></div>'});
      h+='<div class="set-add"><input type="text" placeholder="소분류 추가" id="aS_'+ea(tn)+'_'+ea(mn)+'"><button onclick="addSub(\''+ea(tn)+'\',\''+ea(mn)+'\')">추가</button></div>';
      h+='</div></div>';
    });
    h+='<div class="set-add" style="margin-top:6px"><input type="text" placeholder="중분류 추가" id="aM_'+ea(tn)+'"><button onclick="addMid(\''+ea(tn)+'\')">추가</button></div>';
    h+='</div></div>';
  });
  c.innerHTML=h;
}
function togBody(hdr){const b=hdr.nextElementSibling;b.classList.toggle('hide');hdr.classList.toggle('collapsed')}

async function delRecs(g,p,c){if(!TBL['설정'])return;try{let w='(구분,eq,'+g+')~and(코드값,eq,'+c+')';if(p)w+='~and(상위값,eq,'+p+')';const r=await api('GET','/tables/'+TBL['설정']+'/records?where='+encodeURIComponent(w));for(const row of(r.list||[]))await api('DELETE','/tables/'+TBL['설정']+'/records',{Id:row.Id})}catch(e){console.log('del fail:',e)}}

async function addSiteItem(){const inp=document.getElementById('newSite'),v=inp.value.trim();if(!v)return;if(sites.includes(v)){showToast('이미 존재');return}
  if(TBL['설정'])try{await api('POST','/tables/'+TBL['설정']+'/records',{구분:'사업장',상위값:'',코드값:v,표시명:v,정렬순서:sites.length+1,사용여부:true})}catch(e){}
  inp.value='';await loadSettings();showToast('✅ '+v+' 추가')}
async function removeSite(v){if(!confirm(v+' 삭제?'))return;await delRecs('사업장','',v);await loadSettings();showToast(v+' 삭제')}

async function addType(){const inp=document.getElementById('newType'),v=inp.value.trim();if(!v)return;if(typeTree[v]){showToast('이미 존재');return}
  if(TBL['설정'])try{await api('POST','/tables/'+TBL['설정']+'/records',{구분:'회의유형',상위값:'',코드값:v,표시명:v,정렬순서:Object.keys(typeTree).length+1,사용여부:true})}catch(e){showToast('실패');return}
  inp.value='';await loadSettings();showToast('✅ '+v+' 추가')}
async function removeType(tn){if(!confirm(tn+' 유형과 하위 전체 삭제?'))return;await delRecs('회의유형','',tn);for(const mn of getMids(tn)){await delRecs('중분류',tn,mn);for(const sn of getSubs(tn,mn))await delRecs('소분류',mn,sn)}await loadSettings();showToast(tn+' 삭제')}

async function addMid(tn){const inp=document.getElementById('aM_'+tn);if(!inp)return;const v=inp.value.trim();if(!v)return;if(typeTree[tn]&&typeTree[tn].mids[v]){showToast('이미 존재');return}
  if(TBL['설정'])try{await api('POST','/tables/'+TBL['설정']+'/records',{구분:'중분류',상위값:tn,코드값:v,표시명:v,정렬순서:getMids(tn).length+1,사용여부:true})}catch(e){showToast('실패');return}
  await loadSettings();showToast('✅ '+v+' 추가')}
async function removeMid(tn,mn){if(!confirm(mn+' 중분류와 소분류 삭제?'))return;await delRecs('중분류',tn,mn);for(const sn of getSubs(tn,mn))await delRecs('소분류',mn,sn);await loadSettings();showToast(mn+' 삭제')}

async function addSub(tn,mn){const inp=document.getElementById('aS_'+tn+'_'+mn);if(!inp)return;const v=inp.value.trim();if(!v)return;if(getSubs(tn,mn).includes(v)){showToast('이미 존재');return}
  if(TBL['설정'])try{await api('POST','/tables/'+TBL['설정']+'/records',{구분:'소분류',상위값:mn,코드값:v,표시명:v,정렬순서:getSubs(tn,mn).length+1,사용여부:true})}catch(e){showToast('실패');return}
  await loadSettings();showToast('✅ '+v+' 추가')}
async function removeSub(tn,mn,sn){if(!confirm(sn+' 삭제?'))return;await delRecs('소분류',mn,sn);await loadSettings();showToast(sn+' 삭제')}

      area.appendChild(d);
    });

    pActions=[];if(TBL['후속조치']){const ar=await api('GET','/tables/'+TBL['후속조치']+'/records?limit=500');
      const allA=ar.list||[];const matched=allA.filter(a=>String(fv(a,'회의록ID'))===String(curId));
      pActions=matched.map(a=>({id:a.Id,text:fv(a,'조치내용'),person:fv(a,'담당자'),due:fv(a,'기한')?fv(a,'기한').split('T')[0]:'',done:!!fv(a,'완료여부'),status:fv(a,'진행상태')||'대기'}))}
    renderActs();photoFiles=[];existPhotos=[];const ph=fv(r,'첨부사진');if(ph&&Array.isArray(ph))existPhotos=ph;renderPhotos();
    closeDetail();swTab(1);
  }catch(e){showToast('실패: '+e.message)}
}
async function deleteFromDetail(){if(!curId||!confirm('삭제하시겠습니까?'))return;try{if(TBL['후속조치']){const ar=await api('GET','/tables/'+TBL['후속조치']+'/records?limit=500');const matched=(ar.list||[]).filter(a=>String(fv(a,'회의록ID'))===String(curId));for(const a of matched)await api('DELETE','/tables/'+TBL['후속조치']+'/records',{Id:a.Id})}await api('DELETE','/tables/'+TBL['회의록']+'/records',{Id:curId});closeDetail();showToast('✅ 삭제');loadList()}catch(e){showToast('실패: '+e.message)}}
async function togAct(id,v){if(!TBL['후속조치'])return;try{const u={Id:id,완료여부:v,진행상태:v?'완료':'대기'};if(v)u['완료일']=new Date().toISOString().split('T')[0];await api('PATCH','/tables/'+TBL['후속조치']+'/records',u);showToast(v?'✅ 완료':'↩ 미완료');if(curId)showDetail(curId)}catch(e){showToast('실패')}}

// ===== 작성 =====
let pActions=[],photoFiles=[],existPhotos=[];

function resetForm(){document.getElementById('editId').value='';document.getElementById('formTitle').textContent='새 회의록 작성';
  ['iTitle','iPlace','iAttendees','iAgenda','iContent','iDecision','iNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iType').value='';document.getElementById('iMid').innerHTML='<option value="">선택</option>';document.getElementById('iSub').innerHTML='<option value="">선택</option>';
  document.getElementById('iSite').value='';document.getElementById('iAuthor').value=localStorage.getItem('MT_AU')||'';
  const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());document.getElementById('iDate').value=now.toISOString().slice(0,16);
  pActions=[];photoFiles=[];existPhotos=[];renderActs();renderPhotos()}

function addAction(){const t=document.getElementById('actText').value.trim(),p=document.getElementById('actPerson').value.trim(),d=document.getElementById('actDue').value;if(!t){showToast('조치내용 입력');return}
  pActions.push({text:t,person:p,due:d,done:false,status:'대기'});document.getElementById('actText').value='';document.getElementById('actPerson').value='';document.getElementById('actDue').value='';renderActs()}
function removeAct(i){pActions.splice(i,1);renderActs()}
function renderActs(){const c=document.getElementById('actionList');if(!pActions.length){c.innerHTML='<div style="font-size:12px;color:#bbb;padding:8px 0">항목 없음</div>';return}c.innerHTML='';
  pActions.forEach((a,i)=>{const d=document.createElement('div');d.className='action-item';d.innerHTML='<div class="action-body"><div class="a-text">'+esc(a.text)+'</div><div class="a-meta">'+(a.person?'👤'+esc(a.person):'')+(a.due?' 📅'+a.due:'')+'</div></div><button class="btn btn-sm btn-red" onclick="removeAct('+i+')" style="flex:0;padding:4px 8px;font-size:11px">✕</button>';c.appendChild(d)})}

function handlePhotos(inp){Array.from(inp.files).forEach(f=>photoFiles.push(f));inp.value='';renderPhotos()}
function renderPhotos(){const g=document.getElementById('photoPreview');g.innerHTML='';
  existPhotos.forEach((p,i)=>{const u=p.signedUrl||p.url||p.path||'';if(u){const w=document.createElement('div');w.style.position='relative';w.innerHTML='<img src="'+u+'" onclick="showImg(\''+u+'\')" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid #eee"><button onclick="existPhotos.splice('+i+',1);renderPhotos()" style="position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#e63946;color:#fff;border:none;font-size:12px;cursor:pointer">✕</button>';g.appendChild(w)}});
  photoFiles.forEach((f,i)=>{const w=document.createElement('div');w.style.position='relative';const img=document.createElement('img');img.style.cssText='width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:2px solid #00b894';const rd=new FileReader();rd.onload=e=>{img.src=e.target.result};rd.readAsDataURL(f);w.appendChild(img);const b=document.createElement('button');b.style.cssText='position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:#e63946;color:#fff;border:none;font-size:12px;cursor:pointer';b.textContent='✕';b.onclick=()=>{photoFiles.splice(i,1);renderPhotos()};w.appendChild(b);g.appendChild(w)});
  document.getElementById('photoStatus').textContent=(existPhotos.length+photoFiles.length)?(existPhotos.length+photoFiles.length)+'장 첨부':''}

async function uploadPhotos(){if(!photoFiles.length)return null;const fd=new FormData();photoFiles.forEach(f=>fd.append('file',f));const r=await fetch(API+'/storage/upload',{method:'POST',headers:{'xc-token':TOKEN},body:fd});return await r.json()}

async function saveMeeting(){
  const title=document.getElementById('iTitle').value.trim(),date=document.getElementById('iDate').value,content=document.getElementById('iContent').value.trim(),site=document.getElementById('iSite').value;
  if(!title){showToast('제목 입력');return}if(!date){showToast('일시 선택');return}if(!content){showToast('내용 입력');return}if(!site){showToast('사업장 선택');return}if(!TBL['회의록']){showToast('테이블 먼저 생성');return}
  const eid=document.getElementById('editId').value;document.getElementById('btnSave').disabled=true;document.getElementById('btnSave').textContent='저장 중...';
  try{const author=document.getElementById('iAuthor').value.trim();if(author)localStorage.setItem('MT_AU',author);
    let pd=existPhotos.length?[...existPhotos]:[];if(photoFiles.length){const up=await uploadPhotos();if(up&&Array.isArray(up))pd=[...pd,...up]}
    const rec={회의제목:title,회의일시:date,회의장소:document.getElementById('iPlace').value.trim(),
      회의유형:document.getElementById('iType').value,중분류:document.getElementById('iMid').value,소분류:document.getElementById('iSub').value,
      사업장:site,참석자:document.getElementById('iAttendees').value.trim(),안건:document.getElementById('iAgenda').value.trim(),
      회의내용:content,결정사항:document.getElementById('iDecision').value.trim(),작성자:author,작성일:new Date().toISOString().split('T')[0],비고:document.getElementById('iNote').value.trim()};
    if(pd.length)rec['첨부사진']=pd;
    let sid;
    if(eid){rec.Id=parseInt(eid);await api('PATCH','/tables/'+TBL['회의록']+'/records',rec);sid=eid;
      if(TBL['후속조치']){try{const old=await api('GET','/tables/'+TBL['후속조치']+'/records?limit=500');const matched=(old.list||[]).filter(a=>String(fv(a,'회의록ID'))===String(eid));for(const a of matched)await api('DELETE','/tables/'+TBL['후속조치']+'/records',{Id:a.Id})}catch(e){console.log('기존 후속조치 삭제 실패:',e)}}
    }else{const res=await api('POST','/tables/'+TBL['회의록']+'/records',rec);console.log('회의록 POST 응답:',JSON.stringify(res));sid=res.Id||res.id||res.ID;if(!sid&&typeof res==='object'){for(const k of Object.keys(res)){if(k.toLowerCase()==='id'){sid=res[k];break}}}}
    console.log('savedId:',sid,'pActions:',pActions.length,'TBL후속:',TBL['후속조치']);
    if(TBL['후속조치']&&pActions.length&&sid){
      for(const a of pActions){
        const actRec={회의록ID:String(sid),회의제목:title,조치내용:a.text,담당자:a.person||'',완료여부:a.done||false,진행상태:a.status||'대기'};
        if(a.due)actRec['기한']=a.due;
        try{await api('POST','/tables/'+TBL['후속조치']+'/records',actRec);console.log('후속조치 저장 성공:',a.text)}
        catch(ae){console.error('후속조치 저장 실패:',ae,actRec)}
      }
    }
    showToast('✅ '+(eid?'수정':'등록')+' 완료');resetForm();swTab(0);
  }catch(e){showToast('저장 실패: '+e.message)}finally{document.getElementById('btnSave').disabled=false;document.getElementById('btnSave').textContent='💾 저장'}
}

// ===== 현황 =====
async function loadStats(){
  const sa=document.getElementById('statsArea'),pa=document.getElementById('pendingActions');
  if(!TBL['후속조치']){sa.innerHTML='<div class="empty">⚙️ 설정에서 테이블을 먼저 생성하세요</div>';pa.innerHTML='';return}
  sa.innerHTML='<div class="loading"><div class="spinner"></div></div>';pa.innerHTML='';
  try{
    const res=await api('GET','/tables/'+TBL['후속조치']+'/records?limit=500');
    console.log('후속조치 조회 결과:', res);
    const acts=res.list||[];
    console.log('후속조치 건수:', acts.length);
    if(!acts.length){sa.innerHTML='<div class="empty">등록된 후속조치가 없습니다</div>';pa.innerHTML='';return}
    const tot=acts.length,done=acts.filter(a=>fv(a,'완료여부')).length,pend=tot-done;
    const ov=acts.filter(a=>{const d=fv(a,'기한');return!fv(a,'완료여부')&&d&&new Date(d)<new Date()}).length;
    sa.innerHTML='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">'
      +'<div style="padding:12px;background:#e8f8f5;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#00b894">'+done+'</div><div style="font-size:11px;color:#888">완료</div></div>'
      +'<div style="padding:12px;background:#fff3cd;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#f39c12">'+pend+'</div><div style="font-size:11px;color:#888">진행중</div></div>'
      +'<div style="padding:12px;background:#ffeaea;border-radius:8px"><div style="font-size:24px;font-weight:700;color:#e63946">'+ov+'</div><div style="font-size:11px;color:#888">지연</div></div>'
      +'</div><div style="margin-top:8px;font-size:12px;color:#888;text-align:center">전체 '+tot+'건</div>';
    const pActs=acts.filter(a=>!fv(a,'완료여부')).sort((a,b)=>{const da=fv(a,'기한'),db=fv(b,'기한');if(!da)return 1;if(!db)return -1;return new Date(da)-new Date(db)});
    if(!pActs.length){pa.innerHTML='<div class="empty">🎉 모든 조치가 완료되었습니다</div>';return}
    pa.innerHTML='';pActs.forEach(a=>{const txt=fv(a,'조치내용'),per=fv(a,'담당자'),due=fv(a,'기한'),mt=fv(a,'회의제목');const ds=due?new Date(due).toLocaleDateString('ko-KR'):'',isOv=due&&new Date(due)<new Date();
      const d=document.createElement('div');d.className='action-item';d.innerHTML='<div class="action-chk" onclick="togAct('+a.Id+',true)"></div><div class="action-body"><div class="a-text">'+esc(txt)+'</div><div class="a-meta">'+(mt?'📋'+esc(mt)+' · ':'')+(per?'👤'+esc(per):'')+(ds?' 📅<span style="color:'+(isOv?'#e63946':'#333')+'">'+ds+'</span>':'')+'</div></div>';pa.appendChild(d)});
  }catch(e){console.error('loadStats error:',e);sa.innerHTML='<div class="empty" style="color:#e63946">조회 실패: '+e.message+'<br><span style="font-size:10px">콘솔(F12)에서 상세 확인</span></div>';pa.innerHTML=''}
}

// ===== 유틸 =====
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ea(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function showImg(u){document.getElementById('imgModalSrc').src=u;document.getElementById('imgModal').classList.add('show')}
let tt;function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

// ===== 시작 =====
(async function(){await detectTables();await loadSettings();const a=localStorage.getItem('MT_AU');if(a)document.getElementById('iAuthor').value=a;const n=new Date();n.setMinutes(n.getMinutes()-n.getTimezoneOffset());document.getElementById('iDate').value=n.toISOString().slice(0,16);loadList()})();
</script>
