<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>소재입고 등록</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#212121;min-height:100vh}
    .hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 16px;text-align:center}
    .hdr h1{font-size:17px;font-weight:700}.hdr p{font-size:10px;opacity:.7;margin-top:2px}
    .wrap{max-width:540px;margin:0 auto;padding:12px 12px 80px}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .fg{margin-bottom:12px}
    .fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
    .fg select,.fg input{width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
    .btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
    .btn:active{transform:scale(.97)}
    .btn-green{background:linear-gradient(135deg,#00c853,#00e676);color:#000}
    .btn-blue{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff}
    .btn-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
    .btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
    .btn-row{display:flex;gap:8px;margin-bottom:12px}
    .step{display:flex;gap:0;margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid #e0e0e0}
    .step-item{flex:1;padding:10px 6px;text-align:center;font-size:12px;font-weight:700;color:#aaa;background:#f5f5f5;transition:all .2s}
    .step-item.active{background:#1a237e;color:#fff}
    .step-item.done{background:#e8f5e9;color:#2e7d32}
    .info-box{padding:10px 12px;border-radius:8px;font-size:12px;line-height:1.7;margin-bottom:10px}
    .info-box.blue{background:#e3f2fd;border:1px solid #bbdefb;color:#1565c0}
    .info-box.green{background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32}
    .info-box.orange{background:#fff3e0;border:1px solid #ffe0b2;color:#e65100}
    .preview-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
    .preview-tbl th{padding:5px 6px;background:#e8eaf6;border:1px solid #c5cae9;white-space:nowrap;color:#1a237e;font-weight:700}
    .preview-tbl td{padding:4px 6px;border:1px solid #eee;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
    .back-link{display:inline-block;padding:10px 0;font-size:12px;color:#888;text-decoration:none}
    .back-link:hover{color:#1a237e}
    .file-drop{border:2.5px dashed #c5cae9;border-radius:12px;padding:30px 16px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
    .file-drop:hover,.file-drop.dragover{border-color:#1a237e;background:#e8eaf6}
    .file-drop .fd-icon{font-size:36px;margin-bottom:6px}
    .file-drop .fd-text{font-size:13px;font-weight:600;color:#555}
    .file-drop .fd-sub{font-size:11px;color:#999;margin-top:4px}
    .stat-row{display:flex;gap:8px;margin-bottom:8px}
    .stat-card{flex:1;padding:10px;border-radius:8px;text-align:center}
    .stat-card .sv{font-size:20px;font-weight:700}.stat-card .sl{font-size:10px;color:#888;margin-top:2px}
  </style>
</head>
<body>
<div class="hdr">
  <h1>📤 소재입고 등록</h1>
  <p>소재업체 템플릿 업로드 → DB 저장</p>
</div>
<div class="wrap">
  <a href="index.html" class="back-link">← 메인으로 돌아가기</a>

  <div class="step">
    <div class="step-item active" id="st1">① 설정</div>
    <div class="step-item" id="st2">② 업로드</div>
    <div class="step-item" id="st3">③ 확인</div>
    <div class="step-item" id="st4">④ 완료</div>
  </div>

  <!-- STEP 1: 기본 설정 -->
  <div id="pnlStep1">
    <div class="card">
      <div class="card-tit">⚙ 기본 설정</div>
      <div class="info-box blue">출발지, 도착지, 작업자는 여기서 설정하면<br>업로드한 모든 데이터에 자동 적용됩니다.</div>
      <div class="fg">
        <label>출발지</label>
        <input type="text" id="cfgFrom" placeholder="출발지 입력 (예: 태경스틸)" list="fromList">
        <datalist id="fromList">
          <option value="태경스틸"><option value="동일스텐"><option value="정민스틸">
          <option value="나스테크"><option value="외부업체">
        </datalist>
      </div>
      <div class="fg">
        <label>도착지</label>
        <input type="text" id="cfgTo" placeholder="도착지 입력 (예: 보관장)" list="toList">
        <datalist id="toList">
          <option value="보관장"><option value="생산라인"><option value="본사 창고">
        </datalist>
      </div>
      <div class="fg">
        <label>작업자명</label>
        <input type="text" id="cfgWorker" placeholder="작업자명 입력">
      </div>
      <button class="btn btn-blue" onclick="goStep(2)">다음 → 파일 업로드</button>
    </div>
    <div class="card">
      <div class="card-tit">📋 템플릿 다운로드</div>
      <div class="info-box orange">소재업체에 이 템플릿을 전달하세요.<br>업체는 <b>재질, 두께, 폭, 로트, 소재중량</b>만 기입합니다.<br>피치·비고는 비워두어도 됩니다 (사내 기입).</div>
      <button class="btn btn-sm btn-gray" onclick="downloadTemplate()" style="width:100%">📥 소재입고 템플릿 다운로드</button>
    </div>
  </div>

  <!-- STEP 2: 파일 업로드 -->
  <div id="pnlStep2" style="display:none">
    <div class="card">
      <div class="card-tit">📤 파일 업로드</div>
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        <div class="fd-icon">📁</div>
        <div class="fd-text">템플릿 파일을 선택하세요</div>
        <div class="fd-sub">.xlsx, .xls 파일 지원</div>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this)">
      <div id="fileInfo" style="display:none;margin-top:10px">
        <div class="info-box green" id="fileInfoText"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gray btn-sm" onclick="goStep(1)" style="flex:0 0 auto;width:auto">← 이전</button>
      <button class="btn btn-blue" onclick="goStep(3)" id="btnToStep3" disabled style="flex:1">다음 → 미리보기</button>
    </div>
  </div>

  <!-- STEP 3: 미리보기 -->
  <div id="pnlStep3" style="display:none">
    <div class="card">
      <div class="card-tit">🔍 데이터 미리보기</div>
      <div class="stat-row">
        <div class="stat-card" style="background:#e3f2fd"><div class="sv" id="pvTotal">0</div><div class="sl">총 건수</div></div>
        <div class="stat-card" style="background:#e8f5e9"><div class="sv" id="pvCompany">-</div><div class="sl">업체명</div></div>
        <div class="stat-card" style="background:#fff3e0"><div class="sv" id="pvDate">-</div><div class="sl">입고일자</div></div>
      </div>
      <div id="pvSettings" class="info-box blue" style="font-size:11px"></div>
      <div style="overflow-x:auto">
        <table class="preview-tbl" id="pvTable"></table>
      </div>
      <div id="pvMore" style="text-align:center;padding:6px;color:#888;font-size:10px"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gray btn-sm" onclick="goStep(2)" style="flex:0 0 auto;width:auto">← 수정</button>
      <button class="btn btn-green" onclick="doRegister()" id="btnRegister" style="flex:1;font-size:16px">✅ <span id="pvRegCnt">0</span>건 DB 등록</button>
    </div>
    <div id="regStatus" style="display:none;margin-top:8px;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;text-align:center"></div>
  </div>

  <!-- STEP 4: 완료 -->
  <div id="pnlStep4" style="display:none">
    <div class="card" style="text-align:center;padding:30px 16px">
      <div style="font-size:48px;margin-bottom:10px">✅</div>
      <div style="font-size:18px;font-weight:700;color:#2e7d32;margin-bottom:6px" id="doneTitle">등록 완료</div>
      <div style="font-size:13px;color:#555" id="doneSummary"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-blue" onclick="resetAll()">🔄 새 파일 등록</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// KST 유틸리티
function getKST(d){const utc=d.getTime()+d.getTimezoneOffset()*60000;return new Date(utc+9*3600000)}
function kstDateStr(d){const k=getKST(d||new Date());return k.getFullYear()+'-'+String(k.getMonth()+1).padStart(2,'0')+'-'+String(k.getDate()).padStart(2,'0')}
function kstTimeStr(d){const k=getKST(d||new Date());return String(k.getHours()).padStart(2,'0')+':'+String(k.getMinutes()).padStart(2,'0')+':'+String(k.getSeconds()).padStart(2,'0')}

// Supabase REST
const SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';

async function sbInsert(table,rows){
  const res=await fetch(SB_URL+'/rest/v1/'+table,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
    body:JSON.stringify(rows)
  });
  if(!res.ok){const t=await res.text();throw new Error(t)}
}

// 컬럼 매핑
const COL_MAP={
  '재질':'_material_type','material_type':'_material_type',
  '두께':'_thickness','thickness':'_thickness',
  '폭':'_width','width_mm':'_width',
  '피치':'_pitch','pitch':'_pitch',
  '로트':'lot','lot':'lot','로트번호':'lot',
  '소재중량':'weight','중량':'weight','weight':'weight',
  '입고일자':'incoming_date','소재입고일자':'incoming_date','incoming_date':'incoming_date',
  '비고':'note','note':'note','메모':'note',
  '업체명':'_customer','고객사':'_customer','customer':'_customer',
};

// 상태
let _batchData=[];
let _batchCompany='';
let _batchDate='';

// 스텝 이동
function goStep(n){
  if(n===2){
    if(!document.getElementById('cfgFrom').value.trim()){showToast('출발지를 입력하세요');return}
    if(!document.getElementById('cfgTo').value.trim()){showToast('도착지를 입력하세요');return}
  }
  if(n===3){
    if(!_batchData.length){showToast('파일을 먼저 업로드하세요');return}
    renderPreview();
  }
  for(let i=1;i<=4;i++){
    document.getElementById('pnlStep'+i).style.display=i===n?'block':'none';
    const st=document.getElementById('st'+i);
    st.className='step-item'+(i===n?' active':i<n?' done':'');
  }
  window.scrollTo(0,0);
}

// 템플릿 다운로드
function downloadTemplate(){
  const wb=XLSX.utils.book_new();
  const today=kstDateStr();
  const rows=[
    ['업체명','','','입고일자',today,'',''],
    [],
    ['재질','두께','폭','로트','소재중량','피치','비고'],
    ['SPCC','0.6','33','LOT-250615','120','',''],
    ['SUS304','0.5','64','LOT-250615','85','',''],
    ['SUS430','0.6','90','LOT-250616','60','',''],
    ['S55C','0.8','70','LOT-250616','95','',''],
  ];
  for(let i=0;i<43;i++)rows.push(new Array(7).fill(''));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:8},{wch:8},{wch:16},{wch:12},{wch:8},{wch:20}];
  ws['!merges']=[{s:{r:0,c:1},e:{r:0,c:2}},{s:{r:0,c:4},e:{r:0,c:6}}];
  XLSX.utils.book_append_sheet(wb,ws,'입고등록');

  const guide=[
    ['[ 소재입고 템플릿 작성 안내 ]'],[''],
    ['■ 작성 방법'],
    ['  1. 상단에 업체명과 입고일자를 기입하세요'],
    ['  2. 3행부터 소재 정보를 입력하세요'],
    ['  3. 헤더(3행)는 수정하지 마세요'],
    ['  4. 샘플 데이터(4~7행)는 삭제 후 작성하세요'],[''],
    ['■ 소재업체 기입 항목'],
    ['  재질','SPCC, SUS304, SUS430, S55C, S70C, C55E, C67S 등'],
    ['  두께','mm 단위 (예: 0.6, 0.8, 1.2)'],
    ['  폭','mm 단위 (예: 33, 64, 90)'],
    ['  로트','로트번호 (예: LOT-250615, 250615-A)'],
    ['  소재중량','kg 단위 (예: 120, 85.5)'],[''],
    ['■ 입력하지 않아도 되는 항목'],
    ['  피치','사내에서 필요 시 기입 (비워두셔도 됩니다)'],
    ['  비고','참고사항 자유 입력 (비워두셔도 됩니다)'],[''],
    ['■ 코일 분할 입고'],
    ['  코일을 분할하여 입고하는 경우,'],
    ['  동일 로트로 여러 행을 나누어 작성하세요.'],
    ['  (예: 1코일 300kg → 120kg + 180kg 분할)'],[''],
    ['  재질   두께  폭   로트          소재중량'],
    ['  SPCC   0.6   33   LOT-250615    120'],
    ['  SPCC   0.6   33   LOT-250615    180'],[''],
    ['  ※ 분할 입고가 아닌 코일 절단/가공은'],
    ['    개별등록(스캔)으로 진행하세요.'],
  ];
  const ws2=XLSX.utils.aoa_to_sheet(guide);
  ws2['!cols']=[{wch:40},{wch:50}];
  XLSX.utils.book_append_sheet(wb,ws2,'안내');
  XLSX.writeFile(wb,'소재입고_템플릿.xlsx');
  showToast('📋 템플릿 다운로드 완료');
}

// 드래그앤드롭
document.addEventListener('DOMContentLoaded',()=>{
  const drop=document.getElementById('fileDrop');
  if(!drop)return;
  ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover')}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover')}));
  drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)parseFile(f)});
});

function handleFile(input){const f=input.files[0];if(f)parseFile(f);input.value=''}

function parseFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const sheetName=wb.SheetNames.find(n=>n==='입고등록')||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];

      const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      _batchCompany='';_batchDate='';
      if(allRows.length>=1){
        const r1=allRows[0];
        if(r1[1])_batchCompany=String(r1[1]).trim();
        let dv=r1[4];
        if(dv instanceof Date)_batchDate=kstDateStr(dv);
        else if(dv)_batchDate=String(dv).trim();
      }

      let raw=XLSX.utils.sheet_to_json(ws,{range:2,defval:''});
      raw=raw.filter(r=>Object.values(r).some(v=>v!==''));
      raw.forEach(r=>{
        if(_batchCompany&&!r['업체명'])r['업체명']=_batchCompany;
        if(_batchDate&&!r['입고일자'])r['입고일자']=_batchDate;
      });

      if(!raw.length){showToast('데이터가 없습니다');return}
      _batchData=raw;

      document.getElementById('fileInfo').style.display='block';
      document.getElementById('fileInfoText').innerHTML=
        '✅ <b>'+file.name+'</b> 읽기 완료<br>'+
        '업체: <b>'+(_batchCompany||'미기입')+'</b> · 입고일: <b>'+(_batchDate||'미기입')+'</b> · <b>'+raw.length+'건</b>';
      document.getElementById('btnToStep3').disabled=false;
      showToast('✅ '+raw.length+'건 읽기 완료');
    }catch(err){showToast('파일 읽기 오류: '+err.message)}
  };
  reader.readAsArrayBuffer(file);
}

// 미리보기
function renderPreview(){
  const cfg={
    from:document.getElementById('cfgFrom').value.trim(),
    to:document.getElementById('cfgTo').value.trim(),
    worker:document.getElementById('cfgWorker').value.trim()
  };
  document.getElementById('pvTotal').textContent=_batchData.length;
  document.getElementById('pvCompany').textContent=_batchCompany||'-';
  document.getElementById('pvDate').textContent=_batchDate||'-';
  document.getElementById('pvRegCnt').textContent=_batchData.length;
  document.getElementById('pvSettings').innerHTML=
    '출발지: <b>'+cfg.from+'</b> → 도착지: <b>'+cfg.to+'</b>'+(cfg.worker?' · 작업자: <b>'+cfg.worker+'</b>':'');

  const cols=Object.keys(_batchData[0]);
  const showRows=_batchData.slice(0,15);
  let html='<thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
  showRows.forEach(row=>{
    html+='<tr>'+cols.map(c=>{
      let v=row[c];if(v instanceof Date)v=kstDateStr(v);
      return '<td>'+(v||'')+'</td>';
    }).join('')+'</tr>';
  });
  html+='</tbody>';
  document.getElementById('pvTable').innerHTML=html;
  document.getElementById('pvMore').textContent=_batchData.length>15?'... 외 '+(_batchData.length-15)+'건':'';
}

// DB 등록
async function doRegister(){
  if(!_batchData.length){showToast('데이터 없음');return}
  if(!confirm(_batchData.length+'건을 DB에 등록합니다.\n계속하시겠습니까?'))return;

  const st=document.getElementById('regStatus');
  st.style.display='block';st.style.background='#e3f2fd';st.style.color='#1565c0';
  st.textContent='등록 준비 중...';
  document.getElementById('btnRegister').disabled=true;

  const cfg={
    from:document.getElementById('cfgFrom').value.trim(),
    to:document.getElementById('cfgTo').value.trim(),
    worker:document.getElementById('cfgWorker').value.trim()
  };
  const now=new Date();
  const todayStr=kstDateStr(now);
  const timeStr=kstTimeStr(now);

  const rows=[];
  const srcCols=Object.keys(_batchData[0]);
  const colMap={};
  srcCols.forEach(sc=>{
    const key=sc.trim().toLowerCase().replace(/\s+/g,'');
    if(COL_MAP[key])colMap[sc]=COL_MAP[key];
  });

  _batchData.forEach(raw=>{
    const row={
      move_date:todayStr, move_time:timeStr, process:'소재입고',
      departure:cfg.from, destination:cfg.to,
      barcode_raw:'', base_part:'', lot:'', qty:null, note:'', format:'엑셀일괄',
      worker:cfg.worker, equipment:'', weight:null, incoming_date:null,
      parent_part:null, child_type:null, model_type:'raceway', general_model:null,
      material_info:null
    };
    let _mType='',_mThick='',_mWidth='',_mPitch='';
    srcCols.forEach(sc=>{
      const target=colMap[sc];if(!target)return;
      let v=raw[sc];
      if(v instanceof Date)v=kstDateStr(v);
      v=String(v||'').trim();
      if(!v)return;
      if(target==='_material_type')_mType=v;
      else if(target==='_thickness')_mThick=v;
      else if(target==='_width')_mWidth=v;
      else if(target==='_pitch')_mPitch=v;
      else if(target.startsWith('_'))return;
      else if(target==='weight')row.weight=parseFloat(v)||null;
      else if(target==='qty')row.qty=parseInt(v)||null;
      else row[target]=v;
    });
    const matParts=[_mType,_mThick,_mWidth,_mPitch].filter(Boolean);
    if(matParts.length)row.material_info=matParts.join(' // ');
    rows.push(row);
  });

  const CHUNK=10;
  let ok=0,fail=0;
  for(let i=0;i<rows.length;i+=CHUNK){
    const chunk=rows.slice(i,i+CHUNK);
    try{
      await sbInsert('move_history_tj',chunk);
      ok+=chunk.length;
    }catch(e){
      for(const r of chunk){
        try{await sbInsert('move_history_tj',[r]);ok++}catch(e2){fail++}
      }
    }
    st.textContent='등록 중... '+ok+'/'+(ok+fail)+' (전체: '+rows.length+')';
  }

  document.getElementById('btnRegister').disabled=false;

  if(fail===0){
    document.getElementById('doneTitle').textContent='✅ '+ok+'건 등록 완료';
    document.getElementById('doneSummary').innerHTML=
      '업체: <b>'+(_batchCompany||'-')+'</b> · 입고일: <b>'+(_batchDate||todayStr)+'</b><br>'+
      '출발지: '+cfg.from+' → 도착지: '+cfg.to+(cfg.worker?' · 작업자: '+cfg.worker:'');
    goStep(4);
  }else{
    st.style.background='#fff3e0';st.style.color='#e65100';
    st.textContent='⚠ 성공: '+ok+'건 / 실패: '+fail+'건';
  }
}

// 초기화
function resetAll(){
  _batchData=[];_batchCompany='';_batchDate='';
  document.getElementById('fileInfo').style.display='none';
  document.getElementById('btnToStep3').disabled=true;
  document.getElementById('regStatus').style.display='none';
  document.getElementById('fileInput').value='';
  goStep(1);
}

// 토스트
let _tt;
function showToast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2000);
}
</script>
