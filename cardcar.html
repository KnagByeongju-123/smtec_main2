<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>부서차량관리</title>
<link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
:root{--primary:#6366f1;--primary-light:#818cf8;--accent:#a78bfa;--purple:#c084fc;--bg-dark:#0f0f1a;--bg-mid:#1a1a2e;--text:#e8e8f0;--text-dim:#8888a8;--text-dimmer:#5a5a7a;--green:#81c995;--red:#ef4444;--orange:#fb923c;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:linear-gradient(135deg,var(--bg-dark) 0%,var(--bg-mid) 50%,#16213e 100%);color:var(--text);min-height:100vh;min-height:100dvh;max-width:480px;margin:0 auto;position:relative;padding-bottom:80px;overflow-x:hidden;}
::-webkit-scrollbar{width:0}
.header{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(168,85,247,0.1));backdrop-filter:blur(20px);padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100;}
.header h1{font-size:19px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;}
.header-sub{font-size:11px;color:#7c7c9a;margin-top:2px;}
.header-row{display:flex;align-items:center;justify-content:space-between}
.sync-btn{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:10px;color:#a5b4fc;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.sync-btn.syncing{opacity:0.6;pointer-events:none}
.sync-status{font-size:10px;color:#6a6a8a;margin-top:3px;text-align:right}
.month-sel{display:flex;align-items:center;gap:8px;padding:12px 20px;background:rgba(255,255,255,0.02)}
.month-sel span{font-size:13px;color:var(--text-dim);font-weight:600}
.month-sel input{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:10px;color:#c4b5fd;padding:8px 14px;font-size:14px;font-weight:600;outline:none;flex:1;font-family:inherit;}
.content{padding:8px 16px 16px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,15,26,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,12px);z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px;border-radius:12px;background:transparent;border:none;color:var(--text-dimmer);cursor:pointer;font-size:9px;font-weight:500;font-family:inherit;flex:1;min-width:0;}
.nav-item.active{background:rgba(99,102,241,0.12);color:var(--primary-light);font-weight:700}
.nav-icon{font-size:18px}
.fab{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;z-index:90;}
.record-card{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);position:relative;}
.record-main{font-size:15px;font-weight:600;color:var(--text);margin-top:6px}
.record-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
.badge{display:inline-block;background:rgba(99,102,241,0.15);color:#a5b4fc;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;margin-top:8px}
.record-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.act-btn{background:rgba(255,255,255,0.06);border:none;border-radius:8px;color:var(--text-dim);padding:6px 10px;font-size:12px;cursor:pointer;}
.timestamp{font-size:10px;color:#6a6a8a;margin-top:6px;display:flex;align-items:center;gap:4px;}
.timestamp .edited{color:#fbbf24}
.hash-tag{font-size:9px;color:#4a4a6a;font-family:monospace;margin-top:2px;word-break:break-all;}
/* 차량 */
.car-card{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(168,85,247,0.07));border-radius:18px;padding:18px;margin-bottom:12px;border:1px solid rgba(99,102,241,0.2);position:relative;}
.car-card.warn{border-color:rgba(251,146,60,0.4);background:linear-gradient(135deg,rgba(251,146,60,0.08),rgba(239,68,68,0.05));}
.car-plate{font-size:22px;font-weight:800;color:var(--text);letter-spacing:2px;font-family:'Courier New',monospace;}
.car-type{font-size:13px;color:#a5b4fc;margin-top:2px;font-weight:600}
.car-driver{font-size:12px;color:var(--text-dim);margin-top:2px}
.car-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.car-badge{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;}
.car-badge.ok{background:rgba(52,168,83,0.15);color:#81c995;}
.car-badge.warn{background:rgba(251,146,60,0.15);color:#fb923c;}
.car-badge.danger{background:rgba(239,68,68,0.15);color:#f87171;}
.car-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
/* 관리주기 */
.maint-card{background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.07);display:flex;align-items:flex-start;gap:12px;position:relative;}
.maint-card.ok{border-left:3px solid #81c995}
.maint-card.warn{border-left:3px solid #fb923c;background:rgba(251,146,60,0.05);}
.maint-card.danger{border-left:3px solid #ef4444;background:rgba(239,68,68,0.06);}
.maint-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.maint-info{flex:1;min-width:0}
.maint-name{font-size:13px;font-weight:700;color:var(--text)}
.maint-car{font-size:11px;color:#a5b4fc;font-weight:600;margin-top:1px}
.maint-detail{font-size:11px;color:var(--text-dim);margin-top:3px}
.maint-due{font-size:12px;font-weight:700;margin-top:4px}
.maint-due.ok{color:#81c995}.maint-due.warn{color:#fb923c}.maint-due.danger{color:#f87171}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:4px;height:5px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.maint-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
/* 폼 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:linear-gradient(180deg,#1e1e36,#16162a);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .3s ease;}
.form-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px}
.ig{margin-bottom:12px}
.lb{font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:6px;display:block;letter-spacing:.5px}
.inp,.sel{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:var(--text);padding:12px 14px;font-size:15px;outline:none;font-family:inherit;}
.inp:focus,.sel:focus{border-color:rgba(99,102,241,0.5)}
.sel{-webkit-appearance:none}
option{color:var(--text);background:#1e1e36}
.submit-btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:14px;color:#fff;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;}
.cancel-btn{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:var(--text-dim);padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:14px 0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.section-label{font-size:13px;font-weight:700;color:#a5b4fc;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(99,102,241,0.2);}
.gps-hint{font-size:12px;color:#7c7c9a;text-align:center;margin-bottom:14px;padding:8px;background:rgba(255,255,255,0.02);border-radius:10px}
.gps-result{background:rgba(52,168,83,0.08);border:1px solid rgba(52,168,83,0.2);border-radius:12px;padding:14px;margin-bottom:14px;}
.mini-map{width:100%;height:150px;border-radius:12px;overflow:hidden;margin-top:8px;border:1px solid rgba(255,255,255,0.08)}
.mini-map iframe{width:100%;height:100%;border:0}
.loc-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin-bottom:10px;position:relative;}
.loc-card.has-gps{border-color:rgba(52,168,83,0.3);background:rgba(52,168,83,0.05)}
.loc-card-label{font-size:11px;font-weight:700;letter-spacing:0.5px;margin-bottom:8px}
.loc-card-label.start{color:var(--green)}.loc-card-label.end{color:#a5b4fc}
.loc-card-row{display:flex;gap:8px;align-items:center}
.loc-card-row .inp{flex:1}
.loc-card-gps{background:linear-gradient(135deg,rgba(52,168,83,0.25),rgba(34,139,34,0.18));border:1px solid rgba(52,168,83,0.4);border-radius:12px;color:var(--green);padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.loc-card-gps.end-style{background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(139,92,246,0.18));border-color:rgba(99,102,241,0.4);color:#a5b4fc;}
.loc-card-gps.loading{opacity:0.5;pointer-events:none}
.loc-card-gps.done{background:rgba(52,168,83,0.1);border-color:rgba(52,168,83,0.2);color:#6aab7b}
.loc-card-info{margin-top:8px;font-size:11px;color:var(--text-dim)}
.loc-card-coords{font-size:10px;color:#6a6a8a;margin-top:4px}
.loc-card .mini-map{margin-top:8px}
.loc-card-place{background:rgba(255,165,0,0.12);border:1px solid rgba(255,165,0,0.3);border-radius:12px;color:#ffb347;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.pending-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,165,0,0.12);color:#ffb347;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;}
.loc-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(52,168,83,0.12);color:var(--green);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;margin-top:6px;cursor:pointer;border:none;font-family:inherit;}
/* 모달 */
.del-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:300}
.del-box{background:#1e1e36;border-radius:20px;padding:28px 24px;width:300px;text-align:center}
.map-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.map-box{background:#1e1e36;border-radius:20px;padding:20px;width:100%;max-width:400px;text-align:center}
.history-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.history-box{background:#1e1e36;border-radius:20px;padding:20px;width:100%;max-width:420px;max-height:70vh;overflow-y:auto}
/* 즐겨찾기 */
.place-chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.place-chip-info{flex:1;min-width:0}
.place-chip-name{font-size:14px;font-weight:700;color:var(--text)}
.place-chip-addr{font-size:11px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.place-chip-actions{display:flex;gap:4px;flex-shrink:0}
.place-chip-actions button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text-dim);padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;}
.place-picker-list{max-height:240px;overflow-y:auto;margin-bottom:10px}
.place-picker-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.place-picker-item:active{transform:scale(0.98);background:rgba(99,102,241,0.12)}
.place-picker-item .pp-name{font-size:14px;font-weight:700;color:var(--text)}
.place-picker-item .pp-addr{font-size:11px;color:var(--text-dim);margin-top:2px}
/* 요약 */
.sum-card{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(168,85,247,0.08));border-radius:20px;padding:20px;margin-bottom:12px;border:1px solid rgba(99,102,241,0.15);}
.sum-val{font-size:28px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sum-lbl{font-size:13px;color:var(--text-dim);margin-top:2px}
.export-btn{width:100%;background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(168,85,247,0.1));border:1px solid rgba(99,102,241,0.2);border-radius:16px;color:#a5b4fc;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;}
.audit-info{background:rgba(255,165,0,0.06);border:1px solid rgba(255,165,0,0.15);border-radius:12px;padding:14px;margin-top:16px;font-size:12px;color:#d4a054;line-height:1.6;}
.audit-info b{color:#ffb347}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(99,102,241,0.95);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;animation:fadeIn .2s ease;max-width:360px;text-align:center;pointer-events:none;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.hidden{display:none!important}
.empty{text-align:center;padding:60px 20px;color:var(--text-dimmer)}
</style>
</head>
<body>
<div id="toast" class="toast hidden"></div>
<div class="header">
  <div class="header-row">
    <div><h1>부서차량관리</h1><div class="header-sub">외근 · 차량 · 관리주기 통합관리</div></div>
    <button class="sync-btn" id="syncBtn" onclick="syncAll()">☁️ 동기화</button>
  </div>
  <div class="sync-status" id="syncStatus">마지막 동기화: 없음</div>
</div>
<div class="month-sel" id="monthSelArea"><span>조회월</span><input type="month" id="filterMonth"></div>
<div class="content" id="contentArea"></div>
<button class="fab hidden" id="fabBtn" onclick="openForm()">+</button>
<div class="bottom-nav">
  <button class="nav-item active" data-tab="outside" onclick="switchTab('outside')"><span class="nav-icon">🚗</span><span>외근</span></button>
  <button class="nav-item" data-tab="cars" onclick="switchTab('cars')"><span class="nav-icon">🚙</span><span>차량</span></button>
  <button class="nav-item" data-tab="maint" onclick="switchTab('maint')"><span class="nav-icon">🔧</span><span>관리주기</span></button>
  <button class="nav-item" data-tab="places" onclick="switchTab('places')"><span class="nav-icon">🏢</span><span>즐겨찾기</span></button>
  <button class="nav-item" data-tab="summary" onclick="switchTab('summary')"><span class="nav-icon">📊</span><span>요약</span></button>
</div>
<div id="formOverlay" class="overlay hidden" onclick="if(event.target===this)cancelForm()"><div class="sheet" id="formSheet"></div></div>
<div id="delModal" class="del-modal hidden"><div class="del-box"><div style="font-size:36px;margin-bottom:12px">🗑</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">삭제하시겠습니까?</div><div style="font-size:13px;color:#8888a8;margin-bottom:16px">이 작업은 되돌릴 수 없습니다</div><div style="display:flex;gap:10px"><button class="cancel-btn" style="flex:1;margin-top:0" onclick="closeDelete()">취소</button><button class="submit-btn" style="flex:1;margin-top:0;background:linear-gradient(135deg,#ef4444,#dc2626)" onclick="confirmDeleteAction()">삭제</button></div></div></div>
<div id="mapModal" class="map-modal hidden" onclick="if(event.target===this)closeMap()"><div class="map-box" id="mapBox"></div></div>
<div id="historyModal" class="history-modal hidden" onclick="if(event.target===this)closeHistory()"><div class="history-box" id="historyBox"></div></div>
<div id="placePickerModal" class="history-modal hidden" onclick="if(event.target===this)closePlacePicker()"><div class="history-box" id="placePickerBox"></div></div>
<script>
const GITHUB_REPO='KnagByeongju-123/smtec_main2';
const GITHUB_TOKEN_KEY='gh_token_car';
const MAINT_TYPES=[
  {id:'oil',icon:'🛢️',name:'엔진오일',unit:'km',defaultInterval:5000},
  {id:'tire',icon:'🔄',name:'타이어 교체',unit:'km',defaultInterval:40000},
  {id:'ac',icon:'❄️',name:'에어컨 필터',unit:'month',defaultInterval:12},
  {id:'brake',icon:'🔴',name:'브레이크패드',unit:'km',defaultInterval:30000},
];
let activeTab='outside';
let outsideRecords=[],cars=[],maintRecords=[],registeredPlaces=[],auditLog=[];
let editingId=null,deleteTargetId=null,deleteTargetType=null,gpsLoading=false;
let lastSyncTime=null;

function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function getToday(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function getCurMonth(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function getNow(){return new Date().toISOString()}
function getLocalTime(iso){if(!iso)return'';const d=new Date(iso);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function simpleHash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return Math.abs(h).toString(16).padStart(8,'0')}
function recordHash(r){return simpleHash(JSON.stringify({d:r.date,e:r.endPlace,s:r.startPlace,v:r.visitPlace,dist:r.distance,ct:r.createdAt}))}
function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds)-new Date())/(1000*60*60*24));}
function fmtDate(ds){if(!ds)return'-';const d=new Date(ds);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}

function loadAll(){
  try{outsideRecords=JSON.parse(localStorage.getItem('wl_outside')||'[]')}catch{outsideRecords=[]}
  try{cars=JSON.parse(localStorage.getItem('wl_cars')||'[]')}catch{cars=[]}
  try{maintRecords=JSON.parse(localStorage.getItem('wl_maint')||'[]')}catch{maintRecords=[]}
  try{registeredPlaces=JSON.parse(localStorage.getItem('wl_places')||'[]')}catch{registeredPlaces=[]}
  try{auditLog=JSON.parse(localStorage.getItem('wl_audit')||'[]')}catch{auditLog=[]}
  try{lastSyncTime=localStorage.getItem('wl_last_sync')||null}catch{}
}
function saveAll(){
  localStorage.setItem('wl_outside',JSON.stringify(outsideRecords));
  localStorage.setItem('wl_cars',JSON.stringify(cars));
  localStorage.setItem('wl_maint',JSON.stringify(maintRecords));
  localStorage.setItem('wl_places',JSON.stringify(registeredPlaces));
  localStorage.setItem('wl_audit',JSON.stringify(auditLog));
}
function addAudit(action,type,id,detail){auditLog.push({timestamp:getNow(),action,type,recordId:id||'',detail:detail||''});saveAll();}

let toastT;
function showToast(m,dur=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.remove('hidden');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.add('hidden'),dur);}

function getToken(){return localStorage.getItem(GITHUB_TOKEN_KEY)||''}
async function githubRequest(method,path,body){
  const token=getToken();if(!token)throw new Error('GitHub Token이 없습니다. 요약탭 → 서버 설정에서 등록해주세요.');
  const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{method,headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`HTTP ${res.status}`);}
  return res.json();
}
async function githubGetFile(path){try{const data=await githubRequest('GET',path);return{content:atob(data.content.replace(/\n/g,'')),sha:data.sha};}catch(e){if(e.message?.includes('404'))return null;throw e;}}
async function githubPutFile(path,content,sha){return githubRequest('PUT',path,{message:`부서차량관리 ${getLocalTime(getNow())}`,content:btoa(unescape(encodeURIComponent(content))),..( sha?{sha}:{})});}

async function syncAll(){
  const token=getToken();if(!token){openTokenSetting();return;}
  const btn=document.getElementById('syncBtn');btn.textContent='⏳';btn.classList.add('syncing');
  try{
    const allData={version:2,exportDate:getNow(),outsideRecords,cars,maintRecords,registeredPlaces,auditLog:auditLog.slice(-200)};
    const existing=await githubGetFile('부서차량관리_데이터.json');
    await githubPutFile('부서차량관리_데이터.json',JSON.stringify(allData,null,2),existing?.sha);
    lastSyncTime=getNow();localStorage.setItem('wl_last_sync',lastSyncTime);
    document.getElementById('syncStatus').textContent=`마지막 동기화: ${getLocalTime(lastSyncTime)}`;
    showToast('☁️ 서버 동기화 완료');
  }catch(e){showToast('❌ 동기화 실패: '+e.message,3500);}
  btn.textContent='☁️ 동기화';btn.classList.remove('syncing');
}
async function loadFromServer(){
  const token=getToken();if(!token){openTokenSetting();return;}
  showToast('⏳ 서버에서 불러오는 중...');
  try{
    const file=await githubGetFile('부서차량관리_데이터.json');
    if(!file){showToast('❌ 서버에 저장된 데이터가 없습니다');return;}
    const data=JSON.parse(file.content);
    const merge=confirm(`서버 데이터:\n외근: ${data.outsideRecords?.length||0}건\n차량: ${data.cars?.length||0}대\n관리주기: ${data.maintRecords?.length||0}건\n\n[확인] 병합  [취소] 전체 교체`);
    const ma=(e,i)=>{const ids=new Set(e.map(r=>r.id));return[...e,...(i||[]).filter(r=>!ids.has(r.id))];};
    if(merge){outsideRecords=ma(outsideRecords,data.outsideRecords);cars=ma(cars,data.cars);maintRecords=ma(maintRecords,data.maintRecords);if(data.registeredPlaces){data.registeredPlaces.forEach(p=>{const ex=registeredPlaces.findIndex(r=>r.name===p.name);if(ex>=0)registeredPlaces[ex]={...registeredPlaces[ex],...p};else registeredPlaces.push(p);});}}
    else{outsideRecords=data.outsideRecords||[];cars=data.cars||[];maintRecords=data.maintRecords||[];if(data.registeredPlaces)registeredPlaces=data.registeredPlaces;if(data.auditLog)auditLog=data.auditLog;}
    lastSyncTime=getNow();localStorage.setItem('wl_last_sync',lastSyncTime);
    document.getElementById('syncStatus').textContent=`마지막 동기화: ${getLocalTime(lastSyncTime)}`;
    saveAll();render();showToast('📥 서버 데이터 불러오기 완료');
  }catch(e){showToast('❌ 실패: '+e.message,3500);}
}
function openTokenSetting(){
  const sheet=document.getElementById('formSheet');const cur=getToken();
  sheet.innerHTML=`<div class="form-title">⚙️ GitHub 서버 설정</div>
  <div style="background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.2);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:#d4a054;line-height:1.8">
    <b>📌 토큰 발급 방법</b><br>
    GitHub → Settings → Developer settings<br>
    → Personal access tokens → Fine-grained<br>
    → 저장소: <b>${GITHUB_REPO}</b><br>
    → Contents: <b>Read & Write</b> 권한 부여
  </div>
  <div class="ig"><label class="lb">GitHub Personal Access Token</label>
    <input class="inp" id="f_ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cur}">
  </div>
  <button class="submit-btn" onclick="saveToken()">저장 후 동기화</button>
  <button class="cancel-btn" onclick="cancelForm()">취소</button>`;

}
function saveToken(){const t=document.getElementById('f_ghToken').value.trim();if(!t){showToast('❌ 토큰을 입력하세요');return;}localStorage.setItem(GITHUB_TOKEN_KEY,t);cancelForm();showToast('✅ 토큰 저장됨');setTimeout(syncAll,300);}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('fabBtn').classList.toggle('hidden',t!=='outside'&&t!=='cars'&&t!=='maint');
  document.getElementById('monthSelArea').classList.toggle('hidden',t!=='outside'&&t!=='summary');
  render();
}

function getGPS(){return new Promise((res,rej)=>{if(!navigator.geolocation){rej(new Error('GPS 미지원'));return}navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy}),e=>rej(new Error(e.code===1?'위치 권한 거부':'위치 확인 실패')),{enableHighAccuracy:true,timeout:15000,maximumAge:0});});}
async function reverseGeo(lat,lng){try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=ko`);const d=await r.json();if(d?.address){const a=d.address;const p=[a.province||a.state||'',a.city||a.county||'',a.town||a.suburb||a.district||a.borough||'',a.neighbourhood||a.quarter||'',a.road||''].filter(Boolean);return{short:p.slice(-3).join(' ')||'주소 불명',full:d.display_name||'주소 불명'};}return{short:'주소 변환 실패',full:''};}catch{return{short:'오류',full:''}}}
async function calcRouteDistance(lat1,lng1,lat2,lng2){try{const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=false`);const d=await r.json();if(d.code==='Ok'&&d.routes?.length>0)return{distance:(d.routes[0].distance/1000).toFixed(1),duration:Math.round(d.routes[0].duration/60)};return null;}catch{return null;}}
async function handleOutsideGPS(point){
  if(gpsLoading)return;gpsLoading=true;
  const btn=document.getElementById(`gpsBtn_${point}`);if(btn){btn.textContent='⏳';btn.classList.add('loading')}
  try{
    const pos=await getGPS();const addr=await reverseGeo(pos.lat,pos.lng);
    ['Lat','Lng','Addr','Accuracy','GpsTime'].forEach(k=>{const el=document.getElementById(`f_${point}${k}`);if(el)el.value=k==='Lat'?pos.lat:k==='Lng'?pos.lng:k==='Addr'?addr.full:k==='Accuracy'?(pos.accuracy||''):getNow();});
    const pi=document.getElementById(point==='start'?'f_startPlace':'f_endPlace');if(pi&&!pi.value.trim())pi.value=addr.short;
    showLocCardMap(point,pos.lat,pos.lng,addr.full);
    const card=document.getElementById(point==='start'?'startLocCard':'endLocCard');if(card)card.classList.add('has-gps');
    if(btn){btn.textContent='📍✓';btn.classList.add('done')}
    showToast(`📍 ${point==='start'?'출발':'도착'}: ${addr.short}`);await tryCalcOutsideDistance();
  }catch(e){showToast('❌ '+e.message)}
  gpsLoading=false;if(btn&&!btn.classList.contains('done')){btn.textContent='📍';btn.classList.remove('loading')}
}
function showLocCardMap(point,lat,lng,addrFull,note){
  const el=document.getElementById(`gpsResult_${point}`);if(!el)return;lat=Number(lat);lng=Number(lng);
  el.innerHTML=`${note?`<div style="font-size:10px;color:#a5b4fc;font-weight:600;margin-bottom:4px">${note}</div>`:''}<div class="loc-card-info">${addrFull||''}</div><div class="loc-card-coords">좌표: ${lat.toFixed(6)}, ${lng.toFixed(6)}</div><div class="mini-map"><iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${lng-0.005},${lat-0.003},${lng+0.005},${lat+0.003}&layer=mapnik&marker=${lat},${lng}"></iframe></div>`;
}
async function tryCalcOutsideDistance(){
  const sLat=parseFloat(document.getElementById('f_startLat')?.value),sLng=parseFloat(document.getElementById('f_startLng')?.value);
  const eLat=parseFloat(document.getElementById('f_endLat')?.value),eLng=parseFloat(document.getElementById('f_endLng')?.value);
  const distEl=document.getElementById('routeResult'),distInput=document.getElementById('f_distance');
  if(!sLat||!sLng||!eLat||!eLng){if(distEl)distEl.classList.add('hidden');return;}
  if(distEl){distEl.classList.remove('hidden');distEl.innerHTML=`<div style="font-size:13px;color:#fbbf24;font-weight:600;text-align:center">🔄 도로 거리 계산 중...</div>`;}
  const result=await calcRouteDistance(sLat,sLng,eLat,eLng);
  if(result){if(distInput)distInput.value=result.distance;if(distEl)distEl.innerHTML=`<div style="text-align:center;font-size:20px;font-weight:800;color:#81c995">🛣️ ${result.distance} km <span style="font-size:14px;color:var(--text-dim)">(약 ${result.duration}분)</span></div>`;showToast(`🛣️ ${result.distance}km`);}
  else if(distEl)distEl.innerHTML=`<div style="font-size:12px;color:#f87171;text-align:center">⚠️ 거리 계산 실패 - 수동 입력</div>`;
}

function submitOutsideStartOnly(){
  const g=id=>document.getElementById('f_'+id)?.value?.trim()||'';const now=getNow();const date=g('date')||getToday();
  const rec={startLat:parseFloat(g('startLat'))||null,startLng:parseFloat(g('startLng'))||null,startAddr:g('startAddr'),startAccuracy:parseFloat(g('startAccuracy'))||null,startGpsTime:g('startGpsTime')||null,lat:null,lng:null,address:'',gpsAccuracy:null,gpsTime:null,date,visitPlace:g('visitPlace'),purpose:g('purpose'),carId:g('carId'),startPlace:g('startPlace'),endPlace:'',distance:'',memo:g('memo'),pendingArrival:true,createdAt:now,lastModified:now,editCount:0};
  const id=genId();outsideRecords.unshift({...rec,id});addAudit('CREATE','outside',id,`출발: ${date}`);saveAll();cancelForm();showToast('🚗 출발 기록됨');render();
}
function openArrivalForm(id){
  const record=outsideRecords.find(r=>r.id===id);if(!record)return;editingId=id;const sheet=document.getElementById('formSheet');
  let h=`<div class="form-title">🏁 도착 등록</div><div style="background:rgba(52,168,83,0.08);border:1px solid rgba(52,168,83,0.2);border-radius:14px;padding:12px;margin-bottom:12px"><div style="font-size:11px;color:var(--green);font-weight:700">🟢 출발: ${record.startPlace||'출발지'}</div><div style="font-size:12px;color:var(--text-dim);margin-top:2px">${record.date}</div></div>`;
  h+=`<input type="hidden" id="f_startLat" value="${record.startLat||''}"><input type="hidden" id="f_startLng" value="${record.startLng||''}"><input type="hidden" id="f_startAddr" value="${record.startAddr||''}"><input type="hidden" id="f_startAccuracy" value="${record.startAccuracy||''}"><input type="hidden" id="f_startGpsTime" value="${record.startGpsTime||''}"><input type="hidden" id="f_endLat" value=""><input type="hidden" id="f_endLng" value=""><input type="hidden" id="f_endAddr" value=""><input type="hidden" id="f_endAccuracy" value=""><input type="hidden" id="f_endGpsTime" value=""><input type="hidden" id="f_startPlace" value="${record.startPlace||''}">`;
  h+=`<div class="loc-card" id="endLocCard"><div class="loc-card-label end">🔵 도착지</div><div class="loc-card-row"><input class="inp" type="text" id="f_endPlace" placeholder="도착지 입력" value=""><button class="loc-card-place" onclick="openPlacePicker('arrival_end')">🏢</button><button class="loc-card-gps end-style" id="gpsBtn_end" onclick="handleOutsideGPS('end')">📍</button></div><div id="gpsResult_end"></div></div>`;
  h+=`<div id="routeResult" class="gps-result hidden" style="margin-bottom:10px"></div>`;
  h+=`<div class="ig"><label class="lb">방문처</label><input class="inp" id="f_visitPlace" value="${record.visitPlace||''}" placeholder="예: 장소명"></div><div class="ig"><label class="lb">목적</label><input class="inp" id="f_purpose" value="${record.purpose||''}" placeholder="예: 납품, 미팅"></div><div class="ig"><label class="lb">주행거리 km</label><input class="inp" type="number" id="f_distance" value="" placeholder="GPS 시 자동계산"></div><div class="ig"><label class="lb">메모</label><input class="inp" id="f_memo" value="${record.memo||''}" placeholder="참고"></div>`;
  h+=`<button class="submit-btn" onclick="submitArrival('${id}')">🏁 도착 완료</button><button class="cancel-btn" onclick="cancelForm()">취소</button>`;
  sheet.innerHTML=h;document.getElementById('formOverlay').classList.remove('hidden');

function submitArrival(id){
  const g=fid=>document.getElementById('f_'+fid)?.value?.trim()||'';const now=getNow();
  outsideRecords=outsideRecords.map(r=>{if(r.id!==id)return r;return{...r,lat:parseFloat(g('endLat'))||null,lng:parseFloat(g('endLng'))||null,address:g('endAddr'),gpsAccuracy:parseFloat(g('endAccuracy'))||null,gpsTime:g('endGpsTime')||null,endPlace:g('endPlace'),distance:g('distance'),memo:g('memo')||r.memo,visitPlace:g('visitPlace')||r.visitPlace,purpose:g('purpose')||r.purpose,pendingArrival:false,lastModified:now,editCount:(r.editCount||0)+1};});
  addAudit('UPDATE','outside',id,`도착 등록`);saveAll();cancelForm();showToast('🏁 도착 완료');render();
}

function showMap(type,id){
  const r=outsideRecords.find(x=>x.id===id);if(!r)return;
  let mh='';
  if(r.startLat&&r.lat){
    mh=`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px">📍 외근 경로</div>`;
    mh+=`<div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:4px">🟢 ${r.startPlace||'출발'}</div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${r.startAddr||''}</div>`;
    mh+=`<div class="mini-map" style="height:160px;margin-bottom:10px"><iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${r.startLng-0.006},${r.startLat-0.004},${Number(r.startLng)+0.006},${Number(r.startLat)+0.004}&layer=mapnik&marker=${r.startLat},${r.startLng}"></iframe></div>`;
    if(r.distance)mh+=`<div style="text-align:center;font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px">🛣️ ${r.distance} km</div>`;
    mh+=`<div style="font-size:12px;color:#a5b4fc;font-weight:700;margin-bottom:4px">🔵 ${r.endPlace||r.visitPlace||'도착'}</div><div style="font-size:11px;color:var(--text-dim);margin-bottom:4px">${r.address||''}</div>`;
    mh+=`<div class="mini-map" style="height:160px"><iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${r.lng-0.006},${r.lat-0.004},${Number(r.lng)+0.006},${Number(r.lat)+0.004}&layer=mapnik&marker=${r.lat},${r.lng}"></iframe></div>`;
  }else{const lat=r.lat||r.startLat,lng=r.lng||r.startLng;if(!lat)return;mh=`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px">📍 ${r.visitPlace||r.endPlace||r.startPlace||'위치'}</div><div class="mini-map" style="height:250px"><iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${lng-0.008},${lat-0.005},${Number(lng)+0.008},${Number(lat)+0.005}&layer=mapnik&marker=${lat},${lng}"></iframe></div>`;}
  mh+=`<button class="cancel-btn" style="margin-top:14px" onclick="closeMap()">닫기</button>`;
  document.getElementById('mapBox').innerHTML=mh;document.getElementById('mapModal').classList.remove('hidden');
}
function closeMap(){document.getElementById('mapModal').classList.add('hidden')}

function askDelete(id,type){deleteTargetId=id;deleteTargetType=type||activeTab;document.getElementById('delModal').classList.remove('hidden')}
function closeDelete(){deleteTargetId=null;deleteTargetType=null;document.getElementById('delModal').classList.add('hidden')}
function confirmDeleteAction(){
  if(!deleteTargetId)return;
  if(deleteTargetType==='outside')outsideRecords=outsideRecords.filter(r=>r.id!==deleteTargetId);
  else if(deleteTargetType==='cars')cars=cars.filter(r=>r.id!==deleteTargetId);
  else if(deleteTargetType==='maint')maintRecords=maintRecords.filter(r=>r.id!==deleteTargetId);
  addAudit('DELETE',deleteTargetType,deleteTargetId,'');saveAll();closeDelete();showToast('삭제 완료');render();
}

let placePickerTarget=null;
function openPlacePicker(target){
  placePickerTarget=target;const box=document.getElementById('placePickerBox');
  let h=`<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px">🏢 즐겨찾기 선택</div>`;
  if(!registeredPlaces.length)h+=`<div style="text-align:center;padding:24px;color:var(--text-dimmer)">등록된 즐겨찾기가 없습니다</div>`;
  else{h+=`<div class="place-picker-list">`;registeredPlaces.forEach((p,i)=>{h+=`<div class="place-picker-item" onclick="selectPlace(${i})"><div class="pp-name">🏢 ${p.name} ${(p.lat&&p.lng)?'<span style="font-size:10px;color:var(--green)">📍</span>':''}</div>${p.address?`<div class="pp-addr">${p.address}</div>`:''}</div>`;});h+=`</div>`;}
  h+=`<button class="cancel-btn" onclick="closePlacePicker()">취소</button>`;
  box.innerHTML=h;document.getElementById('placePickerModal').classList.remove('hidden');
}
function closePlacePicker(){placePickerTarget=null;document.getElementById('placePickerModal').classList.add('hidden')}
function selectPlace(idx){
  const p=registeredPlaces[idx];if(!p)return;
  const isStart=(placePickerTarget==='start'),isEnd=(placePickerTarget==='end'||placePickerTarget==='arrival_end');
  if(isStart){const el=document.getElementById('f_startPlace');if(el)el.value=p.name;}
  else if(isEnd){const el=document.getElementById('f_endPlace');if(el)el.value=p.name;const vp=document.getElementById('f_visitPlace');if(vp&&!vp.value.trim())vp.value=p.name;}
  if(p.lat&&p.lng){
    const px=isStart?'start':'end';
    ['Lat','Lng','Addr','GpsTime'].forEach(k=>{const el=document.getElementById(`f_${px}${k}`);if(el)el.value=k==='Lat'?p.lat:k==='Lng'?p.lng:k==='Addr'?(p.address||''):getNow();});
    const card=document.getElementById(isStart?'startLocCard':'endLocCard');if(card)card.classList.add('has-gps');
    const btn=document.getElementById(`gpsBtn_${px}`);if(btn){btn.textContent='📍✓';btn.classList.add('done')}
    showLocCardMap(px,p.lat,p.lng,p.address||'',`즐겨찾기: ${p.name}`);tryCalcOutsideDistance();
    showToast(`🏢 ${p.name} 선택`);
  }else showToast(`🏢 ${p.name} 선택`);
  closePlacePicker();
}

function openForm(id){if(activeTab==='outside')openOutsideForm(id);else if(activeTab==='cars')openCarForm(id);else if(activeTab==='maint')openMaintForm(id);}
function cancelForm(){editingId=null;document.getElementById('formOverlay').classList.add('hidden')}

function openOutsideForm(id){
  editingId=id||null;const sheet=document.getElementById('formSheet');
  const record=editingId?outsideRecords.find(r=>r.id===editingId):null;
  const today=getToday();const todayRecs=outsideRecords.filter(r=>r.date===today).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));

function calcMaintStatus(m,car){
  const mt=MAINT_TYPES.find(t=>t.id===m.maintType)||MAINT_TYPES[0];
  let status='ok',dueLabel='',progress=0;
  const curMileage=parseFloat(car?.mileage||0);const lastMileage=parseFloat(m.lastMileage||0);
  const intervalKm=parseFloat(m.intervalKm||0);const intervalMonth=parseFloat(m.intervalMonth||0);
  if(intervalKm>0&&lastMileage>0&&curMileage>0){const dueKm=lastMileage+intervalKm;const remain=dueKm-curMileage;progress=Math.min(100,(curMileage-lastMileage)/intervalKm*100);if(remain<=0){status='danger';dueLabel=`${Math.abs(Math.round(remain)).toLocaleString()}km 초과`;}else if(remain<=intervalKm*0.15){status='warn';dueLabel=`${Math.round(remain).toLocaleString()}km 남음`;}else{dueLabel=`${Math.round(remain).toLocaleString()}km 남음`;}}
  if(intervalMonth>0&&m.lastDate){const dueD=new Date(m.lastDate);dueD.setMonth(dueD.getMonth()+intervalMonth);const days=Math.ceil((dueD-new Date())/(1000*60*60*24));const dateProgress=Math.min(100,(new Date()-new Date(m.lastDate))/(dueD-new Date(m.lastDate))*100);const ds=days<=0?'danger':days<=30?'warn':'ok';if(ds==='danger'||(ds==='warn'&&status==='ok')){status=ds;dueLabel=days<=0?`만기 ${Math.abs(days)}일 초과`:`${days}일 남음`;progress=Math.max(progress,dateProgress||0);}}
  return{status,dueLabel,progress:Math.min(100,progress),mt};
}

      if(c.mileage)h+=`<div class="car-driver">🛣️ ${Number(c.mileage).toLocaleString()} km</div>`;
      h+=`<div class="car-badges">`;
      if(insDays!==null){const cls=insDays<=0?'danger':insDays<=60?'warn':'ok';h+=`<span class="car-badge ${cls}">🛡️ 보험 ${insDays<=0?`만기${Math.abs(insDays)}일초과`:insDays<=60?`${insDays}일후`:fmtDate(c.insExpiry)}</span>`;}
      if(inspDays!==null){const cls=inspDays<=0?'danger':inspDays<=60?'warn':'ok';h+=`<span class="car-badge ${cls}">🔍 검사 ${inspDays<=0?`만기${Math.abs(inspDays)}일초과`:inspDays<=60?`${inspDays}일후`:fmtDate(c.inspExpiry)}</span>`;}
      h+=`</div>`;if(c.memo)h+=`<div style="font-size:12px;color:var(--text-dim);margin-top:8px">${c.memo}</div>`;h+=`</div>`;
    });
    area.innerHTML=h;return;
  }

  if(activeTab==='maint'){
    let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:17px;font-weight:800;color:var(--text)">🔧 관리주기</div></div>`;
    if(!maintRecords.length){h+=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">🔧</div><div style="font-size:15px;font-weight:600">등록된 관리주기가 없습니다</div><div style="font-size:13px;margin-top:6px">+ 버튼으로 추가하세요</div></div>`;area.innerHTML=h;return;}
    const so={danger:0,warn:1,ok:2};
    const enriched=maintRecords.map(m=>{const car=cars.find(c=>c.id===m.carId);const s=calcMaintStatus(m,car);return{...m,car,_s:s};}).sort((a,b)=>so[a._s.status]-so[b._s.status]);
    const dc=enriched.filter(m=>m._s.status==='danger').length;const wc=enriched.filter(m=>m._s.status==='warn').length;
    if(dc||wc)h+=`<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:14px;padding:12px;margin-bottom:14px;display:flex;gap:12px;align-items:center"><div style="font-size:24px">⚠️</div><div>${dc?`<div style="font-size:13px;font-weight:700;color:#f87171">🔴 즉시 교체 필요 ${dc}건</div>`:''}${wc?`<div style="font-size:13px;color:#fb923c;margin-top:2px">🟠 곧 교체 필요 ${wc}건</div>`:''}</div></div>`;
    enriched.forEach(m=>{
      const {status,dueLabel,progress,mt}=m._s;const car=m.car;const pc=status==='danger'?'#ef4444':status==='warn'?'#fb923c':'#81c995';
      h+=`<div class="maint-card ${status}"><div class="maint-icon">${mt.icon}</div><div class="maint-info"><div class="maint-name">${mt.name}</div>`;
      if(car)h+=`<div class="maint-car">🚗 ${car.plate}${car.model?' · '+car.model:''}</div>`;
      h+=`<div class="maint-detail">마지막: ${fmtDate(m.lastDate)}${m.lastMileage?' · '+Number(m.lastMileage).toLocaleString()+'km':''}`;
      if(m.intervalKm)h+=` · ${Number(m.intervalKm).toLocaleString()}km주기`;if(m.intervalMonth)h+=` · ${m.intervalMonth}개월주기`;h+=`</div>`;
      if(dueLabel)h+=`<div class="maint-due ${status}">${dueLabel}</div>`;
      if(progress>0)h+=`<div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${pc}"></div></div>`;
      if(m.memo)h+=`<div style="font-size:11px;color:var(--text-dim);margin-top:4px">${m.memo}</div>`;
      h+=`</div><div class="maint-actions"><button class="act-btn" onclick="openMaintForm('${m.id}')">✏️</button><button class="act-btn" onclick="askDelete('${m.id}','maint')">🗑</button></div></div>`;
    });
    area.innerHTML=h;return;
  }

  if(activeTab==='places'){
    let h=`<div style="font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px">🏢 즐겨찾기 관리</div><div style="font-size:12px;color:var(--text-dim);margin-bottom:16px">좌표 등록 시 거리 자동 계산</div>`;
    if(registeredPlaces.length){registeredPlaces.forEach((p,i)=>{const hc=!!(p.lat&&p.lng);h+=`<div class="place-chip" style="border-color:${hc?'rgba(52,168,83,0.3)':'rgba(255,255,255,0.06)'}"><div class="place-chip-info"><div class="place-chip-name">🏢 ${p.name} ${hc?'<span style="font-size:10px;color:var(--green)">📍</span>':''}</div>${p.address?`<div class="place-chip-addr">${p.address}</div>`:''}</div><div class="place-chip-actions">${i>0?`<button onclick="movePlaceUp(${i})" style="color:#93c5fd">▲</button>`:'<button style="visibility:hidden">▲</button>'} ${i<registeredPlaces.length-1?`<button onclick="movePlaceDown(${i})" style="color:#93c5fd">▼</button>`:'<button style="visibility:hidden">▼</button>'}<button onclick="gpsRegisterPlace(${i})" style="color:var(--green)">📍</button><button onclick="deletePlace(${i})" style="color:#f87171">🗑</button></div></div>`;});}
    else h+=`<div class="empty" style="padding:40px 20px"><div style="font-size:40px;margin-bottom:12px">🏢</div><div style="font-size:15px;font-weight:600">등록된 즐겨찾기가 없습니다</div></div>`;
    h+=`<div style="margin-top:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">➕ 즐겨찾기 추가</div><div class="ig"><input class="inp" id="placeInlineName" type="text" placeholder="즐겨찾기명 *"></div><div class="ig"><input class="inp" id="placeInlineAddr" type="text" placeholder="주소 (선택)"></div><div style="background:rgba(99,102,241,0.05);border:1px solid rgba(99,102,241,0.15);border-radius:12px;padding:12px;margin-bottom:10px"><div style="font-size:11px;color:#a5b4fc;font-weight:700;margin-bottom:6px">📍 좌표 등록</div><div style="display:flex;gap:6px;margin-bottom:6px"><input class="inp" id="placeInlineLat" type="number" step="any" placeholder="위도" style="flex:1;font-size:12px"><input class="inp" id="placeInlineLng" type="number" step="any" placeholder="경도" style="flex:1;font-size:12px"></div><input class="inp" id="placeCoordPaste" type="text" placeholder="구글맵 URL 붙여넣기" style="font-size:12px" oninput="parseCoordPaste(this.value)"></div><div style="display:flex;gap:8px"><button class="submit-btn" style="flex:1;margin-top:0" onclick="addPlaceInline()">추가</button><button class="submit-btn" style="flex:1;margin-top:0;background:linear-gradient(135deg,rgba(52,168,83,0.6),rgba(34,139,34,0.5))" onclick="addPlaceWithGPS()">📍 현위치 추가</button></div></div>`;
    area.innerHTML=h;return;
  }

  if(activeTab==='summary'){
    const fo=outsideRecords.filter(r=>r.date?.startsWith(month));
    const tod=fo.reduce((s,r)=>s+Number(r.distance||0),0);
    const dc=maintRecords.filter(m=>calcMaintStatus(m,cars.find(c=>c.id===m.carId)).status==='danger').length;
    const wc=maintRecords.filter(m=>calcMaintStatus(m,cars.find(c=>c.id===m.carId)).status==='warn').length;
    const iw=cars.filter(c=>{const d=daysUntil(c.insExpiry);const d2=daysUntil(c.inspExpiry);return(d!==null&&d<=60)||(d2!==null&&d2<=60);}).length;
    let h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">`;
    h+=`<div class="sum-card"><div class="sum-val">${tod.toFixed(1)}</div><div class="sum-lbl">외근 km</div><div style="font-size:11px;color:var(--text-dim)">${fo.length}건 / ${month}</div></div>`;
    h+=`<div class="sum-card"><div class="sum-val">${cars.length}</div><div class="sum-lbl">등록 차량</div></div></div>`;
    if(dc||wc||iw)h+=`<div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:14px;padding:14px;margin-bottom:12px">${dc?`<div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:4px">🔴 즉시 교체 필요: ${dc}건</div>`:''}${wc?`<div style="font-size:13px;color:#fb923c;margin-bottom:4px">🟠 곧 교체 필요: ${wc}건</div>`:''}${iw?`<div style="font-size:13px;color:#fbbf24">🟡 보험/검사 만기 임박: ${iw}대</div>`:''}</div>`;
    h+=`<button class="export-btn" onclick="syncAll()">☁️ GitHub 서버 동기화</button>`;
    h+=`<button class="export-btn" style="margin-top:6px" onclick="loadFromServer()">📥 서버에서 불러오기</button>`;
    h+=`<button class="export-btn" onclick="exportCSV()">📊 CSV 다운로드</button>`;
    h+=`<div style="display:flex;gap:8px;margin-top:8px"><button class="export-btn" style="margin-top:0;flex:1" onclick="exportAllData()">📤 JSON 백업</button><label class="export-btn" style="margin-top:0;flex:1;cursor:pointer;justify-content:center">📥 JSON 복원<input type="file" accept=".json" style="display:none" onchange="importAllData(event)"></label></div>`;
    h+=`<button class="export-btn" style="border-color:rgba(99,102,241,0.3);color:#a5b4fc" onclick="openTokenSetting()">⚙️ GitHub 서버 설정</button>`;
    h+=`<button class="export-btn" style="border-color:rgba(255,165,0,0.3);color:#ffb347" onclick="showHistory()">📋 감사 로그</button>`;
    h+=`<div class="audit-info"><b>📌 안내</b><br>· ☁️ 동기화 버튼으로 GitHub 서버에 자동 백업됩니다<br>· 보험/검사 만기 60일 전부터 경고가 표시됩니다<br>· 관리주기 15% 이내 도달 시 경고 표시됩니다</div>`;
    area.innerHTML=h;return;
  }

  // 외근 탭
  const fo=outsideRecords.filter(r=>r.date?.startsWith(month)).sort((a,b)=>b.date.localeCompare(a.date));
  if(!fo.length){area.innerHTML=`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📝</div><div style="font-size:15px;font-weight:600">기록이 없습니다</div><div style="font-size:13px;margin-top:6px">+ 버튼을 눌러 추가하세요</div></div>`;return;}
  const dg={};fo.forEach(r=>{if(!dg[r.date])dg[r.date]=[];dg[r.date].push(r);});
  const dates=Object.keys(dg).sort((a,b)=>b.localeCompare(a));let h='';
  dates.forEach(date=>{
    const dr=dg[date].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
    const dt=dr.reduce((s,r)=>s+Number(r.distance||0),0);const sc=dr.filter(r=>Number(r.distance||0)>0).length;
    if(dr.length>1||dt>0)h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px"><div style="font-size:13px;font-weight:700;color:var(--primary-light)">${date}</div><div style="font-size:12px;color:var(--green);font-weight:700">${dt>0?'🛣️ '+dt.toFixed(1)+'km'+(sc>1?` (${sc}구간)`:''): ''}</div></div>`;
    dr.forEach((r,idx)=>{
      const car=cars.find(c=>c.id===r.carId);
      h+=`<div class="record-card"${r.pendingArrival?' style="border-color:rgba(255,165,0,0.3);background:linear-gradient(135deg,rgba(255,165,0,0.05),rgba(255,255,255,0.02))"':''}>`;
      h+=`<div class="record-actions">${r.pendingArrival?`<button class="act-btn" style="background:rgba(99,102,241,0.15);color:#a5b4fc" onclick="openArrivalForm('${r.id}')">🏁</button>`:''}<button class="act-btn" onclick="openOutsideForm('${r.id}')">✏️</button><button class="act-btn" onclick="askDelete('${r.id}','outside')">🗑</button></div>`;
      if(dr.length>1)h+=`<div style="font-size:10px;color:var(--text-dimmer);margin-bottom:4px">구간 ${idx+1}</div>`;
      if(r.pendingArrival)h+=`<div class="pending-badge" style="margin-bottom:6px">⏳ 이동 중</div>`;
      h+=`<div class="record-main">${r.visitPlace||r.endPlace||r.startPlace||'기록 미입력'} ${r.purpose?`(${r.purpose})`:''}</div>`;
      if(r.startPlace||r.endPlace)h+=`<div class="record-sub">${r.startPlace||''}${r.startPlace&&r.endPlace?' → ':''}${r.endPlace||''}</div>`;
      if(car)h+=`<div style="font-size:11px;color:#a5b4fc;margin-top:4px;font-weight:600">🚗 ${car.plate}${car.model?' · '+car.model:''}</div>`;
      if(r.startLat&&r.lat)h+=`<button class="loc-badge" onclick="showMap('outside','${r.id}')" style="font-size:10px">📍 GPS 경로</button>`;
      else if(r.lat||r.startLat)h+=`<button class="loc-badge" onclick="showMap('outside','${r.id}')">📍 지도</button>`;
      if(r.distance)h+=`<span class="badge" style="margin-left:6px">🛣️ ${r.distance} km</span>`;
      if(r.memo)h+=`<div class="record-sub">${r.memo}</div>`;
      h+=`<div class="timestamp">🕐 ${getLocalTime(r.createdAt)}${r.editCount>0?` <span class="edited">수정${r.editCount}회</span>`:''}</div><div class="hash-tag">H:${recordHash(r)}</div></div>`;
    });
  });
  area.innerHTML=h;
}

document.getElementById('filterMonth').value=getCurMonth();
document.getElementById('filterMonth').addEventListener('change',render);
loadAll();
if(lastSyncTime)document.getElementById('syncStatus').textContent=`마지막 동기화: ${getLocalTime(lastSyncTime)}`;
switchTab('outside');
</script>
</body>
</html>
