<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>일정관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--c:#fff;--pri:#1a237e;--pl:#e8eaf6;--b:#1565c0;--bl:#e3f2fd;--red:#c62828;--rl:#ffebee;--grn:#2e7d32;--gl:#e8f5e9;--amb:#e65100;--al:#fff3e0;--tx:#212121;--t2:#555;--t3:#999;--bd:#e0e0e0;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:80px}
.hd{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:16px;font-weight:700}.hd .sub{font-size:10px;opacity:.7;margin-top:1px}
.hd-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--bd);position:sticky;top:54px;z-index:90}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--t3);transition:.2s}
.tab.on{color:var(--pri);border-bottom-color:var(--pri)}
.tab .bdg{display:inline-flex;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:700;padding:0 4px;margin-left:2px;background:var(--red);color:#fff;align-items:center;justify-content:center;vertical-align:middle}
.tab .bdg.z{background:var(--bd);color:var(--t3)}
.ct{padding:10px 12px;max-width:680px;margin:0 auto}
.pn{display:none}.pn.on{display:block}
.card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.fg{margin-bottom:10px}
.fl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;display:flex;gap:4px;align-items:center}
.fl .rq{color:var(--red);font-size:9px}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:9px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:#fafafa;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--b);background:#fff}
textarea{resize:vertical;min-height:48px}
.btn{padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,#1a237e,#283593);color:#fff}
.btn-red{background:var(--rl);color:var(--red);border:1px solid #ffcdd2}
.btn-gray{background:#f5f5f5;color:#555;border:1px solid var(--bd)}
.btn-sm{padding:6px 12px;font-size:11px;width:auto;border-radius:7px}
.empty{text-align:center;padding:30px 16px;color:var(--t3);font-size:13px;line-height:1.6}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.st{background:#fff;border-radius:var(--r);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.st .n{font-size:18px;font-weight:700}.st .l{font-size:10px;color:var(--t3);margin-top:1px}
.st.tot .n{color:var(--b)}.st.od .n{color:var(--red)}.st.sn .n{color:var(--amb)}.st.dn .n{color:var(--grn)}
.alt{padding:10px 12px;border-radius:var(--r);margin-bottom:10px;font-size:12px;line-height:1.5}
.alt.err{background:var(--rl);border:1px solid #ffcdd2}.alt.warn{background:var(--al);border:1px solid #ffe0b2}
.grp{margin-bottom:8px}
.gh{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--pl);border-radius:var(--r) var(--r) 0 0;font-size:13px;font-weight:700;color:var(--pri);cursor:pointer;user-select:none}
.gh .aw{margin-left:auto;font-size:10px;transition:transform .2s}.gh.cl .aw{transform:rotate(-90deg)}
.gb{background:#fff;border-radius:0 0 var(--r) var(--r);box-shadow:var(--sh);overflow:hidden}.gb.h{display:none}
.it{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #f0f0f0;transition:background .15s}
.it:last-child{border-bottom:none}
.it.od{background:var(--rl)}.it.sn{background:var(--al)}
.it-i{flex:1;min-width:0;cursor:pointer}
.it-n{font-size:12px;font-weight:500;line-height:1.3;word-break:keep-all}
.it-m{display:flex;gap:5px;margin-top:2px;font-size:10px;color:var(--t3);flex-wrap:wrap;align-items:center}
.cy{background:var(--bl);color:var(--b);padding:1px 5px;border-radius:3px;font-weight:600;font-size:10px}
.tg{padding:1px 5px;border-radius:3px;font-weight:600;font-size:9px}
.tg.od{background:var(--rl);color:var(--red)}.tg.sn{background:var(--al);color:var(--amb)}.tg.ok{background:var(--gl);color:var(--grn)}
.asg{background:#f3e5f5;color:#7b1fa2;padding:1px 5px;border-radius:3px;font-weight:500;font-size:10px}
.ib{width:30px;height:30px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.ib:active{transform:scale(.9)}
.ib.ck{border-color:var(--grn);color:var(--grn)}.ib.ck.dn{background:var(--grn);color:#fff}
.ia{display:flex;gap:3px;flex-shrink:0}
.chart-area{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:10px}
.chart-area h3{font-size:13px;font-weight:600;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.bar-row .bl{width:70px;text-align:right;color:var(--t2);font-weight:500;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-wrap{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%}
.bar-n{width:30px;font-size:10px;color:var(--t3);text-align:right}
.legend{display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--t2)}
.legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle}
.legend .lg-r::before{background:var(--red)}.legend .lg-a::before{background:var(--amb)}.legend .lg-g::before{background:var(--grn)}
.hi{padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:12px}.hi:last-child{border-bottom:none}
.hi .hd2{font-weight:600;color:var(--pri)}.hi .hb{color:var(--t2);margin-top:1px;line-height:1.3}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.ov.sh{display:flex}
.md{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;padding:18px;animation:su .25s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md h2{font-size:15px;font-weight:700;margin-bottom:14px}
.mb{display:flex;gap:6px;margin-top:14px}.mb .btn{flex:1}
.fab{position:fixed;bottom:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fb{border-radius:50%;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;transition:.2s}
.fb:active{transform:scale(.9)}
.fb.mn{width:52px;height:52px;background:var(--pri);color:#fff;font-size:22px}
.fb.sd{width:44px;height:44px;background:var(--grn);color:#fff;font-size:16px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:9px 20px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap}
.toast.sh{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hd">
  <div><h1>📅 일정관리</h1><div class="sub" id="todayDisp"></div></div>
  <div style="display:flex;gap:6px"><button class="hd-btn" onclick="openSettings()">⚙</button></div>
</div>
<div class="tabs">
  <div class="tab on" data-t="chk" onclick="sw('chk')">점검 <span class="bdg z" id="bdgDue">0</span></div>
  <div class="tab" data-t="mng" onclick="sw('mng')">항목관리</div>
  <div class="tab" data-t="dsh" onclick="sw('dsh')">대시보드</div>
  <div class="tab" data-t="hist" onclick="sw('hist')">이력</div>
  <div class="tab" data-t="set" onclick="sw('set')">설정</div>
</div>
<div class="ct">
<div class="pn on" id="pn-chk">
  <div class="stats" id="statsArea"></div>
  <div id="alertArea"></div>
  <div id="chkList"></div>
  <div class="empty" id="chkEmpty" style="display:none">항목관리에서 일정을 등록하세요.</div>
</div>
<div class="pn" id="pn-mng">
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="btn-sm btn-gray" onclick="exportJSON()">📤 내보내기</button>
    <button class="btn-sm btn-gray" onclick="document.getElementById('impFile').click()">📥 가져오기</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(this)">
  </div>
  <div id="mngList"></div>
  <div class="empty" id="mngEmpty" style="display:none">＋ 버튼으로 항목을 추가하세요.</div>
</div>
<div class="pn" id="pn-dsh">
  <div class="stats" id="dshStats"></div>
  <div class="chart-area" id="catChart"></div>
  <div class="chart-area" id="asgChart"></div>
  <div class="chart-area"><h3>최근 수행 이력</h3><div id="dshHist"></div></div>
</div>
<div class="pn" id="pn-hist">
  <div class="card">
    <div class="card-tit"><span>✅ 수행 이력</span><button class="btn-sm btn-red" onclick="clearHist()">전체삭제</button></div>
    <div id="histList"></div>
    <div class="empty" id="histEmpty" style="display:none">수행 이력이 없습니다.</div>
  </div>
</div>
<div class="pn" id="pn-set">
  <div class="card">
    <div class="card-tit"><span>👤 내 정보</span></div>
    <div class="fg"><div class="fl">이름</div><input type="text" id="cfgName" placeholder="본인 이름"></div>
    <div class="fg"><div class="fl">사전알림 일수</div><input type="number" id="cfgAlertDays" value="3" min="0" max="30"><div style="font-size:10px;color:var(--t3);margin-top:2px">마감 N일 전부터 임박 표시</div></div>
    <button class="btn btn-pri" onclick="saveCfg()">💾 설정 저장</button>
  </div>
  <div class="card">
    <div class="card-tit"><span>📂 데이터 관리</span></div>
    <button class="btn btn-red" onclick="resetAll()">🗑 전체 초기화</button>
  </div>
</div>
</div>
<div class="fab" id="fabArea">
  <button class="fb sd" onclick="sendChecked()" id="fabS" style="display:none">✅</button>
  <button class="fb mn" onclick="openItemModal()" id="fabM">＋</button>
</div>
<div class="ov" id="itmModal">
  <div class="md">
    <h2 id="itmTitle">📅 일정 추가</h2>
    <div class="fg"><div class="fl">대항목(분류) <span class="rq">*</span></div><input type="text" id="fCat" placeholder="예: 품질, 생산, 교육, 설비, 회의" list="catDL"><datalist id="catDL"></datalist></div>
    <div class="fg"><div class="fl">소항목(일정명) <span class="rq">*</span></div><textarea id="fName" placeholder="일정 내용 상세"></textarea></div>
    <div class="fg"><div class="fl">관리주기 <span class="rq">*</span></div>
      <select id="fCycle"><option value="일">매일</option><option value="주">매주</option><option value="월" selected>매월</option><option value="분기">분기(3개월)</option><option value="반기">반기(6개월)</option><option value="년">매년</option><option value="건">건(수시)</option></select>
    </div>
    <div class="fg"><div class="fl">담당자</div><input type="text" id="fAs" placeholder="담당자명"></div>
    <div class="fg"><div class="fl">최종 수행일</div><input type="date" id="fLD"><div style="font-size:10px;color:var(--t3);margin-top:2px">비워두면 '미수행' 상태. 주기 카운트다운은 수행일 기준으로 시작됩니다.</div></div>
    <div class="fg"><div class="fl">비고</div><input type="text" id="fMm" placeholder="참고사항"></div>
    <input type="hidden" id="fEid" value="">
    <div class="mb">
      <button class="btn btn-gray" onclick="closeModal('itmModal')">취소</button>
      <button class="btn btn-pri" onclick="saveItem()">저장</button>
      <button class="btn btn-red" id="btnDel" onclick="delItemModal()" style="display:none;flex:0;padding:11px 16px">🗑</button>
    </div>
  </div>
</div>
<div class="ov" id="setModal">
  <div class="md">
    <h2>⚙ 설정</h2>
    <div class="fg"><div class="fl">이름</div><input type="text" id="sCfgN" placeholder="본인 이름"></div>
    <div class="fg"><div class="fl">사전알림 일수</div><input type="number" id="sCfgA" value="3" min="0" max="30"></div>
    <div class="mb">
      <button class="btn btn-gray" onclick="closeModal('setModal')">취소</button>
      <button class="btn btn-pri" onclick="saveCfgModal()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="tst"></div>
<script>
const K={items:'SCH_ITEMS',cfg:'SCH_CFG',hist:'SCH_HIST'};
const ls=k=>{try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}};
const ss=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let items=ls(K.items)||[];
let cfg=ls(K.cfg)||{name:'',alertDays:3};
let histData=ls(K.hist)||[];
let checked=new Set();
let curTab='chk';

function kstNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}))}
function kstDate(d){return new Date(new Date(d).toLocaleString('en-US',{timeZone:'Asia/Seoul'}))}
function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const today=kstNow();today.setHours(0,0,0,0);
const iso=fmtD(today);
document.getElementById('todayDisp').textContent=today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일 ('+['일','월','화','수','목','금','토'][today.getDay()]+')';

const CDAYS={일:1,주:7,월:30,분기:90,반기:180,년:365,건:99999};
function dueInfo(it){
  if(!it.lastDate||it.cycle==='건')return{st:'none',dl:null};
  const l=kstDate(it.lastDate);l.setHours(0,0,0,0);
  const cd=CDAYS[it.cycle]||30;
  const next=new Date(l.getTime()+cd*864e5);
  const dl=Math.round((next-today)/864e5);
  const ad=cfg.alertDays||3;
  return{st:dl<0?'overdue':dl<=ad?'soon':'ok',dl};
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function groupBy(arr){const m=new Map();arr.forEach(i=>{const c=i.cat||'미분류';if(!m.has(c))m.set(c,[]);m.get(c).push(i)});return[...m.entries()].map(([cat,items])=>({cat,items}))}

function render(){renderCheck();renderManage();updBadge();updFab()}
function updBadge(){const d=items.filter(i=>{const dd=dueInfo(i);return dd.st==='overdue'||dd.st==='soon'}).length;const el=document.getElementById('bdgDue');el.textContent=d;el.className='bdg'+(d?'':' z')}
function updFab(){document.getElementById('fabS').style.display=curTab==='chk'&&checked.size?'flex':'none';document.getElementById('fabM').style.display=['chk','mng'].includes(curTab)?'flex':'none'}

function renderCheck(){
  const a=document.getElementById('chkList'),e=document.getElementById('chkEmpty'),sa=document.getElementById('statsArea'),aa=document.getElementById('alertArea');
  if(!items.length){a.innerHTML='';e.style.display='';sa.innerHTML='';aa.innerHTML='';return}
  e.style.display='none';
  let oN=0,sN=0,okN=0;
  items.forEach(i=>{const d=dueInfo(i);if(d.st==='overdue')oN++;else if(d.st==='soon')sN++;else okN++});
  sa.innerHTML='<div class="st od"><div class="n">'+oN+'</div><div class="l">초과</div></div><div class="st sn"><div class="n">'+sN+'</div><div class="l">임박</div></div><div class="st dn"><div class="n">'+okN+'</div><div class="l">정상</div></div><div class="st tot"><div class="n">'+items.length+'</div><div class="l">전체</div></div>';
  if(oN)aa.innerHTML='<div class="alt err"><b>🔴 '+oN+'건</b> 주기 초과 — 즉시 수행 필요</div>';
  else if(sN)aa.innerHTML='<div class="alt warn"><b>🟡 '+sN+'건</b> 수행 임박</div>';
  else aa.innerHTML='';
  const grps=groupBy(items);let h='';
  grps.forEach(g=>{
    h+='<div class="grp"><div class="gh" onclick="tgGrp(this)"><span>'+esc(g.cat)+'</span><span style="font-size:11px;font-weight:500;color:var(--t3)">('+g.items.length+')</span><span class="aw">▼</span></div><div class="gb">';
    g.items.forEach(it=>{
      const d=dueInfo(it),cls=d.st==='overdue'?'od':d.st==='soon'?'sn':'',ic=checked.has(it.id);
      let tg='';
      if(d.st==='overdue')tg='<span class="tg od">'+Math.abs(d.dl)+'일초과</span>';
      else if(d.st==='soon')tg='<span class="tg sn">'+d.dl+'일후</span>';
      else if(d.st==='ok')tg='<span class="tg ok">'+d.dl+'일후</span>';
      else if(it.cycle==='건')tg='<span class="tg ok">수시</span>';
      h+='<div class="it '+cls+'"><div class="it-i" onclick="editItem(\''+it.id+'\')"><div class="it-n">'+esc(it.name)+'</div><div class="it-m"><span class="cy">'+it.cycle+'</span>'+(it.assignee?'<span class="asg">'+esc(it.assignee)+'</span>':'')+(it.lastDate?'<span>최종:'+it.lastDate+'</span>':'<span style="color:var(--red)">미수행</span>')+tg+'</div></div><button class="ib ck '+(ic?'dn':'')+'" onclick="tgChk(\''+it.id+'\')">'+(ic?'✓':'○')+'</button></div>';
    });
    h+='</div></div>';
  });
  a.innerHTML=h;
}
function renderManage(){
  const a=document.getElementById('mngList'),e=document.getElementById('mngEmpty');
  if(!items.length){a.innerHTML='';e.style.display='';return}
  e.style.display='none';const grps=groupBy(items);let h='';
  grps.forEach(g=>{
    h+='<div class="grp"><div class="gh" onclick="tgGrp(this)"><span>'+esc(g.cat)+'</span><span style="font-size:11px;font-weight:500;color:var(--t3)">('+g.items.length+')</span><span class="aw">▼</span></div><div class="gb">';
    g.items.forEach(it=>{
      h+='<div class="it" data-id="'+it.id+'"><div class="it-i" onclick="editItem(\''+it.id+'\')"><div class="it-n">'+esc(it.name)+'</div><div class="it-m"><span class="cy">'+it.cycle+'</span>'+(it.assignee?'<span class="asg">'+esc(it.assignee)+'</span>':'')+(it.lastDate?'<span>최종:'+it.lastDate+'</span>':'')+(it.memo?'<span style="color:var(--t3)">'+esc(it.memo)+'</span>':'')+'</div></div><div class="ia"><button class="ib" onclick="mvIt(\''+it.id+'\',-1)">▲</button><button class="ib" onclick="mvIt(\''+it.id+'\',1)">▼</button><button class="ib" onclick="delIt(\''+it.id+'\')" style="color:var(--red)">✕</button></div></div>';
    });
    h+='</div></div>';
  });
  a.innerHTML=h;
}
function renderDash(){
  let oN=0,sN=0,okN=0;const byCat={},byAsg={};
  items.forEach(it=>{
    const cat=it.cat||'미분류',asg=it.assignee||'미지정';
    if(!byCat[cat])byCat[cat]={t:0,o:0,s:0,ok:0};if(!byAsg[asg])byAsg[asg]={t:0,o:0,s:0,ok:0};
    byCat[cat].t++;byAsg[asg].t++;
    const d=dueInfo(it);if(d.st==='overdue'){oN++;byCat[cat].o++;byAsg[asg].o++}else if(d.st==='soon'){sN++;byCat[cat].s++;byAsg[asg].s++}else{okN++;byCat[cat].ok++;byAsg[asg].ok++}
  });
  document.getElementById('dshStats').innerHTML='<div class="st od"><div class="n">'+oN+'</div><div class="l">초과</div></div><div class="st sn"><div class="n">'+sN+'</div><div class="l">임박</div></div><div class="st dn"><div class="n">'+okN+'</div><div class="l">정상</div></div><div class="st tot"><div class="n">'+items.length+'</div><div class="l">전체</div></div>';
  let ch='<h3>분류별 현황</h3>';const mx=Math.max(...Object.values(byCat).map(v=>v.t),1);
  Object.entries(byCat).forEach(([c,v])=>{ch+='<div class="bar-row"><div class="bl">'+esc(c)+'</div><div class="bar-wrap"><div class="bar-seg" style="width:'+(v.o/mx*100)+'%;background:var(--red)"></div><div class="bar-seg" style="width:'+(v.s/mx*100)+'%;background:var(--amb)"></div><div class="bar-seg" style="width:'+(v.ok/mx*100)+'%;background:var(--grn)"></div></div><div class="bar-n">'+v.t+'</div></div>'});
  ch+='<div class="legend"><span class="lg-r">초과</span><span class="lg-a">임박</span><span class="lg-g">정상</span></div>';
  document.getElementById('catChart').innerHTML=ch;
  let ah='<h3>담당자별 현황</h3>';const ma=Math.max(...Object.values(byAsg).map(v=>v.t),1);
  Object.entries(byAsg).forEach(([a,v])=>{ah+='<div class="bar-row"><div class="bl">'+esc(a)+'</div><div class="bar-wrap"><div class="bar-seg" style="width:'+(v.o/ma*100)+'%;background:var(--red)"></div><div class="bar-seg" style="width:'+(v.s/ma*100)+'%;background:var(--amb)"></div><div class="bar-seg" style="width:'+(v.ok/ma*100)+'%;background:var(--grn)"></div></div><div class="bar-n">'+v.t+'</div></div>'});
  ah+='<div class="legend"><span class="lg-r">초과</span><span class="lg-a">임박</span><span class="lg-g">정상</span></div>';
  document.getElementById('asgChart').innerHTML=ah;
  const dh=document.getElementById('dshHist');
  if(!histData.length){dh.innerHTML='<div style="padding:10px;color:var(--t3);text-align:center;font-size:12px">이력 없음</div>';return}
  dh.innerHTML=histData.slice(0,20).map(h=>'<div class="hi"><div class="hd2">'+h.date+' ('+h.count+'건)</div><div class="hb">'+esc(h.names.join(', '))+'</div></div>').join('');
}
function renderHist(){
  const c=document.getElementById('histList'),e=document.getElementById('histEmpty');
  if(!histData.length){c.innerHTML='';e.style.display='';return}e.style.display='none';
  c.innerHTML=histData.slice(0,50).map(h=>'<div class="hi"><div class="hd2">'+h.date+' — '+h.count+'건 수행</div><div class="hb">'+esc(h.names.join(', '))+'</div></div>').join('');
}
function clearHist(){if(!histData.length)return;if(!confirm('수행 이력을 전체 삭제?'))return;histData=[];ss(K.hist,[]);renderHist();toast('이력 삭제됨')}

function tgChk(id){if(checked.has(id))checked.delete(id);else checked.add(id);renderCheck();updFab()}
function sendChecked(){
  if(!checked.size){toast('체크된 항목이 없습니다',1);return}
  const now=kstNow();const names=[];
  checked.forEach(id=>{const it=items.find(i=>i.id===id);if(it){it.lastDate=iso;names.push(it.name)}});
  ss(K.items,items);
  histData.unshift({date:iso+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),count:names.length,names});
  if(histData.length>200)histData.length=200;ss(K.hist,histData);
  checked.clear();if(navigator.vibrate)navigator.vibrate([50,30,50]);render();toast('✅ '+names.length+'건 수행 완료');
}

function openItemModal(eid){
  document.getElementById('itmTitle').textContent=eid?'✏️ 일정 편집':'📅 일정 추가';
  document.getElementById('fCat').value='';document.getElementById('fName').value='';
  document.getElementById('fCycle').value='월';document.getElementById('fAs').value=cfg.name||'';
  document.getElementById('fLD').value='';document.getElementById('fMm').value='';
  document.getElementById('fEid').value='';document.getElementById('btnDel').style.display='none';
  if(eid){const it=items.find(i=>i.id===eid);if(it){document.getElementById('fCat').value=it.cat||'';document.getElementById('fName').value=it.name||'';document.getElementById('fCycle').value=it.cycle||'월';document.getElementById('fAs').value=it.assignee||'';document.getElementById('fLD').value=it.lastDate||'';document.getElementById('fMm').value=it.memo||'';document.getElementById('fEid').value=eid;document.getElementById('btnDel').style.display=''}}
  updCatDL();openModal('itmModal');
}
function editItem(id){openItemModal(id)}
function saveItem(){
  const cat=document.getElementById('fCat').value.trim(),name=document.getElementById('fName').value.trim();
  if(!cat||!name){toast('분류와 일정명을 입력하세요',1);return}
  const cycle=document.getElementById('fCycle').value,assignee=document.getElementById('fAs').value.trim();
  const lastDate=document.getElementById('fLD').value,memo=document.getElementById('fMm').value.trim();
  const eid=document.getElementById('fEid').value;
  if(eid){const it=items.find(i=>i.id===eid);if(it)Object.assign(it,{cat,name,cycle,assignee,lastDate,memo})}
  else items.push({id:uid(),cat,name,cycle,assignee,lastDate,memo});
  ss(K.items,items);closeModal('itmModal');render();toast(eid?'수정됨':'등록됨');
}
function delItemModal(){const eid=document.getElementById('fEid').value;if(!eid||!confirm('삭제?'))return;items=items.filter(i=>i.id!==eid);ss(K.items,items);closeModal('itmModal');render();toast('삭제됨')}
function delIt(id){if(!confirm('삭제?'))return;items=items.filter(i=>i.id!==id);ss(K.items,items);render();toast('삭제됨')}
function mvIt(id,dir){const idx=items.findIndex(i=>i.id===id);const n=idx+dir;if(n<0||n>=items.length)return;[items[idx],items[n]]=[items[n],items[idx]];ss(K.items,items);render()}
function updCatDL(){const cs=[...new Set(items.map(i=>i.cat).filter(Boolean))];document.getElementById('catDL').innerHTML=cs.map(c=>'<option value="'+esc(c)+'">').join('')}

function openSettings(){document.getElementById('sCfgN').value=cfg.name||'';document.getElementById('sCfgA').value=cfg.alertDays||3;openModal('setModal')}
function saveCfgModal(){cfg.name=document.getElementById('sCfgN').value.trim();cfg.alertDays=parseInt(document.getElementById('sCfgA').value)||3;ss(K.cfg,cfg);closeModal('setModal');render();toast('설정 저장됨')}
function saveCfg(){cfg.name=document.getElementById('cfgName').value.trim();cfg.alertDays=parseInt(document.getElementById('cfgAlertDays').value)||3;ss(K.cfg,cfg);render();toast('설정 저장됨')}
function exportJSON(){const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='일정관리_'+iso+'.json';a.click();toast('내보내기 완료')}
function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);if(!Array.isArray(d)){toast('형식 오류',1);return}let added=0;d.forEach(x=>{if(x.name&&!items.some(i=>i.cat===x.cat&&i.name===x.name)){items.push({...x,id:x.id||uid()});added++}});ss(K.items,items);render();toast(added+'건 가져옴')}catch{toast('파일 오류',1)}};r.readAsText(f);inp.value=''}
function resetAll(){if(!confirm('모든 데이터 삭제?'))return;if(!confirm('정말?'))return;items=[];histData=[];ss(K.items,[]);ss(K.hist,[]);render();toast('초기화 완료')}

function sw(t){curTab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));document.querySelectorAll('.pn').forEach(el=>el.classList.toggle('on',el.id==='pn-'+t));updFab();if(t==='dsh')renderDash();if(t==='hist')renderHist();if(t==='set'){document.getElementById('cfgName').value=cfg.name||'';document.getElementById('cfgAlertDays').value=cfg.alertDays||3}}
function tgGrp(el){el.classList.toggle('cl');el.nextElementSibling.classList.toggle('h')}
function openModal(id){document.getElementById(id).classList.add('sh')}
function closeModal(id){document.getElementById(id).classList.remove('sh')}
function toast(m,e){const t=document.getElementById('tst');t.textContent=m;t.style.background=e?'var(--red)':'#333';t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),3000)}
render();
</script>
</body>
</html>
