<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>일정관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--c:#fff;--pri:#1a237e;--pl:#e8eaf6;--b:#1565c0;--bl:#e3f2fd;--red:#c62828;--rl:#ffebee;--grn:#2e7d32;--gl:#e8f5e9;--amb:#e65100;--al:#fff3e0;--tx:#212121;--t2:#555;--t3:#999;--bd:#e0e0e0;--r:12px;--sh:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:80px}
.hd{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:16px;font-weight:700}.hd .sub{font-size:10px;opacity:.7;margin-top:1px}
.hd-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--bd);position:sticky;top:54px;z-index:90}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--t3);transition:.2s}
.tab.on{color:var(--pri);border-bottom-color:var(--pri)}
.tab .bdg{display:inline-flex;min-width:16px;height:16px;border-radius:8px;font-size:9px;font-weight:700;padding:0 4px;margin-left:2px;background:var(--red);color:#fff;align-items:center;justify-content:center;vertical-align:middle}
.tab .bdg.z{background:var(--bd);color:var(--t3)}
.ct{padding:10px 12px;max-width:680px;margin:0 auto}
.pn{display:none}.pn.on{display:block}
.card{background:#fff;border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.fg{margin-bottom:10px}
.fl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;display:flex;gap:4px;align-items:center}
.fl .rq{color:var(--red);font-size:9px}
input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{width:100%;padding:9px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:#fafafa;transition:border .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--b);background:#fff}
textarea{resize:vertical;min-height:48px}
.btn{padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,#1a237e,#283593);color:#fff}
.btn-grn{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff}
.btn-red{background:var(--rl);color:var(--red);border:1px solid #ffcdd2}
.btn-gray{background:#f5f5f5;color:#555;border:1px solid var(--bd)}
.btn-sm{padding:6px 12px;font-size:11px;width:auto;border-radius:7px}
.btn-row{display:flex;gap:6px}
.btn-row .btn{flex:1}
.empty{text-align:center;padding:30px 16px;color:var(--t3);font-size:13px;line-height:1.6}
.sch-item{padding:10px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:8px}
.sch-item:last-child{border-bottom:none}
.sch-item.overdue{background:var(--rl)}.sch-item.soon{background:var(--al)}.sch-item.done{opacity:.5}
.si-chk{width:28px;height:28px;border:2px solid var(--bd);border-radius:7px;background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;margin-top:2px}
.si-chk:active{transform:scale(.9)}
.si-chk.dn{border-color:var(--grn);background:var(--grn);color:#fff}
.si-body{flex:1;min-width:0}
.si-name{font-size:13px;font-weight:600;line-height:1.3;word-break:keep-all}
.si-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;font-size:10px}
.si-tag{padding:1px 6px;border-radius:3px;font-weight:600}
.si-tag.cat{background:var(--pl);color:var(--pri)}
.si-tag.cy{background:var(--bl);color:var(--b)}
.si-tag.od{background:var(--rl);color:var(--red)}
.si-tag.sn{background:var(--al);color:var(--amb)}
.si-tag.ok{background:var(--gl);color:var(--grn)}
.si-tag.asg{background:#f3e5f5;color:#7b1fa2}
.si-acts{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.si-btn{width:26px;height:26px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.si-btn:active{transform:scale(.9)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.st{background:#fff;border-radius:var(--r);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.st .n{font-size:18px;font-weight:700}.st .l{font-size:10px;color:var(--t3);margin-top:1px}
.st.tot .n{color:var(--b)}.st.od .n{color:var(--red)}.st.sn .n{color:var(--amb)}.st.dn .n{color:var(--grn)}
.hi-item{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.hi-item:last-child{border-bottom:none}
.hi-top{display:flex;justify-content:space-between;align-items:center}
.hi-name{font-weight:600;color:var(--pri)}.hi-time{font-size:10px;color:var(--t3)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.ov.sh{display:flex}
.md{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;padding:18px;animation:su .25s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md h2{font-size:15px;font-weight:700;margin-bottom:14px}
.mb{display:flex;gap:6px;margin-top:14px}
.mb .btn{flex:1}
.fab{position:fixed;bottom:20px;right:20px;z-index:80}
.fab-btn{width:52px;height:52px;border-radius:50%;border:none;background:var(--pri);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center}
.fab-btn:active{transform:scale(.9)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:9px 20px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap}
.toast.sh{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hd">
  <div><h1>📅 일정관리</h1><div class="sub" id="todayDisp"></div></div>
  <div style="display:flex;gap:6px">
    <button class="hd-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<div class="tabs">
  <div class="tab on" data-t="list" onclick="sw('list')">일정목록 <span class="bdg z" id="bdgTodo">0</span></div>
  <div class="tab" data-t="cal" onclick="sw('cal')">캘린더</div>
  <div class="tab" data-t="hist" onclick="sw('hist')">완료이력</div>
  <div class="tab" data-t="set" onclick="sw('set')">설정</div>
</div>

<div class="ct">

<!-- 일정목록 -->
<div class="pn on" id="pn-list">
  <div class="stats" id="statsArea"></div>
  <div id="alertArea"></div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd)">
      <span style="font-size:13px;font-weight:700">📋 오늘의 일정</span>
      <select id="filterCat" onchange="renderList()" style="width:auto;padding:4px 8px;font-size:11px;border-radius:6px">
        <option value="">전체</option>
      </select>
    </div>
    <div id="listArea"></div>
    <div class="empty" id="listEmpty" style="display:none">일정을 등록하세요.</div>
  </div>
</div>

<!-- 캘린더 -->
<div class="pn" id="pn-cal">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button class="btn-sm btn-gray" onclick="calNav(-1)">◀</button>
      <span style="font-size:14px;font-weight:700" id="calTitle"></span>
      <button class="btn-sm btn-gray" onclick="calNav(1)">▶</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:4px">
      <div style="color:var(--red)">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div style="color:var(--b)">토</div>
    </div>
    <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>
  </div>
  <div class="card" id="calDayCard" style="display:none">
    <div class="card-tit"><span id="calDayTitle"></span></div>
    <div id="calDayList"></div>
  </div>
</div>

<!-- 완료이력 -->
<div class="pn" id="pn-hist">
  <div class="card">
    <div class="card-tit">
      <span>✅ 완료 이력</span>
      <button class="btn-sm btn-red" onclick="clearHist()">전체삭제</button>
    </div>
    <div id="histList"></div>
    <div class="empty" id="histEmpty" style="display:none">완료 이력이 없습니다.</div>
  </div>
</div>

<!-- 설정 -->
<div class="pn" id="pn-set">
  <div class="card">
    <div class="card-tit"><span>👤 내 정보</span></div>
    <div class="fg"><div class="fl">이름</div><input type="text" id="cfgName" placeholder="본인 이름"></div>
    <div class="fg"><div class="fl">사전알림 일수</div><input type="number" id="cfgAlertDays" value="3" min="0" max="30"><div style="font-size:10px;color:var(--t3);margin-top:2px">마감 N일 전부터 알림 표시</div></div>
    <button class="btn btn-pri" onclick="saveCfg()">💾 설정 저장</button>
  </div>
  <div class="card">
    <div class="card-tit"><span>📂 데이터 관리</span></div>
    <div class="btn-row" style="margin-bottom:8px">
      <button class="btn btn-gray" onclick="exportData()">📤 내보내기</button>
      <button class="btn btn-gray" onclick="document.getElementById('impFile').click()">📥 가져오기</button>
    </div>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
    <button class="btn btn-red" onclick="resetAll()">🗑 전체 초기화</button>
  </div>
</div>

</div>

<!-- FAB -->
<div class="fab"><button class="fab-btn" onclick="openAddModal()">＋</button></div>

<!-- 일정 추가/편집 모달 -->
<div class="ov" id="addModal">
  <div class="md">
    <h2 id="modalTitle">📅 일정 추가</h2>
    <div class="fg"><div class="fl">분류 <span class="rq">*</span></div><input type="text" id="fCat" placeholder="예: 품질, 생산, 회의, 교육" list="catList"><datalist id="catList"></datalist></div>
    <div class="fg"><div class="fl">일정명 <span class="rq">*</span></div><textarea id="fName" placeholder="일정 내용을 입력하세요"></textarea></div>
    <div class="fg"><div class="fl">주기</div>
      <select id="fCycle"><option value="일">매일</option><option value="주">매주</option><option value="월" selected>매월</option><option value="분기">분기</option><option value="반기">반기</option><option value="년">매년</option><option value="1회">1회성</option></select>
    </div>
    <div class="fg"><div class="fl">마감일</div><input type="date" id="fDue"></div>
    <div class="fg"><div class="fl">담당자</div><input type="text" id="fAssignee" placeholder="담당자명"></div>
    <div class="fg"><div class="fl">비고</div><input type="text" id="fMemo" placeholder="참고사항"></div>
    <input type="hidden" id="fEditId" value="">
    <div class="mb">
      <button class="btn btn-gray" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-pri" onclick="saveItem()">저장</button>
      <button class="btn btn-red" id="btnDel" onclick="deleteItem()" style="display:none;flex:0;padding:11px 16px">🗑</button>
    </div>
  </div>
</div>

<!-- 설정 모달 (간단) -->
<div class="ov" id="setModal">
  <div class="md">
    <h2>⚙ 설정</h2>
    <div class="fg"><div class="fl">이름</div><input type="text" id="sCfgName" placeholder="본인 이름"></div>
    <div class="fg"><div class="fl">사전알림 일수</div><input type="number" id="sCfgAlert" value="3" min="0" max="30"></div>
    <div class="mb">
      <button class="btn btn-gray" onclick="closeModal('setModal')">취소</button>
      <button class="btn btn-pri" onclick="saveCfgModal()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>

<script>
// ===== 저장소 =====
const LS={items:'SCH_ITEMS',cfg:'SCH_CFG',hist:'SCH_HIST'};
const load=k=>{try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

let items=load(LS.items)||[];
let cfg=load(LS.cfg)||{name:'',alertDays:3};
let hist=load(LS.hist)||[];
let calYear,calMonth;

// ===== 날짜 =====
function kstNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}))}
function fmtDate(d){const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
const today=kstNow();today.setHours(0,0,0,0);
const iso=fmtDate(today);
document.getElementById('todayDisp').textContent=`${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${['일','월','화','수','목','금','토'][today.getDay()]})`;
calYear=today.getFullYear();calMonth=today.getMonth();

const CDAYS={일:1,주:7,월:30,분기:90,반기:180,년:365,'1회':99999};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function dueInfo(it){
  if(!it.due)return{st:'none',dl:null};
  const d=new Date(it.due);d.setHours(0,0,0,0);
  const dl=Math.round((d-today)/864e5);
  const ad=cfg.alertDays||3;
  return{st:dl<0?'overdue':dl<=ad?'soon':'ok',dl};
}

// ===== 렌더링 =====
function render(){renderList();renderCal();renderHist();updBadge();updFilterCats()}

function updBadge(){
  const due=items.filter(i=>{const d=dueInfo(i);return d.st==='overdue'||d.st==='soon'}).length;
  const el=document.getElementById('bdgTodo');
  el.textContent=due;el.className='bdg'+(due?'':' z');
}

function updFilterCats(){
  const sel=document.getElementById('filterCat');const cur=sel.value;
  const cats=[...new Set(items.map(i=>i.cat).filter(Boolean))];
  sel.innerHTML='<option value="">전체</option>'+cats.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');
  sel.value=cur;
}

function renderList(){
  const c=document.getElementById('listArea');
  const emp=document.getElementById('listEmpty');
  const fc=document.getElementById('filterCat').value;
  let list=items;
  if(fc)list=list.filter(i=>i.cat===fc);

  // 통계
  const all=items.length;
  const od=items.filter(i=>dueInfo(i).st==='overdue').length;
  const sn=items.filter(i=>dueInfo(i).st==='soon').length;
  const dn=hist.length;
  document.getElementById('statsArea').innerHTML=`
    <div class="st tot"><div class="n">${all}</div><div class="l">전체</div></div>
    <div class="st od"><div class="n">${od}</div><div class="l">초과</div></div>
    <div class="st sn"><div class="n">${sn}</div><div class="l">임박</div></div>
    <div class="st dn"><div class="n">${dn}</div><div class="l">완료</div></div>`;

  // 알림
  const alerts=items.filter(i=>dueInfo(i).st==='overdue');
  document.getElementById('alertArea').innerHTML=alerts.length?
    `<div style="background:var(--rl);border:1px solid #ffcdd2;border-radius:var(--r);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--red)"><b>⚠ 기한 초과 ${alerts.length}건</b> — ${alerts.map(i=>i.name).join(', ')}</div>`:'';

  if(!list.length){c.innerHTML='';emp.style.display='block';return}
  emp.style.display='none';

  // 정렬: 초과→임박→정상→미정
  const sorted=[...list].sort((a,b)=>{
    const da=dueInfo(a),db=dueInfo(b);
    const ord={overdue:0,soon:1,ok:2,none:3};
    if(ord[da.st]!==ord[db.st])return ord[da.st]-ord[db.st];
    if(da.dl!=null&&db.dl!=null)return da.dl-db.dl;
    return 0;
  });

  c.innerHTML=sorted.map(it=>{
    const d=dueInfo(it);
    const cls=d.st==='overdue'?' overdue':d.st==='soon'?' soon':'';
    const dtag=d.st==='overdue'?`<span class="si-tag od">${Math.abs(d.dl)}일 초과</span>`:
               d.st==='soon'?`<span class="si-tag sn">${d.dl}일 남음</span>`:
               d.st==='ok'?`<span class="si-tag ok">${d.dl}일 남음</span>`:'';
    return`<div class="sch-item${cls}" data-id="${it.id}">
      <div class="si-chk" onclick="completeItem('${it.id}')">✓</div>
      <div class="si-body" onclick="editItem('${it.id}')">
        <div class="si-name">${esc(it.name)}</div>
        <div class="si-meta">
          ${it.cat?`<span class="si-tag cat">${esc(it.cat)}</span>`:''}
          <span class="si-tag cy">${it.cycle||'월'}</span>
          ${it.due?`<span class="si-tag" style="background:#f5f5f5;color:#555">${it.due}</span>`:''}
          ${dtag}
          ${it.assignee?`<span class="si-tag asg">${esc(it.assignee)}</span>`:''}
        </div>
      </div>
      <div class="si-acts">
        <button class="si-btn" onclick="editItem('${it.id}')" title="편집">✏</button>
      </div>
    </div>`;
  }).join('');
}

// ===== 캘린더 =====
function renderCal(){
  document.getElementById('calTitle').textContent=calYear+'년 '+(calMonth+1)+'월';
  const grid=document.getElementById('calGrid');
  const first=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay();

  let html='';
  for(let i=0;i<startDow;i++)html+='<div></div>';
  for(let d=1;d<=lastDay;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cnt=items.filter(it=>it.due===ds).length;
    const isToday=ds===iso;
    const bg=isToday?'background:var(--pri);color:#fff;font-weight:700':cnt?'background:var(--bl);font-weight:600':'';
    html+=`<div onclick="calSelectDay('${ds}')" style="padding:6px 2px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;${bg};position:relative">${d}${cnt?'<div style="width:5px;height:5px;border-radius:50%;background:'+(isToday?'#fff':'var(--b)')+';margin:1px auto 0"></div>':''}</div>`;
  }
  grid.innerHTML=html;
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}renderCal()}
function calSelectDay(ds){
  const card=document.getElementById('calDayCard');
  const list=items.filter(it=>it.due===ds);
  document.getElementById('calDayTitle').textContent='📅 '+ds+' ('+list.length+'건)';
  if(!list.length){document.getElementById('calDayList').innerHTML='<div style="padding:12px;color:var(--t3);font-size:12px;text-align:center">등록된 일정 없음</div>'}
  else{document.getElementById('calDayList').innerHTML=list.map(it=>`<div class="sch-item" style="border-bottom:1px solid #f0f0f0"><div class="si-body" onclick="editItem('${it.id}')"><div class="si-name">${esc(it.name)}</div><div class="si-meta">${it.cat?'<span class="si-tag cat">'+esc(it.cat)+'</span>':''}${it.assignee?'<span class="si-tag asg">'+esc(it.assignee)+'</span>':''}</div></div></div>`).join('')}
  card.style.display='block';
}

// ===== 이력 =====
function renderHist(){
  const c=document.getElementById('histList');
  const emp=document.getElementById('histEmpty');
  if(!hist.length){c.innerHTML='';emp.style.display='block';return}
  emp.style.display='none';
  c.innerHTML=hist.slice(0,50).map(h=>`<div class="hi-item"><div class="hi-top"><span class="hi-name">${esc(h.name)}</span><span class="hi-time">${h.completedAt||''}</span></div><div style="font-size:10px;color:var(--t3);margin-top:2px">${h.cat?h.cat+' · ':''}${h.cycle||''}</div></div>`).join('');
}
function clearHist(){if(!hist.length)return;if(!confirm('완료 이력을 전체 삭제할까요?'))return;hist=[];save(LS.hist,[]);renderHist();toast('이력 삭제됨')}

// ===== CRUD =====
function openAddModal(){
  document.getElementById('modalTitle').textContent='📅 일정 추가';
  document.getElementById('fCat').value='';
  document.getElementById('fName').value='';
  document.getElementById('fCycle').value='월';
  document.getElementById('fDue').value='';
  document.getElementById('fAssignee').value=cfg.name||'';
  document.getElementById('fMemo').value='';
  document.getElementById('fEditId').value='';
  document.getElementById('btnDel').style.display='none';
  updCatDatalist();
  openModal('addModal');
}
function editItem(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  document.getElementById('modalTitle').textContent='✏️ 일정 편집';
  document.getElementById('fCat').value=it.cat||'';
  document.getElementById('fName').value=it.name||'';
  document.getElementById('fCycle').value=it.cycle||'월';
  document.getElementById('fDue').value=it.due||'';
  document.getElementById('fAssignee').value=it.assignee||'';
  document.getElementById('fMemo').value=it.memo||'';
  document.getElementById('fEditId').value=id;
  document.getElementById('btnDel').style.display='';
  updCatDatalist();
  openModal('addModal');
}
function saveItem(){
  const cat=document.getElementById('fCat').value.trim();
  const name=document.getElementById('fName').value.trim();
  if(!cat||!name){toast('분류와 일정명을 입력하세요',1);return}
  const cycle=document.getElementById('fCycle').value;
  const due=document.getElementById('fDue').value;
  const assignee=document.getElementById('fAssignee').value.trim();
  const memo=document.getElementById('fMemo').value.trim();
  const eid=document.getElementById('fEditId').value;

  if(eid){
    const it=items.find(i=>i.id===eid);
    if(it){Object.assign(it,{cat,name,cycle,due,assignee,memo,updatedAt:iso})}
  }else{
    items.push({id:uid(),cat,name,cycle,due,assignee,memo,createdAt:iso,updatedAt:iso});
  }
  save(LS.items,items);closeModal('addModal');render();toast(eid?'수정됨':'등록됨');
}
function deleteItem(){
  const eid=document.getElementById('fEditId').value;
  if(!eid||!confirm('이 일정을 삭제할까요?'))return;
  items=items.filter(i=>i.id!==eid);
  save(LS.items,items);closeModal('addModal');render();toast('삭제됨');
}
function completeItem(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  const now=kstNow();
  const ts=fmtDate(now)+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  hist.unshift({...it,completedAt:ts});
  if(hist.length>500)hist.length=500;
  save(LS.hist,hist);

  // 주기성이면 다음 마감일로 갱신, 1회성이면 삭제
  if(it.cycle==='1회'){
    items=items.filter(i=>i.id!==id);
  }else if(it.due){
    const cd=CDAYS[it.cycle]||30;
    const next=new Date(it.due);next.setDate(next.getDate()+cd);
    it.due=fmtDate(next);it.updatedAt=iso;
  }
  save(LS.items,items);render();
  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  toast('✅ 완료 처리');
}

function updCatDatalist(){
  const cats=[...new Set(items.map(i=>i.cat).filter(Boolean))];
  document.getElementById('catList').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
}

// ===== 설정 =====
function openSettings(){
  document.getElementById('sCfgName').value=cfg.name||'';
  document.getElementById('sCfgAlert').value=cfg.alertDays||3;
  openModal('setModal');
}
function saveCfgModal(){
  cfg.name=document.getElementById('sCfgName').value.trim();
  cfg.alertDays=parseInt(document.getElementById('sCfgAlert').value)||3;
  save(LS.cfg,cfg);closeModal('setModal');
  document.getElementById('cfgName').value=cfg.name;
  document.getElementById('cfgAlertDays').value=cfg.alertDays;
  render();toast('설정 저장됨');
}
function saveCfg(){
  cfg.name=document.getElementById('cfgName').value.trim();
  cfg.alertDays=parseInt(document.getElementById('cfgAlertDays').value)||3;
  save(LS.cfg,cfg);render();toast('설정 저장됨');
}

// ===== 데이터 관리 =====
function exportData(){
  const data={items,hist,cfg};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`일정관리_${iso}.json`;a.click();toast('내보내기 완료');
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(d.items&&Array.isArray(d.items)){
        let added=0;
        d.items.forEach(x=>{if(x.name&&!items.some(i=>i.name===x.name&&i.cat===x.cat)){items.push({...x,id:x.id||uid()});added++}});
        save(LS.items,items);
        if(d.hist&&Array.isArray(d.hist)){hist=hist.concat(d.hist);save(LS.hist,hist)}
        render();toast(added+'건 가져오기 완료');
      }else{toast('형식 오류',1)}
    }catch{toast('파일 오류',1)}
  };r.readAsText(f);inp.value='';
}
function resetAll(){
  if(!confirm('모든 로컬 데이터가 삭제됩니다. 계속?'))return;
  if(!confirm('정말 삭제?'))return;
  items=[];hist=[];save(LS.items,[]);save(LS.hist,[]);render();toast('초기화 완료');
}

// ===== 유틸 =====
function sw(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
  document.querySelectorAll('.pn').forEach(el=>el.classList.toggle('on',el.id===`pn-${t}`));
  if(t==='cal')renderCal();
  if(t==='set'){document.getElementById('cfgName').value=cfg.name||'';document.getElementById('cfgAlertDays').value=cfg.alertDays||3}
}
function openModal(id){document.getElementById(id).classList.add('sh')}
function closeModal(id){document.getElementById(id).classList.remove('sh')}
function toast(m,e){const t=document.getElementById('tst');t.textContent=m;t.style.background=e?'var(--red)':'#333';t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),3000)}

render();
</script>
