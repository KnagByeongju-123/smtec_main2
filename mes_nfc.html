<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MES NFC 태그 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a78bfa}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:16px;padding-bottom:80px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:linear-gradient(180deg,#181b26,var(--bg));border-bottom:1px solid var(--border);margin:-16px -16px 16px}
.hdr h1{font-size:17px;font-weight:800;color:var(--accent)}
.hdr .sub{font-size:11px;color:var(--sub);margin-top:3px}
.hdr .bk{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);text-decoration:none;font-size:12px;font-weight:600}

.cfg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.cfg h2{font-size:13px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.row label{font-size:12px;font-weight:600;color:var(--sub);min-width:70px}
.row input,.row select,.row textarea{flex:1;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:13px;font-family:inherit;min-width:120px}
.row textarea{resize:vertical;font-family:'Consolas',monospace;line-height:1.6}
.btn{padding:9px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-accent{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}

.hint{font-size:11px;color:var(--sub);background:rgba(56,189,248,.08);padding:8px 10px;border-radius:6px;line-height:1.6;margin-top:6px}
.hint code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:3px;color:var(--accent);font-size:11px}

.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sm{background:var(--card);border-left:3px solid var(--accent);border-radius:8px;padding:10px;text-align:center}
.sm-lb{font-size:10px;color:var(--sub)}
.sm-vl{font-size:20px;font-weight:800;margin-top:3px;color:var(--accent)}
.sm.o{border-left-color:var(--orange)}.sm.o .sm-vl{color:var(--orange)}

.list-ctrl{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.list-ctrl input[type=text]{flex:1;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:12px;font-family:inherit;min-width:120px}

.tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.tag{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;page-break-inside:avoid;break-inside:avoid}
.tag.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.3)}
.tag-hdr{width:100%;display:flex;justify-content:space-between;align-items:center}
.tag-ho{font-size:22px;font-weight:800;color:var(--accent)}
.tag-ho .small{font-size:12px;color:var(--sub);font-weight:600;margin-left:4px}
.tag-chk{width:20px;height:20px;cursor:pointer}
.tag-qr{background:#fff;padding:8px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.tag-qr canvas,.tag-qr img{display:block}
.tag-info{width:100%;font-size:11px;color:var(--sub);text-align:center;line-height:1.5}
.tag-info .bd{color:var(--txt);font-weight:700}
.tag-url{width:100%;font-size:9px;color:var(--sub);word-break:break-all;background:#0a0d14;padding:5px 7px;border-radius:5px;font-family:monospace;line-height:1.4}
.tag-act{display:flex;gap:5px;width:100%}
.tag-act button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--txt);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}

.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.empty .ic{font-size:40px;margin-bottom:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media print {
  body{background:#fff;color:#000;padding:8mm}
  .hdr,.cfg,.summary,.list-ctrl,.no-print{display:none !important}
  .tag-grid{grid-template-columns:repeat(3,1fr);gap:4mm}
  .tag{background:#fff !important;border:1px dashed #999 !important;box-shadow:none !important;padding:6mm 4mm;break-inside:avoid}
  .tag-ho{color:#000 !important;font-size:18px}
  .tag-ho .small{color:#555 !important}
  .tag-info{color:#555 !important}
  .tag-info .bd{color:#000 !important}
  .tag-url{color:#777 !important;background:#f5f5f5 !important;font-size:7.5px}
  .tag-chk,.tag-act{display:none !important}
  .tag-qr{padding:4px !important;border:1px solid #eee}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>🏷️ MES NFC 태그 생성기</h1>
    <div class="sub">호기번호 수동 입력 → NFC URL · QR · 인쇄</div>
  </div>
  <a href="mes_work.html" class="bk">← 모니터링</a>
</div>

<div class="cfg">
  <h2>⚙️ URL 설정</h2>
  <div class="row">
    <label>베이스 URL</label>
    <input type="text" id="baseUrl" placeholder="https://knagbyeongju-123.github.io/smtec_main2/mes_work.html">
  </div>
  <div class="row">
    <label>동작</label>
    <select id="nfcAction">
      <option value="report">작업일보 자동이동 (권장)</option>
      <option value="">설비 팝업만 열기</option>
      <option value="repair">금형수리 자동이동</option>
    </select>
    <button class="btn btn-accent" onclick="saveConfig()">💾 저장</button>
  </div>
</div>

<div class="cfg">
  <h2>🖊️ 호기 입력</h2>
  <div class="row">
    <textarea id="machineInput" rows="5" placeholder="예시 1) 번호만&#10;1&#10;2&#10;49&#10;&#10;예시 2) 번호,메이커,톤수&#10;49,심팩,300&#10;50,현대,250"></textarea>
  </div>
  <div class="row">
    <button class="btn btn-green" onclick="applyInput()">✅ 적용 (QR 생성)</button>
    <button class="btn btn-ghost" onclick="quickFill()">⚡ 1~60호기 자동</button>
    <button class="btn btn-ghost" onclick="clearInput()">🗑 지우기</button>
  </div>
  <div class="hint">
    💡 <b>입력 형식</b>:<br>
    • 한 줄에 호기번호 하나: <code>49</code><br>
    • 쉼표로 메이커/톤수 추가: <code>49,심팩,300</code> (선택)<br>
    • 쉼표/공백/줄바꿈 구분자 모두 인식<br>
    • <b>자동 저장</b>: 입력 내용은 브라우저에 보존되어 다음 접속 시 자동 복원
  </div>
</div>

<div class="summary">
  <div class="sm"><div class="sm-lb">생성된 태그</div><div class="sm-vl" id="sTotal">0</div></div>
  <div class="sm o"><div class="sm-lb">선택</div><div class="sm-vl" id="sSel">0</div></div>
</div>

<div class="list-ctrl no-print">
  <input type="text" id="search" placeholder="🔍 호기번호 검색" oninput="renderTags()">
  <button class="btn btn-ghost" onclick="selectAll(true)">✅ 전체선택</button>
  <button class="btn btn-ghost" onclick="selectAll(false)">❌ 해제</button>
  <button class="btn btn-green" onclick="printSelected()">🖨️ 인쇄</button>
  <button class="btn btn-orange" onclick="exportCsv()">📥 CSV</button>
</div>

<div id="tagGrid" class="tag-grid"></div>

<div class="toast" id="toast"></div>

<script>
var CFG={baseUrl:'https://knagbyeongju-123.github.io/smtec_main2/mes_work.html',action:'report'};

function loadConfig(){
  try{var s=localStorage.getItem('NFC_GEN_CFG');if(s){var o=JSON.parse(s);if(o.baseUrl)CFG.baseUrl=o.baseUrl;if(o.action!==undefined)CFG.action=o.action}}catch(e){}
  document.getElementById('baseUrl').value=CFG.baseUrl;
  document.getElementById('nfcAction').value=CFG.action;
}
function saveConfig(){
  CFG.baseUrl=document.getElementById('baseUrl').value.trim()||CFG.baseUrl;
  CFG.action=document.getElementById('nfcAction').value;
  localStorage.setItem('NFC_GEN_CFG',JSON.stringify(CFG));
  toast('💾 설정 저장');renderTags();
}

function loadInput(){document.getElementById('machineInput').value=localStorage.getItem('NFC_MACHINE_INPUT')||''}
function saveInput(){localStorage.setItem('NFC_MACHINE_INPUT',document.getElementById('machineInput').value)}

function parseInput(){
  var raw=document.getElementById('machineInput').value;
  if(!raw.trim())return [];
  var lines=raw.split(/\r?\n/).map(function(l){return l.trim()}).filter(function(l){return l});
  var result=[],seen={};
  lines.forEach(function(line){
    var parts=line.split(',').map(function(s){return s.trim()});
    if(parts.length>=2){
      // "49,심팩,300" 형태 - 메이커/톤수 포함
      var ho=parts[0].replace(/[^\d]/g,'');
      if(!ho||seen[ho])return;seen[ho]=1;
      var maker=parts[1]||'';
      var ton=(parts[2]||'').replace(/[^\d]/g,'');
      result.push({ho:ho,maker:maker,ton:ton});
    }else{
      // 단일 번호 or 공백 구분 복수번호
      var tokens=line.split(/\s+/).map(function(s){return s.replace(/[^\d]/g,'')}).filter(function(s){return s});
      tokens.forEach(function(n){if(seen[n])return;seen[n]=1;result.push({ho:n,maker:'',ton:''})});
    }
  });
  return result;
}

var state={machines:[],selected:{}};

function applyInput(){
  saveInput();
  state.machines=parseInput();
  if(!state.machines.length){toast('⚠ 호기번호를 입력하세요');return}
  state.selected={};
  updateSummary();renderTags();
  toast('✅ '+state.machines.length+'개 태그 생성');
}

function quickFill(){
  if(!confirm('1~60호기를 자동 생성합니다.\n기존 입력은 덮어씌워집니다.'))return;
  var arr=[];for(var i=1;i<=60;i++)arr.push(String(i));
  document.getElementById('machineInput').value=arr.join('\n');
  applyInput();
}

function clearInput(){
  if(!confirm('입력 내용을 모두 지울까요?'))return;
  document.getElementById('machineInput').value='';saveInput();
  state.machines=[];state.selected={};
  updateSummary();renderTags();
}

function updateSummary(){document.getElementById('sTotal').textContent=state.machines.length;updateSelCount()}
function updateSelCount(){var n=Object.values(state.selected).filter(Boolean).length;document.getElementById('sSel').textContent=n}

function buildUrl(ho){
  var base=CFG.baseUrl.trim();
  var act=CFG.action;
  return base+'#nfc='+ho+(act?'/'+act:'');
}

function renderTags(){
  var q=(document.getElementById('search').value||'').trim();
  var list=state.machines.filter(function(m){if(q&&!String(m.ho).includes(q))return false;return true});
  list.sort(function(a,b){return parseInt(a.ho)-parseInt(b.ho)});
  var grid=document.getElementById('tagGrid');
  if(!list.length){
    if(!state.machines.length){
      grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">📭</div>위에서 호기번호를 입력하고<br><b>✅ 적용</b> 버튼을 눌러주세요</div>';
    }else{
      grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">🔍</div>검색 결과 없음</div>';
    }
    return;
  }
  grid.innerHTML=list.map(function(m){
    var url=buildUrl(m.ho);
    var key=m.ho;
    var sel=state.selected[key]?'checked':'';
    var selCls=state.selected[key]?'sel':'';
    var sub=[];
    if(m.maker)sub.push('<span class="bd">'+esc(m.maker)+'</span>');
    if(m.ton)sub.push(m.ton+'톤');
    return '<div class="tag '+selCls+'" id="tag_'+key+'">'+
      '<div class="tag-hdr">'+
        '<div class="tag-ho">'+esc(m.ho)+'<span class="small">호기</span></div>'+
        '<input type="checkbox" class="tag-chk no-print" '+sel+' onchange="toggleSel(\''+key+'\',this.checked)">'+
      '</div>'+
      '<div class="tag-qr" id="qr_'+key+'"></div>'+
      '<div class="tag-info">'+(sub.join(' · ')||'&nbsp;')+'</div>'+
      '<div class="tag-url">'+esc(url)+'</div>'+
      '<div class="tag-act no-print">'+
        '<button onclick="copyUrl(\''+esc(url)+'\')">📋 복사</button>'+
        '<button onclick="downloadQr(\''+key+'\')">💾 QR</button>'+
        '<button onclick="openLink(\''+esc(url)+'\')">🔗 열기</button>'+
      '</div>'+
    '</div>';
  }).join('');
  list.forEach(function(m){
    var el=document.getElementById('qr_'+m.ho);if(!el)return;
    var url=buildUrl(m.ho);
    QRCode.toCanvas(url,{width:140,margin:1,errorCorrectionLevel:'M'},function(err,canvas){
      if(!err&&canvas){el.innerHTML='';el.appendChild(canvas)}
    });
  });
}

function toggleSel(ho,v){
  state.selected[ho]=v;
  var el=document.getElementById('tag_'+ho);if(el)el.classList.toggle('sel',v);
  updateSelCount();
}
function selectAll(v){
  var q=(document.getElementById('search').value||'').trim();
  state.machines.forEach(function(m){if(q&&!String(m.ho).includes(q))return;state.selected[m.ho]=v});
  renderTags();
}

function copyUrl(url){
  navigator.clipboard.writeText(url).then(function(){toast('📋 복사됨')},function(){
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 복사됨');
  });
}
function openLink(url){window.open(url,'_blank')}
function downloadQr(ho){
  var wrap=document.getElementById('qr_'+ho);if(!wrap)return;
  var canvas=wrap.querySelector('canvas');if(!canvas)return;
  var W=canvas.width,H=canvas.height+56;
  var out=document.createElement('canvas');out.width=W;out.height=H;
  var ctx=out.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.drawImage(canvas,0,0);
  ctx.fillStyle='#000';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText(ho+'호기',W/2,canvas.height+32);
  ctx.font='11px sans-serif';ctx.fillStyle='#666';
  ctx.fillText('MES 작업일보',W/2,canvas.height+50);
  var a=document.createElement('a');a.download='NFC_'+ho+'호기.png';a.href=out.toDataURL('image/png');a.click();
  toast('💾 '+ho+'호기 QR 저장');
}

function printSelected(){
  var sels=Object.keys(state.selected).filter(function(k){return state.selected[k]});
  if(!sels.length){
    if(!confirm('선택된 항목이 없습니다.\n현재 화면 전체를 인쇄하시겠습니까?'))return;
    window.print();return;
  }
  document.querySelectorAll('.tag').forEach(function(el){
    var ho=el.id.replace('tag_','');el.style.display=state.selected[ho]?'':'none';
  });
  setTimeout(function(){
    window.print();
    setTimeout(function(){document.querySelectorAll('.tag').forEach(function(el){el.style.display=''})},500);
  },200);
}

function exportCsv(){
  if(!state.machines.length){toast('⚠ 데이터 없음');return}
  var rows=[['호기','메이커','톤수','NFC_URL']];
  state.machines.forEach(function(m){rows.push([m.ho,m.maker,m.ton,buildUrl(m.ho)])});
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){var s=String(c==null?'':c);return'"'+s.replace(/"/g,'""')+'"'}).join(',')}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='MES_NFC_URL_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSV 다운로드');
}

function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

document.getElementById('machineInput').addEventListener('input',saveInput);

loadConfig();
loadInput();
if(document.getElementById('machineInput').value.trim()){
  state.machines=parseInput();
  updateSummary();renderTags();
}
</script>
</body>
</html>
