<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MES NFC 태그 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a78bfa}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:16px;padding-bottom:80px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:linear-gradient(180deg,#181b26,var(--bg));border-bottom:1px solid var(--border);margin:-16px -16px 16px}
.hdr h1{font-size:17px;font-weight:800;color:var(--accent)}
.hdr .sub{font-size:11px;color:var(--sub);margin-top:3px}
.hdr .bk{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);text-decoration:none;font-size:12px;font-weight:600}

.cfg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.cfg h2{font-size:13px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.row label{font-size:12px;font-weight:600;color:var(--sub);min-width:80px}
.row input,.row select{flex:1;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:13px;font-family:inherit;min-width:120px}
.btn{padding:9px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-accent{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sm{background:var(--card);border-left:3px solid var(--accent);border-radius:8px;padding:10px;text-align:center}
.sm-lb{font-size:10px;color:var(--sub)}
.sm-vl{font-size:20px;font-weight:800;margin-top:3px;color:var(--accent)}
.sm.g{border-left-color:var(--green)}.sm.g .sm-vl{color:var(--green)}
.sm.p{border-left-color:var(--purple)}.sm.p .sm-vl{color:var(--purple)}
.sm.o{border-left-color:var(--orange)}.sm.o .sm-vl{color:var(--orange)}

.src-tabs{display:flex;gap:6px;margin-bottom:12px}
.src-tab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;text-align:center}
.src-tab.active{background:var(--accent);color:#0f172a;border-color:var(--accent)}

.list-ctrl{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.list-ctrl input[type=text]{flex:1;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:12px;font-family:inherit;min-width:150px}
.list-ctrl select{padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--txt);font-size:12px;font-family:inherit}

.tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.tag{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;page-break-inside:avoid;break-inside:avoid}
.tag.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.3)}
.tag-hdr{width:100%;display:flex;justify-content:space-between;align-items:center}
.tag-ho{font-size:22px;font-weight:800;color:var(--accent)}
.tag-ho .small{font-size:12px;color:var(--sub);font-weight:600;margin-left:4px}
.tag-chk{width:20px;height:20px;cursor:pointer}
.tag-qr{background:#fff;padding:8px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.tag-qr canvas,.tag-qr img{display:block}
.tag-info{width:100%;font-size:11px;color:var(--sub);text-align:center;line-height:1.5}
.tag-info .bd{color:var(--txt);font-weight:700}
.tag-url{width:100%;font-size:9px;color:var(--sub);word-break:break-all;background:#0a0d14;padding:5px 7px;border-radius:5px;font-family:monospace;line-height:1.4}
.tag-act{display:flex;gap:5px;width:100%}
.tag-act button{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--txt);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}

.empty{text-align:center;padding:40px 20px;color:var(--sub)}
.empty .ic{font-size:40px;margin-bottom:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* 인쇄 */
@media print {
  body{background:#fff;color:#000;padding:8mm}
  .hdr,.cfg,.summary,.src-tabs,.list-ctrl,.no-print{display:none !important}
  .tag-grid{grid-template-columns:repeat(3,1fr);gap:4mm}
  .tag{background:#fff !important;border:1px dashed #999 !important;box-shadow:none !important;padding:6mm 4mm;break-inside:avoid}
  .tag-ho{color:#000 !important;font-size:18px}
  .tag-ho .small{color:#555 !important}
  .tag-info{color:#555 !important}
  .tag-info .bd{color:#000 !important}
  .tag-url{color:#777 !important;background:#f5f5f5 !important;font-size:7.5px}
  .tag-chk,.tag-act{display:none !important}
  .tag-qr{padding:4px !important;border:1px solid #eee}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>🏷️ MES NFC 태그 생성기</h1>
    <div class="sub">호기별 NFC URL · QR코드 · 인쇄 일괄 처리</div>
  </div>
  <a href="mes_work.html" class="bk">← 모니터링</a>
</div>

<div class="cfg">
  <h2>⚙️ 기본 설정</h2>
  <div class="row">
    <label>베이스 URL</label>
    <input type="text" id="baseUrl" placeholder="https://knagbyeongju-123.github.io/smtec_main2/mes_work.html">
  </div>
  <div class="row">
    <label>동작</label>
    <select id="nfcAction">
      <option value="report">작업일보 자동이동 (권장)</option>
      <option value="">설비 팝업만 열기</option>
      <option value="repair">금형수리 자동이동</option>
    </select>
    <button class="btn btn-accent" onclick="saveConfig()">💾 저장</button>
  </div>
</div>

<div class="summary">
  <div class="sm"><div class="sm-lb">전체</div><div class="sm-vl" id="sTotal">-</div></div>
  <div class="sm g"><div class="sm-lb">실설비</div><div class="sm-vl" id="sReal">-</div></div>
  <div class="sm p"><div class="sm-lb">가상설비</div><div class="sm-vl" id="sVirt">-</div></div>
  <div class="sm o"><div class="sm-lb">선택</div><div class="sm-vl" id="sSel">0</div></div>
</div>

<div class="src-tabs">
  <div class="src-tab active" data-src="supa" onclick="setSrc('supa')">📡 Supabase 현재 설비</div>
  <div class="src-tab" data-src="master" onclick="setSrc('master')">🏭 설비 마스터 (localStorage)</div>
  <div class="src-tab" data-src="manual" onclick="setSrc('manual')">✏️ 수동 입력</div>
</div>

<div class="list-ctrl no-print">
  <input type="text" id="search" placeholder="🔍 호기번호 검색 (예: 49)" oninput="renderTags()">
  <select id="filterType" onchange="renderTags()">
    <option value="">전체</option>
    <option value="real">실설비만</option>
    <option value="virt">가상설비만</option>
  </select>
  <button class="btn btn-ghost" onclick="selectAll(true)">✅ 전체선택</button>
  <button class="btn btn-ghost" onclick="selectAll(false)">❌ 선택해제</button>
  <button class="btn btn-green" onclick="printSelected()">🖨️ 선택 인쇄</button>
  <button class="btn btn-orange" onclick="exportCsv()">📥 CSV</button>
  <button class="btn btn-accent" onclick="loadData()">🔄 새로고침</button>
</div>

<!-- 수동 입력 영역 -->
<div class="cfg no-print" id="manualBox" style="display:none">
  <h2>✏️ 수동 입력 (한 줄에 호기번호 하나)</h2>
  <div class="row">
    <textarea id="manualList" rows="4" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:13px;font-family:inherit" placeholder="예:&#10;01&#10;02&#10;49&#10;50"></textarea>
  </div>
  <div class="row">
    <button class="btn btn-accent" onclick="applyManual()">✅ 적용</button>
    <span style="font-size:11px;color:var(--sub)">쉼표/공백/줄바꿈 모두 인식</span>
  </div>
</div>

<div id="tagGrid" class="tag-grid"></div>

<div class="toast" id="toast"></div>

<script>
// ============== 설정 ==============
var CFG={
  baseUrl:'https://knagbyeongju-123.github.io/smtec_main2/mes_work.html',
  action:'report'
};
function loadConfig(){
  try{
    var s=localStorage.getItem('NFC_GEN_CFG');
    if(s){var o=JSON.parse(s);if(o.baseUrl)CFG.baseUrl=o.baseUrl;if(o.action!==undefined)CFG.action=o.action}
  }catch(e){}
  document.getElementById('baseUrl').value=CFG.baseUrl;
  document.getElementById('nfcAction').value=CFG.action;
}
function saveConfig(){
  CFG.baseUrl=document.getElementById('baseUrl').value.trim()||CFG.baseUrl;
  CFG.action=document.getElementById('nfcAction').value;
  localStorage.setItem('NFC_GEN_CFG',JSON.stringify(CFG));
  toast('💾 설정 저장');
  renderTags();
}

// ============== Supabase 설정 (mes_work.html과 동일) ==============
var SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
async function sbGet(table,q){
  try{
    var url=SB_URL+'/rest/v1/'+table+'?'+q;
    var r=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(!r.ok)return null;
    return await r.json();
  }catch(e){console.log('sbGet err',e);return null}
}

// ============== 데이터 로드 ==============
var state={src:'supa',machines:[],selected:{}};
function setSrc(src){
  state.src=src;
  document.querySelectorAll('.src-tab').forEach(function(t){t.classList.toggle('active',t.dataset.src===src)});
  document.getElementById('manualBox').style.display=src==='manual'?'':'none';
  loadData();
}

async function loadData(){
  var machines=[];
  if(state.src==='supa'){
    var data=await sbGet('machine_status','select=machine_code,machine_name,machine_status,is_virtual&order=machine_code.asc');
    if(!data){
      toast('⚠ Supabase 연결 실패 (네트워크/CORS 확인)');
    }else if(!data.length){
      toast('⚠ machine_status 테이블이 비어있음');
    }else{
      // 가상설비 정보 병합
      try{
        var vs=await sbGet('machine_virtual','select=machine_code,press_maker,tonnage,machine_name&active=eq.true');
        var vmap={};if(vs)vs.forEach(function(v){vmap[v.machine_code]=v});
        data.forEach(function(d){
          if(d.machine_status==='M'||d.is_virtual){var v=vmap[d.machine_code];if(v){d.press_maker=v.press_maker;d.tonnage=v.tonnage;if(v.machine_name)d.machine_name=v.machine_name}}
        });
      }catch(e){}
      machines=data.map(function(d){
        var isVirt=d.machine_status==='M'||d.is_virtual;
        var ho=extractHo(d.machine_name)||d.machine_code;
        var ton=extractTon(d.machine_name)||d.tonnage||'';
        var maker=d.press_maker||findMasterMaker(ho)||'';
        return{ho:ho,maker:maker,ton:ton?String(ton):'',isVirtual:!!isVirt,machine_code:d.machine_code,machine_name:d.machine_name||''};
      });
    }
  }
  if(state.src==='master'){
    var list=[];
    try{list=JSON.parse(localStorage.getItem('MACHINE_MASTER')||'[]')}catch(e){}
    if(!list.length){
      toast('⚠ 설비 마스터 없음 - mes_work.html에서 먼저 등록');
    }
    machines=list.map(function(m){return{ho:String(m.ho),maker:m.maker||'',ton:m.ton?String(m.ton):'',isVirtual:false,machine_code:'',machine_name:m.ho+'_'+(m.ton||'')}});
  }
  if(state.src==='manual'){
    machines=(state.manualMachines||[]).slice();
  }
  state.machines=machines;
  updateSummary();
  renderTags();
}

function extractHo(name){if(!name)return'';var m=String(name).match(/^(\d{1,3})/);return m?m[1]:''}
function extractTon(name){if(!name)return'';var m=String(name).match(/^\d{1,3}[_\-\s](\d{2,4})/);return m?m[1]:''}
function findMasterMaker(ho){
  try{
    var list=JSON.parse(localStorage.getItem('MACHINE_MASTER')||'[]');
    var t=String(parseInt(ho,10));
    for(var i=0;i<list.length;i++)if(String(parseInt(list[i].ho,10))===t)return list[i].maker||'';
  }catch(e){}
  return'';
}

function applyManual(){
  var raw=document.getElementById('manualList').value;
  var nums=raw.split(/[,\s\n\r]+/).map(function(s){return s.trim().replace(/[^\d]/g,'')}).filter(function(s){return s});
  state.manualMachines=nums.map(function(ho){
    var maker=findMasterMaker(ho);
    return{ho:ho,maker:maker,ton:'',isVirtual:false,machine_code:'',machine_name:ho};
  });
  loadData();
}

// ============== 렌더링 ==============
function updateSummary(){
  var total=state.machines.length;
  var real=state.machines.filter(function(m){return!m.isVirtual}).length;
  var virt=total-real;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sReal').textContent=real;
  document.getElementById('sVirt').textContent=virt;
  updateSelCount();
}
function updateSelCount(){
  var n=Object.values(state.selected).filter(Boolean).length;
  document.getElementById('sSel').textContent=n;
}
function buildUrl(ho){
  var base=CFG.baseUrl.trim();
  var act=CFG.action;
  var hash='#nfc='+ho+(act?'/'+act:'');
  return base+hash;
}

function renderTags(){
  var q=(document.getElementById('search').value||'').trim();
  var ft=document.getElementById('filterType').value;
  var list=state.machines.filter(function(m){
    if(q&&!String(m.ho).includes(q))return false;
    if(ft==='real'&&m.isVirtual)return false;
    if(ft==='virt'&&!m.isVirtual)return false;
    return true;
  });
  list.sort(function(a,b){return parseInt(a.ho)-parseInt(b.ho)});
  var grid=document.getElementById('tagGrid');
  if(!list.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">📭</div>등록된 설비가 없습니다<br><span style="font-size:11px">mes_work.html에서 설비 마스터를 먼저 등록하세요</span></div>';
    return;
  }
  grid.innerHTML=list.map(function(m){
    var url=buildUrl(m.ho);
    var key=m.ho;
    var sel=state.selected[key]?'checked':'';
    var selCls=state.selected[key]?'sel':'';
    var virtBadge=m.isVirtual?'<span style="color:var(--purple);font-weight:700">🖊️ 가상</span>':'';
    var sub=[];
    if(m.maker)sub.push('<span class="bd">'+esc(m.maker)+'</span>');
    if(m.ton)sub.push(m.ton+'톤');
    if(virtBadge)sub.push(virtBadge);
    return '<div class="tag '+selCls+'" id="tag_'+key+'">'+
      '<div class="tag-hdr">'+
        '<div class="tag-ho">'+esc(m.ho)+'<span class="small">호기</span></div>'+
        '<input type="checkbox" class="tag-chk no-print" '+sel+' onchange="toggleSel(\''+key+'\',this.checked)">'+
      '</div>'+
      '<div class="tag-qr" id="qr_'+key+'"></div>'+
      '<div class="tag-info">'+(sub.join(' · ')||'&nbsp;')+'</div>'+
      '<div class="tag-url">'+esc(url)+'</div>'+
      '<div class="tag-act no-print">'+
        '<button onclick="copyUrl(\''+esc(url)+'\')">📋 복사</button>'+
        '<button onclick="downloadQr(\''+key+'\')">💾 QR</button>'+
        '<button onclick="openLink(\''+esc(url)+'\')">🔗 열기</button>'+
      '</div>'+
    '</div>';
  }).join('');
  // QR 그리기
  list.forEach(function(m){
    var el=document.getElementById('qr_'+m.ho);
    if(!el)return;
    var url=buildUrl(m.ho);
    QRCode.toCanvas(url,{width:140,margin:1,errorCorrectionLevel:'M'},function(err,canvas){
      if(!err&&canvas){el.innerHTML='';el.appendChild(canvas)}
    });
  });
}

function toggleSel(ho,v){
  state.selected[ho]=v;
  var el=document.getElementById('tag_'+ho);
  if(el)el.classList.toggle('sel',v);
  updateSelCount();
}
function selectAll(v){
  // 현재 필터된 항목만
  var q=(document.getElementById('search').value||'').trim();
  var ft=document.getElementById('filterType').value;
  state.machines.forEach(function(m){
    if(q&&!String(m.ho).includes(q))return;
    if(ft==='real'&&m.isVirtual)return;
    if(ft==='virt'&&!m.isVirtual)return;
    state.selected[m.ho]=v;
  });
  renderTags();
}

// ============== 액션 ==============
function copyUrl(url){
  navigator.clipboard.writeText(url).then(function(){toast('📋 복사됨')},function(){
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 복사됨');
  });
}
function openLink(url){window.open(url,'_blank')}
function downloadQr(ho){
  var wrap=document.getElementById('qr_'+ho);
  if(!wrap)return;
  var canvas=wrap.querySelector('canvas');
  if(!canvas)return;
  // 라벨 합성: QR + 호기번호 텍스트
  var W=canvas.width,H=canvas.height+56;
  var out=document.createElement('canvas');out.width=W;out.height=H;
  var ctx=out.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.drawImage(canvas,0,0);
  ctx.fillStyle='#000';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText(ho+'호기',W/2,canvas.height+32);
  ctx.font='11px sans-serif';ctx.fillStyle='#666';
  ctx.fillText('MES 작업일보',W/2,canvas.height+50);
  var a=document.createElement('a');a.download='NFC_'+ho+'호기.png';a.href=out.toDataURL('image/png');a.click();
  toast('💾 '+ho+'호기 QR 저장');
}

function printSelected(){
  var sels=Object.keys(state.selected).filter(function(k){return state.selected[k]});
  if(!sels.length){
    if(!confirm('선택된 항목이 없습니다. 현재 화면 전체를 인쇄하시겠습니까?'))return;
    window.print();return;
  }
  // 선택 안 된 항목 숨김
  document.querySelectorAll('.tag').forEach(function(el){
    var ho=el.id.replace('tag_','');
    el.style.display=state.selected[ho]?'':'none';
  });
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      document.querySelectorAll('.tag').forEach(function(el){el.style.display=''});
    },500);
  },200);
}

function exportCsv(){
  var rows=[['호기','메이커','톤수','실설비/가상','NFC_URL']];
  state.machines.forEach(function(m){
    rows.push([m.ho,m.maker,m.ton,m.isVirtual?'가상':'실설비',buildUrl(m.ho)]);
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){var s=String(c==null?'':c);return'"'+s.replace(/"/g,'""')+'"'}).join(',')}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='MES_NFC_URL_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSV 다운로드');
}

// ============== 유틸 ==============
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

// ============== 초기화 ==============
loadConfig();
loadData();
</script>
