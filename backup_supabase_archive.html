<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Supabase 아카이브 도구</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#212121;min-height:100vh}
.hdr{background:linear-gradient(135deg,#e65100,#ff8f00);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700}.hdr p{font-size:10px;opacity:.7;margin-top:2px}
.wrap{max-width:700px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#e65100}
.card-tit .sub{font-size:10px;color:#888;font-weight:400;margin-left:auto}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa}
.fg input:focus,.fg select:focus{outline:none;border-color:#e65100;background:#fff;box-shadow:0 0 0 3px rgba(230,81,0,.08)}
.btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto;border-radius:8px}
.btn-green{background:linear-gradient(135deg,#00c853,#00e676);color:#000}
.btn-blue{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff}
.btn-red{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
.btn-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
.btn-orange{background:linear-gradient(135deg,#e65100,#ff9800);color:#fff}
.btn-row{display:flex;gap:8px;margin-bottom:8px}
.btn-row .btn{flex:1}
.status{font-size:12px;text-align:center;padding:8px;border-radius:8px;margin-bottom:8px}
.status.ok{background:#e8f5e9;color:#2e7d32}.status.err{background:#ffebee;color:#c62828}.status.info{background:#e3f2fd;color:#1565c0}.status.warn{background:#fff8e1;color:#e65100}
.tbl-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tbl-chip{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid #ddd;background:#fafafa;transition:.15s}
.tbl-chip:hover{border-color:#e65100;background:#fff3e0}
.tbl-chip.on{border-color:#e65100;background:#e65100;color:#fff}
.tbl-info{font-size:11px;color:#888;padding:4px 0}
.preview-tbl{width:100%;border-collapse:collapse;font-size:11px}
.preview-tbl th{background:#f5f5f5;padding:6px;text-align:left;font-weight:600;border-bottom:2px solid #e0e0e0}
.preview-tbl td{padding:5px 6px;border-bottom:1px solid #f0f0f0}
.preview-tbl tr:hover{background:#fff8e1}
.step{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-bottom:8px;font-size:13px;font-weight:600}
.step.done{background:#e8f5e9;color:#2e7d32}
.step.active{background:#fff3e0;color:#e65100}
.step.wait{background:#f5f5f5;color:#bbb}
.step .num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step.done .num{background:#4caf50;color:#fff}
.step.active .num{background:#e65100;color:#fff}
.step.wait .num{background:#e0e0e0;color:#999}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
  <h1>🗄️ Supabase 아카이브 도구</h1>
  <p>테이블 선택 → 날짜 범위 지정 → CSV 백업 → DB 정리</p>
</div>
<div class="wrap">

  <!-- 진행 단계 -->
  <div id="stepBar">
    <div class="step active" id="step1"><span class="num">1</span>Supabase 연결</div>
    <div class="step wait" id="step2"><span class="num">2</span>테이블 선택</div>
    <div class="step wait" id="step3"><span class="num">3</span>아카이브 실행</div>
  </div>

  <!-- STEP 1: Supabase 연결 -->
  <div class="card" style="border:2px solid #00897b">
    <div class="card-tit">🔌 Supabase 연결 설정</div>
    <p style="font-size:11px;color:#555;background:#f1f8e6;border-radius:7px;padding:8px 10px;margin-bottom:12px;line-height:1.6">Supabase Dashboard → Settings → API에서 <b>Project URL</b>과 <b>anon public</b> 키를 입력하세요.</p>
    <div class="fg"><label>Project URL</label><input type="password" id="cfgUrl" placeholder="https://xxxxx.supabase.co"></div>
    <div class="fg"><label>Anon Public Key</label><input type="password" id="cfgKey" placeholder="eyJhbGciOi..."></div>
    <div class="btn-row">
      <button class="btn btn-sm btn-green" onclick="saveCfg()">💾 저장</button>
      <button class="btn btn-sm btn-blue" onclick="testAndLoadTables()">🔌 연결 및 테이블 로드</button>
    </div>
    <div id="connStatus" style="display:none"></div>
  </div>

  <!-- STEP 2: 테이블 선택 -->
  <div class="card" id="tableCard" style="border:2px solid #1565c0;display:none">
    <div class="card-tit">📋 테이블 선택 <span class="sub" id="tblCount"></span></div>
    <div id="tableList" class="tbl-list"></div>
    <div id="tableInfo" class="tbl-info"></div>
    <div class="fg" id="dateColGroup" style="display:none">
      <label>📅 날짜 기준 컬럼</label>
      <select id="dateColSel"><option value="">컬럼 선택</option></select>
    </div>
    <div id="colPreview" style="display:none;margin-top:8px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">컬럼 목록:</div>
      <div id="colList" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    </div>
  </div>

  <!-- STEP 3: 아카이브 -->
  <div class="card" id="archCard" style="border:2px solid #ff9800;display:none">
    <div class="card-tit" style="justify-content:space-between">
      <span>🗄️ 아카이브</span>
      <span style="font-size:10px;color:#888;font-weight:400" id="archRecCount"></span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div class="fg" style="flex:1;margin:0"><label>시작일</label><input type="date" id="archFrom"></div>
      <div class="fg" style="flex:1;margin:0"><label>종료일</label><input type="date" id="archTo"></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button class="btn btn-sm btn-orange" onclick="archPreview()" style="flex:1">🔍 조회</button>
      <button class="btn btn-sm btn-gray" onclick="archSetQuick(3)">3개월전</button>
      <button class="btn btn-sm btn-gray" onclick="archSetQuick(6)">6개월전</button>
      <button class="btn btn-sm btn-gray" onclick="archSetQuick(12)">1년전</button>
    </div>
    <div id="archPreviewArea" style="display:none">
      <div class="status warn" id="archSummary"></div>
      <div style="max-height:300px;overflow:auto;border:1px solid #eee;border-radius:8px;margin-bottom:8px" id="archPreviewList"></div>
      <div class="btn-row">
        <button class="btn btn-sm btn-green" onclick="archDownloadCSV()" id="archDlBtn">📥 CSV 다운로드</button>
        <button class="btn btn-sm btn-red" onclick="archDeleteFromDB()" id="archDelBtn" disabled>🗑️ DB에서 삭제</button>
      </div>
      <div id="archStatus" style="font-size:11px;color:#888;text-align:center;margin-top:6px"></div>
    </div>
  </div>

  <!-- 전체 백업 -->
  <div class="card" id="fullBackupCard" style="display:none">
    <div class="card-tit">📦 전체 백업 (날짜 무관)</div>
    <p style="font-size:11px;color:#888;margin-bottom:8px">선택된 테이블의 전체 데이터를 CSV로 다운로드합니다. DB 삭제 없이 백업만.</p>
    <button class="btn btn-sm btn-blue" onclick="fullBackup()">📥 전체 CSV 다운로드</button>
    <div id="fullBackupStatus" style="font-size:11px;color:#888;text-align:center;margin-top:6px"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ===== Supabase =====
const SB_KEY='ARCHIVE_SB_CFG';
const SB_DEFAULT_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_DEFAULT_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';

function getCfg(){return JSON.parse(localStorage.getItem(SB_KEY)||'{}')}
function getUrl(){return(getCfg().url||SB_DEFAULT_URL).replace(/\/$/,'')}
function getKey(){return getCfg().key||SB_DEFAULT_KEY}

let _sb=null;
function getSb(){
  const u=getUrl(),k=getKey();
  if(!u||!k)return null;
  if(!_sb||_sb._u!==u){_sb=window.supabase.createClient(u,k);_sb._u=u}
  return _sb;
}

function loadCfgUI(){
  const c=getCfg();
  document.getElementById('cfgUrl').value=c.url||SB_DEFAULT_URL;
  document.getElementById('cfgKey').value=c.key||SB_DEFAULT_KEY;
}
function saveCfg(){
  const url=document.getElementById('cfgUrl').value.trim();
  const key=document.getElementById('cfgKey').value.trim();
  if(!url||!key){toast('URL과 Key를 모두 입력하세요');return}
  localStorage.setItem(SB_KEY,JSON.stringify({url,key}));_sb=null;
  toast('✅ 저장됨');
}

// ===== 연결 + 테이블 로드 =====
let allTables=[];
let selTable='';
let selDateCol='';
let tableColumns=[];

async function testAndLoadTables(){
  const st=document.getElementById('connStatus');st.style.display='block';st.className='status info';st.textContent='연결 중...';
  const sb=getSb();if(!sb){st.className='status err';st.textContent='❌ URL/Key 미설정';return}

  try{
    // 테이블 목록은 information_schema에서 가져올 수 없으므로, 알려진 테이블 + 동적 탐색
    const knownTables=['move_history','defect_history','part_mapping','feeder_setting','setting_check_history','exchange_check_history','bom','defect_model','board_image','defect_zone','defect_type','common_code','meeting','meeting_setting'];
    const found=[];
    for(const t of knownTables){
      try{
        const{count,error}=await sb.from(t).select('id',{count:'exact',head:true});
        if(!error)found.push({name:t,count:count||0});
      }catch(e){}
    }
    if(!found.length){st.className='status err';st.textContent='❌ 연결은 되었으나 테이블을 찾을 수 없습니다';return}

    allTables=found;
    st.className='status ok';st.textContent='✅ 연결 성공 — '+found.length+'개 테이블 발견';
    setStep(2);
    renderTableList();
  }catch(e){st.className='status err';st.textContent='❌ '+e.message}
}

function renderTableList(){
  const card=document.getElementById('tableCard');card.style.display='block';
  document.getElementById('tblCount').textContent=allTables.length+'개 테이블';
  const c=document.getElementById('tableList');c.innerHTML='';
  allTables.forEach(t=>{
    const chip=document.createElement('div');chip.className='tbl-chip'+(t.name===selTable?' on':'');
    chip.textContent=t.name+' ('+t.count+')';
    chip.onclick=()=>selectTable(t.name);
    c.appendChild(chip);
  });
}

async function selectTable(name){
  selTable=name;selDateCol='';
  document.querySelectorAll('.tbl-chip').forEach(c=>c.classList.toggle('on',c.textContent.startsWith(name+' ')));
  const info=document.getElementById('tableInfo');info.textContent='컬럼 로드 중...';

  const sb=getSb();
  try{
    // 1건 조회해서 컬럼명 파악
    const{data,error}=await sb.from(name).select('*').limit(1);
    if(error)throw error;
    if(!data||!data.length){
      // 빈 테이블이면 insert 시도 없이 안내
      info.textContent='⚠ 빈 테이블 — 데이터가 없어 컬럼을 자동 감지할 수 없습니다';
      tableColumns=[];
      document.getElementById('dateColGroup').style.display='none';
      document.getElementById('colPreview').style.display='none';
      return;
    }
    tableColumns=Object.keys(data[0]);
    info.textContent=name+' — '+tableColumns.length+'개 컬럼';

    // 컬럼 목록 표시
    const colList=document.getElementById('colList');colList.innerHTML='';
    tableColumns.forEach(col=>{
      const span=document.createElement('span');
      span.style.cssText='padding:3px 8px;background:#f0f0f0;border-radius:4px;font-size:10px;color:#555';
      span.textContent=col;colList.appendChild(span);
    });
    document.getElementById('colPreview').style.display='block';

    // 날짜 컬럼 자동 추천
    const dateCols=tableColumns.filter(c=>/date|created_at|time|일자|날짜/i.test(c));
    const sel=document.getElementById('dateColSel');
    sel.innerHTML='<option value="">날짜 기준 컬럼 선택</option>';
    tableColumns.forEach(c=>{
      const isDt=dateCols.includes(c);
      sel.innerHTML+='<option value="'+c+'"'+(isDt?' style="font-weight:700;color:#e65100"':'')+'>'+c+(isDt?' ⭐':'')+'</option>';
    });
    // 자동 선택 (우선순위)
    const auto=dateCols.find(c=>c.includes('date')&&!c.includes('created'))||dateCols.find(c=>c.includes('date'))||dateCols[0]||'';
    if(auto)sel.value=auto;
    sel.onchange=()=>{selDateCol=sel.value;showArchCard()};
    selDateCol=auto;
    document.getElementById('dateColGroup').style.display='block';

    showArchCard();
  }catch(e){info.textContent='❌ '+e.message;tableColumns=[]}
}

function showArchCard(){
  if(!selTable){document.getElementById('archCard').style.display='none';return}
  document.getElementById('archCard').style.display='block';
  document.getElementById('fullBackupCard').style.display='block';
  setStep(3);
  // 레코드 수 표시
  const t=allTables.find(x=>x.name===selTable);
  document.getElementById('archRecCount').textContent=t?t.name+': '+t.count+'건':'';
  // 초기화
  document.getElementById('archPreviewArea').style.display='none';
  archData=[];archDownloaded=false;
}

// ===== 단계 표시 =====
function setStep(n){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('step'+i);
    el.className='step '+(i<n?'done':i===n?'active':'wait');
  });
}

// ===== 아카이브 =====
let archData=[],archDownloaded=false;

function archSetQuick(months){
  const d=new Date();d.setMonth(d.getMonth()-months);
  document.getElementById('archFrom').value='2020-01-01';
  document.getElementById('archTo').value=d.toISOString().split('T')[0];
}

async function archPreview(){
  const from=document.getElementById('archFrom').value;
  const to=document.getElementById('archTo').value;
  const dateCol=document.getElementById('dateColSel').value||selDateCol;
  if(!selTable){toast('테이블을 선택하세요');return}
  if(!from||!to){toast('날짜 범위 지정');return}
  if(from>to){toast('시작일이 종료일보다 늦습니다');return}
  if(!dateCol){toast('날짜 기준 컬럼을 선택하세요');return}

  const area=document.getElementById('archPreviewArea');area.style.display='block';
  const summary=document.getElementById('archSummary');
  summary.className='status info';summary.textContent='조회 중...';
  document.getElementById('archPreviewList').innerHTML='';
  archDownloaded=false;document.getElementById('archDelBtn').disabled=true;
  document.getElementById('archDlBtn').textContent='📥 CSV 다운로드';

  const sb=getSb();
  try{
    const{data,error}=await sb.from(selTable).select('*')
      .gte(dateCol,from).lte(dateCol,to+'T23:59:59')
      .order(dateCol,{ascending:true}).limit(10000);
    if(error)throw error;
    archData=data||[];
    if(!archData.length){summary.className='status warn';summary.textContent='⚠ 해당 기간에 데이터 없음';return}
    summary.className='status warn';
    summary.textContent='📋 '+archData.length+'건 발견 ('+from+' ~ '+to+') — CSV 다운로드 후 삭제 가능';

    // 미리보기 테이블
    const showCols=tableColumns.slice(0,6);
    const preview=archData.slice(0,30);
    let h='<table class="preview-tbl"><thead><tr>';
    showCols.forEach(c=>{h+='<th>'+c+'</th>'});
    h+='</tr></thead><tbody>';
    preview.forEach(r=>{
      h+='<tr>';
      showCols.forEach(c=>{
        let v=r[c];if(v==null)v='';v=String(v);
        if(v.length>25)v=v.substring(0,25)+'…';
        h+='<td>'+esc(v)+'</td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table>';
    if(archData.length>30)h+='<div style="text-align:center;padding:6px;font-size:10px;color:#888">... 외 '+(archData.length-30)+'건</div>';
    document.getElementById('archPreviewList').innerHTML=h;
  }catch(e){summary.className='status err';summary.textContent='❌ '+e.message;archData=[]}
}

function archDownloadCSV(){
  if(!archData.length){toast('데이터 없음');return}
  downloadCSV(archData, selTable+'_아카이브_'+document.getElementById('archFrom').value.replace(/-/g,'')+'_'+document.getElementById('archTo').value.replace(/-/g,''));
  archDownloaded=true;
  document.getElementById('archDelBtn').disabled=false;
  document.getElementById('archDlBtn').textContent='✅ 다운로드 완료';
  document.getElementById('archStatus').textContent='CSV 다운로드 완료 — DB 삭제 버튼 활성화됨';
  toast('📥 CSV '+archData.length+'건 다운로드');
}

async function archDeleteFromDB(){
  if(!archDownloaded){toast('먼저 CSV 다운로드');return}
  if(!archData.length)return;
  if(!confirm('⚠ ['+selTable+'] '+archData.length+'건 영구 삭제?\nCSV 파일 확인 후 진행하세요.'))return;
  if(!confirm('최종 확인: '+archData.length+'건 삭제'))return;

  const st=document.getElementById('archStatus');st.textContent='삭제 중...';
  document.getElementById('archDelBtn').disabled=true;
  const sb=getSb();

  try{
    const ids=archData.map(r=>r.id).filter(Boolean);
    if(!ids.length){st.textContent='❌ id 컬럼 없음 — 수동 삭제 필요';return}
    const bs=500;let done=0;
    for(let i=0;i<ids.length;i+=bs){
      const batch=ids.slice(i,i+bs);
      const{error}=await sb.from(selTable).delete().in('id',batch);
      if(error)throw error;
      done+=batch.length;
      st.textContent='삭제 중... ('+done+'/'+ids.length+')';
    }
    st.textContent='✅ '+done+'건 삭제 완료';
    document.getElementById('archSummary').className='status ok';
    document.getElementById('archSummary').textContent='✅ 아카이브 완료 — '+done+'건 삭제됨';
    document.getElementById('archPreviewList').innerHTML='';
    archData=[];archDownloaded=false;
    toast('✅ 아카이브 완료');
    // 카운트 갱신
    const t=allTables.find(x=>x.name===selTable);
    if(t)t.count=Math.max(0,t.count-done);
    renderTableList();showArchCard();
  }catch(e){st.textContent='❌ '+e.message;document.getElementById('archDelBtn').disabled=false}
}

// ===== 전체 백업 =====
async function fullBackup(){
  if(!selTable){toast('테이블을 선택하세요');return}
  const st=document.getElementById('fullBackupStatus');st.textContent='다운로드 중...';
  const sb=getSb();
  try{
    // 전체 데이터 (최대 10000건씩 페이징)
    let all=[],offset=0;const pageSize=5000;
    while(true){
      const{data,error}=await sb.from(selTable).select('*').range(offset,offset+pageSize-1).order('id',{ascending:true});
      if(error)throw error;
      if(!data||!data.length)break;
      all=all.concat(data);
      st.textContent='로드 중... ('+all.length+'건)';
      if(data.length<pageSize)break;
      offset+=pageSize;
    }
    if(!all.length){st.textContent='⚠ 데이터 없음';return}
    const today=new Date().toISOString().split('T')[0].replace(/-/g,'');
    downloadCSV(all, selTable+'_전체백업_'+today);
    st.textContent='✅ '+all.length+'건 다운로드 완료';
    toast('📥 전체 백업 '+all.length+'건');
  }catch(e){st.textContent='❌ '+e.message}
}

// ===== CSV 생성 =====
function downloadCSV(data,filename){
  if(!data.length)return;
  const cols=Object.keys(data[0]);
  let csv='\uFEFF'+cols.join(',')+'\n';
  data.forEach(r=>{
    csv+=cols.map(c=>{
      let v=r[c];if(v==null)v='';v=String(v).replace(/"/g,'""');
      if(v.includes(',')||v.includes('"')||v.includes('\n'))v='"'+v+'"';
      return v;
    }).join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=filename+'.csv';a.click();
}

// ===== 유틸 =====
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}

// ===== 초기화 =====
loadCfgUI();
