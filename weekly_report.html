<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>주간보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--card:#fff;--primary:#1565c0;--primary-light:#e3f2fd;--red:#c62828;--red-light:#ffebee;--ok:#2e7d32;--ok-light:#e8f5e9;--warn:#e65100;--warn-light:#fff3e0;--gray:#888;--border:#e0e0e0;--shadow:0 2px 8px rgba(0,0,0,.06);--radius:12px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#212121;padding-bottom:40px;-webkit-tap-highlight-color:transparent}
.hdr{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.hdr .home-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer}
.hdr h1{font-size:17px;font-weight:800;flex:1}.hdr p{font-size:10px;opacity:.7}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin:12px;box-shadow:var(--shadow)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.btn{padding:10px 14px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s}.btn:active{transform:scale(.97)}
.btn-blue{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff}
.btn-green{background:linear-gradient(135deg,#2e7d32,#66bb6a);color:#fff}
.btn-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
.btn-sm{padding:8px 12px;font-size:12px}
.stat-table{width:100%;border-collapse:collapse;font-size:11px;border:2px solid #666}
.stat-table th{background:#f5f5f5;padding:6px 4px;text-align:center;font-weight:700;border:1.5px solid #999;white-space:nowrap;font-size:10px;position:sticky;top:0}
.stat-table td{padding:5px 4px;border:1.5px solid #999;text-align:center;font-size:11px}
.stat-table tr:hover{background:#fafafa}
.stat-table .st-total{background:#f5f5f5;font-weight:700}
.chip{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.empty{text-align:center;padding:24px;color:#bbb;font-size:13px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.loading .spinner{width:36px;height:36px;border:4px solid #e0e0e0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.loading p{font-size:13px;color:#555;font-weight:600}.loading.hide{display:none}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;background:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.summary-card{border-radius:10px;padding:12px 8px;text-align:center}
.summary-card .sv{font-size:20px;font-weight:800}.summary-card .sl{font-size:9px;margin-top:2px}
</style>
</head>
<body>
<div class="hdr">
  <button class="home-btn" onclick="history.back()">←</button>
  <div><h1>📊 주간보고서</h1><p>고객사별 PPM 추이 · 기종별 불량 분석</p></div>
</div>

<!-- 필터 -->
<div class="card">
  <div class="card-tit" style="font-size:15px">🔍 조회 조건</div>
  <div class="filter-row">
    <select id="rptCustomer" style="flex:1;min-width:100px;font-size:14px;padding:10px"><option value="">전체 고객사</option></select>
    <select id="rptInspLine" style="flex:1;min-width:100px;font-size:14px;padding:10px"><option value="">전체 검사라인</option></select>
  </div>
  <div class="filter-row">
    <input type="date" id="rptDateFrom" style="flex:1;min-width:110px;font-size:14px;padding:10px">
    <span style="font-size:14px;color:#888;font-weight:700">~</span>
    <input type="date" id="rptDateTo" style="flex:1;min-width:110px;font-size:14px;padding:10px">
    <input type="number" id="rptTargetPpm" value="2000" min="0" style="width:70px;text-align:center;font-size:14px;padding:10px" title="목표PPM">
    <span style="font-size:12px;color:#888;font-weight:600">목표</span>
  </div>
  <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">
    <button class="btn btn-sm btn-gray" onclick="setRange('4w')" style="padding:6px 12px;font-size:13px">4주</button>
    <button class="btn btn-sm btn-gray" onclick="setRange('12w')" style="padding:6px 12px;font-size:13px">12주</button>
    <button class="btn btn-sm btn-gray" onclick="setRange('6m')" style="padding:6px 12px;font-size:13px">6개월</button>
    <button class="btn btn-sm btn-gray" onclick="setRange('1y')" style="padding:6px 12px;font-size:13px">1년</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:nowrap">
    <button class="btn btn-blue" onclick="loadReport()" style="flex:1;font-size:15px;padding:13px">📊 조회</button>
    <button class="btn btn-green" onclick="exportReport()" style="flex:0;min-width:80px;font-size:15px;padding:13px">📥 엑셀</button>
  </div>
</div>

<!-- 전체 요약 -->
<div class="card" id="summaryCard" style="display:none">
  <div class="card-tit"><span>🔢 이번 주 요약</span><span style="font-size:10px;color:var(--gray)" id="thisWeekLabel"></span></div>
  <div class="summary-grid">
    <div class="summary-card" style="background:var(--primary-light)"><div class="sv" style="color:var(--primary)" id="smInspect">0</div><div class="sl" style="color:#555">검사수</div></div>
    <div class="summary-card" style="background:var(--red-light)"><div class="sv" style="color:var(--red)" id="smDefect">0</div><div class="sl" style="color:#555">불량수</div></div>
    <div class="summary-card" style="background:var(--warn-light)"><div class="sv" style="color:var(--warn)" id="smPpm">0</div><div class="sl" style="color:#555">PPM</div></div>
    <div class="summary-card" style="background:#f3e5f5"><div class="sv" style="color:#7b1fa2" id="smRate">0%</div><div class="sl" style="color:#555">불량률</div></div>
  </div>
</div>

<!-- 공정불량 요약 (통합) -->
<div class="card" id="processSummaryCard" style="display:none">
  <div class="card-tit"><span>🏭 주간 공정불량 요약</span><span style="font-size:10px;color:var(--gray)" id="processRange"></span></div>
  <div id="processSummaryWrap"></div>
</div>

<!-- 불량유형 Top -->
<div class="card" id="defectTopCard" style="display:none">
  <div class="card-tit">🏷 이번 주 불량유형 Top 10</div>
  <div id="defectTopWrap"></div>
</div>

<!-- 일별 상세 (차트 + 테이블) -->
<div class="card" id="dailyCard" style="display:none">
  <div class="card-tit"><span>📋 주간 고객사별 PPM 추이</span><span style="font-size:10px;color:var(--gray)" id="dailyChartRange"></span></div>
  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><canvas id="dailyChart" style="width:100%;min-width:700px;height:320px"></canvas></div>
  <div style="overflow-x:auto;margin-top:12px" id="dailyTableWrap"></div>
</div>

<!-- MES 불량 -->
<div class="card" id="mesCard" style="display:none">
  <div class="card-tit"><span>🏭 MES 불량</span><span style="font-size:10px;color:var(--gray)" id="mesRange"></span></div>
  <div class="filter-row" style="margin-bottom:8px">
    <input type="text" id="mesApiUrl" value="http://localhost:5100" placeholder="MES API URL" style="flex:1;min-width:140px;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:12px">
    <button class="btn btn-sm" onclick="loadMesData()" style="background:linear-gradient(135deg,#e65100,#ff9800);color:#fff;flex:0">🏭 MES 조회</button>
  </div>
  <div id="mesSummaryWrap"></div>
  <div style="overflow-x:auto;margin-top:8px" id="mesTableWrap"></div>
</div>

<div class="loading hide" id="loadingOverlay"><div class="spinner"></div><p id="loadingText">로딩 중...</p></div>
<div class="toast" id="toast"></div>

<script>
/* ===== Supabase 설정 (불량관리와 동일) ===== */
const SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
function sbH(){return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}}
async function sbGet(t,f,o,l){const p=new URLSearchParams();if(f)Object.entries(f).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')p.append(k,v)});if(o)p.append('order',o);if(l)p.append('limit',l);p.append('select','*');const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+p.toString(),{headers:sbH()});if(!r.ok)throw new Error(r.status);return r.json()}

/* ===== 유틸 ===== */
let _tt;
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>e.classList.remove('show'),2500)}
function showLoading(t){document.getElementById('loadingText').textContent=t||'로딩...';document.getElementById('loadingOverlay').classList.remove('hide')}
function hideLoading(){document.getElementById('loadingOverlay').classList.add('hide')}

function getMonday(ds){const d=new Date(ds+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff))}
function fmtMD(d){return(d.getMonth()+1)+'/'+d.getDate()}
function weekKey(ds){return fmtMD(getMonday(ds))}
function ppmColor(v,target){return v>target?'#c62828':v>target/2?'#e65100':'#2e7d32'}

/* ===== 데이터 ===== */
let models=[],customers=[],generalModels=[],inspLines=[],reportData=null;

async function loadMaster(){
  const [m,gm,cc,il]=await Promise.all([
    sbGet('defect_model',{},'id.asc',500),
    sbGet('general_model_tj',{},'id.asc',2000).catch(()=>[]),
    sbGet('common_code',{},'id.asc',500),
    sbGet('common_code',{code_group:'eq.d_inspect_line'},'id.asc',100).catch(()=>[])
  ]);
  models=m.map(r=>({name:r.model_name||'',customer:r.customer||'',cat1:r.category1||'',cat2:r.category2||''}));
  generalModels=(gm||[]).map(r=>({name:r.model_name||'',customer:r.customer||''}));
  customers=[...new Set([...models.map(x=>x.customer),...generalModels.map(x=>x.customer)].filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
  inspLines=il.map(r=>r.code_value||'').filter(Boolean);

  document.getElementById('rptCustomer').innerHTML='<option value="">전체 고객사</option>'+customers.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  document.getElementById('rptInspLine').innerHTML='<option value="">전체 검사라인</option>'+inspLines.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
}

function modelToCust(mn){
  const m=models.find(x=>x.name===mn);
  if(m)return m.customer||'미지정';
  const gm=generalModels.find(x=>x.name===mn);
  if(gm)return gm.customer||'미지정';
  return'미지정';
}

/* ===== 날짜 범위 단축 버튼 ===== */
function setRange(preset){
  const today=new Date();const fmt=d=>d.toISOString().split('T')[0];
  const to=document.getElementById('rptDateTo'),from=document.getElementById('rptDateFrom');
  to.value=fmt(today);
  if(preset==='4w'){const d=new Date(today);d.setDate(d.getDate()-28);from.value=fmt(d)}
  else if(preset==='12w'){const d=new Date(today);d.setDate(d.getDate()-84);from.value=fmt(d)}
  else if(preset==='6m'){const d=new Date(today);d.setMonth(d.getMonth()-6);from.value=fmt(d)}
  else if(preset==='1y'){const d=new Date(today);d.setFullYear(d.getFullYear()-1);from.value=fmt(d)}
}

/* ===== 주간보고서 로드 ===== */
async function loadReport(){
  const custF=document.getElementById('rptCustomer').value;
  const inspF=document.getElementById('rptInspLine').value;
  const target=parseInt(document.getElementById('rptTargetPpm').value)||2000;

  const fromS=document.getElementById('rptDateFrom').value;
  const toS=document.getElementById('rptDateTo').value;
  if(!fromS||!toS){showToast('날짜 범위를 선택하세요');return}

  showLoading('주간보고서 조회 중...');
  try{
    let rows=await sbGet('defect_history',{defect_date:'gte.'+fromS},'defect_date.asc',10000);
    rows=rows.filter(r=>r.defect_date<=toS);

    if(custF){const cm=new Set();models.filter(m=>m.customer===custF).forEach(m=>cm.add(m.name));generalModels.filter(m=>m.customer===custF).forEach(m=>cm.add(m.name));rows=rows.filter(r=>cm.has(r.model_name))}
    if(inspF)rows=rows.filter(r=>(r.inspect_line||'')===inspF);

    // 주차별 고객사별 집계
    const wMap={},custSet=new Set(),wKeys=[],wkSet=new Set();
    rows.forEach(r=>{
      const wk=weekKey(r.defect_date),c=modelToCust(r.model_name);
      if(!wkSet.has(wk)){wkSet.add(wk);wKeys.push({k:wk,d:r.defect_date})}
      custSet.add(c);
      if(!wMap[wk])wMap[wk]={};
      if(!wMap[wk][c])wMap[wk][c]={i:0,d:0};
      wMap[wk][c].i+=(r.inspect_qty||0);
      if(r.defect_type&&r.defect_type!=='양품')wMap[wk][c].d+=(r.qty||0);
    });
    wKeys.sort((a,b)=>a.d.localeCompare(b.d));
    let sortedW=wKeys.map(w=>w.k);
    const custs=[...custSet].sort((a,b)=>a.localeCompare(b,'ko'));

    // 향후 6개월(26주) 빈 열 추가 (화요일 회의 기준 → 월요일 주차키)
    const FUTURE_WEEKS=26;
    {
      const lastMon=sortedW.length?getMonday(wKeys[wKeys.length-1].d):getMonday(new Date().toISOString().split('T')[0]);
      const existing=new Set(sortedW);
      for(let w=1;w<=FUTURE_WEEKS;w++){
        const d=new Date(lastMon);d.setDate(d.getDate()+w*7);
        const k=fmtMD(d);
        if(!existing.has(k)){sortedW.push(k);existing.add(k)}
      }
    }

    // 이번주 = 데이터가 있는 마지막 주 (향후 빈 주차 제외)
    const dataWeeks=wKeys.map(w=>w.k); // 실제 데이터가 있는 주차만
    const thisWk=dataWeeks.length?dataWeeks[dataWeeks.length-1]:null;
    const lwRows=thisWk?rows.filter(r=>weekKey(r.defect_date)===thisWk):[];
    const mSum={};
    lwRows.forEach(r=>{
      const mn=r.model_name||'?';
      if(!mSum[mn])mSum[mn]={inner:{i:0,d:0},outer:{i:0,d:0},total:{i:0,d:0}};
      // Inner/Outer: 기종명에 "Outer" 포함 시 Outer, 아니면 Inner
      const isO=/outer/i.test(mn);
      const bk=isO?'outer':'inner';
      mSum[mn][bk].i+=(r.inspect_qty||0);
      mSum[mn].total.i+=(r.inspect_qty||0);
      if(r.defect_type&&r.defect_type!=='양품'){mSum[mn][bk].d+=(r.qty||0);mSum[mn].total.d+=(r.qty||0)}
    });

    // 불량유형 Top
    const tTop={};
    lwRows.forEach(r=>{if(r.defect_type&&r.defect_type!=='양품'&&(r.qty||0)>0)tTop[r.defect_type]=(tTop[r.defect_type]||0)+(r.qty||0)});

    // 일별 집계
    const daily={};
    rows.forEach(r=>{
      const dt=r.defect_date;if(!dt)return;
      if(!daily[dt])daily[dt]={i:0,d:0,types:{},custs:{}};
      const c=modelToCust(r.model_name);
      if(!daily[dt].custs[c])daily[dt].custs[c]={i:0,d:0,crack:0};
      daily[dt].custs[c].i+=(r.inspect_qty||0);
      daily[dt].i+=(r.inspect_qty||0);
      if(r.defect_type&&r.defect_type!=='양품'){
        daily[dt].d+=(r.qty||0);daily[dt].custs[c].d+=(r.qty||0);
        const t=r.defect_type;daily[dt].types[t]=(daily[dt].types[t]||0)+(r.qty||0);
        if(/크랙|crack/i.test(t))daily[dt].custs[c].crack+=(r.qty||0);
      }
    });

    reportData={wMap,sortedW,custs,mSum,tTop,rows,thisWk,fromS,toS,target,daily};

    // 이번주 요약
    let twI=0,twD=0;
    if(thisWk&&wMap[thisWk])Object.values(wMap[thisWk]).forEach(v=>{twI+=v.i;twD+=v.d});
    document.getElementById('smInspect').textContent=twI.toLocaleString();
    document.getElementById('smDefect').textContent=twD.toLocaleString();
    document.getElementById('smPpm').textContent=(twI>0?Math.round(twD/twI*1e6):0).toLocaleString();
    document.getElementById('smRate').textContent=(twI>0?(twD/twI*100).toFixed(2):0)+'%';
    document.getElementById('thisWeekLabel').textContent=thisWk?thisWk+'~':'';

    renderProcessSummary(mSum,thisWk,target,wMap,sortedW,custs);
    renderDefectTop(tTop);
    renderDailyTable(daily,target);

    ['summaryCard','processSummaryCard','defectTopCard','dailyCard','mesCard'].forEach(id=>document.getElementById(id).style.display='block');
    showToast('📊 조회 완료');
  }catch(e){showToast('오류: '+e.message)}
  hideLoading();
}

// 고객사별 목표PPM
const CUST_TARGET_PPM={
  '세동산업':300,'세풍':300,
  '일진글로벌':1000,'일진':1000,
  'SKF씰':600,'SKF':600,
  'SBC':2000,'태진레이스웨이':2000,'태진':2000,
  '진양오일씰':1000,'진양':1000
};
function getCustTarget(c){
  if(CUST_TARGET_PPM[c])return CUST_TARGET_PPM[c];
  for(const[k,v]of Object.entries(CUST_TARGET_PPM)){if(c.includes(k)||k.includes(c))return v}
  return null;
}

/* ===== 공정불량 요약 (카드식 통합) ===== */
function renderProcessSummary(mSum,thisWk,target,wMap,sortedW,custs){
  const el=document.getElementById('processSummaryWrap');
  document.getElementById('processRange').textContent=thisWk?thisWk+'~':'';

  const mdls=Object.keys(mSum).sort((a,b)=>a.localeCompare(b,'ko'));

  // 고객사별 그룹 (mSum 기반)
  const cg={};mdls.forEach(mn=>{const c=modelToCust(mn);if(!cg[c])cg[c]=[];cg[c].push(mn)});
  // wMap에만 있는 고객사도 추가 (이번주 데이터 없지만 다른 주에 있는 경우)
  if(custs)custs.forEach(c=>{if(!cg[c])cg[c]=[]});
  // 고객사 정렬: SBC → SKF씰 → 나머지 가나다순
  const CUST_ORDER=['SBC','SKF씰','SKF'];
  function custSortKey(c){
    for(let i=0;i<CUST_ORDER.length;i++){if(c===CUST_ORDER[i]||c.includes(CUST_ORDER[i]))return String(i).padStart(3,'0')}
    return '999'+c;
  }
  const cNames=Object.keys(cg).sort((a,b)=>custSortKey(a).localeCompare(custSortKey(b),'ko'));
  const isSBC=c=>/SBC/i.test(c);

  let html='';

  cNames.forEach(cust=>{
    const gm=cg[cust];
    const ct=getCustTarget(cust);
    const thr=ct||target;

    // 이번주 고객사 합계
    let ci=0,cd=0;
    gm.forEach(mn=>{ci+=mSum[mn].total.i;cd+=mSum[mn].total.d});
    const cp=ci>0?Math.round(cd/ci*1e6):0;
    const cr=ci>0?(cd/ci*100).toFixed(2):'0.00';

    // 고객사 헤더 + 목표 + 카드
    html+='<div style="margin-top:14px;border:1.5px solid #ddd;border-radius:12px;overflow:hidden">';
    // 헤더바
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f5f5f5;border-bottom:1.5px solid #ddd">';
    html+='<span style="font-size:13px;font-weight:800;color:var(--primary)">'+cust+'</span>';
    html+='<span style="font-size:11px;font-weight:700;color:var(--warn)">목표: '+(ct?ct.toLocaleString()+'PPM':'미설정')+'</span>';
    html+='</div>';

    // 요약 카드 5칸 (검사수, 불량수, PPM, 불량률, 목표대비)
    const overTarget=ct&&cp>ct;
    const ppmBg=overTarget?'var(--red-light)':'var(--ok-light)';
    const ppmTxt=overTarget?'var(--red)':'var(--ok)';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;padding:0">';
    html+='<div style="padding:12px 6px;text-align:center;border-right:1px solid #eee"><div style="font-size:18px;font-weight:800;color:var(--primary)">'+ci.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">검사수</div></div>';
    html+='<div style="padding:12px 6px;text-align:center;border-right:1px solid #eee"><div style="font-size:18px;font-weight:800;color:var(--red)">'+cd.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">불량수</div></div>';
    html+='<div style="padding:12px 6px;text-align:center;background:'+ppmBg+';border-right:1px solid #eee"><div style="font-size:18px;font-weight:800;color:'+ppmTxt+'">'+cp.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">PPM</div></div>';
    html+='<div style="padding:12px 6px;text-align:center"><div style="font-size:18px;font-weight:800;color:#7b1fa2">'+cr+'%</div><div style="font-size:9px;color:#888;margin-top:2px">불량률</div></div>';
    html+='</div>';

    // SBC만 Inner/Outer 상세 테이블
    if(isSBC(cust)&&gm.length){
      function getModelKey(mn){const m=mn.match(/\d{3,5}/);return m?m[0]:mn}
      const grpKeys=[...new Set(gm.map(mn=>getModelKey(mn)))].sort();
      const grpData={};
      grpKeys.forEach(k=>{grpData[k]={inner:{i:0,d:0},outer:{i:0,d:0},total:{i:0,d:0}}});
      gm.forEach(mn=>{
        const k=getModelKey(mn);
        const isO=/outer/i.test(mn);
        const bk=isO?'outer':'inner';
        grpData[k][bk].i+=mSum[mn][bk].i;grpData[k][bk].d+=mSum[mn][bk].d;
        const obk=isO?'inner':'outer';
        grpData[k][obk].i+=mSum[mn][obk].i;grpData[k][obk].d+=mSum[mn][obk].d;
        grpData[k].total.i+=mSum[mn].total.i;grpData[k].total.d+=mSum[mn].total.d;
      });

      html+='<div style="padding:8px;border-top:1.5px solid #ddd">';
      html+='<table class="stat-table" style="margin:0"><thead><tr><th style="text-align:left;min-width:80px">구분</th>';
      grpKeys.forEach(k=>{html+='<th style="min-width:55px">'+k+'</th>'});
      html+='<th style="min-width:55px;background:var(--primary-light)">합계</th></tr></thead><tbody>';

      ['inner','outer'].forEach(bk=>{
        const lb=bk==='inner'?'Inner':'Outer';
        const bgR=bk==='inner'?'#f8fbff':'#fff9f8';
        html+='<tr style="background:'+bgR+'"><td style="font-size:10px;font-weight:600;color:var(--primary);text-align:left">'+lb+' 검사수</td>';
        let si=0;grpKeys.forEach(k=>{const v=grpData[k][bk].i;si+=v;html+='<td>'+(v?v.toLocaleString():'-')+'</td>'});
        html+='<td style="font-weight:700">'+si.toLocaleString()+'</td></tr>';
        html+='<tr style="background:'+bgR+'"><td style="font-size:10px;font-weight:600;color:var(--red);text-align:left">'+lb+' 불량수</td>';
        let sd=0;grpKeys.forEach(k=>{const v=grpData[k][bk].d;sd+=v;html+='<td style="color:var(--red)">'+(v?v.toLocaleString():'-')+'</td>'});
        html+='<td style="font-weight:700;color:var(--red)">'+sd.toLocaleString()+'</td></tr>';
        html+='<tr style="background:#fff8f0"><td style="font-size:10px;font-weight:700;color:var(--warn);text-align:left">'+lb+' PPM</td>';
        let gi=0,gd=0;grpKeys.forEach(k=>{const s=grpData[k][bk],p=s.i>0?Math.round(s.d/s.i*1e6):0;gi+=s.i;gd+=s.d;html+='<td style="font-weight:800;color:'+ppmColor(p,thr)+'">'+(p?p.toLocaleString():'-')+'</td>'});
        const gp=gi>0?Math.round(gd/gi*1e6):0;
        html+='<td style="font-weight:800;color:'+ppmColor(gp,thr)+'">'+gp.toLocaleString()+'</td></tr>';
      });

      html+='<tr class="st-total"><td style="text-align:left">합계 검사수</td>';
      let ai2=0;grpKeys.forEach(k=>{const v=grpData[k].total.i;ai2+=v;html+='<td>'+(v?v.toLocaleString():'-')+'</td>'});
      html+='<td style="font-weight:800">'+ai2.toLocaleString()+'</td></tr>';
      html+='<tr class="st-total"><td style="text-align:left;color:var(--red)">합계 불량수</td>';
      let ad2=0;grpKeys.forEach(k=>{const v=grpData[k].total.d;ad2+=v;html+='<td style="color:var(--red)">'+(v?v.toLocaleString():'-')+'</td>'});
      html+='<td style="font-weight:800;color:var(--red)">'+ad2.toLocaleString()+'</td></tr>';
      html+='<tr class="st-total" style="background:var(--warn-light)"><td style="text-align:left;font-weight:800;color:var(--warn)">합계 PPM</td>';
      let ati2=0,atd2=0;grpKeys.forEach(k=>{const s=grpData[k].total,p=s.i>0?Math.round(s.d/s.i*1e6):0;ati2+=s.i;atd2+=s.d;html+='<td style="font-weight:800;color:'+ppmColor(p,thr)+'">'+(p?p.toLocaleString():'-')+'</td>'});
      const tp2=ati2>0?Math.round(atd2/ati2*1e6):0;
      html+='<td style="font-weight:900;font-size:13px;color:'+ppmColor(tp2,thr)+'">'+tp2.toLocaleString()+'</td></tr>';
      html+='</tbody></table></div>';
    }

    html+='</div>'; // 카드 닫기
  });

  el.innerHTML=html;
}

/* ===== 불량유형 Top ===== */
function renderDefectTop(tTop){
  const el=document.getElementById('defectTopWrap');
  const sorted=Object.entries(tTop).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!sorted.length){el.innerHTML='<div class="empty">이번 주 불량 없음</div>';return}
  const mx=sorted[0][1];
  el.innerHTML=sorted.map(([n,q],i)=>{
    const pct=(q/mx*100).toFixed(1);
    const bc=i===0?'#c62828':i<3?'#e65100':'#1565c0';
    return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
      '<span style="font-size:11px;font-weight:700;width:16px;text-align:right;color:#888">'+(i+1)+'</span>'+
      '<span style="font-size:12px;font-weight:600;width:80px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+n+'</span>'+
      '<div style="flex:1;background:#f5f5f5;border-radius:4px;height:20px;overflow:hidden"><div style="width:'+pct+'%;background:'+bc+';height:100%;border-radius:4px"></div></div>'+
      '<span style="font-size:13px;font-weight:800;color:'+bc+';width:40px;text-align:right">'+q+'</span></div>'
  }).join('');
}

/* ===== 일별 추이 = 주차별 고객사 PPM 차트 + 데이터 테이블 ===== */
function renderDailyTable(daily,target){
  if(!reportData)return;
  const{wMap,sortedW,custs}=reportData;
  const el=document.getElementById('dailyTableWrap');
  const rangeEl=document.getElementById('dailyChartRange');
  if(sortedW.length)rangeEl.textContent=sortedW[0]+' ~ '+sortedW[sortedW.length-1];

  // --- 주차별 크랙 수량 집계 ---
  const crackByWeek={};
  Object.entries(daily).forEach(([dt,d])=>{
    const wk=weekKey(dt);
    if(!crackByWeek[wk])crackByWeek[wk]=0;
    Object.values(d.custs||{}).forEach(cv=>{crackByWeek[wk]+=cv.crack||0});
  });

  // --- 차트 (좌: PPM 라인, 우: 크랙 막대) ---
  // 테이블과 동일한 폭: 구분열(80px) + 주차수 × 열폭(50px) + 여유
  const colW=50,headW=80,extraW=20;
  const tableW=headW+sortedW.length*colW+extraW;
  const canvas=document.getElementById('dailyChart'),ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=Math.max(700,tableW),H=320;
  canvas.style.minWidth=W+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(dpr,dpr);

  const colors=['#1565c0','#c62828','#2e7d32','#7b1fa2','#e65100','#00838f','#4e342e','#283593','#ad1457','#558b2f'];
  const cCol={};custs.forEach((c,i)=>{cCol[c]=colors[i%colors.length]});

  // PPM 데이터
  const pD={};custs.forEach(c=>{pD[c]=[]});
  let mxP=0;
  sortedW.forEach(wk=>{custs.forEach(c=>{const v=(wMap[wk]&&wMap[wk][c])?wMap[wk][c]:{i:0,d:0};const p=v.i>0?Math.round(v.d/v.i*1e6):0;pD[c].push(p);if(p>mxP)mxP=p})});
  mxP=Math.max(mxP,2000);const yML=Math.ceil(mxP/1000)*1000;

  // 크랙 데이터
  const crackData=sortedW.map(wk=>crackByWeek[wk]||0);
  let mxC=Math.max(...crackData,1);const yMR=Math.ceil(mxC/1)*1+1;

  // 레이아웃
  const pad={t:35,r:50,b:55,l:55},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // 목표선 (최대 목표)
  const maxTarget=Math.max(...custs.map(c=>getCustTarget(c)||target));
  const tgtY=pad.t+ph-(maxTarget/yML)*ph;
  ctx.strokeStyle='#ef5350';ctx.lineWidth=1;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(pad.l,tgtY);ctx.lineTo(pad.l+pw,tgtY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ef5350';ctx.font='9px "Noto Sans KR"';ctx.textAlign='left';ctx.fillText('목표 '+maxTarget.toLocaleString(),pad.l+2,tgtY-4);

  // Y좌축 그리드 (PPM)
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=.5;ctx.font='10px "Noto Sans KR"';ctx.fillStyle='#888';ctx.textAlign='right';
  for(let i=0;i<=5;i++){const y=pad.t+ph-(i/5)*ph,v=Math.round(i/5*yML);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+pw,y);ctx.stroke();ctx.fillText(v.toLocaleString(),pad.l-6,y+3)}
  ctx.save();ctx.translate(12,pad.t+ph/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#1565c0';ctx.font='bold 11px "Noto Sans KR"';ctx.textAlign='center';ctx.fillText('공정불량률(PPM)',0,0);ctx.restore();

  // Y우축 (크랙)
  ctx.textAlign='left';ctx.fillStyle='#666';ctx.font='10px "Noto Sans KR"';
  for(let i=0;i<=yMR;i++){const y=pad.t+ph-(i/yMR)*ph;ctx.fillText(i,pad.l+pw+6,y+3)}
  ctx.save();ctx.translate(W-8,pad.t+ph/2);ctx.rotate(Math.PI/2);ctx.fillStyle='#666';ctx.font='bold 11px "Noto Sans KR"';ctx.textAlign='center';ctx.fillText('크랙불량수(ea)',0,0);ctx.restore();

  // X축
  ctx.textAlign='center';ctx.fillStyle='#555';ctx.font='10px "Noto Sans KR"';
  const xS=sortedW.length>1?pw/(sortedW.length-1):pw;
  const barW=Math.min(xS*0.3,20);
  sortedW.forEach((wk,i)=>{const x=pad.l+(sortedW.length>1?i*xS:pw/2);ctx.save();ctx.translate(x,pad.t+ph+14);ctx.rotate(-Math.PI/6);ctx.fillText(wk,0,0);ctx.restore()});

  // 크랙 막대 (먼저 그려서 라인 뒤에 깔림)
  ctx.globalAlpha=0.6;
  sortedW.forEach((wk,i)=>{
    const x=pad.l+(sortedW.length>1?i*xS:pw/2);
    const v=crackData[i];
    const bh=(v/yMR)*ph;
    ctx.fillStyle='#8bc34a';
    ctx.fillRect(x-barW/2,pad.t+ph-bh,barW,bh);
    // 막대 위 숫자
    if(v>0){ctx.fillStyle='#555';ctx.font='bold 10px "Noto Sans KR"';ctx.textAlign='center';ctx.fillText(v,x,pad.t+ph-bh-4)}
  });
  ctx.globalAlpha=1;

  // PPM 라인
  custs.forEach(c=>{
    ctx.strokeStyle=cCol[c];ctx.lineWidth=2;ctx.beginPath();
    pD[c].forEach((p,i)=>{const x=pad.l+(sortedW.length>1?i*xS:pw/2),y=pad.t+ph-(p/yML)*ph;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.stroke();
    pD[c].forEach((p,i)=>{if(p>0){const x=pad.l+(sortedW.length>1?i*xS:pw/2),y=pad.t+ph-(p/yML)*ph;ctx.fillStyle=cCol[c];ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill()}});
  });

  // 범례
  let lx=pad.l;ctx.font='10px "Noto Sans KR"';
  custs.forEach(c=>{ctx.fillStyle=cCol[c];ctx.fillRect(lx,6,10,10);ctx.fillStyle='#333';ctx.textAlign='left';ctx.fillText(c,lx+13,15);lx+=ctx.measureText(c).width+24});
  // 크랙 범례
  ctx.fillStyle='#8bc34a';ctx.fillRect(lx,6,10,10);ctx.fillStyle='#333';ctx.fillText('크랙(우축)',lx+13,15);

  // --- 하단 테이블: 주차별 고객사 PPM + 크랙 ---
  if(!sortedW.length){el.innerHTML='<div class="empty">없음</div>';return}
  let h='<table class="stat-table"><thead><tr><th style="text-align:left;min-width:80px">구분</th>';
  sortedW.forEach(wk=>{h+='<th style="min-width:50px">'+wk+'</th>'});
  h+='</tr></thead><tbody>';

  // 셀 표시: 검사수 있으면 PPM 표시(0 포함), 검사수 없으면 빈칸
  function ppmCell(v,thr){
    if(!v||v.i===0)return'<td></td>';
    const p=Math.round(v.d/v.i*1e6);
    return'<td style="font-weight:600;color:'+ppmColor(p,thr)+'">'+p.toLocaleString()+'</td>';
  }

  custs.forEach(c=>{
    h+='<tr><td style="text-align:left;font-weight:700">'+c+'</td>';
    const ct=getCustTarget(c)||target;
    sortedW.forEach(wk=>{
      const v=(wMap[wk]&&wMap[wk][c])?wMap[wk][c]:null;
      h+=ppmCell(v,ct);
    });h+='</tr>';
  });

  // 크랙 행
  h+='<tr style="background:#f1f8e9"><td style="text-align:left;font-weight:700;color:#558b2f">크랙(ea)</td>';
  sortedW.forEach(wk=>{
    const v=crackByWeek[wk];
    if(v===undefined||v===null){h+='<td></td>'}
    else{h+='<td style="font-weight:700;color:'+(v>0?'#c62828':'#2e7d32')+'">'+v+'</td>'}
  });
  h+='</tr>';

  // 합계 행
  h+='<tr class="st-total"><td style="text-align:left">합계</td>';
  sortedW.forEach(wk=>{
    let ti=0,td=0,hasData=false;
    custs.forEach(c=>{const v=(wMap[wk]&&wMap[wk][c]);if(v){ti+=v.i;td+=v.d;hasData=true}});
    if(!hasData){h+='<td></td>'}
    else{const p=ti>0?Math.round(td/ti*1e6):0;h+='<td style="font-weight:800;color:'+ppmColor(p,target)+'">'+p.toLocaleString()+'</td>'}
  });
  h+='</tr></tbody></table>';
  el.innerHTML=h;
}

/* ===== 엑셀 ===== */
function exportReport(){
  if(!reportData){showToast('먼저 조회하세요');return}
  const{wMap,sortedW,custs,mSum,rows,target}=reportData;
  const wb=XLSX.utils.book_new();

  // S1: 주간PPM
  const h1=['구분',...sortedW];
  const r1=custs.map(c=>{const row=[c];sortedW.forEach(wk=>{const v=(wMap[wk]&&wMap[wk][c])?wMap[wk][c]:{i:0,d:0};row.push(v.i>0?Math.round(v.d/v.i*1e6):0)});return row});
  const tot1=['합계'];sortedW.forEach(wk=>{let ti=0,td=0;custs.forEach(c=>{const v=(wMap[wk]&&wMap[wk][c])?wMap[wk][c]:{i:0,d:0};ti+=v.i;td+=v.d});tot1.push(ti>0?Math.round(td/ti*1e6):0)});
  r1.push(tot1);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h1,...r1]),'주간PPM추이');

  // S2: 공정불량
  const mdls=Object.keys(mSum).sort();
  if(mdls.length){
    const h2=['구분',...mdls,'합계'];const r2=[];
    ['inner','outer'].forEach(bk=>{
      const lb=bk==='inner'?'Inner':'Outer';
      const ir=[lb+' 검사수'],dr=[lb+' 불량수'],pr=[lb+' PPM'];
      let si=0,sd=0;
      mdls.forEach(mn=>{const s=mSum[mn][bk];ir.push(s.i);dr.push(s.d);pr.push(s.i>0?Math.round(s.d/s.i*1e6):0);si+=s.i;sd+=s.d});
      ir.push(si);dr.push(sd);pr.push(si>0?Math.round(sd/si*1e6):0);
      r2.push(ir,dr,pr);
    });
    const ti2=['합계 검사수'],td2=['합계 불량수'],tp2=['합계 PPM'];
    let ati=0,atd=0;
    mdls.forEach(mn=>{const s=mSum[mn].total;ti2.push(s.i);td2.push(s.d);tp2.push(s.i>0?Math.round(s.d/s.i*1e6):0);ati+=s.i;atd+=s.d});
    ti2.push(ati);td2.push(atd);tp2.push(ati>0?Math.round(atd/ati*1e6):0);
    r2.push(ti2,td2,tp2);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h2,...r2]),'주간공정불량');
  }

  // S3: 원본
  if(rows.length){
    const h3=['일자','시간','기종','면','영역','불량유형','검사수','수량','작업자','검사라인','생산라인','비고'];
    const r3=rows.map(r=>[r.defect_date,r.defect_time,r.model_name,r.side,r.zone_name,r.defect_type,r.inspect_qty||0,r.qty||0,r.worker,r.inspect_line,r.prod_line,r.note]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h3,...r3]),'원본데이터');
  }

  XLSX.writeFile(wb,'주간보고서_'+new Date().toISOString().split('T')[0].replace(/-/g,'')+'.xlsx');
  showToast('📥 엑셀 다운로드');
}

/* ===== MES 불량 조회 ===== */
async function loadMesData(){
  const fromS=document.getElementById('rptDateFrom').value;
  const toS=document.getElementById('rptDateTo').value;
  const apiBase=document.getElementById('mesApiUrl').value.replace(/\/$/,'');
  if(!fromS||!toS){showToast('날짜 범위를 선택하세요');return}
  if(!apiBase){showToast('MES API URL을 입력하세요');return}

  showLoading('MES 불량 조회 중...');
  document.getElementById('mesCard').style.display='block';
  document.getElementById('mesRange').textContent=fromS+' ~ '+toS;

  try{
    const url=apiBase+'/api/mes_defect?start='+fromS+'&end='+toS;
    const res=await fetch(url);
    if(!res.ok)throw new Error('MES API 오류: '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);

    const rows=data.data||[];
    const ngCodes=data.ng_codes||[];
    const codeNames=data.code_names||{};
    const totalShot=data.total_shot||0;
    const totalNg=data.total_ng||0;
    const ngTotals=data.ng_totals||{};
    const mesPpm=totalShot>0?Math.round(totalNg/totalShot*1e6):0;

    // 요약 카드
    const sw=document.getElementById('mesSummaryWrap');
    sw.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border:1.5px solid #ddd;border-radius:10px;overflow:hidden">'+
      '<div style="padding:12px 6px;text-align:center;border-right:1px solid #eee"><div style="font-size:18px;font-weight:800;color:var(--primary)">'+totalShot.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">생산수</div></div>'+
      '<div style="padding:12px 6px;text-align:center;border-right:1px solid #eee"><div style="font-size:18px;font-weight:800;color:var(--red)">'+totalNg.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">불량수</div></div>'+
      '<div style="padding:12px 6px;text-align:center;border-right:1px solid #eee;background:'+(mesPpm>600?'var(--red-light)':'var(--ok-light)')+'"><div style="font-size:18px;font-weight:800;color:'+(mesPpm>600?'var(--red)':'var(--ok)')+'">'+mesPpm.toLocaleString()+'</div><div style="font-size:9px;color:#888;margin-top:2px">PPM</div></div>'+
      '<div style="padding:12px 6px;text-align:center"><div style="font-size:18px;font-weight:800;color:var(--warn)">목표 600</div><div style="font-size:9px;color:#888;margin-top:2px">PPM</div></div>'+
      '</div>';

    // MES 형태 테이블: 품목코드 | 실적수량 | 불량유형1 | 불량유형2 | ... | 총계
    const tw=document.getElementById('mesTableWrap');
    if(!rows.length){tw.innerHTML='<div class="empty">MES 불량 데이터 없음</div>';hideLoading();return}

    // 데이터가 있는 NG코드만 필터
    const activeNg=ngCodes.filter(c=>ngTotals[c]>0);

    let h='<table class="stat-table"><thead><tr>';
    h+='<th style="text-align:left;min-width:70px;background:#ffffcc">품목코드</th>';
    h+='<th style="min-width:60px;background:#ffffcc">실적수량</th>';
    activeNg.forEach(c=>{h+='<th style="min-width:50px;background:#ffffcc">'+(codeNames[c]||c)+'</th>'});
    h+='<th style="min-width:50px;background:#ffffcc;font-weight:800">총계</th>';
    h+='</tr></thead><tbody>';

    // 불량 총계 기준 내림차순
    const sorted=rows.filter(r=>r.ng_total>0).sort((a,b)=>b.ng_total-a.ng_total);

    sorted.forEach(r=>{
      const ppm=r.shot>0?Math.round(r.ng_total/r.shot*1e6):0;
      h+='<tr>';
      h+='<td style="text-align:left;font-size:10px;font-weight:600">'+r.item_code+'</td>';
      h+='<td>'+r.shot.toLocaleString()+'</td>';
      activeNg.forEach(c=>{
        const v=r.ng_types[c]||0;
        h+='<td style="'+(v>0?'color:var(--red);font-weight:700':'')+'">'+(v||'')+'</td>';
      });
      h+='<td style="font-weight:800;color:var(--red)">'+r.ng_total.toLocaleString()+'</td>';
      h+='</tr>';
    });

    // 합계 행
    h+='<tr class="st-total"><td style="text-align:left;font-weight:800">Grand Total</td>';
    h+='<td style="font-weight:800">'+totalShot.toLocaleString()+'</td>';
    activeNg.forEach(c=>{h+='<td style="font-weight:800;color:var(--red)">'+(ngTotals[c]||0).toLocaleString()+'</td>'});
    h+='<td style="font-weight:900;color:var(--red);font-size:13px">'+totalNg.toLocaleString()+'</td>';
    h+='</tr></tbody></table>';

    tw.innerHTML=h;
    showToast('🏭 MES '+sorted.length+'품목 조회');
  }catch(e){
    document.getElementById('mesSummaryWrap').innerHTML='<div class="empty" style="color:var(--red)">❌ '+e.message+'<br><span style="font-size:10px;color:#888">qc_monitor.exe 실행 중인지 확인하세요</span></div>';
    document.getElementById('mesTableWrap').innerHTML='';
  }
  hideLoading();
}

/* ===== 초기화 ===== */
async function init(){
  // 날짜 기본값: 지난주 일요일 ~ 토요일
  const today=new Date();const fmt=d=>d.toISOString().split('T')[0];
  const dow=today.getDay(); // 0=일,1=월,...6=토
  const lastSat=new Date(today);lastSat.setDate(today.getDate()-dow-1); // 지난 토요일
  const lastSun=new Date(lastSat);lastSun.setDate(lastSat.getDate()-6); // 지난 일요일
  document.getElementById('rptDateFrom').value=fmt(lastSun);
  document.getElementById('rptDateTo').value=fmt(lastSat);

  showLoading('마스터 로딩...');
  try{await loadMaster()}catch(e){console.log('마스터 로드 실패:',e)}
  hideLoading();
}
init();
</script>
