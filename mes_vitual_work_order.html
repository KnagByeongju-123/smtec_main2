<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가상설비 작업지시</title>
<meta name="theme-color" content="#0f172a">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#0f172a;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:80px}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#334155;--border:#334155;
  --primary:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;
  --orange:#f97316;--purple:#a78bfa;--sub:#94a3b8;--gray:#64748b
}

/* 헤더 */
.hdr{padding:16px;background:linear-gradient(180deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-title{font-size:18px;font-weight:800;color:#fff}
.hdr-title .ico{color:var(--orange)}
.user-badge{background:rgba(74,222,128,.15);color:var(--green);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700}
.hdr-back{background:rgba(100,116,139,.2);color:#cbd5e1;border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none}

/* 탭 */
.tabs{display:flex;gap:4px;margin-top:12px;background:#0f172a;padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;background:transparent;color:var(--sub);border:none;font-size:13px;font-weight:700;cursor:pointer;border-radius:7px;font-family:inherit;transition:all .15s}
.tab.active{background:var(--primary);color:#fff}
.tab .cnt{background:rgba(255,255,255,.2);padding:1px 7px;border-radius:8px;font-size:10px;margin-left:4px}

.wrap{padding:12px;max-width:800px;margin:0 auto}

/* 카드 */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.sect-hdr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--purple);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.auto-badge{margin-left:auto;font-size:10px;color:var(--green);background:rgba(34,197,94,.12);padding:2px 8px;border-radius:10px;font-weight:700}

/* 입력 필드 */
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cell{display:flex;flex-direction:column;gap:4px}
.cell.full{grid-column:1 / -1}
label{font-size:11px;color:var(--sub);font-weight:700}
label .req{color:var(--red)}
label .auto{color:var(--green);font-size:10px;margin-left:4px}
.inp, .btn-inp{width:100%;padding:12px;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;outline:none;text-align:left}
.inp[readonly]{cursor:pointer;background:#1a2434}
.btn-inp{cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.btn-inp .arr{color:var(--sub);font-size:10px}
.btn-inp.sel-on{border-color:var(--green);background:rgba(34,197,94,.05)}
.btn-inp.readonly-auto{background:#1a2434;color:#c4b5fd;border-color:rgba(167,139,250,.3);cursor:not-allowed}
textarea.inp{min-height:70px;resize:vertical;font-size:13px;cursor:text;background:#0f172a}

/* 우선순위 칩 */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{flex:1;padding:10px;border:1.5px solid var(--border);background:#0f172a;color:var(--sub);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.chip.on{border-width:2px}
.chip.on[data-p="URGENT"]{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red)}
.chip.on[data-p="HIGH"]{border-color:var(--orange);background:rgba(249,115,22,.15);color:var(--orange)}
.chip.on[data-p="NORMAL"]{border-color:var(--primary);background:rgba(59,130,246,.15);color:var(--primary)}
.chip.on[data-p="LOW"]{border-color:var(--gray);background:rgba(100,116,139,.15);color:var(--sub)}

/* 제출 버튼 고정 */
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:12px;background:rgba(15,23,42,.95);border-top:1px solid var(--border);backdrop-filter:blur(10px);z-index:50}
.submit-bar .inner{max-width:800px;margin:0 auto;display:flex;gap:8px}
.sb-btn{flex:1;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.sb-btn.primary{background:var(--primary);color:#fff}
.sb-btn.ghost{background:var(--card2);color:#fff;flex:0 0 100px}

/* 목록 */
.wo-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--gray)}
.wo-item[data-st="WAITING"]{border-left-color:var(--gray)}
.wo-item[data-st="IN_PROGRESS"]{border-left-color:var(--primary)}
.wo-item[data-st="COMPLETED"]{border-left-color:var(--green);opacity:.7}
.wo-item[data-st="CANCELED"]{border-left-color:var(--red);opacity:.5}
.wo-item[data-p="URGENT"]{border-left-color:var(--red);border-left-width:5px}
.wo-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
.wo-no{font-size:11px;color:var(--sub);font-weight:600}
.wo-main{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px}
.wo-sub{font-size:12px;color:var(--sub)}
.wo-badges{display:flex;gap:4px;flex-shrink:0}
.badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-p-URGENT{background:var(--red);color:#fff}
.b-p-HIGH{background:var(--orange);color:#fff}
.b-p-NORMAL{background:var(--primary);color:#fff}
.b-p-LOW{background:var(--gray);color:#fff}
.b-s-WAITING{background:rgba(100,116,139,.2);color:var(--sub);border:1px solid var(--gray)}
.b-s-IN_PROGRESS{background:rgba(59,130,246,.2);color:var(--primary);border:1px solid var(--primary)}
.b-s-COMPLETED{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green)}
.b-s-CANCELED{background:rgba(239,68,68,.2);color:var(--red);border:1px solid var(--red)}
.wo-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.wo-meta-item{font-size:11px}
.wo-meta-lbl{color:var(--sub);font-weight:600;display:block;margin-bottom:1px}
.wo-meta-val{color:#fff;font-weight:700}
.wo-actions{display:flex;gap:6px;margin-top:10px}
.wo-btn{flex:1;padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.wo-btn.start{background:var(--primary);color:#fff}
.wo-btn.done{background:var(--green);color:#fff}
.wo-btn.edit{background:var(--card2);color:#fff}
.wo-btn.cancel{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.4)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9500;display:none;align-items:center;justify-content:center;padding:12px}
.modal-bg.show{display:flex}
.modal-box{background:#0f172a;border:2px solid var(--purple);border-radius:16px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1e293b;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:800;color:var(--purple)}
.modal-x{background:rgba(239,68,68,.15);color:var(--red);border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.modal-srch{padding:10px 14px;border-bottom:1px solid var(--panel2);background:#0a0f1f;display:flex;gap:6px;align-items:center}
.modal-srch-val{flex:1;padding:12px;border-radius:8px;border:2px solid var(--accent,#60a5fa);background:#0f172a;color:var(--accent,#60a5fa);font-size:16px;font-family:inherit;text-align:right;font-weight:800;cursor:pointer}
.modal-srch-clr{padding:10px 14px;border-radius:8px;border:none;background:rgba(239,68,68,.15);color:var(--red);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.modal-body{flex:1;overflow-y:auto;padding:8px}
.pick-item{padding:10px 12px;background:#1e293b;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:4px}
.pick-item:active{background:var(--card2)}
.pick-item.on{border-color:var(--green);background:rgba(34,197,94,.1)}
.pick-main{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.pick-sub{font-size:11px;color:var(--sub)}
.pick-badge{display:inline-block;background:rgba(167,139,250,.15);color:#c4b5fd;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:4px}

/* 토스트 */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}

.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
.empty .ico{font-size:40px;margin-bottom:10px}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-chip{padding:7px 14px;background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

.loading{text-align:center;padding:20px;color:var(--sub);font-size:12px}

/* 숫자패드 (공통) */
.numpad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:11000;display:none;align-items:center;justify-content:center;padding:20px}
.numpad-overlay.show{display:flex}
.numpad-box{background:#0f172a;border:2px solid var(--purple);border-radius:16px;width:100%;max-width:400px;padding:16px}
.numpad-hdr{text-align:center;margin-bottom:12px}
.numpad-label{font-size:13px;color:#c4b5fd;font-weight:700;margin-bottom:6px}
.numpad-display{background:#0a0f1f;border:2px solid var(--primary);border-radius:10px;padding:18px;font-size:30px;font-weight:900;color:#fff;text-align:right;min-height:64px;letter-spacing:1px}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.npd-key{padding:22px 0;background:#1a1f2e;border:1px solid #2a2e3d;color:#fff;font-size:26px;font-weight:700;border-radius:10px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .1s}
.npd-key:active{background:var(--primary);color:#000;transform:scale(.94)}
.npd-key.fn{background:#1a1f2e;color:#94a3b8;font-size:22px}
.npd-key.clear{background:#1a1f2e;color:var(--red);font-size:18px;font-weight:800}
.numpad-foot{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.numpad-cancel{padding:14px;background:#475569;color:#cbd5e1;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.numpad-ok{padding:14px;background:var(--green);color:#000;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <a href="mes_work.html" class="hdr-back">‹ 돌아가기</a>
    <div class="hdr-title"><span class="ico">📋</span> 가상설비 작업지시</div>
    <div class="user-badge" id="userBadge">👤 -</div>
  </div>
  <div id="machineHdrInfo" style="padding:6px 14px;background:rgba(96,165,250,.1);border-bottom:1px solid var(--border);font-size:12px;color:#60a5fa;display:flex;align-items:center;gap:8px">
    <span>🖊️</span>
    <span id="machineTxt" style="font-weight:700">설비 정보 없음</span>
    <button id="machineBtn" onclick="openMachinePicker()" style="margin-left:auto;padding:4px 10px;background:var(--card2);color:#fff;border:none;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit">변경</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('create')" data-tab="create">✏️ 작성</button>
    <button class="tab" onclick="switchTab('list')" data-tab="list">📋 목록 <span class="cnt" id="cntAll">0</span></button>
    <button class="tab" onclick="switchTab('settings')" data-tab="settings">⚙️ 설정</button>
  </div>
</div>

<!-- ============ 작성 탭 ============ -->
<div class="wrap" id="panelCreate">

  <!-- 기종명 선택 -->
  <div class="card">
    <div class="sect-hdr">📦 기종명 <span class="auto-badge">선택 시 금형·품명·소재 자동</span></div>
    <div class="row">
      <div class="cell full">
        <label>기종명 (품번) <span class="req">*</span></label>
        <button class="btn-inp" id="itemBtn" onclick="openItemPicker()">
          <span id="itemTxt">기종명을 선택하세요</span>
          <span class="arr">▼</span>
        </button>
      </div>
      <div class="cell full" id="itemInfoRow" style="display:none">
        <div style="padding:10px 12px;background:#0f172a;border-radius:8px;font-size:12px;line-height:1.7">
          <div>품명 <span id="itemInfoName" style="color:#fff;margin-left:8px">-</span></div>
          <div>규격 <span id="itemInfoSpec" style="color:var(--sub);margin-left:8px">-</span></div>
          <div>기종 <span id="itemInfoModel" style="color:var(--sub);margin-left:8px">-</span></div>
          <div>금형 <span id="itemInfoMold" style="color:#fbbf24;margin-left:8px">-</span></div>
          <div>소재 <span id="itemInfoRaw" style="color:var(--accent);margin-left:8px">-</span></div>
        </div>
      </div>
      <!-- 내부 hidden (기존 참조 유지) -->
      <input type="hidden" id="modelCode">
      <input type="hidden" id="itemName">
      <input type="hidden" id="itemSpec">
      <input type="hidden" id="rawName">
      <button id="moldBtn" style="display:none" onclick="openMoldPicker()"><span id="moldTxt">-</span></button>
      <button id="rawBtn" style="display:none" onclick="openRawPicker()"><span id="rawTxt">-</span></button>
      <span id="rawAutoBadge" style="display:none"></span>
    </div>
  </div>

  <!-- 작업지시번호 (자동) -->
  <div class="card">
    <div class="sect-hdr">🔖 작업지시번호 <span class="auto-badge">자동 생성</span></div>
    <div class="row">
      <div class="cell full">
        <label>W/O 번호 <span style="font-size:10px;color:var(--sub)">(수정 불가)</span></label>
        <div class="btn-inp" id="woNoBox" style="cursor:default">
          <span id="woNoTxt" style="color:var(--sub)">기종명 선택 시 자동 생성</span>
          <span class="arr" style="color:var(--yellow)">🔖</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 계획수량 -->
  <div class="card">
    <div class="sect-hdr">📊 계획수량</div>
    <div class="row">
      <div class="cell full">
        <label>계획수량 <span class="req">*</span></label>
        <button class="btn-inp" id="plan_qtyBtn" onclick="openVirtNumpad('plan_qty','계획수량',false)">
          <span id="plan_qtyTxt">0</span>
          <span class="arr">🔢</span>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ============ 목록 탭 ============ -->
<div class="wrap" id="panelList" style="display:none">
  <div class="filter-row">
    <button class="filter-chip on" onclick="setFilter('ALL')" data-f="ALL">전체</button>
    <button class="filter-chip" onclick="setFilter('3')" data-f="3">⏳ 대기</button>
    <button class="filter-chip" onclick="setFilter('1')" data-f="1">🔄 진행</button>
    <button class="filter-chip" onclick="setFilter('4')" data-f="4">✅ 완료</button>
    <button class="filter-chip" onclick="setFilter('C')" data-f="C">❌ 취소</button>
    <button class="filter-chip" onclick="setFilter('INACTIVE')" data-f="INACTIVE">🗄 비활성</button>
  </div>
  <div id="listBox">
    <div class="loading">로딩중...</div>
  </div>
</div>


<!-- ============ 설정 탭 ============ -->
<div class="wrap" id="panelSettings" style="display:none">

  <div class="card">
    <div class="sect-hdr">📦 금형·기종 마스터 관리 <span id="mmCount" class="auto-badge">0건</span></div>
    <div style="font-size:11px;color:var(--sub);background:rgba(59,130,246,.08);padding:10px;border-radius:8px;margin-bottom:12px;line-height:1.5">
      💡 금형코드를 등록하면 작업지시 작성 시 금형 선택만으로 기종/품번/소재가 자동 입력됩니다.
    </div>

    <!-- 템플릿 다운로드/업로드 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <button class="sb-btn ghost" style="flex:none;width:100%;padding:12px;font-size:13px" onclick="downloadMoldTemplate()">📥 템플릿 다운로드</button>
      <button class="sb-btn primary" style="flex:none;width:100%;padding:12px;font-size:13px;background:#22c55e;color:#000" onclick="document.getElementById('moldUploadFile').click()">📤 엑셀 업로드</button>
      <input type="file" id="moldUploadFile" accept=".xlsx,.xls" style="display:none" onchange="onMoldUpload(event)">
      <button class="sb-btn ghost" style="flex:none;width:100%;padding:12px;font-size:13px" onclick="exportMoldList()">📊 현재 목록 엑셀</button>
      <button class="sb-btn primary" style="flex:none;width:100%;padding:12px;font-size:13px" onclick="openMoldEditor()">➕ 직접 등록</button>
    </div>

    <!-- 검색 -->
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <div class="modal-srch-val" id="mmSearchDisplay" onclick="openMmSearchNumpad()" style="flex:1;padding:10px;font-size:15px">0</div>
      <button class="modal-srch-clr" onclick="clearMmSearch()">CLR</button>
    </div>

    <!-- 목록 -->
    <div id="mmList"></div>
  </div>

</div>

<!-- 금형 마스터 편집 모달 -->
<div class="modal-bg" id="moldEditorModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="moldEditorTitle">➕ 금형·기종 등록</div>
      <button class="modal-x" onclick="closeModal('moldEditorModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="row">
        <div class="cell full">
          <label>금형코드 <span class="req">*</span></label>
          <input type="text" class="inp" id="mmMoldCode" placeholder="예: M-0123" style="cursor:text;background:#0f172a" autocomplete="off">
        </div>
        <div class="cell full">
          <label>품번 <span class="req">*</span></label>
          <input type="text" class="inp" id="mmItemCode" placeholder="예: IW/OW-BDA-1106-1" style="cursor:text;background:#0f172a" autocomplete="off">
        </div>
        <div class="cell full">
          <label>품명</label>
          <input type="text" class="inp" id="mmItemName" placeholder="품명" style="cursor:text;background:#0f172a" autocomplete="off">
        </div>
        <div class="cell">
          <label>규격</label>
          <input type="text" class="inp" id="mmItemSpec" placeholder="예: SGCC 0.8*150" style="cursor:text;background:#0f172a" autocomplete="off">
        </div>
        <div class="cell">
          <label>기종(모델)</label>
          <input type="text" class="inp" id="mmModelCode" placeholder="모델" style="cursor:text;background:#0f172a" autocomplete="off">
        </div>
        <div class="cell full">
          <label>소재코드</label>

var numpadState={value:'',label:'',allowDecimal:false,onConfirm:null,maxLen:10};

function openVirtNumpad(field,label,allowDecimal){
  numpadState.value=String(state.form[field]||'');
  if(numpadState.value==='0')numpadState.value='';
  numpadState.label=label;
  numpadState.allowDecimal=!!allowDecimal;
  numpadState.maxLen=10;
  numpadState.onConfirm=function(val){
    state.form[field]=val;
    var txt=document.getElementById(field+'Txt');
    if(!txt)return;
    if(val===''||val==null){
      txt.textContent=field==='spm'?'선택':'0';
      txt.style.color='var(--sub)';
    }else{
      // SPM은 소수 그대로, 수량은 천단위
      if(allowDecimal||isNaN(+val)){
        txt.textContent=val;
      }else{
        txt.textContent=(+val).toLocaleString();
      }
      txt.style.color='#fff';
    }
  };
  _openNumpad();
}

function openSearchNumpad(type){
  // 모달 검색용 - 숫자로만 검색
  numpadState.value=state.modalSearch[type]||'';
  numpadState.label=type==='mold'?'금형 검색':type==='item'?'품번 검색':'소재 검색';
  numpadState.allowDecimal=false;
  numpadState.maxLen=20;
  state._searchTargetModal=type;
  numpadState.onConfirm=function(val){
    state.modalSearch[type]=val;
    document.getElementById(type+'SearchDisplay').textContent=val||'0';
    if(type==='mold')renderMoldList();
    else if(type==='item')renderItemList();
    else if(type==='raw')renderRawList();
  };
  _openNumpad();
}

function clearModalSearch(type){
  state.modalSearch[type]='';
  document.getElementById(type+'SearchDisplay').textContent='0';
  if(type==='mold')renderMoldList();
  else if(type==='item')renderItemList();
  else if(type==='raw')renderRawList();
}

function _openNumpad(){
  document.getElementById('numpadLabel').textContent=numpadState.label;
  document.getElementById('npdDot').style.display=numpadState.allowDecimal?'':'none';
  updateNumpadDisplay();
  document.getElementById('numpadOverlay').classList.add('show');
}

function numpadPress(k){
  if(k==='.'){
    if(!numpadState.allowDecimal||numpadState.value.indexOf('.')>=0)return;
    if(!numpadState.value)numpadState.value='0';
    numpadState.value+='.';
  }else{
    if(numpadState.value.length>=numpadState.maxLen)return;
    if(numpadState.value==='0')numpadState.value='';
    numpadState.value+=k;
  }
  updateNumpadDisplay();
}
function numpadBackspace(){numpadState.value=numpadState.value.slice(0,-1);updateNumpadDisplay()}
function numpadOk(){
  var v=numpadState.value;
  if(v.slice(-1)==='.')v=v.slice(0,-1);
  if(typeof numpadState.onConfirm==='function')numpadState.onConfirm(v);
  numpadCancel();
}
function numpadCancel(){
  document.getElementById('numpadOverlay').classList.remove('show');
  numpadState.value='';numpadState.onConfirm=null;
}
function updateNumpadDisplay(){
  var d=document.getElementById('numpadDisplay');
  var v=numpadState.value;
  if(!v){d.textContent='0';return}
  var parts=v.split('.');
  var formatted=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(parts.length>1)formatted+='.'+parts[1];
  d.textContent=formatted;
}

// ==================== 금형/품번/소재 데이터 로드 ====================
// work_order_cache를 기반으로 금형별 품번/소재 매핑을 구축
async function loadMasterData(){
  // virtual_mold_master 테이블에서 금형·기종 마스터 조회
  try{
    var data=await sbGet('virtual_mold_master','select=*&active=eq.true&order=mold_code.asc,item_code.asc');
    data=data||[];

    // 금형별 그룹핑
    var moldMap={};
    var allItems={};
    var allRaws={};
    var itemRawMap={};

    data.forEach(function(r){
      var mc=(r.mold_code||'').trim();
      var ic=(r.item_code||'').trim();
      var rc=(r.raw_item_code||'').trim();
      if(mc){
        if(!moldMap[mc])moldMap[mc]={mold_code:mc,items:[]};
        if(ic){
          moldMap[mc].items.push({
            id:r.id,
            item_code:ic,
            item_name:r.item_name||'',
            item_spec:r.item_spec||'',
            model_code:r.model_code||'',
            raw_item_code:rc,
            raw_item_name:r.raw_item_name||''
          });
        }
      }
      if(ic&&!allItems[ic]){
        allItems[ic]={
          item_code:ic,
          item_name:r.item_name||'',
          item_spec:r.item_spec||'',
          model_code:r.model_code||'',
          mold_code:mc,
          raw_item_code:rc,
          raw_item_name:r.raw_item_name||''
        };
      }
      if(ic&&rc&&!itemRawMap[ic]){
        itemRawMap[ic]={raw_item_code:rc,raw_item_name:r.raw_item_name||''};
      }
      if(rc&&!allRaws[rc]){
        allRaws[rc]={raw_item_code:rc,raw_item_name:r.raw_item_name||''};
      }
    });

    state.molds=Object.values(moldMap).map(function(m){
      return {
        mold_code:m.mold_code,
        items:m.items,
        item_count:m.items.length,
        primary:m.items[0]||null
      };
    }).sort(function(a,b){return a.mold_code.localeCompare(b.mold_code)});

    state.items=Object.values(allItems).sort(function(a,b){return a.item_code.localeCompare(b.item_code)});
    state.raws=Object.values(allRaws).sort(function(a,b){return a.raw_item_code.localeCompare(b.raw_item_code)});
    state.itemToRaw=itemRawMap;
    state._rawMasterRows=data;  // 설정 탭 렌더용

  }catch(e){
    console.log('마스터 데이터 로드 실패:',e);
    state.molds=[];state.items=[];state.raws=[];
    state._rawMasterRows=[];
  }
}

// 금형 선택 → 기종·소재 자동 로드
function pickMold(moldCode){
  state.form.mold_code=moldCode;
  document.getElementById('moldBtn').classList.add('sel-on');
  document.getElementById('moldTxt').textContent='🔧 '+moldCode;
  closeModal('moldModal');

  // 해당 금형에 연결된 품번 찾기
  var moldInfo=state.molds.find(function(m){return m.mold_code===moldCode});
  if(!moldInfo||!moldInfo.items.length){
    showToast('⚠️ 해당 금형의 품번 이력 없음 · 품번을 직접 선택하세요');
    clearItemAndRaw();
    return;
  }

  // 품번이 1개면 자동 적용, 여러 개면 첫 번째 적용 + 품번 선택창으로 바꿀 수 있음을 안내
  var item=moldInfo.items[0];
  applyItemAutoFromMold(item);

  if(moldInfo.items.length>1){
    showToast('✅ 금형→기종·소재 자동 적용 (품번 '+moldInfo.items.length+'종 중 1번)',3500);
  }else{
    showToast('✅ 금형→기종·소재 자동 적용',2500);
  }

  // 금형 바뀌면 품번요약 갱신
  var ir=document.getElementById('itemInfoRow');
  if(ir){
    if(state.form.item_code){
      ir.style.display='';
      document.getElementById('itemInfoName').textContent=state.form.item_name||'-';
      document.getElementById('itemInfoSpec').textContent=state.form.item_spec||'-';
      document.getElementById('itemInfoModel').textContent=state.form.model_code||'-';
      document.getElementById('itemInfoRaw').textContent=state.form.raw_item_code?state.form.raw_item_code+(state.form.raw_item_name?' · '+state.form.raw_item_name:''):'-';
    }else{
      ir.style.display='none';
    }
  }
}

function applyItemAutoFromMold(item){
  state.form.item_code=item.item_code||'';
  state.form.item_name=item.item_name||'';
  state.form.item_spec=item.item_spec||'';
  state.form.model_code=item.model_code||'';
  state.form.raw_item_code=item.raw_item_code||'';
  state.form.raw_item_name=item.raw_item_name||'';

  // UI 갱신
  document.getElementById('itemBtn').classList.add('sel-on');
  document.getElementById('itemTxt').textContent=item.item_code||'-';
  document.getElementById('itemName').value=item.item_name||'';
  document.getElementById('itemSpec').value=item.item_spec||'';
  document.getElementById('modelCode').value=item.model_code||'';
  document.getElementById('itemAutoBadge').style.display='';

  if(item.raw_item_code){
    document.getElementById('rawBtn').classList.add('sel-on');
    document.getElementById('rawTxt').textContent='🪨 '+item.raw_item_code;
    document.getElementById('rawName').value=item.raw_item_name||'';
    document.getElementById('rawAutoBadge').style.display='';
  }else{
    clearRaw();
  }
}

function clearItemAndRaw(){
  state.form.item_code='';state.form.item_name='';state.form.item_spec='';state.form.model_code='';
  state.form.raw_item_code='';state.form.raw_item_name='';
  document.getElementById('itemBtn').classList.remove('sel-on');

function generateWorkOrderNo(){
  // sync 버전 (호환용): 현재 시각 기반 무작위
  var d=new Date();
  var yy=String(d.getFullYear()).slice(2);
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  var rand=Math.floor(Math.random()*9000+1000);
  return 'WO'+yy+mm+dd+'V'+rand;
}

async function generateWorkOrderNoAsync(dt){
  // DB에서 당일 최대 일련번호 조회 → +1 (4자리)
  var d=dt||new Date();
  var yy=String(d.getFullYear()).slice(2);
  var mm=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  var prefix='WO'+yy+mm+dd+'V';
  try{
    var rows=await sbGet('virtual_work_order',
      'select=work_order_no&work_order_no=like.'+prefix+'*&order=work_order_no.desc&limit=1');
    var maxSeq=0;
    if(rows&&rows.length){
      var lastNo=rows[0].work_order_no||'';
      var seqStr=lastNo.slice(prefix.length);
      var seq=parseInt(seqStr,10);
      if(!isNaN(seq))maxSeq=seq;
    }
    var next=maxSeq+1;
    return prefix+String(next).padStart(4,'0');
  }catch(e){
    // 실패시 랜덤 4자리
    var rand=Math.floor(Math.random()*9000+1000);
    return prefix+rand;
  }
}

  }
}

async function saveWorkOrder(){
  var f=state.form;
  if(!f.machine_code){showToast('⚠️ 설비 선택 필수');return}
  if(!f.item_code){showToast('⚠️ 기종명 선택 필수');return}

  var planQty=+f.plan_qty||0;
  if(planQty<=0){showToast('⚠️ 계획수량 입력 필수');return}

  var user=getCurrentUser()||'anonymous';
  var today=new Date();
  var yyyy_mm_dd=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  // 화면에 표시된 WO번호가 있으면 그대로, 없으면 새로 생성
  var wo_no=state.form.work_order_no||await generateWorkOrderNoAsync(today);

  var payload={
    work_order_no:wo_no,
    work_order_date:yyyy_mm_dd,
    machine_code:f.machine_code,
    machine_name:f.machine_name||null,
    item_code:f.item_code,
    item_name:f.item_name||null,
    item_spec:f.item_spec||null,
    model_code:f.model_code||null,
    mold_code:f.mold_code||null,
    raw_item_code:f.raw_item_code||null,
    raw_item_name:f.raw_item_name||null,
    plan_qty:planQty,
    status:'3',
    active:true,
    created_by:user
  };

  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='저장중...';
  try{
    await sbInsert('virtual_work_order',payload);
    showToast('✅ 작업지시 등록: '+wo_no,3000);
    resetForm();
    setTimeout(function(){switchTab('list')},600);
  }catch(e){
    showToast('❌ 저장 실패: '+String(e).substring(0,80),4000);
  }finally{
    btn.disabled=false;btn.textContent='✓ 작업지시 등록';
  }
}

      '</div>'+

  if(mc){
    // 로드된 설비 목록에서 찾기
    var found=state.machines.find(function(m){return m.machine_code===mc});
    if(found){
      pickMachine(found.machine_code,found.machine_name||'');
      return;
    }
    // 목록에 없어도 URL 파라미터로 강제 설정
    if(mn){
      pickMachine(mc,decodeURIComponent(mn));
      return;
    }
  }
  // URL에 설비 정보가 없으면 설비 선택 모달 자동 오픈
  setTimeout(function(){
    if(!state.form.machine_code){
      openMachinePicker();
    }
  },300);
}

  list.forEach(function(r){
    var active=r.active!==false;
    html+='<div class="wo-item" style="padding:10px 12px;margin-bottom:6px;border-left:3px solid '+(active?'var(--primary)':'var(--gray)')+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:start;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:13px;font-weight:800;color:#fff">🔧 '+_esc(r.mold_code)+'</div>'+
          '<div style="font-size:12px;color:var(--accent,#60a5fa);margin-top:2px">'+_esc(r.item_code||'-')+'</div>'+
          (r.item_name?'<div style="font-size:11px;color:#cbd5e1;margin-top:1px">'+_esc(r.item_name)+'</div>':'')+
          (r.item_spec?'<div style="font-size:10px;color:var(--sub);margin-top:1px">규격: '+_esc(r.item_spec)+'</div>':'')+
          (r.model_code?'<div style="font-size:10px;color:var(--sub)">기종: '+_esc(r.model_code)+'</div>':'')+
          (r.raw_item_code?'<div style="font-size:10px;color:#fbbf24;margin-top:2px">🪨 '+_esc(r.raw_item_code)+(r.raw_item_name?' · '+_esc(r.raw_item_name):'')+'</div>':'')+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:4px">'+
          '<button class="wo-btn edit" style="padding:5px 10px;font-size:10px" onclick="editMoldMaster('+r.id+')">✏️</button>'+
          '<button class="wo-btn cancel" style="padding:5px 10px;font-size:10px" onclick="deleteMoldMaster('+r.id+')">🗑</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  box.innerHTML=html;
}

function openMoldEditor(rec){
  mmState.editId=rec?rec.id:null;
  document.getElementById('moldEditorTitle').textContent=rec?'✏️ 금형·기종 수정':'➕ 금형·기종 등록';
  document.getElementById('mmMoldCode').value=rec?rec.mold_code||'':'';
  document.getElementById('mmItemCode').value=rec?rec.item_code||'':'';
  document.getElementById('mmItemName').value=rec?rec.item_name||'':'';
  document.getElementById('mmItemSpec').value=rec?rec.item_spec||'':'';
  document.getElementById('mmModelCode').value=rec?rec.model_code||'':'';
  document.getElementById('mmRawCode').value=rec?rec.raw_item_code||'':'';
  document.getElementById('mmRawName').value=rec?rec.raw_item_name||'':'';
  document.getElementById('mmNote').value=rec?rec.note||'':'';
  openModal('moldEditorModal');
  // 모달 열리면 금형코드로 포커스
  setTimeout(function(){
    var f=document.getElementById('mmMoldCode');
    if(f&&!rec)f.focus();
  },100);
}

function editMoldMaster(id){
  var rec=(state._rawMasterRows||[]).find(function(r){return r.id===id});
  if(!rec){showToast('레코드 없음');return}
  openMoldEditor(rec);
}

async function deleteMoldMaster(id){
  var rec=(state._rawMasterRows||[]).find(function(r){return r.id===id});
  if(!rec)return;
  if(!confirm('금형 "'+rec.mold_code+'" · 품번 "'+(rec.item_code||'')+'"\n\n삭제하시겠습니까?'))return;
  try{
    var res=await fetch(SB_URL+'/rest/v1/virtual_mold_master?id=eq.'+id,{
      method:'DELETE',
      headers:Object.assign({},sbH,{'Prefer':'return=minimal'})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    showToast('✅ 삭제');
    await loadMoldMasterList();
    await loadMasterData();  // 작성탭 금형 목록도 갱신
  }catch(e){showToast('❌ 삭제 실패: '+e.message)}
}

async function saveMoldMaster(){
  var moldCode=document.getElementById('mmMoldCode').value.trim();
  var itemCode=document.getElementById('mmItemCode').value.trim();
  if(!moldCode){showToast('⚠️ 금형코드 필수');return}
  if(!itemCode){showToast('⚠️ 품번 필수');return}
  var payload={
    mold_code:moldCode,
    item_code:itemCode,
    item_name:document.getElementById('mmItemName').value.trim()||null,
    item_spec:document.getElementById('mmItemSpec').value.trim()||null,
    model_code:document.getElementById('mmModelCode').value.trim()||null,
    raw_item_code:document.getElementById('mmRawCode').value.trim()||null,
    raw_item_name:document.getElementById('mmRawName').value.trim()||null,
    note:document.getElementById('mmNote').value.trim()||null,
    active:true
  };
  try{
    var url=SB_URL+'/rest/v1/virtual_mold_master';
    var method='POST';
    if(mmState.editId){
      url+='?id=eq.'+mmState.editId;
      method='PATCH';
    }
    var res=await fetch(url,{
      method:method,
      headers:Object.assign({},sbH,{'Prefer':'return=minimal'}),
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      var errTxt=await res.text();
      if(errTxt.indexOf('duplicate')>=0||errTxt.indexOf('23505')>=0){
        showToast('⚠️ 이미 등록된 금형+품번 조합입니다');
      }else{
        showToast('❌ 저장 실패: '+errTxt.slice(0,80));
      }
      return;
    }
    showToast('✅ 저장');
    closeModal('moldEditorModal');
    await loadMoldMasterList();
    await loadMasterData();
  }catch(e){showToast('❌ '+e.message)}
}

// ==================== 템플릿 다운로드/업로드 ====================
var MM_TEMPLATE_COLS=[
  {key:'mold_code',name:'금형코드',required:true,example:'M-0123'},
  {key:'item_code',name:'품번',required:true,example:'IW/OW-BDA-1106-1'},
  {key:'item_name',name:'품명',example:'브라켓 좌'},
  {key:'item_spec',name:'규격',example:'SGCC 0.8*150'},
  {key:'model_code',name:'기종(모델)',example:'BDA1106'},
  {key:'raw_item_code',name:'소재코드',example:'SGCC08-150'},
  {key:'raw_item_name',name:'소재명',example:'SGCC 0.8t x 150mm'},
  {key:'note',name:'비고',example:''}
];

function downloadMoldTemplate(){
  if(typeof XLSX==='undefined'){showToast('SheetJS 라이브러리 로딩중 · 잠시후 재시도');return}
  var wb=XLSX.utils.book_new();
  // 헤더 행: 한글 이름
  var headerRow={};
  MM_TEMPLATE_COLS.forEach(function(c){
    headerRow[c.name]=c.required?c.name+' *':c.name;
  });
  // 예시 2행
  var example1={};
  var example2={};
  MM_TEMPLATE_COLS.forEach(function(c){
    example1[c.name]=c.example||'';
    example2[c.name]='';
  });
  var ws=XLSX.utils.json_to_sheet([example1,example2]);
  // 컬럼 너비
  ws['!cols']=MM_TEMPLATE_COLS.map(function(c){
    return {wch:c.key==='item_name'||c.key==='raw_item_name'?24:c.key==='item_spec'?18:14};
  });
  XLSX.utils.book_append_sheet(wb,ws,'금형·기종 마스터');

  // 안내 시트
  var guide=[
    {항목:'사용 안내',내용:'1) 금형코드와 품번은 필수 입력 항목입니다 (* 표시)'},
    {항목:'',내용:'2) 동일한 금형에 여러 품번이 있으면 여러 행으로 입력'},
    {항목:'',내용:'3) 엑셀에서 편집 후 "📤 엑셀 업로드" 버튼으로 일괄 등록'},
    {항목:'',내용:'4) 동일한 금형+품번 조합은 중복 등록 불가 (자동 스킵)'},
    {항목:'',내용:'5) 소재코드 입력 시 작업지시 작성에서 자동 채워짐'},
    {항목:'컬럼 설명',내용:''},
    {항목:'금형코드',내용:'필수. 금형 관리 번호 (예: M-0123, 500-100A)'},
    {항목:'품번',내용:'필수. 해당 금형으로 생산되는 제품 품번'},
    {항목:'품명',내용:'제품명 (작업지시 작성시 자동 표시)'},
    {항목:'규격',내용:'제품 규격 (예: SGCC 0.8t x 150w)'},
    {항목:'기종(모델)',내용:'모델 분류 코드'},
    {항목:'소재코드',내용:'원자재 품번 (있으면 자동 로드)'},
    {항목:'소재명',내용:'원자재 명칭'},
    {항목:'비고',내용:'기타 참고사항'}
  ];
  var wsGuide=XLSX.utils.json_to_sheet(guide);
  wsGuide['!cols']=[{wch:16},{wch:60}];
  XLSX.utils.book_append_sheet(wb,wsGuide,'사용안내');

  XLSX.writeFile(wb,'금형기종마스터_템플릿_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
  showToast('✅ 템플릿 다운로드');
}

function exportMoldList(){
  if(typeof XLSX==='undefined'){showToast('SheetJS 로딩중');return}
  var rows=state._rawMasterRows||[];
  if(!rows.length){showToast('⚠️ 내보낼 데이터 없음');return}
  var data=rows.map(function(r){
    var o={};
    MM_TEMPLATE_COLS.forEach(function(c){o[c.name]=r[c.key]||''});
    o['활성']=r.active===false?'N':'Y';
    o['등록일시']=r.created_at?r.created_at.slice(0,16).replace('T',' '):'';
    return o;
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.json_to_sheet(data);
  ws['!cols']=MM_TEMPLATE_COLS.map(function(c){return {wch:c.key==='item_name'||c.key==='raw_item_name'?24:14}}).concat([{wch:6},{wch:18}]);
  XLSX.utils.book_append_sheet(wb,ws,'금형·기종 마스터');
  XLSX.writeFile(wb,'금형기종마스터_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
  showToast('✅ '+rows.length+'건 내보내기');
}

async function onMoldUpload(e){
  var f=e.target.files[0];
  if(!f)return;
  e.target.value='';  // 동일파일 재선택 가능하게
  if(typeof XLSX==='undefined'){showToast('SheetJS 로딩중');return}
  try{
    var buf=await f.arrayBuffer();
    var wb=XLSX.read(buf,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){showToast('⚠️ 빈 파일');return}

    // 한글 헤더 → 영문 key 매핑
    var nameToKey={};
    MM_TEMPLATE_COLS.forEach(function(c){
      nameToKey[c.name]=c.key;
      nameToKey[c.name+' *']=c.key;
    });

    var parsed=[];
    var skipEmpty=0,skipInvalid=0;
    rows.forEach(function(row){
      var rec={};
      Object.keys(row).forEach(function(k){
        var key=nameToKey[k.trim()];
        if(key){
          var v=String(row[k]||'').trim();
          if(v)rec[key]=v;
        }
      });
      if(!rec.mold_code&&!rec.item_code){skipEmpty++;return}
      if(!rec.mold_code||!rec.item_code){skipInvalid++;return}
      rec.active=true;
      parsed.push(rec);
    });

    if(!parsed.length){
      alert('유효한 데이터가 없습니다.\n빈행: '+skipEmpty+' / 필수누락: '+skipInvalid);
      return;
    }

    var mode=prompt('업로드 방식 선택\n\n1 : 기존 데이터 유지 + 신규 추가 (중복 금형+품번은 스킵)\n2 : 기존 데이터 전체 삭제 후 새로 등록 (⚠️ 주의)\n\n숫자 입력:','1');
    if(mode===null)return;
    if(mode!=='1'&&mode!=='2'){showToast('취소');return}

    showToast('⏳ 업로드 중... '+parsed.length+'건');

    if(mode==='2'){
      if(!confirm('⚠️ 기존 데이터를 전체 삭제하고\n\n업로드한 '+parsed.length+'건만 남깁니다.\n\n진행하시겠습니까?'))return;
      // 전체 삭제
      try{
        await fetch(SB_URL+'/rest/v1/virtual_mold_master?id=gt.0',{
          method:'DELETE',
          headers:Object.assign({},sbH,{'Prefer':'return=minimal'})
        });
      }catch(e){console.log('전체삭제 오류:',e)}
    }

    // 배치 삽입 (100건씩)
    var ok=0,fail=0,dup=0;
    var BATCH=100;
    for(var i=0;i<parsed.length;i+=BATCH){
      var chunk=parsed.slice(i,i+BATCH);
      try{
        var res=await fetch(SB_URL+'/rest/v1/virtual_mold_master',{
          method:'POST',
          headers:Object.assign({},sbH,{'Prefer':'return=minimal,resolution=ignore-duplicates'}),
          body:JSON.stringify(chunk)
        });
        if(res.ok){
          ok+=chunk.length;
        }else{
          var t=await res.text();
          if(t.indexOf('duplicate')>=0||t.indexOf('23505')>=0){
            // 중복 오류 - 개별로 재시도
            for(var j=0;j<chunk.length;j++){
              try{
                var r2=await fetch(SB_URL+'/rest/v1/virtual_mold_master',{
                  method:'POST',
                  headers:Object.assign({},sbH,{'Prefer':'return=minimal'}),
                  body:JSON.stringify(chunk[j])
                });
                if(r2.ok)ok++;
                else{
                  var t2=await r2.text();
                  if(t2.indexOf('duplicate')>=0||t2.indexOf('23505')>=0)dup++;
                  else fail++;
                }
              }catch(e){fail++}
            }
          }else{
            fail+=chunk.length;
          }
        }
      }catch(e){fail+=chunk.length}
    }

    var msg='✅ 업로드 완료\n\n성공: '+ok+'건';
    if(dup>0)msg+='\n중복 스킵: '+dup+'건';
    if(fail>0)msg+='\n실패: '+fail+'건';
    if(skipEmpty>0||skipInvalid>0)msg+='\n무시된 행: '+(skipEmpty+skipInvalid)+'건';
    alert(msg);

    await loadMoldMasterList();
    await loadMasterData();
  }catch(err){
    alert('❌ 파일 읽기 실패: '+err.message);
  }
}
