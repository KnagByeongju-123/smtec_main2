<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가상설비 작업지시</title>
<meta name="theme-color" content="#0f172a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#0f172a;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:80px}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#334155;--border:#334155;
  --primary:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;
  --orange:#f97316;--purple:#a78bfa;--sub:#94a3b8;--gray:#64748b
}

/* 헤더 */
.hdr{padding:16px;background:linear-gradient(180deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-title{font-size:18px;font-weight:800;color:#fff}
.hdr-title .ico{color:var(--orange)}
.user-badge{background:rgba(74,222,128,.15);color:var(--green);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700}

/* 탭 */
.tabs{display:flex;gap:4px;margin-top:12px;background:#0f172a;padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;background:transparent;color:var(--sub);border:none;font-size:13px;font-weight:700;cursor:pointer;border-radius:7px;font-family:inherit;transition:all .15s}
.tab.active{background:var(--primary);color:#fff}
.tab .cnt{background:rgba(255,255,255,.2);padding:1px 7px;border-radius:8px;font-size:10px;margin-left:4px}

/* 컨테이너 */
.wrap{padding:12px;max-width:800px;margin:0 auto}

/* 카드 */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.sect-hdr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--purple);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* 입력 필드 */
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cell{display:flex;flex-direction:column;gap:4px}
.cell.full{grid-column:1 / -1}
label{font-size:11px;color:var(--sub);font-weight:700}
label .req{color:var(--red)}
.inp, .sel, .btn-inp{width:100%;padding:10px;background:#0f172a;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;outline:none}
.inp:focus, .sel:focus{border-color:var(--primary)}
.btn-inp{text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.btn-inp .arr{color:var(--sub);font-size:10px}
.btn-inp.sel-on{border-color:var(--green)}
textarea.inp{min-height:70px;resize:vertical;font-size:13px}

/* 우선순위 칩 */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{flex:1;padding:10px;border:1.5px solid var(--border);background:#0f172a;color:var(--sub);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.chip.on{border-width:2px}
.chip.on[data-p="URGENT"]{border-color:var(--red);background:rgba(239,68,68,.15);color:var(--red)}
.chip.on[data-p="HIGH"]{border-color:var(--orange);background:rgba(249,115,22,.15);color:var(--orange)}
.chip.on[data-p="NORMAL"]{border-color:var(--primary);background:rgba(59,130,246,.15);color:var(--primary)}
.chip.on[data-p="LOW"]{border-color:var(--gray);background:rgba(100,116,139,.15);color:var(--sub)}

/* 제출 버튼 고정 */
.submit-bar{position:fixed;bottom:0;left:0;right:0;padding:12px;background:rgba(15,23,42,.95);border-top:1px solid var(--border);backdrop-filter:blur(10px);z-index:50}
.submit-bar .inner{max-width:800px;margin:0 auto;display:flex;gap:8px}
.sb-btn{flex:1;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.sb-btn.primary{background:var(--primary);color:#fff}
.sb-btn.ghost{background:var(--card2);color:#fff;flex:0 0 100px}

/* 목록 */
.wo-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--gray)}
.wo-item[data-st="WAITING"]{border-left-color:var(--gray)}
.wo-item[data-st="IN_PROGRESS"]{border-left-color:var(--primary)}
.wo-item[data-st="COMPLETED"]{border-left-color:var(--green);opacity:.7}
.wo-item[data-st="CANCELED"]{border-left-color:var(--red);opacity:.5}
.wo-item[data-p="URGENT"]{border-left-color:var(--red);border-left-width:5px}
.wo-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
.wo-no{font-size:11px;color:var(--sub);font-weight:600}
.wo-main{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px}
.wo-sub{font-size:12px;color:var(--sub)}
.wo-badges{display:flex;gap:4px;flex-shrink:0}
.badge{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-p-URGENT{background:var(--red);color:#fff}
.b-p-HIGH{background:var(--orange);color:#fff}
.b-p-NORMAL{background:var(--primary);color:#fff}
.b-p-LOW{background:var(--gray);color:#fff}
.b-s-WAITING{background:rgba(100,116,139,.2);color:var(--sub);border:1px solid var(--gray)}
.b-s-IN_PROGRESS{background:rgba(59,130,246,.2);color:var(--primary);border:1px solid var(--primary)}
.b-s-COMPLETED{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green)}
.b-s-CANCELED{background:rgba(239,68,68,.2);color:var(--red);border:1px solid var(--red)}
.wo-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.wo-meta-item{font-size:11px}
.wo-meta-lbl{color:var(--sub);font-weight:600;display:block;margin-bottom:1px}
.wo-meta-val{color:#fff;font-weight:700}
.wo-actions{display:flex;gap:6px;margin-top:10px}
.wo-btn{flex:1;padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.wo-btn.start{background:var(--primary);color:#fff}
.wo-btn.done{background:var(--green);color:#fff}
.wo-btn.edit{background:var(--card2);color:#fff}
.wo-btn.cancel{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.4)}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9500;display:none;align-items:center;justify-content:center;padding:12px}
.modal-bg.show{display:flex}
.modal-box{background:#0f172a;border:2px solid var(--purple);border-radius:16px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1e293b;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:800;color:var(--purple)}
.modal-x{background:transparent;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px 10px;border-radius:6px}
.modal-x:active{background:var(--card2)}
.modal-body{padding:14px;overflow-y:auto;flex:1}
.modal-search{width:100%;padding:10px;background:#1e293b;border:1px solid var(--border);border-radius:8px;color:#fff;font-size:13px;font-family:inherit;margin-bottom:10px}
.pick-list{display:flex;flex-direction:column;gap:6px}
.pick-item{padding:10px 12px;background:#1e293b;border:1px solid var(--border);border-radius:8px;cursor:pointer}
.pick-item:active{background:var(--card2)}
.pick-item.on{border-color:var(--green);background:rgba(34,197,94,.1)}
.pick-main{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.pick-sub{font-size:10px;color:var(--sub)}

/* 토스트 */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}

.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
.empty .ico{font-size:40px;margin-bottom:10px}

.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-chip{padding:7px 14px;background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.filter-chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

.loading{text-align:center;padding:20px;color:var(--sub);font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title"><span class="ico">🖊️</span> 가상설비 작업지시</div>
    <div class="user-badge" id="userBadge">👤 -</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('create')" data-tab="create">✏️ 작성</button>
    <button class="tab" onclick="switchTab('list')" data-tab="list">📋 목록 <span class="cnt" id="cntAll">0</span></button>
  </div>
</div>

<!-- ============ 작성 탭 ============ -->
<div class="wrap" id="panelCreate">

  <div class="card">
    <div class="sect-hdr">🖊️ 가상설비 지정 <span style="margin-left:auto;font-size:10px;color:var(--sub);font-weight:500">MES 미설치 설비 전용</span></div>
    <div style="font-size:10px;color:var(--sub);background:rgba(167,139,250,.08);padding:8px;border-radius:6px;margin-bottom:10px;line-height:1.5">
      💡 실설비(MES 연동)의 작업지시는 기존 MES에서 관리합니다.<br>
      이 화면은 <b style="color:var(--purple)">가상설비</b>(V049 등) 전용입니다.
    </div>
    <div class="row">
      <div class="cell full">
        <label>가상설비 <span class="req">*</span></label>
        <button class="btn-inp" id="machineBtn" onclick="openMachinePicker()">
          <span id="machineTxt">가상설비를 선택하세요</span>
          <span class="arr">▼</span>
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sect-hdr">📦 품목 정보</div>
    <div class="row">
      <div class="cell full">
        <label>품번 <span class="req">*</span></label>
        <button class="btn-inp" id="itemBtn" onclick="openItemPicker()">
          <span id="itemTxt">품번을 선택하세요</span>
          <span class="arr">▼</span>
        </button>
      </div>
      <div class="cell full">
        <label>기종 (모델)</label>
        <input type="text" class="inp" id="modelCode" placeholder="자동 입력 또는 수동 입력" readonly>
      </div>
      <div class="cell">
        <label>금형 <span class="req">*</span></label>
        <button class="btn-inp" id="moldBtn" onclick="openMoldPicker()">
          <span id="moldTxt">금형 선택</span>
          <span class="arr">▼</span>
        </button>
      </div>
      <div class="cell">
        <label>소재 <span class="req">*</span></label>
        <button class="btn-inp" id="rawBtn" onclick="openRawPicker()">
          <span id="rawTxt">소재 선택</span>
          <span class="arr">▼</span>
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sect-hdr">📊 지시 정보</div>
    <div class="row">
      <div class="cell">
        <label>계획수량</label>
        <input type="number" class="inp" id="planQty" placeholder="0" min="0">
      </div>
      <div class="cell">
        <label>납기일</label>
        <input type="date" class="inp" id="dueDate">
      </div>
      <div class="cell full">
        <label>우선순위</label>
        <div class="chips" id="priorityChips">
          <button type="button" class="chip" data-p="URGENT" onclick="setPriority('URGENT')">🚨 긴급</button>
          <button type="button" class="chip" data-p="HIGH" onclick="setPriority('HIGH')">⚡ 높음</button>
          <button type="button" class="chip on" data-p="NORMAL" onclick="setPriority('NORMAL')">● 일반</button>
          <button type="button" class="chip" data-p="LOW" onclick="setPriority('LOW')">▽ 낮음</button>
        </div>
      </div>
      <div class="cell full">
        <label>특이사항</label>
        <textarea class="inp" id="note" placeholder="작업자에게 전달할 특이사항 (옵션)"></textarea>
      </div>
    </div>
  </div>

</div>

<!-- ============ 목록 탭 ============ -->
<div class="wrap" id="panelList" style="display:none">
  <div class="filter-row">
    <button class="filter-chip on" onclick="setFilter('ALL')" data-f="ALL">전체</button>
    <button class="filter-chip" onclick="setFilter('WAITING')" data-f="WAITING">대기</button>
    <button class="filter-chip" onclick="setFilter('IN_PROGRESS')" data-f="IN_PROGRESS">진행</button>
    <button class="filter-chip" onclick="setFilter('COMPLETED')" data-f="COMPLETED">완료</button>
    <button class="filter-chip" onclick="setFilter('CANCELED')" data-f="CANCELED">취소</button>
  </div>
  <div id="listBox">
    <div class="loading">로딩중...</div>
  </div>
</div>

<!-- ============ 제출 바 ============ -->
<div class="submit-bar" id="submitBar">
  <div class="inner">
    <button class="sb-btn ghost" onclick="resetForm()">초기화</button>
    <button class="sb-btn primary" onclick="saveWorkOrder()" id="saveBtn">✓ 작업지시 등록</button>
  </div>
</div>

<!-- ============ 모달들 ============ -->
<div class="modal-bg" id="machineModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">🏭 설비 선택</div>
      <button class="modal-x" onclick="closeModal('machineModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="machineSearch" placeholder="🔍 설비코드 / 설비명" oninput="renderMachineList()">
      <div class="pick-list" id="machineList"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="itemModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">📦 품번 선택</div>
      <button class="modal-x" onclick="closeModal('itemModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="itemSearch" placeholder="🔍 품번 / 품명 / 규격" oninput="renderItemList()">
      <div class="pick-list" id="itemList"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="moldModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">🔧 금형 선택</div>
      <button class="modal-x" onclick="closeModal('moldModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="moldSearch" placeholder="🔍 금형 코드" oninput="renderMoldList()">
      <div class="pick-list" id="moldList"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="rawModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">🪨 소재 선택</div>
      <button class="modal-x" onclick="closeModal('rawModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-search" id="rawSearch" placeholder="🔍 소재코드 / 규격" oninput="renderRawList()">
      <div class="pick-list" id="rawList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 설정 ====================
var SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
var SB_KEY='sb_publishable_9j2YkkL-7ul1TrhH-NjVdQ_vWDG2-1D';
var API_URL='http://localhost:5100';  // Python 로컬 API
var sbH={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

// ==================== 상태 ====================
var state={
  form:{
    machine_code:'',machine_name:'',is_virtual:true,  // 항상 가상설비
    item_code:'',item_name:'',item_spec:'',
    model_code:'',mold_code:'',
    raw_item_code:'',raw_item_name:'',
    plan_qty:0,priority:'NORMAL',due_date:'',
    note:''
  },
  machines:[],  // 설비 목록
  items:[],     // 품번 캐시
  molds:[],     // 금형 캐시
  raws:[],      // 소재 캐시
  orders:[],    // 작업지시 목록
  filter:'ALL',
  tab:'create'
};

// ==================== ESG 자동 로그인 ====================
function getCurrentUser(){
  try{
    var a=JSON.parse(localStorage.getItem('esg_pin_auth')||'null');
    if(a && a.exp>Date.now() && a.name) return a.name;
    var s=sessionStorage.getItem('ESG_USER');
    if(s) return s;
    var p=new URLSearchParams(location.search);
    var u=p.get('user')||p.get('worker')||p.get('name');
    if(u){
      try{sessionStorage.setItem('ESG_USER',u)}catch(e){}
      return u;
    }
    return localStorage.getItem('mes_last_worker')||'';
  }catch(e){return ''}
}

// ==================== 유틸 ====================
function showToast(msg,dur){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show')},dur||2200);
}
function _esc(s){
  if(s==null)return '';
  return String(s).replace(/[&<>"']/g,function(c){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

async function sbGet(table,qs){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?'+qs,{headers:sbH});
  if(!r.ok)throw new Error(r.status);
  return await r.json();
}
async function sbInsert(table,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:sbH,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status+': '+await r.text());
  return await r.json();
}
async function sbUpdate(table,id,data){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:sbH,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status);
  return await r.json();
}

// ==================== 탭 전환 ====================
function switchTab(t){
  state.tab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===t)});
  document.getElementById('panelCreate').style.display=t==='create'?'':'none';
  document.getElementById('panelList').style.display=t==='list'?'':'none';
  document.getElementById('submitBar').style.display=t==='create'?'':'none';
  if(t==='list')loadList();
}

// ==================== 설비 로드 (가상설비만) ====================
async function loadMachines(){
  try{
    // machine_virtual 테이블에서 활성 가상설비만 조회
    var data=await sbGet('machine_virtual','select=machine_code,machine_name,customer,tonnage,press_maker&active=eq.true&order=machine_code.asc');
    state.machines=data||[];
    renderMachineList();
  }catch(e){
    showToast('가상설비 목록 조회 실패');
    state.machines=[];
  }
}

function openMachinePicker(){
  document.getElementById('machineSearch').value='';
  openModal('machineModal');
  renderMachineList();
}

function renderMachineList(){
  var kw=(document.getElementById('machineSearch').value||'').trim().toLowerCase();
  var c=document.getElementById('machineList');
  var list=state.machines.filter(function(m){
    if(!kw)return true;
    var s=(m.machine_code+' '+(m.machine_name||'')+' '+(m.customer||'')).toLowerCase();
    return s.indexOf(kw)>=0;
  });
  if(!list.length){
    c.innerHTML='<div class="empty"><div class="ico">🖊️</div>등록된 가상설비 없음<br><span style="font-size:11px">mes_work.html의 🖊️ 가상설비 관리에서 먼저 등록하세요</span></div>';
    return;
  }
  var html='';
  list.forEach(function(m){
    var on=(state.form.machine_code===m.machine_code)?' on':'';
    var info=[m.customer,m.press_maker,(m.tonnage?m.tonnage+'톤':'')].filter(function(x){return x}).join(' · ');
    html+='<div class="pick-item'+on+'" onclick="pickMachine(\''+_esc(m.machine_code)+'\',\''+_esc(m.machine_name||'').replace(/\'/g,"\\'")+'\')">'+
      '<div class="pick-main">🖊️ '+_esc(m.machine_code)+' · '+_esc(m.machine_name||'-')+'</div>'+
      '<div class="pick-sub">'+_esc(info||'가상설비')+'</div>'+
    '</div>';
  });
  c.innerHTML=html;
}

function pickMachine(mc,nm){
  state.form.machine_code=mc;
  state.form.machine_name=nm;
  state.form.is_virtual=true;  // 항상 가상설비
  var btn=document.getElementById('machineBtn');
  btn.classList.add('sel-on');
  document.getElementById('machineTxt').textContent='🖊️ '+mc+' · '+nm;
  closeModal('machineModal');
}

// ==================== 품번 로드 ====================
async function loadItems(){
  try{
    // work_order_cache 최근 30일 품번 추출
    var data=await sbGet('work_order_cache','select=item_code,item_name,item_spec,model_code&order=work_order_date.desc&limit=300');
    var seen={};
    state.items=(data||[]).filter(function(x){
      if(!x.item_code||seen[x.item_code])return false;
      seen[x.item_code]=true;
      return true;
    });
  }catch(e){
    state.items=[];
  }
}

function openItemPicker(){
  document.getElementById('itemSearch').value='';
  openModal('itemModal');
  renderItemList();
}

function renderItemList(){
  var kw=(document.getElementById('itemSearch').value||'').trim().toLowerCase();
  var c=document.getElementById('itemList');
  var list=state.items.filter(function(x){
    if(!kw)return true;
    var s=((x.item_code||'')+' '+(x.item_name||'')+' '+(x.item_spec||'')).toLowerCase();
    return s.indexOf(kw)>=0;
  }).slice(0,50);
  if(!list.length){
    c.innerHTML='<div class="empty"><div class="ico">🔍</div>검색 결과 없음<br><span style="font-size:11px">아래에서 직접 입력 가능</span></div>'+
      '<div style="margin-top:12px;padding:10px;background:var(--card);border-radius:8px">'+
      '<input type="text" class="modal-search" id="manItemCode" placeholder="품번 직접 입력" style="margin-bottom:6px">'+
      '<input type="text" class="modal-search" id="manItemName" placeholder="품명 (선택)" style="margin-bottom:6px">'+
      '<button class="sb-btn primary" style="width:100%;padding:10px;font-size:13px" onclick="applyManualItem()">수기 적용</button>'+
      '</div>';
    return;
  }
  var html='';
  list.forEach(function(x){
    var on=(state.form.item_code===x.item_code)?' on':'';
    html+='<div class="pick-item'+on+'" onclick="pickItem(\''+_esc(x.item_code)+'\',\''+_esc(x.item_name||'').replace(/\'/g,"\\'")+'\',\''+_esc(x.item_spec||'').replace(/\'/g,"\\'")+'\',\''+_esc(x.model_code||'')+'\')">'+
      '<div class="pick-main">'+_esc(x.item_code)+'</div>'+
      '<div class="pick-sub">'+_esc(x.item_name||'-')+' · '+_esc(x.item_spec||'-')+'</div>'+
    '</div>';
  });
  c.innerHTML=html;
}

function pickItem(code,name,spec,model){
  state.form.item_code=code;
  state.form.item_name=name;
  state.form.item_spec=spec;
  state.form.model_code=model;
  document.getElementById('itemBtn').classList.add('sel-on');
  document.getElementById('itemTxt').textContent=code+' · '+(name||'-');
  document.getElementById('modelCode').value=model||'';
  closeModal('itemModal');
  // 금형/소재 기본값 자동 조회 시도
  autoFillBom(code);
}

function applyManualItem(){
  var ic=(document.getElementById('manItemCode').value||'').trim();
  if(!ic){showToast('품번 입력');return}
  var nm=(document.getElementById('manItemName').value||'').trim();
  pickItem(ic,nm,'','');
}

// BOM 자동 채움 (품번 → 금형/소재)
async function autoFillBom(code){
  try{
    // Python API로 BOM 조회 (가능하면)
    var r=await fetch(API_URL+'/api/mes/bom_by_item?item_code='+encodeURIComponent(code));
    if(!r.ok)return;
    var data=await r.json();
    if(data && data.mold_code && !state.form.mold_code){
      state.form.mold_code=data.mold_code;
      document.getElementById('moldTxt').textContent='🔧 '+data.mold_code;
      document.getElementById('moldBtn').classList.add('sel-on');
    }
    if(data && data.raw_item_code && !state.form.raw_item_code){
      state.form.raw_item_code=data.raw_item_code;
      state.form.raw_item_name=data.raw_item_name||'';
      document.getElementById('rawTxt').textContent='🪨 '+data.raw_item_code;
      document.getElementById('rawBtn').classList.add('sel-on');
    }
  }catch(e){/* 무시 */}
}

// ==================== 금형 ====================
function openMoldPicker(){
  document.getElementById('moldSearch').value='';
  openModal('moldModal');
  renderMoldList();
}
function renderMoldList(){
  var c=document.getElementById('moldList');
  var kw=(document.getElementById('moldSearch').value||'').trim();
  c.innerHTML='<div style="padding:10px;background:var(--card);border-radius:8px;margin-bottom:10px">'+
    '<input type="text" class="modal-search" id="manMoldCode" placeholder="금형 코드 직접 입력" style="margin-bottom:6px" value="'+_esc(kw)+'">'+

    '</div>';

function applyManualMold(){

  if(!v){showToast('금형 코드 입력');return}
  state.form.mold_code=v;
  document.getElementById('moldTxt').textContent='🔧 '+v;
  document.getElementById('moldBtn').classList.add('sel-on');
  closeModal('moldModal');
}

// ==================== 소재 ====================
async function loadRaws(){
  try{
    var r=await fetch(API_URL+'/api/mes/raw_list');
    if(!r.ok){state.raws=[];return}
    var data=await r.json();
    state.raws=data.items||[];
  }catch(e){state.raws=[]}
}
function openRawPicker(){
  document.getElementById('rawSearch').value='';
  openModal('rawModal');
  renderRawList();
}
function renderRawList(){
  var kw=(document.getElementById('rawSearch').value||'').trim().toLowerCase();
  var c=document.getElementById('rawList');
  var list=state.raws.filter(function(x){
    if(!kw)return true;
    var s=((x.item_code||'')+' '+(x.item_name||'')+' '+(x.item_spec||'')).toLowerCase();

  if(!list.length){

      '<input type="text" class="modal-search" id="manRawName" placeholder="소재명 (선택)" style="margin-bottom:6px">'+

function pickRaw(code,name){
  state.form.raw_item_code=code;
  state.form.raw_item_name=name;
  document.getElementById('rawTxt').textContent='🪨 '+code;
  document.getElementById('rawBtn').classList.add('sel-on');
  closeModal('rawModal');
}
function applyManualRaw(){
  var v=(document.getElementById('manRawCode').value||'').trim();
  if(!v){showToast('소재 코드 입력');return}

// ==================== 우선순위 ====================
function setPriority(p){
  state.form.priority=p;
  document.querySelectorAll('#priorityChips .chip').forEach(function(c){
    c.classList.toggle('on',c.dataset.p===p);
  });
}

// ==================== 작업지시 번호 생성 ====================
function generateWorkOrderNo(){
  var d=new Date();
  var ymd=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  var rand=Math.floor(Math.random()*900)+100;  // 100-999
  return 'WO-'+ymd+'-'+rand;
}

// ==================== 저장 ====================
async function saveWorkOrder(){
  var f=state.form;
  // 필수 검증
  if(!f.machine_code){showToast('⚠️ 설비 선택 필수');return}
  if(!f.item_code){showToast('⚠️ 품번 선택 필수');return}
  if(!f.mold_code){showToast('⚠️ 금형 입력 필수');return}
  if(!f.raw_item_code){showToast('⚠️ 소재 입력 필수');return}
  
  // 현재 로그인 사용자
  var user=getCurrentUser()||'anonymous';
  
  // 수량 수집
  var planQty=parseInt(document.getElementById('planQty').value||'0',10)||0;
  var dueDate=document.getElementById('dueDate').value||null;
  var note=(document.getElementById('note').value||'').trim();
  
  var wo_no=generateWorkOrderNo();
  var today=new Date();
  var yyyy_mm_dd=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  
  var payload={
    work_order_no:wo_no,
    work_order_date:yyyy_mm_dd,
    work_shift:'A',
    machine_code:f.machine_code,
    machine_name:f.machine_name,
    is_virtual:f.is_virtual,
    item_code:f.item_code,
    item_name:f.item_name,
    item_spec:f.item_spec,
    model_code:f.model_code,
    mold_code:f.mold_code,
    raw_item_code:f.raw_item_code,
    raw_item_name:f.raw_item_name,
    plan_qty:planQty,
    priority:f.priority,
    due_date:dueDate,
    note:note,
    status:'WAITING',
    created_by:user,
    updated_by:user
  };
  
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;
  btn.textContent='저장 중...';
  try{
    await sbInsert('work_order_manual',payload);
    showToast('✅ 작업지시 등록: '+wo_no);
    resetForm();
    setTimeout(function(){switchTab('list')},600);
  }catch(e){
    showToast('❌ 저장 실패: '+String(e).substring(0,80));
  }finally{
    btn.disabled=false;
    btn.textContent='✓ 작업지시 등록';
  }
}

function resetForm(){
  state.form={
    machine_code:'',machine_name:'',is_virtual:true,
    item_code:'',item_name:'',item_spec:'',
    model_code:'',mold_code:'',
    raw_item_code:'',raw_item_name:'',
    plan_qty:0,priority:'NORMAL',due_date:'',note:''
  };
  document.getElementById('machineTxt').textContent='가상설비를 선택하세요';
  document.getElementById('itemTxt').textContent='품번을 선택하세요';
  document.getElementById('moldTxt').textContent='금형 선택';
  document.getElementById('rawTxt').textContent='소재 선택';
  ['machineBtn','itemBtn','moldBtn','rawBtn'].forEach(function(id){
    document.getElementById(id).classList.remove('sel-on');
  });
  document.getElementById('modelCode').value='';
  document.getElementById('planQty').value='';
  document.getElementById('dueDate').value='';
  document.getElementById('note').value='';
  setPriority('NORMAL');
}

// ==================== 목록 ====================
async function loadList(){
  var box=document.getElementById('listBox');
  box.innerHTML='<div class="loading">⏳ 작업지시 로딩중...</div>';
  try{
    // 가상설비 작업지시만 조회 (is_virtual=true)
    var data=await sbGet('work_order_manual','select=*&is_virtual=eq.true&order=created_at.desc&limit=100');
    state.orders=data||[];
    updateCounts();
    renderList();
  }catch(e){
    box.innerHTML='<div class="empty"><div class="ico">❌</div>조회 실패<br><span style="font-size:11px">'+_esc(String(e))+'</span></div>';
  }
}

function updateCounts(){
  document.getElementById('cntAll').textContent=state.orders.length;
}

function setFilter(f){
  state.filter=f;
  document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.toggle('on',c.dataset.f===f)});
  renderList();
}

function renderList(){
  var box=document.getElementById('listBox');
  var list=state.orders;
  if(state.filter!=='ALL')list=list.filter(function(x){return x.status===state.filter});
  if(!list.length){
    box.innerHTML='<div class="empty"><div class="ico">📋</div>작업지시 없음</div>';
    return;
  }
  var html='';
  list.forEach(function(o){
    var pLbl={URGENT:'🚨 긴급',HIGH:'⚡ 높음',NORMAL:'● 일반',LOW:'▽ 낮음'}[o.priority]||o.priority;
    var sLbl={WAITING:'⏳ 대기',IN_PROGRESS:'🔄 진행',COMPLETED:'✅ 완료',CANCELED:'❌ 취소'}[o.status]||o.status;
    html+='<div class="wo-item" data-st="'+o.status+'" data-p="'+o.priority+'">'+
      '<div class="wo-head">'+
        '<div style="flex:1">'+
          '<div class="wo-no">'+_esc(o.work_order_no)+' · '+_esc(o.created_by||'-')+'</div>'+
          '<div class="wo-main">'+(o.is_virtual?'🖊️ ':'🏭 ')+_esc(o.machine_code)+' · '+_esc(o.machine_name||'')+'</div>'+
          '<div class="wo-sub">'+_esc(o.item_code)+(o.item_name?' · '+_esc(o.item_name):'')+'</div>'+
        '</div>'+
        '<div class="wo-badges">'+
          '<span class="badge b-p-'+o.priority+'">'+pLbl+'</span>'+
          '<span class="badge b-s-'+o.status+'">'+sLbl+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="wo-meta">'+
        '<div class="wo-meta-item"><span class="wo-meta-lbl">금형</span><span class="wo-meta-val">'+_esc(o.mold_code||'-')+'</span></div>'+
        '<div class="wo-meta-item"><span class="wo-meta-lbl">소재</span><span class="wo-meta-val">'+_esc(o.raw_item_code||'-')+'</span></div>'+
        '<div class="wo-meta-item"><span class="wo-meta-lbl">계획수량</span><span class="wo-meta-val">'+(o.plan_qty||0).toLocaleString()+'</span></div>'+
        '<div class="wo-meta-item"><span class="wo-meta-lbl">납기</span><span class="wo-meta-val">'+_esc(o.due_date||'-')+'</span></div>'+
      '</div>'+
      (o.note?'<div style="margin-top:8px;padding:8px;background:#0f172a;border-radius:6px;font-size:11px;color:var(--sub)">📝 '+_esc(o.note)+'</div>':'')+
      '<div class="wo-actions">'+
        (o.status==='WAITING'?'<button class="wo-btn start" onclick="changeStatus('+o.id+',\'IN_PROGRESS\')">▶ 시작</button>':'')+
        (o.status==='IN_PROGRESS'?'<button class="wo-btn done" onclick="changeStatus('+o.id+',\'COMPLETED\')">✓ 완료</button>':'')+
        (o.status==='WAITING'||o.status==='IN_PROGRESS'?'<button class="wo-btn cancel" onclick="changeStatus('+o.id+',\'CANCELED\')">✕ 취소</button>':'')+
        (o.status==='CANCELED'||o.status==='COMPLETED'?'<button class="wo-btn edit" onclick="changeStatus('+o.id+',\'WAITING\')">↻ 재개</button>':'')+
      '</div>'+
    '</div>';
  });
  box.innerHTML=html;
}

async function changeStatus(id,newStatus){
  try{
    var user=getCurrentUser()||'anonymous';
    var payload={status:newStatus,updated_by:user,updated_at:new Date().toISOString()};
    if(newStatus==='COMPLETED')payload.completed_at=new Date().toISOString();
    await sbUpdate('work_order_manual',id,payload);
    showToast('✅ 상태 변경: '+newStatus);
    loadList();
  }catch(e){
    showToast('❌ 변경 실패');
  }
}

// ==================== 초기화 ====================
async function init(){
  var u=getCurrentUser();
  document.getElementById('userBadge').textContent='👤 '+(u||'로그인 필요');
  // 오늘 날짜 기본값
  var today=new Date();
  var tomorrow=new Date(today.getTime()+86400000);
  var y=tomorrow.getFullYear(),m=String(tomorrow.getMonth()+1).padStart(2,'0'),d=String(tomorrow.getDate()).padStart(2,'0');
  document.getElementById('dueDate').value=y+'-'+m+'-'+d;
  
  await loadMachines();
  await loadItems();
  await loadRaws();
}

init();
</script>
