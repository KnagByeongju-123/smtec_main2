<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESG Smart Factory</title>
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#0f1117;--card:#1a1d27;--card-h:#222633;--border:#2a2e3d;
    --text:#e8eaf0;--dim:#8b8fa3;--muted:#5a5e72;--accent:#4f8cff;
    --radius:14px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:40px}

  /* 헤더 */
  .header{padding:28px 20px 18px;background:linear-gradient(180deg,#181b26,var(--bg));border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(79,140,255,.12);color:var(--accent);border:1px solid rgba(79,140,255,.2)}
  .header p{font-size:12px;color:var(--dim);margin-top:2px}

  /* 공정 탭 */
  .proc-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);background:var(--bg)}
  .proc-tabs::-webkit-scrollbar{display:none}
  .ptab{flex-shrink:0;padding:8px 14px;border-radius:10px;background:var(--card);border:1.5px solid var(--border);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
  .ptab.on{background:rgba(79,140,255,.12);border-color:rgba(79,140,255,.4);color:var(--accent)}
  .ptab:active{transform:scale(.96)}

  /* 카테고리 */
  .cat-list{padding:12px 16px}
  .cat{border-radius:var(--radius);margin-bottom:8px;overflow:hidden;border:1px solid var(--border);background:var(--card);transition:border-color .2s}
  .cat.open{border-color:rgba(79,140,255,.3)}
  .cat-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .cat-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--cc-bg,#1e293b)}
  .cat-info{flex:1;min-width:0}
  .cat-name{font-size:14px;font-weight:700;color:var(--text)}
  .cat-desc{font-size:11px;color:var(--dim);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:transform .25s;flex-shrink:0;font-size:18px;font-weight:300}
  .cat.open .cat-arrow{transform:rotate(90deg);color:var(--accent)}
  .cat-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .cat-divider{height:1px;background:var(--border);margin:0 16px}

  /* 서브링크 */
  .sub-list{padding:6px 8px 8px}
  .sub-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--text);transition:background .12s}
  .sub-link:active{background:var(--card-h)}
  .sub-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.05);flex-shrink:0}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-size:13px;font-weight:600}
  .sub-desc{font-size:10px;color:var(--dim);margin-top:1px}
  .sub-arrow{color:var(--muted);font-size:14px;flex-shrink:0}
  .sub-link.coming{opacity:.4;pointer-events:none}
  .sub-link.coming .sub-name::after{content:' (준비중)';font-size:9px;color:var(--muted);font-weight:400}

  /* 단일 링크 카테고리 */
  .cat-single{display:block;text-decoration:none;color:inherit}
  .cat-single:active{transform:scale(.98)}

  /* 색상 */
  [data-cc="master"]{--cc-bg:rgba(21,101,192,.15)}
  [data-cc="check"]{--cc-bg:rgba(46,125,50,.15)}
  [data-cc="lot"]{--cc-bg:rgba(230,81,0,.15)}
  [data-cc="defect"]{--cc-bg:rgba(198,40,40,.15)}
  [data-cc="parts"]{--cc-bg:rgba(106,27,154,.15)}
  [data-cc="patrol"]{--cc-bg:rgba(0,131,143,.15)}
  [data-cc="meeting"]{--cc-bg:rgba(69,39,160,.15)}
  [data-cc="personal"]{--cc-bg:rgba(100,116,139,.15)}
  [data-cc="backup"]{--cc-bg:rgba(34,197,94,.15)}
  [data-cc="board"]{--cc-bg:rgba(123,31,162,.15)}

  .footer{text-align:center;padding:20px;font-size:10px;color:rgba(255,255,255,.25);line-height:1.7}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,29,43,.92);backdrop-filter:blur(12px);color:#fff;padding:10px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>ESG Smart Factory</h1>
    <span class="header-badge">v2.0</span>
  </div>
  <p>페이퍼리스 생산현장 통합관리</p>
</div>

<div class="proc-tabs" id="procTabs"></div>
<div class="cat-list" id="catList"></div>
<div class="footer">ESG Smart Factory v2.0<br>© 2025 페이퍼리스 생산현장 통합관리</div>
<div class="toast" id="toast"></div>

<script>
// ===== 공정 =====
const PROCS=[
  {id:'press',name:'프레스',icon:'⚙️'},
  {id:'heat',name:'열처리',icon:'🔥'},
  {id:'lathe',name:'선삭',icon:'🔩'},
  {id:'grind',name:'연마',icon:'💎'},
  {id:'plate',name:'도금',icon:'✨'},
  {id:'assem',name:'조립',icon:'🏭'},
  {id:'insp',name:'검사',icon:'🔍'}
];

// ===== 카테고리 (공정별 분기) =====
function getCats(p){
  const isPress=p==='press', isInsp=p==='insp';
  return [
    {
      id:'master',icon:'📋',name:'마스터관리',
      desc:'설비·품번·작업자 마스터 데이터',
      single:true,href:'master_manage.html'
    },
    {
      id:'check',icon:'🔧',name:'일상점검',
      desc:'설비·검사기·세척기 일일 점검',
      subs:[
        {icon:'🏭',name:'생산설비',desc:'생산설비 일상점검 체크시트',href:'P_machine_check.html'},
        {icon:'🔬',name:'검사기',desc:'검사장비 일상점검 · 텔레그램 알림',href:isInsp?'QC_machine_check.html':'P_machine_check.html'},
        {icon:'🧼',name:'세척기',desc:'세척설비 시작전/작업중 점검 · 기준사진',href:'wash_machine_check.html'}
      ]
    },
    {
      id:'lot',icon:'📦',name:'로트관리',
      desc:'소재입고·생산·출하 로트 추적',
      subs:[
        {icon:'🪨',name:'소재',desc:'소재업체 템플릿 업로드 → DB 저장',href:isPress?'lot_tracking_tj.html':'lot_tracking.html'},
        {icon:'⚙️',name:'생산',desc:'공정별 이동관리 · 소재입고~출하',href:isPress?'lot_tracking_tj.html':'lot_tracking.html'},
        {icon:'📊',name:'소재재공',desc:'미생산·잔여소재 기반 기종별 생산가능 수량분석',href:'production_forecast.html'},
        {icon:'📤',name:'출하SKF씰',desc:'SKF씰 출고등록 · 생산일자 LOT 추적',href:isPress?'request_outgoing.html':'lot_tracking.html'},
        {icon:'🔩',name:'출하SBC',desc:'레이스웨이 출하 · 생산일자 LOT 추적',href:isPress?'request_outgoing.html':'lot_tracking.html'},
        {icon:'🏭',name:'출하일반',desc:'일반기종 출하 · 고객사별 이력관리',href:isPress?'request_outgoing.html':'lot_tracking.html'}
      ]
    },
    {
      id:'defect',icon:'❌',name:'불량관리',
      desc:'외관불량 등록·통계 · 치수추이 분석',
      subs:[
        {icon:'👁️',name:'외관불량관리',desc:'기판 영역별 불량등록 · 이력추적 · 통계분석',href:'defect.html'},
        {icon:'📐',name:'치수추이관리',desc:'공차한계 80% 임박 모니터링 · 관리도 그래프',href:'QC_dim.html'}
      ]
    },
    {
      id:'parts',icon:'🔩',name:'부품/잔량',
      desc:'예비품·소모품 재고 · 잔량 혼입방지',
      subs:[
        {icon:'🎭',name:'예비품관리',desc:'이동등록 · 재고현황 · 잔여수명 · 폐기관리',href:'mask.html'},
        {icon:'📊',name:'잔량관리',desc:'잔량 혼입 방지 · QR스캔 보관/사용',href:'QC_inventory.html'},
        {icon:'🔧',name:'금형부품관리',desc:'금형별 부품 장착/보관 현황 관리',href:'mold_parts.html'}
      ]
    },
    {
      id:'patrol',icon:'🛡️',name:'공정점검',
      desc:'공정순회 점검 · 안전설비 환경 점검',
      subs:[
        {icon:'🔄',name:'공정점검',desc:'설비·라인 점검 체크리스트 및 이력',href:'line_patrol.html'},
        {icon:'⚠️',name:'안전점검',desc:'안전설비·보호구·환경 점검',href:'#',coming:true}
      ]
    },
    {
      id:'meeting',icon:'💬',name:'회의',
      desc:'회의록 · 화상회의',
      subs:[
        {icon:'📝',name:'회의록',desc:'회의 내용 기록·관리',href:'meeting.html'},
        {icon:'🎥',name:'화상회의',desc:'온라인 화상회의 연결',href:'#',coming:true}
      ]
    },
    {
      id:'personal',icon:'👤',name:'개인관리',
      desc:'일정·차량·카드·외근 관리',
      subs:[
        {icon:'📅',name:'일정관리',desc:'개인 업무일정 관리',href:'schedule.html'},
        {icon:'🚗',name:'차량카드외근관리',desc:'차량·법인카드·외근 기록',href:'cardcar.html'}
      ]
    },
    {
      id:'backup',icon:'💾',name:'백업',
      desc:'데이터 백업 · 모바일 스캔 · KPI',
      subs:[
        {icon:'☁️',name:'백업보관',desc:'Google Drive 데이터 백업',href:'#',coming:true},
        {icon:'📲',name:'모바일용스캔다운로드',desc:'스캔 앱(EXE) 다운로드',href:'#',coming:true},
        {icon:'📱',name:'모바일스캔모드',desc:'폰→PC 바코드 릴레이 스캔',href:'#',coming:true},
        {icon:'📊',name:'KPI 관리',desc:'IATF 16949 프로세스 KPI 관리',href:'kpi_manage.html'},
        {icon:'📋',name:'작업표준 검색',desc:'구글드라이브 표준문서 검색·열람',href:'gdrive_standard.html'}
      ]
    },
    {
      id:'board',icon:'📝',name:'게시판',
      desc:'수정요청 · 버그신고 · 개선제안 · 공지',
      subs:[
        {icon:'🔧',name:'수정요청 게시판',desc:'시스템 개선요청 · 버그신고 · 공지사항',href:'board.html'}
      ]
    }
  ];
}

let curProc='press';

// ===== 공정 탭 렌더 =====
function renderTabs(){
  const c=document.getElementById('procTabs');
  c.innerHTML='';
  PROCS.forEach(p=>{
    const b=document.createElement('button');
    b.className='ptab'+(p.id===curProc?' on':'');
    b.innerHTML=p.icon+' '+p.name;
    b.onclick=()=>{curProc=p.id;renderTabs();renderCats()};
    c.appendChild(b);
  });
}

// ===== 카테고리 렌더 =====
function renderCats(){
  const c=document.getElementById('catList');
  c.innerHTML='';
  const cats=getCats(curProc);
  cats.forEach(cat=>{
    const el=document.createElement('div');
    el.className='cat';
    el.setAttribute('data-cc',cat.id);

    if(cat.single){
      // 단일 링크
      el.innerHTML=`<a class="cat-single" href="${cat.href}">
        <div class="cat-hdr">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div>
          <div class="cat-arrow">›</div>
        </div></a>`;
    }else{
      // 아코디언
      const subsHtml=(cat.subs||[]).map(s=>{
        const isComing=s.coming;
        return `<a class="sub-link${isComing?' coming':''}" href="${isComing?'#':s.href}"${isComing?' onclick="event.preventDefault();showToast(\'준비중입니다\');"':''}>
          <div class="sub-icon">${s.icon}</div>
          <div class="sub-info"><div class="sub-name">${s.name}</div><div class="sub-desc">${s.desc}</div></div>
          ${!isComing?'<div class="sub-arrow">›</div>':''}
        </a>`;
      }).join('');

      el.innerHTML=`
        <div class="cat-hdr" onclick="toggleCat(this)">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div>
          <div class="cat-arrow">›</div>
        </div>
        <div class="cat-panel">
          <div class="cat-divider"></div>
          <div class="sub-list">${subsHtml}</div>
        </div>`;
    }
    c.appendChild(el);
  });
}

// ===== 아코디언 토글 =====
function toggleCat(hdr){
  const cat=hdr.closest('.cat');
  const panel=cat.querySelector('.cat-panel');
  const isOpen=cat.classList.contains('open');
  // 다른 것 닫기
  document.querySelectorAll('.cat.open').forEach(p=>{
    if(p!==cat){p.classList.remove('open');p.querySelector('.cat-panel').style.maxHeight='0'}
  });
  if(isOpen){
    cat.classList.remove('open');
    panel.style.maxHeight='0';
  }else{
    cat.classList.add('open');
    panel.style.maxHeight=panel.scrollHeight+'px';
    setTimeout(()=>cat.scrollIntoView({block:'nearest',behavior:'smooth'}),100);
  }
}

// ===== 토스트 =====
let tt;
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2000)}

// ===== 초기화 =====
renderTabs();
renderCats();
</script>
</body>
</html>
