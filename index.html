<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESG Smart Factory v2.6</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:40px}
.hdr{padding:14px 16px 12px;background:linear-gradient(180deg,#181b26,#0f1117);border-bottom:1px solid #2a2e3d;text-align:center}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f6d365,#e2b04a,#fda085,#e2b04a,#f6d365);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite;text-shadow:0 0 30px rgba(246,211,101,.15);line-height:1.2}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding:0 4px}
.hdr-bar-left{display:flex;align-items:center;gap:6px}
.hdr-bar-right{display:flex;align-items:center;gap:6px}
.user-info{display:flex;align-items:center;gap:6px;font-size:11px;color:#8b8fa3}
.user-info .uid{color:#e2b04a;font-weight:700;font-size:12px}
.logout-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:5px 11px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit}
.logout-btn:active{transform:scale(.95)}
.cat-list{padding:12px 16px}
.cat{border-radius:14px;margin-bottom:8px;overflow:hidden;border:1px solid #2a2e3d;background:#1a1d27;transition:border-color .3s,background .4s,box-shadow .4s,transform .15s}

/* 편집 모드 */
.edit-toggle{background:rgba(79,140,255,.15);border:1px solid rgba(79,140,255,.3);color:#4f8cff;padding:5px 11px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;font-family:inherit}
.edit-toggle.active{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.5);color:#22c55e}
.edit-toggle:active{transform:scale(.95)}

.edit-bar{display:none;background:linear-gradient(90deg,rgba(79,140,255,.12),rgba(34,197,94,.12));border-bottom:1px solid rgba(79,140,255,.25);padding:10px 16px;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.edit-bar.show{display:flex}
.edit-bar-txt{font-size:11px;color:#a5b4fc;font-weight:600}
.edit-bar-actions{display:flex;gap:6px}
.eb-btn{padding:6px 12px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.eb-reset{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.eb-done{background:rgba(34,197,94,.2);color:#22c55e;border:1px solid rgba(34,197,94,.4)}

body.edit-mode .cat{cursor:grab;border:1px dashed rgba(79,140,255,.4) !important;background:#1e2333 !important;padding-left:24px;position:relative}
body.edit-mode .cat::before{content:'⋮⋮';position:absolute;left:6px;top:50%;transform:translateY(-50%);color:rgba(165,180,252,.6);font-size:16px;letter-spacing:-3px;pointer-events:none;font-weight:700}
body.edit-mode .cat-hdr{pointer-events:none}
body.edit-mode .cat.open{max-height:none}
body.edit-mode .cat-panel{display:none !important}
body.edit-mode .cat.dragging{opacity:.4;border:2px solid #4f8cff !important;transform:scale(.97)}
body.edit-mode .cat.drag-over-top{border-top:3px solid #22c55e !important}
body.edit-mode .cat.drag-over-bottom{border-bottom:3px solid #22c55e !important}
body.edit-mode .cat-single{cursor:grab;text-decoration:none}
.cat.open{border-color:rgba(79,140,255,.3);background:#222838;box-shadow:0 0 20px rgba(79,140,255,.08)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--cb,#1e293b)}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:700}
.cat-desc{font-size:11px;color:#8b8fa3;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#5a5e72;transition:transform .25s;flex-shrink:0;font-size:18px}
.cat-badge{font-size:11px;font-weight:600;flex-shrink:0;color:#5a5e72}
.cat.open .cat-arrow{transform:rotate(90deg);color:var(--c,#4f8cff)}
.cat-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.cat-divider{height:1px;background:#2a2e3d;margin:0 16px}
.sub-list{padding:6px 8px 8px}
.sub-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#e8eaf0;transition:background .12s}
.sub-link:active{background:#222633}
.sub-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.05);flex-shrink:0}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:13px;font-weight:600}
.sub-desc{font-size:10px;color:#8b8fa3;margin-top:1px}
.sub-arrow{color:#5a5e72;font-size:14px;flex-shrink:0}
.sub-link.coming{opacity:.4;pointer-events:none}
.sub-link.coming .sub-name::after{content:' (준비중)';font-size:9px;color:#5a5e72;font-weight:400}
.cat-single{display:block;text-decoration:none;color:inherit}
.cat-single:active .cat{border-color:var(--c,#4f8cff)}
[data-c="master"]{--c:#3b82f6;--cb:rgba(59,130,246,.15)}
[data-c="kpi"]{--c:#0d47a1;--cb:rgba(13,71,161,.15)}
[data-c="production"]{--c:#10b981;--cb:rgba(16,185,129,.15)}
[data-c="attendance"]{--c:#f59e0b;--cb:rgba(245,158,11,.15)}
[data-c="check"]{--c:#22c55e;--cb:rgba(34,197,94,.15)}
[data-c="pmcheck"]{--c:#0ea5e9;--cb:rgba(14,165,233,.15)}
[data-c="lot"]{--c:#f97316;--cb:rgba(249,115,22,.15)}
[data-c="defect"]{--c:#ef4444;--cb:rgba(239,68,68,.15)}
[data-c="parts"]{--c:#a855f7;--cb:rgba(168,85,247,.15)}
[data-c="patrol"]{--c:#06b6d4;--cb:rgba(6,182,212,.15)}
[data-c="meeting"]{--c:#8b5cf6;--cb:rgba(139,92,246,.15)}
[data-c="personal"]{--c:#64748b;--cb:rgba(100,116,139,.15)}
[data-c="backup"]{--c:#22c55e;--cb:rgba(34,197,94,.15)}
[data-c="board"]{--c:#7c3aed;--cb:rgba(124,58,237,.15)}
.footer{text-align:center;padding:20px;font-size:10px;color:rgba(255,255,255,.25);line-height:1.7}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
#analysisCv{display:none}

/* ===== 잠금화면 ===== */
.lock-overlay{position:fixed;inset:0;background:linear-gradient(180deg,#181b26,#0f1117);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lock-logo{font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f6d365,#e2b04a,#fda085,#e2b04a,#f6d365);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite;margin-bottom:6px;text-align:center}
.lock-sub{font-size:12px;color:#8b8fa3;margin-bottom:40px}
.lock-mode{font-size:14px;font-weight:700;color:#e8eaf0;margin-bottom:6px;text-align:center}
.lock-hint{font-size:12px;color:#8b8fa3;margin-bottom:24px;text-align:center;min-height:18px}
.lock-hint.err{color:#ef4444}
.lock-hint.ok{color:#22c55e}

.pin-dots{display:flex;gap:12px;margin-bottom:32px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:#2a2e3d;border:2px solid #2a2e3d;transition:all .15s}
.pin-dot.filled{background:#e2b04a;border-color:#e2b04a;box-shadow:0 0 10px rgba(226,176,74,.4)}
.pin-dot.err{background:#ef4444;border-color:#ef4444;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.keypad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;justify-content:center}
.key{width:72px;height:72px;border-radius:50%;background:#1a1d27;border:1.5px solid #2a2e3d;color:#e8eaf0;font-size:26px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s;display:flex;align-items:center;justify-content:center}
.key:active{background:#2a2e3d;transform:scale(.92)}
.key.fn{background:transparent;border:none;font-size:14px;color:#8b8fa3;font-weight:500}
.key.fn:active{background:rgba(255,255,255,.05)}
.key.del{font-size:22px}

.lock-actions{margin-top:28px;display:flex;gap:16px;font-size:12px}
.lock-link{color:#8b8fa3;text-decoration:none;padding:8px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lock-link:active{color:#e2b04a}

.lockout{color:#ef4444;font-size:13px;font-weight:600;text-align:center;margin-bottom:16px}

body.locked{overflow:hidden}

.loading{width:24px;height:24px;border:3px solid #2a2e3d;border-top-color:#e2b04a;border-radius:50%;animation:spin 0.8s linear infinite;margin:8px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 미열람 문서 알림 팝업 ===== */
.doc-alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99998;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.doc-alert-overlay.show{display:flex;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.doc-alert-box{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid #f59e0b;border-radius:18px;width:100%;max-width:440px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(245,158,11,.3);animation:popIn .35s cubic-bezier(.4,1.6,.4,1)}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.doc-alert-header{padding:18px 20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f172a;text-align:center}
.doc-alert-header .icon{font-size:42px;line-height:1;margin-bottom:6px;display:block}
.doc-alert-header .title{font-size:18px;font-weight:900;letter-spacing:-.3px}
.doc-alert-header .subtitle{font-size:12px;font-weight:600;margin-top:4px;opacity:.85}
.doc-alert-body{padding:14px 18px;overflow-y:auto;flex:1}
.doc-alert-summary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 14px;margin-bottom:12px;text-align:center;font-size:12px;color:#fcd34d;font-weight:700;line-height:1.4}
.doc-alert-summary .count{font-size:30px;font-weight:900;color:#f59e0b;display:block;line-height:1.1;margin-bottom:2px}
.doc-alert-list{max-height:240px;overflow-y:auto}
.doc-alert-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;line-height:1.5}
.doc-alert-item.urgent{border-color:#ef4444;background:linear-gradient(90deg,rgba(239,68,68,.1),#0f172a 40%)}
.doc-alert-item .da-no{color:#94a3b8;font-size:10px;font-weight:700;letter-spacing:1px}
.doc-alert-item .da-title{color:#f1f5f9;font-weight:700;margin:2px 0}
.doc-alert-item .da-desc{color:#cbd5e1;font-size:11px;line-height:1.5;margin:6px 0;padding:6px 8px;background:rgba(56,189,248,.08);border-left:3px solid #38bdf8;border-radius:4px;white-space:pre-wrap;word-break:break-word;max-height:80px;overflow-y:auto}
.doc-alert-item .da-meta{color:#64748b;font-size:10px}
.doc-alert-item .due-warn{color:#fca5a5;font-weight:700}
.doc-alert-footer{padding:14px 18px;border-top:1px solid #334155;display:grid;grid-template-columns:1fr 2fr;gap:8px;background:#1e293b}
.doc-alert-btn{padding:13px;font-size:14px;font-weight:800;border:none;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:-.2px}
.doc-alert-btn-skip{background:#334155;color:#cbd5e1}
.doc-alert-btn-go{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.doc-alert-btn:active{transform:scale(.96)}
.doc-alert-snooze{text-align:center;padding:0 18px 12px;font-size:11px;color:#64748b}
.doc-alert-snooze a{color:#94a3b8;text-decoration:underline;cursor:pointer}
</style>
</head>
<body class="locked">

<!-- 잠금화면 -->
<div class="lock-overlay" id="lockScr">
  <div class="lock-logo">ESG Smart Factory</div>
  <div class="lock-sub">페이퍼리스 생산현장 통합관리</div>

  <div class="lock-mode">PIN 입력</div>

    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>

    <a href="./admin_pin.html" class="lock-link">🔐 관리자</a>

</div>

<div class="hdr">

</div>

<!-- 편집 모드 안내바 -->
<div class="edit-bar" id="editBar">

  </div>
</div>

<div class="cat-list" id="catList"></div>

<script>
const B='https://knagbyeongju-123.github.io/smtec_main2/';
const CATS=[
  {id:'production',icon:'🏭',name:'생산현황',desc:'MES 실시간 설비가동·잔여시간·측정준비 알림',single:true,href:B+'mes_work.html'},

  {id:'check',icon:'🔧',name:'일상점검',desc:'종합현황 · 생산설비 · 검사기 · 세척기 · 출하공정',subs:[

    {icon:'🏭',name:'생산설비',desc:'생산설비 일상점검 체크시트',href:B+'P_machine_check.html'},
    {icon:'🔬',name:'검사기',desc:'검사장비 일상점검 · 텔레그램 알림',href:B+'QC_machine_check.html'},

    {icon:'🔩',name:'출하SBC',desc:'레이스웨이 출하 · 생산일자 LOT 추적',href:B+'shipment_raceway.html'},

/* ============= 드래그앤드롭 (터치/마우스 통합) ============= */
var dragState={el:null,startY:0,currentY:0,offsetY:0,placeholder:null,items:[]};

function attachDragHandlers(){
  var list=document.getElementById('catList');
  list.querySelectorAll('[data-cat-id]').forEach(function(item){
    var card=item.classList.contains('cat')?item:item.querySelector('.cat');
    // 기존 핸들러 제거
    item.removeEventListener('touchstart',onDragStart);
    item.removeEventListener('mousedown',onDragStart);
    // 재등록
    item.addEventListener('touchstart',onDragStart,{passive:false});
    item.addEventListener('mousedown',onDragStart);
  });
}

function detachDragHandlers(){
  var list=document.getElementById('catList');
  list.querySelectorAll('[data-cat-id]').forEach(function(item){
    item.removeEventListener('touchstart',onDragStart);
    item.removeEventListener('mousedown',onDragStart);
  });
}

function getY(e){
  if(e.touches&&e.touches.length)return e.touches[0].clientY;
  if(e.changedTouches&&e.changedTouches.length)return e.changedTouches[0].clientY;
  return e.clientY;
}

function onDragStart(e){
  if(!document.body.classList.contains('edit-mode'))return;
  var item=e.currentTarget;
  e.preventDefault();
  dragState.el=item;
  dragState.startY=getY(e);
  dragState.currentY=dragState.startY;
  item.classList.add('dragging');
  var card=item.classList.contains('cat')?item:item.querySelector('.cat');
  if(card)card.classList.add('dragging');
  // 리스너 등록
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('touchend',onDragEnd);
  document.addEventListener('mouseup',onDragEnd);
}

function onDragMove(e){
  if(!dragState.el)return;
  e.preventDefault();
  dragState.currentY=getY(e);
  var el=dragState.el;
  var elRect=el.getBoundingClientRect();
  var elMid=elRect.top+elRect.height/2;
  // 마우스/터치 위치에 있는 다른 카드 찾기
  var list=document.getElementById('catList');
  var items=Array.from(list.querySelectorAll('[data-cat-id]'));
  // 드래그 오버 표시 초기화
  items.forEach(function(i){
    var c=i.classList.contains('cat')?i:i.querySelector('.cat');
    if(c){c.classList.remove('drag-over-top');c.classList.remove('drag-over-bottom')}
  });
  // 현재 포인터 위치의 카드
  var pointerEl=document.elementFromPoint(elRect.left+elRect.width/2, dragState.currentY);
  if(!pointerEl)return;
  var target=pointerEl.closest('[data-cat-id]');
  if(!target||target===el)return;
  var rect=target.getBoundingClientRect();
  var isAbove=dragState.currentY<rect.top+rect.height/2;
  var tcard=target.classList.contains('cat')?target:target.querySelector('.cat');
  if(tcard){
    if(isAbove)tcard.classList.add('drag-over-top');
    else tcard.classList.add('drag-over-bottom');
  }
  // 실제 순서 변경
  if(isAbove)list.insertBefore(el,target);
  else list.insertBefore(el,target.nextSibling);
}

function onDragEnd(e){
  if(!dragState.el)return;
  var el=dragState.el;
  el.classList.remove('dragging');
  var card=el.classList.contains('cat')?el:el.querySelector('.cat');
  if(card)card.classList.remove('dragging');
  // 드래그 오버 표시 정리
  document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(function(c){
    c.classList.remove('drag-over-top');c.classList.remove('drag-over-bottom')
  });
  // 현재 순서 저장
  var list=document.getElementById('catList');
  var order=Array.from(list.querySelectorAll('[data-cat-id]')).map(function(i){return i.getAttribute('data-cat-id')});
  saveOrder(order);
  // 리스너 해제
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  document.removeEventListener('mouseup',onDragEnd);
  dragState.el=null;
}

async function sha256hex(s){
  const b=new TextEncoder().encode(s);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function handlePinComplete(){
  busy = true;
  setHint('확인 중...');
  try{
    const pinHash = await sha256hex(curPin);
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/' + TBL + '?select=name&pin_hash=eq.' + pinHash,

    );

    if(data && data.length > 0){
      const name = data[0].name;
      clearFail();

      setHint('인증 완료: ' + name, 'ok');
      setTimeout(()=>unlock(name), 300);
    }else{
      const f = getFail();
      f.count = (f.count||0) + 1;
      if(f.count >= MAX_FAIL){
        f.until = Date.now() + LOCKOUT_SEC*1000;
        f.count = 0;

      }

    }
  }catch(err){
    setHint('❌ 네트워크 오류', 'err');
    shakeDots();
  }finally{
    busy = false;
  }

function checkLockout(){
  const f = getFail();
  const msg = document.getElementById('lockoutMsg');
  const remain = f.until - Date.now();
  if(remain > 0){
    msg.style.display = 'block';
    const upd = ()=>{
      const r = Math.ceil((f.until-Date.now())/1000);
      if(r<=0){
        msg.style.display='none';
        clearFail();
        clearInterval(lockTimer);
        setHint('4자리 PIN을 입력하세요');
        return;
      }
      msg.textContent = '🔒 잠금: '+r+'초 후 재시도';
    };
    upd();
    clearInterval(lockTimer);
    lockTimer = setInterval(upd, 1000);
  }else{
    msg.style.display = 'none';
  }
}

  try{
    const auth=JSON.parse(localStorage.getItem(LK_AUTH)||'null');
    if(auth&&auth.pin&&auth.pin.length>0){
      return DOC_PIN_DEPT_MAP[auth.pin.charAt(0)]||'';
    }
  }catch(e){}
  return '';
}

function parseTargets(t){if(!t)return[];try{return Array.isArray(t)?t:JSON.parse(t)}catch(e){return[]}}

function daysUntilDoc(dateStr){
  if(!dateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr);
  return Math.floor((d-today)/(1000*60*60*24));
}

function fmtDateDoc(s){if(!s)return'-';return s.substring(5,10).replace('-','/')}

async function checkUnreadDocs(silent){
  // silent=true이면 팝업 표시 없이 배지만 갱신
  
  // 1. 명시적 스누즈 체크 (사용자가 "1시간 동안 안 보기" 클릭한 경우)
  //    silent 모드에서도 배지는 갱신해야 함
  let snoozed=false;
  try{
    const snz=parseInt(localStorage.getItem(DOC_SNOOZE_KEY)||'0');
    if(snz>Date.now())snoozed=true;
  }catch(e){}
  
  const me=getUserKey();
  if(!me||me==='default')return;
  const myDept=getMyPinDept();
  
  try{
    // 2. 활성 문서 가져오기
    const docs=await docSbReq('doc_register?status=eq.active&select=id,doc_no,title,doc_type,deadline,target_depts,target_users,registered_by,description&order=registered_at.desc');
    if(!docs||!docs.length){updateUnreadBadge(0);return}
    
    // 3. 본인 확인 이력 가져오기
    const logs=await docSbReq('doc_view_log?viewer_name=eq.'+encodeURIComponent(me)+'&select=doc_id');
    const confirmedIds=new Set((logs||[]).map(l=>l.doc_id));
    
    // 4. 본인이 대상자인 미열람 문서 필터
    const unread=docs.filter(d=>{
      if(confirmedIds.has(d.id))return false;
      const targetDepts=parseTargets(d.target_depts);
      const targetUsers=parseTargets(d.target_users);
      if(targetUsers.includes(me))return true;
      if(myDept&&targetDepts.includes(myDept))return true;
      if(!targetDepts.length&&!targetUsers.length)return true;
      return false;
    });
    
    if(!unread.length){
      // 미열람 0건 - 마지막 표시 기록도 정리 + 헤더 배지 숨김
      try{localStorage.removeItem(DOC_LAST_SHOWN_KEY)}catch(e){}
      updateUnreadBadge(0);
      return;
    }
    
    // 헤더 배지는 항상 갱신 (팝업과 별개로 시각적 알림)
    updateUnreadBadge(unread.length);
    
    // silent 모드면 배지만 갱신하고 팝업은 안 띄움
    if(silent||snoozed)return;
    
    // 5. 스마트 표시 판단 - 다음 중 하나라도 만족해야 표시:
    //    A. 새로운 미열람 문서가 추가됨 (지난번 표시 후 등록된 문서)
    //    B. 마감 임박 (2일 이내) 문서가 있음
    //    C. 마지막 표시 후 30분 이상 경과
    //    D. 처음 보는 경우
    let lastShown={ts:0,ids:[]};
    try{
      const raw=localStorage.getItem(DOC_LAST_SHOWN_KEY);
      if(raw)lastShown=JSON.parse(raw);
    }catch(e){}
    
    const currentIds=unread.map(d=>d.id).sort();
    const lastIds=(lastShown.ids||[]).sort();
    const sameAsLast=JSON.stringify(currentIds)===JSON.stringify(lastIds);
    const hasUrgent=unread.some(d=>{const days=daysUntilDoc(d.deadline);return days!==null&&days<=2});
    const minutesSinceLast=lastShown.ts?Math.floor((Date.now()-lastShown.ts)/60000):999;
    const isFirstTime=!lastShown.ts;
    const hasNewDocs=!sameAsLast; // 문서 목록이 바뀌면 = 새로 등록된 것
    
    let shouldShow=false;
    if(isFirstTime){
      shouldShow=true; // 처음
    }else if(hasNewDocs){
      shouldShow=true; // 새 문서 등록됨
    }else if(hasUrgent&&minutesSinceLast>=DOC_AUTO_SUPPRESS_MIN){
      shouldShow=true; // 마감 임박 + 30분 경과
    }else if(minutesSinceLast>=DOC_AUTO_SUPPRESS_MIN*4){
      shouldShow=true; // 일반 미열람도 2시간 경과 시 한 번 더 알림
    }
    
    if(!shouldShow)return;
    
    // 6. 마감 임박/경과 우선 정렬
    unread.sort((a,b)=>{
      const da=daysUntilDoc(a.deadline);
      const db=daysUntilDoc(b.deadline);
      if(da===null&&db===null)return 0;
      if(da===null)return 1;
      if(db===null)return -1;
      return da-db;
    });
    
    // 7. 표시 + 마지막 표시 기록
    showDocAlert(unread);
    try{localStorage.setItem(DOC_LAST_SHOWN_KEY,JSON.stringify({ts:Date.now(),ids:currentIds}))}catch(e){}
  }catch(e){
    console.warn('미열람 문서 체크 실패:',e.message);
  }
}

function showDocAlert(unread){
  const urgent=unread.filter(d=>{const days=daysUntilDoc(d.deadline);return days!==null&&days<=2});
  const TYPE_NAMES={drawing:'📐 도면',meeting:'📋 회의',iso:'📊 ISO',etc:'📁 문서'};
  
  document.getElementById('docAlertCount').textContent=unread.length;
  if(urgent.length){
    document.getElementById('docAlertUrgentInfo').style.display='';
    document.getElementById('docAlertUrgentCount').textContent=urgent.length;
  }else{
    document.getElementById('docAlertUrgentInfo').style.display='none';
  }
  
  // 최대 5건만 표시 (나머지는 +N건)
  const showItems=unread.slice(0,5);
  const html=showItems.map(d=>{
    const days=daysUntilDoc(d.deadline);
    let badge='';
    let cls='doc-alert-item';
    if(days!==null){
      if(days<0){cls+=' urgent';badge='<span class="due-warn">⏰ 마감 '+(-days)+'일 경과</span>'}
      else if(days<=2){cls+=' urgent';badge='<span class="due-warn">⚠️ '+(days===0?'오늘 마감':days+'일 남음')+'</span>'}
      else badge='<span>마감 '+fmtDateDoc(d.deadline)+'</span>';
    }
    // 체크내용/지시사항 (description) - 너무 길면 200자에서 자르기
    let descHtml='';
    if(d.description){
      const desc=String(d.description).trim();
      if(desc){
        const shown=desc.length>200?desc.substring(0,200)+'...':desc;
        descHtml='<div class="da-desc">📝 '+escHtmlIdx(shown)+'</div>';
      }
    }
    return '<div class="'+cls+'">'+
      '<div class="da-no">'+escHtmlIdx(d.doc_no||'-')+' · '+(TYPE_NAMES[d.doc_type]||'📁 문서')+'</div>'+
      '<div class="da-title">'+escHtmlIdx(d.title||'-')+'</div>'+
      descHtml+
      '<div class="da-meta">👤 '+escHtmlIdx(d.registered_by||'-')+' '+badge+'</div>'+
      '</div>';
  }).join('');
  
  let listHtml=html;
  if(unread.length>5){
    listHtml+='<div style="text-align:center;padding:10px;color:#64748b;font-size:11px;font-weight:700">+ 외 '+(unread.length-5)+'건 더 있음</div>';
  }
  document.getElementById('docAlertList').innerHTML=listHtml;
  document.getElementById('docAlertOverlay').classList.add('show');
}

function escHtmlIdx(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function updateUnreadBadge(count){
  const badge=document.getElementById('docUnreadBadge');
  const cnt=document.getElementById('docUnreadCount');
  if(!badge||!cnt)return;
  if(count>0){
    cnt.textContent=count;
    badge.style.display='inline-flex';
  }else{
    badge.style.display='none';
  }
}

function skipDocAlert(){
  document.getElementById('docAlertOverlay').classList.remove('show');
}

function goDocReview(){
  document.getElementById('docAlertOverlay').classList.remove('show');
  location.href='doc_review.html';
}

/* ============================================================
   🔧 일상점검 미실시 체크 (가동중 설비 vs 오늘 점검이력)
   ============================================================ */
const CHECK_SB_URL = 'https://omngtyewdaqpphnzeate.supabase.co';
const CHECK_SB_KEY = 'sb_publishable_9j2YkkL-7ul1TrhH-NjVdQ_vWDG2-1D';
const CHECK_TOAST_KEY = 'esg_check_alert_lastshown';

async function checkSbReq(path){
  const r=await fetch(CHECK_SB_URL+'/rest/v1/'+path,{headers:{apikey:CHECK_SB_KEY,Authorization:'Bearer '+CHECK_SB_KEY}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

function todayKstStr(){
  const fmt=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit'});
  const p={};fmt.formatToParts(new Date()).forEach(x=>{if(x.type!=='literal')p[x.type]=x.value});
  return p.year+'-'+p.month+'-'+p.day;
}

async function checkPendingMachineChecks(silent){
  try{
    /* 0) 로그인한 본인 이름 확인 - 없으면 알림 안 함 */
    const me = getUserKey();
    if(!me || me==='default'){ updateCheckBadge(0); return; }

    /* 1) 본인이 작업자(worker)로 등록된 가동중 설비만 조회
          machine_status='N' = 가동, worker = MES에 등록된 현재 작업자 */
    const machines = await checkSbReq(
      "machine_status?select=machine_code,machine_name,machine_status,worker"+
      "&machine_status=eq.N"+
      "&worker=eq."+encodeURIComponent(me)
    );
    if(!machines||!machines.length){ updateCheckBadge(0); return; }

    /* 2) 오늘 점검 이력 조회 — 본인이 점검한 것만 */
    const today=todayKstStr();
    const checks=await checkSbReq(
      "p_machine_check?select=machine&check_date=eq."+today
    );
    const checkedSet=new Set((checks||[]).map(c=>String(c.machine||'').trim()));

    /* 3) 본인 담당 가동중 설비 중 오늘 점검 안된 것 */
    const pending=machines.filter(m=>{
      const name=String(m.machine_name||'').trim();
      if(!name)return false;
      return !checkedSet.has(name);
    });

    updateCheckBadge(pending.length);

    /* 4) 본인 담당이 1건 이상 미점검이면 토스트 (1시간 내 중복 방지) */
    if(silent||pending.length===0)return;
    let lastShown=0;
    try{lastShown=parseInt(localStorage.getItem(CHECK_TOAST_KEY)||'0')}catch(e){}
    if(Date.now()-lastShown<60*60*1000)return; /* 1시간 내 재표시 안함 */

    showCheckToast(pending.length, pending, me);
    try{localStorage.setItem(CHECK_TOAST_KEY,String(Date.now()))}catch(e){}
  }catch(e){
    console.warn('일상점검 체크 실패:',e.message);
  }
}

function updateCheckBadge(count){
  const badge=document.getElementById('checkAlertBadge');
  const cnt=document.getElementById('checkAlertCount');
  if(!badge||!cnt)return;
  if(count>0){
    cnt.textContent=count;
    badge.style.display='inline-flex';
  }else{
    badge.style.display='none';
  }
}

function showCheckToast(count, pending, userName){
  const names=(pending||[]).slice(0,5).map(m=>m.machine_name).join(', ');
  const more=pending.length>5?(' 외 '+(pending.length-5)+'대'):'';
  const who=userName?userName+' 작업자님, ':'';
  const msg='⚠️ '+who+'담당 설비 일상점검 필요\n'+count+'대 미점검: '+names+more;
  /* toast 기존 영역 활용 */
  const e=document.getElementById('toast');
  if(e){
    e.textContent=msg;
    e.style.background='rgba(220,38,38,.95)';
    e.style.whiteSpace='pre-line';
    e.style.maxWidth='90%';
    e.style.cursor='pointer';
    e.onclick=()=>{ goCheckPage() };
    e.classList.add('show');
    /* 토스트는 8초간 표시 */
    clearTimeout(window._checkToastTimer);
    window._checkToastTimer=setTimeout(()=>{
      e.classList.remove('show');
      e.style.background='';e.style.whiteSpace='';e.style.maxWidth='';e.style.cursor='';e.onclick=null;
    },8000);
  }
}

function goCheckPage(){
  location.href='P_machine_check.html';
}

function snoozeDocAlert(minutes){
  try{
    const until=Date.now()+minutes*60*1000;
    localStorage.setItem(DOC_SNOOZE_KEY,String(until));
  }catch(e){}
  document.getElementById('docAlertOverlay').classList.remove('show');
}
