<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESG Smart Factory</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:40px}
.hdr{padding:28px 20px 18px;background:linear-gradient(180deg,#181b26,#0f1117);border-bottom:1px solid #2a2e3d;text-align:center}
.hdr-title{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:12px;color:#8b8fa3;margin-top:3px}
.cat-list{padding:12px 16px}
.cat{border-radius:14px;margin-bottom:8px;overflow:hidden;border:1px solid #2a2e3d;background:#1a1d27;transition:border-color .3s,background .4s,box-shadow .4s}
.cat.open{border-color:rgba(79,140,255,.3);background:#222838;box-shadow:0 0 20px rgba(79,140,255,.08)}
.cat-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--cb,#1e293b)}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:700}
.cat-desc{font-size:11px;color:#8b8fa3;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-arrow{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#5a5e72;transition:transform .25s;flex-shrink:0;font-size:18px}
.cat.open .cat-arrow{transform:rotate(90deg);color:var(--c,#4f8cff)}
.cat-panel{max-height:0;overflow:hidden;transition:max-height .3s ease}
.cat-divider{height:1px;background:#2a2e3d;margin:0 16px}
.sub-list{padding:6px 8px 8px}
.sub-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#e8eaf0;transition:background .12s}
.sub-link:active{background:#222633}
.sub-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.05);flex-shrink:0}
.sub-info{flex:1;min-width:0}
.sub-name{font-size:13px;font-weight:600}
.sub-desc{font-size:10px;color:#8b8fa3;margin-top:1px}
.sub-arrow{color:#5a5e72;font-size:14px;flex-shrink:0}
.sub-link.coming{opacity:.4;pointer-events:none}
.sub-link.coming .sub-name::after{content:' (준비중)';font-size:9px;color:#5a5e72;font-weight:400}
.cat-single{display:block;text-decoration:none;color:inherit}
.cat-single:active .cat{border-color:var(--c,#4f8cff)}
[data-c="master"]{--c:#3b82f6;--cb:rgba(59,130,246,.15)}
[data-c="kpi"]{--c:#0d47a1;--cb:rgba(13,71,161,.15)}
[data-c="attendance"]{--c:#f59e0b;--cb:rgba(245,158,11,.15)}
[data-c="check"]{--c:#22c55e;--cb:rgba(34,197,94,.15)}
[data-c="lot"]{--c:#f97316;--cb:rgba(249,115,22,.15)}
[data-c="defect"]{--c:#ef4444;--cb:rgba(239,68,68,.15)}
[data-c="parts"]{--c:#a855f7;--cb:rgba(168,85,247,.15)}
[data-c="patrol"]{--c:#06b6d4;--cb:rgba(6,182,212,.15)}
[data-c="meeting"]{--c:#8b5cf6;--cb:rgba(139,92,246,.15)}
[data-c="personal"]{--c:#64748b;--cb:rgba(100,116,139,.15)}
[data-c="backup"]{--c:#22c55e;--cb:rgba(34,197,94,.15)}
[data-c="board"]{--c:#7c3aed;--cb:rgba(124,58,237,.15)}
.footer{text-align:center;padding:20px;font-size:10px;color:rgba(255,255,255,.25);line-height:1.7}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.scan-result{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:10px;padding:12px;margin-bottom:12px;display:none}.scan-result.show{display:block}.scan-result.fail{background:#ffebee;border-color:#ef9a9a}
.sr-val{font-size:18px;font-weight:700;color:#2e7d32;word-break:break-all}.scan-result.fail .sr-val{color:#c62828}.sr-fmt{font-size:11px;color:#1565c0;margin-top:2px}
#analysisCv{display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">ESG Smart Factory</div>
  <div class="hdr-sub">페이퍼리스 생산현장 통합관리</div>
</div>
<div class="cat-list" id="catList"></div>
<div class="footer">ESG Smart Factory v2.0</div>

<canvas id="analysisCv" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script>
const B='https://knagbyeongju-123.github.io/smtec_main2/';
const CATS=[
  {id:'master',icon:'📋',name:'마스터관리',desc:'설비·품번·작업자·고객사 마스터 통합관리',single:true,href:B+'master_manage.html'},
  {id:'kpi',icon:'📊',name:'KPI관리',desc:'IATF 16949 프로세스별 성과지표 등록·실적·추이분석',single:true,href:'https://kimsanggi85-del.github.io/ESG_KIP-Team-process/'},
  {id:'attendance',icon:'🗓',name:'근태관리',desc:'연장근무 보고서 · 연차신청 · 사원관리',single:true,href:B+'leave_request.html'},
  {id:'check',icon:'🔧',name:'일상점검',desc:'생산설비·검사기·세척기 일일 점검',subs:[
    {icon:'🏭',name:'생산설비',desc:'생산설비 일상점검 체크시트',href:B+'P_machine_check.html'},
    {icon:'🔬',name:'검사기',desc:'검사장비 일상점검 · 텔레그램 알림',href:B+'QC_machine_check.html'},
    {icon:'🧼',name:'세척기',desc:'세척설비 시작전/작업중 점검 · 기준사진',href:B+'wash_machine_check.html'}
  ]},
  {id:'lot',icon:'📦',name:'로트관리',desc:'소재입고 · 생산 · 출하 로트 추적',subs:[
    {icon:'🪨',name:'소재',desc:'소재업체 템플릿 업로드 → DB 저장',href:B+'material_upload.html'},
    {icon:'⚙️',name:'생산',desc:'공정별 이동관리 · 외주업체 연동',href:B+'lot_tracking_tj.html'},
    {icon:'📊',name:'소재재공',desc:'미생산·잔여소재 기반 기종별 생산가능 수량분석',href:B+'production_forecast.html'},
    {icon:'📤',name:'출하SKF씰',desc:'출고등록 · 생산일자 LOT · 박스단위',href:B+'request_outgoing.html'},
    {icon:'🔩',name:'출하SBC',desc:'레이스웨이 출하 · 생산일자 LOT 추적',href:B+'shipment_raceway.html'},
    {icon:'🏭',name:'출하일반',desc:'일반기종 출하 · 고객사별 이력관리',href:B+'shipment_general.html'}
  ]},
  {id:'defect',icon:'❌',name:'불량관리',desc:'외관불량 등록·통계 · 치수추이 분석',subs:[
    {icon:'👁️',name:'외관불량관리',desc:'기판 영역별 불량등록 · 이력추적 · 통계분석',href:B+'defect.html'},
    {icon:'📐',name:'치수추이관리',desc:'공차한계 80% 임박 모니터링 · 관리도 그래프',href:B+'QC_dim.html'}
  ]},
  {id:'parts',icon:'🔩',name:'부품/잔량',desc:'예비품·소모품 재고 · 잔량 혼입방지',subs:[
    {icon:'🎭',name:'예비품관리',desc:'이동등록 · 재고현황 · 잔여수명 · 폐기관리',href:B+'mask.html'},
    {icon:'📊',name:'잔량관리',desc:'잔량 혼입 방지 · QR스캔 보관/사용',href:B+'QC_inventory.html'},
    {icon:'🔧',name:'금형부품관리',desc:'금형별 부품 장착/보관 현황 관리',href:B+'mold_parts.html'}
  ]},
  {id:'patrol',icon:'🛡️',name:'공정점검',desc:'공정순회 점검 · 안전설비 환경 점검',subs:[
    {icon:'🔄',name:'공정점검',desc:'설비·라인 점검 체크리스트 및 이력',href:B+'line_patrol.html'},
    {icon:'⚠️',name:'안전점검',desc:'안전설비·보호구·환경 점검',href:B+'safety_check.html'}
  ]},
  {id:'meeting',icon:'💬',name:'회의',desc:'회의록 · 화상회의',subs:[
    {icon:'📝',name:'회의록',desc:'회의 내용 기록·관리',href:B+'meeting.html'},
    {icon:'🎥',name:'화상회의',desc:'온라인 화상회의 연결',href:B+'videomeeting.html'}
  ]},
  {id:'personal',icon:'👤',name:'개인관리',desc:'일정·차량·카드·외근 관리',subs:[
    {icon:'📅',name:'일정관리',desc:'개인 업무일정 관리',href:B+'schedule.html'},
    {icon:'🚗',name:'차량카드외근관리',desc:'차량·법인카드·외근 기록',href:B+'cardcar.html'}
  ]},
  {id:'backup',icon:'💾',name:'백업',desc:'데이터 백업 · 표준문서',subs:[
    {icon:'☁️',name:'백업보관',desc:'Google Drive 데이터 백업',href:B+'backup_supabase_archive.html'},
    {icon:'📋',name:'작업표준 검색',desc:'구글드라이브 표준문서 검색·열람',href:B+'gdrive_standard.html'}
  ]},
  {id:'board',icon:'📝',name:'게시판',desc:'수정요청 · 버그신고 · 개선제안 · 공지',subs:[
    {icon:'🔧',name:'수정요청 게시판',desc:'시스템 개선요청 · 버그신고 · 공지사항',href:B+'board.html'}
  ]}
];

function renderCats(){
  const c=document.getElementById('catList');c.innerHTML='';
  CATS.forEach(cat=>{
    if(cat.single){
      const a=document.createElement('a');a.className='cat-single';a.href=cat.href;
      a.innerHTML='<div class="cat" data-c="'+cat.id+'"><div class="cat-hdr"><div class="cat-icon">'+cat.icon+'</div><div class="cat-info"><div class="cat-name">'+cat.name+'</div><div class="cat-desc">'+cat.desc+'</div></div><div class="cat-arrow">›</div></div></div>';
      c.appendChild(a);
    }else{
      const el=document.createElement('div');el.className='cat';el.setAttribute('data-c',cat.id);
      const sh=(cat.subs||[]).map(s=>{const cm=s.coming;return '<a class="sub-link'+(cm?' coming':'')+'" href="'+(cm?'#':s.href)+'"'+(cm?' onclick="event.preventDefault();showToast(\'준비중입니다\')"':'')+'><div class="sub-icon">'+s.icon+'</div><div class="sub-info"><div class="sub-name">'+s.name+'</div><div class="sub-desc">'+s.desc+'</div></div>'+(!cm?'<div class="sub-arrow">›</div>':'')+'</a>'}).join('');
      el.innerHTML='<div class="cat-hdr" onclick="toggleCat(this)"><div class="cat-icon">'+cat.icon+'</div><div class="cat-info"><div class="cat-name">'+cat.name+'</div><div class="cat-desc">'+cat.desc+'</div></div><div class="cat-arrow">›</div></div><div class="cat-panel"><div class="cat-divider"></div><div class="sub-list">'+sh+'</div></div>';
      c.appendChild(el);
    }
  });
}
function toggleCat(h){const cat=h.closest('.cat'),p=cat.querySelector('.cat-panel'),o=cat.classList.contains('open');document.querySelectorAll('.cat.open').forEach(x=>{if(x!==cat){x.classList.remove('open');x.querySelector('.cat-panel').style.maxHeight='0'}});if(o){cat.classList.remove('open');p.style.maxHeight='0'}else{cat.classList.add('open');p.style.maxHeight=p.scrollHeight+'px';setTimeout(()=>cat.scrollIntoView({block:'nearest',behavior:'smooth'}),100)}}

let tt;function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2000)}
renderCats();
</script>
</body>
</html>
