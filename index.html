<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>(주)에스엠텍 스마트 팩토리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%);min-height:100vh;color:#fff;display:flex;flex-direction:column}
.hdr{padding:40px 20px 16px;text-align:center}
.hdr-logo{font-size:11px;font-weight:600;letter-spacing:2px;color:#93c5fd;text-transform:uppercase;margin-bottom:8px}
.hdr-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.hdr-sub{font-size:12px;color:#93c5fd;font-weight:400}
.clock{text-align:center;padding:10px 0 24px;font-size:28px;font-weight:700;letter-spacing:2px;color:#e0f2fe}
.clock-date{font-size:12px;color:#7dd3fc;letter-spacing:1px;margin-top:2px}
.cards{padding:0 16px 16px;display:flex;flex-direction:column;gap:12px;flex:1}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#7dd3fc;text-transform:uppercase;padding:0 4px;margin-bottom:2px;margin-top:6px}
.app-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
.app-card:active{transform:scale(.97);background:rgba(255,255,255,.13)}
.app-icon{font-size:32px;flex-shrink:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(255,255,255,.1)}
.app-info{flex:1;min-width:0}
.app-name{font-size:16px;font-weight:700;margin-bottom:3px}
.app-desc{font-size:11px;color:#93c5fd;line-height:1.5}
.app-arrow{font-size:18px;color:rgba(255,255,255,.35);flex-shrink:0}
.app-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
.badge-common{background:rgba(99,179,237,.25);color:#90cdf4}
.badge-ind{background:rgba(154,230,180,.2);color:#9ae6b4}
.footer{text-align:center;padding:20px;font-size:10px;color:rgba(255,255,255,.3);line-height:1.7}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">SMTECH Co., Ltd.</div>
  <div class="hdr-title">Smart Factory Platform</div>
  <div class="hdr-sub">(주)에스엠텍</div>
</div>
<div class="clock">
  <div id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate">----.--.--</div>
</div>
<div class="cards">
  <div class="section-label">공용 시스템</div>
  <a class="app-card" href="https://knagbyeongju-123.github.io/smtec_main2/lot_tracking.html">
    <div class="app-icon">📦</div>
    <div class="app-info">
      <div class="app-name">로트 추적관리 시스템<span class="app-badge badge-common">공용</span></div>
      <div class="app-desc">자재 이동 · 세팅체크 · 교환체크 · 이력관리</div>
    </div>
    <div class="app-arrow">›</div>
  </a>
  <a class="app-card" href="https://knagbyeongju-123.github.io/smtec_main2/mask.html">
    <div class="app-icon">🎭</div>
    <div class="app-info">
      <div class="app-name">메탈마스크 관리<span class="app-badge badge-common">공용</span></div>
      <div class="app-desc">이동등록 · 재고현황 · 잔여수명 · 폐기관리</div>
    </div>
    <div class="app-arrow">›</div>
  </a>
  <div class="section-label" style="margin-top:10px">개별 시스템</div>
  <a class="app-card" href="https://knagbyeongju-123.github.io/smtec_main2/line_patrol.html">
    <div class="app-icon">🔧</div>
    <div class="app-info">
      <div class="app-name">공정점검<span class="app-badge badge-ind">개별</span></div>
      <div class="app-desc">설비 · 라인 점검 체크리스트 및 이력</div>
    </div>
    <div class="app-arrow">›</div>
  </a>
</div>
<div class="footer">
  © 2025 (주)에스엠텍 · SMTECH Co., Ltd.<br>
  Smart Factory Platform v1.0
</div>
<script>
function tick(){
  const now=new Date();
  document.getElementById('clockTime').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockDate').textContent=now.getFullYear()+'.'+(String(now.getMonth()+1).padStart(2,'0'))+'.'+String(now.getDate()).padStart(2,'0');
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
