<script>
(function(){
  function generateIcon(size){
    const c=document.createElement('canvas');c.width=size;c.height=size;const ctx=c.getContext('2d');const s=size/512;const r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const bg=ctx.createLinearGradient(0,0,size,size);bg.addColorStop(0,'#0f172a');bg.addColorStop(0.5,'#1e3a8a');bg.addColorStop(1,'#1d4ed8');ctx.fillStyle=bg;ctx.fill();
    ctx.save();const cx=256*s,cy=200*s,outerR=80*s,innerR=50*s,teeth=8;ctx.translate(cx,cy);ctx.beginPath();
    for(let i=0;i<teeth;i++){const a1=(i/teeth)*Math.PI*2-Math.PI/teeth/2;const a2=(i/teeth)*Math.PI*2+Math.PI/teeth/2;ctx.lineTo(Math.cos(a1)*outerR,Math.sin(a1)*outerR);ctx.lineTo(Math.cos(a1+0.05)*outerR*1.15,Math.sin(a1+0.05)*outerR*1.15);ctx.lineTo(Math.cos(a2-0.05)*outerR*1.15,Math.sin(a2-0.05)*outerR*1.15);ctx.lineTo(Math.cos(a2)*outerR,Math.sin(a2)*outerR)}
    ctx.closePath();const gearGrad=ctx.createRadialGradient(0,0,innerR*0.5,0,0,outerR*1.2);gearGrad.addColorStop(0,'#60a5fa');gearGrad.addColorStop(1,'#3b82f6');ctx.fillStyle=gearGrad;ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2*s;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,innerR*0.5,0,Math.PI*2);ctx.fillStyle='#1e3a8a';ctx.fill();
    ctx.fillStyle='#ffffff';ctx.font='bold '+Math.round(28*s)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SF',0,1*s);ctx.restore();
    return c.toDataURL('image/png');
  }
  function applyIcons(){const i192=generateIcon(192),i512=generateIcon(512),i180=generateIcon(180);const fi=document.getElementById('dynamicIcon192');if(fi)fi.href=i192;const ai=document.getElementById('dynamicIconApple');if(ai)ai.href=i180;const manifest={name:'ESG Smart Factory',short_name:'Smart Factory',description:'페이퍼리스 생산현장 통합관리',start_url:'.',display:'standalone',background_color:'#0f172a',theme_color:'#0f172a',icons:[{src:i192,sizes:'192x192',type:'image/png'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link)}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',applyIcons)}else{applyIcons()}
})();
</script>

.cc-i{font-size:28px;flex-shrink:0;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--cb,rgba(255,255,255,.1));transition:transform .25s}
.cc.open .cc-i{transform:scale(1.05)}
.cc-f{flex:1;min-width:0}
.cc-n{font-size:16px;font-weight:700;margin-bottom:2px}
.cc-d{font-size:11px;color:#93c5fd;line-height:1.4}
.cc-c{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.1);color:#93c5fd;flex-shrink:0;margin-right:2px}

.cc.open .cc-a{transform:rotate(180deg)}

/* 서브 패널 */
.cc-p{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}

function renderAll(){

  CATS.forEach(function(cat){
    if(cat.single){
      var a=document.createElement('a');a.className='cs';a.dataset.c=cat.id;a.href=cat.href;

      c.appendChild(a);return;
    }
    var el=document.createElement('div');el.className='cc';el.dataset.c=cat.id;
    var sh='';
    cat.subs.forEach(function(s){
      var isAct=!!s.action;
      if(isAct){
        sh+='<div class="si" onclick="'+s.action+'()" style="cursor:pointer"><div class="si-i">'+s.icon+'</div><div class="si-t"><div class="si-n">'+s.name+'</div><div class="si-d">'+s.desc+'</div></div><div class="si-g">'+(s.action==='downloadScanTools'?'↓':'›')+'</div></div>';
      }else{
        sh+='<a class="si" href="'+s.href+'"><div class="si-i">'+s.icon+'</div><div class="si-t"><div class="si-n">'+s.name+'</div><div class="si-d">'+s.desc+'</div></div><div class="si-g">›</div></a>';
      }
    });
    el.innerHTML='<div class="cc-h" onclick="toggle(this)"><div class="cc-i">'+cat.icon+'</div><div class="cc-f"><div class="cc-n">'+cat.name+'</div><div class="cc-d">'+cat.desc+'</div></div><span class="cc-c">'+cat.subs.length+'</span><div class="cc-a"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="cc-p"><div class="cc-dv"></div><div class="sl">'+sh+'</div></div>';
    c.appendChild(el);
  });
}

function toggle(hd){
  var card=hd.closest('.cc'),pn=card.querySelector('.cc-p'),isOpen=card.classList.contains('open');
  document.querySelectorAll('.cc.open').forEach(function(p){if(p!==card){p.classList.remove('open');p.querySelector('.cc-p').style.maxHeight='0'}});
  if(isOpen){card.classList.remove('open');pn.style.maxHeight='0'}
  else{card.classList.add('open');pn.style.maxHeight=pn.scrollHeight+'px';setTimeout(function(){card.scrollIntoView({block:'nearest',behavior:'smooth'})},120)}
}

  try{await sbInsert('scan_relay',{barcode:barcode,format:format||'phone',sender:'phone'});phoneSendHistory.unshift({barcode:barcode,time:new Date().toLocaleTimeString(),ok:true});if(phoneSendHistory.length>20)phoneSendHistory.length=20;renderPhoneSendLog();showToast('📡 전송: '+barcode);if(navigator.vibrate)navigator.vibrate([50,30,50])}

async function phoneHandleScan(file,mode){
  if(!file)return;var sr=document.getElementById('phoneScanResult');sr.style.display='block';sr.classList.remove('fail');sr.classList.add('show');document.getElementById('phoneScanVal').textContent='분석 중...';document.getElementById('phoneScanFmt').textContent='';
  var img=new Image();var url=URL.createObjectURL(file);
  img.onload=async function(){URL.revokeObjectURL(url);var cv=document.getElementById('analysisCv'),ctx=cv.getContext('2d');var found=false,val='';
    if(mode==='qr'){var side=Math.floor(Math.min(img.width,img.height)*0.7);var cx=Math.floor((img.width-side)/2),cy=Math.floor((img.height-side)/2);cv.width=side;cv.height=side;ctx.drawImage(img,cx,cy,side,side,0,0,side,side)}else{var cropW=img.width,cropH=Math.floor(img.width/8),cropY=Math.floor((img.height-cropH)/2);cv.width=cropW;cv.height=cropH;ctx.drawImage(img,0,cropY,cropW,cropH,0,0,cropW,cropH)}
    if('BarcodeDetector' in window){try{var det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});var r=await det.detect(cv);if(r.length>0){found=true;val=r[0].rawValue}}catch(e){}}
    if(!found){try{var blob=await new Promise(function(r){cv.toBlob(r,'image/jpeg',.95)});var f=new File([blob],'s.jpg',{type:'image/jpeg'});var qr=new Html5Qrcode('analysisCv');var res=await qr.scanFileV2(f,true);if(res&&res.decodedText){found=true;val=res.decodedText}qr.clear()}catch(e){}}
    if(!found){cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);if('BarcodeDetector' in window){try{var det2=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});var r2=await det2.detect(cv);if(r2.length>0){found=true;val=r2[0].rawValue}}catch(e){}}if(!found){try{var blob2=await new Promise(function(r){cv.toBlob(r,'image/jpeg',.95)});var f2=new File([blob2],'s2.jpg',{type:'image/jpeg'});var qr2=new Html5Qrcode('analysisCv');var res2=await qr2.scanFileV2(f2,true);if(res2&&res2.decodedText){found=true;val=res2.decodedText}qr2.clear()}catch(e){}}}
    if(found){document.getElementById('phoneScanVal').textContent=val;document.getElementById('phoneScanFmt').textContent='✅ 인식 성공 → PC 전송 중...';sr.classList.remove('fail');phoneSendBarcode(val,mode==='qr'?'QR':'바코드')}else{document.getElementById('phoneScanVal').textContent='인식 실패';document.getElementById('phoneScanFmt').textContent='재촬영하세요';sr.classList.add('fail');showToast('인식 실패')}
  };img.src=url;
}
var tt;function showToast(m){var el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('show')},2000)}
renderAll();
