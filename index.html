<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>(주)에스엠텍 스마트 팩토리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg:    #0a0f1e;
    --c-panel: #111827;
    --c-border:#1e2d45;
    --c-accent:#0ea5e9;
    --c-gold:  #f59e0b;
    --c-green: #10b981;
    --c-red:   #f43f5e;
    --c-txt:   #e2e8f0;
    --c-sub:   #64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--c-bg);color:var(--c-txt);overflow-x:hidden}

  /* 배경 그리드 패턴 */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(14,165,233,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14,165,233,.04) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;z-index:0;
  }

  /* 상단 글로우 */
  body::after{
    content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);
    width:600px;height:300px;
    background:radial-gradient(ellipse, rgba(14,165,233,.18) 0%, transparent 70%);
    pointer-events:none;z-index:0;
  }

  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding:0 20px 40px;}

  /* 헤더 */
  .hdr{
    padding:16px 0 12px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    border-bottom:1px solid var(--c-border);
    margin-bottom:8px;
  }
  .logo-badge{
    font-size:9px;letter-spacing:4px;text-transform:uppercase;
    color:var(--c-accent);font-weight:700;
    padding:4px 12px;border:1px solid rgba(14,165,233,.4);border-radius:20px;
    background:rgba(14,165,233,.06);
    animation:pulse-border 3s ease-in-out infinite;
  }
  @keyframes pulse-border{
    0%,100%{box-shadow:0 0 0 0 rgba(14,165,233,.3)}
    50%{box-shadow:0 0 0 4px rgba(14,165,233,.08)}
  }
  .logo-ko{
    font-size:26px;font-weight:900;letter-spacing:-0.5px;
    background:linear-gradient(135deg,#e2e8f0 30%,#94a3b8);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-top:4px;
  }
  .logo-sub{
    font-size:11px;color:var(--c-sub);letter-spacing:1px;font-weight:400;
  }

  /* 시스템 시각 */
  .sys-time{
    text-align:center;padding:6px 0 10px;
    font-size:10px;color:var(--c-sub);letter-spacing:1px;
  }
  .sys-time .time{
    display:block;font-family:'Bebas Neue',cursive;
    font-size:28px;letter-spacing:3px;color:var(--c-txt);line-height:1;
    margin-bottom:1px;
  }

  /* 앱 카드 */
  .apps{display:flex;flex-direction:column;gap:14px;margin-top:4px;}

  .app-card{
    background:var(--c-panel);
    border:1px solid var(--c-border);
    border-radius:16px;
    padding:22px 20px;
    text-decoration:none;
    display:flex;align-items:center;gap:18px;
    position:relative;overflow:hidden;
    transition:transform .15s, box-shadow .15s, border-color .15s;
    cursor:pointer;
  }
  .app-card:active{transform:scale(.97);}
  .app-card::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.03) 0%, transparent 60%);
    border-radius:inherit;pointer-events:none;
  }
  /* 우측 상단 코너 악센트 */
  .app-card::after{
    content:'';position:absolute;top:0;right:0;
    width:60px;height:60px;
    border-radius:0 16px 0 60px;
    opacity:.15;
  }

  .card-a::after{background:var(--c-accent);}
  .card-b::after{background:var(--c-gold);}
  .card-c::after{background:var(--c-green);}

  .card-a{border-color:rgba(14,165,233,.25);}
  .card-b{border-color:rgba(245,158,11,.25);}
  .card-c{border-color:rgba(16,185,129,.25);}

  .card-a:active, .card-a:hover{border-color:var(--c-accent); box-shadow:0 0 20px rgba(14,165,233,.15);}
  .card-b:active, .card-b:hover{border-color:var(--c-gold);   box-shadow:0 0 20px rgba(245,158,11,.15);}
  .card-c:active, .card-c:hover{border-color:var(--c-green);  box-shadow:0 0 20px rgba(16,185,129,.15);}

  .card-icon{
    width:52px;height:52px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;flex-shrink:0;
  }
  .card-a .card-icon{background:rgba(14,165,233,.12);}
  .card-b .card-icon{background:rgba(245,158,11,.12);}
  .card-c .card-icon{background:rgba(16,185,129,.12);}

  .card-body{flex:1;min-width:0;}
  .card-tag{
    font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;
    margin-bottom:4px;
  }
  .card-a .card-tag{color:var(--c-accent);}
  .card-b .card-tag{color:var(--c-gold);}
  .card-c .card-tag{color:var(--c-green);}

  .card-title{font-size:17px;font-weight:700;color:var(--c-txt);letter-spacing:-.3px;line-height:1.2;}
  .card-desc{font-size:11px;color:var(--c-sub);margin-top:4px;font-weight:400;}

  .card-arrow{
    font-size:18px;color:var(--c-sub);flex-shrink:0;
    transition:transform .2s, color .2s;
  }
  .app-card:hover .card-arrow, .app-card:active .card-arrow{
    transform:translateX(4px);
  }
  .card-a:hover .card-arrow{color:var(--c-accent);}
  .card-b:hover .card-arrow{color:var(--c-gold);}
  .card-c:hover .card-arrow{color:var(--c-green);}

  /* 상태 표시 점 */
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;margin-right:6px;
    animation:blink 2s ease-in-out infinite;
  }
  .dot-blue{background:var(--c-accent);}
  .dot-gold{background:var(--c-gold);}
  .dot-green{background:var(--c-green);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* 하단 */
  .footer{
    margin-top:auto;padding-top:32px;
    text-align:center;
    font-size:10px;color:var(--c-sub);letter-spacing:.5px;
    line-height:1.8;
  }
  .footer a{color:var(--c-sub);text-decoration:none;}

  /* 입장 애니메이션 */
  .hdr{animation:fadeUp .6s ease both;}
  .sys-time{animation:fadeUp .6s .1s ease both;}
  .app-card:nth-child(1){animation:fadeUp .6s .2s ease both;}
  .app-card:nth-child(2){animation:fadeUp .6s .3s ease both;}
  .app-card:nth-child(3){animation:fadeUp .6s .4s ease both;}
  .footer{animation:fadeUp .6s .5s ease both;}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(18px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="logo-badge">Smart Factory Platform</div>
    <div class="logo-ko">(주)에스엠텍</div>
    <div class="logo-sub">SMTECH Co., Ltd.</div>
  </div>

  <div class="sys-time">
    <span class="time" id="clock">--:--:--</span>
    <span id="date-str">----.--.--</span>
  </div>

  <div class="apps">

    <a class="app-card card-a" href="https://knagbyeongju-123.github.io/smtec_main/lot_tracking.html">
      <div class="card-icon">📦</div>
      <div class="card-body">
        <div class="card-tag"><span class="status-dot dot-blue"></span>공용 시스템</div>
        <div class="card-title">로트 추적관리 시스템</div>
        <div class="card-desc">자재 이동 · 세팅체크 · 교환체크 · 이력관리</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="app-card card-c" href="https://knagbyeongju-123.github.io/smtec_main/mask.html">
      <div class="card-icon">🎭</div>
      <div class="card-body">
        <div class="card-tag"><span class="status-dot dot-green"></span>공용 시스템</div>
        <div class="card-title">메탈마스크 관리</div>
        <div class="card-desc">이동등록 · 재고현황 · 잔여수명 · 폐기관리</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="app-card card-b" href="https://knagbyeongju-123.github.io/smtec_main/line_patrol.html">
      <div class="card-icon">🔧</div>
      <div class="card-body">
        <div class="card-tag"><span class="status-dot dot-gold"></span>개별 시스템</div>
        <div class="card-title">공정점검</div>
        <div class="card-desc">설비 · 라인 점검 체크리스트 및 이력</div>
      </div>
      <div class="card-arrow">›</div>
    </a>


  </div>

  <div class="footer">
    &copy; 2025 (주)에스엠텍 · SMTECH Co., Ltd.<br>
    Smart Factory Platform v1.0
  </div>

</div>

<script>
  function tick(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = hh+':'+mm+':'+ss;
    const days = ['일','월','화','수','목','금','토'];
    const d = now;
    document.getElementById('date-str').textContent =
      d.getFullYear()+'.'
      +String(d.getMonth()+1).padStart(2,'0')+'.'
      +String(d.getDate()).padStart(2,'0')
      +' ('+days[d.getDay()]+')';
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
