<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출하의뢰서 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#212121;-webkit-tap-highlight-color:transparent}
  .hdr{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .hdr h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
  .hdr-sub{font-size:10px;opacity:.7}
  .conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
  .conn-dot.ok{background:#69f0ae}.conn-dot.ng{background:#ff5252}
  .cfg-card{background:#fff;border:2px solid #43a047;border-radius:12px;margin:8px 12px;padding:10px 14px}
  .cfg-tit{font-size:12px;font-weight:700;color:#2e7d32;margin-bottom:6px;display:flex;align-items:center;gap:4px}
  .cfg-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .cfg-row label{font-size:11px;font-weight:600;color:#555;min-width:60px;flex-shrink:0}
  .cfg-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit}
  .cfg-btn{padding:6px 14px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:50}
  .tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#888;transition:all .15s}
  .tab.on{color:#0d47a1;border-bottom-color:#0d47a1}
  .pnl{display:none;padding:10px 12px 80px}.pnl.on{display:block}
  .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .fg{margin-bottom:10px}
  .fg label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px}
  .fg input,.fg select,.fg textarea{width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
  .fg select{appearance:auto}
  .btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;box-shadow:0 2px 8px rgba(13,71,161,.2)}
  .btn-green{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff}
  .btn-red{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
  .btn-gray{background:#f5f5f5;color:#555;border:1px solid #ddd}
  .btn-orange{background:linear-gradient(135deg,#e65100,#ff9800);color:#fff}
  .btn-sm{padding:8px 12px;font-size:12px;width:auto;border-radius:8px}
  .btn-row{display:flex;gap:8px;margin-bottom:10px}
  .btn-row .btn{flex:1}
  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:999;justify-content:center;align-items:flex-end}
  .modal-overlay.on{display:flex}
  .modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px;animation:slideUp .2s ease-out}
  @keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
  .kp-title{font-size:13px;font-weight:700;color:#555;margin-bottom:4px;text-align:center}
  .kp-display{font-size:32px;font-weight:800;text-align:center;min-height:48px;padding:8px 0;color:#0d47a1;word-break:break-all;letter-spacing:1px;border-bottom:2px solid #e0e0e0;margin-bottom:12px}
  .kp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .kp-btn{font-size:24px;font-weight:700;padding:16px 0;border-radius:10px;border:none;background:#f5f5f5;color:#212121;cursor:pointer;font-family:inherit;transition:background .1s}
  .kp-btn:active{background:#e0e0e0}
  .kp-btn.fn{background:#e3f2fd;color:#1565c0;font-size:18px}
  .kp-actions{display:flex;gap:8px}
  .kp-actions .btn{flex:1;padding:14px;font-size:15px}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{background:#e3f2fd;color:#0d47a1;font-weight:700;padding:8px 6px;border-bottom:2px solid #90caf9;text-align:left;white-space:nowrap}
  .tbl td{padding:7px 6px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
  .tbl tr:hover{background:#f5f9ff}
  .tbl .act-btn{padding:4px 8px;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}
  .inactive-row{opacity:.5;text-decoration:line-through}
  .h-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
  .h-item:last-child{border:none}
  .hi-top{display:flex;justify-content:space-between;align-items:center}
  .hi-part{font-size:16px;font-weight:800;color:#0d47a1}
  .hi-qty{font-size:15px;font-weight:800;color:#333}
  .hi-date{font-size:10px;color:#999}
  .hi-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;align-items:center}
  .hi-tag{font-size:12px;padding:3px 8px;border-radius:5px;font-weight:600}
  .hi-tag.lot{font-size:14px;font-weight:700;padding:4px 10px;letter-spacing:.3px}
  .h-empty{text-align:center;padding:20px;color:#aaa;font-size:13px}
  .search-row{display:flex;gap:6px;margin-bottom:10px}
  .search-row input,.search-row select{flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit}
  .search-row input[type=date]{font-size:15px;font-weight:600;padding:12px 10px;min-height:48px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:30px;color:#aaa;font-size:13px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#1976d2;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr"><h1>📦 출하의뢰서 관리 <span class="conn-dot ng" id="connDot"></span></h1><span class="hdr-sub">Supabase 기반</span></div>
<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📦 출하작업</div>
  <div class="tab" onclick="swTab(1)">📋 이력</div>
  <div class="tab" onclick="swTab(2)">📏 박스단위</div>
  <div class="tab" onclick="swTab(3)">⚙ 설정</div>
</div>

<div class="pnl on" id="pnl0">
  <div class="card" style="padding:12px 14px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700;color:#0d47a1;white-space:nowrap">🏢 고객사</span><select id="selCustomer" onchange="onCustomerChange()" style="flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;font-weight:600"><option value="">전체 (선택안함)</option></select></div></div>
  <div class="card"><div class="card-tit">➕ 출고등록</div><div class="fg"><label>품번</label><input type="text" id="addPart" placeholder="품번 입력 (자동완성)" list="partList" autocomplete="off"><datalist id="partList"></datalist></div><div class="fg"><label>수량</label><input type="number" id="addQty" placeholder="수량 입력" inputmode="numeric"></div><div style="display:flex;gap:6px;font-size:12px;color:#888;margin-bottom:8px"><span id="addInfo">박스단위를 자동 조회합니다</span></div><div class="btn-row"><button class="btn btn-primary" onclick="addWorkItem()">➕ 추가</button><button class="btn btn-orange" onclick="importWorkExcel()" style="flex:0 0 auto;width:auto;padding:12px 16px">📤 일괄등록</button><button class="btn btn-gray" onclick="downloadWorkTemplate()" style="flex:0 0 auto;width:auto;padding:12px 16px">📥 양식</button></div><input type="file" id="workFileInput" accept=".xlsx,.xls,.csv" style="display:none"><div id="workImportProgress" style="display:none;text-align:center;padding:8px;font-size:12px;color:#1565c0"></div></div>
  <div class="card"><div class="card-tit" style="justify-content:space-between"><span>📦 로트등록 (<span id="workCnt">0</span>건) <span id="workTotalQty" style="font-size:12px;color:#2e7d32;margin-left:4px"></span></span><div style="display:flex;gap:6px"><button class="btn btn-sm btn-green" onclick="moveAllToHistory()">🚚 전체 출하등록</button><button class="btn btn-sm btn-red" onclick="clearAllWork()">전체삭제</button></div></div><div id="workList"><div class="loading"><span class="spin"></span>로딩 중...</div></div><div id="prodDateSection" style="display:none;margin-top:10px;padding:10px 12px;background:#e8eaf6;border:1.5px solid #c5cae9;border-radius:10px"><div style="font-size:11px;font-weight:700;color:#1a237e;margin-bottom:8px">📅 생산일자 (터치 → LOT 자동등록) <span id="prodDateCustLabel" style="font-size:10px;color:#e65100;font-weight:600"></span></div><div id="prodDateList"></div></div></div>
  <div class="card"><div class="card-tit" style="justify-content:space-between"><span>📋 최근 출하이력 (<span id="recentHistCnt">0</span>건)</span><button class="btn btn-sm btn-gray" onclick="swTab(1)">전체보기 →</button></div><div id="recentHistList"><div class="loading"><span class="spin"></span>로딩 중...</div></div></div>
</div>

<div class="pnl" id="pnl1">
  <div class="card"><div class="card-tit">📋 출하 이력</div><div class="search-row"><input type="text" id="histSearch" placeholder="품번 검색" oninput="loadHistory()"></div><div class="search-row"><input type="date" id="histDateFrom" onchange="loadHistory()"><span style="font-size:16px;color:#555;flex-shrink:0;padding:0 4px;font-weight:700">~</span><input type="date" id="histDateTo" onchange="loadHistory()"></div><div class="btn-row"><button class="btn btn-sm btn-gray" onclick="exportHistXlsx()">📥 엑셀 다운로드</button><button class="btn btn-sm btn-red" onclick="clearHistory()">선택삭제</button></div><div id="histList"><div class="loading"><span class="spin"></span>로딩 중...</div></div><div style="text-align:center;margin-top:8px"><button class="btn btn-sm btn-gray" id="histMore" onclick="loadHistoryMore()" style="display:none">더보기</button></div></div>
</div>

<div class="pnl" id="pnl2">
  <div class="card"><div class="card-tit" style="justify-content:space-between"><span>📏 박스단위 마스터 (<span id="buCnt">0</span>건)</span><button class="btn btn-sm btn-primary" onclick="showBuAdd()">➕ 추가</button></div><div class="search-row"><input type="text" id="buSearch" placeholder="품번 검색" oninput="loadBoxUnits()"><select id="buFilter" onchange="loadBoxUnits()" style="max-width:100px"><option value="all">전체</option><option value="active">사용중</option><option value="inactive">비활성</option></select></div><div class="btn-row"><button class="btn btn-sm btn-orange" onclick="uploadBuExcel()">📤 엑셀 업로드</button><button class="btn btn-sm btn-gray" onclick="exportBuXlsx()">📥 서버 → 엑셀</button><button class="btn btn-sm btn-green" onclick="downloadBuTemplate()">📋 템플릿</button></div><div id="buProgress" style="display:none;text-align:center;padding:8px;font-size:12px;color:#1565c0"></div><input type="file" id="buFileInput" accept=".xlsx,.xls,.csv" style="display:none"><div class="tbl-wrap"><div id="buTable"><div class="loading"><span class="spin"></span>로딩 중...</div></div></div><div style="margin-top:10px;display:flex;gap:6px"><button class="btn btn-sm btn-red" onclick="deleteAllBoxUnits()">⚠ 전체삭제</button></div></div>
</div>

<div class="pnl" id="pnl3">
  <div class="card"><div class="card-tit" style="justify-content:space-between"><span>🏢 고객사 관리 (<span id="custCnt">0</span>건)</span></div><div style="font-size:10px;color:#888;margin-bottom:8px;padding:6px 8px;background:#e3f2fd;border-radius:6px">💡 공용 마스터 — common_code (code_group: customer)</div><div id="custList"></div><div style="display:flex;gap:6px;margin-top:8px"><input type="text" id="newCustName" placeholder="고객사명 입력" style="flex:1;padding:9px 12px;font-size:13px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit"><button class="btn btn-sm btn-primary" onclick="addCustomer()">+ 추가</button></div><div id="custStatus" style="font-size:11px;margin-top:6px;color:#888"></div></div>
  <div class="card"><div class="card-tit">⚙ 시스템 설정</div><div class="fg"><label>로트번호 접두사</label><input type="text" id="setLotPrefix" placeholder="예: LOT-" value=""></div><div class="fg"><label>기본 작업일자</label><input type="date" id="setWorkDate"></div><button class="btn btn-primary" onclick="saveSettings()" style="margin-top:8px">저장</button></div>
  <div class="card" style="margin-top:10px"><div class="card-tit">🗄 데이터 관리</div><div class="btn-row"><button class="btn btn-sm btn-gray" onclick="exportAllXlsx()">📥 전체 데이터 엑셀</button></div><div class="btn-row"><button class="btn btn-sm btn-red" onclick="resetAllData()">⚠ 전체 데이터 초기화</button></div></div>
  <div class="cfg-card" style="margin-top:10px"><div class="cfg-tit">🔗 Supabase 접속정보 <span class="conn-dot ng" id="connDot2" style="width:6px;height:6px"></span></div><div class="cfg-row"><label>URL</label><input type="password" id="cfgUrl" placeholder="https://xxx.supabase.co"></div><div class="cfg-row"><label>Anon Key</label><input type="password" id="cfgKey" placeholder="eyJ..."></div><div style="display:flex;gap:6px;margin-top:6px"><button class="cfg-btn" style="background:#43a047;color:#fff" onclick="testConn()">연결 테스트</button><button class="cfg-btn" style="background:#1565c0;color:#fff" onclick="saveConfig()">저장</button></div></div>
</div>

<div class="modal-overlay" id="kpModal"><div class="modal-box"><div class="kp-title" id="kpTitle">로트번호 입력</div><div class="kp-display" id="kpDisplay"></div><div class="kp-grid"><button class="kp-btn" onclick="kpInput('1')">1</button><button class="kp-btn" onclick="kpInput('2')">2</button><button class="kp-btn" onclick="kpInput('3')">3</button><button class="kp-btn" onclick="kpInput('4')">4</button><button class="kp-btn" onclick="kpInput('5')">5</button><button class="kp-btn" onclick="kpInput('6')">6</button><button class="kp-btn" onclick="kpInput('7')">7</button><button class="kp-btn" onclick="kpInput('8')">8</button><button class="kp-btn" onclick="kpInput('9')">9</button><button class="kp-btn fn" onclick="kpInput('/')">/</button><button class="kp-btn" onclick="kpInput('0')">0</button><button class="kp-btn fn" onclick="kpInput('-')">-</button><button class="kp-btn fn" onclick="kpBackspace()">⌫</button><button class="kp-btn fn" onclick="kpClear()">C</button><button class="kp-btn fn" onclick="kpInput('.')">.</button></div><div class="kp-actions"><button class="btn btn-gray" onclick="kpCancel()">취소</button><button class="btn btn-primary" onclick="kpConfirm()">확인</button></div></div></div>
<div class="modal-overlay" id="buModal"><div class="modal-box"><div class="kp-title">박스단위 추가/수정</div><div class="fg"><label>품번</label><input type="text" id="buEditPart" placeholder="품번"></div><div class="fg"><label>박스당수량</label><input type="number" id="buEditSize" placeholder="수량" inputmode="numeric"></div><div class="fg"><label>메모</label><input type="text" id="buEditMemo" placeholder="메모 (선택)"></div><input type="hidden" id="buEditId"><div class="kp-actions" style="margin-top:10px"><button class="btn btn-gray" onclick="closeBuModal()">취소</button><button class="btn btn-primary" onclick="saveBuEdit()">저장</button></div></div></div>
<div class="toast" id="toast"></div>

<script>
let SB_URL='',SB_KEY='';
function sbHeaders(){return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}}
async function sbSelect(t,q=''){const r=await fetch(SB_URL+'/rest/v1/'+t+'?select=*'+(q?'&'+q:''),{headers:sbHeaders()});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbInsert(t,d){const b=Array.isArray(d)?d:[d];const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:sbHeaders(),body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbUpdate(t,id,d){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json()}
async function sbDelete(t,f){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:{...sbHeaders(),'Prefer':'return=minimal'}});if(!r.ok)throw new Error(await r.text())}

const LS_PREFIX='SHIP_';function lsGet(k,d){return localStorage.getItem(LS_PREFIX+k)||d||''}function lsSet(k,v){localStorage.setItem(LS_PREFIX+k,v)}
function initConfig(){const u=lsGet('SB_URL','https://omngtyewdaqpphnzeate.supabase.co');const k=lsGet('SB_KEY','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s');document.getElementById('cfgUrl').value=u;document.getElementById('cfgKey').value=k;SB_URL=u;SB_KEY=k;document.getElementById('setLotPrefix').value=lsGet('LOT_PREFIX','');document.getElementById('setWorkDate').value=lsGet('WORK_DATE',new Date().toISOString().split('T')[0])}
function saveConfig(){SB_URL=document.getElementById('cfgUrl').value.trim().replace(/\/+$/,'');SB_KEY=document.getElementById('cfgKey').value.trim();lsSet('SB_URL',SB_URL);lsSet('SB_KEY',SB_KEY);toast('접속정보 저장됨');testConn()}
function setConnDot(ok){['connDot','connDot2'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='conn-dot '+(ok?'ok':'ng')})}
async function testConn(){try{const r=await fetch(SB_URL+'/rest/v1/box_unit?select=id&limit=1',{headers:sbHeaders()});if(r.ok){setConnDot(true);toast('✅ 연결 성공');loadAll()}else{setConnDot(false);toast('❌ '+r.status)}}catch(e){setConnDot(false);toast('❌ '+e.message)}}
function saveSettings(){lsSet('LOT_PREFIX',document.getElementById('setLotPrefix').value);lsSet('WORK_DATE',document.getElementById('setWorkDate').value);toast('설정 저장됨')}

let currentTab=0;
function swTab(n){currentTab=n;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));document.querySelectorAll('.pnl').forEach((p,i)=>p.classList.toggle('on',i===n));if(n===0)loadWork();if(n===1)loadHistory();if(n===2)loadBoxUnits();if(n===3)renderCustListUI()}

let boxUnitCache=[];
async function loadAll(){try{boxUnitCache=await sbSelect('box_unit','is_active=eq.true&order=part_no.asc');buildPartDatalist();loadWork();loadCustomers()}catch(e){toast('로드 실패: '+e.message)}}

let _customers=[],selectedCustomer='';
async function loadCustomers(){try{const d=await sbSelect('common_code','code_group=eq.customer&order=sort_order.asc,code_value.asc');_customers=(d||[]).map(r=>({id:r.id,name:String(r.code_value||'').trim(),sort:r.sort_order||0}));_customers.sort((a,b)=>a.sort-b.sort)}catch(e){}renderCustomerSelect()}
function renderCustomerSelect(){const s=document.getElementById('selCustomer');s.innerHTML='<option value="">전체 (선택안함)</option>';_customers.forEach(c=>{s.innerHTML+='<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>'});const sv=localStorage.getItem('SHIP_CUSTOMER');if(sv&&_customers.find(c=>c.name===sv)){s.value=sv;selectedCustomer=sv}}
function onCustomerChange(){selectedCustomer=document.getElementById('selCustomer').value;localStorage.setItem('SHIP_CUSTOMER',selectedCustomer);if(workItems.length)loadProdDates()}

async function addCustomer(){const inp=document.getElementById('newCustName');const name=inp.value.trim();if(!name)return;const st=document.getElementById('custStatus');if(_customers.find(c=>c.name===name)){st.textContent='⚠ 이미 존재';st.style.color='#e65100';return}const ns=_customers.length?Math.max(..._customers.map(c=>c.sort))+1:1;try{const s=await sbInsert('common_code',{code_group:'customer',code_value:name,sort_order:ns});if(s&&s.length)_customers.push({id:s[0].id,name,sort:ns});_customers.sort((a,b)=>a.sort-b.sort);inp.value='';renderCustListUI();renderCustomerSelect();st.textContent='✅ '+name;st.style.color='#2e7d32'}catch(e){st.textContent='❌ '+e.message;st.style.color='#c62828'}}

async function moveCust(i,d){const n=i+d;if(n<0||n>=_customers.length)return;const t=_customers[i].sort;_customers[i].sort=_customers[n].sort;_customers[n].sort=t;[_customers[i],_customers[n]]=[_customers[n],_customers[i]];try{await sbUpdate('common_code',_customers[i].id,{sort_order:_customers[i].sort});await sbUpdate('common_code',_customers[n].id,{sort_order:_customers[n].sort})}catch(e){}_customers.sort((a,b)=>a.sort-b.sort);renderCustListUI();renderCustomerSelect()}

      d.innerHTML='<div class="hi-top"><span class="hi-part">'+esc(h.part_no)+'</span><span class="hi-qty">'+(h.qty?h.qty.toLocaleString()+'개':'-')+'</span></div><div class="hi-tags"><span class="hi-tag" style="background:#e3f2fd;color:#1565c0">박스당: '+(h.box_size||'-')+'</span><span class="hi-tag" style="background:#f3e5f5;color:#7b1fa2">×'+(h.box_count||'-')+'박스</span>'+(h.lot_no?'<span class="hi-tag lot" style="background:#fff3e0;color:#e65100">LOT: '+esc(h.lot_no)+'</span>':'<span class="hi-tag" style="background:#ffebee;color:#c62828">LOT 미등록</span>')+'</div>';

onclick="deleteWorkItem('+w.id+')" style="padding:4px 6px;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;background:#ffebee;color:#c62828;font-family:inherit">삭제</button></td></tr>'});h+='<tr style="background:#f5f5f5;border-top:2px solid #90caf9"><td style="padding:8px 6px;font-weight:700;color:#555">합계</td><td></td><td style="padding:8px 4px;text-align:center;font-weight:700;color:#7b1fa2">'+tB.toLocaleString()+'</td><td style="padding:8px 4px;text-align:center;font-weight:800;color:#2e7d32;font-size:13px">'+tQ.toLocaleString()+'</td><td colspan="2"></td></tr></tbody></table>';c.innerHTML=h;loadProdDates()}

let _prodDateMap={};
async function loadProdDates(){const sec=document.getElementById('prodDateSection');const list=document.getElementById('prodDateList');if(!workItems.length){sec.style.display='none';return}if(!SB_URL||!SB_KEY){sec.style.display='none';return}sec.style.display='block';list.innerHTML='<span style="color:#888;font-size:11px">조회 중...</span>';document.getElementById('prodDateCustLabel').textContent=selectedCustomer?'🏢 '+selectedCustomer:'';_prodDateMap={};try{const parts=[...new Set(workItems.map(w=>w.part_no))];for(const part of parts){let q='process=eq.출하&base_part=eq.'+encodeURIComponent(part)+'&order=move_date.desc&limit=10';if(selectedCustomer)q+='&destination=eq.'+encodeURIComponent(selectedCustomer);const data=await sbSelect('move_history_tj',q);if(data&&data.length){_prodDateMap[part]=data.map(d=>{let pd=d.lot||'';const m=(d.note||'').match(/\[생산일:([^\]]+)\]/);if(m)pd=m[1];return{lot:pd,date:d.move_date,qty:d.qty}}).filter(d=>d.lot)}}renderProdDateChips()}catch(e){list.innerHTML='<span style="color:#c62828;font-size:11px">조회 실패: '+e.message+'</span>'}}

function renderProdDateChips(){const list=document.getElementById('prodDateList');const parts=[...new Set(workItems.map(w=>w.part_no))];let hasAny=false,html='';parts.forEach(part=>{const items=_prodDateMap[part];const wi=workItems.find(w=>w.part_no===part);const hl=wi&&wi.lot_no&&wi.lot_no.trim();html+='<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#0d47a1;margin-bottom:4px">'+esc(part);if(hl)html+=' <span style="font-size:10px;color:#2e7d32;font-weight:600">✅ LOT: '+esc(wi.lot_no)+'</span>';html+='</div>';if(items&&items.length){hasAny=true;const seen=new Set();const cld=[];if(hl){wi.lot_no.split('/').forEach(p=>{const d=p.trim();if(d.length>=8)cld.push(d);else cld.push(d)})}items.forEach(d=>{if(seen.has(d.lot))return;seen.add(d.lot);const wid=wi?wi.id:0;html+='<button onclick="applyProdDateLot('+wid+',\''+esc(d.lot)+'\',\''+esc(part)+'\')" style="display:inline-block;margin:2px 4px 2px 0;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid #1565c0;background:#fff;color:#0d47a1;font-family:inherit">📅 '+esc(d.lot);if(d.qty)html+=' <span style="font-size:10px;color:#888;font-weight:400">('+d.qty+')</span>';html+='</button>'})}else{html+='<span style="font-size:11px;color:#999">생산일자 없음</span>'}html+='</div>'});list.innerHTML=html}

async function applyProdDateLot(wid,lot,pn){if(!wid){toast('품목 없음');return}function toSD(r){return r.split(/[,\/]/).map(s=>s.trim().replace(/-/g,'')).filter(s=>s)}const wi=workItems.find(w=>w.id===wid);const el=(wi&&wi.lot_no)?wi.lot_no:'';const ed=el?el.split('/').map(s=>s.trim()).filter(s=>s):[];toSD(lot).forEach(nd=>{const f8=nd.length===4&&ed.length?ed[0].substring(0,4)+nd:nd;if(!ed.some(e=>{const ef=e.length===4&&ed[0]?ed[0].substring(0,4)+e:e;return ef===f8}))ed.push(f8.length>=8?f8:nd)});ed.sort();let fmt='';if(ed.length){const nm=ed.map(d=>d.replace(/-/g,'')).filter(d=>d.length>=4);const f=nm[0];const r=[f];for(let i=1;i<nm.length;i++){const d=nm[i];if(d.length>=8&&d.substring(0,4)===f.substring(0,4))r.push(d.substring(4));else r.push(d)}fmt=r.join('/')}try{await sbUpdate('shipment_work',wid,{lot_no:fmt,updated_at:new Date().toISOString()});toast('✅ '+pn+' LOT → '+fmt);if(navigator.vibrate)navigator.vibrate([50,30,50]);loadWork()}catch(e){toast('LOT 실패: '+e.message)}}

async function addWorkItem(){const pn=document.getElementById('addPart').value.trim();const qty=parseInt(document.getElementById('addQty').value)||0;if(!pn){toast('품번 입력');return}const bs=findBoxSize(pn);const bc=(bs&&qty)?Math.ceil(qty/bs):0;try{await sbInsert('shipment_work',{part_no:pn,box_size:bs,box_count:bc,qty:qty||null,lot_no:'',sort_order:workItems.length,status:'working'});document.getElementById('addPart').value='';document.getElementById('addQty').value='';document.getElementById('addInfo').textContent='박스단위를 자동 조회합니다';toast('✅ '+pn+' 추가');loadWork()}catch(e){toast('추가 실패: '+e.message)}}

document.getElementById('workFileInput').addEventListener('change',async function(e){const file=e.target.files[0];if(!file)return;e.target.value='';const prog=document.getElementById('workImportProgress');prog.style.display='block';prog.textContent='파일 읽는 중...';try{const data=await file.arrayBuffer();const wb=XLSX.read(data,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});if(rows.length<2){toast('데이터 없음');prog.style.display='none';return}const hdr=rows[0].map(h=>String(h||'').trim());let cP=-1,cQ=-1,cL=-1,cB=-1;hdr.forEach((h,i)=>{const l=h.toLowerCase();if(cP<0&&(h==='품번'||l==='part'||l==='part_no'))cP=i;if(cQ<0&&(h==='수량'||l==='qty'||l==='quantity'))cQ=i;if(cL<0&&(h==='로트번호'||h==='로트'||h==='LOT'||l==='lot'||l==='lot_no'))cL=i;if(cB<0&&(h==='박스수량'||h==='박스수'||l==='box_count'))cB=i});if(cP<0)cP=0;if(cQ<0&&hdr.length>1){for(let i=1;i<hdr.length;i++){if(rows.length>1&&!isNaN(rows[1][i])){cQ=i;break}}}const items=[];for(let i=1;i<rows.length;i++){const pn=String(rows[i][cP]||'').trim();if(!pn)continue;const qty=cQ>=0?(parseInt(rows[i][cQ])||0):0;const lot=cL>=0?String(rows[i][cL]||'').trim():'';const bcR=cB>=0?(parseInt(rows[i][cB])||0):0;const bs=findBoxSize(pn);let bc=bcR;if(!bc&&bs&&qty)bc=Math.ceil(qty/bs);items.push({part_no:pn,box_size:bs,box_count:bc,qty:qty||null,lot_no:lot,sort_order:workItems.length+items.length,status:'working'})}if(!items.length){toast('유효한 품목 없음');prog.style.display='none';return}if(!confirm('📤 '+items.length+'건 불러오기?')){prog.style.display='none';return}let done=0;for(let i=0;i<items.length;i+=50){const ch=items.slice(i,i+50);await sbInsert('shipment_work',ch);done+=ch.length;prog.textContent='등록 중... '+done+'/'+items.length}prog.style.display='none';toast('✅ '+items.length+'건 완료');loadWork()}catch(e){prog.style.display='none';toast('실패: '+e.message)}});

function renderHistory(){const c=document.getElementById('histList');if(!histData.length){c.innerHTML='<div class="h-empty">이력이 없습니다</div>';return}c.innerHTML='';histData.forEach(h=>{const d=document.createElement('div');d.className='h-item';d.innerHTML='<div class="hi-top"><span class="hi-part">'+esc(h.part_no)+'</span><span class="hi-date">'+h.reg_date+'</span></div><div class="hi-tags"><span class="hi-tag" style="background:#e3f2fd;color:#1565c0">박스당: '+(h.box_size||'-')+'</span><span class="hi-tag" style="background:#f3e5f5;color:#7b1fa2">박스수: '+(h.box_count||'-')+'</span><span class="hi-tag" style="background:#e8f5e9;color:#2e7d32">수량: '+(h.qty||'-')+'</span>'+(h.lot_no?'<span class="hi-tag lot" style="background:#fff3e0;color:#e65100">LOT: '+esc(h.lot_no)+'</span>':'')+'</div>';c.appendChild(d)})}
async function clearHistory(){if(!histData.length)return;const df=document.getElementById('histDateFrom').value;const dt=document.getElementById('histDateTo').value;if(!df&&!dt){toast('날짜 범위를 설정하세요');return}if(!confirm((df||'처음')+' ~ '+(dt||'끝')+' 이력 삭제?'))return;try{let f='id=gt.0';if(df)f+='&reg_date=gte.'+df;if(dt)f+='&reg_date=lte.'+dt;await sbDelete('shipment_history',f);toast('삭제됨');loadHistory()}catch(e){toast('삭제 실패: '+e.message)}}

let buData=[];
async function loadBoxUnits(){const c=document.getElementById('buTable');const s=document.getElementById('buSearch').value.trim();const f=document.getElementById('buFilter').value;let q='order=part_no.asc';if(s)q+='&part_no=ilike.*'+encodeURIComponent(s)+'*';if(f==='active')q+='&is_active=eq.true';else if(f==='inactive')q+='&is_active=eq.false';try{buData=await sbSelect('box_unit',q);document.getElementById('buCnt').textContent=buData.length;renderBuTable();boxUnitCache=buData.filter(b=>b.is_active);buildPartDatalist()}catch(e){c.innerHTML='<div class="h-empty">로드 실패</div>'}}
function renderBuTable(){const c=document.getElementById('buTable');if(!buData.length){c.innerHTML='<div class="h-empty">데이터 없음</div>';return}let h='<table class="tbl"><thead><tr><th>품번</th><th>박스당</th><th>메모</th><th>상태</th><th>관리</th></tr></thead><tbody>';buData.forEach(b=>{const cl=b.is_active?'':' class="inactive-row"';h+='<tr'+cl+'><td style="font-weight:700;font-size:13px">'+esc(b.part_no)+'</td><td style="text-align:right;font-weight:600">'+b.box_size.toLocaleString()+'</td><td style="font-size:11px;color:#888">'+esc(b.memo||'')+'</td><td><span style="font-size:10px;padding:2px 6px;border-radius:4px;'+(b.is_active?'background:#e8f5e9;color:#2e7d32':'background:#ffebee;color:#c62828')+'">'+(b.is_active?'사용':'비활성')+'</span></td><td style="white-space:nowrap"><button class="act-btn" style="background:#e3f2fd;color:#1565c0" onclick="editBu('+b.id+')">수정</button> <button class="act-btn" style="background:'+(b.is_active?'#fff3e0;color:#e65100':'#e8f5e9;color:#2e7d32')+'" onclick="toggleBu('+b.id+','+b.is_active+')">'+(b.is_active?'비활성':'활성')+'</button></td></tr>'});h+='</tbody></table>';c.innerHTML=h}
function showBuAdd(){document.getElementById('buEditId').value='';document.getElementById('buEditPart').value='';document.getElementById('buEditSize').value='';document.getElementById('buEditMemo').value='';document.getElementById('buModal').classList.add('on')}
function editBu(id){const b=buData.find(x=>x.id===id);if(!b)return;document.getElementById('buEditId').value=b.id;document.getElementById('buEditPart').value=b.part_no;document.getElementById('buEditSize').value=b.box_size;document.getElementById('buEditMemo').value=b.memo||'';document.getElementById('buModal').classList.add('on')}
function closeBuModal(){document.getElementById('buModal').classList.remove('on')}
async function saveBuEdit(){const id=document.getElementById('buEditId').value;const pn=document.getElementById('buEditPart').value.trim();const bs=parseInt(document.getElementById('buEditSize').value)||0;const mm=document.getElementById('buEditMemo').value.trim();if(!pn){toast('품번 입력');return}try{if(id){await sbUpdate('box_unit',id,{part_no:pn,box_size:bs,memo:mm,updated_at:new Date().toISOString()});toast('✅ 수정')}else{await sbInsert('box_unit',{part_no:pn,box_size:bs,memo:mm});toast('✅ 추가')}closeBuModal();loadBoxUnits()}catch(e){toast('저장 실패: '+e.message)}}
async function toggleBu(id,a){try{await sbUpdate('box_unit',id,{is_active:!a,updated_at:new Date().toISOString()});toast(a?'비활성':'활성');loadBoxUnits()}catch(e){toast('실패: '+e.message)}}
function downloadBuTemplate(){const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['품번','박스당수량'],['1234-567',1000],['5678-901',2500]]),'박스단위');XLSX.writeFile(wb,'박스단위_템플릿.xlsx')}
function uploadBuExcel(){document.getElementById('buFileInput').click()}
document.getElementById('buFileInput').addEventListener('change',async function(e){const file=e.target.files[0];if(!file)return;e.target.value='';const prog=document.getElementById('buProgress');prog.style.display='block';prog.textContent='읽는 중...';try{const data=await file.arrayBuffer();const wb=XLSX.read(data,{type:'array'});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});if(rows.length<2){toast('데이터 없음');prog.style.display='none';return}const items=[];for(let i=1;i<rows.length;i++){const pn=String(rows[i][0]||'').trim();const bs=parseInt(rows[i][1])||0;if(pn)items.push({part_no:pn,box_size:bs})}if(!items.length){toast('유효 데이터 없음');prog.style.display='none';return}if(!confirm(items.length+'건 업로드?')){prog.style.display='none';return}const ex=await sbSelect('box_unit');const em={};ex.forEach(b=>{em[b.part_no]=b});const ins=[],upd=[];items.forEach(it=>{const e=em[it.part_no];if(e){if(e.box_size!==it.box_size)upd.push({id:e.id,box_size:it.box_size})}else ins.push(it)});let done=0;for(let i=0;i<ins.length;i+=50){await sbInsert('box_unit',ins.slice(i,i+50));done+=Math.min(50,ins.length-i);prog.textContent='추가 '+done+'/'+ins.length}for(let i=0;i<upd.length;i++){await sbUpdate('box_unit',upd[i].id,{box_size:upd[i].box_size,is_active:true,updated_at:new Date().toISOString()})}prog.style.display='none';toast('✅ 추가:'+ins.length+' 수정:'+upd.length);loadBoxUnits()}catch(e){prog.style.display='none';toast('실패: '+e.message)}});
async function deleteAllBoxUnits(){if(!buData.length)return;if(!confirm('⚠ 전체 '+buData.length+'건 삭제?'))return;if(!confirm('최종 확인'))return;try{await sbDelete('box_unit','id=gt.0');toast('전체 삭제');loadBoxUnits()}catch(e){toast('실패: '+e.message)}}

function exportHistXlsx(){if(!histData.length){toast('이력 없음');return}const ws=XLSX.utils.aoa_to_sheet([['일자','품번','박스당수량','박스수량','수량','로트번호'],...histData.map(h=>[h.reg_date,h.part_no,h.box_size,h.box_count,h.qty,h.lot_no||''])]);ws['!cols']=[{wch:11},{wch:18},{wch:10},{wch:8},{wch:10},{wch:16}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'출하이력');XLSX.writeFile(wb,'출하이력_'+new Date().toISOString().split('T')[0].replace(/-/g,'')+'.xlsx')}
async function exportBuXlsx(){try{const d=await sbSelect('box_unit','order=part_no.asc');if(!d.length){toast('없음');return}const ws=XLSX.utils.aoa_to_sheet([['품번','박스당수량','메모','상태'],...d.map(b=>[b.part_no,b.box_size,b.memo||'',b.is_active?'사용':'비활성'])]);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'박스단위');XLSX.writeFile(wb,'박스단위_'+new Date().toISOString().split('T')[0].replace(/-/g,'')+'.xlsx');toast('📥 '+d.length+'건')}catch(e){toast('실패: '+e.message)}}
async function exportAllXlsx(){try{const wb=XLSX.utils.book_new();const bu=await sbSelect('box_unit','order=part_no.asc');if(bu.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['품번','박스당수량','메모','상태'],...bu.map(b=>[b.part_no,b.box_size,b.memo||'',b.is_active?'사용':'비활성'])]),'박스단위');const hi=await sbSelect('shipment_history','order=reg_date.desc,part_no.asc&limit=5000');if(hi.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['일자','품번','박스당수량','박스수량','수량','로트번호'],...hi.map(h=>[h.reg_date,h.part_no,h.box_size,h.box_count,h.qty,h.lot_no||''])]),'출하이력');XLSX.writeFile(wb,'출하의뢰서_전체_'+new Date().toISOString().split('T')[0].replace(/-/g,'')+'.xlsx');toast('📥 전체 다운로드')}catch(e){toast('실패: '+e.message)}}
async function resetAllData(){if(!confirm('⚠ 모든 데이터 삭제?'))return;if(!confirm('최종 확인'))return;try{await sbDelete('shipment_work','id=gt.0');await sbDelete('shipment_history','id=gt.0');toast('초기화 완료');loadAll()}catch(e){toast('실패: '+e.message)}}

// ========================================
// ★ 날짜별 엑셀 출력 / 메일 전송
// ========================================
async function exportDateXlsx(date) {
  try {
    const data = await sbSelect('shipment_history', 'reg_date=eq.' + date + '&order=part_no.asc');
    if (!data.length) { toast('해당 날짜 이력 없음'); return; }
    const totalQty = data.reduce((s, h) => s + (parseInt(h.qty) || 0), 0);
    const totalBox = data.reduce((s, h) => s + (parseInt(h.box_count) || 0), 0);
    const hd = ['품번', '박스당수량', '박스수량', '수량', '로트번호'];
    const rows = data.map(h => [h.part_no, h.box_size || '', h.box_count || '', h.qty || '', h.lot_no || '']);
    rows.push(['합계', '', totalBox, totalQty, '']);
    const ws = XLSX.utils.aoa_to_sheet([hd, ...rows]);
    ws['!cols'] = [{ wch: 20 }, { wch: 10 }, { wch: 8 }, { wch: 10 }, { wch: 20 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '출하의뢰서');
    XLSX.writeFile(wb, '출하의뢰서_' + date.replace(/-/g, '') + '.xlsx');
    toast('📥 ' + date + ' 엑셀 (' + data.length + '건 / ' + totalQty.toLocaleString() + '개)');
  } catch (e) { toast('엑셀 실패: ' + e.message); }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

let toastTimer;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500)}

initConfig();
testConn();
