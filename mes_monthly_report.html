<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 태진다이텍 MES 생산 월말보고서</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "맑은 고딕", "Malgun Gothic", -apple-system, sans-serif;
  background: #f0f4f8;
  color: #1e3a5f;
  padding: 12px;
  min-height: 100vh;
}
.wrap { max-width: 1200px; margin: 0 auto; }

/* 헤더 */
.header {
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  color: #fff;
  padding: 18px 24px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  box-shadow: 0 4px 12px rgba(30,58,95,0.15);
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }
.status-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: #94a3b8;
  margin-right: 6px;
}
.status-dot.ok { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
.status-dot.err { background: #ef4444; }
.server-status { font-size: 12px; }

/* 카드 공통 */
.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  border: 1px solid #e2e8f0;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #1e3a5f;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #e0f2fe;
}

/* 기간 선택 */
.period-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.period-row label { font-weight: 600; font-size: 13px; }
.period-row input, .period-row select {
  padding: 7px 10px;
  border: 1.5px solid #cbd5e1;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
}
.period-row input:focus, .period-row select:focus {
  outline: none; border-color: #2563eb;
}
.btn {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  color: #fff;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
.btn-sky { background: #38bdf8; }
.btn-green { background: #22c55e; }
.btn-orange { background: #f97316; }
.btn-purple { background: #a855f7; }
.btn-gray { background: #94a3b8; }
.btn-red { background: #ef4444; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.period-info {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 700;
  color: #2563eb;
  background: #eff6ff;
  padding: 8px 12px;
  border-radius: 6px;
  border-left: 4px solid #2563eb;
}

/* 항목 선택 그리드 */
.preset-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.section-header {
  font-size: 12px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 6px;
  margin: 12px 0 6px;
}
.section-header.basic { background: #e0f2fe; color: #0369a1; }
.section-header.summary { background: #fef3c7; color: #b45309; }

.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 6px;
}
.item-row {
  display: flex;
  align-items: flex-start;
  padding: 8px 10px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  background: #fafbfc;
  cursor: pointer;
  transition: all 0.1s;
}
.item-row:hover { background: #f1f5f9; border-color: #cbd5e1; }
.item-row.checked { background: #ecfdf5; border-color: #22c55e; }
.item-row input[type="checkbox"] {
  margin-top: 3px;
  margin-right: 8px;
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: #22c55e;
}
.item-text { flex: 1; min-width: 0; }
.item-label {
  font-size: 12px;
  font-weight: 700;
  color: #1e3a5f;
  margin-bottom: 2px;
  word-break: keep-all;
}
.item-label.summary { color: #b45309; }
.item-desc {
  font-size: 11px;
  color: #64748b;
  word-break: keep-all;
  line-height: 1.35;
}

/* 실행 버튼 */
.run-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 12px rgba(22,163,74,0.25);
  transition: all 0.15s;
}
.run-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(22,163,74,0.35);
}
.run-btn:disabled {
  background: #94a3b8;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* 로그 */
.log-box {
  background: #0f172a;
  color: #86efac;
  font-family: Consolas, "D2Coding", monospace;
  font-size: 12px;
  padding: 12px;
  border-radius: 8px;
  height: 220px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.5;
}
.log-box .err { color: #fca5a5; }
.log-box .warn { color: #fcd34d; }
.log-box .info { color: #93c5fd; }
.log-box .ok { color: #86efac; }

/* 결과 파일 목록 */
.file-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.file-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 12px;
}
.file-card .fname { font-weight: 600; color: #1e3a5f; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.file-card .fcount { color: #64748b; font-size: 11px; margin: 0 8px; white-space: nowrap; }
.file-card .dbtn {
  padding: 4px 10px;
  background: #2563eb;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.file-card .dbtn:hover { background: #1d4ed8; }

.zip-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: #fef3c7;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 13px;
  font-weight: 600;
  color: #92400e;
}

.summary-stat {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 12px;
  color: #475569;
}
.stat-pill {
  padding: 6px 12px;
  background: #f1f5f9;
  border-radius: 999px;
  font-weight: 600;
}
.stat-pill .num { color: #2563eb; font-weight: 800; font-size: 14px; }

/* 미리보기 모달 */
.modal-mask {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.7);
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-mask.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 95%; max-width: 1100px;
  max-height: 88vh;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.modal-head {
  padding: 12px 18px;
  background: #1e3a5f; color: #fff;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-body { padding: 14px; overflow: auto; flex: 1; }
.modal-close {
  background: none; border: none; color: #fff; font-size: 22px; cursor: pointer;
}
table.preview {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
table.preview th, table.preview td {
  padding: 5px 8px; border: 1px solid #e2e8f0; text-align: left;
}
table.preview th { background: #1e3a5f; color: #fff; position: sticky; top: 0; }
table.preview tr:nth-child(even) { background: #f8fafc; }

/* 작은 버튼 */
.mini-btn {
  padding: 3px 8px;
  background: #64748b;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 10px;
  cursor: pointer;
  margin-left: 4px;
}
.mini-btn:hover { background: #475569; }

@media (max-width: 760px) {
  .items-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 16px; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div>
      <h1>📊 태진다이텍 MES 생산 월말보고서</h1>
      <div class="sub">Oracle MES → CSV 추출 · 항목별 선택 조회 · 일괄 ZIP 다운로드</div>
    </div>
    <div class="server-status">
      <span class="status-dot" id="srvDot"></span>
      <span id="srvText">서버 확인중...</span>
    </div>
  </div>

  <!-- 기간 선택 -->
  <div class="card">
    <div class="card-title">📅 조회 기간</div>
    <div class="period-row">
      <label>연도:</label>
      <input type="number" id="year" min="2020" max="2030" style="width:90px">
      <label>월:</label>
      <input type="number" id="month" min="1" max="12" style="width:60px">
      <button class="btn btn-sky" onclick="setThisMonth()">이번달</button>
      <button class="btn btn-sky" onclick="setLastMonth()">전월</button>
    </div>
    <div class="period-info" id="periodInfo">📆 기간 표시</div>
  </div>

  <!-- 항목 선택 -->
  <div class="card">
    <div class="card-title">✅ 보고서 항목 선택</div>
    <div class="preset-row">
      <button class="btn btn-green" onclick="selectAll()">✔ 전체선택</button>
      <button class="btn btn-gray" onclick="deselectAll()">✘ 전체해제</button>
      <button class="btn btn-orange" onclick="selectRecommended()">⭐ 월말보고 필수</button>
      <button class="btn btn-purple" onclick="selectSummaryOnly()">📊 집계만</button>
      <span style="margin-left:auto; font-size:12px; color:#64748b; align-self:center;">
        선택: <b id="selCount">0</b> / <b id="totalCount">0</b>
      </span>
    </div>

    <div class="section-header basic">【 원본 데이터 】</div>
    <div class="items-grid" id="itemsBasic"></div>

    <div class="section-header summary">【 집계 / KPI 보고 】</div>
    <div class="items-grid" id="itemsSummary"></div>
  </div>

  <!-- 실행 -->
  <div class="card">
    <button class="run-btn" id="runBtn" onclick="runReport()">
      🚀 선택 항목 조회 → CSV 추출
    </button>
  </div>

  <!-- 로그 -->
  <div class="card">
    <div class="card-title">📋 실행 로그</div>
    <div class="log-box" id="logBox">대기중...</div>
  </div>

  <!-- 결과 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">💾 추출 결과</div>
    <div class="summary-stat" id="resultStat"></div>
    <div class="zip-row" id="zipRow" style="display:none">
      <span id="zipText">📦 전체 일괄 다운로드</span>
      <a id="zipLink" class="btn btn-orange" href="#" download>📦 ZIP 다운로드</a>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

</div>

<!-- 미리보기 모달 -->
<div class="modal-mask" id="modalMask" onclick="if(event.target===this)closePreview()">
  <div class="modal">
    <div class="modal-head">
      <span id="modalTitle">미리보기</span>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ====================================================
// API 베이스 URL (서버 위치에 맞게 자동 결정)
// ====================================================
const API_BASE = window.location.origin.includes('http')
  ? ''   // 같은 호스트(Flask 서버 직접 서빙)
  : 'http://localhost:5000';  // 로컬 개발용

let ITEMS = { basic: [], summary: [] };
let lastJobId = null;

// ====================================================
// 초기화
// ====================================================
window.addEventListener('DOMContentLoaded', async () => {
  setLastMonth();  // 기본 기간: 지난달
  await checkServer();
  await loadItems();
  updatePeriodLabel();
});

document.getElementById('year').addEventListener('input', updatePeriodLabel);
document.getElementById('month').addEventListener('input', updatePeriodLabel);

// ====================================================
// 서버 상태 확인
// ====================================================
async function checkServer() {
  const dot = document.getElementById('srvDot');
  const txt = document.getElementById('srvText');
  try {
    const r = await fetch(`${API_BASE}/api/monthly_report/ping`, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    dot.classList.add('ok');
    txt.textContent = `서버 OK · ${j.host || ''}`;
  } catch (e) {
    dot.classList.add('err');
    txt.textContent = '서버 연결 실패 (mes_monitor.py 확인)';
  }
}

// ====================================================
// 항목 목록 로드
// ====================================================
async function loadItems() {
  try {
    const r = await fetch(`${API_BASE}/api/monthly_report/items`);
    const j = await r.json();
    ITEMS.basic = j.basic || [];
    ITEMS.summary = j.summary || [];
    renderItems();
  } catch (e) {
    log('❌ 항목 목록 로드 실패: ' + e, 'err');
  }
}

function renderItems() {
  const $b = document.getElementById('itemsBasic');
  const $s = document.getElementById('itemsSummary');
  $b.innerHTML = '';
  $s.innerHTML = '';

  ITEMS.basic.forEach(it => $b.appendChild(buildItemEl(it, false)));
  ITEMS.summary.forEach(it => $s.appendChild(buildItemEl(it, true)));

  document.getElementById('totalCount').textContent =
    ITEMS.basic.length + ITEMS.summary.length;
  updateSelCount();
}

function buildItemEl(it, isSummary) {
  const div = document.createElement('label');
  div.className = 'item-row';
  div.dataset.key = it.key;
  div.innerHTML = `
    <input type="checkbox" data-key="${it.key}" onchange="onCheck(this)">
    <div class="item-text">
      <div class="item-label ${isSummary ? 'summary' : ''}">${escapeHtml(it.label)}</div>
      <div class="item-desc">${escapeHtml(it.desc || '')}</div>
    </div>`;
  return div;
}

function onCheck(cb) {
  const row = cb.closest('.item-row');
  if (cb.checked) row.classList.add('checked');
  else row.classList.remove('checked');
  updateSelCount();
}

function updateSelCount() {
  const n = document.querySelectorAll('.item-row input:checked').length;
  document.getElementById('selCount').textContent = n;
}

// ====================================================
// 프리셋
// ====================================================
function selectAll() { setAllChecked(true); }
function deselectAll() { setAllChecked(false); }
function setAllChecked(v) {
  document.querySelectorAll('.item-row input[type=checkbox]').forEach(cb => {
    cb.checked = v;
    onCheck(cb);
  });
}
function selectRecommended() {
  const recs = new Set([
    'board_hist','wo_master','actual_sum','ng_data',
    'machine_status_hist','raw_issue','raw_receipt',
    'sf_inventory','fg_receipt','fg_issue',
    'sum_by_machine','sum_by_item','sum_by_cust',
    'sum_by_ng','sum_by_day','sum_machine_stop',
    'sum_raw_by_item','sum_fg_out_by_cust',
    'kpi_overall','kpi_shift','kpi_weekly',
    'qc_ng_machine_top','qc_ng_item_top','qc_ng_crosstab',
    'delivery_achieve','delivery_undelivered',
    'stock_inventory_sum','stock_vendor_top','stock_sf_shot',
    'mold_shot_top','sales_item_top','fg_in_vs_out',
    'loss_analysis','machine_oee_rank','item_achieve_gap',
    'mold_change_by_machine'
  ]);
  document.querySelectorAll('.item-row input[type=checkbox]').forEach(cb => {
    cb.checked = recs.has(cb.dataset.key);
    onCheck(cb);
  });
}
function selectSummaryOnly() {
  document.querySelectorAll('.item-row input[type=checkbox]').forEach(cb => {
    cb.checked = cb.dataset.key.startsWith('sum_') ||
                 cb.dataset.key.startsWith('kpi_') ||
                 cb.dataset.key.startsWith('qc_') ||
                 cb.dataset.key.startsWith('delivery_') ||
                 cb.dataset.key.startsWith('stock_') ||
                 cb.dataset.key.startsWith('mold_shot_') ||
                 cb.dataset.key.startsWith('sales_') ||
                 cb.dataset.key.startsWith('fg_in_') ||
                 cb.dataset.key.startsWith('loss_') ||
                 cb.dataset.key.startsWith('machine_oee') ||
                 cb.dataset.key.startsWith('item_achieve') ||
                 cb.dataset.key.startsWith('mold_change_');
    onCheck(cb);
  });
}

// ====================================================
// 기간 선택
// ====================================================
function setThisMonth() {
  const t = new Date();
  document.getElementById('year').value = t.getFullYear();
  document.getElementById('month').value = t.getMonth() + 1;
  updatePeriodLabel();
}
function setLastMonth() {
  const t = new Date();
  let y = t.getFullYear(), m = t.getMonth(); // getMonth is 0-based, so month-1 of current = 지난달
  if (m === 0) { y -= 1; m = 12; }
  document.getElementById('year').value = y;
  document.getElementById('month').value = m;
  updatePeriodLabel();
}
function updatePeriodLabel() {
  const y = parseInt(document.getElementById('year').value);
  const m = parseInt(document.getElementById('month').value);
  const info = document.getElementById('periodInfo');
  if (!y || !m || m < 1 || m > 12) {
    info.textContent = '❌ 잘못된 연도/월';
    return;
  }
  const lastDay = new Date(y, m, 0).getDate();
  info.textContent = `📆 조회기간: ${y}-${pad(m)}-01  ~  ${y}-${pad(m)}-${pad(lastDay)} (${lastDay}일간)`;
}
function pad(n) { return String(n).padStart(2, '0'); }

// ====================================================
// 실행
// ====================================================
async function runReport() {
  const y = parseInt(document.getElementById('year').value);
  const m = parseInt(document.getElementById('month').value);
  if (!y || !m || m < 1 || m > 12) {
    alert('연도/월을 정확히 입력하세요'); return;
  }
  const keys = Array.from(
    document.querySelectorAll('.item-row input:checked')
  ).map(cb => cb.dataset.key);
  if (keys.length === 0) {
    alert('최소 1개 이상의 항목을 선택하세요'); return;
  }

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 조회중... (몇 분 소요)';
  document.getElementById('logBox').textContent = '';
  document.getElementById('resultCard').style.display = 'none';

  log(`━━━ 월말보고서 생성 시작 ━━━`, 'info');
  log(`기간: ${y}-${pad(m)}-01 ~ 말일`, 'info');
  log(`선택항목: ${keys.length}개`, 'info');
  log('', 'info');

  try {
    const r = await fetch(`${API_BASE}/api/monthly_report/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ year: y, month: m, keys: keys })
    });
    if (!r.ok) {
      const errText = await r.text();
      throw new Error(`HTTP ${r.status}: ${errText}`);
    }
    const j = await r.json();

    if (j.error) throw new Error(j.error);

    lastJobId = j.job_id;

    // 로그 출력
    (j.logs || []).forEach(L => {
      const cls = L.startsWith('❌') ? 'err'
                : L.startsWith('⚠️') ? 'warn'
                : L.startsWith('✅') ? 'ok'
                : L.startsWith('🔌') || L.startsWith('━') ? 'info'
                : '';
      log(L, cls);
    });

    // 결과 표시
    showResult(j);

  } catch (e) {
    log(`❌ 실패: ${e.message || e}`, 'err');
    alert('조회 실패: ' + (e.message || e));
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 선택 항목 조회 → CSV 추출';
  }
}

function showResult(j) {
  const card = document.getElementById('resultCard');
  card.style.display = 'block';

  // 통계
  document.getElementById('resultStat').innerHTML = `
    <div class="stat-pill">파일: <span class="num">${j.files.length}</span>개</div>
    <div class="stat-pill">총 행수: <span class="num">${(j.total_rows || 0).toLocaleString()}</span></div>
    <div class="stat-pill">소요: <span class="num">${(j.elapsed || 0).toFixed(1)}</span>s</div>
    <div class="stat-pill">기간: <span class="num">${j.period}</span></div>
  `;

  // ZIP
  const zipRow = document.getElementById('zipRow');
  if (j.files.length > 0) {
    zipRow.style.display = 'flex';
    document.getElementById('zipLink').href =
      `${API_BASE}/api/monthly_report/download_zip?job=${j.job_id}`;
    document.getElementById('zipText').textContent =
      `📦 전체 일괄 다운로드 (${j.files.length}개 파일)`;
  } else {
    zipRow.style.display = 'none';
  }

  // 파일 목록
  const $list = document.getElementById('fileList');
  $list.innerHTML = '';
  j.files.forEach(f => {
    const div = document.createElement('div');
    div.className = 'file-card';
    div.innerHTML = `
      <span class="fname" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
      <span class="fcount">${(f.rows || 0).toLocaleString()}행</span>
      <button class="mini-btn" onclick="previewFile('${escapeHtml(f.name)}')">👁</button>
      <a class="dbtn" href="${API_BASE}/api/monthly_report/download?job=${j.job_id}&file=${encodeURIComponent(f.name)}" download>⬇</a>
    `;
    $list.appendChild(div);
  });
}

// ====================================================
// 미리보기
// ====================================================
async function previewFile(fname) {
  if (!lastJobId) return;
  document.getElementById('modalTitle').textContent = '📄 ' + fname;
  document.getElementById('modalBody').innerHTML = '<div style="text-align:center;padding:40px;color:#64748b">로딩중...</div>';
  document.getElementById('modalMask').classList.add('show');

  try {
    const r = await fetch(
      `${API_BASE}/api/monthly_report/preview?job=${lastJobId}&file=${encodeURIComponent(fname)}&limit=200`
    );
    const j = await r.json();

    if (j.error) {
      document.getElementById('modalBody').innerHTML =
        `<div style="color:#ef4444;padding:20px">❌ ${escapeHtml(j.error)}</div>`;
      return;
    }

    const cols = j.columns || [];
    const rows = j.rows || [];
    let html = `<div style="font-size:12px;margin-bottom:8px;color:#64748b">
      총 ${(j.total || 0).toLocaleString()}행 중 ${rows.length}행 미리보기</div>`;
    html += '<div style="overflow:auto;max-height:65vh"><table class="preview"><thead><tr>';
    cols.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>';
      row.forEach(v => html += `<td>${escapeHtml(v == null ? '' : String(v))}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('modalBody').innerHTML = html;
  } catch (e) {
    document.getElementById('modalBody').innerHTML =
      `<div style="color:#ef4444;padding:20px">❌ ${escapeHtml(e.message || String(e))}</div>`;
  }
}
function closePreview() {
  document.getElementById('modalMask').classList.remove('show');
}

// ====================================================
// 로그
// ====================================================
function log(msg, cls) {
  const box = document.getElementById('logBox');
  if (box.textContent === '대기중...') box.textContent = '';
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  box.appendChild(span);
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
