
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메세지 발송</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;flex-direction:column}

.hdr{padding:16px 20px;background:linear-gradient(180deg,#181b26,#0f1117);border-bottom:1px solid #2a2e3d;display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:24px}
.hdr h1{font-size:18px;font-weight:800}
.hdr h1 span{color:#e94560}

.main{flex:1;padding:16px;max-width:500px;margin:0 auto;width:100%}

.card{background:#1a1d27;border:1px solid #2a2e3d;border-radius:14px;padding:20px;margin-bottom:14px}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:#8b8fa3;margin-bottom:6px;letter-spacing:.3px}
.fg input,.fg textarea{width:100%;background:#0f1117;border:1.5px solid #2a2e3d;border-radius:10px;padding:12px 14px;color:#e8eaf0;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{border-color:#4f8cff}
.fg textarea{min-height:120px;resize:vertical;line-height:1.6}
.fg input::placeholder,.fg textarea::placeholder{color:#5a5e72}

.room-row{display:flex;gap:8px}
.room-row input{flex:1}
.room-save{background:#222633;border:1px solid #2a2e3d;color:#8b8fa3;border-radius:10px;padding:0 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.room-save:hover{border-color:#4f8cff;color:#4f8cff}

.saved-rooms{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.room-chip{font-size:12px;padding:5px 12px;border-radius:16px;cursor:pointer;background:#222633;color:#8b8fa3;border:1px solid #2a2e3d;transition:all .15s;user-select:none;display:flex;align-items:center;gap:4px}
.room-chip:active{transform:scale(.95)}
.room-chip.active{background:rgba(79,140,255,.12);color:#4f8cff;border-color:rgba(79,140,255,.3)}
.room-chip .del{font-size:10px;color:#5a5e72;margin-left:2px}
.room-chip .del:hover{color:#e94560}

.pri-row{display:flex;gap:8px}
.pri-btn{flex:1;padding:10px;border:1px solid #2a2e3d;border-radius:10px;background:#222633;color:#8b8fa3;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.pri-btn:active{transform:scale(.97)}
.pri-btn.on{border-color:rgba(79,140,255,.3);color:#4f8cff;background:rgba(79,140,255,.08)}
.pri-btn.urgent.on{border-color:rgba(233,69,96,.3);color:#e94560;background:rgba(233,69,96,.08)}

.btn-send{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.5px}
.btn-send:active{transform:scale(.98)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

.history{margin-top:14px}
.history h3{font-size:13px;font-weight:700;color:#5a5e72;margin-bottom:8px}
.hist-item{background:#1a1d27;border:1px solid #2a2e3d;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hist-item .hi-icon{font-size:16px}
.hist-item .hi-body{flex:1;min-width:0}
.hist-item .hi-msg{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-item .hi-sub{font-size:10px;color:#5a5e72;margin-top:1px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.ok{border:1px solid #00c853}
.toast.err{border:1px solid #e94560}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📤</div>
  <h1>메세지 <span>발송</span></h1>
</div>

<div class="main">
  <!-- 방 이름 -->
  <div class="card">
    <div class="fg">
      <label>📡 방 이름 (ntfy 토픽)</label>
      <div class="room-row">
        <input type="text" id="roomInput" placeholder="예: taejin-notice">
        <button class="room-save" onclick="saveRoom()">저장</button>
      </div>
      <div class="saved-rooms" id="savedRooms"></div>
    </div>

    <!-- 중요도 -->
    <div class="fg">
      <label>중요도</label>
      <div class="pri-row">
        <div class="pri-btn on" onclick="setPri('일반',this)">일반</div>
        <div class="pri-btn urgent" onclick="setPri('긴급',this)">🔴 긴급</div>
      </div>
    </div>

    <!-- 메세지 -->
    <div class="fg">
      <label>✉️ 메세지</label>
      <textarea id="msgInput" placeholder="전송할 내용을 입력하세요"></textarea>
    </div>

    <button class="btn-send" id="btnSend" onclick="send()">📤 발송</button>
  </div>

  <!-- 발송 이력 -->
  <div class="history" id="historyBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const NTFY = 'https://ntfy.sh';
let pri = '일반';
let rooms = JSON.parse(localStorage.getItem('NTFY_ROOMS') || '[]');
let history = JSON.parse(localStorage.getItem('NTFY_HIST') || '[]');

// 초기화
document.addEventListener('DOMContentLoaded', () => {
  renderRooms();
  renderHistory();
  // 마지막 사용 방 복원
  const last = localStorage.getItem('NTFY_LAST_ROOM');
  if (last) document.getElementById('roomInput').value = last;
});

// 방 저장
function saveRoom() {
  const name = document.getElementById('roomInput').value.trim();
  if (!name) return toast('방 이름을 입력하세요', 'err');
  if (!rooms.includes(name)) {
    rooms.push(name);
    localStorage.setItem('NTFY_ROOMS', JSON.stringify(rooms));
    toast('저장됨', 'ok');
  }
  renderRooms();
}

function selectRoom(name) {
  document.getElementById('roomInput').value = name;
  renderRooms();
}

function deleteRoom(name, e) {
  e.stopPropagation();
  rooms = rooms.filter(r => r !== name);
  localStorage.setItem('NTFY_ROOMS', JSON.stringify(rooms));
  renderRooms();
}

function renderRooms() {
  const cur = document.getElementById('roomInput').value.trim();
  document.getElementById('savedRooms').innerHTML = rooms.map(r =>
    `<span class="room-chip ${r === cur ? 'active' : ''}" onclick="selectRoom('${r}')">
      # ${r} <span class="del" onclick="deleteRoom('${r}',event)">✕</span>
    </span>`
  ).join('');
}

// 중요도
function setPri(p, el) {
  pri = p;
  document.querySelectorAll('.pri-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

// 발송
async function send() {
  const room = document.getElementById('roomInput').value.trim();
  const msg = document.getElementById('msgInput').value.trim();

  if (!room) return toast('방 이름을 입력하세요', 'err');
  if (!msg) return toast('메세지를 입력하세요', 'err');

  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  try {
    const res = await fetch(`${NTFY}/${room}`, {
      method: 'POST',
      headers: {
        'Priority': pri === '긴급' ? '5' : '3',
        'Tags': pri === '긴급' ? 'rotating_light,warning' : 'envelope',
      },
      body: msg
    });

    if (res.ok) {
      toast('발송 완료!', 'ok');
      localStorage.setItem('NTFY_LAST_ROOM', room);

      // 이력 저장
      history.unshift({
        room, msg: msg.substring(0, 100), pri,
        time: new Date().toISOString()
      });
      if (history.length > 30) history = history.slice(0, 30);
      localStorage.setItem('NTFY_HIST', JSON.stringify(history));

      document.getElementById('msgInput').value = '';
      renderHistory();
    } else {
      toast('발송 실패: ' + res.status, 'err');
    }
  } catch (e) {
    toast('네트워크 오류', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '📤 발송';
  }
}

// 이력
function renderHistory() {
  const box = document.getElementById('historyBox');
  if (!history.length) { box.innerHTML = ''; return; }
  box.innerHTML = `<h3>최근 발송 이력</h3>` + history.slice(0, 10).map(h => {
    const d = new Date(h.time);
    const t = d.toDateString() === new Date().toDateString()
      ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
      : `${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="hist-item">
      <div class="hi-icon">${h.pri === '긴급' ? '🔴' : '📨'}</div>
      <div class="hi-body">
        <div class="hi-msg">${esc(h.msg)}</div>
        <div class="hi-sub"># ${esc(h.room)} · ${t}</div>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function toast(m, t) { const e = document.getElementById('toast'); e.textContent = m; e.className = `toast show ${t}`; setTimeout(() => e.classList.remove('show'), 2500); }
</script>
</body>
</html>
