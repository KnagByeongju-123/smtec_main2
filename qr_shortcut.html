<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 바로가기 v1.2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--orange:#f97316;--purple:#a855f7;--red:#ef4444}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:20px;max-width:560px;margin:0 auto}
h1{font-size:19px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px}
.sub{font-size:11px;color:var(--sub);text-align:center;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.lb{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}

.seg{display:flex;gap:6px;margin-bottom:12px}
.seg-btn{flex:1;padding:11px 6px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;text-align:center}
.seg-btn.active{background:var(--accent);color:#0f172a;border-color:var(--accent)}

select,input[type=text],input[type=url],textarea{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:14px;font-family:inherit}
select{font-weight:700;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2338bdf8'><path d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:36px}
select:focus,input:focus,textarea:focus{border-color:var(--accent);outline:none}
textarea{resize:vertical;min-height:60px;font-size:13px;word-break:break-all}

.btn{padding:12px 16px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-accent{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}

.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.row>*{flex:1}
.row .btn{flex:0 0 auto}

.url-box{background:#0a0d14;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'Consolas','Menlo',monospace;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.5;user-select:all;-webkit-user-select:all;min-height:50px}
.url-box:empty::before{content:'↑ 위 설정 후 생성 버튼을 누르세요';color:var(--sub);font-style:italic;font-family:'Noto Sans KR';font-size:12px}

.qr-wrap{text-align:center;display:none;margin-top:10px}
.qr-wrap.show{display:block}
.qr-box{display:inline-block;background:#fff;padding:12px;border-radius:12px;margin-bottom:8px}
.qr-box img{display:block;width:220px;height:220px}
.qr-label{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:6px}
.qr-sub{font-size:11px;color:var(--sub);margin-top:4px}
.qr-act{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.qr-act .btn{flex:1;padding:10px 8px;font-size:12px;min-width:110px;max-width:160px}

.preset{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preset-btn{padding:8px 12px;border-radius:8px;background:var(--card2);color:var(--txt);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.preset-btn:hover{border-color:var(--accent)}
.preset-btn.ntfy{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#d8b4fe}

.saved-list{margin-top:8px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.saved-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .12s}
.saved-item:hover{border-color:var(--accent);background:rgba(56,189,248,.05)}
.saved-item .si-ic{font-size:22px;flex-shrink:0}
.saved-item .si-body{flex:1;min-width:0}
.saved-item .si-title{font-size:13px;font-weight:800;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-item .si-url{font-size:10px;color:var(--sub);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.saved-item .si-del{border:none;background:rgba(239,68,68,.1);color:var(--red);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.hint{font-size:11px;color:var(--sub);background:rgba(56,189,248,.08);padding:10px 12px;border-radius:8px;line-height:1.6}
.hint code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:3px;color:var(--accent);font-family:monospace;font-size:10px}

.empty{text-align:center;padding:24px 20px;color:var(--sub);font-size:12px}

@media print{
  body{background:#fff;color:#000;padding:0}
  .card,.sub,h1,.hint,.toast,.seg,.qr-act,.url-box,.row,.lb,.preset,.saved-list,#genBtn{display:none !important}
  .qr-wrap{display:block !important;page-break-after:always}
  .qr-box{border:1px solid #000;padding:20px}
  .qr-box img{width:300px;height:300px}
  .qr-label{color:#000;font-size:22px;margin-bottom:15px;font-weight:900}
  .qr-sub{color:#333;font-size:12px}
}
</style>
</head>
<body>

<h1>🔗 QR 바로가기 v1.2</h1>
<div class="sub">URL · 구글드라이브 링크 → QR 변환</div>

<!-- ============ 1. 입력 ============ -->
<div class="card">
  <div class="lb">1️⃣ 제목 / 라벨</div>
  <input type="text" id="title" placeholder="예: ntfy 앱 설치, 작업자 매뉴얼">
  <div style="height:10px"></div>

  <div class="lb">2️⃣ URL 또는 구글드라이브 링크</div>
  <textarea id="url" placeholder="https:// ... 붙여넣기"></textarea>

  <div class="preset">
    <button class="preset-btn ntfy" onclick="setPreset('https://drive.google.com/file/d/1aMdbTGWCBg5I1EnCr4C4ENnqeBldpot4/view?usp=drivesdk', 'ntfy')">ntfy</button>
    <button class="preset-btn" onclick="setPreset('https://knagbyeongju-123.github.io/smtec_main2/', 'ESG Smart Factory')">ESG 메인</button>
    <button class="preset-btn" onclick="setPreset('', '')">초기화</button>
  </div>
</div>

<!-- ============ 2. 구글드라이브 변환 옵션 ============ -->
<div class="card" id="driveCard" style="display:none">
  <div class="lb">📁 구글드라이브 변환 모드</div>
  <div class="seg">
    <button class="seg-btn active" data-mode="view" onclick="setMode('view')">미리보기</button>
    <button class="seg-btn" data-mode="download" onclick="setMode('download')">다운로드</button>
    <button class="seg-btn" data-mode="preview" onclick="setMode('preview')">전체화면</button>
  </div>
  <div class="hint">
    • <b>미리보기</b>: 드라이브 화면으로 이동 (로그인 필요할 수도)<br>
    • <b>다운로드</b>: APK·이미지 즉시 다운로드<br>
    • <b>전체화면</b>: PDF·이미지 미리보기 (로그인 불필요)
  </div>
</div>

<!-- ============ 3. QR 생성 버튼 ============ -->
<div class="card">
  <div class="lb">3️⃣ QR 생성</div>
  <button class="btn btn-accent" id="genBtn" onclick="generateQR()" style="width:100%">🔳 QR 생성</button>
  <div style="height:10px"></div>
  <div class="lb">변환된 URL</div>
  <div class="url-box" id="urlBox"></div>

  <!-- QR 결과 -->
  <div class="qr-wrap" id="qrWrap">
    <div class="qr-label" id="qrLabel"></div>
    <div class="qr-box">
      <img id="qrImg" alt="QR Code">
    </div>
    <div class="qr-sub">폰 카메라로 스캔하세요</div>
    <div class="qr-act">
      <button class="btn btn-green" onclick="downloadQR()">💾 이미지</button>
      <button class="btn btn-orange" onclick="printQR()">🖨 인쇄</button>
      <button class="btn btn-purple" onclick="saveToList()">⭐ 저장</button>
      <button class="btn btn-ghost" onclick="copyUrl()">📋 URL</button>
    </div>
  </div>
</div>

<!-- ============ 즐겨찾기 ============ -->
<div class="card">
  <div class="lb" style="display:flex;align-items:center;gap:6px">
    ⭐ 저장된 QR 목록 <span id="savedCount" style="color:var(--accent);font-weight:700;margin-left:auto"></span>
  </div>
  <div class="saved-list" id="savedList">
    <div class="empty">저장된 QR이 없습니다</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

var curUrl='';
var curLabel='';
var curMode='view';

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}

function toast(msg){
  var t=$('#toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},1800);
}

// ===== 구글드라이브 처리 =====
function extractDriveId(url){
  if(!url) return null;
  var m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  m=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m) return m[1];
  return null;
}

function isDriveURL(url){
  return /drive\.google\.com/.test(url);
}

function buildDriveURL(id, mode){
  if(mode==='view') return 'https://drive.google.com/file/d/'+id+'/view';
  if(mode==='download') return 'https://drive.google.com/uc?export=download&id='+id;
  if(mode==='preview') return 'https://drive.google.com/file/d/'+id+'/preview';
  return 'https://drive.google.com/file/d/'+id+'/view';
}

function setPreset(url, title){
  $('#url').value=url;
  $('#title').value=title;
  onURLChange();
}

function onURLChange(){
  var raw=$('#url').value.trim();
  if(!raw){
    $('#driveCard').style.display='none';
    return;
  }
  if(isDriveURL(raw)){
    var id=extractDriveId(raw);
    if(id){
      $('#driveCard').style.display='';
      return;
    }
  }
  $('#driveCard').style.display='none';
}

function setMode(mode){
  curMode=mode;
  $$('.seg-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.mode===mode);
  });
}

$('#url').addEventListener('input', onURLChange);

// ===== QR 생성 =====
function generateQR(){
  var title=$('#title').value.trim();
  var url=$('#url').value.trim();
  if(!url){toast('⚠ URL을 입력하세요');return}

  // 구글드라이브 링크면 모드 적용
  if(isDriveURL(url)){
    var id=extractDriveId(url);
    if(id) url=buildDriveURL(id, curMode);
  } else {
    // http(s):// 누락시 자동 보정
    if(!/^https?:\/\//i.test(url)){
      if(/^[\w.-]+\.\w{2,}/.test(url)){
        url='https://'+url;
      } else {
        toast('⚠ URL 형식이 올바르지 않습니다');return;
      }
    }
    try{new URL(url)}catch(e){toast('⚠ URL 형식 오류');return}
  }

  if(!title) title='바로가기';
  showResult(url, title);
}

function showResult(url, label){
  curUrl=url;
  curLabel=label;
  $('#urlBox').textContent=url;
  var qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=480x480&margin=10&data='+encodeURIComponent(url);
  $('#qrImg').src=qrUrl;
  $('#qrLabel').textContent='📌 '+label;
  $('#qrWrap').classList.add('show');
  toast('✅ QR 생성됨');
  setTimeout(function(){
    $('#qrWrap').scrollIntoView({behavior:'smooth',block:'center'});
  },150);
}

// ===== 이미지 다운로드 =====
async function downloadQR(){
  if(!curUrl) return;
  toast('⏳ 이미지 생성중...');
  var qrApiUrl='https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=20&data='+encodeURIComponent(curUrl);

  try{
    if(document.fonts && document.fonts.load){
      try{
        await document.fonts.load('bold 52px "Noto Sans KR"');
        await document.fonts.load('600 26px "Noto Sans KR"');
        await document.fonts.ready;
      }catch(e){}
    }

    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var W=900, H=1100;
      canvas.width=W;
      canvas.height=H;
      var ctx=canvas.getContext('2d');

      // 배경
      ctx.fillStyle='#fff';
      ctx.fillRect(0,0,W,H);

      // 라벨 (상단)
      ctx.fillStyle='#000';
      ctx.font='bold 52px "Noto Sans KR", sans-serif';
      ctx.textAlign='center';
      ctx.fillText(curLabel, W/2, 90);

      // QR 이미지 (중앙)
      ctx.drawImage(img, 50, 130, 800, 800);

      // URL (하단)
      ctx.fillStyle='#666';
      ctx.font='600 22px "Noto Sans KR", sans-serif';
      var urlText=curUrl;
      if(urlText.length>60) urlText=urlText.substring(0,57)+'...';
      ctx.fillText(urlText, W/2, 990);
      ctx.fillStyle='#999';
      ctx.font='400 18px "Noto Sans KR", sans-serif';
      ctx.fillText('스캔하여 바로가기', W/2, 1030);

      // 다운로드
      canvas.toBlob(function(blob){
        var a=document.createElement('a');
        var fname=(curLabel||'qrcode').replace(/[^\w가-힣]/g,'_');
        a.download='qr_'+fname+'.png';
        a.href=URL.createObjectURL(blob);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
        toast('💾 이미지 저장됨');
      }, 'image/png');
    };
    img.onerror=function(){
      toast('⚠ 이미지 로드 실패 - 이미지를 길게 눌러 저장하세요');
      window.open(qrApiUrl,'_blank');
    };
    img.src=qrApiUrl;
  }catch(e){
    console.error(e);
    toast('❌ 다운로드 실패');
  }
}

// ===== 인쇄 =====
function printQR(){
  if(!curUrl){toast('⚠ 먼저 QR을 생성하세요');return}
  window.print();
}

// ===== URL 복사 =====
function copyUrl(){
  if(!curUrl){toast('⚠ 먼저 QR을 생성하세요');return}
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(curUrl).then(function(){
      toast('📋 URL 복사됨');
    }).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
  function fallbackCopy(){
    var ta=document.createElement('textarea');
    ta.value=curUrl;
    ta.style.position='fixed';
    ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy');toast('📋 URL 복사됨')}
    catch(e){toast('❌ 복사 실패')}
    document.body.removeChild(ta);
  }
}

// ===== 저장 =====
var SK='qr_shortcut_list';
function loadList(){
  try{return JSON.parse(localStorage.getItem(SK)||'[]')}
  catch(e){return []}
}
function saveListLs(list){
  try{localStorage.setItem(SK, JSON.stringify(list))}catch(e){}
}

function saveToList(){
  if(!curUrl){toast('⚠ 먼저 QR을 생성하세요');return}
  var list=loadList();
  if(list.find(function(x){return x.url===curUrl})){
    toast('⚠ 이미 저장됨');return;
  }
  list.unshift({
    title: curLabel||curUrl.slice(0,30),
    url: curUrl,
    created_at: new Date().toISOString()
  });
  if(list.length>50) list.pop();
  saveListLs(list);
  renderList();
  toast('⭐ 저장됨');
}

function renderList(){
  var list=loadList();
  var el=$('#savedList');
  $('#savedCount').textContent=list.length>0?'('+list.length+')':'';
  if(list.length===0){
    el.innerHTML='<div class="empty">저장된 QR이 없습니다</div>';
    return;
  }
  el.innerHTML=list.map(function(it,i){
    var icon='🔗';
    if(/drive\.google\.com/.test(it.url)) icon='📁';
    else if(/github\.io|github\.com/.test(it.url)) icon='🌐';
    else if(/\.apk(\?|$)/.test(it.url)) icon='📱';
    return '<div class="saved-item" onclick="loadItem('+i+')">'+
      '<div class="si-ic">'+icon+'</div>'+
      '<div class="si-body">'+
      '<div class="si-title">'+escapeHtml(it.title)+'</div>'+
      '<div class="si-url">'+escapeHtml(it.url)+'</div>'+
      '</div>'+
      '<button class="si-del" onclick="event.stopPropagation();removeItem('+i+')">✕</button>'+
      '</div>';
  }).join('');
}

function loadItem(i){
  var list=loadList();
  var it=list[i];
  if(!it) return;
  $('#title').value=it.title;
  $('#url').value=it.url;

  if(isDriveURL(it.url)){
    $('#driveCard').style.display='';
    if(/uc\?export=download/.test(it.url)) curMode='download';
    else if(/preview/.test(it.url)) curMode='preview';
    else curMode='view';
    $$('.seg-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.mode===curMode);
    });
  } else {
    $('#driveCard').style.display='none';
  }

  // 바로 QR 표시 (재생성 없이 저장된 그대로)
  showResult(it.url, it.title);
}

function removeItem(i){
  if(!confirm('삭제하시겠습니까?')) return;
  var list=loadList();
  list.splice(i,1);
  saveListLs(list);
  renderList();
  toast('🗑 삭제됨');
}

function escapeHtml(s){
  if(!s) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

renderList();
</script>

</body>
</html>
