<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>일상점검 종합현황 v1.6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR','맑은 고딕',sans-serif;background:#f5f5f5;color:#222;font-size:13px;padding-bottom:30px}
.hdr{background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;padding:14px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
.hdr p{font-size:11px;opacity:.85;margin-top:3px}

.toolbar{background:#fff;padding:10px 14px;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tb-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.tb-row:last-child{margin-bottom:0}
.fg{display:flex;align-items:center;gap:4px;font-size:12px}
.fg label{font-weight:600;color:#555;white-space:nowrap}
.fg input[type=date],.fg select{padding:5px 8px;border:1.5px solid #ccc;border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-blue{background:#1565c0;color:#fff}
.btn-green{background:#2e7d32;color:#fff}
.btn-gray{background:#757575;color:#fff}
.btn-orange{background:#ef6c00;color:#fff}
.btn-period{background:#e3f2fd;color:#1565c0;border:1.5px solid #90caf9;font-weight:700}
.btn-period.active{background:#1565c0;color:#fff;border-color:#1565c0}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.legend{display:flex;gap:10px;font-size:11px;color:#666;flex-wrap:wrap}
.lg-item{display:flex;align-items:center;gap:3px}
.lg-icon{display:inline-block;width:14px;height:14px;border-radius:3px;text-align:center;line-height:14px;font-size:10px;font-weight:700}

.tbl-wrap{margin:0 14px;background:#fff;border-radius:8px;overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.06);max-height:calc(100vh - 180px)}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:11px}
thead th{background:#f5f7fa;color:#333;font-weight:700;padding:8px 6px;border-bottom:2px solid #1565c0;border-right:1px solid #e0e0e0;position:sticky;top:0;z-index:5;text-align:center;white-space:nowrap}
thead th.col-cat{position:sticky;left:0;z-index:7;background:#eef3fa;width:60px;min-width:60px}
thead th.col-eq{position:sticky;left:60px;z-index:7;background:#eef3fa;min-width:120px;text-align:left;padding-left:10px}
thead th.col-day{min-width:42px;cursor:pointer}
thead th.col-day.weekend{background:#fff5f5;color:#d32f2f}
thead th.col-day.sunday{background:#fff0f0;color:#c62828}
thead th.col-day.today{background:#fffde7;color:#f57f17;border-bottom-color:#f57f17}
thead th.col-total{background:#e8f5e9;min-width:55px}
tbody td{padding:5px 4px;border-bottom:1px solid #f0f0f0;border-right:1px solid #f5f5f5;text-align:center;font-size:11px}
tbody td.cat{position:sticky;left:0;background:#f9fafc;font-weight:700;font-size:10px;color:#555;z-index:3}
tbody td.eq{position:sticky;left:60px;background:#fff;text-align:left;padding-left:10px;font-weight:600;color:#222;z-index:3}
tbody td.weekend{background:#fafafa}
tbody td.sunday{background:#fff7f7}
tbody td.today{background:#fffde7}
tbody td.total{background:#f1f8e9;font-weight:700;color:#2e7d32}
tbody tr:hover td{background:#fff8e1!important}
tbody tr.cat-prod td.cat{background:#e3f2fd;color:#1565c0;border-left:3px solid #1565c0}
tbody tr.cat-qc td.cat{background:#fce4ec;color:#c2185b;border-left:3px solid #c2185b}
tbody tr.cat-wash td.cat{background:#e8f5e9;color:#2e7d32;border-left:3px solid #2e7d32}
tbody tr.cat-ship td.cat{background:#fff3e0;color:#e65100;border-left:3px solid #e65100}

.cell-ok{color:#2e7d32;font-weight:800}
.cell-ng{color:#c62828;font-weight:800}
.cell-mix{color:#ef6c00;font-weight:800}
.cell-none{color:#bbb}

.empty{padding:50px 20px;text-align:center;color:#999}
.empty-ic{font-size:42px;margin-bottom:10px}
.loading{padding:40px 20px;text-align:center;color:#1565c0;font-weight:700}
.loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid #1565c0;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:14px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;max-width:480px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hd{padding:14px 16px;border-bottom:1px solid #eee;font-weight:800;font-size:14px;display:flex;justify-content:space-between;align-items:center;background:#f8f9fb}
.modal-bd{padding:14px 16px;overflow-y:auto;flex:1}
.modal-cls{background:none;border:none;font-size:22px;cursor:pointer;color:#888}
.detail-row{padding:8px 10px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;font-size:12px}
.detail-row:last-child{border:none}
.dt-label{color:#666;font-weight:600}
.dt-val{font-weight:700;color:#222}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:22px;font-size:12px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
.tbl-wrap{margin:0 8px;max-height:calc(100vh - 210px)}
thead th.col-eq{min-width:90px}
thead th.col-day{min-width:36px}
tbody td.eq{padding-left:6px}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>📋 일상점검 종합현황</h1>
  <p>생산설비 · 검사기 · 세척기 · 출하공정 통합 점검이력</p>
</div>

<div class="toolbar">
  <div class="tb-row">
    <div class="fg"><label>📅</label><input type="date" id="dtStart"></div>
    <div class="fg"><label>~</label><input type="date" id="dtEnd"></div>
    <button class="btn btn-period" onclick="quickPeriod('week')">📅 일주일</button>
    <button class="btn btn-period" onclick="quickPeriod('month')">🗓️ 한달</button>
    <div class="fg">
      <select id="catFilter">
        <option value="">전체구분</option>
        <option value="prod">생산설비</option>
        <option value="qc">검사기</option>
        <option value="wash">세척기</option>
        <option value="ship">출하공정</option>
      </select>
    </div>
    <button class="btn btn-blue" onclick="loadData()">🔄 조회</button>
    <button class="btn btn-green" onclick="exportXlsx()">📥 엑셀</button>
    <button class="btn btn-gray" onclick="window.location.href='index.html'">◀ 메인</button>
  </div>
  <div class="tb-row">
    <div class="legend">
      <div class="lg-item"><span class="lg-icon" style="background:#e8f5e9;color:#2e7d32">✓</span>OK</div>
      <div class="lg-item"><span class="lg-icon" style="background:#ffebee;color:#c62828">✗</span>NG</div>
      <div class="lg-item"><span class="lg-icon" style="background:#fff3e0;color:#ef6c00">±</span>혼재</div>
      <div class="lg-item"><span class="lg-icon" style="background:#f5f5f5;color:#bbb">-</span>미점검</div>
      <div class="lg-item" style="margin-left:auto;color:#888;font-size:10px">셀 클릭→상세</div>
    </div>
  </div>
</div>

<div class="tbl-wrap" id="tblWrap">
  <div class="empty">
    <div class="empty-ic">🔍</div>
    <div>기간을 선택 후 조회 버튼을 눌러주세요</div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-bg" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <span id="modalTitle">점검 상세</span>
      <button class="modal-cls" onclick="closeModal()">×</button>
    </div>
    <div class="modal-bd" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* ========== Supabase 설정 ========== */
const SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY='sb_publishable_9j2YkkL-7ul1TrhH-NjVdQ_vWDG2-1D';

/* ========== 점검 테이블 정의 ==========
 *   생산설비 → p_machine_check (machine 컬럼)
 *   검사기   → qc_machine_check (machine 컬럼)
 *   세척기   → wash_machine_check (machine 컬럼)
 *   출하공정 → shipping_check (machine 컬럼)
 *   설비마스터 → machine_master_tj (보조)
 *              → machine_status (실설비 자동 동기화)
 */
const CFG={
  prod:{table:'p_machine_check',  label:'생산설비', color:'#1565c0', icon:'🏭'},
  qc:  {table:'qc_machine_check', label:'검사기',  color:'#c2185b', icon:'🔬'},
  wash:{table:'wash_machine_check',label:'세척기',  color:'#2e7d32', icon:'🧼'},
  ship:{table:'shipping_check',   label:'출하공정', color:'#e65100', icon:'📦'}
};

let CACHE={records:{prod:[],qc:[],wash:[],ship:[]}, equipments:{prod:[],qc:[],wash:[],ship:[]}, days:[], byKey:{}};

/* ========== 공통 함수 ========== */
function $(id){return document.getElementById(id)}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function ymd(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0')}
function todayKst(){const n=new Date();n.setHours(n.getHours()+(9-(n.getTimezoneOffset()/-60)));return ymd(n)}

async function sbGet(path){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error('HTTP '+r.status+' '+(await r.text()).substring(0,80));
  return r.json();
}

/* ========== 기간 프리셋 (week=최근7일, month=최근30일) ========== */
function setPeriod(p){
  const today=new Date();
  let s,e=ymd(today);
  if(p==='week'){const a=new Date(today);a.setDate(a.getDate()-6);s=ymd(a)}
  else if(p==='month'){const a=new Date(today);a.setDate(a.getDate()-29);s=ymd(a)}
  const dtS=$('dtStart'), dtE=$('dtEnd');
  if(s && dtS && dtE){ dtS.value=s; dtE.value=e; }
}

/* 일주일/한달 버튼 → 기간설정 + 자동조회 + 활성표시 */
function quickPeriod(p){
  setPeriod(p);
  document.querySelectorAll('.btn-period').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.btn-period').forEach(b=>{
    if((p==='week'&&b.textContent.includes('일주일'))||(p==='month'&&b.textContent.includes('한달')))b.classList.add('active');
  });
  loadData();
}

/* ========== 일자 배열 생성 ========== */
function genDays(s,e){
  const arr=[];let d=new Date(s);const end=new Date(e);
  while(d<=end){arr.push(ymd(d));d.setDate(d.getDate()+1)}
  return arr;
}

/* ========== 설비목록 수집 ==========
 * 우선순위:
 *   생산설비 = machine_status(실설비)+ p_machine_check 이력에 등장하는 설비 + machine_master_tj
 *   검사기   = qc_machine_check 이력에서 추출 (설정 테이블 별도 없으면 이력 기반)
 *   세척기   = wash_machine_check 이력에서 추출
 *  + common_code 의 _machine_list 그룹 (있는 경우)
 */
async function loadEquipments(){
  /* 1) 점검이력에서 등장하는 설비명 모두 수집 */
  const eqSet={prod:new Set(),qc:new Set(),wash:new Set(),ship:new Set()};
  for(const k of ['prod','qc','wash','ship']){
    (CACHE.records[k]||[]).forEach(r=>{
      const m=r.machine||r.machine_name||r.equipment_name||r.line;
      if(m)eqSet[k].add(String(m).trim());
    });
  }
  /* 2) machine_status (실설비) 추가 → 생산설비 */
  try{
    const ms=await sbGet('machine_status?select=machine_name,machine_code&order=machine_code');
    ms.forEach(r=>{ if(r.machine_name)eqSet.prod.add(String(r.machine_name).trim()) });
  }catch(e){console.warn('machine_status skip:',e.message)}
  /* 3) machine_master_tj 추가 → 생산설비 (호기_톤수 형태) */
  try{
    const mm=await sbGet('machine_master_tj?select=ho_code,tonnage&order=ho_code');
    mm.forEach(r=>{
      if(r.ho_code){
        const nm=r.tonnage?(r.ho_code+'_'+r.tonnage):String(r.ho_code);
        eqSet.prod.add(nm);
      }
    });
  }catch(e){console.warn('machine_master_tj skip:',e.message)}
  /* 4) common_code 의 점검 설정 그룹 (있다면) */
  try{
    const cc=await sbGet("common_code?select=code_group,code_value&code_group=in.(qc_machine_list,wash_machine_list,p_machine_list,ship_machine_list)");
    cc.forEach(r=>{
      if(!r.code_value)return;
      if(r.code_group==='qc_machine_list')eqSet.qc.add(r.code_value.trim());
      else if(r.code_group==='wash_machine_list')eqSet.wash.add(r.code_value.trim());
      else if(r.code_group==='p_machine_list')eqSet.prod.add(r.code_value.trim());
      else if(r.code_group==='ship_machine_list')eqSet.ship.add(r.code_value.trim());
    });
  }catch(e){console.warn('common_code skip:',e.message)}

  /* 정렬: 호기번호가 앞에 있으면 숫자기준 */
  function srt(a,b){
    const na=parseInt(a),nb=parseInt(b);
    if(!isNaN(na)&&!isNaN(nb))return na-nb;
    return a.localeCompare(b,'ko');
  }
  CACHE.equipments={
    prod:[...eqSet.prod].sort(srt),
    qc:[...eqSet.qc].sort(srt),
    wash:[...eqSet.wash].sort(srt),
    ship:[...eqSet.ship].sort(srt)
  };
}

/* ========== 데이터 조회 ========== */
async function loadData(){
  const s=$('dtStart').value, e=$('dtEnd').value;
  if(!s||!e){toast('기간을 선택하세요');return}
  if(s>e){toast('시작일이 종료일보다 늦습니다');return}

  $('tblWrap').innerHTML='<div class="loading">데이터 조회 중</div>';

  CACHE.records={prod:[],qc:[],wash:[],ship:[]};
  CACHE.byKey={};

  try{
    /* 4개 테이블 병렬 조회 */
    const tasks=Object.keys(CFG).map(async k=>{
      const t=CFG[k].table;
      try{
        const rows=await sbGet(`${t}?select=*&check_date=gte.${s}&check_date=lte.${e}&order=check_date.desc&limit=5000`);
        CACHE.records[k]=rows||[];
      }catch(err){
        console.warn(`${t} 조회실패:`,err.message);
        CACHE.records[k]=[];
      }
    });
    await Promise.all(tasks);

    /* 설비목록 갱신 */
    await loadEquipments();

    /* (cat, equipment, date) → records[] 인덱싱 */
    for(const k of ['prod','qc','wash','ship']){
      CACHE.records[k].forEach(r=>{
        const eq=String(r.machine||r.machine_name||r.equipment_name||r.line||'').trim();
        const dt=r.check_date;
        if(!eq||!dt)return;
        const key=`${k}|${eq}|${dt}`;
        (CACHE.byKey[key]=CACHE.byKey[key]||[]).push(r);
      });
    }
    /* 일자 배열 생성 */
    CACHE.days=genDays(s,e);
    renderTable();
  }catch(err){
    $('tblWrap').innerHTML=`<div class="empty"><div class="empty-ic">⚠️</div><div>조회 실패: ${err.message}</div></div>`;
  }
}

/* ========== 셀 결과 판정 ========== */
function judge(records){
  if(!records||!records.length)return {sign:'-',cls:'cell-none',count:0};
  let okCnt=0,ngCnt=0;
  records.forEach(r=>{
    const res=String(r.result||r.judgement||'').toUpperCase();
    if(res==='NG'||res==='부적합'||res==='FAIL'||(r.ng_count&&r.ng_count>0))ngCnt++;
    else okCnt++;
  });
  if(ngCnt===0)return {sign:'✓',cls:'cell-ok',count:okCnt+ngCnt};
  if(okCnt===0)return {sign:'✗',cls:'cell-ng',count:okCnt+ngCnt};
  return {sign:'±',cls:'cell-mix',count:okCnt+ngCnt};
}

/* ========== 테이블 렌더 ========== */
function renderTable(){
  const cf=$('catFilter').value;
  const days=CACHE.days;
  const today=todayKst();

  let cats=['prod','qc','wash','ship'];
  if(cf)cats=[cf];

  /* 데이터가 전혀 없는지 체크 */
  let totalEq=0;
  cats.forEach(k=>totalEq+=CACHE.equipments[k].length);
  if(totalEq===0){
    $('tblWrap').innerHTML='<div class="empty"><div class="empty-ic">📭</div><div>표시할 설비가 없습니다</div><div style="font-size:11px;margin-top:8px;color:#aaa;line-height:1.6">설비는 다음 중 하나에서 자동 수집됩니다:<br>① 해당 기간에 점검 이력이 1건 이상 있는 설비<br>② 생산설비 마스터 (machine_status / machine_master_tj)<br>③ Supabase common_code 의 *_machine_list 그룹</div></div>';
    return;
  }

  /* 헤더 */
  let h='<table><thead><tr>';
  h+='<th class="col-cat">구분</th>';
  h+='<th class="col-eq">설비</th>';
  days.forEach(d=>{
    const dt=new Date(d);const dow=dt.getDay();
    let cls='col-day';
    if(dow===0)cls+=' sunday';
    else if(dow===6)cls+=' weekend';
    if(d===today)cls+=' today';
    const dispMd=(dt.getMonth()+1)+'/'+dt.getDate();
    const dowName=['일','월','화','수','목','금','토'][dow];
    h+=`<th class="${cls}" title="${d}">${dispMd}<br><span style="font-size:9px;font-weight:500;opacity:.7">${dowName}</span></th>`;
  });
  h+='<th class="col-total">합계</th>';
  h+='</tr></thead><tbody>';

  /* 행 - 각 카테고리별 설비 */
  cats.forEach(k=>{
    const cfg=CFG[k];
    CACHE.equipments[k].forEach(eq=>{
      let rowTotal=0;
      let rowHtml='';
      days.forEach(d=>{
        const dt=new Date(d);const dow=dt.getDay();
        let cls='';
        if(dow===0)cls='sunday';
        else if(dow===6)cls='weekend';
        if(d===today)cls=(cls?cls+' today':'today');
        const recs=CACHE.byKey[`${k}|${eq}|${d}`]||[];
        const j=judge(recs);
        if(j.count>0)rowTotal+=j.count;
        const onClick=recs.length?` onclick="showDetail('${k}',${JSON.stringify(eq).replace(/"/g,'&quot;')},'${d}')" style="cursor:pointer"`:'';
        rowHtml+=`<td class="${cls}"${onClick}><span class="${j.cls}">${j.sign}</span></td>`;
      });
      h+=`<tr class="cat-${k}">`;
      h+=`<td class="cat">${cfg.icon}<br>${cfg.label}</td>`;
      h+=`<td class="eq">${eq}</td>`;
      h+=rowHtml;
      h+=`<td class="total">${rowTotal||'-'}</td>`;
      h+='</tr>';
    });
  });

  h+='</tbody></table>';
  $('tblWrap').innerHTML=h;
}

/* ========== 셀 상세 모달 ========== */
function showDetail(cat,eq,date){
  const recs=CACHE.byKey[`${cat}|${eq}|${date}`]||[];
  const cfg=CFG[cat];
  $('modalTitle').textContent=`${cfg.icon} ${cfg.label} · ${eq} · ${date}`;
  if(!recs.length){$('modalBody').innerHTML='<div class="empty"><div>점검기록 없음</div></div>';$('modal').classList.add('show');return}
  let h='';
  recs.forEach((r,i)=>{
    h+=`<div style="border:1px solid #e0e0e0;border-radius:8px;padding:10px;margin-bottom:8px;background:#fafbfc">`;
    h+=`<div style="font-weight:800;color:${cfg.color};margin-bottom:6px;font-size:13px">기록 ${i+1}/${recs.length}</div>`;
    const fields=[
      ['점검시간',r.check_time||'-'],
      ['점검자',r.inspector||r.checker||'-'],
      ['결과',(r.result||r.judgement)?((r.result==='NG'||r.judgement==='부적합')?'<span style="color:#c62828;font-weight:800">'+(r.judgement||'NG')+'</span>':'<span style="color:#2e7d32;font-weight:800">'+(r.judgement||'OK')+'</span>'):'-'],
      ['NG수',r.ng_count!=null?r.ng_count:'-'],
      ['비고',r.memo||r.note||'-']
    ];
    fields.forEach(([k,v])=>{
      h+=`<div class="detail-row"><span class="dt-label">${k}</span><span class="dt-val">${v}</span></div>`;
    });
    /* 점검항목별 OK/NG 표시 - chk_, item_ 컬럼 또는 results JSONB */
    let items=Object.keys(r).filter(k=>/^(chk_|item_|i_|c_)/.test(k)&&r[k]!=null).map(k=>[k,r[k]]);
    if(!items.length && r.results && typeof r.results==='object'){
      items=Object.entries(r.results).filter(([k,v])=>v!=null);
    }
    if(items.length){
      h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #ddd"><div style="font-size:11px;color:#666;font-weight:700;margin-bottom:4px">점검항목</div>`;
      items.forEach(([ik,iv])=>{
        const v=String(iv);
        const c=v==='NG'?'#c62828':(v==='OK'?'#2e7d32':'#666');
        h+=`<div style="display:inline-block;margin:2px 4px 2px 0;padding:2px 7px;border-radius:10px;background:${v==='NG'?'#ffebee':'#f1f8e9'};color:${c};font-size:10px;font-weight:700">${ik}: ${v}</div>`;
      });
      h+='</div>';
    }
    h+='</div>';
  });
  $('modalBody').innerHTML=h;
  $('modal').classList.add('show');
}
function closeModal(){$('modal').classList.remove('show')}

/* ========== 엑셀 다운로드 ========== */
function exportXlsx(){
  if(!CACHE.days.length){toast('먼저 조회하세요');return}
  const cf=$('catFilter').value;
  const today=todayKst();
  let cats=cf?[cf]:['prod','qc','wash','ship'];
  /* 헤더 */
  const hdr=['구분','설비',...CACHE.days.map(d=>{
    const dt=new Date(d);const dow=['일','월','화','수','목','금','토'][dt.getDay()];
    return (dt.getMonth()+1)+'/'+dt.getDate()+'('+dow+')';
  }),'합계'];
  const data=[hdr];
  cats.forEach(k=>{
    const cfg=CFG[k];
    CACHE.equipments[k].forEach(eq=>{
      const row=[cfg.label,eq];
      let total=0;
      CACHE.days.forEach(d=>{
        const recs=CACHE.byKey[`${k}|${eq}|${d}`]||[];
        const j=judge(recs);
        if(j.count>0)total+=j.count;
        row.push(j.sign==='-'?'':j.sign);
      });
      row.push(total||'');
      data.push(row);
    });
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(data);
  /* 컬럼 너비 */
  ws['!cols']=[{wch:8},{wch:14},...CACHE.days.map(()=>({wch:7})),{wch:7}];
  /* 첫 행 고정 */
  ws['!freeze']={xSplit:2,ySplit:1};
  XLSX.utils.book_append_sheet(wb,ws,'점검현황');

  /* 상세 시트 */
  const detailHdr=['구분','일자','설비','점검자','결과','NG수','점검시간','비고'];
  const detail=[detailHdr];
  cats.forEach(k=>{
    CACHE.records[k].forEach(r=>{
      detail.push([
        CFG[k].label,
        r.check_date||'',
        r.machine||r.machine_name||r.equipment_name||r.line||'',
        r.inspector||r.checker||'',
        r.result||'',
        r.ng_count!=null?r.ng_count:'',
        r.check_time||'',
        r.memo||r.note||''
      ]);
    });
  });
  const ws2=XLSX.utils.aoa_to_sheet(detail);
  ws2['!cols']=[{wch:9},{wch:11},{wch:14},{wch:10},{wch:7},{wch:6},{wch:9},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws2,'상세이력');

  const fname=`일상점검종합_${$('dtStart').value.replace(/-/g,'')}_${$('dtEnd').value.replace(/-/g,'')}.xlsx`;
  XLSX.writeFile(wb,fname);
  toast('엑셀 다운로드 완료');
}

/* ========== 초기화 ========== */
function _init(){
  /* 카테고리 필터 변경 시 테이블만 다시 그림 */
  const cf = $('catFilter');
  if(cf) cf.addEventListener('change', ()=>{ if(CACHE.days.length) renderTable() });

  /* 기본: 최근 7일 자동 설정 + 조회 */
  setPeriod('week');
  document.querySelectorAll('.btn-period').forEach(b=>{
    if(b.textContent.includes('일주일')) b.classList.add('active');
  });
  loadData();
}

/* 스크립트가 <body> 끝에서 실행되든 head에서 실행되든 안전하게 초기화 */
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', _init);
} else {
  /* 이미 DOM 로딩이 끝난 상태(인터랙티브/완료) → 즉시 초기화 */
  _init();
}
</script>
