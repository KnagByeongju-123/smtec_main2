<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>반입 확인</title>
<meta name="theme-color" content="#0f172a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── 헤더 ── */
.hdr{padding:16px 20px 14px;background:#0f1117;border-bottom:1px solid #1a1d27;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:17px;font-weight:800}
.hdr-user{font-size:12px;color:#e2b04a;font-weight:700}
.back-btn{color:#8b8fa3;text-decoration:none;font-size:13px;padding:4px 0}

/* ── 본문 ── */
.body-wrap{padding:20px 16px 100px;max-width:480px;margin:0 auto}

.user-banner{
  display:flex;align-items:center;gap:12px;
  background:rgba(226,176,74,.08);border:1px solid rgba(226,176,74,.25);
  border-radius:14px;padding:14px 16px;margin-bottom:20px;
}
.user-avatar{
  width:44px;height:44px;border-radius:50%;
  background:rgba(226,176,74,.15);border:2px solid rgba(226,176,74,.35);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.user-info-wrap .name{font-size:16px;font-weight:800;color:#e2b04a}
.user-info-wrap .sub{font-size:11px;color:#8b8fa3;margin-top:2px}

.section-title{font-size:12px;font-weight:700;color:#8b8fa3;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

/* ── 반출 목록 카드 ── */
.out-card{
  background:#1a1d27;border:1px solid #2a2e3d;border-radius:14px;
  padding:16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:border-color .18s,background .18s,transform .1s;
  position:relative;overflow:hidden;
}
.out-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(34,197,94,.06),transparent);
  opacity:0;transition:opacity .2s;
}
.out-card:active{transform:scale(.98);border-color:#22c55e;background:#1e2d22;}
.out-card:active::before{opacity:1}

.card-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.card-body{flex:1;min-width:0}
.card-item{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-dest{font-size:12px;color:#8b8fa3;margin-top:3px}
.card-time{font-size:11px;color:#f59e0b;margin-top:3px;font-weight:600}
.card-memo{font-size:11px;color:#5a5e72;margin-top:2px}
.card-arrow{color:#5a5e72;font-size:20px;flex-shrink:0}

.empty-state{
  text-align:center;padding:60px 20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon{font-size:48px;opacity:.4}
.empty-text{font-size:14px;color:#5a5e72;line-height:1.6}
.empty-sub{font-size:12px;color:#3a3e4d}

/* ── 반입 팝업 모달 ── */
#inPopupBg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:9000;display:none;
  align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#inPopupBg.open{display:flex}
#inPopup{
  background:#1a1d27;border:1px solid #2a2e3d;border-radius:22px;
  width:100%;max-width:360px;
  box-shadow:0 32px 80px rgba(0,0,0,.9);overflow:hidden;
  transform:scale(.9) translateY(30px);opacity:0;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .22s ease;
}
#inPopupBg.open #inPopup{transform:scale(1) translateY(0);opacity:1}

.popup-hdr{
  padding:20px 20px 0;text-align:center;
}
.popup-hdr-icon{font-size:40px;margin-bottom:8px}
.popup-hdr-title{font-size:12px;color:#8b8fa3;font-weight:600;letter-spacing:.08em;text-transform:uppercase}

.popup-card{
  margin:14px 16px;
  background:#0f1117;border:1px solid #2a2e3d;border-radius:14px;padding:14px 16px;
}
.popup-item-name{font-size:18px;font-weight:800;color:#e8eaf0;margin-bottom:6px}
.popup-detail-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:#8b8fa3}
.popup-detail-row span{color:#e8eaf0}
.popup-elapsed-badge{
  display:inline-block;
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);
  color:#f59e0b;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;margin-top:4px;
}

/* 반입 메모 입력 (나랏글 연결) */
.popup-memo-wrap{margin:0 16px 14px}
.popup-memo-label{font-size:11px;color:#8b8fa3;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.ng-input{
  width:100%;padding:12px 14px;
  background:#0f1117;border:1.5px solid #2a2e3d;border-radius:10px;
  color:#e8eaf0;font-family:'Noto Sans KR',sans-serif;font-size:14px;
  outline:none;cursor:pointer;transition:border-color .2s,box-shadow .2s;
  caret-color:transparent;user-select:none;-webkit-user-select:none;
}
.ng-input.active{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.ng-input::placeholder{color:#5a5e72}

.popup-actions{padding:0 16px 20px;display:flex;flex-direction:column;gap:8px}
.btn-confirm{
  width:100%;padding:15px;border-radius:13px;border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
  transition:opacity .15s,transform .1s;letter-spacing:.5px;
}
.btn-confirm:active{opacity:.85;transform:scale(.98)}
.btn-confirm:disabled{opacity:.4;cursor:default;transform:none}
.btn-cancel{
  width:100%;padding:10px;border-radius:10px;border:none;
  background:transparent;color:#5a5e72;font-size:13px;cursor:pointer;font-family:inherit;
}
.btn-cancel:active{color:#8b8fa3}

/* ── 나랏글 키보드 팝업 ── */
#ngBackdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9900;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:16px;
}
#ngBackdrop.open{display:flex}
#ngPopup{
  background:#1a1d27;border:1px solid #2a2e3d;border-radius:20px;
  width:100%;max-width:380px;
  box-shadow:0 24px 60px rgba(0,0,0,.9);overflow:hidden;
  transform:scale(.92) translateY(20px);opacity:0;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s ease;
}
#ngBackdrop.open #ngPopup{transform:scale(1) translateY(0);opacity:1}

.ng-popup-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 8px;border-bottom:1px solid #2a2e3d;
}
.ng-popup-title{font-size:11px;font-weight:700;color:#8b8fa3;letter-spacing:.08em;text-transform:uppercase}
.ng-popup-close{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.07);border:none;color:#8b8fa3;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.ng-popup-close:active{background:rgba(255,255,255,.15)}

.ng-preview-wrap{
  padding:8px 12px;background:#0f1117;margin:8px 10px;
  border-radius:8px;border:1px solid #2a2e3d;
  min-height:38px;display:flex;align-items:center;
  font-size:16px;color:#e8eaf0;word-break:break-all;
}
#ngPreview{flex:1}
#ngCursor{
  display:inline-block;width:2px;height:18px;
  background:#22c55e;margin-left:1px;flex-shrink:0;
  animation:blink .8s step-end infinite;vertical-align:middle;
}
@keyframes blink{50%{opacity:0}}

/* 나랏글 모드 탭 */
.ng-tabs{display:flex;gap:4px;padding:0 10px 6px}
.ng-tab{
  flex:1;padding:5px 2px;border-radius:6px;border:none;
  background:transparent;color:#5a5e72;
  font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.ng-tab.on{background:rgba(34,197,94,.15);color:#22c55e}

/* 나랏글 키패드 */
.ng-keys{padding:0 8px 10px}
.ng-row{display:flex;gap:5px;margin-bottom:5px}
.ng-key{
  flex:1;height:48px;border-radius:10px;border:none;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  font-weight:600;color:#e8eaf0;
  background:#242837;border-bottom:2px solid #181b26;
  transition:background .07s,transform .07s;
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;position:relative;
}
.ng-key:active{background:#2e3347;transform:scale(.92)}
.ng-key .main{font-size:18px;line-height:1}
.ng-key .num{position:absolute;top:4px;right:6px;font-size:9px;color:#5a5e72;font-weight:400}
.ng-key.fn{background:#181b26;color:#8b8fa3}
.ng-key.fn:active{background:#222538}
.ng-key.fn .main{font-size:13px}
.ng-key.space{background:#181b26;color:#8b8fa3}
.ng-key.space .main{font-size:12px}
.ng-key.done-btn{
  background:linear-gradient(135deg,rgba(34,197,94,.3),rgba(34,197,94,.12));
  border-bottom-color:rgba(34,197,94,.2);color:#22c55e;
}
.ng-key.done-btn:active{background:rgba(34,197,94,.4)}
.ng-key.done-btn .main{font-size:12px}
.ng-key.del .main{font-size:18px}
.ng-key.wide{flex:2}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <a href="./tool_rent.html" class="back-btn">← 반출관리</a>
  <div class="hdr-title">반입 확인</div>
  <div class="hdr-user" id="hdrUser">—</div>
</div>

<div class="body-wrap">
  <!-- 사용자 배너 -->
  <div class="user-banner">
    <div class="user-avatar">👤</div>
    <div class="user-info-wrap">
      <div class="name" id="bannerName">로그인 필요</div>
      <div class="sub">반출중인 물품을 선택하여 반입 완료 처리하세요</div>
    </div>
  </div>

  <div class="section-title">반출중인 물품</div>

  <!-- 반출 목록 -->
  <div id="outList">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">로딩중...</div>
    </div>
  </div>
</div>

<!-- 반입 확인 팝업 -->
<div id="inPopupBg">
  <div id="inPopup">
    <div class="popup-hdr">
      <div class="popup-hdr-icon">📦</div>
      <div class="popup-hdr-title">반입 확인</div>
    </div>

    <div class="popup-card">
      <div class="popup-item-name" id="popItemName"></div>
      <div class="popup-detail-row">🏷 목적지: <span id="popDest">—</span></div>
      <div class="popup-detail-row">🕐 반출: <span id="popTime">—</span></div>
      <div class="popup-elapsed-badge" id="popElapsed"></div>
    </div>

    <div class="popup-memo-wrap">
      <div class="popup-memo-label">반입 메모 (선택)</div>
      <input class="ng-input" id="inMemoInp"
        placeholder="터치하여 입력" readonly
        data-ng-keyboard data-ng-label="반입 메모">
    </div>

    <div class="popup-actions">
      <button class="btn-confirm" id="btnConfirm">✓ 반입 완료</button>
      <button class="btn-cancel" id="btnCancel">취소</button>
    </div>
  </div>
</div>

<!-- ═══ 나랏글 키보드 팝업 ═══ -->
<div id="ngBackdrop">
  <div id="ngPopup">
    <div class="ng-popup-hdr">
      <div class="ng-popup-title" id="ngPopupTitle">메모 입력</div>
      <button class="ng-popup-close" id="ngCloseBtn">✕</button>
    </div>
    <div class="ng-preview-wrap">
      <span id="ngPreview"></span>
      <span id="ngCursor"></span>
    </div>
    <div class="ng-tabs">
      <button class="ng-tab on" id="ngtab-ko"  onclick="NG.setMode('ko')">가 한글</button>
      <button class="ng-tab"    id="ngtab-en"  onclick="NG.setMode('en')">A 영문</button>
      <button class="ng-tab"    id="ngtab-num" onclick="NG.setMode('num')">1 숫자</button>
    </div>
    <div class="ng-keys" id="ngKeys"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   Supabase
═══════════════════════════════════════════════════ */
const SB_URL = 'https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY = 'sb_publishable_9j2YkkL-7ul1TrhH-NjVdQ_vWDG2-1D';
const TBL = 'checkout_log';

let currentUser = sessionStorage.getItem('ESG_USER') || '';
let selectedId   = null;

/* UI 초기화 */
document.getElementById('hdrUser').textContent   = currentUser || '미로그인';
document.getElementById('bannerName').textContent = currentUser || '⚠ 로그인 필요';

async function sbFetch(method, path, body){
  const opt = {
    method,
    headers:{
      'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    }
  };
  if(body) opt.body = JSON.stringify(body);
  const r = await fetch(SB_URL + '/rest/v1/' + path, opt);
  if(!r.ok) throw new Error(r.status + ': ' + await r.text());
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? await r.json() : null;
}

/* ═══ 반출 목록 로드 ═══ */
async function loadMyOutList(){
  const wrap = document.getElementById('outList');
  if(!currentUser){
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔒</div>
      <div class="empty-text">메인에서 PIN 로그인 후 이용하세요</div>
    </div>`;
    return;
  }

  wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">로딩중...</div></div>`;

  try{
    const enc = encodeURIComponent(currentUser);
    const data = await sbFetch('GET',
      `${TBL}?select=id,user_name,item_name,destination,memo,out_at,status` +
      `&user_name=eq.${enc}&status=eq.out&order=out_at.desc`
    );

    if(!data || data.length === 0){
      wrap.innerHTML = `<div class="empty-state">
        <div class="empty-icon">✅</div>
        <div class="empty-text">현재 반출중인 물품이 없습니다</div>
        <div class="empty-sub">모든 물품이 반입 완료되었습니다</div>
      </div>`;
      return;
    }

    wrap.innerHTML = '';
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'out-card';
      card.onclick = () => openConfirmPopup(item);

      card.innerHTML = `
        <div class="card-icon">📦</div>
        <div class="card-body">
          <div class="card-item">${escHtml(item.item_name || '(품목 없음)')}</div>
          ${item.destination ? `<div class="card-dest">📍 ${escHtml(item.destination)}</div>` : ''}
          <div class="card-time">⏱ ${elapsed(item.out_at)}</div>
          ${item.memo ? `<div class="card-memo">💬 ${escHtml(item.memo)}</div>` : ''}
        </div>
        <div class="card-arrow">›</div>
      `;
      wrap.appendChild(card);
    });

  }catch(err){
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">❌</div>
      <div class="empty-text" style="color:#ef4444">${err.message}</div>
    </div>`;
  }
}

/* ═══ 반입 확인 팝업 열기 ═══ */
function openConfirmPopup(item){
  selectedId = item.id;
  document.getElementById('popItemName').textContent = item.item_name || '(품목 없음)';
  document.getElementById('popDest').textContent     = item.destination || '—';
  document.getElementById('popTime').textContent     = fmtDate(item.out_at);
  document.getElementById('popElapsed').textContent  = elapsed(item.out_at);
  document.getElementById('inMemoInp').value = '';
  document.getElementById('btnConfirm').disabled = false;
  document.getElementById('btnConfirm').textContent = '✓ 반입 완료';
  document.getElementById('inPopupBg').classList.add('open');
}

document.getElementById('btnCancel').onclick = closePopup;
document.getElementById('inPopupBg').onclick = e => {
  if(e.target === document.getElementById('inPopupBg')) closePopup();
};
function closePopup(){
  document.getElementById('inPopupBg').classList.remove('open');
  selectedId = null;
}

/* ═══ 반입 완료 처리 ═══ */
document.getElementById('btnConfirm').onclick = async () => {
  if(!selectedId) return;
  const btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.textContent = '처리중...';

  const inMemo = document.getElementById('inMemoInp').value.trim();

  try{
    const patchBody = {
      status: 'in',
      in_at: new Date().toISOString()
    };
    if(inMemo) patchBody.in_memo = inMemo;

    await sbFetch('PATCH', `${TBL}?id=eq.${selectedId}`, patchBody);
    closePopup();
    await loadMyOutList();
  }catch(err){
    alert('오류: ' + err.message);
    btn.disabled = false;
    btn.textContent = '✓ 반입 완료';
  }
};

/* ═══ 유틸 ═══ */
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function elapsed(iso){
  if(!iso) return '';
  const min = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if(min < 60) return min + '분 경과';
  const hr = Math.floor(min / 60);
  if(hr < 24) return hr + '시간 ' + (min % 60) + '분 경과';
  return Math.floor(hr/24) + '일 ' + (hr%24) + '시간 경과';
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ════════════════════════════════════════════════════
   나랏글 키보드 엔진
   키배열:
   1=ㅣ  2=·(아래아)  3=ㅡ   [⌫]
   4=ㄱㅋ 5=ㄴㄹ  6=ㄷㅌ  [↵]
   7=ㅂㅍ 8=ㅅㅎ  9=ㅈㅊ  [.,?!]
   [!#1][한/영][0=ㅇㅁ][ 공백 ][ ' ]
════════════════════════════════════════════════════ */
const CHO  = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅲ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JONG_SPLIT = {'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],'ㄼ':['ㄹ','ㅂ'],'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ']};

/* 나랏글 모음 조합 규칙: ㅣ=1, ·=2, ㅡ=3 */
/* 기본: ㅣ→ㅣ, ·→ㅏ, ㅡ→ㅡ */
/* ㅣ+·→ㅓ, ·+ㅣ→ㅐ, ·+ㅡ→ㅗ, ㅡ+·→ㅜ */
/* ·+·→ㅑ, ㅣ+··→ㅕ, ·+ㅡ+·→ㅛ, ㅡ+·+ㅡ→ㅠ 등 */
const VOW_SEQ = {
  'ㅣ':'ㅣ', '·':'ㅏ', 'ㅡ':'ㅡ',
  'ㅣ·':'ㅓ', '·ㅣ':'ㅐ',
  '··':'ㅑ', 'ㅣ··':'ㅕ',
  '·ㅡ':'ㅗ', '·ㅡ·':'ㅛ',
  'ㅡ·':'ㅜ', 'ㅡ·ㅡ':'ㅠ',
  'ㅡㅣ':'ㅢ',
  '·ㅡㅣ':'ㅚ',
  'ㅡ·ㅣ':'ㅟ',
  '·ㅡ·ㅣ':'ㅙ', // ㅗ+ㅐ
  'ㅡ··ㅣ':'ㅞ', // ㅜ+ㅔ → ㅡ+·+·ㅣ
  '·ㅣ·':'ㅔ',  // ·ㅣ(ㅐ)+· = ㅔ 
  '·ㅡ·ㅣ':'ㅘ', // ㅗ+ㅏ
  'ㅡ··':'ㅝ',   // ㅜ+ㅓ
};

/* 나랏글 자음 조합 규칙 */
/* 각 키 1회=기본, 2회=된소리/거센소리 */
const CON_CYCLE = {
  'ㄱ':['ㄱ','ㅋ','ㄲ'],
  'ㄴ':['ㄴ','ㄹ'],
  'ㄷ':['ㄷ','ㅌ','ㄸ'],
  'ㅂ':['ㅂ','ㅍ','ㅲ'],
  'ㅅ':['ㅅ','ㅎ','ㅆ'],
  'ㅈ':['ㅈ','ㅊ','ㅉ'],
  'ㅇ':['ㅇ','ㅁ'],
};
/* 복합 종성 */
const COMP_JONG = {
  'ㄱㅅ':'ㄳ','ㄴㅈ':'ㄵ','ㄴㅎ':'ㄶ',
  'ㄹㄱ':'ㄺ','ㄹㅁ':'ㄻ','ㄹㅂ':'ㄼ',
  'ㄹㅅ':'ㄽ','ㄹㅌ':'ㄾ','ㄹㅍ':'ㄿ',
  'ㄹㅎ':'ㅀ','ㅂㅅ':'ㅄ',
};

function resolveVow(r){ return VOW_SEQ[r] || null; }
function isPrefixVow(r){ return Object.keys(VOW_SEQ).some(k => k.startsWith(r) && k !== r); }

function assembleNgBuf(b){
  if(!b.cho && !b.jung) return '';
  const ci = CHO.indexOf(b.cho), vi = JUNG.indexOf(b.jung);
  if(!b.jung) return b.cho;
  if(ci < 0 || vi < 0) return b.cho + (b.jung || '');
  const ji = Math.max(0, JONG.indexOf(b.jong));
  return String.fromCharCode(0xAC00 + ci*21*28 + vi*28 + ji);
}

const NG = (() => {
  let targetEl=null, text='', mode='ko', enUpper=false;
  let buf={cho:'',jung:'',jong:'',rvw:'',phase:'idle'};
  /* 자음 사이클 상태 */
  let conCycle={key:'',idx:0,timer:null};

  function resetBuf(){ buf={cho:'',jung:'',jong:'',rvw:'',phase:'idle'}; }
  function commitBuf(){ const ch=assembleNgBuf(buf); if(ch) text+=ch; resetBuf(); }
  function updatePreview(){ document.getElementById('ngPreview').textContent = text+assembleNgBuf(buf); }

  /* 자음 사이클 입력 (ㄱ→ㅋ→ㄲ 순환) */
  function inputCon(baseKey){
    const cycle = CON_CYCLE[baseKey] || [baseKey];
    let con;

    if(conCycle.key === baseKey){
      conCycle.idx = (conCycle.idx + 1) % cycle.length;
      con = cycle[conCycle.idx];
      clearTimeout(conCycle.timer);
    } else {
      // 다른 키 → 이전 자음 확정
      commitConCycle();
      conCycle.key = baseKey;
      conCycle.idx = 0;
      con = cycle[0];
    }

    conCycle.timer = setTimeout(() => {
      commitConCycle();
    }, 600);

    /* 버퍼에 반영 */
    if(buf.phase === 'idle'){
      buf.cho = con; buf.phase = 'con';
    } else if(buf.phase === 'con'){
      // 같은 키 사이클 중
      if(conCycle.key === baseKey){
        buf.cho = con;
      } else {
        commitBuf(); buf.cho = con; buf.phase = 'con';
      }
    } else if(buf.phase === 'vow'){
      // 종성 자리
      if(JONG.includes(con)){
        buf.jong = con; buf.phase = 'jong';
      } else {
        commitBuf(); buf.cho = con; buf.phase = 'con';
      }
    } else if(buf.phase === 'jong'){
      if(conCycle.key === baseKey){
        // 종성 사이클
        const base = cycle[0];
        if(JONG.includes(con)){
          buf.jong = con;
        } else {
          commitBuf(); buf.cho = con; buf.phase = 'con';
        }
      } else {
        // 복합 종성 시도
        const comp = COMP_JONG[buf.jong + con];
        if(comp){
          buf.jong = comp;
          conCycle.key = ''; conCycle.idx = 0;
        } else {
          commitConCycle();
          commitBuf();
          buf.cho = con; buf.phase = 'con';
          conCycle.key = baseKey; conCycle.idx = 0;
        }
      }
    }
    updatePreview();
  }

  function commitConCycle(){
    conCycle.key = ''; conCycle.idx = 0;
    clearTimeout(conCycle.timer);
  }

  /* 모음 입력 */
  let vtimer=null, vkey='', vtap=0;
  function inputVow(vEl){
    commitConCycle();

    if(vkey === vEl){ vtap++; clearTimeout(vtimer); }
    else { vtap = 1; vkey = vEl; }
    clearTimeout(vtimer);
    vtimer = setTimeout(() => { vkey=''; vtap=0; }, 500);

    // 연속 입력으로 복합 모음 시도
    let raw = buf.rvw + vEl;
    const vResolved = resolveVow(raw);
    const vPrefix   = isPrefixVow(raw);

    if(buf.phase === 'idle'){
      buf.cho = 'ㅇ'; buf.rvw = vEl; buf.phase = 'vow';
      buf.jung = resolveVow(vEl) || '';
    } else if(buf.phase === 'con'){
      buf.rvw = vEl; buf.phase = 'vow';
      buf.jung = resolveVow(vEl) || '';
    } else if(buf.phase === 'vow'){
      if(vResolved || vPrefix){
        buf.rvw = raw;
        buf.jung = vResolved || buf.jung;
      } else {
        commitBuf(); buf.cho='ㅇ'; buf.rvw=vEl; buf.phase='vow';
        buf.jung = resolveVow(vEl) || '';
      }
    } else if(buf.phase === 'jong'){
      // 종성 → 다음 음절 초성
      const pj = buf.jong;
      let nc = pj, kj = '';
      if(JONG_SPLIT[pj]){ const[a,b2]=JONG_SPLIT[pj]; kj=a; nc=b2||pj; }
      const ci=CHO.indexOf(buf.cho), vi=JUNG.indexOf(buf.jung), ji=Math.max(0,JONG.indexOf(kj));
      text += (ci>=0&&vi>=0) ? String.fromCharCode(0xAC00+ci*21*28+vi*28+ji) : (buf.cho+(buf.jung||'')+(kj||''));
      resetBuf();
      buf.cho = nc; buf.rvw = vEl; buf.phase = 'vow';
      buf.jung = resolveVow(vEl) || '';
    }
    updatePreview();
  }

  function backspace(){
    commitConCycle();
    if(buf.phase !== 'idle'){
      if(buf.phase === 'jong'){
        // 복합 종성 분리
        const comp = Object.entries(COMP_JONG).find(([,v]) => v === buf.jong);
        if(comp){ buf.jong = comp[0][0]; }
        else { buf.jong=''; buf.phase='vow'; }
      } else if(buf.phase === 'vow'){
        if(buf.rvw.length > 1){
          buf.rvw = buf.rvw.slice(0,-1);
          buf.jung = resolveVow(buf.rvw) || '';
        } else {
          buf.rvw=''; buf.jung=''; buf.phase='con';
        }
      } else if(buf.phase === 'con'){
        resetBuf();
      }
    } else {
      text = text.slice(0,-1);
    }
    updatePreview();
  }

  function space(){  commitConCycle(); commitBuf(); text+=' '; updatePreview(); }
  function enter(){  commitConCycle(); commitBuf(); text+='\n'; updatePreview(); }

  function done(){
    commitConCycle(); commitBuf();
    if(targetEl){
      targetEl.value = text;
      targetEl.dispatchEvent(new Event('input',{bubbles:true}));
      targetEl.dispatchEvent(new Event('change',{bubbles:true}));
    }
    close();
  }

  function setMode(m){
    commitConCycle(); commitBuf();
    mode = m; enUpper = false;
    ['ko','en','num'].forEach(t => {
      const el = document.getElementById('ngtab-'+t);
      if(el) el.className = 'ng-tab' + (t===m?' on':'');
    });
    renderKeys();
  }

  function open(el, label){
    targetEl = el; text = el.value || '';
    resetBuf(); commitConCycle();
    mode='ko'; enUpper=false;
    document.getElementById('ngPopupTitle').textContent = label || '입력';
    document.getElementById('ngBackdrop').classList.add('open');
    document.querySelectorAll('[data-ng-keyboard]').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    setMode('ko'); updatePreview();
  }

  function close(){
    commitConCycle();
    document.getElementById('ngBackdrop').classList.remove('open');
    if(targetEl) targetEl.classList.remove('active');
    targetEl = null;
  }

  /* ── 키 생성 헬퍼 ── */
  function mk(main, num, fn, cls='', sub=''){
    const b = document.createElement('button');
    b.className = 'ng-key ' + cls;
    b.innerHTML =
      (num !== '' ? `<span class="num">${num}</span>` : '') +
      `<span class="main">${main}</span>` +
      (sub ? `<span style="font-size:9px;color:#5a5e72">${sub}</span>` : '');
    const fire = e => { e.preventDefault(); fn(); };
    b.addEventListener('touchstart', fire, {passive:false});
    b.addEventListener('mousedown',  fire);
    return b;
  }
  function mkRow(...keys){
    const r = document.createElement('div'); r.className='ng-row';
    keys.forEach(k => r.appendChild(k)); return r;
  }

  function renderKeys(){
    const c = document.getElementById('ngKeys'); c.innerHTML='';
    if(mode==='ko') renderKo(c);
    else if(mode==='en') renderEn(c);
    else renderNum(c);
  }

  /* ── 나랏글 한글 배열 ── */
  function renderKo(c){
    // Row1: 1=ㅣ  2=·  3=ㅡ  [⌫]
    c.appendChild(mkRow(
      mk('ㅣ',  '1', ()=>inputVow('ㅣ')),
      mk('·',   '2', ()=>inputVow('·')),
      mk('ㅡ',  '3', ()=>inputVow('ㅡ')),
      mk('⌫',  '',  ()=>backspace(), 'fn del'),
    ));
    // Row2: 4=ㄱㅋ  5=ㄴㄹ  6=ㄷㅌ  [↵]
    c.appendChild(mkRow(
      mk('ㄱ', '4', ()=>inputCon('ㄱ'), '', 'ㅋ'),
      mk('ㄴ', '5', ()=>inputCon('ㄴ'), '', 'ㄹ'),
      mk('ㄷ', '6', ()=>inputCon('ㄷ'), '', 'ㅌ'),
      mk('↵',  '',  ()=>enter(), 'fn'),
    ));
    // Row3: 7=ㅂㅍ  8=ㅅㅎ  9=ㅈㅊ  [.,?!]
    c.appendChild(mkRow(
      mk('ㅂ', '7', ()=>inputCon('ㅂ'), '', 'ㅍ'),
      mk('ㅅ', '8', ()=>inputCon('ㅅ'), '', 'ㅎ'),
      mk('ㅈ', '9', ()=>inputCon('ㅈ'), '', 'ㅊ'),
      mk('.,?!','', ()=>{ commitConCycle(); commitBuf(); openPunct(); }, 'fn'),
    ));
    // Row4: [!#1][한/영][0=ㅇㅁ][  공백  ][ ' ]
    const row4 = document.createElement('div'); row4.className='ng-row';
    row4.appendChild(mk('!#1', '', ()=>setMode('num'), 'fn'));
    row4.appendChild(mk('한/영','', ()=>setMode('en'), 'fn'));
    row4.appendChild(mk('ㅇ', '0', ()=>inputCon('ㅇ'), '', 'ㅁ'));
    const spBtn = mk('공백','',()=>space(),'space wide');
    row4.appendChild(spBtn);
    row4.appendChild(mk("'",  '', ()=>{ commitConCycle(); commitBuf(); text+="'"; updatePreview(); }, 'fn'));
    c.appendChild(row4);
  }

  /* 구두점 팝업 (간이) */
  let punctOpen = false;
  function openPunct(){
    const puncts = ['.','·',',','?','!','…','-','/','(',')','"',"'",'~',':',';'];
    // 기존 팝업 제거
    document.querySelectorAll('.punct-pop').forEach(e=>e.remove());
    const pop = document.createElement('div');
    pop.className = 'punct-pop';
    pop.style.cssText='position:fixed;bottom:260px;left:50%;transform:translateX(-50%);background:#1a1d27;border:1px solid #2a2e3d;border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;z-index:9999;max-width:320px;justify-content:center;box-shadow:0 10px 40px rgba(0,0,0,.8)';
    puncts.forEach(p => {
      const b = document.createElement('button');
      b.textContent = p;
      b.style.cssText='width:44px;height:44px;border-radius:8px;border:1px solid #2a2e3d;background:#242837;color:#e8eaf0;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit';
      const fire = e => { e.preventDefault(); text+=p; updatePreview(); pop.remove(); };
      b.addEventListener('touchstart',fire,{passive:false});
      b.addEventListener('mousedown',fire);
      pop.appendChild(b);
    });
    document.getElementById('ngPopup').appendChild(pop);
    setTimeout(()=>document.addEventListener('click',()=>pop.remove(),{once:true}),100);
  }

  /* ── 영문 배열 ── */
  function renderEn(c){
    [
      ['q','w','e','r','t','y','u','i','o','p'],
      ['a','s','d','f','g','h','j','k','l'],
      ['SHF','z','x','c','v','b','n','m','⌫'],
      ['가나','공백','완료'],
    ].forEach(row_ => {
      const r=document.createElement('div'); r.className='ng-row';
      row_.forEach(k=>{
        const b=document.createElement('button');
        let cls='ng-key', label=k;
        if(k==='SHF'){cls+=' fn'; label=enUpper?'⇧':'⇩';}
        else if(k==='⌫'){cls+=' fn del';}
        else if(k==='가나'){cls+=' fn';}
        else if(k==='공백'){cls+=' space wide';}
        else if(k==='완료'){cls+=' done-btn';}
        else{ label = enUpper ? k.toUpperCase() : k; }
        b.className=cls;
        b.innerHTML=`<span class="main">${label}</span>`;
        const fire=e=>{
          e.preventDefault();
          if(k==='SHF'){enUpper=!enUpper;renderKeys();}
          else if(k==='⌫') backspace();
          else if(k==='가나') setMode('ko');
          else if(k==='공백') space();
          else if(k==='완료') done();
          else{ commitConCycle(); commitBuf(); text+=label; updatePreview(); }
        };
        b.addEventListener('touchstart',fire,{passive:false});
        b.addEventListener('mousedown',fire);
        r.appendChild(b);
      });
      c.appendChild(r);
    });
  }

  /* ── 숫자 배열 ── */
  function renderNum(c){
    [['1','2','3'],['4','5','6'],['7','8','9'],['가나','0','⌫']].forEach(row_=>{
      const r=document.createElement('div'); r.className='ng-row';
      row_.forEach(k=>{
        const b=document.createElement('button');
        let cls='ng-key';
        if(k==='⌫') cls+=' fn del';
        else if(k==='가나') cls+=' fn';
        b.className=cls; b.innerHTML=`<span class="main">${k}</span>`;
        const fire=e=>{
          e.preventDefault();
          if(k==='⌫') backspace();
          else if(k==='가나') setMode('ko');
          else{ commitConCycle(); commitBuf(); text+=k; updatePreview(); }
        };
        b.addEventListener('touchstart',fire,{passive:false});
        b.addEventListener('mousedown',fire);
        r.appendChild(b);
      });
      c.appendChild(r);
    });
    const bot=document.createElement('div'); bot.className='ng-row';
    [{label:'공백',cls:'space wide',fn:space},{label:'완료',cls:'done-btn',fn:done}].forEach(k=>{
      const b=document.createElement('button'); b.className='ng-key '+k.cls;
      b.innerHTML=`<span class="main">${k.label}</span>`;
      const fire=e=>{e.preventDefault();k.fn();};
      b.addEventListener('touchstart',fire,{passive:false}); b.addEventListener('mousedown',fire);
      bot.appendChild(b);
    });
    c.appendChild(bot);
  }

  return { open, close, done, setMode };
})();

/* ── 자동 바인딩 ── */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('[data-ng-keyboard]').forEach(el => {
    const label = el.getAttribute('data-ng-label') || el.placeholder || '입력';
    const fire = () => NG.open(el, label);
    el.addEventListener('click', fire);
    el.addEventListener('focus', e => { e.target.blur(); fire(); });
  });
  document.getElementById('ngBackdrop').addEventListener('click', e => {
    if(e.target === document.getElementById('ngBackdrop')) NG.close();
  });
  document.getElementById('ngCloseBtn').addEventListener('click', () => NG.close());

  /* 페이지 로드 시 목록 조회 */
  loadMyOutList();
});
</script>
