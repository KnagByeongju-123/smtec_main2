<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 생성기 (NFC/QR)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--orange:#f97316;--purple:#a855f7;--red:#ef4444}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:20px;max-width:560px;margin:0 auto}
h1{font-size:19px;font-weight:800;color:var(--accent);text-align:center;margin-bottom:6px}
.sub{font-size:11px;color:var(--sub);text-align:center;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.lb{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}

.tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--card);border-radius:10px;padding:4px}
.tab{flex:1;padding:12px 6px;border-radius:8px;background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;text-align:center;border:none}
.tab.active{background:var(--accent);color:#0f172a}

.seg{display:flex;gap:6px;margin-bottom:12px}
.seg-btn{flex:1;padding:11px 6px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--sub);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;text-align:center}
.seg-btn.active{background:var(--accent);color:#0f172a;border-color:var(--accent)}

select,input[type=text],input[type=url],textarea{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--txt);font-size:14px;font-family:inherit}
select{font-weight:700;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2338bdf8'><path d='M7 10l5 5 5-5z'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:36px}
select:focus,input:focus,textarea:focus{border-color:var(--accent);outline:none}
input.ho-in{font-size:20px;font-weight:800;text-align:center;letter-spacing:1px}
textarea{resize:vertical;min-height:60px;font-size:13px}

.btn{padding:12px 16px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-accent{background:var(--accent);color:#0f172a}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--card2);color:var(--txt);border:1px solid var(--border)}

.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.row>*{flex:1}
.row .btn{flex:0 0 auto}

.url-box{background:#0a0d14;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'Consolas','Menlo',monospace;font-size:11px;color:var(--accent);word-break:break-all;line-height:1.5;user-select:all;-webkit-user-select:all;min-height:50px}
.url-box:empty::before{content:'↑ 위 설정 후 생성 버튼을 누르세요';color:var(--sub);font-style:italic;font-family:'Noto Sans KR';font-size:12px}

.qr-wrap{text-align:center;display:none;margin-top:10px}
.qr-wrap.show{display:block}
.qr-box{display:inline-block;background:#fff;padding:12px;border-radius:12px;margin-bottom:8px}
.qr-box img{display:block;width:220px;height:220px}
.qr-label{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:6px}
.qr-sub{font-size:11px;color:var(--sub);margin-top:4px}
.qr-act{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.qr-act .btn{flex:1;padding:10px 8px;font-size:12px;min-width:110px;max-width:160px}

.saved-list{margin-top:8px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.saved-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .12s}
.saved-item:hover{border-color:var(--accent);background:rgba(56,189,248,.05)}
.saved-item .si-ic{font-size:22px;flex-shrink:0}
.saved-item .si-body{flex:1;min-width:0}
.saved-item .si-title{font-size:13px;font-weight:800;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-item .si-url{font-size:10px;color:var(--sub);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.saved-item .si-del{border:none;background:rgba(239,68,68,.1);color:var(--red);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;flex-shrink:0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.92);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10001;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.hint{font-size:11px;color:var(--sub);background:rgba(56,189,248,.08);padding:10px 12px;border-radius:8px;line-height:1.6}
.hint code{background:rgba(0,0,0,.3);padding:1px 6px;border-radius:3px;color:var(--accent);font-family:monospace;font-size:10px}

.pane{display:none}
.pane.active{display:block}

.empty{text-align:center;padding:24px 20px;color:var(--sub);font-size:12px}

@media print{
  body{background:#fff;color:#000;padding:0}
  .card,.sub,h1,.hint,.toast,.tabs,.seg,.qr-act,.url-box,.row,.lb,#genBtn,.saved-list{display:none !important}
  .qr-wrap{display:block !important;page-break-after:always}
  .qr-box{border:1px solid #000;padding:20px}
  .qr-box img{width:300px;height:300px}
  .qr-label{color:#000;font-size:22px;margin-bottom:15px;font-weight:900}
  .qr-sub{color:#333;font-size:12px}
}
</style>
</head>
<body>

<h1>🔳 QR 생성기</h1>
<div class="sub">설비 마스터 선택 · 커스텀 URL · QR 저장/인쇄</div>

<!-- 탭 -->
<div class="tabs">
  <button class="tab active" data-tab="machine" onclick="switchTab(this)">🏭 설비</button>
  <button class="tab" data-tab="custom" onclick="switchTab(this)">🔗 커스텀 URL</button>
  <button class="tab" data-tab="saved" onclick="switchTab(this)">💾 저장됨</button>
</div>

<!-- 설비 탭 -->
<div class="pane active" id="pane-machine">
  <div class="card">
    <div class="lb">📋 동작 선택</div>
    <div class="seg">
      <div class="seg-btn active" data-act="report" onclick="setAct(this)">📄 작업일보</div>
      <div class="seg-btn" data-act="check" onclick="setAct(this)">🔧 일상점검</div>
    </div>

    <div class="lb">🏭 설비 선택 <span id="machineCount" style="color:var(--accent);font-weight:700;margin-left:auto"></span></div>
    <div class="row">
      <select id="machineSelect" onchange="onMachineChange()"></select>
    </div>

    <div class="lb">✏️ 또는 호기번호 직접 입력</div>
    <div class="row">
      <input type="text" id="hoInput" class="ho-in" placeholder="예: 49" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')genFromMachine()">
      <button class="btn btn-accent" onclick="genFromMachine()">생성</button>
    </div>

    <div class="lb">🏷 QR 라벨 (인쇄/저장 시 표시)</div>
    <div class="row">
      <input type="text" id="labelInput" placeholder="자동 생성: 예) 49호기 심팩300톤 · 작업일보">
    </div>
  </div>
</div>

<!-- 커스텀 URL 탭 -->
<div class="pane" id="pane-custom">
  <div class="card">
    <div class="lb">🏷 제목 / 라벨</div>
    <div class="row">
      <input type="text" id="customTitle" placeholder="예: ESG 메인 · 품질팀 게시판">
    </div>
    <div class="lb">🔗 URL</div>
    <div class="row">
      <input type="url" id="customUrl" placeholder="https://..." autocomplete="off">
    </div>
    <div class="row">
      <button class="btn btn-accent" onclick="genFromCustom()" style="flex:1">🔳 QR 생성</button>
      <button class="btn btn-ghost" onclick="loadQuickSamples()" style="flex:0 0 auto">📝 예시</button>
    </div>
    <div class="hint" style="margin-top:10px">
      💡 임의 URL을 넣어 QR을 생성할 수 있습니다.<br>
      예시 활용: 사내 게시판, 구글 시트, 외부 앱, 사용자 매뉴얼 PDF 등
    </div>
  </div>
</div>

<!-- 저장됨 탭 -->
<div class="pane" id="pane-saved">
  <div class="card">
    <div class="lb">💾 저장된 QR 목록 <span id="savedCount" style="color:var(--accent);font-weight:700;margin-left:auto"></span></div>
    <div class="saved-list" id="savedList"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn btn-red" onclick="clearAllSaved()" style="flex:1">🗑 전체 삭제</button>
      <button class="btn btn-ghost" onclick="exportSaved()" style="flex:1">📥 내보내기</button>
    </div>
  </div>
</div>

<!-- 결과 영역 (공용) -->
<div class="card" id="resultCard" style="display:none">
  <div class="lb">🔗 생성된 URL</div>
  <div class="url-box" id="urlBox"></div>

  <div class="qr-wrap show" id="qrWrap">
    <div class="qr-label" id="qrLabel"></div>
    <div class="qr-box">
      <img id="qrImg" alt="QR Code">
    </div>
    <div class="qr-sub">폰 카메라로 스캔하세요</div>
    <div class="qr-act">
      <button class="btn btn-green" onclick="downloadQR()">💾 이미지</button>
      <button class="btn btn-orange" onclick="printQR()">🖨 인쇄</button>
      <button class="btn btn-purple" onclick="saveToList()">⭐ 저장</button>
      <button class="btn btn-ghost" onclick="copyUrl()">📋 URL</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 기본 설정 ==========
var BASE_REPORT='https://knagbyeongju-123.github.io/smtec_main2/mes_work.html';
var BASE_CHECK='https://knagbyeongju-123.github.io/smtec_main2/P_machine_check.html';

// ========== 설비 마스터 (mes_work.html과 동일) ==========
var _MACHINE_MASTER_DEFAULT = [
  {ho:'1',maker:'쌍용',ton:200},{ho:'2',maker:'심팩',ton:200},{ho:'3',maker:'심팩',ton:150},
  {ho:'4',maker:'심팩',ton:150},{ho:'5',maker:'심팩',ton:110},{ho:'6',maker:'심팩',ton:110},
  {ho:'7',maker:'심팩',ton:80},{ho:'8',maker:'심팩',ton:80},{ho:'9',maker:'심팩',ton:80},
  {ho:'10',maker:'심팩',ton:80},{ho:'11',maker:'심팩',ton:80},{ho:'12',maker:'심팩',ton:80},
  {ho:'13',maker:'심팩',ton:80},{ho:'17',maker:'심팩',ton:80},
  {ho:'21',maker:'현대',ton:200},{ho:'22',maker:'현대',ton:200},{ho:'23',maker:'현대',ton:200},
  {ho:'28',maker:'국일',ton:200},{ho:'29',maker:'국일',ton:200},{ho:'30',maker:'국일',ton:160},
  {ho:'31',maker:'심팩',ton:150},{ho:'32',maker:'심팩',ton:200},{ho:'33',maker:'심팩',ton:250},
  {ho:'34',maker:'심팩',ton:250},{ho:'35',maker:'심팩',ton:250},{ho:'36',maker:'심팩',ton:300},
  {ho:'37',maker:'국일',ton:200},{ho:'38',maker:'국일',ton:250},{ho:'39',maker:'심팩',ton:250},
  {ho:'40',maker:'심팩',ton:200},{ho:'41',maker:'국일',ton:200},{ho:'43',maker:'화일',ton:800},
  {ho:'45',maker:'심팩',ton:300},{ho:'46',maker:'심팩',ton:300},{ho:'47',maker:'심팩',ton:300},
  {ho:'48',maker:'심팩',ton:300},{ho:'49',maker:'심팩',ton:300}
];
function getMachineMaster(){
  try{
    var s=localStorage.getItem('MACHINE_MASTER');
    if(s){var arr=JSON.parse(s);if(Array.isArray(arr)&&arr.length)return arr}
  }catch(e){}
  return _MACHINE_MASTER_DEFAULT;
}

// ========== 상태 ==========
var curAct='report';
var curUrl='';
var curLabel='';
var curHo='';

// ========== 탭 전환 ==========
function switchTab(el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  var name=el.dataset.tab;
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active')});
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='saved')renderSavedList();
}

// ========== 동작 선택 ==========
function setAct(el){
  document.querySelectorAll('#pane-machine .seg-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  curAct=el.dataset.act;
  updateMachineLabel();
}

// ========== 설비 드롭다운 채우기 ==========
function fillMachineSelect(){
  var list=getMachineMaster();
  list.sort(function(a,b){return parseInt(a.ho)-parseInt(b.ho)});
  var sel=document.getElementById('machineSelect');
  sel.innerHTML='<option value="">-- 설비 선택 --</option>';
  list.forEach(function(m){
    var label=m.ho+'호기 '+(m.maker||'')+(m.ton?m.ton+'톤':'');
    var opt=document.createElement('option');
    opt.value=m.ho;
    opt.textContent=label;
    opt.dataset.maker=m.maker||'';
    opt.dataset.ton=m.ton||'';
    sel.appendChild(opt);
  });
  document.getElementById('machineCount').textContent='('+list.length+'대)';
}

function onMachineChange(){
  var sel=document.getElementById('machineSelect');
  var ho=sel.value;
  if(!ho)return;
  document.getElementById('hoInput').value=ho;
  updateMachineLabel();
}

function updateMachineLabel(){
  var ho=document.getElementById('hoInput').value.replace(/[^\d]/g,'');
  if(!ho){document.getElementById('labelInput').value='';return}
  var list=getMachineMaster();
  var m=list.find(function(x){return String(parseInt(x.ho))===String(parseInt(ho))});
  var actTxt=curAct==='check'?'일상점검':'작업일보';
  var label;
  if(m){
    var parts=[ho+'호기'];
    if(m.maker)parts.push(m.maker);
    if(m.ton)parts.push(m.ton+'톤');
    label=parts.join(' ')+' · '+actTxt;
  }else{
    label=ho+'호기 · '+actTxt;
  }
  document.getElementById('labelInput').value=label;
}

// 호기 입력 변경 시 라벨 자동갱신
document.addEventListener('DOMContentLoaded',function(){
  var inp=document.getElementById('hoInput');
  if(inp)inp.addEventListener('input',updateMachineLabel);
});

// ========== QR 생성 (설비 모드) ==========
function genFromMachine(){
  var ho=document.getElementById('hoInput').value.replace(/[^\d]/g,'');
  if(!ho){toast('⚠ 호기번호를 입력하거나 설비를 선택하세요');return}
  var url;
  if(curAct==='check'){
    url=BASE_CHECK+'?ho='+ho+'&auto=1';
  }else{
    url=BASE_REPORT+'#nfc='+ho;
  }
  var labelInp=document.getElementById('labelInput').value.trim();
  if(!labelInp){updateMachineLabel();labelInp=document.getElementById('labelInput').value.trim()}
  curHo=ho;
  showResult(url,labelInp);
}

// ========== QR 생성 (커스텀 URL 모드) ==========
function genFromCustom(){
  var title=document.getElementById('customTitle').value.trim();
  var url=document.getElementById('customUrl').value.trim();
  if(!url){toast('⚠ URL을 입력하세요');return}
  if(!/^https?:\/\//.test(url)){toast('⚠ http:// 또는 https://로 시작해야 합니다');return}
  if(!title)title='사용자 링크';
  curHo='';
  showResult(url,title);
}

// ========== 결과 표시 공통 ==========
function showResult(url,label){
  curUrl=url;
  curLabel=label;
  document.getElementById('urlBox').textContent=url;
  var qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=480x480&margin=10&data='+encodeURIComponent(url);
  document.getElementById('qrImg').src=qrUrl;
  document.getElementById('qrLabel').textContent='📌 '+label;
  document.getElementById('resultCard').style.display='';
  // 클립보드에 URL 자동 복사
  if(navigator.clipboard)navigator.clipboard.writeText(url).catch(function(){});
  toast('✅ QR 생성됨');
  // 결과로 스크롤
  setTimeout(function(){document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'center'})},150);
}

// ========== 다운로드 ==========
function downloadQR(){
  if(!curUrl)return;
  var dlUrl='https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=20&data='+encodeURIComponent(curUrl);
  fetch(dlUrl).then(function(r){return r.blob()}).then(function(blob){
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    var safeLabel=curLabel.replace(/[\\/:*?"<>|]/g,'_').slice(0,60);
    a.download='QR_'+safeLabel+'.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('💾 저장 완료');
  }).catch(function(){
    window.open(dlUrl,'_blank');
    toast('💾 새창에서 이미지 저장');
  });
}

function printQR(){if(!curUrl)return;window.print()}

function copyUrl(){
  if(!curUrl)return;
  navigator.clipboard.writeText(curUrl).then(function(){toast('📋 URL 복사됨')},function(){
    var ta=document.createElement('textarea');ta.value=curUrl;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('📋 URL 복사됨');
  });
}

// ========== 저장 목록 ==========
var SAVED_LS='MES_QR_SAVED';
function getSaved(){try{return JSON.parse(localStorage.getItem(SAVED_LS)||'[]')}catch(e){return[]}}
function setSaved(arr){localStorage.setItem(SAVED_LS,JSON.stringify(arr))}

function saveToList(){
  if(!curUrl)return;
  var list=getSaved();
  // 중복 URL 체크
  if(list.find(function(x){return x.url===curUrl})){toast('⚠ 이미 저장된 URL입니다');return}
  list.unshift({
    id:Date.now(),
    title:curLabel||'무제',
    url:curUrl,
    ho:curHo||'',
    createdAt:new Date().toISOString()
  });
  if(list.length>100)list=list.slice(0,100);
  setSaved(list);
  toast('⭐ 저장 완료 ('+list.length+'개)');
  renderSavedList();
}

function renderSavedList(){
  var list=getSaved();
  var cnt=document.getElementById('savedCount');
  var box=document.getElementById('savedList');
  cnt.textContent='('+list.length+'개)';
  if(!list.length){
    box.innerHTML='<div class="empty">📭 저장된 QR이 없습니다<br><span style="font-size:10px">QR 생성 후 ⭐ 저장 버튼으로 추가</span></div>';
    return;
  }
  box.innerHTML='';
  list.forEach(function(item){
    var div=document.createElement('div');
    div.className='saved-item';
    var ic='🔗';
    if(item.url.indexOf('mes_work.html#nfc=')>=0)ic='📄';
    else if(item.url.indexOf('P_machine_check.html')>=0)ic='🔧';
    else if(item.ho)ic='🏭';
    div.innerHTML=
      '<span class="si-ic">'+ic+'</span>'+
      '<div class="si-body">'+
        '<div class="si-title">'+esc(item.title)+'</div>'+
        '<div class="si-url">'+esc(item.url)+'</div>'+
      '</div>'+
      '<button class="si-del" onclick="event.stopPropagation();delSaved('+item.id+')">✕</button>';
    (function(it){div.onclick=function(){loadSavedItem(it)}})(item);
    box.appendChild(div);
  });
}

function loadSavedItem(item){
  // 결과창에 바로 표시
  curHo=item.ho||'';
  showResult(item.url,item.title);
}

function delSaved(id){
  if(!confirm('삭제하시겠습니까?'))return;
  var list=getSaved().filter(function(x){return x.id!==id});
  setSaved(list);
  renderSavedList();
  toast('🗑 삭제됨');
}

function clearAllSaved(){
  var list=getSaved();
  if(!list.length){toast('저장된 항목 없음');return}
  if(!confirm('저장된 QR '+list.length+'개를 모두 삭제하시겠습니까?'))return;
  setSaved([]);
  renderSavedList();
  toast('🗑 전체 삭제됨');
}

function exportSaved(){
  var list=getSaved();
  if(!list.length){toast('내보낼 항목 없음');return}
  var rows=[['제목','URL','호기','생성일시']];
  list.forEach(function(x){
    rows.push([x.title,x.url,x.ho||'',new Date(x.createdAt).toLocaleString('ko-KR')]);
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){var s=String(c==null?'':c);return'"'+s.replace(/"/g,'""')+'"'}).join(',')}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='QR_저장목록_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('📥 CSV 내보내기 완료');
}

// ========== 예시 링크 (커스텀 탭) ==========
function loadQuickSamples(){
  var samples=[
    {t:'MES 모니터링',u:'https://knagbyeongju-123.github.io/smtec_main2/mes_work.html'},
    {t:'설비 일상점검',u:'https://knagbyeongju-123.github.io/smtec_main2/P_machine_check.html'},
    {t:'검사기 일상점검',u:'https://knagbyeongju-123.github.io/smtec_main2/qc_machine_check.html'},
    {t:'ESG 메인',u:'https://kimsanggi85-del.github.io/ESG_smart_factory/'},
    {t:'금형수리 요청',u:'https://kimsanggi85-del.github.io/ESG_smart_factory/mold_repair.html'}
  ];
  var names=samples.map(function(s,i){return (i+1)+'. '+s.t}).join('\n');
  var pick=prompt('번호 입력 (1~'+samples.length+')\n\n'+names,'1');
  if(!pick)return;
  var idx=parseInt(pick,10)-1;
  if(idx<0||idx>=samples.length){toast('⚠ 잘못된 번호');return}
  document.getElementById('customTitle').value=samples[idx].t;
  document.getElementById('customUrl').value=samples[idx].u;
  toast('✅ 예시 로드됨');
}

// ========== 유틸 ==========
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

// ========== 초기화 ==========
fillMachineSelect();
updateMachineLabel();
renderSavedList();
