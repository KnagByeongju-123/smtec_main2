<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메탈마스크 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4f8;--card:#fff;--bdr:#e2e8f0;
  --blue:#1e40af;--blue-lt:#dbeafe;--blue-bg:#eff6ff;
  --green:#166534;--green-lt:#dcfce7;--green-bg:#f0fdf4;
  --red:#991b1b;--red-lt:#fee2e2;--red-bg:#fff5f5;
  --orange:#c2410c;--orange-lt:#fed7aa;--orange-bg:#fff7ed;
  --gray:#64748b;--gray-lt:#f1f5f9;
  --txt:#0f172a;--sub:#64748b;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;overflow-x:hidden;padding-bottom:16px}

/* 헤더 */
.hdr{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(30,58,138,.3)}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr p{font-size:10px;opacity:.65;margin-top:2px}

/* 탭 */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--bdr);position:sticky;top:62px;z-index:90;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:11px 6px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--sub);white-space:nowrap}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* 패널 */
.pnl{display:none;padding:12px}.pnl.on{display:block}

/* 카드 */
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid var(--bdr)}
.card-tit{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.card-tit span{display:flex;align-items:center;gap:6px}

/* 폼 */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--txt);transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:48px}
.fg-row{display:flex;gap:8px}.fg-row .fg{flex:1}

/* 버튼 */
.btn{padding:11px 14px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:transform .1s,box-shadow .1s}
.btn:active{transform:scale(.97)}
.btn-blue{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.25)}
.btn-green{background:linear-gradient(135deg,#166534,#22c55e);color:#fff;box-shadow:0 2px 8px rgba(22,101,52,.25)}
.btn-red{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.btn-gray{background:#f1f5f9;color:#475569;border:1px solid var(--bdr)}
.btn-orange{background:linear-gradient(135deg,#c2410c,#f97316);color:#fff;box-shadow:0 2px 8px rgba(194,65,12,.25)}
.btn-sm{padding:6px 12px;font-size:11px;width:auto;border-radius:7px}
.btn-row{display:flex;gap:8px;margin-bottom:10px}.btn-row .btn{flex:1}

/* 스캔결과 */
.scan-box{background:var(--blue-bg);border:1.5px solid #bfdbfe;border-radius:9px;padding:10px 12px;margin-bottom:10px;display:none}
.scan-box.show{display:block}
.scan-val{font-size:15px;font-weight:700;color:var(--blue);word-break:break-all}
.scan-fmt{font-size:10px;color:var(--sub);margin-top:2px}

/* 재고 테이블 */
.stk-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1.5px solid var(--bdr);position:relative}
.stk-item.warn{border-color:#fca5a5;background:#fff5f5}
.stk-item.critical{border-color:#f87171;background:#fef2f2}
.stk-mask{font-size:15px;font-weight:700;color:var(--txt)}
.stk-model{font-size:11px;color:var(--sub);margin-top:1px}
.stk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px}
.stk-cell{background:var(--gray-lt);border-radius:6px;padding:6px 8px;text-align:center}
.stk-cell .sv{font-size:16px;font-weight:700;color:var(--txt)}
.stk-cell .sl{font-size:9px;color:var(--sub);margin-top:1px}
.stk-pct{position:absolute;top:12px;right:12px;font-size:22px;font-weight:900}
.stk-pct.ok{color:var(--green)}
.stk-pct.warn{color:var(--orange)}
.stk-pct.danger{color:var(--red)}
.stk-loc{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;background:var(--blue-lt);color:var(--blue);margin-top:6px}
.life-bar{height:6px;background:#e2e8f0;border-radius:3px;margin-top:6px;overflow:hidden}
.life-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-ok{background:#22c55e}.fill-warn{background:#f97316}.fill-danger{background:#ef4444}

/* 폐기 아이템 */
.dis-item{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1.5px solid #fecaca}
.dis-mask{font-size:14px;font-weight:700;color:var(--red)}
.dis-reason{font-size:12px;color:var(--sub);margin-top:3px}
.dis-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.dis-chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;background:var(--red-lt);color:var(--red)}

/* 설정 */
.set-section{margin-bottom:14px}
.set-tit{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--blue-lt);color:var(--blue);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px}
.tag button{border:none;background:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0 2px;font-weight:700}
.add-tag{display:flex;gap:6px;margin-top:4px}
.add-tag input{flex:1;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-size:13px;font-family:inherit}

/* 마스크 등록 아이템 */
.mask-item{padding:10px 0;border-bottom:1px solid var(--bdr)}
.mask-item:last-child{border:none}
.mi-top{display:flex;justify-content:space-between;align-items:center}
.mi-no{font-size:14px;font-weight:700;color:var(--blue)}
.mi-model{font-size:11px;color:var(--sub)}
.mi-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.mi-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;background:var(--blue-lt);color:var(--blue)}

/* 팝업 */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center}
.popup-overlay.show{display:flex;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}}
.popup{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 28px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}}
.popup-bar{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.popup-tit{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center}

/* 이동이력 아이템 */
.hist-item{padding:9px 0;border-bottom:1px solid var(--bdr)}
.hist-item:last-child{border:none}
.hi-row{display:flex;justify-content:space-between;align-items:center}
.hi-mask{font-size:13px;font-weight:700;color:var(--txt)}
.hi-time{font-size:10px;color:var(--sub)}
.hi-flow{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;color:var(--sub)}
.hi-loc{padding:2px 7px;background:var(--blue-lt);color:var(--blue);border-radius:4px;font-weight:600}
.hi-arrow{color:var(--sub)}
.hi-prod{font-size:11px;color:var(--green);font-weight:600;margin-top:2px}

/* 토스트 */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.9);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

/* 빈 상태 */
.empty{text-align:center;padding:28px;color:var(--sub);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px}

.model-tag{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px}
.model-tag button{border:none;background:none;color:#166534;cursor:pointer;font-size:12px;padding:0 2px;font-weight:700}
/* 숨김 */
#camInput,#imgInput,#qrCamInput,#qrImgInput,#analysisCv{display:none}
</style>
</head>
<body>

<div class="hdr">
  <h1>🎭 메탈마스크 관리 시스템</h1>
  <p>이동등록 · 재고현황 · 폐기관리 · 설정</p>
</div>

<div class="tabs">
  <div class="tab on" id="tab0" onclick="swTab(0)">🔄 이동</div>
  <div class="tab" id="tab1" onclick="swTab(1)">📦 재고</div>
  <div class="tab" id="tab2" onclick="swTab(2)">🗑 폐기</div>
  <div class="tab" id="tab3" onclick="swTab(3)">⚙ 설정</div>
</div>

<!-- ===== 이동 탭 ===== -->
<div class="pnl on" id="pnl0">

  <div class="card">
    <div class="card-tit"><span>🔄 이동 등록</span></div>

    <div class="fg-row">
      <div class="fg">
        <label>출발지</label>
        <select id="mvFrom" onchange="onFromChange()">
          <option value="">선택</option>
        </select>
      </div>
      <div class="fg">
        <label>도착지</label>
        <select id="mvTo" onchange="onToChange()">
          <option value="">선택</option>
        </select>
      </div>
    </div>

    <div class="fg">
      <label>마스크번호 스캔 / 입력</label>
      <input type="text" id="mvMaskInput" placeholder="바코드 리딩기로 스캔 (Enter)" autocomplete="off"
        style="border-color:#1e40af;background:#eff6ff;font-size:15px;font-weight:600">
    </div>
    <div class="btn-row">
      <button class="btn btn-sm btn-blue" onclick="triggerCam('barcode')">📷 바코드</button>
      <button class="btn btn-sm" onclick="triggerCam('qr')" style="background:#7c3aed;color:#fff;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;width:auto">📱 QR</button>
      <button class="btn btn-sm btn-gray" onclick="applyMvManual()">✏ 직접입력</button>
      <button class="btn btn-sm btn-gray" onclick="clearMvScan()" style="flex:0">✕</button>
    </div>
    <div class="scan-box" id="mvScanBox">
      <div class="scan-val" id="mvScanVal"></div>
      <div class="scan-fmt" id="mvScanFmt"></div>
    </div>

    <div class="fg" id="mvModelFg" style="display:none">
      <label>생산 기종</label>
      <select id="mvModel" style="font-size:14px">
        <option value="">기종 선택</option>
      </select>
    </div>
    <div class="fg" id="mvProdFg" style="display:none">
      <label>생산수 (라인 출발 시)</label>
      <input type="number" id="mvProdQty" placeholder="생산 수량 입력" inputmode="numeric" style="font-size:16px">
    </div>

    <div class="fg" id="mvReasonFg" style="display:none">
      <label>폐기 사유 <span style="color:#991b1b">*</span></label>
      <input type="text" id="mvReason" placeholder="폐기 사유를 입력하세요">
    </div>

    <div class="fg">
      <label>담당자</label>
      <select id="mvManager">
        <option value="">선택 (선택사항)</option>
      </select>
    </div>

    <div class="fg">
      <label>비고</label>
      <input type="text" id="mvNote" placeholder="비고 (선택)">
    </div>

    <button class="btn btn-blue" onclick="submitMovement()" style="font-size:15px;padding:13px">✅ 이동 등록</button>
    <div id="mvStatus" style="text-align:center;font-size:11px;color:var(--blue);margin-top:8px;display:none"></div>
  </div>

  <!-- 최근 이동이력 -->
  <div class="card">
    <div class="card-tit">
      <span>📋 최근 이동이력</span>
      <button class="btn btn-sm btn-gray" onclick="loadHistory()">새로고침</button>
    </div>
    <div id="histList"><div class="empty"><div class="empty-icon">📋</div>이력이 없습니다</div></div>
  </div>
</div>

<!-- ===== 재고 탭 ===== -->
<div class="pnl" id="pnl1">
  <div class="card" style="padding:10px 14px">
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn btn-blue" onclick="loadStock()" style="flex:1;padding:10px;font-size:13px">☁ 재고 불러오기</button>
      <select id="stkFilter" onchange="renderStock()" style="flex:1;padding:10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:12px;font-family:inherit">
        <option value="">전체 위치</option>
      </select>
    </div>
    <div id="stkSummary" style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"></div>
  </div>
  <div id="stkList"><div class="empty"><div class="empty-icon">📦</div>재고 불러오기 버튼을 눌러주세요</div></div>
</div>

<!-- ===== 폐기 탭 ===== -->
<div class="pnl" id="pnl2">
  <div class="card" style="padding:10px 14px">
    <button class="btn btn-orange" onclick="loadDisposal()" style="padding:10px;font-size:13px">☁ 폐기 내용 불러오기</button>
  </div>
  <div id="disList"><div class="empty"><div class="empty-icon">🗑</div>폐기 내용 불러오기 버튼을 눌러주세요</div></div>
</div>

<!-- ===== 설정 탭 ===== -->
<div class="pnl" id="pnl4">

  <!-- 마스크 등록 -->
  <div class="card">
    <div class="card-tit"><span>🎭 마스크 등록</span></div>
    <div class="fg">
      <label>마스크번호 <span style="color:#991b1b">*</span></label>
      <input type="text" id="setMaskNo" placeholder="바코드 스캔 또는 직접입력" style="font-size:15px;font-weight:600;border-color:#1e40af;background:#eff6ff">
    </div>
    <div class="btn-row" style="margin-bottom:8px">
      <button class="btn btn-sm btn-blue" onclick="triggerCam('barcode','mask')">📷 바코드</button>
      <button class="btn btn-sm" onclick="triggerCam('qr','mask')" style="background:#7c3aed;color:#fff;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;width:auto">📱 QR</button>
    </div>
    <div class="fg">
      <label>사용가능기종 <span style="font-size:10px;font-weight:400;color:var(--sub)">(여러 기종 추가 가능)</span></label>
      <div id="setModelTags" style="display:flex;flex-wrap:wrap;gap:5px;min-height:28px;padding:4px 0;margin-bottom:4px"></div>
      <div style="display:flex;gap:6px">
        <input type="text" id="setModelInput" placeholder="기종명 입력 후 추가" style="flex:1;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit" onkeydown="if(event.key==='Enter'){event.preventDefault();addModelTag()}">
        <button class="btn btn-sm btn-blue" onclick="addModelTag()">추가</button>
      </div>
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>배열수</label>
        <input type="number" id="setArrayQty" placeholder="1" inputmode="numeric">
      </div>
      <div class="fg"></div>
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>수명 (사용가능횟수)</label>
        <input type="number" id="setLifespan" placeholder="예: 5000" inputmode="numeric">
      </div>
      <div class="fg">
        <label>담당자</label>
        <select id="setMaskManager">
          <option value="">선택</option>
        </select>
      </div>
    </div>
    <button class="btn btn-blue" onclick="registerMask()">✅ 마스크 등록</button>

    <!-- 등록된 마스크 목록 -->
    <div style="margin-top:12px;border-top:1px solid var(--bdr);padding-top:10px">
      <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px">등록된 마스크</div>
      <div id="maskList"><div class="empty" style="padding:12px">로딩 중...</div></div>
    </div>
  </div>

  <!-- 출발지/도착지 -->
  <div class="card">
    <div class="card-tit"><span>📍 출발지 / 도착지</span></div>
    <div class="set-section">
      <div class="set-tit">출발지</div>
      <div class="tag-list" id="fromTags"></div>
      <div class="add-tag">
        <input type="text" id="fromInput" placeholder="새 출발지 추가" onkeydown="if(event.key==='Enter')addTag('from')">
        <button class="btn btn-sm btn-blue" onclick="addTag('from')">추가</button>
      </div>
    </div>
    <div class="set-section">
      <div class="set-tit">도착지</div>
      <div class="tag-list" id="toTags"></div>
      <div class="add-tag">
        <input type="text" id="toInput" placeholder="새 도착지 추가" onkeydown="if(event.key==='Enter')addTag('to')">
        <button class="btn btn-sm btn-blue" onclick="addTag('to')">추가</button>
      </div>
    </div>
  </div>

  <!-- 담당자 -->
  <div class="card">
    <div class="card-tit"><span>👤 담당자</span></div>
    <div class="tag-list" id="managerTags"></div>
    <div class="add-tag">
      <input type="text" id="managerInput" placeholder="담당자 이름" onkeydown="if(event.key==='Enter')addTag('manager')">
      <button class="btn btn-sm btn-blue" onclick="addTag('manager')">추가</button>
    </div>
  </div>

  <!-- 저장 / 구글시트 -->
  <div class="card">
    <div class="card-tit"><span>💾 저장 / 연동</span></div>
    <button class="btn btn-green" onclick="saveSettings()" style="margin-bottom:8px">💾 설정 저장 (서버)</button>
    <button class="btn btn-gray" onclick="openSheet()">📊 구글시트 직접 열기</button>
  </div>
</div>

<!-- 잔여수명 팝업 -->
<div class="popup-overlay" id="lifePopup">
  <div class="popup">
    <div class="popup-bar"></div>
    <div class="popup-tit">📊 마스크 잔여 수명</div>
    <div id="lifePopupContent"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-gray" onclick="closePopup('lifePopup')">취소</button>
      <button class="btn btn-blue" onclick="confirmLifePopup()">이동 진행</button>
    </div>
  </div>
</div>

<!-- 스캔용 숨김 -->
<input type="file" id="camInput" accept="image/*" capture="environment">
<input type="file" id="imgInput" accept="image/*">
<input type="file" id="qrCamInput" accept="image/*" capture="environment">
<input type="file" id="qrImgInput" accept="image/*">
<canvas id="analysisCv"></canvas>
<div class="toast" id="toast"></div>

<script>
// ===== 설정 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycby83aVaktu0c8L7GhVx8Pw40AZSKNOXVoscEOmXOltKjldDMm3Uu6ns9amKpu5cC0vRRQ/exec'; // 배포 후 교체
const SS_ID   = '1fOZW_9KhBQL-WPoru-pRe3g4S5DmcJCJ_e4drZEFHdo';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SS_ID}`;

// ===== 로컬 상태 =====
let settings = {
  from:    ['제조사','보관함','1라인','2라인','3라인','4라인','5라인'],
  to:      ['보관함','1라인','2라인','3라인','4라인','5라인','폐기'],
  managers:[]
};
let masks      = [];   // 등록된 마스크
let stockData  = [];   // 재고 캐시
let scanTarget = 'mv'; // 'mv' or 'mask'
let scanMode   = 'barcode';
let pendingScan = null;

// ===== 탭 =====
function swTab(n) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.pnl').forEach((p,i)=>p.classList.toggle('on',i===n));
  if(n===3) swTab_settings(); // 설정탭은 pnl4
}
// 설정탭 수정 (tab3 → pnl4)
document.getElementById('tab3').onclick = ()=>{
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===3));
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  document.getElementById('pnl4').classList.add('on');
  loadMasks();
};

function swTab_settings(){}

// ===== 토스트 =====
let tt;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200);
}

// ===== 설정 로드/저장 =====
function loadSettingsLocal(){
  const s=localStorage.getItem('MASK_SETTINGS');
  if(s){settings=JSON.parse(s);}
  applySettings();
}
function applySettings(){
  // 출발지/도착지 셀렉트
  ['mvFrom','mvTo'].forEach((id,idx)=>{
    const sel=document.getElementById(id);
    const val=sel.value;
    sel.innerHTML='<option value="">선택</option>';
    (idx===0?settings.from:settings.to).forEach(v=>{
      const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o);
    });
    if(val) sel.value=val;
  });
  // 담당자 셀렉트
  ['mvManager','setMaskManager'].forEach(id=>{
    const sel=document.getElementById(id);
    const val=sel.value;
    sel.innerHTML='<option value="">선택 (선택사항)</option>';
    settings.managers.forEach(m=>{
      const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);
    });
    if(val) sel.value=val;
  });
  // 태그 렌더
  renderTags('from',settings.from,'fromTags');
  renderTags('to',settings.to,'toTags');
  renderTags('manager',settings.managers,'managerTags');
  // 재고 필터
  const sf=document.getElementById('stkFilter');
  const sv=sf.value;
  sf.innerHTML='<option value="">전체 위치</option>';
  [...new Set([...settings.from,...settings.to])].forEach(v=>{
    const o=document.createElement('option');o.value=v;o.textContent=v;sf.appendChild(o);
  });
  if(sv) sf.value=sv;
}

function renderTags(type,arr,containerId){
  const c=document.getElementById(containerId);c.innerHTML='';
  arr.forEach((v,i)=>{
    const t=document.createElement('span');t.className='tag';
    t.innerHTML=`${v}<button onclick="removeTag('${type}',${i})">✕</button>`;
    c.appendChild(t);
  });
}
function addTag(type){
  const inputId={from:'fromInput',to:'toInput',manager:'managerInput'}[type];
  const val=document.getElementById(inputId).value.trim();
  if(!val){toast('입력 값이 없습니다');return;}
  if(type==='from')settings.from.push(val);
  else if(type==='to')settings.to.push(val);
  else settings.managers.push(val);
  document.getElementById(inputId).value='';
  localStorage.setItem('MASK_SETTINGS',JSON.stringify(settings));
  applySettings();toast('✅ 추가됨: '+val);
}
function removeTag(type,idx){
  if(type==='from')settings.from.splice(idx,1);
  else if(type==='to')settings.to.splice(idx,1);
  else settings.managers.splice(idx,1);
  localStorage.setItem('MASK_SETTINGS',JSON.stringify(settings));
  applySettings();
}
async function saveSettings(){
  try{
    const cfg={
      출발지목록: settings.from.join(','),
      도착지목록: settings.to.join(','),
      담당자목록: settings.managers.join(',')
    };
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveSettings',cfg})});
    localStorage.setItem('MASK_SETTINGS',JSON.stringify(settings));
    toast('✅ 설정 저장 완료');
  }catch(e){toast('⚠ 저장 실패: '+e.message);}
}
function openSheet(){
  window.open(SHEET_URL,'_blank');
}

// ===== 마스크 등록 =====
async function loadMasks(){
  try{
    const r=await fetch(GAS_URL+'?action=getMasks');
    const d=await r.json();
    if(d.success){masks=d.list;renderMaskList();}
  }catch(e){document.getElementById('maskList').innerHTML='<div class="empty" style="padding:12px">서버 연결 필요</div>';}
}
function renderMaskList(){
  const c=document.getElementById('maskList');
  if(!masks.length){c.innerHTML='<div class="empty" style="padding:12px">등록된 마스크 없음</div>';return;}
  c.innerHTML='';
  masks.filter(m=>m.status!=='폐기').forEach(m=>{
    const d=document.createElement('div');d.className='mask-item';
    const modelBadges=(m.model||'공용').split(',').map(v=>`<span class="mi-tag" style="background:#f0fdf4;color:#166534">${v.trim()}</span>`).join('');
    d.innerHTML=`<div class="mi-top"><span class="mi-no">${m.maskNo}</span></div>
      <div class="mi-tags">${modelBadges}</div>
      <div class="mi-tags" style="margin-top:3px">
        <span class="mi-tag">배열: ${m.arrayQty}</span>
        <span class="mi-tag">수명: ${m.lifespan.toLocaleString()}</span>
        <span class="mi-tag">${m.manager||'-'}</span>
      </div>`;
    c.appendChild(d);
  });
}
function addModelTag(){
  const inp=document.getElementById('setModelInput');
  const val=inp.value.trim();
  if(!val){toast('기종명을 입력하세요');return;}
  if(setModelList.includes(val)){toast('이미 추가된 기종');return;}
  setModelList.push(val);
  inp.value='';
  renderModelTags();
}
function renderModelTags(){
  const c=document.getElementById('setModelTags');c.innerHTML='';
  if(!setModelList.length){
    c.innerHTML='<span style="font-size:12px;color:var(--sub);padding:4px">기종을 추가하세요 (없으면 공용)</span>';return;
  }
  setModelList.forEach((v,i)=>{
    const t=document.createElement('span');t.className='model-tag';
    t.innerHTML=`${v}<button onclick="setModelList.splice(${i},1);renderModelTags()">✕</button>`;
    c.appendChild(t);
  });
}

async function registerMask(){
  const maskNo=document.getElementById('setMaskNo').value.trim();
  const model=setModelList.length?setModelList.join(','):'공용';
  const arrayQty=parseInt(document.getElementById('setArrayQty').value)||1;
  const lifespan=parseInt(document.getElementById('setLifespan').value)||0;
  const manager=document.getElementById('setMaskManager').value;
  if(!maskNo){toast('마스크번호를 입력하세요');return;}
  if(!lifespan){toast('수명을 입력하세요');return;}
  try{
    const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'addMask',maskNo,model,arrayQty,lifespan,manager})});
    const d=await r.json();
    if(d.success){
      toast('✅ 마스크 등록 완료');
      document.getElementById('setMaskNo').value='';
      setModelList=[];renderModelTags();
      document.getElementById('setArrayQty').value='';
      document.getElementById('setLifespan').value='';
      loadMasks();
    }else{toast('⚠ '+d.message);}
  }catch(e){toast('⚠ 오류: '+e.message);}
}

// ===== 이동 등록 =====
function onFromChange(){
  const from=document.getElementById('mvFrom').value;
  const isLine=/라인/.test(from);
  document.getElementById('mvProdFg').style.display=isLine?'block':'none';
  document.getElementById('mvModelFg').style.display=isLine?'block':'none';
  if(isLine){
    // 현재 스캔된 마스크의 기종 목록으로 셀렉트 채우기
    const maskNo=(pendingScan||document.getElementById('mvMaskInput').value).trim();
    populateModelSelect(maskNo);
  }
}
function populateModelSelect(maskNo){
  const sel=document.getElementById('mvModel');
  sel.innerHTML='<option value="">기종 선택</option>';
  const mask=masks.find(m=>m.maskNo===maskNo);
  if(!mask||!mask.model||mask.model==='공용'){
    // 공용이면 전체 기종 목록에서 선택하거나 직접 입력
    sel.innerHTML='<option value="공용">공용 (기종무관)</option>';
    return;
  }
  const modelList=mask.model.split(',').map(m=>m.trim()).filter(m=>m);
  if(modelList.length===1){
    // 단일 기종이면 자동 선택
    const o=document.createElement('option');o.value=modelList[0];o.textContent=modelList[0];sel.appendChild(o);
    sel.value=modelList[0];
  }else{
    modelList.forEach(m=>{
      const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);
    });
  }
}
function onToChange(){
  const to=document.getElementById('mvTo').value;
  const isDispose=to==='폐기';
  document.getElementById('mvReasonFg').style.display=isDispose?'block':'none';
}

        <div style="font-size:12px;color:var(--sub)">${stk.model||'공용'} · 배열수 ${stk.arrayQty}</div>

      <div class="stk-grid" style="grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">
        <div class="stk-cell"><div class="sv">${stk.lifespan.toLocaleString()}</div><div class="sl">총수명</div></div>
        <div class="stk-cell"><div class="sv">${stk.totalUsage.toLocaleString()}</div><div class="sl">사용횟수</div></div>
        <div class="stk-cell" style="background:${stk.pct<=10?'var(--red-lt)':stk.pct<=30?'var(--orange-lt)':'var(--green-lt)'}">
          <div class="sv" style="color:${stk.pct<=10?'var(--red)':stk.pct<=30?'var(--orange)':'var(--green)'}">${stk.remaining.toLocaleString()}</div>
          <div class="sl">잔여수명</div>
        </div>
      </div>
      <div style="background:${stk.pct<=10?'var(--red-bg)':stk.pct<=30?'var(--orange-bg)':'var(--green-bg)'};border-radius:8px;padding:10px 12px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:${stk.pct<=10?'var(--red)':stk.pct<=30?'var(--orange)':'var(--green)'}">잔여 ${stk.pct}%</div>
        <div style="font-size:12px;color:var(--sub);margin-top:2px">잔여 생산가능수: ${stk.remProd.toLocaleString()}개</div>
      </div>
      ${stk.pct<=10?'<div style="background:var(--red-bg);border:1.5px solid #fca5a5;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:12px;color:var(--red);font-weight:600;text-align:center">⚠️ 수명 10% 이하 — 교체 검토 필요</div>':''}`;
  }else{
    content.innerHTML=`<div style="text-align:center;padding:20px;color:var(--sub)">재고 정보 없음<br><small>재고탭에서 불러오기 후 이용하세요</small></div>`;

}

function confirmLifePopup(){
  closePopup('lifePopup');
}
function closePopup(id){
  document.getElementById(id).classList.remove('show');
}

async function submitMovement(){
  const from=document.getElementById('mvFrom').value;
  const to=document.getElementById('mvTo').value;
  const maskNo=(pendingScan||document.getElementById('mvMaskInput').value).trim();
  const prodQty=parseInt(document.getElementById('mvProdQty').value)||0;
  const reason=document.getElementById('mvReason').value.trim();
  const manager=document.getElementById('mvManager').value;
  const note=document.getElementById('mvNote').value;

  const selectedModel=document.getElementById('mvModel').value;
  if(!from){toast('출발지를 선택하세요');return;}
  if(!to){toast('도착지를 선택하세요');return;}
  if(!maskNo){toast('마스크번호를 입력하세요');return;}
  if(/라인/.test(from)&&!selectedModel){toast('생산 기종을 선택하세요');return;}
  if(/라인/.test(from)&&!prodQty){toast('생산수를 입력하세요');return;}
  if(to==='폐기'&&!reason){toast('폐기 사유를 입력하세요');return;}

  const isLine=/라인/.test(from);
  const mask=masks.find(m=>m.maskNo===maskNo);
  const stk=stockData.find(s=>s.maskNo===maskNo);
  const arrayQty=mask?mask.arrayQty:1;
  const usage=isLine?(prodQty/arrayQty):0;

  const st=document.getElementById('mvStatus');
  st.style.display='block';st.textContent='등록 중...';

  const now=new Date();
  const body={
    action:'addMovement',
    date:now.toISOString().split('T')[0],
    time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),
    maskNo,from,to,
    model:isLine?selectedModel:'',
    prodQty:isLine?prodQty:0,
    usage:Math.ceil(usage),
    manager,note,reason,
    lifespan:mask?mask.lifespan:0,
    totalUsage:stk?stk.totalUsage+Math.ceil(usage):Math.ceil(usage),
    remaining:stk?stk.remaining-Math.ceil(usage):0
  };

  try{
    await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
    st.textContent='✅ 등록 완료!';st.style.color='var(--green)';
    if(navigator.vibrate)navigator.vibrate([80]);
    toast('✅ 이동 등록 완료');
    // 초기화
    setTimeout(()=>{st.style.display='none';st.style.color='var(--blue)';},2500);
    pendingScan=null;
    document.getElementById('mvMaskInput').value='';
    document.getElementById('mvScanBox').classList.remove('show');
    document.getElementById('mvModel').value='';
    document.getElementById('mvProdQty').value='';
    document.getElementById('mvReason').value='';
    document.getElementById('mvNote').value='';
    loadHistory();
    // 재고 캐시 업데이트
    if(stk){
      stk.totalUsage+=Math.ceil(usage);
      stk.remaining-=Math.ceil(usage);
      stk.location=to;
    }
  }catch(e){
    st.textContent='⚠ 오류: '+e.message;st.style.color='var(--red)';
    toast('⚠ 등록 실패: '+e.message);
  }
}

// ===== 이동이력 =====
async function loadHistory(){
  try{
    const r=await fetch(GAS_URL+'?action=getHistory');
    const d=await r.json();
    if(d.success)renderHistory(d.list.slice(0,30));
  }catch(e){console.log(e);}
}
function renderHistory(list){
  const c=document.getElementById('histList');
  if(!list.length){c.innerHTML='<div class="empty"><div class="empty-icon">📋</div>이력이 없습니다</div>';return;}
  c.innerHTML='';
  list.forEach(h=>{
    const d=document.createElement('div');d.className='hist-item';
    const isDispose=h.to==='폐기';
    d.innerHTML=`
      <div class="hi-row">
        <span class="hi-mask">${h.maskNo}</span>
        <span class="hi-time">${h.date} ${h.time}</span>
      </div>
      <div class="hi-flow">
        <span class="hi-loc" style="${isDispose?'background:var(--red-lt);color:var(--red)':''}">${h.from}</span>
        <span class="hi-arrow">→</span>
        <span class="hi-loc" style="${isDispose?'background:var(--red-lt);color:var(--red)':''}">${h.to}</span>
        ${h.manager?`<span style="font-size:10px;color:var(--sub);margin-left:4px">${h.manager}</span>`:''}
      </div>
      ${h.prodQty?`<div class="hi-prod">${h.model?'['+h.model+'] ':''}생산: ${h.prodQty.toLocaleString()}개 → 사용: ${h.usage.toLocaleString()}회</div>`:''}
      ${h.note?`<div style="font-size:11px;color:var(--sub);margin-top:2px">📝 ${h.note}</div>`:''}`;
    c.appendChild(d);
  });
}

// ===== 재고 =====
async function loadStock(){
  toast('재고 불러오는 중...');
  try{
    const [sr,mr]=await Promise.all([
      fetch(GAS_URL+'?action=getStock').then(r=>r.json()),
      fetch(GAS_URL+'?action=getMasks').then(r=>r.json())
    ]);
    if(sr.success){stockData=sr.stock;}
    if(mr.success){masks=mr.list;}
    renderStock();toast('✅ 재고 불러오기 완료 ('+stockData.length+'건)');
  }catch(e){toast('⚠ 재고 불러오기 실패: '+e.message);}
}
function renderStock(){
  const filter=document.getElementById('stkFilter').value;
  const list=filter?stockData.filter(s=>s.location===filter):stockData;
  // 요약
  const sum=document.getElementById('stkSummary');
  const total=stockData.length;
  const warn=stockData.filter(s=>s.pct<=30&&s.pct>10).length;
  const danger=stockData.filter(s=>s.pct<=10).length;
  sum.innerHTML=`
    <span style="flex:1;background:var(--blue-lt);color:var(--blue);text-align:center;padding:7px;border-radius:8px;font-size:12px;font-weight:700">전체<br><b style="font-size:18px">${total}</b></span>
    <span style="flex:1;background:var(--orange-lt);color:var(--orange);text-align:center;padding:7px;border-radius:8px;font-size:12px;font-weight:700">주의<br><b style="font-size:18px">${warn}</b></span>
    <span style="flex:1;background:var(--red-lt);color:var(--red);text-align:center;padding:7px;border-radius:8px;font-size:12px;font-weight:700">위험<br><b style="font-size:18px">${danger}</b></span>`;

  const c=document.getElementById('stkList');
  if(!list.length){c.innerHTML='<div class="empty"><div class="empty-icon">📦</div>재고 없음</div>';return;}
  // 잔여수명% 오름차순 정렬
  const sorted=[...list].sort((a,b)=>a.pct-b.pct);
  c.innerHTML='';
  sorted.forEach(s=>{
    const isDanger=s.pct<=10;
    const isWarn=s.pct<=30&&s.pct>10;
    const pctClass=isDanger?'danger':isWarn?'warn':'ok';
    const fillClass=isDanger?'fill-danger':isWarn?'fill-warn':'fill-ok';
    const d=document.createElement('div');
    d.className='stk-item'+(isDanger?' critical':isWarn?' warn':'');
    d.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="stk-mask" style="${isDanger?'color:var(--red)':''}">${s.maskNo}</div>
          <div class="stk-model">${s.model||'공용'} · 담당: ${s.manager||'-'}</div>
        </div>
        <div class="stk-pct ${pctClass}">${s.pct}%</div>
      </div>
      <span class="stk-loc">📍 ${s.location}</span>
      <div class="life-bar"><div class="life-fill ${fillClass}" style="width:${s.pct}%"></div></div>
      <div class="stk-grid" style="margin-top:8px">
        <div class="stk-cell">
          <div class="sv">${s.totalUsage.toLocaleString()}</div>
          <div class="sl">사용횟수</div>
        </div>
        <div class="stk-cell" style="${isDanger?'background:var(--red-lt)':isWarn?'background:var(--orange-lt)':''}">
          <div class="sv" style="${isDanger?'color:var(--red)':isWarn?'color:var(--orange)':''}">${s.remaining.toLocaleString()}</div>
          <div class="sl">잔여수명</div>
        </div>
        <div class="stk-cell">
          <div class="sv" style="font-size:12px">${s.remProd.toLocaleString()}</div>
          <div class="sl">잔여생산가능</div>
        </div>
      </div>
      ${isDanger?'<div style="background:var(--red-bg);border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;margin-top:8px;font-size:11px;color:var(--red);font-weight:600;text-align:center">⚠ 수명 10% 이하 — 교체 검토 필요</div>':''}`;
    c.appendChild(d);
  });
}

async function loadDisposal(){
  toast('폐기 내용 불러오는 중...');
  try{
    const r=await fetch(GAS_URL+'?action=getDisposal');
    const d=await r.json();
    if(d.success)renderDisposal(d.list);
    toast('✅ 폐기 불러오기 완료 ('+d.list.length+'건)');
  }catch(e){toast('⚠ 불러오기 실패: '+e.message);}
}
function renderDisposal(list){
  const c=document.getElementById('disList');
  if(!list.length){c.innerHTML='<div class="empty"><div class="empty-icon">🗑</div>폐기 이력 없음</div>';return;}
  c.innerHTML='';
  list.forEach(d=>{
    const pct=d.lifespan>0?Math.round(d.remaining/d.lifespan*100):0;
    const el=document.createElement('div');el.className='dis-item';
    el.innerHTML=`
      <div class="hi-row">
        <span class="dis-mask">🗑 ${d.maskNo}</span>
        <span class="hi-time">${d.date} ${d.time}</span>
      </div>
      <div class="dis-reason">📌 사유: ${d.reason||'-'}</div>
      <div class="dis-meta">
        <span class="dis-chip">총 ${d.totalUsage.toLocaleString()}회 사용</span>
        <span class="dis-chip">수명 ${d.lifespan.toLocaleString()}회</span>
        <span class="dis-chip">잔여 ${pct}%</span>
        ${d.manager?`<span class="dis-chip">담당: ${d.manager}</span>`:''}
      </div>`;
    c.appendChild(el);
  });
}

// ===== 바코드/QR 스캔 =====
let scanCallback = null; // mv or mask
let setModelList = []; // 마스크 등록 시 기종 목록

function triggerCam(mode, target='mv'){
  scanTarget=target;scanMode=mode;
  document.getElementById('camInput').click();
}
document.getElementById('camInput').addEventListener('change',e=>{
  handleScanFile(e.target.files[0]);e.target.value='';
});

async function handleScanFile(file){
  if(!file)return;
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=async()=>{
    URL.revokeObjectURL(url);
    const cv=document.getElementById('analysisCv'),ctx=cv.getContext('2d');
    let found=false,val='';

    if(scanMode==='qr'){
      const s=Math.floor(Math.min(img.width,img.height)*.7);
      const cx=Math.floor((img.width-s)/2),cy=Math.floor((img.height-s)/2);
      cv.width=s;cv.height=s;ctx.drawImage(img,cx,cy,s,s,0,0,s,s);
    }else{
      const h=Math.floor(img.width/8),cy=Math.floor((img.height-h)/2);
      cv.width=img.width;cv.height=h;ctx.drawImage(img,0,cy,img.width,h,0,0,img.width,h);
    }
    if('BarcodeDetector' in window){
      try{const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});const r=await det.detect(cv);if(r.length){found=true;val=r[0].rawValue}}catch(e){}
    }
    if(!found){
      try{const blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',.95));
        const f=new File([blob],'s.jpg',{type:'image/jpeg'});
        const qr=new Html5Qrcode('analysisCv');const res=await qr.scanFileV2(f,true);
        if(res?.decodedText){found=true;val=res.decodedText}qr.clear();}catch(e){}
    }
    if(!found){cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0);
      if('BarcodeDetector' in window){try{const det=new BarcodeDetector({formats:await BarcodeDetector.getSupportedFormats()});const r=await det.detect(cv);if(r.length){found=true;val=r[0].rawValue}}catch(e){}}
    }
    if(found){
      if(navigator.vibrate)navigator.vibrate([60,30,60]);
      applyScan(val);
    }else toast('인식 실패');
  };img.src=url;
}

function applyScan(val){
  if(scanTarget==='mask'){
    document.getElementById('setMaskNo').value=val;
    toast('✅ 마스크번호: '+val);
  }else{
    pendingScan=val;
    document.getElementById('mvMaskInput').value=val;
    const sb=document.getElementById('mvScanBox');
    sb.classList.add('show');
    document.getElementById('mvScanVal').textContent=val;
    document.getElementById('mvScanFmt').textContent='스캔 완료';
    toast('✅ 스캔: '+val);
    // 기종 셀렉트 업데이트
    const from=document.getElementById('mvFrom').value;
    if(/라인/.test(from)) populateModelSelect(val);
    // 출발지=보관함이면 팝업
    checkLifePopup(val);
  }
}
function clearMvScan(){
  pendingScan=null;
  document.getElementById('mvMaskInput').value='';
  document.getElementById('mvScanBox').classList.remove('show');
}
function applyMvManual(){
  const val=document.getElementById('mvMaskInput').value.trim();
  if(!val){toast('마스크번호를 입력하세요');return;}
  applyScan(val);
}

// 리딩기 Enter
document.getElementById('mvMaskInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();const v=this.value.trim();if(v)applyScan(v);}
});

// ===== 초기화 =====
function init(){
  loadSettingsLocal();
  loadHistory();
  loadMasks().catch(()=>{});
  renderModelTags();
}
init();
</script>
