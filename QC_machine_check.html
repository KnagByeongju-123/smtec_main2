<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>검사기 일상점검 체크시트</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --ok: #22c55e;
      --ok-bg: rgba(34,197,94,.12);
      --ng: #ef4444;
      --ng-bg: rgba(239,68,68,.12);
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* Header */
    .hdr {
      background: linear-gradient(135deg, #0c4a6e, #0369a1);
      padding: 20px 16px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 10px,
        rgba(255,255,255,.02) 10px, rgba(255,255,255,.02) 20px
      );
      pointer-events: none;
    }
    .hdr h1 { font-size: 18px; font-weight: 900; letter-spacing: -.3px; position: relative; }
    .hdr p { font-size: 11px; color: #7dd3fc; margin-top: 3px; position: relative; }

    /* Form container */
    .form-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 12px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Field group */
    .fg { margin-bottom: 12px; }
    .fg:last-child { margin-bottom: 0; }
    .fg label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 5px;
    }
    .fg select,
    .fg input[type="date"],
    .fg input[type="time"],
    .fg input[type="text"],
    .fg textarea {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      appearance: auto;
      -webkit-appearance: auto;
      transition: border-color .2s;
    }
    .fg select:focus,
    .fg input:focus,
    .fg textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .fg textarea {
      resize: vertical;
      min-height: 80px;
    }
    .fg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Check items */
    .check-list { display: flex; flex-direction: column; gap: 6px; }
    .check-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg);
      border: 1.5px solid rgba(255,255,255,.06);
      border-radius: 10px;
      transition: border-color .2s, background .2s;
    }
    .check-item.checked-ok {
      border-color: rgba(34,197,94,.3);
      background: var(--ok-bg);
    }
    .check-item.checked-ng {
      border-color: rgba(239,68,68,.3);
      background: var(--ng-bg);
    }
    .check-item.disabled-item {
      opacity: .45;
    }
    .check-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .check-label .sub-info {
      display: block;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* OK / NG toggle buttons */
    .okng-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 10px;
    }
    .okng-group input[type="radio"] { display: none; }
    .okng-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 34px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text3);
      transition: all .15s;
      font-family: 'Noto Sans KR', sans-serif;
      user-select: none;
    }
    .okng-btn:active { transform: scale(.93); }
    .okng-btn.ok-selected {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
      box-shadow: 0 2px 8px rgba(34,197,94,.3);
    }
    .okng-btn.ng-selected {
      background: var(--ng);
      border-color: var(--ng);
      color: #fff;
      box-shadow: 0 2px 8px rgba(239,68,68,.3);
    }

    /* QR scan button */
    .qr-scan-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: transform .1s;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .qr-scan-btn:active { transform: scale(.95); }

    .qr-status {
      font-size: 11px;
      margin-left: 8px;
      font-weight: 600;
    }
    .qr-required { color: var(--ng); }
    .qr-success { color: var(--ok); }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: transform .1s;
      box-shadow: 0 4px 16px rgba(56,189,248,.25);
      letter-spacing: .3px;
    }
    .submit-btn:active { transform: scale(.97); }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 12px;
    }
    .progress-bar-bg {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--ok));
      border-radius: 3px;
      transition: width .3s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 10px;
      color: var(--text3);
      text-align: right;
      margin-top: 3px;
    }

    /* QR Preview overlay */
    #preview-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    #preview-container {
      background: var(--surface);
      padding: 20px;
      border-radius: 16px;
      position: relative;
      max-width: 380px;
      width: 90%;
      border: 1px solid rgba(255,255,255,.1);
    }
    #preview {
      width: 100%;
      height: 300px;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    #closePreview {
      position: absolute;
      top: -12px; right: -12px;
      background: var(--ng);
      color: #fff;
      border: 3px solid var(--surface);
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
    .preview-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }

    .disabled-radio { opacity: 0.5; pointer-events: none; }
  </style>
</head>

        <div class="check-item" id="item_out">

          <div class="okng-group">

            <label class="okng-btn" for="chk_out_ok" onclick="setCheck('chk_out','OK','item_out')">OK</label>

            <label class="okng-btn" for="chk_sample_ok" onclick="setCheck('chk_sample','OK','item_sample')">OK</label>
            <input type="radio" name="chk_sample" id="chk_sample_ng" value="NG">
            <label class="okng-btn" for="chk_sample_ng" onclick="setCheck('chk_sample','NG','item_sample')">NG</label>

    <!-- 비고 -->

      </div>
    </div>

    <button type="submit" class="submit-btn">✅ 점검 제출</button>

</div>

<script>
// === Supabase 설정 ===
const SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';

async function sbInsert(table, data) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || JSON.stringify(err));
  }
  return await res.json();
}

async function sbSelect(table, filter, order, limit) {
  let url = `${SB_URL}/rest/v1/${table}?select=*`;
  if (filter) Object.entries(filter).forEach(([k,v]) => url += `&${k}=${v}`);
  if (order) url += `&order=${order}`;
  if (limit) url += `&limit=${limit}`;
  const res = await fetch(url, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error('조회 실패');
  return await res.json();
}

// 테이블 자동 생성
async function ensureTable() {
  try {
    await fetch(`${SB_URL}/rest/v1/qc_machine_check?select=id&limit=1`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).then(r => { if (r.status === 404) throw new Error('no table'); });
  } catch(e) {
    // 테이블이 없으면 SQL로 생성
    try {
      await fetch(`${SB_URL}/rest/v1/rpc/exec_sql`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        },
        body: JSON.stringify({ query: CREATE_TABLE_SQL })
      });
    } catch(e2) {
      console.log('테이블 자동생성 불가 - SQL Editor에서 수동 실행 필요');
    }
  }
}

const CREATE_TABLE_SQL = `
CREATE TABLE IF NOT EXISTS qc_machine_check (
  id bigint generated always as identity primary key,
  check_date date not null,
  check_time time not null,
  inspector text not null,
  machine text not null,
  qr_code text,
  chk_input text default 'OK',
  chk_chain text default 'OK',
  chk_height text default 'OK',
  chk_camera text default 'OK',
  chk_belt text default 'OK',
  chk_plate text default 'OK',
  chk_eddy text default 'OK',
  chk_out text default 'OK',
  chk_sample text default 'OK',
  ng_count integer default 0,
  result text default 'OK',
  memo text,
  created_at timestamptz default now()
);
ALTER TABLE qc_machine_check ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "anon_all_qc_machine_check" ON qc_machine_check;
CREATE POLICY "anon_all_qc_machine_check" ON qc_machine_check FOR ALL TO anon USING (true) WITH CHECK (true);
`;

let html5QrCodeInstance;
let currentScanTarget;

// === OK/NG 토글 및 시각 피드백 ===
function setCheck(name, val, itemId) {
  const item = document.getElementById(itemId);
  if (!item) return;
  // radio가 disabled면 무시
  const radio = document.querySelector(`input[name="${name}"][value="${val}"]`);
  if (radio && radio.disabled) return;

  item.classList.remove('checked-ok', 'checked-ng');
  if (val === 'OK') item.classList.add('checked-ok');
  else item.classList.add('checked-ng');

  // 버튼 시각
  const grp = item.querySelector('.okng-group');
  grp.querySelectorAll('.okng-btn').forEach(b => b.classList.remove('ok-selected', 'ng-selected'));
  const lbl = grp.querySelector(`label[for="${name}_${val.toLowerCase()}"]`);
  if (lbl) lbl.classList.add(val === 'OK' ? 'ok-selected' : 'ng-selected');

  if (navigator.vibrate) navigator.vibrate(val === 'OK' ? [30] : [50, 30, 50]);
  updateProgress();
}

function updateProgress() {
  const names = ['chk_input','chk_chain','chk_height','chk_camera','chk_belt','chk_plate','chk_eddy','chk_out','chk_sample'];
  let done = 0;
  names.forEach(n => { if (document.querySelector(`input[name="${n}"]:checked`)) done++; });
  const pct = Math.round(done / names.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + names.length + ' 항목 체크';
}

// === 날짜/시간 자동 설정 ===
function setDateTimeNow() {
  const now = new Date();
  document.getElementById("checkDate").value = now.toISOString().split('T')[0];
  document.getElementById("checkTime").value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

// === QR 스캔 ===
function scanQRCode(targetId) {
  currentScanTarget = targetId;
  document.getElementById("preview-wrapper").style.display = "flex";
  html5QrCodeInstance = new Html5Qrcode("preview");
  html5QrCodeInstance.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    decodedText => {
      document.getElementById(currentScanTarget).value = decodedText;
      checkQRCodeAndEnableChain(decodedText);
      alert(`스캔 결과: ${decodedText}`);
      stopQrScanner();
    },
    err => console.warn('QR 인식 실패:', err)
  ).catch(console.error);
}

function stopQrScanner() {
  document.getElementById("preview-wrapper").style.display = "none";
  if (html5QrCodeInstance) {
    html5QrCodeInstance.stop().then(() => html5QrCodeInstance.clear()).catch(console.error);
  }
}

function checkQRCodeAndEnableChain(qrValue) {
  const chainRadios = document.querySelectorAll('input[name="chk_chain"]');
  const qrStatus = document.getElementById('qrStatus');
  const item = document.getElementById('item_chain');

  if (qrValue === "2") {
    chainRadios.forEach(radio => {
      radio.disabled = false;
      radio.classList.remove('disabled-radio');
      radio.required = true;
    });
    item.classList.remove('disabled-item');
    qrStatus.textContent = '✅ QR "2" 확인';
    qrStatus.className = 'qr-status qr-success';
  } else {
    chainRadios.forEach(radio => {
      radio.disabled = true;
      radio.classList.add('disabled-radio');
      radio.checked = false;
      radio.required = false;
    });
    item.classList.add('disabled-item');
    item.classList.remove('checked-ok', 'checked-ng');
    item.querySelectorAll('.okng-btn').forEach(b => b.classList.remove('ok-selected', 'ng-selected'));
    qrStatus.textContent = `❌ "${qrValue}" → "2" 필요`;
    qrStatus.className = 'qr-status qr-required';
    updateProgress();
  }
}

// === 폼 제출 ===
function validateForm() {
  const qrResult = document.getElementById('qrResult').value;
  if (qrResult !== "2") {
    alert('기종전환시 잔량없음 항목을 위해 QR "2"를 스캔해주세요.');
    return false;
  }
  const chainChecked = Array.from(document.querySelectorAll('input[name="chk_chain"]')).some(r => r.checked);
  if (!chainChecked) {
    alert('기종전환시 잔량없음 항목을 선택해주세요.');
    return false;
  }
  return true;
}

document.getElementById('closePreview').addEventListener('click', stopQrScanner);

  e.preventDefault();
  if (!validateForm()) return;

  const form = e.target;

    time: form.checkTime.value,
    inspector: form.inspector.value,
    machine: form.machine.value,
    qrCode: form.qrResult.value,
    inputs: {
      "작업기종 표시": form.chk_input.value,
      "기종전환시 잔량없음": form.chk_chain.value,
      "높이검사 청소": form.chk_height.value,
      "카메라 청소/풀림": form.chk_camera.value,
      "이송밸트 걸림": form.chk_belt.value,
      "회전판 걸림": form.chk_plate.value,
      "에디작동": form.chk_eddy.value,
      "배출부 인식": form.chk_out.value,
      "불량샘플 검출": form.chk_sample.value
    },
    memo: form.memo.value
  };

  // Supabase에 저장
  const ngItems = Object.entries(data.inputs).filter(([k,v])=>v==='NG');
  const row = {
    check_date: data.date,
    check_time: data.time,
    inspector: data.inspector,
    machine: data.machine,
    qr_code: data.qrCode,
    chk_input: data.inputs["작업기종 표시"],
    chk_chain: data.inputs["기종전환시 잔량없음"],
    chk_height: data.inputs["높이검사 청소"],
    chk_camera: data.inputs["카메라 청소/풀림"],
    chk_belt: data.inputs["이송밸트 걸림"],
    chk_plate: data.inputs["회전판 걸림"],
    chk_eddy: data.inputs["에디작동"],
    chk_out: data.inputs["배출부 인식"],
    chk_sample: data.inputs["불량샘플 검출"],
    ng_count: ngItems.length,
    result: ngItems.length ? 'NG' : 'OK',
    memo: data.memo
  };

  try {
    await sbInsert('qc_machine_check', row);
    alert("제출 완료되었습니다.");
    sendTelegram(data);
    const prev = form.inspector.value;
    form.reset();
    setDateTimeNow();
    form.inspector.value = prev;

    // 체크 아이템 시각 초기화
    document.querySelectorAll('.check-item').forEach(el => {
      el.classList.remove('checked-ok', 'checked-ng');
      el.querySelectorAll('.okng-btn').forEach(b => b.classList.remove('ok-selected', 'ng-selected'));
    });

    // 기종전환 잔량 비활성화
    const chainRadios = document.querySelectorAll('input[name="chk_chain"]');
    chainRadios.forEach(radio => {
      radio.disabled = true;
      radio.classList.add('disabled-radio');
      radio.required = false;
    });
    document.getElementById('item_chain').classList.add('disabled-item');
    document.getElementById('qrStatus').textContent = 'QR "2" 스캔 필요';
    document.getElementById('qrStatus').className = 'qr-status qr-required';
    updateProgress();
  } catch(err) {
    alert("저장 실패: " + err.message);
  }
});
