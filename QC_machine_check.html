<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>검사기 일상점검 체크시트</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --ok: #22c55e;
      --ok-bg: rgba(34,197,94,.12);
      --ng: #ef4444;
      --ng-bg: rgba(239,68,68,.12);
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* Header */
    .hdr {
      background: linear-gradient(135deg, #0c4a6e, #0369a1);
      padding: 20px 16px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hdr::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 10px,
        rgba(255,255,255,.02) 10px, rgba(255,255,255,.02) 20px
      );
      pointer-events: none;
    }
    .hdr h1 { font-size: 18px; font-weight: 900; letter-spacing: -.3px; position: relative; }
    .hdr p { font-size: 11px; color: #7dd3fc; margin-top: 3px; position: relative; }

    /* Form container */
    .form-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 12px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Field group */
    .fg { margin-bottom: 12px; }
    .fg:last-child { margin-bottom: 0; }
    .fg label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 5px;
    }
    .fg select,
    .fg input[type="date"],
    .fg input[type="time"],
    .fg input[type="text"],
    .fg textarea {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      appearance: auto;
      -webkit-appearance: auto;
      transition: border-color .2s;
    }
    .fg select:focus,
    .fg input:focus,
    .fg textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .fg textarea {
      resize: vertical;
      min-height: 80px;
    }
    .fg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Check items */
    .check-list { display: flex; flex-direction: column; gap: 6px; }
    .check-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg);
      border: 1.5px solid rgba(255,255,255,.06);
      border-radius: 10px;
      transition: border-color .2s, background .2s;
    }
    .check-item.checked-ok {
      border-color: rgba(34,197,94,.3);
      background: var(--ok-bg);
    }
    .check-item.checked-ng {
      border-color: rgba(239,68,68,.3);
      background: var(--ng-bg);
    }
    .check-item.disabled-item {
      opacity: .45;
    }
    .check-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }
    .check-label .sub-info {
      display: block;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* OK / NG toggle buttons */
    .okng-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      margin-left: 10px;
    }
    .okng-group input[type="radio"] { display: none; }
    .okng-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 34px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text3);
      transition: all .15s;
      font-family: 'Noto Sans KR', sans-serif;
      user-select: none;
    }
    .okng-btn:active { transform: scale(.93); }
    .okng-btn.ok-selected {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
      box-shadow: 0 2px 8px rgba(34,197,94,.3);
    }
    .okng-btn.ng-selected {
      background: var(--ng);
      border-color: var(--ng);
      color: #fff;
      box-shadow: 0 2px 8px rgba(239,68,68,.3);
    }

    /* QR scan button */
    .qr-scan-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: transform .1s;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .qr-scan-btn:active { transform: scale(.95); }

    .qr-status {
      font-size: 11px;
      margin-left: 8px;
      font-weight: 600;
    }
    .qr-required { color: var(--ng); }
    .qr-success { color: var(--ok); }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: transform .1s;
      box-shadow: 0 4px 16px rgba(56,189,248,.25);
      letter-spacing: .3px;
    }
    .submit-btn:active { transform: scale(.97); }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 12px;
    }
    .progress-bar-bg {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--ok));
      border-radius: 3px;
      transition: width .3s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 10px;
      color: var(--text3);
      text-align: right;
      margin-top: 3px;
    }

    /* QR Preview overlay */
    #preview-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    #preview-container {
      background: var(--surface);
      padding: 20px;
      border-radius: 16px;
      position: relative;
      max-width: 380px;
      width: 90%;
      border: 1px solid rgba(255,255,255,.1);
    }
    #preview {
      width: 100%;
      height: 300px;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    #closePreview {
      position: absolute;
      top: -12px; right: -12px;
      background: var(--ng);
      color: #fff;
      border: 3px solid var(--surface);
      border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
    .preview-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }

    .disabled-radio { opacity: 0.5; pointer-events: none; }

    /* 탭 */
    .tabs{display:flex;background:var(--surface);border-bottom:2px solid rgba(255,255,255,.06)}
    .tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--text3);transition:all .15s}
    .tab.on{color:var(--accent);border-bottom-color:var(--accent)}
    .pnl{display:none}.pnl.on{display:block}

    /* 설정 내 수신자 리스트 */
    .tg-user-item{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:4px;font-size:12px}
    .tg-user-item .tg-name{font-weight:600;color:var(--text);min-width:50px}
    .tg-user-item .tg-id{color:var(--text2);flex:1}
    .tg-user-item .tg-del{width:24px;height:24px;border:none;border-radius:6px;background:rgba(239,68,68,.15);color:var(--ng);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  </style>
</head>
<body>

<div class="hdr">
  <h1>🔬 검사기 일상점검 체크시트</h1>
  <p>품질관리팀 · 검사기 일상점검 기록</p>
</div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📋 점검</div>
  <div class="tab" onclick="swTab(1)">⚙ 설정</div>
</div>

<!-- 점검 패널 -->
<div class="pnl on" id="pnl0">
<div class="form-wrap">
  <form id="inspectionForm">

    <!-- 기본 정보 -->
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div class="fg-row">
        <div class="fg">
          <label class="field-label">점검일자</label>
          <input type="date" id="checkDate" name="checkDate" required>
        </div>
        <div class="fg">
          <label class="field-label">점검시간</label>
          <input type="time" id="checkTime" name="checkTime" required>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="field-label">검사자</label>
          <select id="inspector" name="inspector" required>
            <option value="" disabled selected>선택</option>
          </select>
        </div>
        <div class="fg">
          <label class="field-label">검사기</label>
          <select id="machine" name="machine" required>
            <option value="" disabled selected>선택</option>
            <option value="3호기">3호기</option>
            <option value="4호기">4호기</option>
            <option value="5호기">5호기</option>
            <option value="6호기">6호기</option>
            <option value="7호기">7호기</option>
            <option value="8호기">8호기</option>
            <option value="9호기">9호기</option>
            <option value="10호기">10호기</option>
            <option value="11호기">11호기</option>
            <option value="12호기">12호기</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 진행률 -->
    <div class="card" style="padding:12px 16px">
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0 / 9 항목 체크</div>
      </div>
    </div>

    <!-- 점검 항목 -->
    <div class="card">
      <div class="card-title">점검 항목</div>
      <div class="check-list">

        <div class="check-item" id="item_input">
          <span class="check-label">작업기종 표시</span>
          <div class="okng-group">
            <input type="radio" name="chk_input" id="chk_input_ok" value="OK" required>
            <label class="okng-btn" for="chk_input_ok" onclick="setCheck('chk_input','OK','item_input')">OK</label>
            <input type="radio" name="chk_input" id="chk_input_ng" value="NG">
            <label class="okng-btn" for="chk_input_ng" onclick="setCheck('chk_input','NG','item_input')">NG</label>
          </div>
        </div>

        <div class="check-item disabled-item" id="item_chain">
          <span class="check-label">
            기종전환시 잔량없음
            <span class="sub-info">
              <button type="button" class="qr-scan-btn" onclick="scanQRCode('qrResult')">📷 QR</button>
              <span id="qrStatus" class="qr-status qr-required">QR "2" 스캔 필요</span>
            </span>
          </span>
          <div class="okng-group">
            <input type="radio" name="chk_chain" id="chk_chain_ok" value="OK" class="disabled-radio" disabled>
            <label class="okng-btn" for="chk_chain_ok" onclick="setCheck('chk_chain','OK','item_chain')">OK</label>
            <input type="radio" name="chk_chain" id="chk_chain_ng" value="NG" class="disabled-radio" disabled>
            <label class="okng-btn" for="chk_chain_ng" onclick="setCheck('chk_chain','NG','item_chain')">NG</label>
          </div>
          <input type="hidden" id="qrResult" name="qrResult">
        </div>

        <div class="check-item" id="item_height">
          <span class="check-label">높이검사 청소</span>
          <div class="okng-group">
            <input type="radio" name="chk_height" id="chk_height_ok" value="OK" required>
            <label class="okng-btn" for="chk_height_ok" onclick="setCheck('chk_height','OK','item_height')">OK</label>
            <input type="radio" name="chk_height" id="chk_height_ng" value="NG">
            <label class="okng-btn" for="chk_height_ng" onclick="setCheck('chk_height','NG','item_height')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_camera">
          <span class="check-label">카메라 청소/풀림</span>
          <div class="okng-group">
            <input type="radio" name="chk_camera" id="chk_camera_ok" value="OK" required>
            <label class="okng-btn" for="chk_camera_ok" onclick="setCheck('chk_camera','OK','item_camera')">OK</label>
            <input type="radio" name="chk_camera" id="chk_camera_ng" value="NG">
            <label class="okng-btn" for="chk_camera_ng" onclick="setCheck('chk_camera','NG','item_camera')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_belt">
          <span class="check-label">이송밸트 걸림</span>
          <div class="okng-group">
            <input type="radio" name="chk_belt" id="chk_belt_ok" value="OK" required>
            <label class="okng-btn" for="chk_belt_ok" onclick="setCheck('chk_belt','OK','item_belt')">OK</label>
            <input type="radio" name="chk_belt" id="chk_belt_ng" value="NG">
            <label class="okng-btn" for="chk_belt_ng" onclick="setCheck('chk_belt','NG','item_belt')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_plate">
          <span class="check-label">회전판 걸림</span>
          <div class="okng-group">
            <input type="radio" name="chk_plate" id="chk_plate_ok" value="OK" required>
            <label class="okng-btn" for="chk_plate_ok" onclick="setCheck('chk_plate','OK','item_plate')">OK</label>
            <input type="radio" name="chk_plate" id="chk_plate_ng" value="NG">
            <label class="okng-btn" for="chk_plate_ng" onclick="setCheck('chk_plate','NG','item_plate')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_eddy">
          <span class="check-label">에디작동</span>
          <div class="okng-group">
            <input type="radio" name="chk_eddy" id="chk_eddy_ok" value="OK" required>
            <label class="okng-btn" for="chk_eddy_ok" onclick="setCheck('chk_eddy','OK','item_eddy')">OK</label>
            <input type="radio" name="chk_eddy" id="chk_eddy_ng" value="NG">
            <label class="okng-btn" for="chk_eddy_ng" onclick="setCheck('chk_eddy','NG','item_eddy')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_out">
          <span class="check-label">배출부 인식</span>
          <div class="okng-group">
            <input type="radio" name="chk_out" id="chk_out_ok" value="OK" required>
            <label class="okng-btn" for="chk_out_ok" onclick="setCheck('chk_out','OK','item_out')">OK</label>
            <input type="radio" name="chk_out" id="chk_out_ng" value="NG">
            <label class="okng-btn" for="chk_out_ng" onclick="setCheck('chk_out','NG','item_out')">NG</label>
          </div>
        </div>

        <div class="check-item" id="item_sample">
          <span class="check-label">불량샘플 검출(초중종)</span>
          <div class="okng-group">
            <input type="radio" name="chk_sample" id="chk_sample_ok" value="OK" required>
            <label class="okng-btn" for="chk_sample_ok" onclick="setCheck('chk_sample','OK','item_sample')">OK</label>
            <input type="radio" name="chk_sample" id="chk_sample_ng" value="NG">
            <label class="okng-btn" for="chk_sample_ng" onclick="setCheck('chk_sample','NG','item_sample')">NG</label>
          </div>
        </div>

      </div>
    </div>

    <!-- 비고 -->
    <div class="card">
      <div class="card-title">비고</div>
      <div class="fg">
        <textarea id="memo" name="memo" placeholder="특이사항 또는 메모를 입력하세요"></textarea>
      </div>
    </div>

    <button type="submit" class="submit-btn">✅ 점검 제출</button>
  </form>
</div>
</div><!-- /pnl0 -->

<!-- 설정 패널 -->
<div class="pnl" id="pnl1">
<div class="form-wrap">

  <!-- 이력 관리 (다운로드/삭제) -->
  <div class="card">
    <div class="card-title">📊 이력 관리</div>
    <div class="fg-row">
      <div class="fg">
        <label class="field-label">시작일</label>
        <input type="date" id="histStartDate">
      </div>
      <div class="fg">
        <label class="field-label">종료일</label>
        <input type="date" id="histEndDate">
      </div>
    </div>
    <div class="fg">
      <label class="field-label">검사기</label>
      <select id="histMachine">
        <option value="">전체</option>
        <option value="3호기">3호기</option>
        <option value="4호기">4호기</option>
        <option value="5호기">5호기</option>
        <option value="6호기">6호기</option>
        <option value="7호기">7호기</option>
        <option value="8호기">8호기</option>
        <option value="9호기">9호기</option>
        <option value="10호기">10호기</option>
        <option value="11호기">11호기</option>
        <option value="12호기">12호기</option>
      </select>
    </div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button type="button" onclick="histPreview()" style="flex:1;padding:10px;background:linear-gradient(135deg,#0284c7,#38bdf8);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔍 조회</button>
      <button type="button" onclick="histDownload()" style="flex:1;padding:10px;background:linear-gradient(135deg,#059669,#34d399);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">📥 엑셀 다운로드</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button type="button" onclick="histDeleteFiltered()" style="flex:1;padding:10px;background:rgba(239,68,68,.15);border:1.5px solid rgba(239,68,68,.3);border-radius:8px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🗑 선택범위 삭제</button>
    </div>
    <div id="histMgmtStatus" style="font-size:11px;margin-top:8px;color:var(--text3)"></div>
    <div id="histPreviewArea" style="margin-top:10px;max-height:300px;overflow-y:auto"></div>
  </div>

  <!-- 검사자 관리 -->
  <div class="card">
    <div class="card-title">검사자 관리</div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;padding:6px 8px;background:rgba(56,189,248,.08);border-radius:6px">💡 검사자 목록은 Supabase <code>common_code</code> 테이블에 저장됩니다 (code_group: inspector)</div>
    <div id="inspectorList"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <input type="text" id="newInspectorName" placeholder="이름 입력" style="flex:1;padding:9px 12px;font-size:13px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit">

<script>
// === Supabase 설정 (localStorage) ===
const LS_KEY = 'QC_MACHINE_SETTINGS';
const DEFAULT_INSPECTORS = ['권혜영','강란희','이유선','송경옥','강병주','오윤정','김상기','허미정','오현민','문수진','김미선','하정화','차찬이','서성자','전귀옥'];

// 검사자 캐시 (서버에서 로드)
let _inspectorCache=[];

function getInspectors(){ return _inspectorCache.length?_inspectorCache:[...DEFAULT_INSPECTORS]; }

async function loadInspectorsFromServer(){
  if(!isConfigured())return;
  try{
    const data=await sbSelect('common_code',{code_group:'eq.inspector'},'sort_order.asc',100);
    if(data&&data.length){
      _inspectorCache=data.map(r=>({id:r.id, name:String(r.code_value||'').trim(), sort:r.sort_order||0}));
      _inspectorCache.sort((a,b)=>a.sort-b.sort);
    }else{
      // 서버에 데이터 없으면 기본값 일괄 등록
      await initInspectorsOnServer();
    }
  }catch(e){console.log('검사자 로드 실패:',e)}
  renderInspectorSelect();
}

async function initInspectorsOnServer(){
  if(!isConfigured())return;
  const rows=DEFAULT_INSPECTORS.map((name,i)=>({code_group:'inspector',code_value:name,sort_order:i+1,note:''}));
  try{
    const SB_URL=getSbUrl(),SB_KEY=getSbKey();
    const res=await fetch(`${SB_URL}/rest/v1/common_code`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
      body:JSON.stringify(rows)
    });
    if(res.ok){
      const saved=await res.json();
      _inspectorCache=saved.map(r=>({id:r.id,name:String(r.code_value||'').trim(),sort:r.sort_order||0}));
      _inspectorCache.sort((a,b)=>a.sort-b.sort);
    }
  }catch(e){console.log('검사자 초기등록 실패:',e)}
}

function renderInspectorSelect(){
  const sel=document.getElementById('inspector');
  const prev=sel.value;
  sel.innerHTML='<option value="" disabled selected>선택</option>';
  const list=getInspectors();
  (Array.isArray(list)&&list.length?list:[]).forEach(item=>{
    const name=typeof item==='string'?item:item.name;
    const o=document.createElement('option');o.value=name;o.textContent=name;sel.appendChild(o);
  });
  if(prev){sel.value=prev}
}

function renderInspectorListUI(){
  const list=getInspectors();
  const c=document.getElementById('inspectorList');
  if(!list.length){c.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px 0">검사자 없음</div>';return}
  const items=list.map(item=>typeof item==='string'?{name:item,id:null,sort:0}:item);
  c.innerHTML=items.map((item,i)=>`<div class="tg-user-item"><span style="color:var(--text3);font-size:11px;min-width:20px">${i+1}</span><span class="tg-name" style="flex:1">${item.name}</span><button class="tg-del" onclick="moveInspector(${i},-1)" style="background:transparent;color:var(--text2);font-size:11px" title="위로">▲</button><button class="tg-del" onclick="moveInspector(${i},1)" style="background:transparent;color:var(--text2);font-size:11px" title="아래로">▼</button><button class="tg-del" onclick="removeInspector(${i})">✕</button></div>`).join('');
}

async function addInspector(){
  const inp=document.getElementById('newInspectorName');
  const name=inp.value.trim();
  if(!name)return;
  const st=document.getElementById('inspectorSaveStatus');
  const list=getInspectors();
  const names=list.map(item=>typeof item==='string'?item:item.name);
  if(names.includes(name)){st.textContent='⚠️ 이미 존재하는 이름';st.style.color='#f59e0b';return}

  if(!isConfigured()){st.textContent='❌ Supabase 연결 필요';st.style.color='#ef4444';return}
  st.textContent='추가 중...';st.style.color='var(--accent)';
  const newSort=_inspectorCache.length?Math.max(..._inspectorCache.map(c=>c.sort))+1:1;
  try{
    const saved=await sbInsert('common_code',{code_group:'inspector',code_value:name,sort_order:newSort,note:''});
    if(saved&&saved.length){
      _inspectorCache.push({id:saved[0].id,name:name,sort:newSort});
      _inspectorCache.sort((a,b)=>a.sort-b.sort);
    }
    inp.value='';
    renderInspectorListUI();
    renderInspectorSelect();
    st.textContent='✅ 추가됨: '+name;st.style.color='#22c55e';
  }catch(e){st.textContent='❌ 추가 실패: '+e.message;st.style.color='#ef4444'}
}

async function removeInspector(idx){
  const list=getInspectors();
  const item=typeof list[idx]==='string'?{name:list[idx],id:null}:list[idx];
  if(!confirm(item.name+' 삭제?'))return;
  const st=document.getElementById('inspectorSaveStatus');

  if(item.id&&isConfigured()){
    st.textContent='삭제 중...';st.style.color='var(--accent)';
    try{
      const SB_URL=getSbUrl(),SB_KEY=getSbKey();
      await fetch(`${SB_URL}/rest/v1/common_code?id=eq.${item.id}`,{
        method:'DELETE',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      _inspectorCache=_inspectorCache.filter(c=>c.id!==item.id);
      renderInspectorListUI();
      renderInspectorSelect();
      st.textContent='삭제됨: '+item.name;st.style.color='#f59e0b';
    }catch(e){st.textContent='❌ 삭제 실패: '+e.message;st.style.color='#ef4444'}
  }else{
    st.textContent='❌ 서버 연결 필요';st.style.color='#ef4444';
  }
}

async function moveInspector(idx,dir){
  const list=getInspectors();
  const n=idx+dir;
  if(n<0||n>=list.length)return;
  const items=list.map(item=>typeof item==='string'?{name:item,id:null,sort:0}:item);
  // sort_order 교환
  const tmpSort=items[idx].sort;
  items[idx].sort=items[n].sort;
  items[n].sort=tmpSort;
  [items[idx],items[n]]=[items[n],items[idx]];

  if(isConfigured()&&items[idx].id&&items[n].id){
    try{
      const SB_URL=getSbUrl(),SB_KEY=getSbKey();
      // 두 레코드 sort_order 업데이트
      await fetch(`${SB_URL}/rest/v1/common_code?id=eq.${items[idx].id}`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({sort_order:items[idx].sort})
      });
      await fetch(`${SB_URL}/rest/v1/common_code?id=eq.${items[n].id}`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
        body:JSON.stringify({sort_order:items[n].sort})
      });
    }catch(e){console.log('순서변경 실패:',e)}
  }
  _inspectorCache=items;
  _inspectorCache.sort((a,b)=>a.sort-b.sort);
  renderInspectorListUI();
  renderInspectorSelect();
}

async function saveInspectors(){
  const st=document.getElementById('inspectorSaveStatus');
  st.textContent='✅ 서버에 저장되어 있습니다 ('+new Date().toLocaleTimeString()+')';
  st.style.color='#22c55e';
}
function getSettings() {
  return JSON.parse(localStorage.getItem(LS_KEY) || '{}');
}
function getSbUrl() { return getSettings().sb_url || ''; }
function getSbKey() { return getSettings().sb_key || ''; }
function getTgBot() { return getSettings().tg_bot || ''; }
function getTgUsers() {
  try { return JSON.parse(getSettings().tg_users || '[]'); } catch(e) { return []; }
}

// common_code fallback용 캐시
let _ccTgBot='',_ccTgUsers=[];

function decodeTgToken(encoded){
  const key='smtec';
  const decoded=atob(encoded);
  let result='';
  for(let i=0;i<decoded.length;i++)result+=String.fromCharCode(decoded.charCodeAt(i)^key.charCodeAt(i%key.length));
  return result;
}

async function loadTgFromCommonCode(){
  try{
    const data=await sbSelect('common_code',{code_group:'eq.telegram'},'sort_order.asc',20);
    if(data&&data.length){
      data.forEach(r=>{
        const v=String(r.code_value||'').trim();
        if(r.sort_order===0)_ccTgBot=decodeTgToken(v);
        else if(v)_ccTgUsers.push({name:r.note||'수신자'+r.sort_order,chat_id:v});
      });
    }
  }catch(e){console.log('common_code 텔레그램 로드 실패:',e)}
}

// 페이지 로드 시 common_code도 미리 로드
setTimeout(()=>{if(isConfigured())loadTgFromCommonCode()},1000);
function isConfigured() { return !!(getSbUrl() && getSbKey()); }

async function sbInsert(table, data) {
  const SB_URL = getSbUrl(), SB_KEY = getSbKey();
  if (!SB_URL || !SB_KEY) throw new Error('Supabase 설정이 필요합니다. ⚙ 설정 탭에서 입력하세요.');
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || JSON.stringify(err));
  }
  return await res.json();
}

async function sbSelect(table, filter, order, limit) {
  const SB_URL = getSbUrl(), SB_KEY = getSbKey();
  if (!SB_URL || !SB_KEY) throw new Error('Supabase 미설정');
  let url = `${SB_URL}/rest/v1/${table}?select=*`;
  if (filter) Object.entries(filter).forEach(([k,v]) => url += `&${k}=${v}`);
  if (order) url += `&order=${order}`;
  if (limit) url += `&limit=${limit}`;
  const res = await fetch(url, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error('조회 실패');
  return await res.json();
}

// 테이블 자동 생성
async function ensureTable() {
  const SB_URL = getSbUrl(), SB_KEY = getSbKey();
  if (!SB_URL || !SB_KEY) return;
  try {
    await fetch(`${SB_URL}/rest/v1/qc_machine_check?select=id&limit=1`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).then(r => { if (r.status === 404) throw new Error('no table'); });
  } catch(e) {
    // 테이블이 없으면 SQL로 생성
    try {
      await fetch(`${SB_URL}/rest/v1/rpc/exec_sql`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        },
        body: JSON.stringify({ query: CREATE_TABLE_SQL })
      });
    } catch(e2) {
      console.log('테이블 자동생성 불가 - SQL Editor에서 수동 실행 필요');
    }
  }
}

const CREATE_TABLE_SQL = `
CREATE TABLE IF NOT EXISTS qc_machine_check (
  id bigint generated always as identity primary key,
  check_date date not null,
  check_time time not null,
  inspector text not null,
  machine text not null,
  qr_code text,
  chk_input text default 'OK',
  chk_chain text default 'OK',
  chk_height text default 'OK',
  chk_camera text default 'OK',
  chk_belt text default 'OK',
  chk_plate text default 'OK',
  chk_eddy text default 'OK',
  chk_out text default 'OK',
  chk_sample text default 'OK',
  ng_count integer default 0,
  result text default 'OK',
  memo text,
  created_at timestamptz default now()
);
ALTER TABLE qc_machine_check ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "anon_all_qc_machine_check" ON qc_machine_check;
CREATE POLICY "anon_all_qc_machine_check" ON qc_machine_check FOR ALL TO anon USING (true) WITH CHECK (true);
`;

let html5QrCodeInstance;
let currentScanTarget;

// === OK/NG 토글 및 시각 피드백 ===
function setCheck(name, val, itemId) {
  const item = document.getElementById(itemId);
  if (!item) return;
  // radio가 disabled면 무시
  const radio = document.querySelector(`input[name="${name}"][value="${val}"]`);
  if (radio && radio.disabled) return;

  item.classList.remove('checked-ok', 'checked-ng');
  if (val === 'OK') item.classList.add('checked-ok');
  else item.classList.add('checked-ng');

  // 버튼 시각
  const grp = item.querySelector('.okng-group');
  grp.querySelectorAll('.okng-btn').forEach(b => b.classList.remove('ok-selected', 'ng-selected'));
  const lbl = grp.querySelector(`label[for="${name}_${val.toLowerCase()}"]`);
  if (lbl) lbl.classList.add(val === 'OK' ? 'ok-selected' : 'ng-selected');

  if (navigator.vibrate) navigator.vibrate(val === 'OK' ? [30] : [50, 30, 50]);
  updateProgress();
}

function updateProgress() {
  const names = ['chk_input','chk_chain','chk_height','chk_camera','chk_belt','chk_plate','chk_eddy','chk_out','chk_sample'];
  let done = 0;
  names.forEach(n => { if (document.querySelector(`input[name="${n}"]:checked`)) done++; });
  const pct = Math.round(done / names.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + names.length + ' 항목 체크';
}

// === 날짜/시간 자동 설정 ===
function setDateTimeNow() {
  const now = new Date();
  document.getElementById("checkDate").value = now.toISOString().split('T')[0];
  document.getElementById("checkTime").value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

// === QR 스캔 ===
function scanQRCode(targetId) {
  currentScanTarget = targetId;
  document.getElementById("preview-wrapper").style.display = "flex";
  html5QrCodeInstance = new Html5Qrcode("preview");
  html5QrCodeInstance.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    decodedText => {
      document.getElementById(currentScanTarget).value = decodedText;
      checkQRCodeAndEnableChain(decodedText);
      alert(`스캔 결과: ${decodedText}`);
      stopQrScanner();
    },
    err => console.warn('QR 인식 실패:', err)
  ).catch(console.error);
}

function stopQrScanner() {
  document.getElementById("preview-wrapper").style.display = "none";
  if (html5QrCodeInstance) {
    html5QrCodeInstance.stop().then(() => html5QrCodeInstance.clear()).catch(console.error);
  }
}

function checkQRCodeAndEnableChain(qrValue) {
  const chainRadios = document.querySelectorAll('input[name="chk_chain"]');
  const qrStatus = document.getElementById('qrStatus');
  const item = document.getElementById('item_chain');

  if (qrValue === "2") {
    chainRadios.forEach(radio => {
      radio.disabled = false;
      radio.classList.remove('disabled-radio');
      radio.required = true;
    });
    item.classList.remove('disabled-item');
    qrStatus.textContent = '✅ QR "2" 확인';
    qrStatus.className = 'qr-status qr-success';
  } else {
    chainRadios.forEach(radio => {
      radio.disabled = true;
      radio.classList.add('disabled-radio');
      radio.checked = false;
      radio.required = false;
    });
    item.classList.add('disabled-item');
    item.classList.remove('checked-ok', 'checked-ng');
    item.querySelectorAll('.okng-btn').forEach(b => b.classList.remove('ok-selected', 'ng-selected'));
    qrStatus.textContent = `❌ "${qrValue}" → "2" 필요`;
    qrStatus.className = 'qr-status qr-required';
    updateProgress();
  }
}

// === 폼 제출 ===
function validateForm() {
  const qrResult = document.getElementById('qrResult').value;
  if (qrResult !== "2") {
    alert('기종전환시 잔량없음 항목을 위해 QR "2"를 스캔해주세요.');
    return false;
  }
  const chainChecked = Array.from(document.querySelectorAll('input[name="chk_chain"]')).some(r => r.checked);
  if (!chainChecked) {
    alert('기종전환시 잔량없음 항목을 선택해주세요.');
    return false;
  }
  return true;
}

    ng_count: ngItems.length,
    result: ngItems.length ? 'NG' : 'OK',

  };

  try {

  } catch(err) {
    alert("저장 실패: " + err.message);
  }
});

// === 텔레그램 알림 (localStorage → common_code fallback) ===
async function sendTelegram(data){
  let TG_BOT = getTgBot();
  let TG_USERS = getTgUsers();

  // localStorage에 없으면 common_code fallback
  if(!TG_BOT||!TG_USERS.length){
    if(!_ccTgBot)await loadTgFromCommonCode();
    if(!TG_BOT&&_ccTgBot)TG_BOT=_ccTgBot;
    if(!TG_USERS.length&&_ccTgUsers.length)TG_USERS=_ccTgUsers;
  }
  if(!TG_BOT||!TG_USERS.length)return;

  const checks=Object.entries(data.inputs).map(([k,v])=>(v==='NG'?'❌':'✅')+' '+k+': '+v).join('\n');
  const ngItems=Object.entries(data.inputs).filter(([k,v])=>v==='NG');
  const status=ngItems.length?'⚠️ NG '+ngItems.length+'건':'✅ 전체 OK';
  const msg=`🔬 검사기 일상점검 결과\n━━━━━━━━━━━━━━\n📅 ${data.date} ${data.time}\n👤 검사자: ${data.inspector}\n🏭 검사기: ${data.machine}\n\n📋 점검결과: ${status}\n${checks}${data.memo?'\n\n📝 비고: '+data.memo:''}`;

  for(const u of TG_USERS){
    try{
      await fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:u.chat_id,text:msg,parse_mode:''})
      });
    }catch(e){console.log('텔레그램 전송 실패:',e)}
  }
}

// === 설정 UI ===
function loadSettingsUI(){
  const s=getSettings();
  document.getElementById('stgSbUrl').value=s.sb_url||'';
  document.getElementById('stgSbKey').value=s.sb_key||'';
  document.getElementById('stgTgBot').value=s.tg_bot||'';
  renderTgUsers();
  renderInspectorListUI();
  if(isConfigured())loadInspectorsFromServer().then(()=>renderInspectorListUI());
  updateConnInfo();
  // 이력관리 날짜 기본값 (오늘 기준 최근 1개월)
  const today=new Date();
  const monthAgo=new Date(today);monthAgo.setMonth(monthAgo.getMonth()-1);
  if(!document.getElementById('histEndDate').value)document.getElementById('histEndDate').value=today.toISOString().split('T')[0];
  if(!document.getElementById('histStartDate').value)document.getElementById('histStartDate').value=monthAgo.toISOString().split('T')[0];
}

function renderTgUsers(){
  const users=getTgUsers();
  const c=document.getElementById('tgUserList');
  if(!users.length){c.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px 0">수신자 없음</div>';return}
  c.innerHTML=users.map((u,i)=>`<div class="tg-user-item"><span class="tg-name">${u.name}</span><span class="tg-id">${u.chat_id}</span><button class="tg-del" onclick="removeTgUser(${i})">✕</button></div>`).join('');
}

function addTgUser(){
  const name=document.getElementById('tgNewName').value.trim();
  const id=document.getElementById('tgNewId').value.trim();
  if(!name||!id)return;
  const users=getTgUsers();
  if(users.find(u=>u.chat_id===id))return;
  users.push({name,chat_id:id});
  const s=getSettings();s.tg_users=JSON.stringify(users);
  localStorage.setItem(LS_KEY,JSON.stringify(s));
  document.getElementById('tgNewName').value='';
  document.getElementById('tgNewId').value='';
  renderTgUsers();
}

function removeTgUser(idx){
  const users=getTgUsers();users.splice(idx,1);
  const s=getSettings();s.tg_users=JSON.stringify(users);
  localStorage.setItem(LS_KEY,JSON.stringify(s));
  renderTgUsers();
}

async function testSbConnection(){
  const st=document.getElementById('stgSbStatus');
  const url=document.getElementById('stgSbUrl').value.trim().replace(/\/$/,'');
  const key=document.getElementById('stgSbKey').value.trim();
  if(!url||!key){st.textContent='❌ URL과 Key를 입력하세요';st.style.color='#ef4444';return}
  st.textContent='연결 중...';st.style.color='var(--accent)';
  try{

    if(res.ok){st.textContent='✅ 연결 성공 (테이블 확인됨)';st.style.color='#22c55e'}
    else if(res.status===404){st.textContent='⚠️ 연결 OK, 테이블 미생성 (SQL 실행 필요)';st.style.color='#f59e0b'}
    else{st.textContent='❌ 응답 오류: '+res.status;st.style.color='#ef4444'}
  }catch(e){st.textContent='❌ 연결 실패: '+e.message;st.style.color='#ef4444'}

async function testTelegram(){
  const st=document.getElementById('stgTgStatus');
  let bot=document.getElementById('stgTgBot').value.trim();
  let users=getTgUsers();

  // localStorage에 없으면 common_code fallback
  if(!bot||!users.length){
    if(!_ccTgBot)await loadTgFromCommonCode();
    if(!bot&&_ccTgBot)bot=_ccTgBot;
    if(!users.length&&_ccTgUsers.length)users=_ccTgUsers;
  }
  if(!bot){st.textContent='❌ Bot Token 없음 (설정 또는 common_code)';st.style.color='#ef4444';return}
  if(!users.length){st.textContent='❌ 수신자 없음 (설정 또는 common_code)';st.style.color='#ef4444';return}
  st.textContent='전송 중...';st.style.color='var(--accent)';
  let ok=0;
  for(const u of users){
    try{
      const res=await fetch(`https://api.telegram.org/bot${bot}/sendMessage`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:u.chat_id,text:`🔬 검사기 점검 알림 테스트\n수신자: ${u.name}\n시간: ${new Date().toLocaleString()}`})
      });
      const data=await res.json();
      if(data.ok)ok++;
    }catch(e){}
  }
  st.textContent=ok===users.length?'✅ '+ok+'명 전송 성공':'⚠️ '+ok+'/'+users.length+'명 성공';
  st.style.color=ok===users.length?'#22c55e':'#f59e0b';
}

function updateConnInfo(){
  const s=getSettings();
  const c=document.getElementById('stgConnInfo');
  const sbOk=!!(s.sb_url&&s.sb_key);
  const tgOk=!!(s.tg_bot&&getTgUsers().length);
  const ccOk=!!(_ccTgBot&&_ccTgUsers.length);
  let tgLabel='';
  if(tgOk)tgLabel='🟢 텔레그램: '+getTgUsers().length+'명 수신 (로컬설정)';
  else if(ccOk)tgLabel='🟢 텔레그램: '+_ccTgUsers.length+'명 수신 (DB설정)';
  else tgLabel='🔴 텔레그램: 미설정';
  c.innerHTML=`${sbOk?'🟢':'🔴'} Supabase: ${sbOk?'설정됨':'미설정'}<br>${tgLabel}`;
}

// === 이력 관리 (조회/다운로드/삭제) ===
async function histFetchFiltered(){
  if(!isConfigured()){return{ok:false,msg:'Supabase 미설정'}}
  const start=document.getElementById('histStartDate').value;
  const end=document.getElementById('histEndDate').value;
  const machine=document.getElementById('histMachine').value;
  if(!start||!end){return{ok:false,msg:'시작일과 종료일을 선택하세요'}}

  let url=getSbUrl()+'/rest/v1/qc_machine_check?select=*&order=check_date.desc,check_time.desc&limit=5000';
  url+='&check_date=gte.'+start+'&check_date=lte.'+end;
  if(machine)url+='&machine=eq.'+encodeURIComponent(machine);

  try{
    const res=await fetch(url,{headers:{'apikey':getSbKey(),'Authorization':'Bearer '+getSbKey()}});
    if(!res.ok)throw new Error('조회 실패: '+res.status);
    const data=await res.json();
    return{ok:true,data:data};
  }catch(e){return{ok:false,msg:e.message}}
}

async function histPreview(){
  const st=document.getElementById('histMgmtStatus');
  const area=document.getElementById('histPreviewArea');
  st.textContent='조회 중...';st.style.color='var(--accent)';area.innerHTML='';

  const result=await histFetchFiltered();
  if(!result.ok){st.textContent='❌ '+result.msg;st.style.color='#ef4444';return}

  const data=result.data;
  if(!data.length){st.textContent='⚠️ 해당 조건의 이력이 없습니다';st.style.color='#f59e0b';return}

  const okCnt=data.filter(r=>r.result==='OK').length;
  const ngCnt=data.filter(r=>r.result==='NG').length;
  st.textContent='✅ '+data.length+'건 조회됨 (OK: '+okCnt+' / NG: '+ngCnt+')';
  st.style.color='#22c55e';

  // 간략 테이블
  let h='<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:6px">';
  h+='<tr style="background:var(--surface2)"><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:left">일자</th><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:left">시간</th><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:left">검사자</th><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:left">검사기</th><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center">판정</th><th style="padding:6px 4px;border-bottom:1px solid var(--border);text-align:center">NG</th></tr>';
  data.slice(0,100).forEach(r=>{
    const isNG=r.result==='NG';
    h+='<tr style="border-bottom:1px solid rgba(255,255,255,.04)">';
    h+='<td style="padding:5px 4px">'+r.check_date+'</td>';
    h+='<td style="padding:5px 4px">'+(r.check_time||'').substring(0,5)+'</td>';
    h+='<td style="padding:5px 4px">'+(r.inspector||'')+'</td>';
    h+='<td style="padding:5px 4px">'+(r.machine||'')+'</td>';
    h+='<td style="padding:5px 4px;text-align:center;color:'+(isNG?'#ef4444':'#22c55e')+';font-weight:700">'+(r.result||'')+'</td>';
    h+='<td style="padding:5px 4px;text-align:center">'+(r.ng_count||0)+'</td>';
    h+='</tr>';
  });
  if(data.length>100)h+='<tr><td colspan="6" style="padding:8px;text-align:center;color:var(--text3)">... 외 '+(data.length-100)+'건</td></tr>';
  h+='</table>';
  area.innerHTML=h;
}

async function histDownload(){
  const st=document.getElementById('histMgmtStatus');
  st.textContent='다운로드 준비 중...';st.style.color='var(--accent)';

  const result=await histFetchFiltered();
  if(!result.ok){st.textContent='❌ '+result.msg;st.style.color='#ef4444';return}
  if(!result.data.length){st.textContent='⚠️ 다운로드할 이력이 없습니다';st.style.color='#f59e0b';return}

  const data=result.data;
  const headers=['점검일자','점검시간','검사자','검사기','QR코드','작업기종표시','기종전환잔량','높이검사청소','카메라청소풀림','이송밸트걸림','회전판걸림','에디작동','배출부인식','불량샘플검출','NG건수','판정','비고'];
  const rows=data.map(r=>[
    r.check_date, (r.check_time||'').substring(0,5), r.inspector||'', r.machine||'', r.qr_code||'',
    r.chk_input||'', r.chk_chain||'', r.chk_height||'', r.chk_camera||'',
    r.chk_belt||'', r.chk_plate||'', r.chk_eddy||'', r.chk_out||'', r.chk_sample||'',
    r.ng_count||0, r.result||'', r.memo||''
  ]);

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=[{wch:11},{wch:6},{wch:8},{wch:7},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:8},{wch:5},{wch:4},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'검사기점검이력');

  const start=document.getElementById('histStartDate').value.replace(/-/g,'');
  const end=document.getElementById('histEndDate').value.replace(/-/g,'');
  const machine=document.getElementById('histMachine').value;
  const fname='검사기점검_'+start+'_'+end+(machine?'_'+machine:'')+'.xlsx';
  XLSX.writeFile(wb,fname);

  st.textContent='✅ '+data.length+'건 다운로드 완료';st.style.color='#22c55e';
}

async function histDeleteFiltered(){
  const st=document.getElementById('histMgmtStatus');
  const result=await histFetchFiltered();
  if(!result.ok){st.textContent='❌ '+result.msg;st.style.color='#ef4444';return}
  if(!result.data.length){st.textContent='⚠️ 삭제할 이력이 없습니다';st.style.color='#f59e0b';return}

  const cnt=result.data.length;
  const start=document.getElementById('histStartDate').value;
  const end=document.getElementById('histEndDate').value;
  const machine=document.getElementById('histMachine').value;
  const desc=start+' ~ '+end+(machine?' / '+machine:'');

  if(!confirm('⚠️ 정말 삭제하시겠습니까?\n\n기간: '+desc+'\n대상: '+cnt+'건\n\n이 작업은 되돌릴 수 없습니다.'))return;
  if(!confirm('한번 더 확인합니다.\n'+cnt+'건을 삭제합니다.'))return;

  st.textContent='삭제 중...';st.style.color='var(--accent)';

  // ID 목록으로 삭제 (50건씩 배치)
  const ids=result.data.map(r=>r.id);
  let deleted=0;
  const batchSize=50;
  for(let i=0;i<ids.length;i+=batchSize){
    const batch=ids.slice(i,i+batchSize);
    const idFilter='id=in.('+batch.join(',')+')';
    try{
      await fetch(getSbUrl()+'/rest/v1/qc_machine_check?'+idFilter,{
        method:'DELETE',
        headers:{'apikey':getSbKey(),'Authorization':'Bearer '+getSbKey()}
      });
      deleted+=batch.length;
      st.textContent='삭제 중... '+deleted+'/'+cnt;
    }catch(e){
      st.textContent='❌ 삭제 중 오류: '+e.message+' ('+deleted+'건 삭제됨)';st.style.color='#ef4444';return;
    }
  }

  st.textContent='✅ '+deleted+'건 삭제 완료';st.style.color='#22c55e';
  document.getElementById('histPreviewArea').innerHTML='';
}
