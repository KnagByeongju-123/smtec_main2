<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>계측기 숫자 인식 (OCR)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; padding: 0 0 40px 0;
  font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
  background: #0f172a; color: #e2e8f0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1e293b, #0f172a);
  padding: 14px 16px; border-bottom: 2px solid #334155;
  position: sticky; top: 0; z-index: 100;
}
.header h1 { margin: 0; font-size: 17px; font-weight: 700; color: #38bdf8; }
.header .sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }

.container { padding: 12px; max-width: 720px; margin: 0 auto; }

.card {
  background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: 14px; margin-bottom: 14px;
}
.card h2 {
  margin: 0 0 10px 0; font-size: 14px;
  color: #38bdf8; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.card h2 .num {
  background: #38bdf8; color: #0f172a;
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}

.btn {
  display: block; width: 100%; padding: 14px;
  font-size: 16px; font-weight: 700;
  border: none; border-radius: 10px; cursor: pointer;
  margin-bottom: 8px; transition: all 0.15s;
}
.btn-primary { background: #38bdf8; color: #0f172a; }
.btn-primary:active { transform: scale(0.98); background: #0ea5e9; }
.btn-success { background: #22c55e; color: #fff; }
.btn-success:active { background: #16a34a; }
.btn-warn { background: #f59e0b; color: #0f172a; }
.btn-warn:active { background: #d97706; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:active { background: #dc2626; }
.btn-secondary { background: #475569; color: #e2e8f0; }
.btn-secondary:active { background: #334155; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== 카메라 풀스크린 ===== */
.camera-modal {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #000; z-index: 9999;
  flex-direction: column;
}
.camera-modal.show { display: flex; }
.camera-modal video {
  flex: 1;
  width: 100%;
  object-fit: contain;
  background: #000;
}
.camera-controls {
  padding: 16px;
  background: #000;
  display: flex;
  gap: 12px;
  justify-content: space-around;
  align-items: center;
}
.camera-controls button {
  flex: 1;
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
  border: none; border-radius: 10px;
  cursor: pointer;
}
.camera-shutter {
  width: 70px !important; height: 70px !important;
  border-radius: 50% !important;
  background: #fff !important;
  border: 4px solid #38bdf8 !important;
  flex: 0 0 auto !important;
  font-size: 24px !important;
  padding: 0 !important;
}
.camera-shutter:active {
  background: #38bdf8 !important;
  transform: scale(0.92);
}
.camera-guide {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 70%;
  max-width: 400px;
  height: 25%;
  border: 3px dashed #fbbf24;
  border-radius: 8px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
}
.camera-guide-text {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(15,23,42,0.85);
  color: #fbbf24;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  pointer-events: none;
  z-index: 1;
}
.camera-error {
  padding: 30px;
  text-align: center;
  color: #fca5a5;
  font-size: 14px;
  background: #7f1d1d;
  margin: 16px;
  border-radius: 8px;
  display: none;
}
.camera-error.show { display: block; }

/* ===== 크롭 영역 ===== */
.crop-stage {
  position: relative;
  width: 100%;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.crop-stage canvas {
  display: block;
  width: 100%;
  height: auto;
  pointer-events: none;
}
.crop-stage .overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: crosshair;
  background: transparent;
}
.crop-stage .crop-box {
  position: absolute;
  border: 3px dashed #fbbf24;
  background: rgba(251, 191, 36, 0.18);
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
}
.crop-stage .crop-hint {
  position: absolute; top: 8px; left: 8px;
  background: rgba(15, 23, 42, 0.85);
  color: #fbbf24;
  padding: 6px 10px; font-size: 12px;
  border-radius: 6px; font-weight: 600;
  pointer-events: none;
}

.preview-empty {
  background: #1e293b;
  border: 2px dashed #334155;
  border-radius: 8px;
  padding: 50px 16px;
  text-align: center;
  color: #64748b;
  font-size: 14px;
  margin-bottom: 12px;
}

.result-display {
  background: #0f172a;
  border: 2px solid #38bdf8;
  border-radius: 8px;
  padding: 18px;
  text-align: center;
  margin-bottom: 12px;
}
.result-display .label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.result-display .value {
  font-size: 32px; font-weight: 800;
  font-family: "Courier New", monospace;
  color: #38bdf8; letter-spacing: 2px;
  word-break: break-all;
}
.result-display .raw {
  font-size: 11px; color: #64748b; margin-top: 6px;
  font-family: "Courier New", monospace;
}

.input-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 8px;
}
.input-row label {
  font-size: 13px; color: #cbd5e1; min-width: 80px;
}
.input-row input, .input-row select {
  flex: 1; padding: 12px;
  background: #0f172a; color: #e2e8f0;
  border: 1px solid #475569; border-radius: 6px;
  font-size: 16px; font-family: "Courier New", monospace;
}
.input-row input:focus, .input-row select:focus {
  outline: none; border-color: #38bdf8;
}

.options-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 12px;
}
.opt-btn {
  padding: 10px; font-size: 13px;
  background: #334155; color: #cbd5e1;
  border: 1px solid #475569; border-radius: 6px;
  cursor: pointer;
}
.opt-btn.active {
  background: #38bdf8; color: #0f172a;
  border-color: #38bdf8; font-weight: 700;
}

.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.status {
  padding: 10px 12px; border-radius: 6px;
  font-size: 13px; margin-bottom: 12px;
  display: none;
}
.status.show { display: block; }
.status.info { background: #1e3a5f; color: #93c5fd; }
.status.success { background: #14532d; color: #86efac; }
.status.error { background: #7f1d1d; color: #fca5a5; }

.progress {
  height: 6px; background: #334155; border-radius: 3px;
  overflow: hidden; margin-top: 6px;
}
.progress-bar {
  height: 100%; background: #38bdf8;
  width: 0%; transition: width 0.3s;
}

.history { max-height: 200px; overflow-y: auto; }
.history-item {
  display: flex; justify-content: space-between;
  padding: 8px; border-bottom: 1px solid #334155;
  font-size: 13px; align-items: center;
}
.history-item:last-child { border-bottom: none; }
.history-item .time { color: #64748b; font-size: 11px; }
.history-item .val {
  font-family: "Courier New", monospace;
  color: #38bdf8; font-weight: 700;
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>📷 계측기 숫자 인식</h1>
  <div class="sub">카메라 촬영 → 영역 드래그 → 숫자 자동 입력</div>
</div>

<div class="container">

  <div class="card">
    <h2><span class="num">1</span>측정 항목</h2>
    <div class="options-grid">
      <button class="opt-btn active" data-mode="number" onclick="setMode('number')">숫자만</button>
      <button class="opt-btn" data-mode="decimal" onclick="setMode('decimal')">소수점 포함</button>
      <button class="opt-btn" data-mode="negative" onclick="setMode('negative')">±부호 포함</button>
      <button class="opt-btn" data-mode="alphanum" onclick="setMode('alphanum')">영문+숫자</button>
    </div>
    <div class="input-row">
      <label>저장 항목</label>
      <select id="targetField">
        <option value="weight">중량 (kg/g)</option>
        <option value="length">길이 (mm)</option>
        <option value="thickness">두께 (mm)</option>
        <option value="diameter">직경 (mm)</option>
        <option value="hardness">경도 (HRC)</option>
        <option value="temperature">온도 (℃)</option>
        <option value="pressure">압력</option>
        <option value="custom">기타</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">2</span>사진 & 영역 선택</h2>

    <div id="emptyView" class="preview-empty">
      📸 카메라로 LCD를 촬영하세요<br>
      <span style="font-size:12px;color:#475569">노란 가이드 박스에 숫자가 들어오게 맞춰주세요</span>
    </div>

    <div id="cropStage" class="crop-stage" style="display:none">
      <canvas id="cropCanvas"></canvas>
      <div id="cropOverlay" class="overlay"></div>
      <div id="cropBox" class="crop-box" style="display:none"></div>
      <div class="crop-hint" id="cropHint">손가락으로 숫자 영역을 드래그하세요</div>
    </div>

    <input type="file" id="galleryInput" accept="image/*">

    <button class="btn btn-primary" onclick="openCamera()">
      📸 카메라 켜기
    </button>

    <div class="action-row">
      <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()" style="margin:0">
        🖼 갤러리에서 선택
      </button>
      <button class="btn btn-warn" onclick="useFullImage()" style="margin:0" id="fullBtn" disabled>
        전체 사용
      </button>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">3</span>숫자 인식</h2>

    <button class="btn btn-success" id="ocrBtn" onclick="runOCR()" disabled>
      🔍 숫자 읽기 시작
    </button>

    <div class="status" id="ocrStatus"></div>
    <div class="progress" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result-display" id="resultDisplay" style="display:none">
      <div class="label">인식 결과</div>
      <div class="value" id="resultValue">-</div>
      <div class="raw" id="resultRaw"></div>
    </div>

    <div class="input-row" id="editRow" style="display:none">
      <label>수정/확인</label>
      <input type="text" id="editValue" inputmode="decimal">
    </div>

    <button class="btn btn-primary" id="useBtn" onclick="useResult()" style="display:none">
      ✅ 이 값 사용하기
    </button>
  </div>

  <div class="card">
    <h2><span class="num">4</span>최종 입력값</h2>
    <div class="input-row">
      <label id="finalLabel">중량</label>
      <input type="text" id="finalValue" placeholder="여기에 결과가 입력됩니다" readonly>
    </div>
    <button class="btn btn-secondary" onclick="copyFinal()">📋 클립보드 복사</button>
  </div>

  <div class="card">
    <h2><span class="num">5</span>인식 이력</h2>
    <div class="history" id="historyList">
      <div style="padding:12px;color:#64748b;text-align:center;font-size:13px">아직 이력이 없습니다</div>
    </div>
    <button class="btn btn-secondary" onclick="clearHistory()" style="margin-top:8px">이력 지우기</button>
  </div>

</div>

<!-- 카메라 풀스크린 모달 -->
<div class="camera-modal" id="cameraModal">
  <div class="camera-error" id="cameraError"></div>
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div class="camera-guide" id="cameraGuide"></div>
  <div class="camera-guide-text" id="cameraGuideText">노란 박스 안에 LCD 숫자를 맞춰주세요</div>
  <div class="camera-controls">
    <button class="btn-danger" onclick="closeCamera()">✕ 취소</button>
    <button class="camera-shutter" onclick="takePhoto()">📸</button>
    <button class="btn-warn" onclick="switchCamera()">🔄 전환</button>
  </div>
</div>

<script>
'use strict';

let originalImage = null;
let cropCanvas = null;
let cropCtx = null;
let cropArea = null;
let isDrawing = false;
let drawStart = null;
let currentMode = 'number';
let history = [];

// 카메라 관련
let cameraStream = null;
let currentFacing = 'environment';  // 후면 기본

const MODE_CONFIG = {
  number:    { whitelist: '0123456789' },
  decimal:   { whitelist: '0123456789.' },
  negative:  { whitelist: '0123456789.+-' },
  alphanum:  { whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ.-' }
};

const FIELD_LABELS = {
  weight: '중량', length: '길이', thickness: '두께', diameter: '직경',
  hardness: '경도', temperature: '온도', pressure: '압력', custom: '값'
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

document.getElementById('targetField').addEventListener('change', (e) => {
  document.getElementById('finalLabel').textContent = FIELD_LABELS[e.target.value] || '값';
});

// ===== 카메라 직접 호출 (갤러리 안 뜸) =====
async function openCamera() {
  const modal = document.getElementById('cameraModal');
  const video = document.getElementById('cameraVideo');
  const errBox = document.getElementById('cameraError');
  errBox.classList.remove('show');

  modal.classList.add('show');

  try {
    // 기존 스트림 정리
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }

    const constraints = {
      video: {
        facingMode: { ideal: currentFacing },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    };

    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = cameraStream;
    await video.play();

  } catch (err) {
    console.error('카메라 오류:', err);
    let msg = '카메라를 열 수 없습니다.\n';
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      msg += '브라우저 카메라 권한을 허용해주세요.\n(주소창 자물쇠 아이콘 → 카메라 → 허용)';
    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
      msg += '카메라 장치를 찾을 수 없습니다.';
    } else if (err.name === 'NotReadableError') {
      msg += '다른 앱이 카메라를 사용 중입니다.';
    } else if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      msg += 'HTTPS 환경에서만 카메라가 작동합니다.\n(현재: ' + location.protocol + ')';
    } else {
      msg += '오류: ' + (err.message || err.name);
    }
    errBox.textContent = msg;
    errBox.classList.add('show');
  }
}

function closeCamera() {
  const modal = document.getElementById('cameraModal');
  const video = document.getElementById('cameraVideo');

  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  video.srcObject = null;
  modal.classList.remove('show');
}

async function switchCamera() {
  currentFacing = (currentFacing === 'environment') ? 'user' : 'environment';
  await openCamera();
}

function takePhoto() {
  const video = document.getElementById('cameraVideo');
  if (!video.videoWidth || !video.videoHeight) {
    alert('카메라가 준비되지 않았습니다');
    return;
  }

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  const img = new Image();
  img.onload = () => {
    originalImage = img;
    closeCamera();
    showImage();
  };
  img.src = dataUrl;
}

// ===== 갤러리 (백업용) =====
function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      showImage();
    };
    img.onerror = () => showStatus('이미지를 불러오지 못했습니다', 'error');
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('galleryInput').addEventListener('change', (e) => {
  loadImage(e.target.files[0]);
  e.target.value = '';
});

// ===== 캔버스 표시 =====
function showImage() {
  if (!originalImage) return;

  document.getElementById('emptyView').style.display = 'none';
  const stage = document.getElementById('cropStage');
  stage.style.display = 'block';

  cropCanvas = document.getElementById('cropCanvas');
  cropCtx = cropCanvas.getContext('2d');

  cropCanvas.width = originalImage.naturalWidth;
  cropCanvas.height = originalImage.naturalHeight;
  cropCtx.drawImage(originalImage, 0, 0);

  document.getElementById('fullBtn').disabled = false;
  document.getElementById('ocrBtn').disabled = false;

  resetCrop();

  document.getElementById('resultDisplay').style.display = 'none';
  document.getElementById('editRow').style.display = 'none';
  document.getElementById('useBtn').style.display = 'none';

  setTimeout(() => {
    stage.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

const overlay = document.getElementById('cropOverlay');
const cropBox = document.getElementById('cropBox');
const cropHint = document.getElementById('cropHint');

function getPointerPos(e) {
  const rect = overlay.getBoundingClientRect();
  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: Math.max(0, Math.min(rect.width,  clientX - rect.left)),
    y: Math.max(0, Math.min(rect.height, clientY - rect.top))
  };
}

function startDraw(e) {
  if (!originalImage) return;
  e.preventDefault();
  isDrawing = true;
  drawStart = getPointerPos(e);
  cropBox.style.display = 'block';
  cropBox.style.left = drawStart.x + 'px';
  cropBox.style.top = drawStart.y + 'px';
  cropBox.style.width = '0px';
  cropBox.style.height = '0px';
  cropHint.style.display = 'none';
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPointerPos(e);
  const x = Math.min(pos.x, drawStart.x);
  const y = Math.min(pos.y, drawStart.y);
  const w = Math.abs(pos.x - drawStart.x);
  const h = Math.abs(pos.y - drawStart.y);
  cropBox.style.left = x + 'px';
  cropBox.style.top = y + 'px';
  cropBox.style.width = w + 'px';
  cropBox.style.height = h + 'px';
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;

  const left = parseFloat(cropBox.style.left) || 0;
  const top = parseFloat(cropBox.style.top) || 0;
  const w = parseFloat(cropBox.style.width) || 0;
  const h = parseFloat(cropBox.style.height) || 0;

  if (w < 15 || h < 15) {
    cropBox.style.display = 'none';
    cropArea = null;
    cropHint.style.display = 'block';
    return;
  }

  const rect = overlay.getBoundingClientRect();
  const scaleX = originalImage.naturalWidth  / rect.width;
  const scaleY = originalImage.naturalHeight / rect.height;

  cropArea = {
    x: Math.round(left * scaleX),
    y: Math.round(top  * scaleY),
    w: Math.round(w    * scaleX),
    h: Math.round(h    * scaleY)
  };
}

overlay.addEventListener('touchstart', startDraw, { passive: false });
overlay.addEventListener('touchmove',  moveDraw,  { passive: false });
overlay.addEventListener('touchend',   endDraw,   { passive: false });
overlay.addEventListener('touchcancel',endDraw,   { passive: false });
overlay.addEventListener('mousedown', startDraw);
overlay.addEventListener('mousemove', moveDraw);
overlay.addEventListener('mouseup',   endDraw);
overlay.addEventListener('mouseleave',endDraw);

function resetCrop() {
  cropArea = null;
  cropBox.style.display = 'none';
  cropHint.style.display = 'block';
}

function useFullImage() {
  if (!originalImage) return;
  cropArea = {
    x: 0, y: 0,
    w: originalImage.naturalWidth,
    h: originalImage.naturalHeight
  };
  const rect = overlay.getBoundingClientRect();
  cropBox.style.display = 'block';
  cropBox.style.left = '0px';
  cropBox.style.top = '0px';
  cropBox.style.width = rect.width + 'px';
  cropBox.style.height = rect.height + 'px';
  cropHint.style.display = 'none';
  showStatus('전체 이미지를 사용합니다', 'info');
}

function preprocessImage(area) {
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');

  const scale = (area.w < 200 || area.h < 100) ? 4 : 2;
  tempCanvas.width = area.w * scale;
  tempCanvas.height = area.h * scale;

  tempCtx.imageSmoothingEnabled = true;
  tempCtx.imageSmoothingQuality = 'high';
  tempCtx.drawImage(cropCanvas,
    area.x, area.y, area.w, area.h,
    0, 0, tempCanvas.width, tempCanvas.height);

  const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
  const data = imgData.data;

  let sum = 0;
  const grays = new Uint8Array(data.length / 4);
  for (let i = 0; i < data.length; i += 4) {
    const gray = Math.round(0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
    grays[i / 4] = gray;
    sum += gray;
  }
  const avg = sum / grays.length;

  let darkCount = 0;
  for (let i = 0; i < grays.length; i++) {
    if (grays[i] < avg) darkCount++;
  }
  const isDarkBg = darkCount > grays.length / 2;

  for (let i = 0; i < data.length; i += 4) {
    const g = grays[i / 4];
    let v;
    if (isDarkBg) {
      v = g > avg ? 0 : 255;
    } else {
      v = g > avg ? 255 : 0;
    }
    data[i] = data[i+1] = data[i+2] = v;
  }
  tempCtx.putImageData(imgData, 0, 0);
  return tempCanvas;
}

async function runOCR() {
  if (!originalImage) {
    showStatus('먼저 사진을 선택하세요', 'error');
    return;
  }

  const area = cropArea || {
    x: 0, y: 0,
    w: originalImage.naturalWidth,
    h: originalImage.naturalHeight
  };

  if (!cropArea) {
    showStatus('영역이 지정되지 않아 전체 이미지로 인식합니다', 'info');
  }

  const btn = document.getElementById('ocrBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  btn.disabled = true;
  btn.textContent = '⏳ 인식 중...';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';

  try {
    showStatus('이미지 전처리...', 'info');
    const processed = preprocessImage(area);

    showStatus('OCR 엔진 로딩...', 'info');
    const config = MODE_CONFIG[currentMode];
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          progressBar.style.width = (m.progress * 100) + '%';
        }
      }
    });

    await worker.setParameters({
      tessedit_char_whitelist: config.whitelist,
      tessedit_pageseg_mode: '7',
      classify_bln_numeric_mode: '1'
    });

    showStatus('숫자 인식 중...', 'info');
    const { data } = await worker.recognize(processed);
    await worker.terminate();

    const rawText = data.text.trim();
    const confidence = Math.round(data.confidence);

    let cleaned = rawText.replace(/\s+/g, '');
    if (currentMode !== 'alphanum') {
      cleaned = cleaned
        .replace(/[Oo]/g, '0')
        .replace(/[lI|]/g, '1')
        .replace(/[Ss]/g, '5')
        .replace(/[Bb]/g, '8')
        .replace(/,/g, '.');
    }

    document.getElementById('resultDisplay').style.display = 'block';
    document.getElementById('resultValue').textContent = cleaned || '(인식실패)';
    document.getElementById('resultRaw').textContent = `원본:"${rawText}" / 신뢰도:${confidence}%`;
    document.getElementById('editRow').style.display = 'flex';
    document.getElementById('editValue').value = cleaned;
    document.getElementById('useBtn').style.display = 'block';

    if (cleaned) {
      showStatus(`인식 완료! 신뢰도 ${confidence}%`, 'success');
    } else {
      showStatus('숫자를 인식하지 못했습니다. 영역을 좁게 다시 선택해보세요.', 'error');
    }

  } catch (err) {
    console.error(err);
    showStatus('오류: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 숫자 읽기 시작';
    setTimeout(() => { progressWrap.style.display = 'none'; }, 500);
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('ocrStatus');
  el.textContent = msg;
  el.className = 'status show ' + type;
}

function useResult() {
  const val = document.getElementById('editValue').value.trim();
  if (!val) {
    showStatus('값이 비어있습니다', 'error');
    return;
  }
  document.getElementById('finalValue').value = val;
  const field = document.getElementById('targetField').value;
  const label = FIELD_LABELS[field];
  history.unshift({
    time: new Date().toLocaleTimeString('ko-KR'),
    field: label,
    value: val
  });
  if (history.length > 20) history.pop();
  renderHistory();
  showStatus(`✅ "${val}" 입력 완료`, 'success');
  if (navigator.vibrate) navigator.vibrate(100);
  document.getElementById('finalValue').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function copyFinal() {
  const val = document.getElementById('finalValue').value;
  if (!val) {
    showStatus('복사할 값이 없습니다', 'error');
    return;
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(val).then(() => {
      showStatus('📋 클립보드에 복사됨', 'success');
      if (navigator.vibrate) navigator.vibrate(50);
    }).catch(() => fallbackCopy(val));
  } else {
    fallbackCopy(val);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showStatus('📋 클립보드에 복사됨', 'success');
  } catch (e) {
    showStatus('복사 실패', 'error');
  }
  document.body.removeChild(ta);
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div style="padding:12px;color:#64748b;text-align:center;font-size:13px">아직 이력이 없습니다</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <div>
        <div style="color:#cbd5e1">${h.field}</div>
        <div class="time">${h.time}</div>
      </div>
      <div class="val">${h.value}</div>
    </div>
  `).join('');
}

function clearHistory() {
  if (!confirm('이력을 모두 지우시겠습니까?')) return;
  history = [];
  renderHistory();
}

// 페이지 떠날 때 카메라 정리
window.addEventListener('beforeunload', () => {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
  }
});

</script>
