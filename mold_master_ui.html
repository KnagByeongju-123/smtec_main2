<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금형-소재 통합 마스터</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222838;--border:#2a2e3d;--txt:#e8eaf0;--sub:#8b8fa3;--accent:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a855f7}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:40px}
.hdr{padding:14px 20px;background:linear-gradient(180deg,#1e3a5f,var(--bg));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr h1{font-size:17px;font-weight:800;color:var(--accent)}
.hdr .sub{font-size:11px;color:var(--sub);margin-top:2px}
.hdr .stat-group{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.05);border:1px solid var(--border);padding:6px 12px;border-radius:18px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.stat-chip b{font-size:14px;font-weight:800}
.stat-chip.ok b{color:var(--green)}
.stat-chip.est b{color:var(--yellow)}
.stat-chip.ng b{color:var(--red)}
.stat-chip.all b{color:var(--accent)}

.container{padding:14px;max-width:1600px;margin:0 auto}

.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr auto;gap:10px;align-items:end}
.filter-bar label{font-size:10px;color:var(--sub);font-weight:700;display:block;margin-bottom:4px}
.filter-bar input,.filter-bar select{width:100%;padding:8px 10px;background:#0f1117;border:1px solid var(--border);color:var(--txt);border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
.filter-bar .btn-reset{padding:8px 14px;background:#475569;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
.filter-bar .btn-reset:active{background:#334155}

.action-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 14px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.btn-excel{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.btn-csv{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn-reload{background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff}
.btn:active{transform:scale(.97)}
.count-info{margin-left:auto;font-size:11px;color:var(--sub);font-weight:700}

table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:10px;overflow:hidden;font-size:11px}
thead{background:#1e3a5f;position:sticky;top:66px;z-index:50}
thead th{padding:8px 6px;font-weight:700;font-size:10px;color:#cbd5e1;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#2d4a6f}
thead th.sort-asc::after{content:' ▲';color:var(--accent)}
thead th.sort-desc::after{content:' ▼';color:var(--accent)}
tbody td{padding:6px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle}
tbody tr:hover{background:rgba(56,189,248,.06)}
tbody tr.est{background:rgba(234,179,8,.05)}
tbody tr.none{background:rgba(239,68,68,.05)}
tbody tr.est:hover{background:rgba(234,179,8,.12)}
tbody tr.none:hover{background:rgba(239,68,68,.12)}

.bom-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:800;color:#fff;white-space:nowrap}
.bom-registered{background:var(--green)}
.bom-estimated{background:var(--yellow);color:#1a1d27}
.bom-none{background:var(--red)}

.status-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;border:1px solid}
.status-R{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
.status-P{border-color:var(--yellow);color:var(--yellow);background:rgba(234,179,8,.1)}
.status-N{border-color:var(--sub);color:var(--sub);background:rgba(139,143,163,.1)}
.status-D{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1)}

.pitch-cell{display:flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums}
.pitch-val{font-weight:700}
.pitch-val.has{color:var(--green)}
.pitch-val.no{color:var(--red);opacity:.5}
.pitch-src{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700}
.pitch-src.mes{background:#0369a1;color:#fff}
.pitch-src.manual{background:#16a34a;color:#fff}
.pitch-src.estimate{background:#ca8a04;color:#fff}

.edit-btn{padding:3px 8px;background:rgba(56,189,248,.15);color:var(--accent);border:1px solid rgba(56,189,248,.3);border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700}
.edit-btn:hover{background:rgba(56,189,248,.25)}

/* 편집 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0;max-width:640px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:14px 18px;background:linear-gradient(135deg,#1e3a5f,#0f172a);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:15px;font-weight:800;color:var(--accent)}
.modal-hdr .close{background:none;border:none;color:var(--sub);font-size:24px;cursor:pointer;padding:0;line-height:1}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.field{display:flex;flex-direction:column}
.field.full{grid-column:span 2}
.field label{font-size:10px;color:var(--sub);font-weight:700;margin-bottom:4px}
.field input,.field textarea,.field select{padding:8px 10px;background:#0f1117;border:1px solid var(--border);color:var(--txt);border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field input[readonly]{opacity:.6;cursor:not-allowed}
.field.highlight input{border-color:var(--yellow);background:rgba(234,179,8,.08)}
.field textarea{resize:vertical;min-height:60px}
.modal-ftr{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-ftr .btn-cancel{background:#475569;color:#fff}
.modal-ftr .btn-save{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;font-weight:600;z-index:10000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.loading{text-align:center;padding:40px;color:var(--accent);font-size:13px}

@media(max-width:900px){
  .filter-bar{grid-template-columns:1fr 1fr;gap:8px}
  .filter-bar .btn-reset{grid-column:span 2}
  table{font-size:10px}
  thead th{padding:6px 4px;font-size:9px}
  tbody td{padding:5px 4px}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>🏭 금형-소재 통합 마스터</h1>
    <div class="sub">고객사 · 기종 · 금형 · 소재 · 설비 통합 관리</div>
  </div>
  <div class="stat-group">
    <div class="stat-chip all">전체 <b id="statAll">-</b></div>
    <div class="stat-chip ok">✅ MES등록 <b id="statOk">-</b></div>
    <div class="stat-chip est">🟡 추정 <b id="statEst">-</b></div>
    <div class="stat-chip ng">🔴 추정불가 <b id="statNone">-</b></div>
  </div>
</div>

<div class="container">
  <div class="filter-bar">
    <div>
      <label>🔍 검색 (금형코드 / 품번 / 기종명)</label>
      <input type="text" id="fSearch" placeholder="검색어 입력..." oninput="applyFilter()">
    </div>
    <div>
      <label>고객사</label>
      <select id="fCustomer" onchange="applyFilter()"><option value="">전체</option></select>
    </div>
    <div>
      <label>BOM 상태</label>
      <select id="fBomStatus" onchange="applyFilter()">
        <option value="">전체</option>
        <option value="registered">✅ MES등록</option>
        <option value="estimated">🟡 추정</option>
        <option value="none">🔴 추정불가</option>
      </select>
    </div>
    <div>
      <label>금형상태</label>
      <select id="fMoldStatus" onchange="applyFilter()">
        <option value="">전체</option>
        <option value="R">R 가동</option>
        <option value="P">P 보류</option>
        <option value="N">N 미사용</option>
        <option value="D">D 폐기</option>
      </select>
    </div>
    <div>
      <label>설비톤수</label>
      <select id="fTon" onchange="applyFilter()"><option value="">전체</option></select>
    </div>
    <button class="btn-reset" onclick="resetFilter()">초기화</button>
  </div>

  <div class="action-bar">
    <button class="btn btn-reload" onclick="loadData()">🔄 새로고침</button>
    <button class="btn btn-excel" onclick="exportExcel()">📥 엑셀 다운로드</button>
    <button class="btn btn-csv" onclick="exportCSV()">📥 CSV 다운로드</button>
    <span class="count-info" id="countInfo">-</span>
  </div>

  <div id="tableWrap">
    <div class="loading">⏳ 데이터 로딩 중...</div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">금형 정보 수정</h3>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-grid">
        <div class="field"><label>금형코드</label><input id="eMoldCode" readonly></div>
        <div class="field"><label>금형명</label><input id="eMoldName" readonly></div>
        <div class="field"><label>고객사</label><input id="eCustomer"></div>
        <div class="field"><label>바이어모델</label><input id="eBuyerModel"></div>
        <div class="field"><label>품번</label><input id="eItemCode"></div>
        <div class="field"><label>기종명</label><input id="eItemName"></div>
        <div class="field full"><label>제품 스펙</label><input id="eItemSpec"></div>
        <div class="field"><label>설비톤수</label><input id="eMachineTon" type="number"></div>
        <div class="field"><label>설비명</label><input id="eMachineName"></div>
        <div class="field"><label>소재 재질</label><input id="eMtlType"></div>
        <div class="field"><label>소재 두께 (mm)</label><input id="eMtlThick" type="number" step="0.01"></div>
        <div class="field"><label>소재 폭 (mm)</label><input id="eMtlWidth" type="number" step="0.1"></div>
        <div class="field highlight">
          <label>📏 소재 피치 (mm) ★</label>
          <input id="eMtlPitch" type="number" step="0.1" placeholder="현장 실측값 입력">
        </div>
        <div class="field">
          <label>피치 출처</label>
          <select id="eMtlPitchSource">
            <option value="none">없음</option>
            <option value="mes">MES DB</option>
            <option value="estimate">추정값</option>
            <option value="manual">현장 실측</option>
          </select>
        </div>
        <div class="field"><label>비중</label><input id="eGravity" type="number" step="0.01"></div>
        <div class="field"><label>소재 품번</label><input id="eMtlItemCode"></div>
        <div class="field"><label>단위 소요량 (g)</label><input id="eReqQty" type="number" step="0.1"></div>
        <div class="field"><label>제품 중량 (g)</label><input id="eItemWeight" type="number" step="0.01"></div>
        <div class="field full">
          <label>📝 비고 (담당자 메모)</label>
          <textarea id="eNote" placeholder="예: 2026-04-20 피치 실측"></textarea>
        </div>
        <div class="field full">
          <label>수정자</label>
          <input id="eUpdatedBy" placeholder="이름 입력">
        </div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-save" onclick="saveEdit()">💾 저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
var sbH={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

var allData=[];
var filteredData=[];
var sortField='mold_code';
var sortDir='asc';
var editingId=null;
var LAST_UPDATED_BY='';

var toastT;
function showToast(m,ms){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show')},ms||2500)}

async function sbGet(path){
  var r=await fetch(SB_URL+'/rest/v1/'+path,{headers:sbH});
  return r.ok?r.json():null;
}

async function loadData(){
  document.getElementById('tableWrap').innerHTML='<div class="loading">⏳ 데이터 로딩 중...</div>';
  try{
    var data=await sbGet('mold_master?select=*&order=mold_code.asc&limit=5000');
    if(!data){showToast('❌ 로딩 실패 - 테이블이 생성되어 있는지 확인하세요');return}
    allData=data;
    buildFilters();
    updateStats();
    applyFilter();
    showToast('✅ '+data.length+'건 로드 완료');
  }catch(e){
    console.error(e);
    document.getElementById('tableWrap').innerHTML='<div class="loading">❌ 로딩 실패: '+e.message+'</div>';
  }
}

function updateStats(){
  document.getElementById('statAll').textContent=allData.length.toLocaleString();
  var ok=allData.filter(function(r){return r.bom_status==='registered'}).length;
  var est=allData.filter(function(r){return r.bom_status==='estimated'}).length;
  var none=allData.filter(function(r){return r.bom_status==='none'}).length;
  document.getElementById('statOk').textContent=ok.toLocaleString();
  document.getElementById('statEst').textContent=est.toLocaleString();
  document.getElementById('statNone').textContent=none.toLocaleString();
}

function buildFilters(){
  var custSet={},tonSet={};
  allData.forEach(function(r){
    if(r.customer)custSet[r.customer]=(custSet[r.customer]||0)+1;
    if(r.machine_ton)tonSet[r.machine_ton]=(tonSet[r.machine_ton]||0)+1;
  });
  var cs=document.getElementById('fCustomer');
  cs.innerHTML='<option value="">전체 ('+allData.length+')</option>';
  Object.keys(custSet).sort(function(a,b){return custSet[b]-custSet[a]}).forEach(function(c){
    cs.innerHTML+='<option value="'+_e(c)+'">'+_e(c)+' ('+custSet[c]+')</option>';
  });
  var ts=document.getElementById('fTon');
  ts.innerHTML='<option value="">전체</option>';
  Object.keys(tonSet).map(Number).sort(function(a,b){return a-b}).forEach(function(t){
    ts.innerHTML+='<option value="'+t+'">'+t+'톤 ('+tonSet[t]+')</option>';
  });
}

function resetFilter(){
  document.getElementById('fSearch').value='';
  document.getElementById('fCustomer').value='';
  document.getElementById('fBomStatus').value='';
  document.getElementById('fMoldStatus').value='';
  document.getElementById('fTon').value='';
  applyFilter();
}

function applyFilter(){
  var q=(document.getElementById('fSearch').value||'').trim().toLowerCase();
  var cust=document.getElementById('fCustomer').value;
  var bom=document.getElementById('fBomStatus').value;
  var ms=document.getElementById('fMoldStatus').value;
  var ton=document.getElementById('fTon').value;
  filteredData=allData.filter(function(r){
    if(q){
      var blob=[(r.mold_code||''),(r.item_code||''),(r.item_name||''),(r.customer||''),(r.buyer_model||'')].join('|').toLowerCase();
      if(blob.indexOf(q)<0)return false;
    }
    if(cust&&r.customer!==cust)return false;
    if(bom&&r.bom_status!==bom)return false;
    if(ms&&r.mold_status!==ms)return false;
    if(ton&&String(r.machine_ton)!==String(ton))return false;
    return true;
  });
  sortData();
  renderTable();
}

function sortData(){
  filteredData.sort(function(a,b){
    var va=a[sortField],vb=b[sortField];
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;
    if(vb==null)return -1;
    if(typeof va==='number'&&typeof vb==='number')return sortDir==='asc'?va-vb:vb-va;
    var sa=String(va).toLowerCase(),sb=String(vb).toLowerCase();
    return sortDir==='asc'?sa.localeCompare(sb):sb.localeCompare(sa);
  });
}

function setSort(field){
  if(sortField===field)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortField=field;sortDir='asc'}
  sortData();
  renderTable();
}

function _e(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderTable(){
  var cols=[
    {k:'mold_code',l:'금형코드',w:'90'},
    {k:'mold_status',l:'상태',w:'50'},
    {k:'customer',l:'고객사',w:'110'},
    {k:'item_code',l:'품번',w:'140'},
    {k:'item_name',l:'기종명',w:'140'},
    {k:'machine_ton',l:'톤수',w:'60',num:true},
    {k:'mtl_type',l:'재질',w:'70'},
    {k:'mtl_thickness',l:'두께',w:'50',num:true},
    {k:'mtl_width',l:'폭',w:'50',num:true},
    {k:'mtl_pitch',l:'피치★',w:'80',num:true},
    {k:'mtl_item_code',l:'소재품번',w:'120'},
    {k:'bom_status',l:'BOM',w:'70'},
    {k:'recent_use_count',l:'실적',w:'50',num:true},
    {k:'last_use_date',l:'최근사용',w:'80'},
    {k:'',l:'편집',w:'50'}
  ];
  var html='<table><thead><tr>';
  cols.forEach(function(c){
    var cls='';
    if(c.k===sortField)cls=sortDir==='asc'?'sort-asc':'sort-desc';
    var onclick=c.k?' onclick="setSort(\''+c.k+'\')"':'';
    html+='<th class="'+cls+'" style="width:'+c.w+'px"'+onclick+'>'+c.l+'</th>';
  });
  html+='</tr></thead><tbody>';

  filteredData.forEach(function(r){
    var cls=r.bom_status==='estimated'?'est':(r.bom_status==='none'?'none':'');
    html+='<tr class="'+cls+'">';
    // 금형코드
    html+='<td style="font-weight:700;font-family:ui-monospace,monospace">'+_e(r.mold_code)+'</td>';
    // 상태
    var s=r.mold_status||'-';
    html+='<td><span class="status-badge status-'+_e(s)+'">'+_e(s)+'</span></td>';
    // 고객사
    html+='<td>'+_e(r.customer||'-')+'</td>';
    // 품번
    html+='<td style="font-family:ui-monospace,monospace;font-size:10px">'+_e(r.item_code||'-')+'</td>';
    // 기종명
    html+='<td>'+_e(r.item_name||'-')+'</td>';
    // 톤수
    html+='<td style="text-align:right;font-variant-numeric:tabular-nums">'+(r.machine_ton?r.machine_ton+'t':'-')+'</td>';
    // 재질
    html+='<td style="font-weight:700">'+_e(r.mtl_type||'-')+'</td>';
    // 두께/폭
    html+='<td style="text-align:right;font-variant-numeric:tabular-nums">'+(r.mtl_thickness!=null?r.mtl_thickness:'-')+'</td>';
    html+='<td style="text-align:right;font-variant-numeric:tabular-nums">'+(r.mtl_width!=null?r.mtl_width:'-')+'</td>';
    // 피치 (핵심)
    var pv=r.mtl_pitch,src=r.mtl_pitch_source||'none';
    var pcls=pv!=null?'has':'no';
    var srcLabel={mes:'MES',manual:'실측',estimate:'추정'};
    var srcBadge=pv!=null&&srcLabel[src]?'<span class="pitch-src '+src+'">'+srcLabel[src]+'</span>':'';
    html+='<td><div class="pitch-cell"><span class="pitch-val '+pcls+'">'+(pv!=null?pv:'—')+'</span>'+srcBadge+'</div></td>';
    // 소재품번
    html+='<td style="font-family:ui-monospace,monospace;font-size:10px">'+_e(r.mtl_item_code||'-')+'</td>';
    // BOM 상태
    var bom=r.bom_status||'none';
    var bomLabel={'registered':'✓ MES','estimated':'🟡 추정','none':'🔴 없음'};
    html+='<td><span class="bom-badge bom-'+bom+'">'+(bomLabel[bom]||bom)+'</span></td>';
    // 실적
    html+='<td style="text-align:right;font-variant-numeric:tabular-nums">'+(r.recent_use_count||0)+'</td>';
    // 최근 사용
    html+='<td style="font-size:10px">'+_e(r.last_use_date||'-')+'</td>';
    // 편집
    html+='<td><button class="edit-btn" onclick="openEdit('+r.id+')">✏️ 수정</button></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tableWrap').innerHTML=html;
  document.getElementById('countInfo').textContent='표시 '+filteredData.length+' / 전체 '+allData.length;
}

function openEdit(id){
  var r=allData.find(function(x){return x.id===id});
  if(!r){showToast('❌ 레코드 없음');return}
  editingId=id;
  document.getElementById('modalTitle').textContent='📝 '+r.mold_code+' 수정';
  document.getElementById('eMoldCode').value=r.mold_code||'';
  document.getElementById('eMoldName').value=r.mold_name||'';
  document.getElementById('eCustomer').value=r.customer||'';
  document.getElementById('eBuyerModel').value=r.buyer_model||'';
  document.getElementById('eItemCode').value=r.item_code||'';
  document.getElementById('eItemName').value=r.item_name||'';
  document.getElementById('eItemSpec').value=r.item_spec||'';
  document.getElementById('eMachineTon').value=r.machine_ton||'';
  document.getElementById('eMachineName').value=r.machine_name||'';
  document.getElementById('eMtlType').value=r.mtl_type||'';
  document.getElementById('eMtlThick').value=r.mtl_thickness||'';
  document.getElementById('eMtlWidth').value=r.mtl_width||'';
  document.getElementById('eMtlPitch').value=r.mtl_pitch||'';
  document.getElementById('eMtlPitchSource').value=r.mtl_pitch_source||'none';
  document.getElementById('eGravity').value=r.mtl_specific_gravity||'';
  document.getElementById('eMtlItemCode').value=r.mtl_item_code||'';
  document.getElementById('eReqQty').value=r.mtl_req_qty||'';
  document.getElementById('eItemWeight').value=r.item_weight||'';
  document.getElementById('eNote').value=r.note||'';
  document.getElementById('eUpdatedBy').value=LAST_UPDATED_BY||'';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  editingId=null;
}

async function saveEdit(){
  if(!editingId){showToast('❌ 편집 레코드 없음');return}
  var updatedBy=(document.getElementById('eUpdatedBy').value||'').trim();
  if(!updatedBy){showToast('❌ 수정자 이름을 입력하세요');return}
  LAST_UPDATED_BY=updatedBy;

  var pitchVal=document.getElementById('eMtlPitch').value;
  var pitchSrc=document.getElementById('eMtlPitchSource').value;
  // 피치값이 입력되었는데 출처가 none이면 manual로 자동 변경
  if(pitchVal&&pitchSrc==='none')pitchSrc='manual';

  var patch={
    customer:document.getElementById('eCustomer').value||null,
    buyer_model:document.getElementById('eBuyerModel').value||null,
    item_code:document.getElementById('eItemCode').value||null,
    item_name:document.getElementById('eItemName').value||null,
    item_spec:document.getElementById('eItemSpec').value||null,
    machine_ton:parseInt(document.getElementById('eMachineTon').value)||null,
    machine_name:document.getElementById('eMachineName').value||null,
    mtl_type:document.getElementById('eMtlType').value||null,
    mtl_thickness:parseFloat(document.getElementById('eMtlThick').value)||null,
    mtl_width:parseFloat(document.getElementById('eMtlWidth').value)||null,
    mtl_pitch:parseFloat(pitchVal)||null,
    mtl_pitch_source:pitchSrc,
    mtl_specific_gravity:parseFloat(document.getElementById('eGravity').value)||null,
    mtl_item_code:document.getElementById('eMtlItemCode').value||null,
    mtl_req_qty:parseFloat(document.getElementById('eReqQty').value)||null,
    item_weight:parseFloat(document.getElementById('eItemWeight').value)||null,
    note:document.getElementById('eNote').value||null,
    updated_by:updatedBy,
    source:'manual'
  };

  try{
    var r=await fetch(SB_URL+'/rest/v1/mold_master?id=eq.'+editingId,{
      method:'PATCH',
      headers:Object.assign({},sbH,{'Prefer':'return=representation'}),
      body:JSON.stringify(patch)
    });
    if(!r.ok){
      var err=await r.text();
      console.error(err);
      showToast('❌ 저장 실패: '+r.status);
      return;
    }
    var result=await r.json();
    // 로컬 데이터 갱신
    var idx=allData.findIndex(function(x){return x.id===editingId});
    if(idx>=0&&result&&result[0])allData[idx]=result[0];
    updateStats();
    applyFilter();
    closeModal();
    showToast('✅ 저장 완료');
  }catch(e){
    console.error(e);
    showToast('❌ 저장 실패: '+e.message);
  }
}

// ===== 엑셀/CSV 내보내기 =====
function getExportRows(){
  return filteredData.map(function(r){
    return {
      '금형코드':r.mold_code,'금형명':r.mold_name,'금형상태':r.mold_status,
      '고객사':r.customer,'바이어모델':r.buyer_model,
      '품번':r.item_code,'기종명':r.item_name,'제품스펙':r.item_spec,
      '설비톤수':r.machine_ton,'설비명':r.machine_name,
      '캐비티':r.cavity_qty,'CT초':r.cycle_time,
      '소재재질':r.mtl_type,'소재두께t':r.mtl_thickness,'소재폭mm':r.mtl_width,
      '소재피치mm':r.mtl_pitch,'피치출처':r.mtl_pitch_source,
      '비중':r.mtl_specific_gravity,'소재품번':r.mtl_item_code,
      '소요량g':r.mtl_req_qty,'제품중량g':r.item_weight,
      'BOM상태':r.bom_status,'신뢰도':r.confidence_level,'추정근거':r.estimate_source,
      '실적건수':r.recent_use_count,'최근사용일':r.last_use_date,
      '비고':r.note,'수정일':r.updated_at,'수정자':r.updated_by
    };
  });
}

async function exportExcel(){
  if(typeof ExcelJS==='undefined'){showToast('❌ ExcelJS 미로드');return}
  var rows=getExportRows();
  if(!rows.length){showToast('❌ 데이터 없음');return}
  showToast('⏳ 엑셀 생성중...');
  var wb=new ExcelJS.Workbook();
  var ws=wb.addWorksheet('MoldMaster');
  var cols=Object.keys(rows[0]);
  ws.addRow(cols);
  rows.forEach(function(r){ws.addRow(cols.map(function(c){return r[c]}))});
  ws.getRow(1).font={bold:true,color:{argb:'FFFFFFFF'}};
  ws.getRow(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E3A5F'}};
  ws.columns.forEach(function(c){c.width=12});
  ws.views=[{state:'frozen',xSplit:1,ySplit:1}];
  ws.autoFilter='A1:'+String.fromCharCode(64+cols.length)+'1';
  var buf=await wb.xlsx.writeBuffer();
  var fname='MoldMaster_'+new Date().toISOString().slice(0,10)+'.xlsx';
  saveAs(new Blob([buf]),fname);
  showToast('✅ '+fname);
}

function exportCSV(){
  var rows=getExportRows();
  if(!rows.length){showToast('❌ 데이터 없음');return}
  var cols=Object.keys(rows[0]);
  var csv='\uFEFF'+cols.join(',')+'\n';
  rows.forEach(function(r){
    csv+=cols.map(function(c){
      var v=r[c];
      if(v==null)return'';
      var s=String(v);
      if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)s='"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(',')+'\n';
  });
  var fname='MoldMaster_'+new Date().toISOString().slice(0,10)+'.csv';
  saveAs(new Blob([csv],{type:'text/csv;charset=utf-8'}),fname);
  showToast('✅ '+fname);
}
