<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>치수관리</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap">
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--accent:#f59e0b;--accent2:#d97706;--ok:#22c55e;--ng:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#92400e,#d97706);padding:20px 16px 16px;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.02) 10px,rgba(255,255,255,.02) 20px);pointer-events:none}
.hdr h1{font-size:18px;font-weight:900;position:relative}.hdr p{font-size:11px;color:#fcd34d;margin-top:3px;position:relative}
.hdr-back{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.7);text-decoration:none;font-size:22px;font-weight:700;padding:4px 8px}
.form-wrap{max-width:520px;margin:0 auto;padding:16px}
.tabs{display:flex;background:var(--surface);border-bottom:2px solid rgba(255,255,255,.06)}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--text3);transition:all .15s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.pnl{display:none}.pnl.on{display:block}
.card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;flex-shrink:0}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.fg input{width:100%;padding:10px 11px;font-size:14px;font-family:inherit;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text)}
.fg input:focus{outline:none;border-color:var(--accent)}
.cust-card{display:flex;align-items:center;gap:14px;padding:16px 18px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;cursor:pointer;color:#fff;text-decoration:none;margin-bottom:10px;transition:all .15s}
.cust-card:active{transform:scale(.97);background:rgba(255,255,255,.1)}
.cust-card:hover{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.06)}
.cust-icon{font-size:28px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(245,158,11,.12);flex-shrink:0}
.cust-name{flex:1;font-size:16px;font-weight:700}
.cust-arrow{color:rgba(255,255,255,.3);font-size:18px;flex-shrink:0}
.setting-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:8px}
.setting-item .si-info{flex:1;min-width:0}
.setting-item .si-name{font-size:14px;font-weight:700;color:var(--text)}
.setting-item .si-url{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.si-btn{width:30px;height:30px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si-btn:active{transform:scale(.9)}
.si-edit{background:rgba(59,130,246,.12);color:#60a5fa}
.si-del{background:rgba(239,68,68,.12);color:var(--ng)}
.submit-btn{width:100%;padding:14px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#92400e,#f59e0b);border:none;border-radius:var(--radius);color:#fff;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(245,158,11,.2)}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;line-height:1.8}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.sync-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:6px;margin-left:6px}
.sync-ok{background:rgba(34,197,94,.12);color:var(--ok)}
.sync-ng{background:rgba(239,68,68,.12);color:var(--ng)}
.ld-sm{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hdr">
  <a href="index.html" class="hdr-back">‹</a>
  <h1>📐 치수관리</h1>
  <p>공차한계 모니터링 · 고객사별 관리도 분석</p>
</div>
<div class="tabs">
  <div class="tab on" onclick="swTab(0)">📐 치수점검</div>
  <div class="tab" onclick="swTab(1)">⚙ 설정</div>
</div>

<!-- ===== 치수점검 탭 ===== -->
<div class="pnl on" id="pnl0">
  <div class="form-wrap">
    <div id="custCards"><div class="empty"><span class="ld-sm"></span> 로딩 중...</div></div>
  </div>
</div>

<!-- ===== 설정 탭 ===== -->
<div class="pnl" id="pnl1">
  <div class="form-wrap">
    <div class="card">
      <div class="card-title">🏢 고객사 관리 <span id="syncBadge"></span></div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:12px;padding:6px 8px;background:rgba(245,158,11,.06);border-radius:6px;line-height:1.6">
        💡 고객사별 치수관리 페이지 URL과 GAS 배포URL을 등록합니다.<br>
        설정은 Supabase에 저장되어 모든 기기에서 공유됩니다.
      </div>
      <div id="settingsList"><div style="text-align:center;padding:12px;color:var(--text3);font-size:12px"><span class="ld-sm"></span> 로딩 중...</div></div>
    </div>
    <div class="card">
      <div class="card-title">➕ 고객사 추가</div>
      <div class="fg"><label>고객사명</label><input id="newName" placeholder="예: SKF씰"></div>
      <div class="fg"><label>페이지 URL</label><input id="newUrl" placeholder="예: QC_dim_SKF.html"></div>
      <div class="fg"><label>GAS 배포 URL</label><input id="newGasUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
      <button class="submit-btn" onclick="addCustomer()" style="margin-top:4px" id="btnAdd">✅ 추가</button>
    </div>
    <div class="card" style="border:1.5px dashed rgba(245,158,11,.3)">
      <div class="card-title">🗄 테이블 생성 SQL</div>
      <p style="font-size:10px;color:var(--text3);margin-bottom:8px">처음 사용 시 Supabase SQL Editor에서 실행하세요.</p>
      <button class="submit-btn" onclick="copySql()" style="background:linear-gradient(135deg,#00695c,#00897b);font-size:13px;padding:10px">📋 SQL 복사</button>
      <div id="sqlStatus" style="font-size:10px;margin-top:6px;color:var(--text3)"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Supabase 설정 =====
const SB_URL='https://omngtyewdaqpphnzeate.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbmd0eWV3ZGFxcHBobnplYXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODk4ODksImV4cCI6MjA5MDQ2NTg4OX0.Zxur3t02JHtOcXforCMSwO3i2mMaf5sViE0tXXUC0-s';
const TABLE='dim_customer';

function sbH(){return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}}
function sbU(q){return SB_URL+'/rest/v1/'+TABLE+(q?'?'+q:'')}

async function sbSelect(){
  const r=await fetch(sbU('select=*&order=sort_order.asc,id.asc'),{headers:sbH()});
  if(!r.ok)throw new Error('SELECT '+r.status);
  return await r.json();
}
async function sbInsert(data){
  const r=await fetch(sbU(''),{method:'POST',headers:sbH(),body:JSON.stringify(data)});
  if(!r.ok){const e=await r.text();throw new Error('INSERT '+r.status+' '+e)}
  return await r.json();
}
async function sbUpdate(id,data){
  const r=await fetch(sbU('id=eq.'+id),{method:'PATCH',headers:sbH(),body:JSON.stringify(data)});
  if(!r.ok){const e=await r.text();throw new Error('UPDATE '+r.status+' '+e)}
  return await r.json();
}
async function sbDel(id){
  const r=await fetch(sbU('id=eq.'+id),{method:'DELETE',headers:sbH()});
  if(!r.ok)throw new Error('DELETE '+r.status);
}

// ===== 데이터 =====
let _custs=[];

async function loadData(){
  try{
    _custs=await sbSelect();
    updateSync(true);
  }catch(e){
    console.log('Supabase 로드 실패:',e);
    updateSync(false);
    try{_custs=JSON.parse(localStorage.getItem('DIM_CUSTOMERS')||'[]')}catch(ee){_custs=[]}
  }
  localStorage.setItem('DIM_CUSTOMERS',JSON.stringify(_custs));
}

function updateSync(ok){
  const el=document.getElementById('syncBadge');
  el.innerHTML=ok?'<span class="sync-badge sync-ok">☁️ Supabase 동기화</span>':'<span class="sync-badge sync-ng">⚠ 오프라인</span>';
}

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),2000)}

function swTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===n));
  document.querySelectorAll('.pnl').forEach((p,i)=>p.classList.toggle('on',i===n));
  if(n===0)renderCards();
  if(n===1)renderSettings();
}

// ===== 치수점검 탭 =====
function renderCards(){
  const c=document.getElementById('custCards');
  if(!_custs.length){
    c.innerHTML='<div class="empty">📐 등록된 고객사가 없습니다.<br><br>⚙ 설정 탭에서 고객사와 URL을 추가하세요.</div>';
    return;
  }
  c.innerHTML=_custs.map(item=>{
    const pu=item.page_url||'';
    const gu=item.gas_url||'';
    const href=gu?pu+'?gasUrl='+encodeURIComponent(gu):pu;
    return `<a class="cust-card" href="${href}">
      <span class="cust-icon">🏢</span>
      <span class="cust-name">${item.customer_name||''}</span>
      <span class="cust-arrow">›</span>
    </a>`;
  }).join('');
}

// ===== 설정 탭 =====
function renderSettings(){
  const c=document.getElementById('settingsList');
  if(!_custs.length){
    c.innerHTML='<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">등록된 고객사 없음</div>';
    return;
  }
  c.innerHTML=_custs.map(item=>{
    const gasOk=!!(item.gas_url);
    const nm=(item.customer_name||'').replace(/'/g,"\\'");
    return `<div class="setting-item">
      <span style="font-size:18px">🏢</span>
      <div class="si-info">
        <div class="si-name">${item.customer_name||''}</div>
        <div class="si-url">${item.page_url||''}</div>
        <div class="si-url" style="color:${gasOk?'#22c55e':'#ef4444'}">${gasOk?'✅ GAS 연결됨':'⚠ GAS URL 미설정'}</div>
      </div>
      <button class="si-btn si-edit" onclick="editCust(${item.id})">✎</button>
      <button class="si-btn si-del" onclick="delCust(${item.id},'${nm}')">✕</button>
    </div>`;
  }).join('');
}

async function addCustomer(){
  const name=document.getElementById('newName').value.trim();
  const url=document.getElementById('newUrl').value.trim();
  const gasUrl=document.getElementById('newGasUrl').value.trim();
  if(!name){toast('고객사명을 입력하세요');return}
  if(!url){toast('페이지 URL을 입력하세요');return}
  if(_custs.find(c=>c.customer_name===name)){toast('이미 등록된 고객사');return}

  const btn=document.getElementById('btnAdd');
  btn.disabled=true;btn.textContent='저장 중...';
  try{
    const mx=_custs.reduce((m,c)=>Math.max(m,c.sort_order||0),0);
    await sbInsert({customer_name:name,page_url:url,gas_url:gasUrl,sort_order:mx+1});
    await loadData();
    document.getElementById('newName').value='';
    document.getElementById('newUrl').value='';
    document.getElementById('newGasUrl').value='';
    renderSettings();
    toast('✅ '+name+' 추가됨');
  }catch(e){toast('❌ 추가 실패: '+e.message)}
  btn.disabled=false;btn.textContent='✅ 추가';
}

async function editCust(id){
  const item=_custs.find(c=>c.id===id);
  if(!item)return;
  const newName=prompt('고객사명',item.customer_name||'');
  if(newName===null)return;
  const newUrl=prompt('페이지 URL',item.page_url||'');
  if(newUrl===null)return;
  const newGas=prompt('GAS 배포 URL\n(빈칸이면 미설정)',item.gas_url||'');
  if(newGas===null)return;
  try{
    await sbUpdate(id,{customer_name:newName.trim()||item.customer_name,page_url:newUrl.trim()||item.page_url,gas_url:newGas.trim()});
    await loadData();
    renderSettings();
    toast('✅ 수정 완료');
  }catch(e){toast('❌ 수정 실패: '+e.message)}
}

async function delCust(id,name){
  if(!confirm(name+' 삭제?'))return;
  try{
    await sbDel(id);
    await loadData();
    renderSettings();
    toast('🗑 삭제됨');
  }catch(e){toast('❌ 삭제 실패: '+e.message)}
}

// ===== SQL 복사 =====
function copySql(){
  const sql=`-- dim_customer 테이블 생성
CREATE TABLE IF NOT EXISTS dim_customer (
  id BIGSERIAL PRIMARY KEY,
  customer_name TEXT NOT NULL,
  page_url TEXT DEFAULT '',
  gas_url TEXT DEFAULT '',
  sort_order INT DEFAULT 0,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

ALTER TABLE dim_customer ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS "allow_all" ON dim_customer;
CREATE POLICY "allow_all" ON dim_customer FOR ALL USING (true) WITH CHECK (true);`;
  navigator.clipboard.writeText(sql).then(()=>{
    document.getElementById('sqlStatus').innerHTML='<span style="color:var(--ok)">✅ SQL 복사됨 → Supabase SQL Editor에서 실행하세요</span>';
    toast('📋 SQL 복사 완료');
  }).catch(()=>{
    document.getElementById('sqlStatus').innerHTML='<textarea style="width:100%;height:120px;font-size:9px;font-family:monospace;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px;margin-top:4px" readonly>'+sql+'</textarea>';
  });
}

// ===== 초기화 =====
async function init(){
  await loadData();
  renderCards();
}
init();
</script>
</body>
</html>
